<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Middle East & Saudi Arabia Think Tanks Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232735;
    --border: #2e3345;
    --text: #e4e6ef;
    --text-dim: #8b8fa3;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --accent3: #ff6b6b;
    --accent4: #ffd93d;
    --saudi: #006c35;
    --uae: #c8102e;
    --qatar: #8a1538;
    --bahrain: #ce1126;
    --israel: #0038b8;
    --multi: #6c63ff;
  }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #232735 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }

  .header h1 {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, #6c63ff, #00d4aa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }

  .header p {
    color: var(--text-dim);
    font-size: 13px;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .search-box {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    width: 240px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-dim); }

  .main { padding: 24px 40px; max-width: 1400px; margin: 0 auto; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }

  .stat-card .num {
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(135deg, #6c63ff, #00d4aa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stat-card .label { color: var(--text-dim); font-size: 12px; margin-top: 4px; }

  .section-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before {
    content: '';
    width: 4px;
    height: 20px;
    background: var(--accent);
    border-radius: 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: all 0.3s;
    cursor: pointer;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(108, 99, 255, 0.1);
  }

  .card-header {
    padding: 20px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .card-header h3 { font-size: 16px; font-weight: 600; line-height: 1.4; }
  .card-header .eng { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .country-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: 12px;
  }

  .country-sa { background: rgba(0,108,53,0.2); color: #4ade80; border: 1px solid rgba(0,108,53,0.3); }
  .country-ae { background: rgba(200,16,46,0.15); color: #fb7185; border: 1px solid rgba(200,16,46,0.25); }
  .country-qa { background: rgba(138,21,56,0.2); color: #f0abfc; border: 1px solid rgba(138,21,56,0.3); }
  .country-bh { background: rgba(206,17,38,0.15); color: #fca5a5; border: 1px solid rgba(206,17,38,0.25); }
  .country-il { background: rgba(0,56,184,0.2); color: #93c5fd; border: 1px solid rgba(0,56,184,0.3); }
  .country-multi { background: rgba(108,99,255,0.15); color: #a5b4fc; border: 1px solid rgba(108,99,255,0.25); }

  .card-body { padding: 0 20px 16px; }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .tag {
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .tag.focus { background: rgba(108,99,255,0.12); color: #a5b4fc; border-color: rgba(108,99,255,0.25); }

  .orientation {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .orientation strong { color: var(--accent2); font-weight: 500; }

  .card-footer {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    background: rgba(0,0,0,0.15);
  }

  .card-footer .footer-title {
    font-size: 11px;
    color: var(--accent2);
    font-weight: 600;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .report-item {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 4px;
    padding-left: 12px;
    position: relative;
  }

  .report-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 7px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }

  .report-item a {
    color: var(--text);
    text-decoration: none;
    transition: color 0.2s;
  }

  .report-item a:hover { color: var(--accent); }

  .report-date { color: var(--text-dim); font-size: 11px; }

  .detail-panel {
    position: fixed;
    right: -520px;
    top: 0;
    width: 520px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 200;
    transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    overflow-y: auto;
    box-shadow: -10px 0 40px rgba(0,0,0,0.4);
  }

  .detail-panel.open { right: 0; }

  .detail-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .detail-close:hover { background: var(--accent3); border-color: var(--accent3); }

  .detail-content { padding: 28px; }
  .detail-content h2 { font-size: 20px; margin-bottom: 4px; padding-right: 40px; }
  .detail-content .eng-name { color: var(--text-dim); font-size: 13px; margin-bottom: 16px; }

  .detail-section { margin-bottom: 20px; }
  .detail-section h4 {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .detail-section p, .detail-section li {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }
  .detail-section ul { list-style: none; padding: 0; }
  .detail-section li { padding-left: 14px; position: relative; margin-bottom: 6px; }
  .detail-section li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 8px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .detail-link {
    display: inline-block;
    margin-top: 8px;
    padding: 8px 18px;
    background: var(--accent);
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .detail-link:hover { opacity: 0.85; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 199;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }

  .map-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 28px;
  }

  .country-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 12px;
  }

  .country-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .country-pill:hover { border-color: var(--accent); }
  .country-pill .dot { width: 10px; height: 10px; border-radius: 50%; }
  .country-pill .name { font-size: 13px; font-weight: 500; }
  .country-pill .count { font-size: 12px; color: var(--text-dim); }

  /* === Latest Reports Timeline === */
  .timeline-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .timeline-section::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 300px; height: 100%;
    background: linear-gradient(90deg, transparent, var(--surface));
    pointer-events: none;
    z-index: 2;
    display: none;
  }

  .timeline-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .timeline-header h2 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .timeline-header h2::before {
    content: '';
    width: 4px;
    height: 18px;
    background: var(--accent3);
    border-radius: 2px;
  }

  .pulse-dot {
    width: 8px; height: 8px;
    background: var(--accent3);
    border-radius: 50%;
    display: inline-block;
    margin-left: 8px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(255,107,107,0); }
  }

  .timeline-filters {
    display: flex;
    gap: 6px;
  }

  .tl-filter {
    padding: 4px 12px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tl-filter:hover { border-color: var(--accent3); color: var(--text); }
  .tl-filter.active { background: var(--accent3); color: #fff; border-color: var(--accent3); }

  .timeline-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    max-height: 420px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .timeline-list::-webkit-scrollbar { width: 5px; }
  .timeline-list::-webkit-scrollbar-track { background: transparent; }
  .timeline-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .tl-item {
    display: flex;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(46,51,69,0.5);
    transition: background 0.2s;
    cursor: pointer;
    border-radius: 8px;
    padding-left: 8px;
    padding-right: 8px;
  }

  .tl-item:last-child { border-bottom: none; }
  .tl-item:hover { background: rgba(108,99,255,0.06); }

  .tl-date-col {
    flex-shrink: 0;
    width: 72px;
    text-align: right;
    position: relative;
  }

  .tl-date-col::after {
    content: '';
    position: absolute;
    right: -8px;
    top: 6px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
  }

  .tl-month { font-size: 12px; font-weight: 600; color: var(--accent2); line-height: 1.2; }
  .tl-year { font-size: 11px; color: var(--text-dim); }

  .tl-line {
    width: 2px;
    background: var(--border);
    flex-shrink: 0;
    position: relative;
  }

  .tl-content { flex: 1; min-width: 0; }

  .tl-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .tl-title a {
    color: var(--text);
    text-decoration: none;
    transition: color 0.2s;
  }
  .tl-title a:hover { color: var(--accent); }

  .tl-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tl-org {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .tl-country-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
  }

  .tl-tag {
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 10px;
    background: rgba(108,99,255,0.1);
    color: #a5b4fc;
    border: 1px solid rgba(108,99,255,0.2);
  }

  .tl-tag.hot {
    background: rgba(255,107,107,0.12);
    color: #fca5a5;
    border-color: rgba(255,107,107,0.25);
  }

  .tl-tag.new {
    background: rgba(0,212,170,0.12);
    color: #6ee7b7;
    border-color: rgba(0,212,170,0.25);
  }

  .tl-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 32px 0;
  }

  /* === Reports Archive Section === */
  .archive-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 28px;
  }

  .archive-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .archive-header h2 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .archive-header h2::before {
    content: '';
    width: 4px;
    height: 18px;
    background: var(--accent2);
    border-radius: 2px;
  }

  .archive-toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .ar-search {
    padding: 6px 14px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    width: 200px;
    outline: none;
  }
  .ar-search:focus { border-color: var(--accent2); }

  .ar-sort {
    padding: 6px 12px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
  }

  .archive-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }

  .ar-stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .ar-stat .num {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent2);
  }
  .ar-stat .label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .archive-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
    max-height: 720px;
    overflow-y: auto;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .archive-grid::-webkit-scrollbar { width: 6px; }
  .archive-grid::-webkit-scrollbar-track { background: transparent; }
  .archive-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .ar-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ar-card:hover {
    border-color: var(--accent2);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,212,170,0.08);
  }

  .ar-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .ar-card-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.45;
    color: var(--text);
  }

  .ar-card-title a {
    color: var(--text);
    text-decoration: none;
  }
  .ar-card-title a:hover { color: var(--accent2); }

  .ar-card-date {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .ar-card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .ar-card-org {
    font-size: 11px;
    color: var(--accent2);
    font-weight: 600;
  }

  /* === X Feed Section === */
  .x-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 28px;
  }

  .x-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .x-header h2 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .x-header h2::before {
    content: '';
    width: 4px;
    height: 18px;
    background: #1da1f2;
    border-radius: 2px;
  }

  .x-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 14px;
  }

  .x-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
  }

  .x-card:hover {
    border-color: #1da1f2;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(29, 161, 242, 0.1);
  }

  .x-card-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .x-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1da1f2, #6c63ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
    flex-shrink: 0;
  }

  .x-info { flex: 1; min-width: 0; }
  .x-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .x-handle {
    font-size: 11px;
    color: var(--text-dim);
  }

  .x-card-body {
    padding: 14px 16px;
    flex: 1;
  }

  .x-post {
    font-size: 12px;
    color: var(--text);
    line-height: 1.55;
    padding: 10px 0;
    border-bottom: 1px dashed rgba(46,51,69,0.6);
  }

  .x-post:last-child { border-bottom: none; }

  .x-post-date {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .x-card-footer {
    padding: 12px 16px;
    background: rgba(29, 161, 242, 0.06);
    border-top: 1px solid var(--border);
    text-align: center;
  }

  .x-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #1da1f2;
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;

const countryColors = { SA: '#4ade80', AE: '#fb7185', QA: '#f0abfc', BH: '#fca5a5', IL: '#93c5fd', multi: '#a5b4fc' };
const countryClasses = { SA: 'country-sa', AE: 'country-ae', QA: 'country-qa', BH: 'country-bh', IL: 'country-il', multi: 'country-multi' };

let currentFilter = 'all';
let searchQuery = '';

function getCountryStats() {
  const stats = {};
  thinktanks.forEach(t => {
    stats[t.country] = stats[t.country] || { name: t.countryName, count: 0 };
    stats[t.country].count++;
  });
  return stats;
}

function renderCountryPills() {
  const stats = getCountryStats();
  const container = document.getElementById('countryPills');
  container.innerHTML = Object.entries(stats).map(([code, s]) => `
    <div class="country-pill" onclick="setFilter('${code}')">
      <div class="dot" style="background:${countryColors[code]}"></div>
      <span class="name">${s.name}</span>
      <span class="count">${s.count}개 기관</span>
    </div>
  `).join('');
}

function renderCards() {
  const grid = document.getElementById('cardGrid');
  const filtered = thinktanks.filter(t => {
    if (currentFilter !== 'all' && currentFilter !== 'geo' && currentFilter !== 'energy') {
      if (t.country !== currentFilter) return false;
    }
    if (currentFilter === 'geo' && !t.category.includes('geo')) return false;
    if (currentFilter === 'energy' && !t.category.includes('energy')) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return t.name.toLowerCase().includes(q) || t.nameEn.toLowerCase().includes(q) || t.countryName.includes(q);
    }
    return true;
  });

  document.getElementById('totalCount').textContent = filtered.length;

  grid.innerHTML = filtered.map(t => `
    <div class="card" onclick="openDetail(${t.id})">
      <div class="card-header">
        <div>
          <h3>${t.name}</h3>
          <div class="eng">${t.nameEn}</div>
        </div>
        <span class="country-badge ${countryClasses[t.country]}">${t.countryName}</span>
      </div>
      <div class="card-body">
        <div class="card-meta">
          ${t.focus.slice(0,4).map(f => `<span class="tag focus">${f}</span>`).join('')}
          <span class="tag">${t.city}</span>
          <span class="tag">${t.founded}년 설립</span>
        </div>
        <div class="orientation">${t.orientation}</div>
      </div>
      <div class="card-footer">
        <div class="footer-title">최근 보고서 / 활동</div>
        ${t.recentReports.slice(0,2).map(r => `
          <div class="report-item">
            ${r.title} <span class="report-date">(${r.date})</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function openDetail(id) {
  const t = thinktanks.find(x => x.id === id);
  if (!t) return;
  const content = document.getElementById('detailContent');
  content.innerHTML = `
    <h2>${t.name}</h2>
    <div class="eng-name">${t.nameEn}</div>
    <span class="country-badge ${countryClasses[t.country]}" style="display:inline-block;margin-bottom:16px;">${t.countryName} · ${t.city}</span>

    <div class="detail-section">
      <h4>기관 개요</h4>
      <p>${t.detail}</p>
    </div>

    <div class="detail-section">
      <h4>성향 분석</h4>
      <p>${t.orientation}</p>
    </div>

    <div class="detail-section">
      <h4>주요 연구 분야</h4>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${t.focus.map(f => `<span class="tag focus">${f}</span>`).join('')}
      </div>
    </div>

    <div class="detail-section">
      <h4>설립 정보</h4>
      <p>설립연도: ${t.founded}년 | 소재지: ${t.city}, ${t.countryName}</p>
    </div>

    <div class="detail-section">
      <h4>최근 보고서 / 활동 (6개월)</h4>
      <ul>
        ${t.recentReports.map(r => `
          <li>${r.url !== '#' ? `<a href="${r.url}" target="_blank">${r.title}</a>` : r.title} <span class="report-date">(${r.date})</span></li>
        `).join('')}
      </ul>
    </div>

    ${t.website !== '#' ? `<a class="detail-link" href="${t.website}" target="_blank">공식 웹사이트 방문</a>` : ''}
  `;
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === f);
  });
  renderCards();
}

document.getElementById('detailClose').addEventListener('click', closeDetail);
document.getElementById('overlay').addEventListener('click', closeDetail);

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => setFilter(btn.dataset.filter));
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderCards();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

let tlFilter = 'all';

function renderTimeline() {
  const list = document.getElementById('timelineList');
  const filtered = allReports.filter(r => {
    if (tlFilter === 'all') return true;
    if (tlFilter === 'geo' || tlFilter === 'energy') return r.cat.includes(tlFilter);
    return r.country === tlFilter;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="tl-empty">해당 필터에 맞는 보고서가 없습니다.</div>';
    return;
  }

  list.innerHTML = filtered.map(r => `
    <div class="tl-item" onclick="${r.url !== '#' ? `window.open('${r.url}','_blank')` : ''}">
      <div class="tl-date-col">
        <div class="tl-month">${r.dateLabel}</div>
        <div class="tl-year">${r.yearLabel}</div>
      </div>
      <div class="tl-line"></div>
      <div class="tl-content">
        <div class="tl-title">${r.url !== '#' ? `<a href="${r.url}" target="_blank">${r.title}</a>` : r.title}</div>
        <div class="tl-meta">
          <span class="tl-country-dot" style="background:${countryColors[r.country]}"></span>
          <span class="tl-org">${r.org}</span>
          ${r.tags.map(t => t === 'HOT' ? '<span class="tl-tag hot">HOT</span>' : t === 'NEW' ? '<span class="tl-tag new">NEW</span>' : `<span class="tl-tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

document.querySelectorAll('.tl-filter').forEach(btn => {
  btn.addEventListener('click', () => {
    tlFilter = btn.dataset.tl;
    document.querySelectorAll('.tl-filter').forEach(b => b.classList.toggle('active', b.dataset.tl === tlFilter));
    renderTimeline();
  });
});

// === Reports Archive Section ===
let arSearch = '';
let arSort = 'newest';
let arOrgFilter = 'all';

function renderArchiveStats() {
  const totalReports = allReports.length;
  const last30Days = allReports.filter(r => {
    const d = new Date(r.date);
    const cutoff = new Date('2026-03-09');
    return d >= cutoff;
  }).length;
  const orgs = new Set(allReports.map(r => r.org)).size;
  const geoReports = allReports.filter(r => r.cat.includes('geo')).length;
  const energyReports = allReports.filter(r => r.cat.includes('energy')).length;

  document.getElementById('archiveStats').innerHTML = `
    <div class="ar-stat"><div class="num">${totalReports}</div><div class="label">총 보고서</div></div>
    <div class="ar-stat"><div class="num">${last30Days}</div><div class="label">최근 30일</div></div>
    <div class="ar-stat"><div class="num">${orgs}</div><div class="label">발간 기관</div></div>
    <div class="ar-stat"><div class="num">${geoReports}</div><div class="label">외교·안보</div></div>
    <div class="ar-stat"><div class="num">${energyReports}</div><div class="label">에너지</div></div>
  `;
}

function populateArOrgFilter() {
  const orgs = [...new Set(allReports.map(r => r.org))].sort();
  const select = document.getElementById('arOrgFilter');
  orgs.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o;
    opt.textContent = o;
    select.appendChild(opt);
  });
}

function renderArchive() {
  const grid = document.getElementById('archiveGrid');
  let filtered = allReports.filter(r => {
    if (arOrgFilter !== 'all' && r.org !== arOrgFilter) return false;
    if (arSearch) {
      const q = arSearch.toLowerCase();
      return r.title.toLowerCase().includes(q) || r.org.toLowerCase().includes(q);
    }
    return true;
  });

  if (arSort === 'newest') filtered = filtered.sort((a,b) => b.date.localeCompare(a.date));
  else if (arSort === 'oldest') filtered = filtered.sort((a,b) => a.date.localeCompare(b.date));
  else if (arSort === 'org') filtered = filtered.sort((a,b) => a.org.localeCompare(b.org) || b.date.localeCompare(a.date));

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="tl-empty" style="grid-column:1/-1;">검색 결과가 없습니다.</div>';
    return;
  }

  grid.innerHTML = filtered.map(r => `
    <div class="ar-card" onclick="${r.url !== '#' ? `window.open('${r.url}','_blank')` : ''}">
      <div class="ar-card-top">
        <div class="ar-card-title">${r.url !== '#' ? `<a href="${r.url}" target="_blank" onclick="event.stopPropagation()">${r.title}</a>` : r.title}</div>
        <div class="ar-card-date">${r.dateLabel} ${r.yearLabel.slice(2)}</div>
      </div>
      <div class="ar-card-meta">
        <span class="tl-country-dot" style="background:${countryColors[r.country]}"></span>
        <span class="ar-card-org">${r.org}</span>
        ${r.cat.map(c => `<span class="tl-tag">${c === 'geo' ? '외교·안보' : c === 'energy' ? '에너지' : c === 'culture' ? '문화' : c}</span>`).join('')}
        ${r.tags.map(t => t === 'HOT' ? '<span class="tl-tag hot">HOT</span>' : t === 'NEW' ? '<span class="tl-tag new">NEW</span>' : '').join('')}
      </div>
    </div>
  `).join('');
}

document.getElementById('arSearch').addEventListener('input', e => { arSearch = e.target.value; renderArchive(); });
document.getElementById('arSort').addEventListener('change', e => { arSort = e.target.value; renderArchive(); });
document.getElementById('arOrgFilter').addEventListener('change', e => { arOrgFilter = e.target.value; renderArchive(); });

            <div class="x-handle">${x.handle}</div>
          </div>
        </div>
        <div class="x-card-body">
          <div style="font-size:11px;color:var(--text-dim);line-height:1.5;margin-bottom:8px;">${x.description}</div>
          ${x.samplePosts.map((p, i) => `
            <div class="x-post">
              ${p}
              <div class="x-post-date">최근 게시 · 클릭하여 X에서 보기</div>
            </div>
          `).join('')}
        </div>
        <div class="x-card-footer">
          <a href="${x.url}" target="_blank" class="x-link">
            <svg class="x-icon" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            X에서 보기
          </a>
        </div>
      </div>
    `;
  }).join('');
}

renderCountryPills();
renderCards();
renderTimeline();
populateArOrgFilter();
renderArchiveStats();
renderArchive();
renderXGrid();
</script>
</body>
</html>
