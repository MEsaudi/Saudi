{id:263,p:9,r:"헤드라인",t:"Saudi Energy Facilities, East-West Pipeline Affected by Attacks Recover and Restore Operational Capacity",k:"사우디, 공격 피해 에너지 시설·동서 파이프라인 가동 능력 복구",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-12",m:"Saudi Energy Ministry announced full restoration of East-West pipeline pumping capacity to 7 million bpd and recovery of 300,000 bpd from the Manifa field. Khurais field restoration is ongoing.",mk:"사우디 에너지부는 동서 파이프라인 펌핑 능력을 일 700만 배럴로 완전 복구하고 마니파 유전 생산량 30만 배럴을 회복했다고 발표했다. 쿠라이스 유전 복구는 진행 중이다.",tg:["에너지","파이프라인","복구","아람코"],u:"https://english.aawsat.com/business/5261374-saudi-energy-facilities-east-west-pipeline-affected-attacks-recover-and-restore"},
{id:264,p:8,r:"심층분석",t:"Saudi Arabia Deploys Oil &apos;Central Bank&apos; Capacity to Cushion Hormuz Shock",k:"사우디, 석유 &apos;중앙은행&apos; 역할로 호르무즈 충격 완충",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-12",m:"Saudi Arabia capped oil prices at ~$112 by rerouting exports via Petroline to Yanbu at 7 million bpd. IEA chief credited Saudi&apos;s rapid response with preventing a crisis spiral toward $200 oil.",mk:"사우디는 페트로라인을 통해 일 700만 배럴을 얀부로 우회 수출하여 유가를 ~112달러로 억제했다. IEA 수장은 사우디의 신속 대응이 200달러 유가 위기를 막았다고 평가했다.",tg:["석유","호르무즈","유가","IEA"],u:"https://english.aawsat.com/business/5261417-saudi-arabia-deploys-oil-%E2%80%98central-bank%E2%80%99-capacity-cushion-hormuz-shock"},
{id:265,p:6,r:"",t:"Egypt, Russia Hope to Speed up Construction of El Dabaa Nuclear Plant",k:"이집트·러시아, 엘다바아 원전 건설 가속화 희망",s:"Asharq Al-Awsat",c:"me",d:"2026-04-12",m:"Egypt&apos;s Electricity Minister met a Russian Duma delegation to accelerate the $25 billion El Dabaa nuclear plant (4,800 MW), with the first reactor due in 2028.",mk:"이집트 전력장관이 러시아 두마 대표단을 만나 250억 달러 규모 엘다바아 원전(4,800MW) 건설 가속화를 논의했다. 1호기는 2028년 가동 예정이다.",tg:["이집트","러시아","원전"],u:"https://english.aawsat.com/business/5261105-egypt-russia-hope-speed-construction-el-dabaa-nuclear-plant"},
{id:266,p:9,r:"헤드라인",t:"Saudi Arabia says East-West pipeline restored to full capacity",k:"사우디, 동서 파이프라인 완전 복구 발표",s:"Bloomberg",c:"global",d:"2026-04-12",m:"Bloomberg reported Saudi Arabia restored full East-West pipeline capacity of 7 million bpd, with Manifa field production also recovered, demonstrating crisis management resilience.",mk:"블룸버그는 사우디가 동서 파이프라인 일 700만 배럴 처리능력을 완전 복구하고 마니파 유전도 회복해 위기 관리 역량을 입증했다고 보도했다.",tg:["에너지","복구","블룸버그"],u:"https://www.bloomberg.com/news/articles/2026-04-12/saudi-arabia-says-east-west-pipeline-restored-to-full-capacity"},
{id:267,p:9,r:"헤드라인",t:"Saudi Arabia says East-West pipeline, energy facilities restored to operational capacity",k:"사우디, 동서 파이프라인·에너지 시설 가동 능력 복구 발표",s:"Al Arabiya",c:"gulf",d:"2026-04-12",m:"Al Arabiya reported that Saudi Arabia announced the restoration of full operational capacity at key energy facilities and the East-West pipeline following Iranian attacks.",mk:"알아라비야는 사우디가 이란 공격 이후 주요 에너지 시설과 동서 파이프라인의 완전 가동 능력 복구를 발표했다고 보도했다.",tg:["에너지","복구","알아라비야"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/12/saudi-arabia-says-eastwest-pipeline-energy-facilities-restored-to-operational-capacity-"},
{id:268,p:10,r:"속보",t:"US, Iran fail to reach deal after 21-hour marathon talks in Islamabad",k:"미국·이란, 이슬라마바드 21시간 마라톤 협상 끝 합의 실패",s:"Bloomberg",c:"global",d:"2026-04-12",m:"VP Vance announced no agreement after 21 hours of talks, citing Iran&apos;s refusal to commit to nuclear disarmament. Ceasefire holds until April 22 but future is uncertain.",mk:"밴스 부통령이 21시간 협상 끝에 이란의 핵 포기 약속 거부로 합의 실패를 선언했다. 휴전은 4월 22일까지 유지되나 향후 전망은 불투명하다.",tg:["미국","이란","핵","협상결렬"],u:"https://www.bloomberg.com/news/articles/2026-04-12/us-hasn-t-reached-agreement-with-iran-vance-says"},
{id:269,p:10,r:"속보",t:"Iran war live: Ghalibaf blames US for failure of Pakistan ceasefire talks",k:"이란 전쟁 실시간: 갈리바프 의장, 파키스탄 휴전 협상 실패 미국 탓",s:"Al Jazeera",c:"me",d:"2026-04-12",m:"Iran&apos;s Parliament Speaker Ghalibaf blamed the US for talks failure, insisting any deal must include Lebanon. Ceasefire expires April 22 with no next round scheduled.",mk:"이란 갈리바프 국회의장은 미국을 협상 실패 원인으로 지목하며, 모든 합의에 레바논이 포함되어야 한다고 주장했다. 휴전은 4월 22일 만료되며 차기 협상은 미정이다.",tg:["이란","미국","협상결렬","레바논"],u:"https://www.aljazeera.com/news/liveblog/2026/4/12/iran-war-live-historic-face-to-face-talks-with-us-continue-in-islamabad"},
{id:270,p:9,r:"심층분석",t:"21 hours in Islamabad: How US-Iran talks collapsed and what happens next",k:"이슬라마바드 21시간: 미-이란 협상은 어떻게 결렬됐고, 다음은?",s:"The National",c:"gulf",d:"2026-04-12",m:"The National analyzed how negotiations collapsed over nuclear demands, Hormuz oversight, and Lebanon. Pakistan pledged to continue mediating before the April 22 ceasefire deadline.",mk:"더내셔널은 핵 요구, 호르무즈 감독권, 레바논 문제로 협상이 결렬된 경위를 분석했다. 파키스탄은 4월 22일 휴전 만료 전까지 중재를 계속하겠다고 약속했다.",tg:["분석","협상","호르무즈","핵"],u:"https://www.thenationalnews.com/news/mena/2026/04/12/21-hours-in-islamabad-how-usiran-talks-collapsed-what-happens-next/"},
{id:271,p:8,r:"주요경제",t:"Brent crude oil price set for rebound as US-Iran talks end without a deal",k:"미-이란 협상 결렬로 브렌트유 반등 전망",s:"Reuters",c:"global",d:"2026-04-12",m:"Brent crude ended the week at $94.25, but analysts expect a rebound Monday after failed talks raised fears of ceasefire expiry and renewed Hormuz disruptions.",mk:"브렌트유는 주간 94.25달러로 마감했으나, 협상 결렬로 휴전 만료·호르무즈 재교란 우려가 커져 월요일 반등이 예상된다.",tg:["유가","브렌트","시장"],u:"https://invezz.com/ca/news/2026/04/12/brent-crude-oil-price-set-for-rebound-as-us-iran-talks-end-without-a-deal/"},
{id:272,p:8,r:"",t:"US-Iran ceasefire talks collapse: Vance leaves Islamabad after 21 hours",k:"미-이란 휴전 협상 결렬: 밴스, 21시간 만에 이슬라마바드 떠나",s:"Gulf News",c:"gulf",d:"2026-04-12",m:"Gulf News reported VP Vance declared no nuclear deal reached, with Iran refusing to abandon its weapons program. Pakistani FM Dar urged both sides to respect ceasefire until April 22.",mk:"걸프뉴스는 밴스 부통령이 이란의 핵무기 포기 거부로 합의 실패를 선언했으며, 파키스탄 다르 외무장관이 4월 22일까지 휴전 준수를 촉구했다고 보도했다.",tg:["협상결렬","파키스탄","핵"],u:"https://gulfnews.com/world/asia/pakistan/us-iran-ceasefire-vance-says-no-agreement-with-iran-after-historic-peace-talks-in-pakistan-1.500503998"},
{id:273,p:7,r:"",t:"Israel rejects ceasefire with Hezbollah before Lebanon talks next week",k:"이스라엘, 다음 주 레바논 회담 전 헤즈볼라 휴전 거부",s:"Al Jazeera",c:"me",d:"2026-04-11",m:"Israel said it will not discuss ceasefire when it meets Lebanese officials at the State Department next Tuesday, focusing instead on Hezbollah disarmament.",mk:"이스라엘은 다음 주 화요일 국무부에서 레바논 관리들과 만날 때 휴전이 아닌 헤즈볼라 무장 해제를 논의하겠다고 밝혔다.",tg:["이스라엘","레바논","헤즈볼라"],u:"https://www.aljazeera.com/news/2026/4/11/israel-rejects-ceasefire-with-hezbollah-ahead-of-lebanon-talks-next-week"},
{id:274,p:7,r:"",t:"Saudi Arabia restores East-West pipeline capacity after attacks",k:"사우디, 공격 후 동서 파이프라인 처리능력 복구",s:"The National",c:"gulf",d:"2026-04-12",m:"The National reported Saudi Arabia restored its key East-West pipeline to full 7 million bpd capacity, along with Manifa field recovery, reinforcing its role as a reliable energy supplier.",mk:"더내셔널은 사우디가 핵심 동서 파이프라인을 일 700만 배럴로 완전 복구하고 마니파 유전도 회복해 신뢰할 수 있는 에너지 공급자 역할을 강화했다고 보도했다.",tg:["에너지","복구","파이프라인"],u:"https://www.thenationalnews.com/business/energy/2026/04/12/saudi-arabia-restores-east-west-pipeline-capacity/"},
{id:275,p:7,r:"",t:"Saudi Arabia restores key oil facilities, stabilises global supply",k:"사우디, 주요 석유 시설 복구…글로벌 공급 안정화",s:"Gulf News",c:"gulf",d:"2026-04-12",m:"Gulf News reported Saudi Aramco&apos;s operational resilience restored key facilities, maintaining 85% of pre-crisis exports and preventing oil from surging toward $200.",mk:"걸프뉴스는 사우디 아람코의 운영 회복력으로 위기 전 수출의 85%를 유지하고 유가 200달러 급등을 막았다고 보도했다.",tg:["아람코","석유","공급"],u:"https://gulfnews.com/business/energy/saudi-arabia-restores-key-oil-facilities-after-attacks-stabilises-global-supply-1.500504143"},
{id:276,p:9,r:"속보",t:"[Korean view] US-Iran 21-hour talks collapse: Industry braces for prolonged high oil prices and logistics disruption",k:"[한국 시각] 미·이란 21시간 협상 결렬…산업계, 고유가·물류대란 장기전 돌입",s:"파이낸셜뉴스",c:"korean",d:"2026-04-12",m:"Financial News reported the collapse of US-Iran talks threatens Korean industries with prolonged high oil prices and logistics disruption, with 26 Korean ships and 173 crew stranded near Hormuz.",mk:"파이낸셜뉴스는 미-이란 협상 결렬로 한국 산업이 고유가·물류대란 장기전에 직면하며, 한국 선박 26척·선원 173명이 호르무즈 인근에 발이 묶여 있다고 보도했다.",tg:["협상결렬","산업","물류","선박"],u:"https://www.fnnews.com/news/202604121538345561"},
{id:277,p:8,r:"",t:"[Korean view] Iran says &apos;no more talks&apos;: Diplomacy continues but Hormuz variable remains",k:"[한국 시각] 이란 &apos;추가 협상 없다&apos;…외교는 유지, 호르무즈 변수 여전",s:"파이낸셜뉴스",c:"korean",d:"2026-04-12",m:"Iran declared no further negotiations, while diplomatic channels remain open. The Hormuz situation remains the key variable with ceasefire expiring April 22.",mk:"이란이 추가 협상을 거부한 가운데 외교 채널은 유지되나, 4월 22일 휴전 만료를 앞두고 호르무즈 상황이 핵심 변수로 남아 있다.",tg:["이란","호르무즈","휴전"],u:"https://www.fnnews.com/news/202604121413541055"},
{id:278,p:8,r:"",t:"[Korean view] US-Iran 21-hour talks end in failure: Hormuz reopening and ceasefire in limbo",k:"[한국 시각] 미·이란 21시간 협상 끝내 결렬…호르무즈 재개방·휴전 안갯속",s:"뉴스핌",c:"korean",d:"2026-04-12",m:"Newspim reported that after 21 hours of continuous negotiations, the US-Iran talks collapsed over nuclear and Hormuz issues, leaving both the strait reopening and ceasefire maintenance uncertain.",mk:"뉴스핌은 21시간 연속 협상 끝에 핵·호르무즈 문제로 미-이란 협상이 결렬되어 해협 재개방과 휴전 유지 모두 불투명해졌다고 보도했다.",tg:["협상결렬","핵","호르무즈"],u:"https://www.newspim.com/news/view/20260412000068"},
{id:279,p:7,r:"",t:"[Korean view] KOSPI eyes foreign investors return amid Middle East and Warren nomination focus",k:"[한국 시각] 코스피, 외국인 복귀 속 중동·워시 인준 초점",s:"머니투데이",c:"korean",d:"2026-04-12",m:"Money Today reported that KOSPI gained 8.96% over the week on ceasefire hopes, with foreign investor flows returning, but the failed Islamabad talks cast uncertainty over the Monday open.",mk:"머니투데이는 코스피가 휴전 기대에 주간 8.96% 상승하고 외국인이 복귀했으나, 이슬라마바드 협상 실패로 월요일 개장 불확실성이 높아졌다고 보도했다.",tg:["코스피","외국인","증시"],u:"https://www.mt.co.kr/stock/2026/04/12/2026041213043147343"}

,
{id:280,p:10,r:"헤드라인",t:"Trump Announces Naval Blockade on Strait of Hormuz After US-Iran Talks Collapse",k:"트럼프, 미-이란 협상 결렬 후 호르무즈 해협 해군 봉쇄 전격 선언",s:"Bloomberg",c:"me",d:"2026-04-12",m:"President Trump announced a naval blockade on the Strait of Hormuz after 21-hour peace talks with Iran in Islamabad ended without a deal. The US Navy will prevent ships from entering or exiting the Strait and intercept vessels that paid tolls to Iran.",mk:"트럼프 대통령이 미-이란 이슬라마바드 협상이 21시간 만에 결렬된 후 호르무즈 해협에 대한 해군 봉쇄를 선언했다. 미 해군이 해협 통과 선박을 차단하고 이란에 통행료를 납부한 선박을 압류할 것이라고 밝혔다.",tg:["호르무즈봉쇄","트럼프","이란협상","원유"],u:"https://www.bloomberg.com/news/articles/2026-04-12/trump-says-us-will-begin-blockade-of-ships-to-and-from-hormuz"},
{id:281,p:9,r:"속보",t:"Trump says US will blockade Strait of Hormuz after Iran peace talks fail",k:"미-이란 평화협상 실패 후 트럼프, 호르무즈 봉쇄 발표",s:"CNBC",c:"global",d:"2026-04-12",m:"President Trump declared a naval blockade of the Strait of Hormuz following the failure of US-Iran peace talks in Islamabad. The announcement is expected to further escalate global energy market disruptions.",mk:"이슬라마바드 미-이란 평화협상 실패 후 트럼프 대통령이 호르무즈 해협 해군 봉쇄를 선언했다. 글로벌 에너지 시장 혼란이 더욱 가중될 전망이다.",tg:["트럼프","호르무즈","봉쇄","에너지"],u:"https://www.cnbc.com/2026/04/12/trump-iran-war-strait-of-hormuz.html"},
{id:282,p:9,r:"속보",t:"Trump Announces Naval Blockade on Strait of Hormuz After Iran Talks Collapse",k:"이란 협상 결렬에 트럼프, 호르무즈 해협 해군 봉쇄 발표",s:"Axios",c:"global",d:"2026-04-12",m:"President Trump announced a naval blockade of the Strait of Hormuz hours after JD Vance left Islamabad without a deal. The blockade will intercept ships that have paid tolls to Iran.",mk:"JD 밴스 부통령이 합의 없이 이슬라마바드를 떠난 지 수 시간 후 트럼프 대통령이 호르무즈 해협 해군 봉쇄를 발표했다. 이란에 통행료를 납부한 선박을 차단할 것이라고 밝혔다.",tg:["트럼프","호르무즈","밴스","이란전쟁"],u:"https://www.axios.com/2026/04/12/trump-naval-blockade-iran-strait-hormuz-peace-talks"},
{id:283,p:6,r:"",t:"Ronaldo scores 24th league goal as Al-Nassr extend SPL lead with record 14-match winning streak",k:"호날두 24번째 리그골…알나스르, SPL 역대 최다 14연승 신기록",s:"Arab News",c:"saudi",d:"2026-04-12",m:"Cristiano Ronaldo scored his 24th league goal as Al-Nassr beat Al-Okhdood 2-0, extending their record-breaking 14-match winning streak and maintaining a five-point lead at the top of the Saudi Pro League.",mk:"호날두가 시즌 24번째 리그골을 터뜨리며 알나스르가 알옥두드를 2-0으로 꺾었다. 이로써 알나스르는 SPL 역대 최다인 14연승 신기록을 달성하며 선두 5점 차를 유지했다.",tg:["알나스르","호날두","SPL","14연승"],u:"https://www.arabnews.pk/node/2639580/sport"},
{id:284,p:6,r:"",t:"Al-Nassr Break Club Record with 14th Consecutive League Victory",k:"알나스르, 14연승으로 클럽 역대 최다 연승 신기록 경신",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-12",m:"Al-Nassr secured their 14th consecutive Saudi Pro League win, breaking the club record from the 2013-14 season. Cristiano Ronaldo and Joao Felix scored in a 2-0 victory over Al-Okhdood.",mk:"알나스르가 14번째 연속 SPL 승리를 거두며 2013-14시즌에 세운 클럽 최다 연승 기록을 경신했다. 호날두와 주앙 펠릭스가 알옥두드와의 2-0 승리를 이끌었다.",tg:["알나스르","SPL","14연승","클럽신기록"],u:"https://english.aawsat.com/sports/5261363-al-nassr-break-club-record-14th-consecutive-league-victory"},
{id:285,p:6,r:"",t:"Ronaldo fires Al Nassr past Al Okhdood to go five points clear in Saudi Pro League",k:"호날두, 알나스르 알옥두드전 2-0 승리 이끌며 SPL 선두 5점 차 유지",s:"The National",c:"gulf",d:"2026-04-12",m:"Cristiano Ronaldo scored in the 15th minute and Joao Felix doubled the lead as Al Nassr beat Al Okhdood 2-0 in the Saudi Pro League, going five points clear with six games remaining.",mk:"호날두가 15분에 선제골을 넣고 주앙 펠릭스가 추가골을 넣어 알나스르가 알옥두드를 2-0으로 격파했다. SPL 잔여 6경기를 앞두고 선두 5점 차를 유지했다.",tg:["호날두","알나스르","SPL","주앙펠릭스"],u:"https://www.thenationalnews.com/sport/football/2026/04/12/another-step-forward-cristiano-ronaldo-fires-al-nassr-past-al-okhdood-and-five-points-clear/"},
{id:286,p:7,r:"심층분석",t:"AFC Champions League Elite 2026: UAE hopefuls, Iran war impact and Ronaldo absence",k:"AFC 챔피언스리그 엘리트 2026: UAE 전망·이란전쟁 영향·호날두 결장 가능성 분석",s:"The National",c:"gulf",d:"2026-04-12",m:"The National examines the AFC Champions League Elite 2026 with UAE clubs as contenders, the disruption caused by the Iran war on travel and logistics, and questions about Cristiano Ronaldo&apos;s availability for Al-Nassr.",mk:"내셔널지가 AFC 챔피언스리그 엘리트 2026에서 UAE 클럽들의 전망, 이란전쟁으로 인한 이동·물류 차질, 알나스르의 호날두 출전 가능 여부 등을 심층 분석했다.",tg:["AFC챔피언스리그","UAE","이란전쟁","알나스르"],u:"https://www.thenationalnews.com/sport/football/2026/04/12/afc-champions-league-elite-uae-hopefuls-iran-war-impact-and-where-is-cristiano-ronaldo/"},
{id:287,p:7,r:"심층분석",t:"[Korean view] Industry braces for prolonged oil and logistics crisis after US-Iran talks collapse",k:"[한국 시각] 미-이란 협상 결렬에 산업계 고유가·물류대란 &apos;장기전&apos; 돌입",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-12",m:"South Korean industries are bracing for a prolonged high oil and logistics crisis after US-Iran talks in Islamabad ended without a deal, raising fears of an extended Strait of Hormuz blockade.",mk:"파키스탄 이슬라마바드 미-이란 협상이 결렬되면서 한국 산업계가 고유가와 물류대란 장기화에 대비하는 모드에 돌입했다. 호르무즈 봉쇄 장기화 우려가 가중되고 있다.",tg:["산업계","물류대란","고유가","호르무즈장기화"],u:"https://www.fnnews.com/news/202604121538345561"},
{id:288,p:7,r:"정책발표",t:"[Korean view] Industry minister: No strategic oil reserve release needed; April-May supply secured",k:"[한국 시각] 산업부 장관 &quot;비축유 방출 없이 4~5월 넘긴다&quot;…4월 5000만·5월 6000만 배럴 확보",s:"뉴스핌",c:"korean-view",d:"2026-04-12",m:"South Korea&apos;s Industry Minister confirmed the country can manage oil supply for April and May without releasing strategic reserves, with 50 million barrels secured for April and 60 million for May from alternative suppliers.",mk:"한국 산업통상자원부 장관은 대체 공급처에서 4월 5천만 배럴, 5월 6천만 배럴을 확보해 전략 비축유 방출 없이 4~5월을 넘길 수 있다고 확인했다.",tg:["산업부","비축유","원유확보","에너지안보"],u:"https://www.newspim.com/news/view/20260412000110"},
{id:289,p:7,r:"주요경제",t:"[Korean view] South Korea secures crude from 17 alternative suppliers; 50M barrels for April amid Hormuz crisis",k:"[한국 시각] 호르무즈 봉쇄에 17개국 대체원유 확보…4월 5000만·5월 6000만 배럴",s:"헤럴드경제",c:"korean-view",d:"2026-04-12",m:"South Korea has secured 50 million barrels of crude for April and 60 million for May from 17 alternative countries as it works to reduce dependence on Middle East oil amid the ongoing Hormuz crisis.",mk:"한국이 호르무즈 위기 속 중동 원유 의존도를 줄이기 위해 17개 대체 국가에서 4월 5천만 배럴, 5월 6천만 배럴의 원유를 확보했다.",tg:["대체원유","원유다변화","호르무즈","에너지안보"],u:"https://biz.heraldcorp.com/article/10711646"},
{id:290,p:7,r:"심층분석",t:"[Korean view] US-Iran talks hinged on four issues: nuclear, Hormuz, frozen assets, Lebanon",k:"[한국 시각] 美·이란 협상, &apos;핵·호르무즈·동결자산·레바논&apos; 4대 쟁점이 발목",s:"뉴스핌",c:"korean-view",d:"2026-04-12",m:"Analysis of why US-Iran talks collapsed: four unresolved issues including Iran&apos;s nuclear program, Hormuz access, frozen Iranian assets, and Lebanon ceasefire blocked any agreement.",mk:"미-이란 평화협상 결렬 원인 분석: 이란 핵 프로그램, 호르무즈 해협 통행권, 이란 동결 자산, 레바논 휴전 등 4대 쟁점이 합의를 막았다.",tg:["미이란협상","핵협상","호르무즈","레바논"],u:"https://www.newspim.com/news/view/20260412000095"}
,
  {id:291,p:9,r:"정책발표",t:"Saudi Arabia summons Iraqi ambassador over drone attacks launched from Iraqi territory",k:"사우디, 이라크 대사 소환…이라크 영토서 발사된 드론 공격 항의",s:"Saudi Gazette",c:"saudi",d:"2026-04-12",m:"Saudi Arabia&apos;s Ministry of Foreign Affairs summoned the Iraqi Ambassador to hand over a formal protest note over continued drone attacks targeting the Kingdom from Iraqi territory, urging Iraq to deal responsibly with the threats.",mk:"사우디아라비아 외무부가 이라크 영토에서 발사된 드론 공격에 항의해 이라크 대사를 소환하고 공식 항의서한을 전달했다. 이라크가 이러한 위협에 책임감 있게 대처할 것을 촉구했다.",tg:["외교","안보","이라크","드론"],u:"https://saudigazette.com.sa/article/660484/saudi-arabia/saudi-arabia-summons-iraqi-ambassador-over-drone-attacks-from-iraqi-territory"},
  {id:292,p:9,r:"정책발표",t:"PIF to unveil new 2026-2030 strategy within weeks as Saudi economy stays resilient: Al-Rumayyan",k:"PIF 총재, 수주 내 2026-2030 신전략 발표 예정…사우디 경제 회복력 강조",s:"Saudi Gazette",c:"saudi",d:"2026-04-12",m:"PIF Governor Yasir Al-Rumayyan said the fund will reveal its new five-year strategy within weeks, focusing on six ecosystems including tourism, clean energy and NEOM, while crowding in private sector participation globally.",mk:"PIF 총재 야시르 알-루마이얀이 수주 내 2026-2030년 신전략을 발표할 예정이라고 밝혔다. 여행·관광, 도시개발, 청정에너지, NEOM 등 6대 생태계를 중심으로 민간 참여를 확대하는 방향이다.",tg:["PIF","비전2030","투자","경제다각화"],u:"https://saudigazette.com.sa/article/660028/saudi-arabia/pif-to-unveil-new-strategy-within-weeks-as-saudi-economy-remains-resilient-al-rumayyan-says"},
  {id:293,p:10,r:"헤드라인",t:"Energy facilities and East-West pipeline restored at full operational capacity: Saudi energy ministry",k:"사우디 에너지부, 동서 파이프라인 및 모든 에너지 시설 완전 복구 공식 선언",s:"Arab News",c:"saudi",d:"2026-04-12",m:"Saudi Arabia&apos;s Ministry of Energy officially declared full restoration of the East-West pipeline to 7 million bpd capacity and all affected energy facilities following attacks, achieved during the ceasefire window.",mk:"사우디 에너지부가 이란 공격으로 손상된 동서 파이프라인(일 700만 배럴 용량)과 모든 에너지 시설이 완전히 복구됐다고 공식 발표했다. 휴전 기간을 활용한 신속한 복구 성과다.",tg:["아람코","동서파이프라인","에너지","복구"],u:"https://www.arabnews.com/node/2639627/saudi-arabia"},
  {id:294,p:8,r:"주요경제",t:"Saudi Arabia succeeded in redirecting its oil exports, helping stabilize global market: IMF",k:"IMF, 사우디 원유 수출 경로 전환 성공…글로벌 시장 안정에 기여",s:"Arab News",c:"saudi",d:"2026-04-12",m:"IMF Director Kristalina Georgieva affirmed Saudi Arabia successfully redirected oil exports through the East-West pipeline bypass to the Red Sea, helping stabilize global markets while warning of higher inflation and slower growth from the Iran war.",mk:"IMF 총재 게오르기에바가 사우디아라비아가 동서 파이프라인을 통해 원유 수출 경로를 성공적으로 전환했다고 평가했다. 이란전쟁이 인플레와 성장 둔화를 초래할 것이라고도 경고했다.",tg:["IMF","원유수출","글로벌시장","경제"],u:"https://www.arabnews.com/node/2639020/business-economy"},
  {id:295,p:9,r:"속보",t:"Trump orders full US naval blockade of Strait of Hormuz after Iran peace talks collapse",k:"트럼프, 미-이란 협상 결렬 후 호르무즈 해협 전면 봉쇄 명령",s:"Al Jazeera",c:"me",d:"2026-04-12",m:"Trump announced an immediate US naval blockade of the Strait of Hormuz after 21-hour peace talks in Islamabad collapsed, with Iran refusing to give up its nuclear program. Oil prices jumped 7% on the announcement.",mk:"이슬라마바드에서 열린 21시간 협상이 핵 문제로 결렬된 후 트럼프 대통령이 호르무즈 해협에 대한 미 해군 전면 봉쇄를 명령했다. 봉쇄 선언 직후 유가가 7% 급등했다.",tg:["호르무즈","이란","트럼프","봉쇄","유가"],u:"https://www.aljazeera.com/news/2026/4/12/trump-announces-strait-of-hormuz-blockade-after-us-iran-peace-talks-end"},
  {id:296,p:9,r:"헤드라인",t:"Pakistan Air Force deploys JF-17 jets and 13,000 troops to Saudi Arabia under mutual defence pact",k:"파키스탄 공군, JF-17 전투기·1만3000명 사우디 배치…상호방위협정 발동",s:"The National",c:"gulf",d:"2026-04-12",m:"Pakistan Air Force deployed JF-17 Thunder Block III fighters and around 13,000 troops to King Abdulaziz Air Base in Dhahran under the Saudi-Pakistan mutual defence pact, marking Islamabad&apos;s first active combat role in the Gulf.",mk:"파키스탄 공군이 JF-17 선더 블록III 전투기와 1만3000명의 병력을 사우디 다란 압둘아지즈 국왕 공군기지에 배치했다. 파키스탄이 걸프 지역에서 처음으로 전투 역할을 맡은 것이다.",tg:["파키스탄","방위협정","군사","공군","안보"],u:"https://www.thenationalnews.com/news/gulf/2026/04/11/pakistan-sends-fighter-jets-to-saudi-arabia-as-part-of-defence-agreement/"},
  {id:297,p:8,r:"주요경제",t:"Brent crude jumps 6-7% to near $96 after Trump orders Hormuz naval blockade",k:"트럼프 호르무즈 봉쇄 명령에 브렌트유 6-7% 급등…배럴당 96달러",s:"Reuters",c:"global",d:"2026-04-12",m:"WTI and Brent crude jumped about 7% and 6% respectively after Trump announced a US naval blockade of the Strait of Hormuz following the collapse of US-Iran peace talks, with Brent closing the week near $96 per barrel.",mk:"트럼프의 호르무즈 봉쇄 명령 발표 후 WTI와 브렌트유가 각각 약 7%, 6% 급등했다. 브렌트유는 주간 마감 기준 배럴당 약 96달러를 기록했다.",tg:["유가","원유","브렌트","WTI","에너지시장"],u:"https://www.investing.com/news/commodities-news/trump-says-it-will-take-a-little-while-for-us-to-blockade-the-strait-of-hormuz-4609096"},
  {id:298,p:7,r:"심층분석",t:"Saudi Arabia&apos;s 894 intercepts masks a stockpile running critically dry",k:"사우디 894회 요격 이면에 심각한 PAC-3 재고 고갈 위기",s:"Arab News",c:"saudi",d:"2026-04-13",m:"Analysis reveals Saudi Arabia has expended approximately 86% of its pre-war PAC-3 MSE interceptor stockpile after 894 aerial threat intercepts since March 3, with only about 400 rounds remaining from an original 2,800. Urgent US resupply is critical.",mk:"분석에 따르면 사우디는 3월 3일 이후 894회 요격으로 전쟁 전 보유한 PAC-3 MSE 미사일의 약 86%를 소모했다. 원래 2,800발 중 약 400발만 남아 미국의 긴급 재보급이 절실한 상황이다.",tg:["방공","PAC-3","군사","안보","미사일"],u:"https://houseofsaud.com/saudi-air-defense-intercept-count-2026/"},
  {id:299,p:8,r:"주요경제",t:"South Korean government secures 110 million barrels of crude from 17 countries amid Hormuz crisis",k:"한국 정부, 호르무즈 위기에 17개국서 원유 1억1000만 배럴 확보",s:"S&P Global",c:"global",d:"2026-04-12",m:"South Korea secured 110 million barrels of alternative crude supply from 17 countries for April-May, with 50 million barrels for April and 60 million for May shipped via non-Hormuz routes amid ongoing Strait disruptions.",mk:"한국 정부가 호르무즈 차질에 대응해 17개국에서 4월 5000만 배럴, 5월 6000만 배럴 등 총 1억1000만 배럴의 대체 원유를 확보했다. 호르무즈를 경유하지 않는 경로를 통해 조달된다.",tg:["한국","원유확보","에너지안보","호르무즈"],u:"https://www.spglobal.com/energy/en/news-research/latest-news/refined-products/040826-south-korean-govt-secures-110-mil-barrels-of-crude-for-april-may-amid-hormuz-disruptions"},
  {id:300,p:8,r:"속보",t:"[Korean view] Trump declares Hormuz blockade effective immediately as US-Iran talks end",k:"[한국시각] 트럼프 &quot;호르무즈 봉쇄 즉각 발효&quot;…미-이란 평화협상 결렬",s:"머니투데이",c:"korean-view",d:"2026-04-12",m:"[Korean view] Trump declared the US Navy will blockade the Strait of Hormuz effective immediately after 21-hour peace talks with Iran collapsed in Islamabad. South Korea with 70% oil import dependence on the Middle East faces severe supply shock risk.",mk:"트럼프 대통령이 이슬라마바드 21시간 협상 결렬 후 호르무즈 해협 봉쇄를 즉각 발효한다고 선언했다. 중동 원유 의존도 70%인 한국 에너지 업계는 심각한 공급 충격을 우려하고 있다.",tg:["트럼프","호르무즈","한국","에너지위기"],u:"https://www.mt.co.kr/world/2026/04/12/2026041222121060172"},
  {id:301,p:7,r:"주요경제",t:"[Korean view] Three non-Iranian tankers pass Hormuz despite ceasefire collapse; Seoul eyes supply window",k:"[한국시각] 협상 결렬에도 비이란산 유조선 3척 호르무즈 통과…한국 공급 창구 주목",s:"머니투데이",c:"korean-view",d:"2026-04-12",m:"[Korean view] Three large crude tankers carrying non-Iranian Saudi and Iraqi crude passed through the Strait of Hormuz despite the ceasefire collapse. South Korea closely monitors supply windows amid disrupted Middle East energy flows.",mk:"휴전 결렬에도 불구하고 사우디·이라크산 원유를 실은 비이란산 유조선 3척이 호르무즈 해협을 통과했다. 한국은 중동 에너지 공급 차질 속에서 공급 창구 가능성에 주목하고 있다.",tg:["호르무즈","유조선","원유","한국"],u:"https://www.mt.co.kr/world/2026/04/12/2026041216030224188"},
  {id:302,p:8,r:"정책발표",t:"[Korean view] Industry minister: South Korea can weather April-May supply crunch without strategic reserves",k:"[한국시각] 산업부 장관 &quot;전략비축유 방출 없이 4-5월 공급 위기 넘길 것&quot;",s:"뉴스핌",c:"korean-view",d:"2026-04-12",m:"[Korean view] South Korea&apos;s industry minister said the country can manage April-May crude supply disruptions without releasing strategic petroleum reserves, citing secured GCC priority allocations and alternative supply deals from 17 nations.",mk:"한국 산업통상자원부 장관이 GCC의 우선 배정 물량과 17개국 대체 공급 계약을 근거로 전략비축유 방출 없이 4-5월 공급 차질을 극복할 수 있다고 밝혔다.",tg:["에너지","비축유","산업부","공급안정","GCC"],u:"https://www.newspim.com/news/view/20260412000110"},
  {id:303,p:7,r:"심층분석",t:"[Korean view] GCC 6 nations pledge priority crude supply to South Korea amid Hormuz crisis",k:"[한국시각] GCC 6개국, 호르무즈 위기 속 한국에 원유 최우선 공급 약속",s:"한국경제",c:"korean-view",d:"2026-04-13",m:"[Korean view] Saudi Arabia, UAE, Qatar, Kuwait, Oman and Bahrain pledged to prioritize crude supply to South Korea amid Hormuz disruptions, responding to Seoul&apos;s presidential special envoy mission to GCC countries.",mk:"사우디아라비아, UAE, 카타르, 쿠웨이트, 오만, 바레인 등 GCC 6개국이 한국의 대통령 특사 파견에 화답해 호르무즈 차질 속 원유를 최우선 공급하겠다고 약속했다.",tg:["GCC","한국","에너지외교","원유","사우디"],u:"https://www.huffingtonpost.kr/article/256397"},
  {id:304,p:9,r:"헤드라인",t:"21 hours in Islamabad: How US-Iran peace talks collapsed and what comes next for Hormuz",k:"이슬라마바드 21시간 협상의 전말…미-이란 결렬 후 호르무즈 향방은",s:"The National",c:"me",d:"2026-04-12",m:"A detailed account of how US-Iran peace talks in Islamabad collapsed after 21 grueling hours, with gaps over nuclear demands, Hormuz transit tolls, and sanctions proving unbridgeable. Iran declared it would not return to negotiations.",mk:"이슬라마바드 21시간 협상이 핵 프로그램, 호르무즈 통행료, 제재 해제 문제에서 간극을 좁히지 못하고 결렬된 전말을 상세히 분석했다. 이란은 협상 테이블에 다시 돌아오지 않겠다고 선언했다.",tg:["미국","이란","협상","휴전","호르무즈"],u:"https://www.thenationalnews.com/news/us/2026/04/12/us-to-blockade-strait-of-hormuz-trump-says/"},
  {id:305,p:7,r:"주요경제",t:"Saudi Aramco continues Khurais oil field restoration as Manifa output fully recovered at 300,000 bpd",k:"사우디 아람코, 마니파 30만 bpd 완전 복구…쿠라이스 현장 복구 진행 중",s:"Arab News",c:"saudi",d:"2026-04-13",m:"Saudi Aramco has restored full production at the Manifa offshore oilfield at 300,000 bpd while continuing restoration work at the Khurais onshore field. Energy officials said the Khurais restoration timeline will be announced separately.",mk:"사우디 아람코가 마니파 해상 유전 생산을 일 30만 배럴로 완전 복구했으며 쿠라이스 육상 유전 복구 작업이 계속 진행 중이다. 에너지 당국은 쿠라이스 복구 일정을 별도 발표할 예정이라고 밝혔다.",tg:["아람코","쿠라이스","마니파","원유생산","에너지"],u:"https://www.arabnews.com/node/2639627/saudi-arabia"}
,
  {id:306,p:9,r:"속보",t:"Oil Jumps 8% to Above $103 as US Navy Prepares Hormuz Blockade Enforcement",k:"호르무즈 봉쇄 집행 앞두고 브렌트유 8% 급등…103달러 돌파",s:"Reuters",c:"global",d:"2026-04-13",m:"Brent crude futures jumped 8% to above $103 a barrel on Monday as the US Navy prepared to enforce a Strait of Hormuz blockade after US-Iran peace talks collapsed, recouping losses from the prior week after ceasefire hopes had briefly pushed prices down.",mk:"미-이란 평화협상 결렬 후 미 해군의 호르무즈 봉쇄 집행을 앞두고 브렌트유가 월요일 8% 급등해 103달러를 돌파했다. 일시적 휴전 기대로 하락했던 가격을 되돌렸다.",tg:["원유가격","브렌트유","호르무즈","봉쇄"],u:"https://za.investing.com/news/commodities-news/oil-bounces-back-above-100-after-us-iran-talks-end-in-stalemate-4207528"},
  {id:307,p:8,r:"주요경제",t:"PIF Kills The Line, Bets $23 Billion on Humain AI in Revised 2026-2030 Strategy",k:"PIF, 더 라인 사실상 폐기…2030 전략 수정으로 23조원 규모 Humain AI에 집중 투자",s:"Saudi Gazette",c:"saudi",d:"2026-04-12",m:"Saudi Arabia&apos;s Public Investment Fund unveiled a revised 2026-2030 strategy that effectively shelves The Line megaproject while pivoting to invest $23 billion in the Humain AI platform and prioritizing Expo 2030 and the 2034 FIFA World Cup as the Kingdom&apos;s most protected investment channels.",mk:"사우디 공공투자펀드(PIF)가 수정된 2026-2030 전략을 공개, 더 라인 프로젝트를 사실상 폐기하면서 230억 달러를 Humain AI 플랫폼에 투자하기로 했다. 2030 엑스포와 2034 FIFA 월드컵이 최우선 투자 대상으로 지정됐다.",tg:["PIF","AI","투자","비전2030"],u:"https://houseofsaud.com/pif-2026-2030-strategy/"},
  {id:308,p:8,r:"심층분석",t:"Saudi Arabia 894 Air Defense Intercepts Mask a Stockpile Running Dry, Analysis Shows",k:"사우디 방공망 894회 요격 뒤에 숨겨진 진실…미사일 비축량 고갈 경보",s:"Arab News",c:"saudi",d:"2026-04-13",m:"An analysis of Saudi Arabia&apos;s 894 documented air defense intercepts between March 3 and April 7 shows the Kingdom&apos;s missile stockpiles are being depleted at an alarming rate, averaging 25.5 intercepts per day and exceeding the total intercepts recorded across the entire Yemen war campaign.",mk:"3월 3일부터 4월 7일 사이 사우디 방공망의 894회 요격 기록을 분석한 결과, 왕국의 미사일 비축량이 경보 수준으로 고갈되고 있는 것으로 나타났다. 일평균 25.5회의 요격은 예멘 전쟁 10년치를 이미 초과했다.",tg:["방공","미사일","요격","안보"],u:"https://houseofsaud.com/saudi-air-defense-intercept-count-2026/"},
  {id:309,p:7,r:"심층분석",t:"AlUla Shortlisted for City of Film at 2026 Global Production Awards",k:"사우디 알울라, 2026 글로벌 프로덕션 어워즈 '영화 도시' 부문 후보 선정",s:"Arab News",c:"saudi",d:"2026-04-12",m:"AlUla, Saudi Arabia&apos;s ancient city known for its dramatic desert landscapes and rock-carved tombs, has been shortlisted in the &apos;City of Film&apos; category at the 2026 Global Production Awards, signaling growing international recognition of the Kingdom&apos;s creative sector.",mk:"사우디아라비아의 고대 도시 알울라가 극적인 사막 경관과 암석 조각 묘지로 유명한 가운데 2026 글로벌 프로덕션 어워즈의 &apos;영화 도시&apos; 부문 최종 후보에 올랐다. 왕국 창조 산업의 국제적 인정이 높아지고 있음을 보여준다.",tg:["알울라","관광","문화","비전2030"],u:"https://www.arabnews.com/node/2639283/saudi-arabia"},
  {id:310,p:9,r:"헤드라인",t:"패트리엇 대신 천궁Ⅱ…공습 맞은 걸프국들, K-방공에 눈돌리다",k:"걸프국, 패트리엇 비축량 소진에 K-방공 체계 긴급 수요 급증…천궁2 탈미 방공망 재편 핵심 후보",s:"뉴스핌",c:"korean-view",d:"2026-04-13",m:"Gulf states have turned to South Korea&apos;s air defense systems as an alternative to US Patriot missiles, with Saudi Arabia requesting early delivery of Cheongung-2 and UAE seeking additional interceptors from Korean firms Hanwha and LIG Nex1, amid critical stockpile depletion across the region.",mk:"걸프국들이 미국 패트리엇 요격미사일 비축량 소진에 따라 한국의 방공 체계를 대안으로 눈을 돌리고 있다. 사우디는 천궁Ⅱ 조기 인도를 요청하고 UAE는 한화·LIG넥스원에 추가 요격미사일을 요청하는 등 비미국계 방공망 재편이 본격화되고 있다.",tg:["천궁2","K방산","걸프","방공"],u:"https://www.newspim.com/news/view/20260413000485"},
  {id:311,p:7,r:"주요경제",t:"Goldman Sachs: Another Month of Hormuz Closure Means Brent Over $100 Throughout 2026",k:"골드만삭스, 호르무즈 1개월 추가 봉쇄 시 2026년 내내 브렌트유 100달러 이상 전망",s:"OilPrice.com",c:"global",d:"2026-04-13",m:"Goldman Sachs warned that if the Strait of Hormuz remains closed for another month, Brent crude oil prices will remain above $100 throughout 2026, with the bank forecasting peak prices of $115 per barrel in Q2 2026 as production shut-ins continue.",mk:"골드만삭스는 호르무즈 해협이 한 달 더 봉쇄될 경우 브렌트유가 2026년 내내 100달러를 웃돌 것이라고 경고했다. 은행은 생산 중단이 지속되면서 2026년 2분기 최고 115달러까지 치솟을 것으로 예측했다.",tg:["원유전망","브렌트유","골드만삭스","호르무즈"],u:"https://oilprice.com/Latest-Energy-News/World-News/Goldman-Another-Month-of-Hormuz-Closure-Means-Over-100-Brent-Throughout-2026.html"},
  {id:312,p:7,r:"심층분석",t:"Saudi Arabia PAC-3 Contract Confirms Air Defence Gap Through Hajj Season",k:"사우디, PAC-3 계약으로 하지 시즌까지 방공 공백 인정…방공 체계 보강 시급",s:"Arab News",c:"saudi",d:"2026-04-13",m:"A new PAC-3 contract by Saudi Arabia confirms that the Kingdom faces a structural air defense gap that will persist through the Hajj pilgrimage season, raising urgent questions about the adequacy of defenses for the millions of pilgrims expected to visit Mecca and Medina.",mk:"사우디가 체결한 새로운 PAC-3 계약이 왕국이 하지 성지순례 시즌까지 구조적인 방공 공백을 직면하고 있음을 확인해 준다. 수백만 순례자 방문이 예상되는 메카와 메디나 방어의 적절성에 긴급한 의문이 제기되고 있다.",tg:["방공","PAC3","하지","안보"],u:"https://houseofsaud.com/pac3-hajj-structural-gap/"},
  {id:313,p:6,r:"주요경제",t:"Aramco Jafurah Gas Field Builds Momentum Toward 2 BCF/Day Target With New Progress Milestones",k:"아람코 자푸라 가스전, 2 BCF/일 목표 향한 새 이정표 달성…사우디 가스 전략 탄력",s:"Arab News",c:"saudi",d:"2026-04-13",m:"Saudi Aramco reported significant progress at the Jafurah unconventional gas field toward its target of 2 billion cubic feet per day of sales gas by 2030, alongside the Tanajib Gas Plant that is expected to reach 2.6 billion cubic feet raw gas processing capacity.",mk:"사우디 아람코는 중동 최대 셰일 가스전인 자푸라에서 2030년까지 일일 20억 입방피트 판매 가스 목표를 향한 중요한 진전을 이뤘다고 밝혔다. 타나집 가스 플랜트도 26억 입방피트 원시 가스 처리 용량을 향해 순조롭게 진행 중이다.",tg:["아람코","자푸라","가스","에너지"],u:"https://www.aramco.com/en/news-media/news/2026/aramcos-gas-strategy-builds-momentum-with-major-progress-towards-growth-target"},
  {id:314,p:8,r:"주요경제",t:"Oil Advances as US Blockade of Hormuz Escalates Energy Crisis, Bloomberg Reports",k:"블룸버그, 미국의 호르무즈 봉쇄로 에너지 위기 고조…유가 추가 상승",s:"Bloomberg",c:"global",d:"2026-04-13",m:"Bloomberg reported that oil prices advanced Monday as the US Navy began enforcement of the Strait of Hormuz blockade, escalating the ongoing energy crisis. The blockade, announced after failed peace talks, threatens the transit of roughly 20 million barrels per day of global oil.",mk:"블룸버그는 미 해군의 호르무즈 봉쇄 집행 시작으로 월요일 유가가 추가 상승하며 에너지 위기가 고조됐다고 보도했다. 평화협상 결렬 후 선언된 봉쇄는 일일 약 2천만 배럴의 세계 원유 통행에 영향을 준다.",tg:["유가","호르무즈","에너지위기","봉쇄"],u:"https://www.bloomberg.com/news/articles/2026-04-12/latest-oil-market-news-and-analysis-for-april-13"}
];

// ===== STATE =====
let activeFilter='all', searchQuery='', langMode='both';

function formatDate(ds){const d=new Date(ds+'T00:00:00');return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function daysAgo(ds){const t=new Date('2026-04-13'),d=new Date(ds),diff=Math.floor((t-d)/(864e5));return diff===0?'오늘':diff===1?'어제':`${diff}일 전`;}

// Saudi media outlet ordering: Arab News > SPA > Saudi Gazette > Argaam > Asharq Al-Awsat > others
const SAUDI_SOURCE_ORDER = {'Arab News':1,'SPA':2,'Saudi Gazette':3,'Argaam':4,'Asharq Al-Awsat':5};
function saudiSrcRank(s){return SAUDI_SOURCE_ORDER[s]||99;}

function getFiltered(){
  let f=D;
  if(activeFilter!=='all') f=f.filter(n=>n.c===activeFilter);
  if(searchQuery){const q=searchQuery.toLowerCase(); f=f.filter(n=>n.t.toLowerCase().includes(q)||n.m.toLowerCase().includes(q)||n.s.toLowerCase().includes(q)||(n.k&&n.k.toLowerCase().includes(q))||(n.mk&&n.mk.toLowerCase().includes(q))||n.tg.some(t=>t.toLowerCase().includes(q)));}
  // Sort: 1) date desc  2) for Saudi: source order  3) priority desc
  return f.sort((a,b)=>{
    const dd = new Date(b.d) - new Date(a.d);
    if(dd) return dd;
    if(a.c==='saudi' && b.c==='saudi'){
      const sd = saudiSrcRank(a.s) - saudiSrcRank(b.s);
      if(sd) return sd;
    }
    return (b.p||0) - (a.p||0);
  });
}

function renderStats(){
  const c={all:D.length,saudi:D.filter(n=>n.c==='saudi').length,western:D.filter(n=>n.c==='western').length,korean:D.filter(n=>n.c==='korean').length,other:D.filter(n=>n.c==='other').length};
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-chip"><span class="count">${c.all}</span> 전체</div>
    <div class="stat-chip">\u{1F1F8}\u{1F1E6}<span class="count">${c.saudi}</span> 사우디</div>
    <div class="stat-chip">\u{1F30D}<span class="count">${c.western}</span> 서방</div>
    <div class="stat-chip">\u{1F1F0}\u{1F1F7}<span class="count">${c.korean}</span> 한국</div>
    <div class="stat-chip">\u{1F4F0}<span class="count">${c.other}</span> 기타</div>`;
}

function renderControls(){
  const filters=[{k:'all',l:'전체'},{k:'saudi',l:'사우디 언론'},{k:'western',l:'서방 언론'},{k:'korean',l:'한국 언론'},{k:'other',l:'기타 중동 언론'}];
  const langs=[{k:'both',l:'영+한'},{k:'ko',l:'한국어만'},{k:'en',l:'영어만'}];
  document.getElementById('controls').innerHTML=
    filters.map(f=>`<button class="filter-btn ${f.k} ${activeFilter===f.k?'active':''}" data-f="${f.k}">${f.l}</button>`).join('')+
    '<div class="sep"></div>'+
    langs.map(l=>`<button class="lang-btn ${langMode===l.k?'active':''}" data-l="${l.k}">${l.l}</button>`).join('');
  document.querySelectorAll('.filter-btn').forEach(b=>b.onclick=()=>{activeFilter=b.dataset.f;renderControls();renderContent();});
  document.querySelectorAll('.lang-btn').forEach(b=>b.onclick=()=>{langMode=b.dataset.l;document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderContent();});
}

function prioBadge(n){
  if(!n.r) return '';
  const cls={'속보':'prio-breaking','헤드라인':'prio-headline','심층분석':'prio-analysis','정책발표':'prio-policy','주요경제':'prio-economy'};
  return `<span class="prio-badge ${cls[n.r]||'prio-normal'}">${n.r}</span>`;
}

function card(n){
  const isKo=n.l==='ko';
  const isTop=n.p>=9;
  let th='',mh='';
  const pb=prioBadge(n);
  if(isKo){th=`<div class="title-only">${n.t}${pb}</div>`;mh=`<div class="summary-only">${n.m}</div>`;}
  else if(langMode==='en'){th=`<div class="title-only">${n.t}${pb}</div>`;mh=`<div class="summary-only">${n.m}</div>`;}
  else if(langMode==='ko'){th=`<div class="title-only">${n.k||n.t}${pb}</div>`;mh=`<div class="summary-only">${n.mk||n.m}</div>`;}
  else{th=`<div class="title-en">${n.t}${pb}</div>${n.k?`<div class="title-ko">${n.k}</div>`:''}`;mh=`<div class="summary-en">${n.m}</div>${n.mk?`<div class="summary-ko">${n.mk}</div>`:''}`;}
  return `<div class="news-card ${n.c}${isTop?' prio-top':''}"><div class="card-header"><span class="source-tag ${n.c}">${n.s}</span><span class="card-date">${daysAgo(n.d)} · ${formatDate(n.d)}</span></div>${th}${mh}<div class="card-footer"><div class="topic-tags">${n.tg.map(t=>`<span class="topic-tag">${t}</span>`).join('')}</div><a href="${n.u}" target="_blank" class="read-link">원문 &#8594;</a></div></div>`;
}

function renderContent(){
  const f=getFiltered(),main=document.getElementById('mainContent');
  if(!f.length){main.innerHTML='<div class="no-results">검색 결과 없음</div>';return;}
  let h=`<div class="summary-panel"><h2>오늘의 핵심 요약 (2026.04.09)</h2><div class="summary-points">
    <div class="summary-point"><span class="summary-icon">\u{1F6E1}\u{FE0F}</span><div class="summary-text"><strong>이란-미국 2주 휴전 합의:</strong> 파키스탄 중재. 호르무즈 해협 재개방. 그러나 휴전 발표 후에도 걸프 전역 공격 지속 (쿠웨이트 28회, UAE 35회 드론 공격).</div></div>
    <div class="summary-point"><span class="summary-icon">\u{1F6E2}\u{FE0F}</span><div class="summary-text"><strong>에너지 위기:</strong> 사우디 동서 파이프라인(일 700만 배럴) 드론 피격, 피해 제한적. 유가 사상 최고 프리미엄 $19.50. 지속 시 $180/bbl 전망.</div></div>
    <div class="summary-point"><span class="summary-icon">\u{1F4B0}</span><div class="summary-text"><strong>경제·투자:</strong> 사우디 GDP 4.3~4.7% 전망. PIF 사모신용 펀드 출범. 걸프 SWF $810억 워너 인수 지원. TASI 2.3% 상승. GCC 신용 '안정적'.</div></div>
    <div class="summary-point"><span class="summary-icon">\u{1F1F0}\u{1F1F7}</span><div class="summary-text"><strong>한국 영향:</strong> 원/달러 1,500원 돌파. 소비자물가 2.4% 급등. 반도체 수출 151% 역대 최대. 중소기업 피해 422건. 휴전에 증시 급등.</div></div>
  </div></div>`;

  h+=`<div class="article-count-note">검색된 기사: <strong>${f.length}건</strong> / 전체 ${D.length}건 (사우디 언론: SPA, Arab News, Saudi Gazette, Argaam, Asharq Al-Awsat 포함)</div>`;

  if(activeFilter==='all'){
    [{k:'saudi',n:'사우디 언론 (Arab News → SPA → Saudi Gazette → Argaam → Asharq Al-Awsat 順)',b:'badge-saudi',i:'\u{1F1F8}\u{1F1E6}'},
     {k:'western',n:'서방 언론 (Bloomberg · WSJ · Reuters · CNN · CNBC · NPR · FT)',b:'badge-western',i:'\u{1F30D}'},
     {k:'other',n:'기타 중동·국제 언론 (Al Jazeera · Al Arabiya · UN · IMO · ICAO · PBS)',b:'badge-other',i:'\u{1F4F0}'},
     {k:'korean',n:'한국 언론 (MBC · 서울신문 · 뉴스핌 · 이데일리 · 헤럴드경제 등)',b:'badge-korean',i:'\u{1F1F0}\u{1F1F7}'}
    ].forEach(g=>{const items=f.filter(n=>n.c===g.k);if(!items.length)return;h+=`<div class="section-title">${g.i} ${g.n} <span class="badge ${g.b}">${items.length}</span></div><div class="news-grid">${items.map(card).join('')}</div>`;});
  } else h+=`<div class="news-grid">${f.map(card).join('')}</div>`;
  main.innerHTML=h;
}

document.getElementById('currentDate').textContent='2026년 4월 12일 일요일';
document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderContent();});
window.addEventListener('scroll',()=>document.getElementById('scrollTop').classList.toggle('show',window.scrollY>400));
renderStats();renderControls();renderContent();
</script>
