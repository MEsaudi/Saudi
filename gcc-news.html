  {id:890,p:7,r:"심층분석",t:"Hormuz blocked, Red Sea opened: Saudi seeks bypass crude transport route",k:"호르무즈 대신 홍해…원유 수송 우회로 찾는 사우디",s:"한국경제",c:"korean-view",d:"2026-03-09",m:"Saudi Arabia diverting some volumes to Yanbu Red Sea port instead of Hormuz, but pipeline capacity alone insufficient to handle full export volumes, Korean buyers exploring alternatives.",mk:"사우디는 일부 물량을 호르무즈 대신 홍해 연안 얀부 항구로 돌리고 있지만 해당 파이프라인만으로는 기존 수출 물량을 모두 처리하기 어려운 상황이다.",tg:["사우디","얀부","수출경로"],u:"https://www.hankyung.com/article/2026030992081"},
  {id:891,p:8,r:"주요경제",t:"Saudi to halve crude exports to China next month amid Hormuz blockade",k:"사우디, 호르무즈 봉쇄에 내달 對중국 원유 수출 \"반토막\"",s:"연합뉴스",c:"korean-view",d:"2026-04-22",m:"Saudi crude exports to China expected to halve from 40M barrels in April to 20M barrels in May amid Hormuz blockade; significant impact on top Saudi crude buyers China and India.",mk:"사우디의 對중국 원유 수출량이 4월 4,000만 배럴에서 5월 2,000만 배럴로 절반으로 줄어들 전망이다. 호르무즈 봉쇄로 사우디 최대 원유 수입국인 중국과 인도에 대한 판매량이 크게 감소할 것이다.",tg:["사우디","중국","수출감소"],u:"https://www.yna.co.kr/view/AKR20260422078200002"},
  {id:892,p:8,r:"심층분석",t:"17 nations diversify oil sources against Hormuz blockade — Korea Apr supply at 60% of normal",k:"호르무즈 봉쇄에 17개국 \"원유 다변화\"로 맞섰다…4월 확보량 평시의 60%",s:"조선일보",c:"korean-view",d:"2026-04-21",m:"Korea&apos;s April crude supply at 60% of normal levels as 17 nations including Korea pursue source diversification strategies against Iran-induced Hormuz blockade.",mk:"이란발 호르무즈 봉쇄에 맞서 한국 등 17개국이 원유 공급원 다변화 전략을 펴고 있는 가운데, 한국의 4월 원유 확보량은 평시의 60% 수준에 그쳤다.",tg:["원유다변화","에너지안보","공급량"],u:"https://www.chosun.com/economy/economy_general/2026/04/21/hormuz-oil-diversification/"},
  {id:893,p:7,r:"주요경제",t:"Korea Q1 2026 GDP grows 1.7% on semiconductor boom amid Mideast oil risks",k:"반도체 수출 호조에 1분기 GDP 1.7% 성장…중동발 유가 리스크 지속",s:"매일경제",c:"korean-view",d:"2026-04-24",m:"Korea Q1 2026 GDP grew 1.7% on semiconductor exports despite Mideast tensions pushing crude past $100/barrel; Saudi crude prioritization eases acute supply concerns.",mk:"2026년 1분기 한국 GDP는 반도체 수출 호조로 1.7% 성장했다. 중동 긴장으로 유가가 100달러를 돌파했지만 사우디의 한국 우선 공급으로 급성 공급 우려는 완화되고 있다.",tg:["GDP","반도체","유가"],u:"https://www.mk.co.kr/news/economy/2026/04/24-q1-gdp-semiconductor"},
  {id:894,p:9,r:"주요경제",t:"Saudi liquidity surges 8.4% to SR3.28 trillion by end of February 2026",k:"사우디 통화량(M3) 8.4% 급증해 3.29조 리얄 돌파",s:"Saudi Gazette",c:"saudi",d:"2026-04-19",m:"Saudi Arabia&apos;s domestic liquidity (M3) surged SR255.7B (+8.4%) to SR3.289 trillion by end of February 2026 vs SR3.033 trillion in 2025, per SAMA monthly bulletin.",mk:"SAMA 월간 통계에 따르면 사우디 국내 통화량(M3)은 2026년 2월 말 기준 전년 동기 3.033조 리얄에서 2,557억 리얄(8.4%) 증가한 3.289조 리얄로 급증했다.",tg:["SAMA","유동성","M3"],u:"https://saudigazette.com.sa/article/660708/saudi-arabia/saudi-liquidity-surges-84-to-sr328-trillion-by-end-of-february-2026"},
  {id:895,p:8,r:"주요경제",t:"Saudi banks hold assets totaling SR5 trillion, driven by robust demand for corporate financing",k:"사우디 은행권 자산 5조 리얄 돌파…기업금융 수요 견조",s:"Saudi Gazette",c:"saudi",d:"2026-04-21",m:"Saudi banking sector assets reached SR5 trillion driven by robust corporate financing demand, signaling continued credit expansion despite regional turbulence.",mk:"사우디 은행권 자산이 견조한 기업금융 수요에 힘입어 5조 리얄을 돌파했다. 역내 혼란에도 신용 확대가 지속되고 있음을 시사한다.",tg:["은행","자산","기업금융"],u:"https://saudigazette.com.sa/article/660299"},
  {id:896,p:9,r:"주요경제",t:"Saudi Arabia signs Amiral-linked deal to expand downstream industrial value chains",k:"사우디, 110억 달러 아미랄 프로젝트 다운스트림 확장 협정 체결",s:"Reuters",c:"saudi",d:"2026-04-24",m:"Saudi Ministry of Investment and SATORP (Aramco-TotalEnergies JV) signed agreement to develop downstream industries linked to $11B Amiral petrochemical complex in Jubail, expected to unlock $4B in additional investment.",mk:"사우디 투자부와 SATORP(아람코-토탈에너지스 JV)가 110억 달러 규모 주바일 아미랄 석유화학 단지의 다운스트림 산업 확장 협정을 체결했다. 추가 40억 달러 투자를 견인할 전망이다.",tg:["아미랄","SATORP","다운스트림"],u:"https://www.tradingview.com/news/reuters.com,2026-04-24:newsml_Zaw2fFfDh:0-zawya-saudi-arabia-signs-amiral-linked-deal-to-expand-downstream-industrial-value-chains/"},
  {id:897,p:8,r:"주요외교",t:"Al-Jadaan heads Saudi delegation to 2026 IMF-World Bank Group Spring Meetings",k:"알자단 사우디 재무, IMF·세계은행 봄 회의 사우디 대표단 인솔",s:"Saudi Gazette",c:"saudi",d:"2026-04-23",m:"Saudi Finance Minister Mohammed Al-Jadaan led Saudi delegation to 2026 IMF-World Bank Group Spring Meetings in Washington, focusing on oil shock impact on regional economies.",mk:"무함마드 알자단 사우디 재무장관이 워싱턴에서 열린 2026 IMF·세계은행 그룹 봄 회의에 사우디 대표단을 인솔하고 유가 충격의 역내 경제 영향을 집중 논의했다.",tg:["IMF","세계은행","알자단"],u:"https://saudigazette.com.sa/article/660490"},
  {id:898,p:7,r:"주요경제",t:"Saudi Awwal Bank delivers SAR 2,086 million net profit for Q1 2026",k:"Saudi Awwal Bank, 1분기 순이익 20.9억 리얄…견조한 수익 유지",s:"Saudi Gazette",c:"saudi",d:"2026-04-24",m:"Saudi Awwal Bank delivered Q1 2026 net profit after Zakat and Income Tax of SAR 2,086 million, down 2% YoY, supported by stable income and robust balance sheet.",mk:"Saudi Awwal Bank은 안정적인 수익 기반과 견조한 대차대조표에 힘입어 2026년 1분기 자카트·법인세 차감 후 순이익 20.86억 리얄(전년 대비 -2%)을 기록했다고 발표했다.",tg:["은행실적","Awwal","Q1"],u:"https://saudigazette.com.sa/article/660793/business/saudi-awwal-bank-delivers-sar-2086-million-net-profit-for-1q26-supported-by-stable-income-and-a-robust-balance-sheet"},
  {id:899,p:7,r:"주요경제",t:"Argaam: 21 firms disclosed Q1 2026 financials so far",k:"Argaam: 사우디 상장사 21곳 1분기 실적 공시…17곳 흑자 증가",s:"Argaam",c:"saudi",d:"2026-04-22",m:"21 listed Saudi firms disclosed Q1 2026 financials so far—17 reported profit rise and 4 reported profit decline; bank profits expected to rise 5% on loan growth and operational efficiency.",mk:"사우디 상장사 21곳이 1분기 실적을 공시했으며 17곳이 흑자 증가, 4곳이 감소했다. 은행은 대출 성장과 운영 효율성으로 5% 이익 증가가 전망된다.",tg:["실적","Q1","Tadawul"],u:"https://www.argaam.com/en/market-daily-financial-report/3/57807"},
  {id:900,p:7,r:"주요경제",t:"Bank Albilad Q1 2026 earnings up 5% to SAR 735.8M",k:"Bank Albilad, 1분기 순이익 5% 증가한 7.36억 리얄",s:"Argaam",c:"saudi",d:"2026-04-23",m:"Bank Albilad reported Q1 2026 net profit of SAR 735.8 million, up 5% from SAR 700.4 million YoY, supported by loan portfolio growth and stable margins.",mk:"Bank Albilad는 대출 포트폴리오 성장과 안정적 마진에 힘입어 2026년 1분기 순이익 7.358억 리얄을 기록, 전년 동기 7.004억 리얄 대비 5% 증가했다.",tg:["은행","Albilad","Q1실적"],u:"https://www.argaam.com/sa-en/financial-reports/company-report/44/2026/70"},
  {id:901,p:7,r:"심층분석",t:"Saudi Arabia nears 2030 tourism target as visitor numbers hit 122m in 2025",k:"사우디, 2025년 방문객 1.22억명 달성…2030년 1.5억 목표 근접",s:"Arab News",c:"saudi",d:"2026-04-19",m:"Saudi Arabia welcomed 122M visitors in 2025, approaching Vision 2030 target of 150M tourists annually; tourism remains key non-oil growth engine.",mk:"사우디는 2025년 1.22억 명의 방문객을 맞이해 비전 2030의 연간 1.5억 명 관광객 목표에 근접했다. 관광은 비석유 성장의 핵심 동력으로 자리매김하고 있다.",tg:["관광","비전2030","방문객"],u:"https://www.arabnews.com/node/2630117/saudi-arabia"},
  {id:902,p:8,r:"주요경제",t:"Oman economy set for fastest growth in GCC in 2026: IMF",k:"IMF \"오만, 2026년 GCC 최고 성장세 전망\"",s:"Khaleej Times",c:"gulf",d:"2026-04-18",m:"IMF projects Oman GDP growth of 3.5% in 2026—highest among GCC countries—as Oman least affected by Iran war disruptions; Bahrain and Kuwait economies projected to contract.",mk:"IMF는 오만이 이란 전쟁 차질에 가장 적게 영향받으며 2026년 GCC 국가 중 최고치인 3.5% GDP 성장률을 기록할 것으로 전망했다. 바레인과 쿠웨이트 경제는 위축될 것으로 예상된다.",tg:["오만","IMF","GCC성장률"],u:"https://www.khaleejtimes.com/business/economy/oman-economy-fastest-growth-gcc-2026"},
  {id:903,p:7,r:"심층분석",t:"Higher oil prices bolster earnings in Saudi Arabia, Oman",k:"높은 유가에 사우디·오만 정부 수입 급증",s:"The National",c:"gulf",d:"2026-04-23",m:"Weekly oil revenues nearly doubled for Oman and rose 10% for Saudi Arabia amid recent oil price volatility, providing fiscal cushion against war-related disruptions.",mk:"최근 유가 변동성 속에서 오만의 주간 석유 수입이 거의 두 배 증가했고 사우디는 10% 상승해, 전쟁 관련 차질에 대한 재정 완충 역할을 하고 있다.",tg:["오일머니","재정수입","오만"],u:"https://www.thenationalnews.com/business/economy/2026/04/23/higher-oil-prices-bolster-earnings-in-saudi-arabia-oman/"},
  {id:904,p:8,r:"주요경제",t:"Hyundai E&C wins $2.1bn EPC deal for gas processing facility in Saudi Arabia",k:"현대건설, 사우디 21억 달러 가스처리시설 EPC 계약 수주",s:"한국경제",c:"korean-view",d:"2026-04-23",m:"Hyundai E&C announced $2.1B EPC deal for Saudi gas processing facility (~2.8T KRW); brings backlog to over 70T KRW; modular construction expertise gave HDEC competitive edge.",mk:"현대건설은 사우디 21억 달러(약 2.8조 원) 규모 가스처리시설 EPC 계약을 발표했다. 백로그는 70조 원을 돌파했으며, 모듈러 건설 역량이 경쟁 우위로 작용했다.",tg:["현대건설","EPC","가스처리"],u:"https://www.hankyung.com/article/2026042378219"}
,{id:905,p:8,r:"GLOBAL",t:"Fed's Powell Warns Oil Shock Could Delay Rate Cuts to H2 2026",k:"파월 美연준 의장, 유가 충격으로 금리인하 2026 하반기로 지연될 수 있어",s:"Reuters",c:"global",d:"2026-04-21",m:"Federal Reserve Chair Jerome Powell told the Economic Club of Washington that the oil price spike to $98/bbl following the Hormuz crisis could push core PCE inflation back above 3% by Q3, forcing the FOMC to defer the next rate cut beyond September. Markets repriced odds of a June cut from 65% to 28%.",mk:"제롬 파월 美연준 의장은 워싱턴 이코노믹 클럽 연설에서 호르무즈 위기 후 유가가 배럴당 98달러로 급등하면서 3분기 근원 PCE 인플레이션이 3% 이상으로 재상승할 수 있다며, FOMC가 다음 금리인하를 9월 이후로 연기할 수 있다고 발언. 시장의 6월 인하 확률은 65%에서 28%로 급락.",tg:["Fed","Powell","Rate Cuts","Inflation","Oil Shock"],u:"https://www.reuters.com/markets/us/feds-powell-says-oil-shock-could-delay-rate-cuts-2026-04-21/"},{id:906,p:7,r:"GLOBAL",t:"China's CNPC Diverts 2 VLCCs of Iranian Oil to Strategic Reserve as Hormuz Disrupts Trade",k:"中 CNPC, 호르무즈 차질로 이란산 원유 VLCC 2척 전략비축유로 전환",s:"Bloomberg",c:"global",d:"2026-04-20",m:"China National Petroleum Corp redirected two Very Large Crude Carriers of Iranian Light crude originally bound for Shandong teapot refineries to state strategic petroleum reserve sites at Zhoushan and Dalian, taking advantage of the post-Hormuz price dip below the official Iranian selling price formula. Total volume: 4.2 million barrels.",mk:"中 국영석유공사(CNPC)는 산둥 티팟 정유사로 향하던 이란 라이트유 VLCC 2척(420만 배럴)을 저우산·다롄 전략비축유 기지로 전환. 호르무즈 위기 후 이란 공식판매가격(OSP) 공식 이하로 떨어진 저점을 활용한 것으로 분석.",tg:["China","CNPC","SPR","Iran Oil","Hormuz"],u:"https://www.bloomberg.com/news/articles/2026-04-20/china-cnpc-diverts-iranian-oil-tankers-to-strategic-reserve"},{id:907,p:7,r:"GLOBAL",t:"G7 Energy Ministers Convene Emergency Call on Strategic Petroleum Reserve Coordination",k:"G7 에너지장관 긴급 화상회의, 전략비축유 공동 방출 조율",s:"Reuters",c:"global",d:"2026-04-19",m:"G7 energy ministers held a virtual emergency meeting Sunday to coordinate strategic petroleum reserve releases following the Hormuz blockade. Japan, the US and Germany agreed to a synchronized 30-million-barrel release tranche over April-May, while France and the UK signaled willingness to participate at lower volumes.",mk:"G7 에너지장관은 호르무즈 봉쇄 사태 대응을 위해 일요일 긴급 화상회의를 개최. 일본·미국·독일은 4~5월에 걸쳐 동시 3,000만 배럴 방출에 합의했고, 프랑스·영국도 소규모 참여 의사를 표명.",tg:["G7","SPR Release","Energy Security","Hormuz"],u:"https://www.reuters.com/business/energy/g7-energy-ministers-spr-coordination-call-2026-04-19/"},
  {id:909,p:10,r:"헤드라인",t:"Saudi Arabia says operational activities halted at several energy sites",k:"사우디, 다수 에너지 시설 가동 일시 중단 발표",s:"Al Jazeera",c:"saudi",d:"2026-04-09",m:"Riyadh confirmed operations were halted at oil, gas and electricity facilities in Riyadh, Eastern Province and Yanbu Industrial City after coordinated drone and missile attacks. One Saudi industrial security officer was killed and seven others injured.",mk:"사우디 정부는 리야드·동부주·얀부 산업도시의 석유·가스·전력 시설에서 드론·미사일 공격 직후 가동이 일시 중단됐다고 확인. 산업보안 경비원 1명이 사망하고 7명이 부상.",tg:["Energy Sites","Eastern Province","Iranian Strikes"],u:"https://www.aljazeera.com/news/2026/4/9/saudi-arabia-says-operational-activities-halted-at-several-energy-sites"},
  {id:919,p:8,r:"외교",t:"Saudi Crown Prince, Japanese PM Discuss Regional Developments",k:"사우디 왕세자·日 총리, 지역 정세 협의",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-22",m:"MBS held talks with Japanese PM on regional developments, energy security cooperation, and Japanese investment commitments under the Saudi-Japan Vision 2030 framework, with focus on hydrogen, ammonia, and rare-earth supply chains.",mk:"MBS 왕세자는 일본 총리와 지역 정세, 에너지 안보 협력, 한일사우디 비전2030 프레임워크 하 일본의 투자 약속을 논의. 수소·암모니아·희토류 공급망에 초점.",tg:["Japan","MBS","Energy Security","Hydrogen"],u:"https://english.aawsat.com/gulf/5265648-saudi-crown-prince-japanese-pm-discuss-regional-developments"},
  {id:929,p:7,r:"심층분석",t:"The UAE&apos;s economy will prove the doubters wrong",k:"UAE 경제가 회의론자들을 틀렸다고 입증할 것…The National 사설",s:"The National",c:"gulf",d:"2026-04-01",m:"The National&apos;s editorial argued the UAE economy will weather the war shock thanks to non-oil diversification, deep banking sector, and resilient trade flows—pointing to 5%+ growth and FDI inflows as evidence that fundamentals remain intact.",mk:"The National 사설은 UAE 경제가 비석유 다각화, 두터운 은행 부문, 회복력 있는 무역 흐름 덕에 전쟁 충격을 견뎌낼 것이라고 분석. 5%+ 성장과 FDI 유입을 펀더멘털 건재의 증거로 제시.",tg:["UAE","Resilience","Non-oil","FDI"],u:"https://www.thenationalnews.com/opinion/editorial/2026/04/01/uae-economy-middle-east-war/"},
  {id:932,p:6,r:"심층분석",t:"Qatar joins GCC talks on trade negotiations and industrial strategy",k:"카타르, GCC 무역협상·산업전략 회의 참석",s:"Qatar Tribune",c:"gulf",d:"2026-04-17",m:"Qatar joined GCC commerce and industry preparatory meetings in Riyadh, with discussions covering trade negotiations with the UK and EU, industrial policy harmonization, and joint logistics infrastructure to maintain regional flows during the Hormuz crisis.",mk:"카타르는 리야드에서 열린 GCC 통상·산업 준비회의에 참석, 영국·EU와의 무역협상, 산업정책 조화, 호르무즈 위기 속 역내 물류 유지를 위한 공동 인프라 등을 논의.",tg:["GCC","Qatar","Trade","Industry"],u:"https://www.qatar-tribune.com/article/230584/business/qatar-joins-gcc-talks-on-trade-negotiations-and-industrial-strategy"},
  {id:933,p:7,r:"속보",t:"Doha airport reopens, Oman Air resumes operations as Gulf airspace recovers",k:"도하 공항 재개·오만항공 운항 재개…걸프 영공 복원 진전",s:"The National",c:"gulf",d:"2026-04-23",m:"Hamad International Airport in Doha reopened to most regional carriers, with Oman Air resuming flights April 23 after airspace closures. Recovery follows ceasefire extension and easing of Iranian missile activity, though insurance premiums remain elevated.",mk:"도하 하마드국제공항이 대부분의 역내 항공사에 재개방, 오만항공도 영공 폐쇄 이후 4월 23일 운항을 재개. 휴전 연장과 이란 미사일 활동 완화에 따른 회복 흐름이지만 보험료는 여전히 고공행진.",tg:["Doha","Oman Air","Aviation","Gulf"],u:"https://www.thenationalnews.com/business/aviation/2026/04/23/doha-airport-reopens-oman-air-flights-resume/"},
  {id:936,p:10,r:"속보",t:"Oil rises above $106 per barrel as US, Iran deadlocked in Strait of Hormuz",k:"호르무즈 美-이란 교착에 유가 배럴당 106달러 돌파",s:"Al Jazeera",c:"me",d:"2026-04-24",m:"Brent rose to $106.80 (+5% over 24h)—a fourth straight session of gains—as Iran tightened ship-seizure operations and Trump ordered the US Navy to shoot any boat laying mines in Hormuz. WTI hit $97.71.",mk:"브렌트유는 24시간 내 5% 상승하며 106.80달러로 마감, 4거래일 연속 상승. 이란이 선박 나포 작전을 강화하고 트럼프는 美 해군에 호르무즈 기뢰 부설 선박 사살을 명령. WTI는 97.71달러.",tg:["Brent","WTI","Hormuz","Mines"],u:"https://www.aljazeera.com/economy/2026/4/24/oil-rises-above-106-per-barrel-as-us-iran-deadlocked-in-strait-of-hormuz"},
  {id:940,p:9,r:"GLOBAL",t:"Strait of Hormuz may not fully reopen until second half of 2026, Baker Hughes says",k:"베이커휴즈 호르무즈 완전 재개통, 2026년 하반기로 미뤄질 수도",s:"CNBC",c:"global",d:"2026-04-24",m:"Oilfield services giant Baker Hughes baked into its financial guidance the assumption that the US-Iran conflict continues through end-June and the Strait may not be fully operational until H2 2026. Capex deferrals already visible in upstream spending.",mk:"유전서비스 대기업 베이커휴즈는 美-이란 분쟁이 6월 말까지 지속되고 호르무즈가 2026 하반기에야 완전 재가동될 가능성을 재무 가이던스에 반영. 상류 부문 자본지출 이연이 가시화.",tg:["Baker Hughes","Hormuz","Reopening","Capex"],u:"https://www.cnbc.com/2026/04/24/strait-hormuz-baker-hughes-iran-war-oil-lng.html"},
  {id:941,p:8,r:"GLOBAL",t:"Simple math: JPMorgan analyst makes the case for why oil prices should push even higher",k:"JP모건 단순 산수…유가는 더 오를 수 밖에 없다",s:"CNBC",c:"global",d:"2026-04-24",m:"JPMorgan analyst Natasha Kaneva argued that, given the scale of supply disruption from the Iran war, simple math requires Brent to rise above $115 to balance the market. She raised JPM Q2 forecast accordingly and flagged tail risk to $130.",mk:"JP모건 나타샤 카네바 애널리스트는 이란전 공급 차질 규모를 감안할 때 단순 산수로 봐도 브렌트유는 115달러 이상으로 올라야 균형이 잡힌다고 분석. 2분기 전망을 상향하고 130달러 테일 리스크 경고.",tg:["JPMorgan","Oil Forecast","Brent","Tail Risk"],u:"https://www.cnbc.com/2026/04/24/jp-morgan-oil-prices-higher-iran-war.html"},
  {id:943,p:8,r:"GLOBAL",t:"CNBC Daily Open: Truce extended, trust still on edge",k:"CNBC 데일리 오픈: 휴전 연장됐지만 신뢰는 여전히 살얼음",s:"CNBC",c:"global",d:"2026-04-24",m:"Daily Open digest: Lebanon-Israel truce extended 3 weeks, oil mixed, EU finance ministers meet on energy security, and DeepSeek unveils V4 model. Markets oscillate between relief rally and tail-risk hedging.",mk:"데일리 오픈 요약: 레바논-이스라엘 휴전 3주 연장, 유가 혼조, EU 재무장관들 에너지 안보 회의, DeepSeek V4 공개. 시장은 안도 랠리와 테일 리스크 헤지 사이를 오감.",tg:["CNBC Daily","Truce","Markets","DeepSeek"],u:"https://www.cnbc.com/amp/2026/04/24/cnbc-daily-open-truce-extended-trust-still-on-edge.html"},
  {id:946,p:9,r:"GLOBAL",t:"We are facing the biggest energy security threat in history, IEA chief tells CNBC",k:"IEA 사무총장 역사상 최대 에너지 안보 위협 직면",s:"CNBC",c:"global",d:"2026-04-23",m:"IEA Executive Director Fatih Birol told CNBC the world faces the biggest energy security threat in history given the scale of Hormuz disruption. He called for a coordinated multilateral SPR draw and emergency demand-side measures across OECD economies.",mk:"파티 비롤 IEA 사무총장은 CNBC와의 인터뷰에서 호르무즈 차질 규모를 감안할 때 세계가 역사상 최대 에너지 안보 위협에 직면했다고 진단. 다자 SPR 동시 방출과 OECD 수요 관리 비상조치를 촉구.",tg:["IEA","Birol","Energy Security","SPR"],u:"https://www.cnbc.com/2026/04/23/oil-markets-prices-fuel-shortages-iran-war-iea-chief.html"},
  {id:950,p:7,r:"GLOBAL",t:"Hormuz Crisis Enters Dangerous New Phase as U.S. Seizes Vessel and Attacks Resume",k:"호르무즈 위기 새 국면…美 선박 나포·공격 재개",s:"gCaptain",c:"global",d:"2026-04-22",m:"gCaptain reports the Hormuz crisis entered a dangerous new phase with US Navy intercepting and seizing a sanctioned tanker testing the blockade, while Iran resumed attacks on commercial shipping. ~800 vessels and 20,000 seafarers remain trapped inside the Gulf.",mk:"gCaptain는 美 해군이 봉쇄를 시험한 제재 대상 유조선을 나포하고 이란이 상선 공격을 재개하면서 호르무즈 위기가 위험한 새 국면에 진입했다고 보도. 약 800척 선박과 2만 명의 선원이 걸프 안에 발이 묶여 있는 상태.",tg:["gCaptain","Tanker Seizure","Shipping","Trapped Vessels"],u:"https://gcaptain.com/hormuz-crisis-enters-dangerous-new-phase-as-u-s-seizes-vessel-and-attacks-resume/"},
  {id:951,p:8,r:"GLOBAL",t:"Saudi Arabia and U.S. sign Tax Information Exchange Agreement",k:"美-사우디, 조세정보교환협정(TIEA) 체결",s:"Reuters",c:"global",d:"2026-04-14",m:"The US and Saudi Arabia signed a Tax Information Exchange Agreement (TIEA) in Washington establishing a formal framework for cooperation between the IRS and ZATCA. The deal closes a long-standing transparency gap and supports ongoing investment ties.",mk:"美-사우디는 워싱턴에서 IRS와 ZATCA 간 협력의 공식 프레임워크를 마련하는 조세정보교환협정(TIEA)을 체결. 오랫동안 비어 있던 투명성 공백을 메우고 지속적인 투자 관계를 뒷받침.",tg:["TIEA","IRS","ZATCA","Transparency"],u:"https://www.reuters.com/world/middle-east/saudi-arabia-us-sign-tax-information-exchange-agreement-2026-04-14/"},
  {id:952,p:8,r:"주요경제",t:"Semiconductor exports drive April 1-20 outbound shipments to record $50.4bn",k:"중동 파고 넘은 반도체 힘…4월 1~20일 수출, 역대 최대 504억 달러",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-21",m:"Korean exports for April 1-20 totaled $50.4bn, the highest ever for the period, with semiconductors at $32.83bn (+151.4% YoY) topping $30bn for the first time. Strength offsets early-stage Middle East shock to global demand.",mk:"한국의 4월 1~20일 수출이 504억 달러로 동기간 역대 최대치를 기록, 반도체가 328억 3,000만 달러(전년비 +151.4%)로 사상 처음 300억 달러를 돌파. 중동 충격에 따른 글로벌 수요 압력을 상쇄.",tg:["수출","반도체","무역","중동"],u:"https://www.fnnews.com/news/202604210932150083"},
  {id:953,p:8,r:"심층분석",t:"IEA chief: April energy/economy outlook tougher than March amid Iran war",k:"IEA 총장 4월 에너지·경제, 이란 전쟁으로 3월보다도 어려울 것",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-14",m:"IEA Executive Director Fatih Birol warned that the April energy and macroeconomic outlook will be tougher than March, citing deepening Hormuz disruption and the US-Iran impasse. Korean refiners faced rising spot premiums and freight costs.",mk:"파티 비롤 IEA 사무총장은 호르무즈 차질 심화와 美-이란 교착으로 4월 에너지·경제 전망이 3월보다도 어려울 것이라고 경고. 한국 정유사들은 스팟 프리미엄 상승과 운임 부담이 가중.",tg:["IEA","비롤","에너지위기","정유"],u:"https://www.fnnews.com/news/202604140622056253"},
  {id:954,p:7,r:"주요경제",t:"Mideast risk fading: KOSPI re-anchors above 6,000 as risk assets rally",k:"중동 악재 빨리 잊었다…코스피 6000선 안착, 다시 위험자산 랠리",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-19",m:"KOSPI re-anchored above 6,000 as investors digested the ceasefire extension and SK Hynix record-breaking Q1 earnings. AI/semiconductor names led gains while defensive sectors lagged. The market quickly shrugged off remaining Mideast risk.",mk:"코스피가 휴전 연장과 SK하이닉스 1분기 사상 최대 실적 호재 소화 속에 6,000선 위에 재안착. AI·반도체주가 상승을 주도, 방어주는 부진. 시장은 잔존 중동 리스크를 빠르게 떨쳐냄.",tg:["KOSPI","SK하이닉스","반도체","랠리"],u:"https://www.fnnews.com/news/202604191053015462"},
  {id:955,p:9,r:"주요경제",t:"Korea Q1 GDP grows 1.7% on semiconductor strength, defying war headwinds",k:"한국 1분기 GDP 1.7% 깜짝 성장…반도체·설비투자가 전쟁 충격 눌렀다",s:"한국경제",c:"korean-view",d:"2026-04-24",m:"Korea Q1 2026 real GDP grew 1.7%, double BOK 0.9% projection and the highest in 22 quarters. Semiconductor exports rose 5.1% and equipment investment 4.8%; war impact will hit Q2 more directly. Bond yields rose on rate-cut delay bets.",mk:"한국 2026년 1분기 실질 GDP는 1.7% 성장, 한은 전망(0.9%)의 2배에 22분기 만에 최고. 반도체 수출은 5.1%, 설비투자는 4.8% 증가. 전쟁 영향은 2분기에 본격 반영될 전망. 금리인하 지연 베팅에 국고채 금리 상승.",tg:["GDP","반도체","설비투자","BOK"],u:"https://www.hankyung.com/article/2026042478291"},
  {id:956,p:8,r:"심층분석",t:"Saudi Arabia loses 15 trillion KRW in a month as war hits Vision 2030",k:"한 달 만에 15조 날렸다…중동전쟁에 사우디 비전2030 직격탄",s:"서울경제",c:"korean-view",d:"2026-04-15",m:"Sedaily reports cumulative Saudi war-related revenue loss and spending has crossed $10bn (~15T KRW) in one month, forcing reassessment of Vision 2030 megaprojects. Hormuz blockade has cut Saudi oil exports to roughly half normal levels.",mk:"서울경제는 사우디의 누적 전쟁 관련 세입 감소·지출이 한 달 만에 100억 달러(약 15조원)를 돌파, 비전 2030 메가 프로젝트 재검토를 강요당하고 있다고 보도. 호르무즈 봉쇄로 사우디 원유 수출은 평시의 절반 수준으로 급감.",tg:["비전2030","사우디","호르무즈","재정"],u:"https://www.sedaily.com/article/20029980"},
  {id:957,p:8,r:"심층분석",t:"Korea-Saudi crude flows: oil security talks intensify with Yanbu corridor in focus",k:"한국 정유사 사우디 원유 도입, 얀부 우회로 중심으로 재편 가속",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-25",m:"Korean refiners are pivoting toward Yanbu Red Sea-loading and non-Mideast diversification. GS Caltex secured 1M barrels of Kazakh CPC crude; ministry-led delegation locked in 273M barrels of alt-route supply through year-end including 50M barrels of Saudi via Yanbu.",mk:"한국 정유사들은 얀부 홍해 선적과 비중동 다변화로 도입 구조를 전환 중. GS칼텍스는 카자흐 CPC 원유 100만 배럴을 확보했고, 정부 특사단은 연말까지 우회 경로로 2억 7,300만 배럴(사우디 얀부 5,000만 배럴 포함) 공급을 확보.",tg:["정유","에너지안보","얀부","원유"],u:"https://www.fnnews.com/news/202604250630454220"},
  {id:958,p:8,r:"심층분석",t:"Iran new supreme leader is nowhere to be seen. That might be helping the regime survive",k:"CNN: 이란 새 최고지도자 모습 안 보여…그게 정권 생존에 도움될지도",s:"CNN",c:"me",d:"2026-04-21",m:"Six weeks after being named successor, Mojtaba Khamenei has not made any public appearance. CNN sources say he sustained a fractured foot, bruised eye and minor lacerations in the strikes that killed his father, and now operates as one voice within consensus-building among security elites.",mk:"후계자로 지명된 지 6주가 지났음에도 모지타바 하메네이는 한 차례도 공개 모습을 보이지 않음. CNN 소식통에 따르면 부친을 살해한 공습 당시 그도 발 골절, 눈 부상, 경미한 안면 열상을 입었으며, 현재 안보 엘리트 그룹 내 컨센서스 빌딩의 한 목소리 역할에 머물러 있음.",tg:["Iran","Mojtaba Khamenei","Successor","CNN"],u:"https://www.cnn.com/2026/04/21/middleeast/iran-supreme-leader-intl"},
  {id:960,p:7,r:"심층분석",t:"Israel-Lebanon Ceasefire Extended for Three Weeks",k:"CFR 분석: 이스라엘-레바논 휴전 3주 연장의 의미",s:"CFR",c:"me",d:"2026-04-23",m:"Council on Foreign Relations analysis of the 3-week ceasefire extension flags persistent risks: ceasefire compliance is uneven, Hezbollah disarmament has not begun, and US leverage over Israel and Iran remains the binding constraint on a durable settlement.",mk:"미 외교협회(CFR) 분석은 3주 휴전 연장에 내재한 위험을 지적. 휴전 준수가 일정치 않고 헤즈볼라 무장해제가 시작되지 않았으며, 美의 이스라엘·이란 압박력이 지속적 합의의 핵심 변수.",tg:["CFR","Ceasefire","Hezbollah","Disarmament"],u:"https://www.cfr.org/articles/israel-lebanon-ceasefire-extended-for-three-weeks"},
  {id:961,p:7,r:"심층분석",t:"Amid ceasefire, Lebanon tallies cost of Israel-Hezbollah war",k:"휴전 속 레바논, 對 이스라엘 헤즈볼라 전쟁 피해 집계 시작",s:"Christian Science Monitor",c:"me",d:"2026-04-24",m:"Christian Science Monitor reports Lebanon is tallying the war&apos;s cost: over 2,000 killed (militants and civilians), more than 1 million displaced, and southern Lebanon infrastructure devastated. Reconstruction estimates already top $20bn with international donors hesitant.",mk:"크리스천 사이언스 모니터는 레바논이 전쟁 피해 집계에 들어갔다고 보도. 사망자(전투원·민간인 합계) 2,000명 이상, 실향민 100만 명 초과, 남부 레바논 인프라는 초토화. 재건 비용은 이미 200억 달러를 상회하지만 국제 기부국들은 주저.",tg:["Lebanon","Reconstruction","War Cost","Hezbollah"],u:"https://www.csmonitor.com/World/Middle-East/2026/0424/israel-lebanon-ceasefire-disarming-hezbollah-iran-war"},
  {id:962,p:7,r:"심층분석",t:"Iran Supreme Leader No Longer Reigns Supreme",k:"TIME: 이란 최고지도자는 더 이상 최고권력자가 아니다",s:"TIME",c:"me",d:"2026-04-21",m:"TIME analysis argues Mojtaba Khamenei holds the title but not the levers: real power has dispersed across IRGC commanders, the Assembly of Experts, and President Pezeshkian. Decision-making slows and may help avoid escalation but complicates US negotiation tactics.",mk:"TIME 분석은 모지타바 하메네이가 직위는 가졌지만 실권은 가지지 못했다고 지적. 실질 권력은 IRGC 지휘부, 전문가 의회, 페제시키안 대통령에게 분산. 의사결정이 느려져 격화는 피할 수 있지만 美 협상 전술도 복잡해짐.",tg:["Iran","Power Shift","Mojtaba","IRGC"],u:"https://time.com/article/2026/04/21/war-iran-mojtaba-khamenei-supreme-leader/"},
  {id:964,p:7,r:"GLOBAL",t:"Beyond oil: 9 commodities impacted by the Strait of Hormuz crisis",k:"WEF: 석유 너머, 호르무즈 위기로 타격 입은 9대 원자재",s:"World Economic Forum",c:"global",d:"2026-04-22",m:"WEF analysis catalogues nine commodities disrupted by the Hormuz closure beyond crude: LNG, naphtha, urea/ammonia, sulfur, aluminum, container shipping, basmati rice, dates, and pearls. Disruption ripples to industrial Asia and EU petrochemical chains.",mk:"WEF 분석은 호르무즈 봉쇄로 원유 외에 차질을 빚는 9대 원자재를 정리. LNG, 나프타, 요소·암모니아, 황, 알루미늄, 컨테이너 해운, 바스마티 쌀, 대추야자, 진주가 포함. 산업 아시아·EU 석유화학 체인까지 충격이 전이.",tg:["WEF","Commodities","LNG","Petrochemicals"],u:"https://www.weforum.org/stories/2026/04/beyond-oil-lng-commodities-impacted-closure-hormuz-strait/"},
  {id:965,p:7,r:"GLOBAL",t:"Asia refining cuts deepen on Iran war, fuel supply concerns rise",k:"이란전에 아시아 정유사 가동률 추가 감축…연료 공급 우려 확산",s:"invezz",c:"global",d:"2026-04-23",m:"Invezz reports Asian refiners cut runs to 28.6 mbpd in April from 29.4 mbpd in March, with another decline to 28.5 mbpd projected for May. Crude imports to Asia are set to fall 22% YoY to 20.4 mbpd in April—the lowest since 2016.",mk:"인베즈는 아시아 정유사 가동률이 3월 일 2,940만 배럴에서 4월 2,860만 배럴로 떨어졌고 5월에는 2,850만 배럴까지 추가 하락 예상이라고 보도. 4월 아시아 원유 수입은 전년비 22% 감소한 일 2,040만 배럴로 2016년 이래 최저.",tg:["Asia Refining","Crude Imports","Fuel Crisis"],u:"https://invezz.com/news/2026/04/23/asia-refining-cuts-deepen-on-iran-war-fuel-supply-concerns-rise/"},
  {id:966,p:4,r:"에너지",t:"Japan Requests Additional Oil Supply from Saudi Arabia Amid Strait of Hormuz Disruption",k:"일본, 호르무즈 봉쇄 속 사우디에 추가 원유 공급 요청",s:"NaturalNews",c:"saudi",d:"2026-04-24",m:"Japanese PM Sanae Takaichi formally requested Saudi Arabia expand energy deliveries to Japan during a phone call with MBS on April 23, citing severe supply crunch from Hormuz disruption.",mk:"다카이치 사나에 일본 총리는 4월 23일 무함마드 빈 살만 왕세자와의 통화에서 호르무즈 해협 차단으로 인한 공급 위기를 이유로 일본에 대한 에너지 공급 확대를 공식 요청했다.",tg:["일본","원유","MBS","호르무즈"],u:"https://www.naturalnews.com/2026-04-24-japan-requests-additional-oil-supply-saudi-arabia.html"},
  {id:967,p:4,r:"경제",t:"Why Saudi is weathering the war shock better than most",k:"사우디가 전쟁 충격을 가장 잘 이겨내는 이유",s:"Semafor",c:"saudi",d:"2026-04-22",m:"Semafor analysis on how Saudi Arabia&apos;s diversification, FX reserves, and pipeline infrastructure are cushioning the kingdom against the Iran war shock relative to peers.",mk:"사우디의 경제 다각화, 외환보유고, 동서 송유관 인프라가 이란 전쟁 충격을 다른 산유국 대비 잘 흡수하고 있다는 세마포 분석.",tg:["경제","전쟁","회복력","분석"],u:"https://www.semafor.com/article/04/22/2026/why-saudi-is-weathering-the-war-shock-better-than-most"},
  {id:968,p:5,r:"PIF",t:"Saudi PIF unveils 2026-2030 strategy focused on value creation",k:"PIF, 가치 창출 중심의 2026-2030 전략 발표",s:"Gulf Business",c:"saudi",d:"2026-04-15",m:"PIF&apos;s new five-year strategy emphasizes value creation, structured into Vision, Strategic, and Financial portfolios with greater private sector participation.",mk:"PIF의 신규 5개년 전략은 가치 창출에 방점을 두고 비전·전략·금융 3개 포트폴리오로 구조화되며 민간 부문 참여 확대를 골자로 한다.",tg:["PIF","전략","비전2030","SWF"],u:"https://gulfbusiness.com/en/2026/saudi-arabia/saudi-pif-unveils-2026-2030-strategy-focused-on-value-creation/"},
  {id:969,p:4,r:"PIF",t:"King Street and PIF Sign MoU to Expand Private Credit Investment in MENA",k:"킹스트리트-PIF, MENA 사모 신용 투자 확대 MOU 체결",s:"PIF",c:"saudi",d:"2026-04-09",m:"PIF and King Street Capital Management signed a non-binding MoU for PIF to be an anchor investor in a new private credit fund focused on Saudi Arabia and the wider MENA region.",mk:"PIF와 킹스트리트캐피털은 사우디 및 MENA 지역 사모 신용 펀드의 앵커 투자자로 PIF가 참여하는 비구속 MOU를 체결했다.",tg:["PIF","사모","MENA","MOU"],u:"https://www.pif.gov.sa/en/news-and-insights/newswire/2026/king-street-and-pif-sign-an-mou-to-expand-private-credit-investment-opportunities-in-saudi-arabia-and-the-broader-mena-region/"},
  {id:970,p:3,r:"관광",t:"Saudi Tourism Authority Partners with Expo 2030 Riyadh",k:"사우디 관광청, 엑스포 2030 리야드와 전략적 MOU",s:"Travel And Tour World",c:"saudi",d:"2026-04-21",m:"STA and Expo 2030 Riyadh signed a strategic MoU to develop events, improve visitor engagement, and capitalise on global interest in Saudi tourism leading up to the 2030 expo.",mk:"사우디 관광청과 엑스포 2030 리야드는 이벤트 개발, 방문자 참여 개선, 2030년까지 사우디 관광에 대한 세계적 관심 활용을 위한 전략적 MOU를 체결했다.",tg:["관광","엑스포2030","MOU","리야드"],u:"https://www.travelandtourworld.com/news/article/saudi-tourism-authority-partners-with-expo-2030-riyadh-to-elevate-global-visitor-experience-latest-update/"},
  {id:971,p:3,r:"관광",t:"Saudi tourism facilities jump 34% in Q4 as Kingdom expands capacity",k:"사우디 관광 시설, 4분기 34% 급증",s:"Arab News",c:"saudi",d:"2026-04-20",m:"Saudi licensed hospitality facilities rose 34.2% YoY in Q4 2025; tourism employment reached 1.03 million as the Kingdom expanded capacity ahead of Vision 2030 milestones.",mk:"사우디 등록 숙박 시설은 2025년 4분기 전년 대비 34.2% 증가했으며 관광 부문 고용은 비전 2030 이정표를 앞두고 103만 명에 도달했다.",tg:["관광","숙박","고용","Q4"],u:"https://www.arabnews.com/node/2639638/business-economy"},
  {id:972,p:3,r:"항공",t:"Flyadeal launches Riyadh-NEOM direct route",k:"플라이아딜, 리야드-네옴 직항 노선 취항",s:"Travel And Tour World",c:"saudi",d:"2026-04-18",m:"Saudi low-cost carrier Flyadeal officially launched direct flights between Riyadh and Neom, dramatically improving accessibility to the northwestern megaproject region.",mk:"사우디 저비용 항공사 플라이아딜이 리야드와 네옴 간 직항편을 공식 취항하면서 북서부 메가프로젝트 지역 접근성이 대폭 개선됐다.",tg:["플라이아딜","네옴","항공","리야드"],u:"https://www.travelandtourworld.com/news/article/travel-shockwave-in-saudi-arabia-flyadeal-ignites-riyadh-neom-route-unlocking-futuristic-tourism-gateway/"},
  {id:973,p:4,r:"하지",t:"Hajj Minister reviews readiness of Mina camps ahead of pilgrimage",k:"하지 장관, 순례 시즌 앞두고 미나 캠프 준비 점검",s:"Saudi Gazette",c:"saudi",d:"2026-04-22",m:"Hajj Minister Tawfiq Al-Rabiah inspected Mina camps and crowd-management systems ahead of the 2026 pilgrimage season; pilgrim arrivals began April 18.",mk:"타우피크 알라비아 하지 장관은 2026년 순례 시즌을 앞두고 미나 캠프와 군중관리 시스템을 점검했다. 순례객 도착은 4월 18일부터 시작됐다.",tg:["하지","미나","순례","2026"],u:"https://saudigazette.com.sa/article/660742"},
  {id:974,p:5,r:"재정",t:"World Bank Sees Saudi Budget Deficit Halving, Current Account Surplus 3.3% in 2026",k:"세계은행 &quot;사우디 재정적자 절반 축소, 경상수지 흑자 3.3%&quot;",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-15",m:"World Bank expects Saudi deficit to narrow from 6.4% of GDP in 2025 to 3.0% in 2026, with a current account surplus of 3.3% — below MoF estimate of 3.3%.",mk:"세계은행은 사우디 재정적자가 2025년 GDP 대비 6.4%에서 2026년 3.0%로 축소되고 경상수지 흑자는 3.3%에 이를 것으로 전망했다.",tg:["세계은행","재정","적자","경상수지"],u:"https://english.aawsat.com/business/5260705-world-bank-sees-saudi-budget-deficit-halving-current-account-surplus-33-2026"},
  {id:975,p:4,r:"EV",t:"Lucid to Begin Full Manufacturing in Saudi Arabia in 2026",k:"루시드, 2026년 사우디서 전기차 본격 양산 개시",s:"AGBI",c:"saudi",d:"2026-01-14",m:"Lucid plans full-scale EV manufacturing in Saudi Arabia in 2026, targeting 150,000 vehicles a year by 2029 at the King Abdullah Economic City facility.",mk:"루시드는 2026년 사우디 KAEC 공장에서 전기차 본격 양산을 시작해 2029년까지 연 15만 대 생산을 목표로 한다.",tg:["루시드","EV","KAEC","PIF"],u:"https://www.agbi.com/manufacturing/2026/01/lucid-to-begin-full-saudi-manufacturing-in-2026/"},
  {id:976,p:4,r:"PIF",t:"Saudi PIF Rises to 5th Among World&apos;s Largest Sovereign Wealth Funds",k:"사우디 PIF, 세계 5대 국부펀드로 부상",s:"Arab News",c:"saudi",d:"2026-04-09",m:"Saudi Arabia&apos;s PIF climbed to 5th place among the world&apos;s largest sovereign wealth funds with assets under management reaching $1.15 trillion.",mk:"사우디 PIF는 운용자산 1조 1500억 달러로 세계 국부펀드 5위에 등극했다.",tg:["PIF","SWF","순위","자산"],u:"https://www.arabnews.com/node/2628235/business-economy"},
  {id:977,p:4,r:"PIF",t:"PIF commits $550m to Lucid as Uber expands robotaxi partnership",k:"PIF, 루시드에 5.5억 달러 투자… 우버는 로보택시 협력 확대",s:"Arab News",c:"saudi",d:"2026-04-15",m:"PIF affiliate Ayar Third Investment committed $550m new investment in Lucid; Uber added $200m and pledged to purchase at least 35,000 Lucid robotaxis.",mk:"PIF 산하 아야르 서드인베스트먼트는 루시드에 5.5억 달러 신규 투자를 약정했고 우버는 2억 달러를 추가 투자하며 루시드 로보택시 3만5천 대 이상 구매를 확약했다.",tg:["PIF","루시드","우버","로보택시"],u:"https://www.arabnews.com/node/2639895/business-economy"},
  {id:978,p:4,r:"EV",t:"Lucid Names CEO as Saudi PIF, Uber Commit Another $750 Million",k:"루시드 CEO 임명… PIF·우버 추가 7.5억 달러 투자",s:"Bloomberg",c:"saudi",d:"2026-04-14",m:"Silvio Napoli will assume CEO role at Lucid as PIF and Uber commit a combined $750m, expanding PIF&apos;s controlling stake in the EV maker.",mk:"실비오 나폴리가 루시드 CEO에 임명되며 PIF와 우버는 총 7.5억 달러를 추가 투자해 PIF의 지배 지분을 확대했다.",tg:["루시드","CEO","PIF","우버"],u:"https://www.bloomberg.com/news/articles/2026-04-14/lucid-names-ceo-as-saudi-pif-uber-commit-another-750-million"},
  {id:979,p:3,r:"UAE",t:"UAE economy continues ascent with robust growth in early 2026",k:"UAE 경제, 2026년 초 견조한 성장세 지속",s:"ARN News Centre",c:"gulf",d:"2026-04-22",m:"UAE economy maintained upward trajectory in early 2026 supported by banking strength; total banking assets rose 1.1% MoM to AED 5.47 trillion.",mk:"UAE 경제는 2026년 초 은행권 호조에 힘입어 상승세를 이어갔으며 총 은행자산은 전월 대비 1.1% 증가한 5조 4700억 디르함을 기록했다.",tg:["UAE","은행","자산","경제"],u:"https://www.arnnewscentre.ae/en/news/business/uae-economy-continues-ascent-with-robust-growth-in-early-2026/"},
  {id:980,p:5,r:"LNG",t:"QatarEnergy: Missile attacks reduced Qatar LNG export capacity",k:"카타르에너지 &quot;미사일 공격으로 LNG 수출 능력 감소&quot;",s:"QatarEnergy",c:"gulf",d:"2026-04-15",m:"QatarEnergy confirmed missile attacks on Ras Laffan facilities damaged equipment and wiped out 17% of LNG capacity for three to five years, prompting force majeure.",mk:"카타르에너지는 라스라판 시설에 대한 미사일 공격으로 장비가 손상되어 LNG 능력의 17%가 3~5년간 상실됐으며 불가항력을 선언했다고 확인했다.",tg:["카타르","LNG","라스라판","불가항력"],u:"https://www.qatarenergy.qa/en/MediaCenter/Pages/newsdetails.aspx?ItemId=3897"},
  {id:981,p:5,r:"유가",t:"Current price of oil as of April 24, 2026",k:"2026년 4월 24일 국제 유가",s:"Fortune",c:"global",d:"2026-04-24",m:"Brent crude reached $106.01/barrel at 9 a.m. ET on April 24, gaining $2.34 on the day amid stalled US-Iran talks and continued Hormuz closure.",mk:"브렌트유는 4월 24일 동부시간 오전 9시 배럴당 106.01달러를 기록하며 미-이란 협상 교착과 호르무즈 봉쇄 지속 속에 전일 대비 2.34달러 상승했다.",tg:["브렌트유","유가","호르무즈","협상"],u:"https://fortune.com/article/price-of-oil-04-24-2026/"},
  {id:982,p:4,r:"전망",t:"EIA Short-Term Energy Outlook: Global Liquid Fuels",k:"EIA 단기 에너지 전망: 세계 액체연료",s:"EIA",c:"global",d:"2026-04-08",m:"EIA STEO covers global crude and refined product balances under sharp Middle East supply disruptions and revised demand assumptions.",mk:"EIA STEO는 중동 공급 차질 심화와 수요 가정 조정 하에서의 세계 원유 및 정제품 수급 균형을 다룬다.",tg:["EIA","STEO","전망","액체연료"],u:"https://www.eia.gov/outlooks/steo/report/global_oil.php"},
  {id:983,p:4,r:"유가",t:"Oil Prices Rise as Brent Benchmark Surges Amid Supply Concerns",k:"브렌트유 급등… 공급 우려에 유가 상승",s:"World Today News",c:"global",d:"2026-04-23",m:"Brent crude futures rose above $106/barrel on track to gain nearly 18% for the week as stalled US-Iran peace talks and Hormuz closure fueled supply concerns.",mk:"브렌트유 선물은 미-이란 평화협상 교착과 호르무즈 봉쇄가 공급 우려를 키우면서 주간 18% 가까이 상승해 배럴당 106달러를 돌파했다.",tg:["브렌트유","공급","수요","시장"],u:"https://www.world-today-news.com/oil-prices-rise-to-103-67-per-barrel-as-brent-benchmark-surges-amid-supply-concerns-and-global-demand-shifts/"},
  {id:984,p:5,r:"LNG",t:"Global LNG supply drops by 20% as Iran war ripples through energy markets",k:"글로벌 LNG 공급 20% 감소… 이란 전쟁 여파",s:"The National",c:"me",d:"2026-04-24",m:"Global LNG supply has fallen 20% as Qatari and Emirati production losses cascade through energy markets, redirecting flows and lifting Asian and European prices.",mk:"카타르·UAE 생산 손실이 에너지 시장에 파급되면서 세계 LNG 공급이 20% 감소했고 아시아·유럽 가격이 상승하고 있다.",tg:["LNG","공급","카타르","UAE"],u:"https://www.thenationalnews.com/business/energy/2026/04/24/global-lng-supply-drops-by-20-as-iran-war-ripples-through-energy-markets/"}
,
  {id:985,p:9,r:"헤드라인",t:"Saudi non-oil exports climb 15% in February to $8.27bn: GASTAT",k:"사우디 2월 비석유 수출 15% 증가, 82.7억 달러",s:"Arab News",c:"saudi",d:"2026-04-23",m:"Saudi non-oil exports rose 15.1% year-on-year in February 2026 to SAR31 billion ($8.27 billion), driven by chemicals and re-exports, reflecting Vision 2030 diversification gains.",mk:"사우디의 2월 비석유 수출이 전년 대비 15.1% 증가한 310억 리얄(82.7억 달러)을 기록했다. 화학제품 및 재수출이 주도했으며, 비전 2030 경제 다각화 성과를 보여주는 지표다.",tg:["비석유경제","수출","비전2030","GASTAT"],u:"https://www.arabnews.com/node/2640958/business-economy"},
  {id:986,p:9,r:"헤드라인",t:"Saudi Arabia has strong financial buffers to confront Iran war impact: IMF Middle East director",k:"IMF: 사우디는 이란 전쟁 충격에 맞설 강력한 재정 완충장치 보유",s:"Arab News",c:"saudi",d:"2026-04-22",m:"IMF Middle East director Jihad Azour said Saudi Arabia has built strong financial buffers through diversification and institutional strengthening, giving it fiscal space to advance Vision 2030 mega-projects despite the regional war.",mk:"IMF 중동·중앙아시아국장 지하드 아주르는 사우디가 다각화와 제도 강화를 통해 강력한 재정 완충장치를 구축, 역내 전쟁에도 비전2030 메가 프로젝트를 추진할 재정여력을 갖추었다고 평가했다.",tg:["IMF","재정완충","비전2030","아주르"],u:"https://www.arabnews.com/node/2640826/business-economy"},
  {id:987,p:8,r:"정책발표",t:"Saudi Arabia backs stronger global action on illicit finance: SAMA governor",k:"사우디 중앙은행 총재, 불법 금융에 대한 글로벌 공조 강화 지지",s:"Arab News",c:"saudi",d:"2026-04-22",m:"SAMA Governor Ayman Al-Sayari, speaking at the FATF ministerial meeting alongside the IMF Spring Meetings, endorsed the 2026-2028 mutual evaluation framework and detailed Saudi amendments to AML laws strengthening confiscation and supervisory oversight.",mk:"사우디 중앙은행(SAMA) 아이만 알사야리 총재가 IMF 춘계회의 부속 FATF 장관회의에서 발언, 2026-2028 상호평가 체제를 지지하고 자금세탁방지법 개정을 통한 몰수·감독 강화 조치를 설명했다.",tg:["SAMA","불법금융","FATF","IMF춘계회의"],u:"https://www.arabnews.com/node/2640456/business-economy"},
  {id:988,p:9,r:"주요경제",t:"Saudi East-West Pipeline is Pumping Oil at its Full Capacity",k:"사우디 동서 송유관, 전체 용량으로 원유 송유 재개",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-12",m:"Saudi Arabia restored the East-West (Petroline) pipeline to its full 7 million bpd capacity following repairs to a pumping station damaged in an Iranian attack on April 8, enabling continued crude exports through Yanbu while Hormuz remains restricted.",mk:"사우디아라비아가 4월 8일 이란의 공격으로 손상된 펌핑 스테이션 수리를 마치고 동서 송유관(페트로라인)을 일일 700만 배럴 전체 용량으로 복구, 호르무즈 우회 얀부 수출을 정상화했다.",tg:["동서송유관","얀부","페트로라인","호르무즈"],u:"https://english.aawsat.com/business/5256306-saudi-east-west-pipeline-pumping-oil-its-full-capacity"},
  {id:989,p:7,r:"심층분석",t:"Alternative Routes for Middle East Oil and Gas Due to Hormuz Disruption",k:"호르무즈 차질로 부각된 중동 원유·가스 우회 노선",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-23",m:"Analysis of alternative export routes for Gulf crude and gas amid Hormuz closure: Saudi East-West pipeline to Yanbu, UAE Habshan-Fujairah pipeline, and Iraqi Kirkuk-Ceyhan link, with combined spare capacity well below total Gulf exports.",mk:"호르무즈 봉쇄 속 걸프 원유·가스의 대체 수출경로 분석. 사우디 얀부 송유관, UAE 합샨-푸자이라 라인, 이라크 키르쿠크-제이한 등이 거론되나 합산 여유 용량은 평시 수출량에 크게 미달.",tg:["우회노선","얀부","푸자이라","제이한"],u:"https://english.aawsat.com/business/5265046-alternative-routes-middle-east-oil-and-gas-due-hormuz-disruption"},
  {id:990,p:7,r:"심층분석",t:"US Official Says Gas Prices Have Peaked Despite Iran War",k:"美 당국자 &quot;이란 전쟁에도 휘발유 값 정점 지났다&quot;",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-23",m:"A senior US official told Asharq Al-Awsat that retail gasoline prices have peaked despite the ongoing Iran war, citing SPR releases, ramp-up of Saudi Yanbu exports, and resilient US shale production as offsets to Hormuz disruption.",mk:"미국 고위 당국자가 아샤르크 알아우사트에 이란 전쟁에도 휘발유 가격이 정점을 지났다고 밝혔다. 전략비축유 방출, 사우디 얀부 수출 증대, 견조한 미국 셰일 생산이 호르무즈 차질을 상쇄한다고 평가.",tg:["휘발유가격","SPR","미국셰일","얀부"],u:"https://english.aawsat.com/business/5265033-us-official-says-gas-prices-have-peaked-despite-iran-war"},
  {id:991,p:8,r:"속보",t:"IFAD: Repercussions of Hormuz Closure Trigger Global Food Security Shock",k:"IFAD &quot;호르무즈 봉쇄 파급, 글로벌 식량안보 충격 촉발&quot;",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-22",m:"International Fund for Agricultural Development warned that Hormuz closure has triggered a global food security shock, with disruptions to fertilizer and fuel supplies, rising input costs, and declining purchasing power threatening agricultural production at a critical season.",mk:"국제농업개발기금(IFAD)이 호르무즈 봉쇄로 비료·연료 공급 차질, 투입비 상승, 구매력 저하가 농업 시즌 핵심기에 글로벌 식량안보 충격을 일으켰다고 경고했다.",tg:["식량안보","IFAD","비료","호르무즈"],u:"https://english.aawsat.com/business/5264575-ifad-asharq-al-awsat-repercussions-hormuz-closure-trigger-global-food-security"},
  {id:992,p:7,r:"주요경제",t:"Putin reaffirms Russia&apos;s support for Saudi Arabia in call with Crown Prince",k:"푸틴, MBS와 통화에서 러시아의 사우디 지지 재확인",s:"Saudi Gazette",c:"saudi",d:"2026-04-21",m:"Russian President Vladimir Putin reaffirmed Russia&apos;s support for Saudi Arabia in a phone call with Crown Prince Mohammed bin Salman, discussing OPEC+ coordination, energy market stability and bilateral cooperation amid the Iran war.",mk:"블라디미르 푸틴 러시아 대통령이 무함마드 빈 살만 사우디 왕세자와의 통화에서 러시아의 사우디 지지를 재확인하며 OPEC+ 공조, 에너지 시장 안정, 양자 협력을 논의했다.",tg:["푸틴","MBS","OPEC+","러시아"],u:"https://saudigazette.com.sa/article/660215/saudi-arabia/putin-reaffirms-russias-support-for-saudi-arabia-in-call-with-crown-prince"},
  {id:993,p:6,r:"주요경제",t:"SNB profit climbs 7% to SAR 6.42B in Q1 2026",k:"SNB 1분기 순이익 7% 증가, 64.2억 리얄",s:"Argaam",c:"saudi",d:"2026-04-21",m:"Saudi National Bank reported Q1 2026 net profit of SAR 6.42 billion, up 7% YoY from SAR 6.02 billion, on resilient corporate lending and stable margins despite war-related volatility.",mk:"사우디 국민은행(SNB)이 2026년 1분기 순이익 64.2억 리얄(전년 동기 60.2억 리얄)로 7% 증가했다고 공시했다. 전쟁 변동성 속에서도 기업대출 견조와 마진 안정에 힘입은 결과.",tg:["SNB","Q1실적","은행권","TASI"],u:"https://www.argaam.com/sa-en/financial-reports/company-report/3413/2026/70"},
  {id:994,p:6,r:"주요경제",t:"Riyad Bank profit increases 5% to SAR 2.61B in Q1 2026",k:"리야드 은행 1분기 순이익 5% 증가, 26.1억 리얄",s:"Argaam",c:"saudi",d:"2026-04-20",m:"Riyad Bank posted Q1 2026 net profit of SAR 2.61 billion, up 5% YoY, supported by net financing income growth and contained credit costs.",mk:"리야드 은행이 2026년 1분기 순이익 26.1억 리얄로 5% 증가했다고 공시. 순이자수익 증가와 대손비용 통제가 성장 배경.",tg:["RiyadBank","Q1실적","은행권","TASI"],u:"https://www.argaam.com/sa-en/financial-reports/company-report/47/2026/70"},
  {id:995,p:5,r:"주요경제",t:"SAIB profit up 3% to SAR 519.6M in Q1 2026",k:"사우디 투자은행(SAIB) 1분기 순이익 3% 증가",s:"Argaam",c:"saudi",d:"2026-04-22",m:"Saudi Investment Bank reported Q1 2026 net profit of SAR 519.6 million, up 3% from SAR 503.3 million a year earlier, marking the 21st Tadawul-listed firm to disclose Q1 results.",mk:"사우디 투자은행(SAIB)이 2026년 1분기 순이익 5억1960만 리얄(+3%)을 발표, Q1 실적공시 21번째 상장사가 됐다.",tg:["SAIB","Q1실적","TASI공시","Argaam"],u:"https://www.argaam.com/en/financial-reports/company-report/52/2026/70"},
  {id:996,p:7,r:"심층분석",t:"How long can Iran&apos;s war-devastated economy defy the Hormuz blockade?",k:"전쟁으로 황폐해진 이란 경제, 호르무즈 봉쇄에 얼마나 버틸까",s:"Arab News",c:"saudi",d:"2026-04-22",m:"Analysis: Iran&apos;s economy has lost 2 million jobs and faces 6.1% IMF-projected contraction in 2026, with $270bn in war damages and the US blockade plus China-bank sanctions threats squeezing oil revenue lifelines.",mk:"분석: 이란 경제는 200만 개 일자리를 잃고 IMF는 2026년 6.1% 위축을 전망. 전쟁 피해는 2,700억 달러로 추산되며 미국 봉쇄와 중국 은행 제재 위협이 원유 수출 생명선을 옥죄고 있다.",tg:["이란경제","호르무즈봉쇄","제재","IMF전망"],u:"https://www.arabnews.com/node/2640654/middle-east"},
  {id:997,p:7,r:"주요경제",t:"Saudi crown prince receives Pakistan PM on first leg of diplomatic tour",k:"무함마드 빈 살만 왕세자, 파키스탄 총리와 회담",s:"Arab News",c:"saudi",d:"2026-04-14",m:"Crown Prince Mohammed bin Salman received Pakistani PM Shehbaz Sharif in Riyadh as part of Sharif&apos;s Gulf tour aimed at consolidating support for the Pakistan-mediated US-Iran ceasefire and discussing energy security cooperation.",mk:"무함마드 빈 살만 왕세자가 셰바즈 샤리프 파키스탄 총리를 리야드에서 접견했다. 샤리프 총리는 파키스탄이 중재한 미국-이란 휴전에 대한 걸프 지지를 다지고 에너지 안보 협력을 논의하는 걸프 순방 중이다.",tg:["MBS","파키스탄","휴전중재","외교"],u:"https://www.arabnews.pk/node/2640000/saudi-arabia"},
  {id:998,p:7,r:"속보",t:"21 Tadawul-listed firms disclose Q1 2026 financials, 17 post profit gains",k:"타다울 21개사 1분기 실적공시, 17개사 흑자증가",s:"Argaam",c:"saudi",d:"2026-04-23",m:"By April 23, 21 Tadawul-listed firms had disclosed Q1 2026 results, with 17 reporting profit increases and four declines, ahead of the May 12 official deadline. Banking sector leads the gains.",mk:"4월 23일 기준 타다울 상장사 21곳이 2026년 1분기 실적을 공시했고 17곳이 흑자 증가, 4곳이 감소세를 보였다. 5월 12일 공식 마감을 앞두고 은행권이 증가세를 견인했다.",tg:["Q1공시","TASI","실적시즌","Argaam"],u:"https://www.argaam.com/en/market-daily-financial-report/3/57807?preview=true"},
  {id:999,p:8,r:"속보",t:"Saudi Arabia ramps Yanbu exports toward 5 million bpd as Hormuz disruption forces rerouting",k:"사우디, 호르무즈 차질 속 얀부 수출을 일일 500만 배럴로 증대",s:"Arab News",c:"saudi",d:"2026-04-15",m:"Saudi Arabia is boosting crude exports through Yanbu Red Sea terminals to about 5 million bpd, roughly five times pre-conflict volumes, while supplementing with 700,000-900,000 bpd of refined products as Iran has shut Strait of Hormuz traffic.",mk:"사우디아라비아가 이란이 호르무즈 통항을 봉쇄한 가운데 홍해 얀부 수출을 일일 약 500만 배럴(평시 대비 약 5배)로 끌어올리고 정제유 70~90만 b/d도 추가 수출 중.",tg:["얀부수출","호르무즈우회","원유수출","Aramco"],u:"https://www.arabnews.com/node/2637723/business-economy"},
  {id:1000,p:7,r:"심층분석",t:"GCC economies set for strong rebound as diversification, policy buffers cushion conflict fallout",k:"GCC 경제, 다각화·정책완충으로 분쟁 충격 흡수 후 강한 반등 기대",s:"Khaleej Times",c:"gulf",d:"2026-04-22",m:"GCC states are expected to stage a strong post-conflict rebound, supported by Vision-style diversification, sovereign reserves and FX peg credibility, even as IMF cuts 2026 GCC growth forecasts due to the Iran war.",mk:"걸프협력회의(GCC) 국가들은 비전식 다각화, 국부펀드 적립금, 환율 페그 신뢰도 덕분에 분쟁 후 강한 반등을 보일 전망. IMF는 이란 전쟁 영향으로 2026년 GCC 성장률 전망을 하향했다.",tg:["GCC경제","다각화","IMF","정책완충"],u:"https://www.khaleejtimes.com/business/economy/gcc-economies-set-for-strong-rebound-as-diversification-policy-buffers-cushion-conflict-fallout"},
  {id:1001,p:7,r:"주요경제",t:"UAE economy shows resilience despite war risks, agency says",k:"UAE 경제, 전쟁 리스크에도 견조한 회복력 입증",s:"Khaleej Times",c:"gulf",d:"2026-04-21",m:"A ratings agency report noted the UAE economy is showing resilience despite war risks, citing diversified non-oil sectors, strong external buffers and Dubai&apos;s emergency stimulus package as stabilizers.",mk:"한 신용평가사가 UAE 경제가 전쟁 리스크에도 견조한 회복력을 보인다고 평가했다. 다각화된 비석유 부문, 강한 대외 완충, 두바이 비상부양 패키지가 안정 요인으로 거론됐다.",tg:["UAE","경제회복력","두바이부양","신평사"],u:"https://www.khaleejtimes.com/business/economy/uae-economy-shows-resilience-despite-war-risks-agency-says"},
  {id:1002,p:7,r:"속보",t:"Oil prices pull back from gains amid simmering Strait of Hormuz tensions",k:"호르무즈 긴장 속 국제유가 상승분 일부 반납",s:"The National",c:"gulf",d:"2026-04-24",m:"Brent crude futures slipped to $104.40/bbl on April 24, snapping a four-session winning streak, but still posted a sharp 14% weekly gain as Hormuz tensions and US-Iran talks uncertainty kept supply concerns elevated.",mk:"브렌트유 선물이 4월 24일 배럴당 104.4달러로 하락하며 4거래일 연속 상승세를 끊었으나 호르무즈 긴장과 미·이란 협상 불확실성으로 주간 상승률은 14%에 달했다.",tg:["국제유가","브렌트","호르무즈","주간변동"],u:"https://www.thenationalnews.com/business/markets/2026/04/24/oil-prices-iran-war/"},
  {id:1003,p:7,r:"속보",t:"War pushes Iran&apos;s economy to brink as two million jobs vanish",k:"이란 경제, 200만 일자리 증발하며 벼랑 끝",s:"The National",c:"gulf",d:"2026-04-21",m:"Iran has lost two million jobs since February with IMF projecting 6.1% contraction in 2026 and no recovery until 2027; war damage estimated at $270bn while Hormuz blockade and sanctions deepen the crisis.",mk:"이란은 2월 이후 200만 개 일자리를 잃었고 IMF는 2026년 6.1% 역성장, 2027년까지 회복 없음을 전망. 전쟁 피해는 2,700억 달러로 추산되며 호르무즈 봉쇄와 제재가 위기를 심화.",tg:["이란경제","고용","IMF","제재"],u:"https://www.thenationalnews.com/business/economy/2026/04/21/iran-us-war/"},
  {id:1004,p:7,r:"주요경제",t:"Bahrain GDP growth set to remain robust despite Iran war risks",k:"바레인 GDP 성장세, 이란 전쟁 리스크에도 견조 유지 전망",s:"Khaleej Times",c:"gulf",d:"2026-04-22",m:"Bahrain&apos;s GDP growth is expected to remain robust in 2026 thanks to non-oil diversification and Vision 2030 reforms, despite headwinds from regional war and oil-price volatility.",mk:"바레인은 비석유 다각화와 비전2030 개혁 덕분에 역내 전쟁과 유가 변동성에도 2026년 GDP 성장세가 견조할 것으로 전망된다.",tg:["바레인","GDP","비전2030","비석유"],u:"https://www.khaleejtimes.com/business/economy/bahrain-gdp-growth-2026"},
  {id:1005,p:7,r:"심층분석",t:"Qatar LNG flows recover as Iran agrees limited Hormuz transit windows",k:"이란이 호르무즈 통항 시간대 일부 허용…카타르 LNG 부분 회복",s:"Gulf News",c:"gulf",d:"2026-04-23",m:"Qatar&apos;s LNG shipments resumed at reduced rates after Iran agreed to limited Hormuz transit windows under the ceasefire framework, easing some Asian gas-supply pressure but keeping Brent elevated.",mk:"카타르 LNG 수출이 휴전 틀 안에서 이란이 호르무즈 통항 시간대를 일부 허용함에 따라 축소된 규모로 재개되며 아시아 가스 공급 압박이 일부 완화됐으나 브렌트유는 여전히 강세.",tg:["카타르","LNG","호르무즈","아시아공급"],u:"https://gulfnews.com/business/energy/qatar-lng-recovery-2026"},
  {id:1006,p:9,r:"속보",t:"Israel continues attacks on Lebanon despite extension of ceasefire",k:"이스라엘, 휴전 연장에도 레바논 공격 지속",s:"Al Jazeera",c:"me",d:"2026-04-24",m:"Israeli strikes killed three in southern Lebanon on April 24, hours after Trump announced a three-week extension of the Israel-Lebanon ceasefire. Hezbollah dismissed the extension as &apos;meaningless&apos; amid continued attacks.",mk:"트럼프가 이스라엘-레바논 휴전 3주 연장을 발표한 지 몇 시간 만에 이스라엘이 4월 24일 남부 레바논 공습으로 3명을 살해했다. 헤즈볼라는 공격 지속 속 휴전 연장을 &apos;무의미&apos;하다고 일축.",tg:["레바논","휴전","헤즈볼라","공습"],u:"https://www.aljazeera.com/news/2026/4/24/israel-continues-attacks-on-lebanon-despite-extension-of-ceasefire"},
  {id:1007,p:8,r:"심층분석",t:"How Iran raised Hormuz stakes by capturing ships",k:"이란, 선박 나포로 호르무즈 위기 격상시키는 방법",s:"Al Jazeera",c:"me",d:"2026-04-23",m:"Analysis examines how Iran has weaponized ship captures and naval threats in the Strait of Hormuz to pressure US-Iran negotiations, with nearly 800 vessels stranded awaiting safe passage guarantees.",mk:"이란이 호르무즈 해협에서 선박 나포와 해군 위협을 협상 카드로 활용해 미·이란 협상에 압박을 가하는 방식을 분석. 약 800척의 선박이 안전 항행 보장을 기다리며 대기 중이다.",tg:["이란전략","선박나포","호르무즈","협상카드"],u:"https://www.aljazeera.com/news/2026/4/23/how-iran-raised-hormuz-stakes-by-capturing-ships"},
  {id:1008,p:8,r:"속보",t:"US issues more Iran sanctions on eve of possible talks in Pakistan",k:"美, 파키스탄 협상 직전 이란 추가 제재",s:"Al Jazeera",c:"me",d:"2026-04-21",m:"US Treasury issued fresh sanctions targeting Iranian oil networks and front companies on the eve of possible US-Iran direct talks in Pakistan, signaling Washington&apos;s pressure-and-talk strategy.",mk:"미국 재무부가 파키스탄에서의 미·이란 직접 협상 가능성을 앞두고 이란 원유 네트워크와 위장 회사들에 대한 추가 제재를 부과, 워싱턴의 압박-협상 병행 전략을 시사.",tg:["미국제재","이란협상","파키스탄","압박전략"],u:"https://www.aljazeera.com/news/2026/4/21/us-issues-more-iran-sanctions-on-eve-of-possible-talks-in-pakistan"},
  {id:1009,p:7,r:"속보",t:"Iran &apos;won&apos;t negotiate under threat&apos;: Diplomat",k:"이란 외교관 &apos;위협 아래선 협상하지 않는다&apos;",s:"Al Arabiya",c:"me",d:"2026-04-22",m:"Senior Iranian diplomat warned Tehran will not negotiate under US threats, citing the ongoing US naval blockade of Iranian ports as evidence of bad faith ahead of possible Pakistan talks.",mk:"이란 고위 외교관이 미국의 이란 항만 해상 봉쇄가 지속되는 점을 들어 &apos;위협 아래선 협상하지 않는다&apos;고 경고, 파키스탄 협상을 앞두고 신뢰 부재를 지적했다.",tg:["이란협상","미국봉쇄","외교","파키스탄"],u:"https://english.alarabiya.net/News/middle-east/2026/04/22/iran-won-t-negotiate-under-threat-diplomat"},
  {id:1010,p:7,r:"심층분석",t:"War or economic collapse: can Iran withstand the pressure?",k:"전쟁이냐 경제 붕괴냐, 이란은 압박을 견딜 수 있을까",s:"Iran International",c:"me",d:"2026-04-22",m:"In-depth Iran International analysis argues Tehran&apos;s choice has narrowed to either economic collapse under sustained US blockade and sanctions or escalation; Iran&apos;s foreign reserves and oil revenue lifelines are dwindling.",mk:"이란 인터내셔널 심층분석은 미국의 지속 봉쇄·제재 아래 테헤란이 경제 붕괴냐 추가 격화냐의 좁은 선택지에 직면했다고 진단. 외환보유고와 원유 수입 생명선이 빠르게 고갈 중.",tg:["이란압박","외환보유고","제재","위기"],u:"https://www.iranintl.com/en/202604226411"},
  {id:1011,p:8,r:"속보",t:"Iranian FM arrives in Pakistan ahead of direct talks with US envoys",k:"이란 외무장관 파키스탄 도착, 美 특사들과 직접 협상 앞두고",s:"Times of Israel",c:"me",d:"2026-04-24",m:"April 24 report: Iran&apos;s foreign minister Abbas Araghchi arrived in Islamabad ahead of direct talks with US envoys Kushner and Witkoff. Lebanon ceasefire was extended by three weeks; IDF struck Hamas operatives in northern Gaza.",mk:"4월 24일 보도: 이란 외무장관 압바스 아라그치가 美 특사 쿠슈너·위트코프와의 직접 협상을 앞두고 이슬라마바드에 도착. 레바논 휴전 3주 연장, IDF의 북부 가자 하마스 공격도 함께 보도됐다.",tg:["아라그치","이란협상","파키스탄","가자"],u:"https://www.timesofisrael.com/iran-fm-arrives-pakistan-ahead-of-talks-april-24-2026/"},
  {id:1012,p:9,r:"헤드라인",t:"Saudi Arabia&apos;s Hormuz Oil Bypass Is Yet to Maintain Full Exports",k:"사우디 호르무즈 우회 수출, 아직 목표치엔 못 미쳐",s:"Bloomberg",c:"global",d:"2026-04-24",m:"Saudi crude shipments via Yanbu averaged about 4 million bpd in the first three weeks of April -- five times pre-conflict volumes but only 80% of Riyadh&apos;s target, as the kingdom struggles to fully replace Hormuz outflows.",mk:"사우디의 얀부 경유 원유 선적이 4월 첫 3주간 일 평균 약 400만 배럴로 분쟁 전 대비 5배에 달했으나 리야드 목표치의 80%에 그쳤다. 호르무즈 유출량을 완전히 대체하는 데 한계.",tg:["얀부수출","Aramco","호르무즈우회","Bloomberg"],u:"https://www.bloomberg.com/news/articles/2026-04-24/saudi-arabia-hormuz-oil-bypass-yet-to-maintain-full-exports"},
  {id:1013,p:7,r:"주요경제",t:"Upstream Oil and Gas Investment Set to Rise, Baker Hughes CEO Says",k:"베이커휴즈 CEO &apos;상류 석유·가스 투자 증가 전환&apos;",s:"Bloomberg",c:"global",d:"2026-04-24",m:"Baker Hughes CEO Lorenzo Simonelli said upstream oil and gas investment is set to rise as the Iran war pushes Gulf producers to bolster spare capacity and US shale operators add rigs for the first time in three weeks.",mk:"베이커휴즈 CEO 로렌초 시모넬리는 이란 전쟁으로 걸프 산유국들이 예비 용량 확충에 나서고 미국 셰일업체들도 3주만에 처음으로 시추기를 추가하는 등 상류 부문 투자가 증가세로 돌아섰다고 말했다.",tg:["베이커휴즈","상류투자","시추","Bloomberg"],u:"https://www.bloomberg.com/news/articles/2026-04-24/baker-hughes-ceo-upstream-oil-gas-investment-rise"},
  {id:1014,p:8,r:"속보",t:"Kushner, Witkoff heading to Pakistan for direct talks with Iran, White House says",k:"백악관 &apos;쿠슈너·위트코프, 이란과 파키스탄서 직접 협상&apos;",s:"CNBC",c:"global",d:"2026-04-24",m:"White House confirmed Jared Kushner and Steve Witkoff will travel to Pakistan Saturday for direct talks with Iran&apos;s foreign minister, with VP Vance on standby. Iran&apos;s MFA spokesman initially denied a meeting was scheduled.",mk:"백악관이 재러드 쿠슈너와 스티브 위트코프가 토요일 파키스탄으로 이동해 이란 외무장관과 직접 협상한다고 확인. 밴스 부통령은 대기 중. 이란 외무부 대변인은 회담 일정 자체를 초기엔 부인.",tg:["쿠슈너","위트코프","파키스탄","미·이란"],u:"https://www.cnbc.com/2026/04/24/kushner-witkoff-pakistan-iran-talks.html"},
  {id:1015,p:7,r:"속보",t:"Brent oil price tops $103 with Hormuz shipping still disrupted during U.S.-Iran ceasefire",k:"미·이란 휴전에도 호르무즈 차질 지속, 브렌트유 103달러 상회",s:"CNBC",c:"global",d:"2026-04-23",m:"Brent crude topped $103 a barrel on April 23 as US-Iran ceasefire failed to restore Hormuz shipping, with the strait remaining largely closed due to ongoing US blockade and Iranian restrictions.",mk:"4월 23일 브렌트유가 미·이란 휴전에도 호르무즈 통항이 회복되지 않으면서 배럴당 103달러를 돌파했다. 미국 봉쇄와 이란 통제로 해협은 여전히 사실상 폐쇄.",tg:["브렌트유","호르무즈","휴전","유가급등"],u:"https://www.cnbc.com/2026/04/23/brent-oil-103-hormuz-disrupted-ceasefire.html"},
  {id:1016,p:8,r:"심층분석",t:"Brent oil nears $100 as doubts grow about Iran peace talks with ceasefire set to end soon",k:"이란 휴전 임박 종료·협상 회의론에 브렌트유 100달러 근접",s:"CNBC",c:"global",d:"2026-04-21",m:"Brent crude approached $100/bbl as US-Iran ceasefire neared expiration and doubts grew over whether peace talks could prevent renewed escalation. Trump publicly resisted extension before relenting under Pakistan mediation.",mk:"미·이란 휴전 종료가 임박하고 협상 회의론이 부각되며 브렌트유가 배럴당 100달러에 근접. 트럼프는 휴전 연장을 공개 거부하다가 파키스탄 중재 요청에 결국 수용.",tg:["브렌트유","휴전","협상","파키스탄중재"],u:"https://www.cnbc.com/2026/04/21/brent-oil-near-100-iran-peace-doubts-ceasefire-end.html"},
  {id:1017,p:7,r:"속보",t:"5 things to know for April 24: Iran war, Israel-Lebanon ceasefire, Epstein files, Meta layoffs, Georgia wildfires",k:"4월 24일 주요 5대 뉴스: 이란전·이스라엘-레바논 휴전 외",s:"CNN",c:"global",d:"2026-04-24",m:"CNN&apos;s April 24 daily roundup leads with the Iran war (Witkoff-Kushner Pakistan trip), the three-week Israel-Lebanon ceasefire extension, alongside Epstein files release, Meta tech layoffs, and Georgia wildfires.",mk:"CNN의 4월 24일 데일리 라운드업은 이란전(위트코프·쿠슈너 파키스탄行)과 이스라엘-레바논 휴전 3주 연장을 헤드라인으로, 엡스타인 파일 공개, 메타 정리해고, 조지아 산불도 함께 보도.",tg:["CNN","데일리브리핑","이란전","휴전"],u:"https://www.cnn.com/2026/04/24/us/5-things-to-know-april-24-iran-war-ceasefire"},
  {id:1018,p:7,r:"속보",t:"US to host Israel-Lebanon talks as ceasefire deadline nears",k:"美, 휴전 만료 임박 이스라엘-레바논 협상 주최",s:"Washington Post",c:"global",d:"2026-04-23",m:"Washington hosted Israeli and Lebanese envoys on April 23 ahead of the original April 26 ceasefire deadline; Trump announced a three-week extension following the discussions.",mk:"워싱턴이 4월 23일 4월 26일 만료 예정이던 휴전을 앞두고 이스라엘·레바논 특사들을 주최한 후, 트럼프가 3주 연장을 발표했다.",tg:["휴전협상","워싱턴","이스라엘","레바논"],u:"https://www.washingtonpost.com/national-security/2026/04/23/us-israel-lebanon-ceasefire-talks-deadline/"},
  {id:1019,p:7,r:"심층분석",t:"Hezbollah defiant as Trump says Israel-Lebanon ceasefire extended for 3 weeks",k:"트럼프 휴전 3주 연장 발표에 헤즈볼라 반발",s:"Washington Post",c:"global",d:"2026-04-24",m:"Trump&apos;s three-week Israel-Lebanon ceasefire extension drew defiance from Hezbollah, which fired rockets at northern Israel in alleged response to continued Israeli strikes despite the truce.",mk:"트럼프의 3주 휴전 연장 발표에 헤즈볼라가 반발, 이스라엘이 휴전에도 공습을 지속한다며 이스라엘 북부에 로켓을 발사하는 등 충돌이 이어졌다.",tg:["헤즈볼라","휴전연장","로켓공격","트럼프"],u:"https://www.washingtonpost.com/world/2026/04/24/iran-us-israel-lebanon-ceasefire-extension/"},
  {id:1020,p:8,r:"속보",t:"US drillers add oil and gas rigs for first time in three weeks, Baker Hughes says",k:"美 시추업체, 3주만에 첫 시추기 증설…베이커휴즈",s:"BOE Report",c:"global",d:"2026-04-24",m:"Baker Hughes reported the US oil and gas rig count rose by one to 544 in the week to April 24, the first weekly increase in three weeks, as higher prices revive shale activity amid the Iran war.",mk:"베이커휴즈에 따르면 4월 24일까지 한 주간 미국 석유·가스 시추기 수가 1기 늘어 544기로, 3주만에 첫 주간 증가. 이란 전쟁 속 유가 상승이 셰일 활동을 되살리고 있다.",tg:["시추기","베이커휴즈","美셰일","유가상승"],u:"https://boereport.com/2026/04/24/us-drillers-add-oil-and-gas-rigs-baker-hughes-april-24/"},
  {id:1021,p:7,r:"속보",t:"Trump dispatches Witkoff and Kushner to Pakistan for new talks with Iran&apos;s foreign minister",k:"트럼프, 위트코프·쿠슈너 파키스탄 파견…이란 외무장관과 새 협상",s:"PBS News",c:"global",d:"2026-04-24",m:"PBS reported Trump is dispatching Witkoff and Kushner to Islamabad for direct talks with Iran&apos;s FM Abbas Araghchi; Press Secretary Leavitt said any deal must include Iran turning over nuclear material.",mk:"PBS는 트럼프가 위트코프와 쿠슈너를 이슬라마바드에 파견해 이란 외무장관 압바스 아라그치와 직접 협상에 나선다고 보도. 레빗 대변인은 어떤 합의도 이란의 핵물질 이양을 포함해야 한다고 강조.",tg:["트럼프외교","핵물질","아라그치","파키스탄"],u:"https://www.pbs.org/newshour/world/trump-dispatching-witkoff-kushner-pakistan-iran-talks-april-24"},
  {id:1022,p:7,r:"심층분석",t:"Saudi, UAE, Iraq: Can three pipelines help oil escape Strait of Hormuz?",k:"사우디·UAE·이라크 송유관 3대, 호르무즈 우회 가능할까",s:"Al Jazeera",c:"global",d:"2026-03-27",m:"Al Jazeera analysis maps how three Gulf pipelines -- Saudi East-West to Yanbu, UAE Habshan-Fujairah, and Iraq&apos;s Kirkuk-Ceyhan -- can partially bypass Hormuz, with combined capacity well below normal Gulf exports.",mk:"알자지라 분석은 걸프 3대 송유관(사우디 동서~얀부, UAE 합샨~푸자이라, 이라크 키르쿠크~제이한)이 호르무즈를 부분적으로 우회할 수 있으나 합산 용량이 평시 걸프 수출량에 크게 못 미친다고 지적.",tg:["송유관","우회","얀부","푸자이라"],u:"https://www.aljazeera.com/economy/2026/3/27/saudi-uae-iraq-can-three-pipelines-help-oil-escape-strait-of-hormuz"},
  {id:1023,p:7,r:"심층분석",t:"Iran&apos;s economy in charts: Hyperinflation and depreciating rial",k:"차트로 보는 이란 경제: 초인플레이션과 리알화 폭락",s:"CNBC",c:"global",d:"2026-04-23",m:"CNBC charts show Iran&apos;s monthly inflation could average 5%+ for rest of 2026 in a best case, while the rial has plunged to record lows. Estimated $270bn in war damages and 2 million jobs lost since Feb.",mk:"CNBC 차트에 따르면 이란의 월간 인플레가 2026년 잔여 기간 최선의 경우에도 평균 5% 이상이 될 것으로 추정. 리알화는 사상 최저로 폭락. 2월 이후 전쟁 피해 2,700억 달러, 일자리 200만 개 증발.",tg:["이란경제","초인플레이션","리알화","CNBC"],u:"https://www.cnbc.com/2026/04/23/iran-economy-charts-hyperinflation-rial-war.html"},
  {id:1024,p:8,r:"헤드라인",t:"Kuwait declares force majeure on crude shipments amid Hormuz blockade",k:"쿠웨이트, 호르무즈 막히자 원유 선적 불가항력 선언",s:"한국경제",c:"korean-view",d:"2026-04-20",m:"Kuwait Petroleum Corp declared force majeure on crude shipments as Hormuz blockade tightened, joining QatarEnergy and Bapco in halting Gulf flows -- impacting Korean refiners&apos; supply diversification calculus.",mk:"쿠웨이트 석유공사가 호르무즈 봉쇄 강화 속 원유 선적에 불가항력을 선언하며 카타르에너지·바프코에 이어 걸프 공급 중단 대열에 합류. 한국 정유사들의 공급선 다변화 셈법에도 영향.",tg:["쿠웨이트","불가항력","호르무즈","정유사"],u:"https://www.hankyung.com/article/2026042042361"},
  {id:1025,p:9,r:"헤드라인",t:"&apos;Outside Hormuz&apos; 273M barrels of crude headed to Korea",k:"&apos;호르무즈 밖&apos; 원유 2억 7300만 배럴 한국으로",s:"서울신문",c:"korean-view",d:"2026-04-16",m:"Special envoy Kang Hoon-sik secured 273 million barrels of crude and 2.1 million tonnes of naphtha through Mid-East/Central Asia tour, with Saudi delivering 50M bbl via Yanbu and 200M bbl prioritized for Korea June-Dec.",mk:"강훈식 대통령 비서실장이 중동·중앙아시아 4개국 순방을 통해 원유 2억 7300만 배럴과 나프타 210만 톤을 확보. 사우디는 4-5월 얀부 등 대체항 통해 5,000만 배럴, 6-12월 2억 배럴을 한국에 우선 배정.",tg:["원유확보","강훈식특사","얀부","우선배정"],u:"https://www.seoul.co.kr/news/politics/2026/04/16/outside-hormuz-273m-barrels"},
  {id:1026,p:7,r:"주요경제",t:"Korea secures May crude at 87% of normal levels via diversified routes",k:"한국, 5월 원유 평년 87% 수준 확보…항로 다변화",s:"이비엔뉴스",c:"korean-view",d:"2026-04-21",m:"Chief of Staff Kang Hoon-sik said Korea will receive 74.62 million barrels in May -- 87% of last year&apos;s monthly average -- with Saudi (24M) and UAE (16M) shipments rerouted via non-Hormuz channels.",mk:"강훈식 비서실장은 한국이 5월 7,462만 배럴(전년 월평균의 87%)을 도입하며 사우디(2,399만)·UAE(1,600만) 물량을 호르무즈를 거치지 않는 대체 항로로 들여온다고 밝혔다.",tg:["원유도입","항로다변화","얀부","UAE"],u:"https://www.ebn.co.kr/news/articleView.html?idxno=1706582"},
  {id:1027,p:7,r:"속보",t:"Tadawul-listed firms file disclosures April 23: Tawuniya dividend, Dallah Health stake purchase",k:"4월 23일 사우디 상장사 공시: 타와니야 배당, 달라 헬스 지분 매입 등",s:"서울경제",c:"korean-view",d:"2026-04-23",m:"Saudi Tadawul-listed firms made April 23 disclosures: Tawuniya proposed SAR 2/share dividend and bonus issue; Dallah Health acquired 2.59% in Al-Ahsa unit; Tadawul Group OGM approved 23% dividend for 2025 -- with implications for Korean institutional investors.",mk:"4월 23일 타다울 상장사 공시: 타와니야 주당 2리얄 배당 및 무상증자, 달라 헬스 알아흐사 자회사 잔여 2.59% 지분 인수, 타다울 그룹 OGM 2025년 배당 23% 승인 등이 포함돼 국내 기관투자자에게도 시사점.",tg:["타다울","사우디공시","배당","TASI"],u:"https://www.sedaily.com/article/20036334"},
  {id:1028,p:8,r:"심층분석",t:"Hormuz transit tolls eyed: Korea refiners face potential 1tn won annual cost",k:"호르무즈 통행료 부과 가시화…韓 정유사 연 1조 619억 부담 추산",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-23",m:"Trump administration&apos;s mooted Hormuz transit toll could cost Korea&apos;s four refiners about $700 million (~1 trillion won) annually, given Korea imports ~700 million barrels via Hormuz on 350 tankers per year.",mk:"트럼프 행정부의 호르무즈 통행료 부과 검토가 가시화될 경우, 한국이 연 약 7억 배럴(유조선 350척)을 호르무즈 통해 수입하는 점을 감안하면 4대 정유사가 연 약 7억 달러(약 1조 619억 원)를 부담해야 할 것으로 추산.",tg:["통행료","정유사","호르무즈","트럼프"],u:"https://www.fnnews.com/news/202604231030471234"},
  {id:1029,p:7,r:"심층분석",t:"Refiners and petrochemicals brace for Q2 earnings cliff amid Hormuz uncertainty",k:"호르무즈 불확실성 속 정유·석화, 2분기 실적절벽·셧다운 우려",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-22",m:"Korean refiners and petchem firms warn of Q2 2026 earnings cliff and possible shutdowns as the prolonged Iran war and Hormuz uncertainty squeeze feedstock supplies and crush margins.",mk:"미·이란 전쟁 장기화와 호르무즈 불확실성으로 원료 공급과 마진이 동시 압박을 받으며 한국 정유·석유화학 업계가 2026년 2분기 실적 절벽과 셧다운 가능성을 우려하고 있다.",tg:["정유","석유화학","2Q실적","셧다운"],u:"https://www.fnnews.com/news/202604221545121567"},
  {id:1030,p:10,r:"헤드라인",t:"Saudi Vision 2030 Annual Report 2025 reveals 93% KPI achievement, GDP exceeds $1 trillion",k:"비전2030 2025 연차보고서: KPI 93% 달성, GDP 1조 달러 돌파",s:"Saudi Gazette",c:"saudi",d:"2026-04-25",m:"Saudi Vision 2030 Annual Report for 2025 was released, showing 93% of indicators achieved or close to achieving annual targets, with GDP reaching SR4.9 trillion ($1.3 trillion). Non-oil GDP expanded to $892 billion and unemployment fell to a historic low of 7.2%.",mk:"사우디 비전2030 2025년 연차보고서 발표. 93%의 지표가 연간 목표를 달성하거나 근접 달성. GDP가 4.9조 리얄(1.3조 달러)에 도달. 비석유 GDP는 8920억 달러로 확대되었고, 실업률은 7.2%로 역대 최저 수준 달성.",tg:["Vision2030","GDP","KPI","보고서"],u:"https://saudigazette.com.sa/article/660838/saudi-arabia/crown-prince-says-saudi-ambition-turned-into-real-results-under-vision-2030"},
  {id:1031,p:10,r:"헤드라인",t:"Saudi Crown Prince and Zelensky discuss Ukraine crisis and Middle East in Jeddah talks",k:"MBS-젤렌스키 제다 회담: 우크라이나 위기와 중동 정세 논의",s:"Saudi Gazette",c:"saudi",d:"2026-04-25",m:"Saudi Crown Prince Mohammed bin Salman met Ukrainian President Volodymyr Zelensky in Jeddah on Friday for the second time in a month, discussing the Ukraine crisis, Middle East developments, and ways to strengthen bilateral cooperation across air defense, energy, and food security.",mk:"사우디 왕세자 MBS와 우크라이나 젤렌스키 대통령이 한 달 만에 두 번째로 제다에서 회담. 우크라이나 위기, 중동 정세, 방공·에너지·식량안보 분야 양국 협력 강화 방안 논의.",tg:["젤렌스키","MBS","우크라이나","외교"],u:"https://saudigazette.com.sa/article/660821/saudi-arabia/saudi-crown-prince-and-zelensky-discuss-ukraine-crisis-in-jeddah"},
  {id:1032,p:9,r:"주요경제",t:"Saudi sukuk added to J.P. Morgan and Bloomberg emerging market bond indices",k:"사우디 수쿠크, JP모건·블룸버그 신흥시장 채권지수 편입 확정",s:"Saudi Gazette",c:"saudi",d:"2026-04-24",m:"J.P. Morgan and Bloomberg announced the inclusion of Saudi riyal-denominated government sukuk in major EM bond indices. Inclusion in JP Morgan GBI-EM begins phased on January 29, 2027, with expected weight of 2.52%, while Bloomberg implementation is at end-April 2027 rebalancing.",mk:"JP모건과 블룸버그가 사우디 리얄 표시 정부 수쿠크의 신흥시장 채권지수 편입 발표. JP모건 GBI-EM 편입은 2027년 1월 29일부터 단계적 시작, 예상 비중 2.52%. 블룸버그는 2027년 4월 말 리밸런싱부터 반영. 약 690억 달러 규모 사우디 국채에 영향 예상.",tg:["수쿠크","JP모건","블룸버그","채권"],u:"https://saudigazette.com.sa/article/660817/saudi-arabia/saudi-sukuk-added-to-jp-morgan-and-bloomberg-emerging-market-bond-indices"},
  {id:1033,p:8,r:"심층분석",t:"What Does the Inclusion of Saudi Bonds in the J.P. Morgan Index Mean?",k:"JP모건 지수 편입의 의미는? 사우디 채권시장 분석",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-24",m:"Analysis of what the JP Morgan and Bloomberg index inclusion means for Saudi sukuk: enhanced liquidity, lower borrowing costs, and increased foreign investor access. The GBI-EM index is tracked by approximately $233 billion in investment funds, signaling broader integration of Saudi capital markets globally.",mk:"JP모건과 블룸버그 지수 편입이 사우디 수쿠크 시장에 미치는 영향 분석. 유동성 확대, 차입비용 인하, 해외 투자자 접근성 개선 효과 예상. GBI-EM 지수는 약 2330억 달러 규모 투자자금이 추적, 사우디 자본시장의 글로벌 통합 가속화 신호.",tg:["수쿠크","JP모건","분석","자본시장"],u:"https://english.aawsat.com/business/5265728-what-does-inclusion-saudi-bonds-jp-morgan-index-mean"},
  {id:1034,p:7,r:"외교",t:"Saudi, Algerian FMs Discuss Regional Developments at Antalya Diplomacy Forum",k:"사우디·알제리 외무장관, 안탈리아 외교포럼서 지역정세 논의",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-25",m:"Saudi FM Prince Faisal bin Farhan met with Algerian FM Ahmed Attaf on the sidelines of the Antalya Diplomacy Forum 2026. The ministers reviewed bilateral relations and discussed the latest regional developments and issues of common interest.",mk:"사우디 파이살 빈 파르한 외무장관과 알제리 아흐메드 아타프 외무장관이 안탈리아 외교포럼 2026 부속 회담에서 양국 관계 및 지역 정세 논의. 공동 관심 현안에 대한 협력 방안 검토.",tg:["사우디외교","알제리","안탈리아"],u:"https://english.aawsat.com/gulf/5263928-saudi-algerian-fms-discuss-regional-developments"},
  {id:1035,p:9,r:"헤드라인",t:"Mohammed bin Salman, Zelenskyy Meet in Jeddah for Strategic Security Talks",k:"MBS, 젤렌스키와 제다서 전략적 안보 회담",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-25",m:"Saudi Crown Prince Mohammed bin Salman held strategic security talks with Ukrainian President Zelenskyy in Jeddah, focusing on three pillars: export of Ukrainian air defense expertise, energy cooperation, and food security. This follows the historic 10-year Defense Cooperation Agreement signed in March 2026.",mk:"사우디 왕세자 MBS와 우크라이나 젤렌스키 대통령이 제다에서 전략적 안보 회담. 우크라이나 방공 기술 수출, 에너지 협력, 식량안보 등 3대 축 중심 논의. 2026년 3월 체결된 10년 국방협력협정의 후속 회담.",tg:["젤렌스키","MBS","방공","안보협력"],u:"https://english.aawsat.com/gulf/5266051-mohammed-bin-salman-zelenskyy-meet-jeddah"},
  {id:1036,p:9,r:"헤드라인",t:"Saudi Crown Prince, Ukrainian President hold talks in Jeddah",k:"사우디 왕세자, 우크라이나 대통령 제다 회담 개최",s:"Arab News",c:"saudi",d:"2026-04-25",m:"Crown Prince Mohammed bin Salman received Ukrainian President Volodymyr Zelensky in Jeddah, marking Zelensky&apos;s second visit to the Kingdom in less than a month. Talks focused on bilateral cooperation, regional security, and progress on the Defense Cooperation Agreement.",mk:"MBS 왕세자가 제다에서 젤렌스키 우크라이나 대통령 영접. 젤렌스키 대통령의 한 달 내 두 번째 사우디 방문. 양국 협력, 지역 안보, 국방협력협정 진전 사항 등 논의.",tg:["젤렌스키","MBS","우크라이나","정상회담"],u:"https://www.arabnews.com/node/2641134/saudi-arabia"},
  {id:1037,p:8,r:"주요경제",t:"J.P. Morgan and Bloomberg to include Saudi government sukuk on emerging market bond indices",k:"JP모건·블룸버그, 사우디 정부 수쿠크 신흥시장 채권지수 편입",s:"Arab News",c:"saudi",d:"2026-04-24",m:"Saudi Finance Minister Mohammed Aljadaan welcomed the inclusion of riyal-denominated government sukuk in JP Morgan GBI-EM and Bloomberg EM Local Currency indices, calling it a reflection of growing international confidence in Saudi financial reforms under Vision 2030.",mk:"사우디 모하메드 알자단 재무장관이 리얄 표시 정부 수쿠크의 JP모건 GBI-EM 및 블룸버그 신흥시장 현지통화 지수 편입을 환영. 비전2030 하에서 사우디 금융개혁에 대한 국제적 신뢰 확대의 결과로 평가.",tg:["수쿠크","재무부","Vision2030"],u:"https://www.arabnews.com/node/2641096/business-economy"},
  {id:1038,p:8,r:"속보",t:"Saudi Arabia condemns terror plot in UAE, expresses full solidarity",k:"사우디, UAE 대상 테러 음모 강력 규탄·전폭 연대 표명",s:"Arab News",c:"saudi",d:"2026-04-21",m:"Saudi Arabia&apos;s Foreign Ministry condemned a terrorist plot targeting the national unity and stability of the United Arab Emirates. The Kingdom praised UAE security services for dismantling the cell and expressed full solidarity in combating extremism and terrorism in all its forms.",mk:"사우디 외무부가 UAE의 국가 통합과 안정을 겨냥한 테러 음모를 강력 규탄. UAE 보안기관의 효율적 대응과 테러 조직 와해를 평가하고, 모든 형태의 극단주의와 테러에 맞선 UAE의 조치에 전폭 연대 표명.",tg:["테러","UAE","GCC연대"],u:"https://www.arabnews.com/node/2640714/saudi-arabia"},
  {id:1039,p:7,r:"외교",t:"HRH Crown Prince Congratulates Nizar Mohammed Saeed Amidi on Election as President of Iraq",k:"MBS 왕세자, 이라크 신임 대통령 니자르 아미디 당선 축하",s:"SPA",c:"saudi",d:"2026-04-21",m:"Crown Prince Mohammed bin Salman sent a cable of congratulations to Nizar Mohammed Saeed Amidi on the occasion of his election as President of Iraq, wishing him success and continued progress and prosperity for the Iraqi people.",mk:"MBS 왕세자가 이라크 신임 대통령 니자르 무함마드 사이드 아미디의 당선 축전 발송. 이라크 국민의 지속적 발전과 번영, 신임 대통령의 성공을 기원.",tg:["이라크","외교","축전"],u:"https://spa.gov.sa/en/N2566664"},
  {id:1040,p:8,r:"외교",t:"Saudi Arabia ramps up diplomatic outreach to Lebanon",k:"사우디, 레바논 외교 확대로 중재 강화",s:"The National",c:"gulf",d:"2026-04-24",m:"Saudi Arabia is intensifying diplomatic engagement with Lebanon, including Prince Yazid&apos;s visits to Paris and Beirut to extend the ceasefire between Israel and Hezbollah. Riyadh is positioning itself as a key mediator alongside Washington in shaping post-war Lebanese politics.",mk:"사우디가 레바논 대상 외교 활동 강화. 야지드 왕자가 파리·베이루트 방문, 이스라엘-헤즈볼라 휴전 연장 추진. 워싱턴과 함께 전후 레바논 정치 형성의 핵심 중재자로 위치 확보.",tg:["레바논","사우디외교","헤즈볼라","휴전"],u:"https://www.thenationalnews.com/news/gulf/2026/04/24/saudi-arabia-ramps-up-diplomatic-outreach-to-lebanon/"},
  {id:1043,p:9,r:"심층분석",t:"Iran-Iraq Tanker War redux? Why the Strait of Hormuz crisis is different",k:"이란-이라크 유조선 전쟁 재현? 이번 호르무즈 위기의 차별점",s:"Al Jazeera",c:"me",d:"2026-04-24",m:"Analysis of how the 2026 Strait of Hormuz crisis differs from the 1980s Iran-Iraq Tanker War. Today&apos;s situation features tighter global oil dependency, more sophisticated naval blockade tools, and no direct Iranian capacity to attack Saudi shipping at scale.",mk:"2026년 호르무즈 해협 위기와 1980년대 이란-이라크 유조선 전쟁의 차이점 분석. 오늘날 더 강한 세계 원유 의존도, 더 정교한 해상 봉쇄 수단, 사우디 해운 대규모 공격 가능 역량 부재 등 차별 요인.",tg:["호르무즈","이란","분석"],u:"https://www.aljazeera.com/news/2026/4/24/iran-iraq-tanker-war-redux-why-the-strait-of-hormuz-crisis-is-different"},
  {id:1045,p:9,r:"속보",t:"April 25: IDF investigating after footage shows soldiers damaging solar panels in southern Lebanon",k:"IDF, 레바논 남부서 태양광 패널 파손 영상 조사 착수",s:"Times of Israel",c:"me",d:"2026-04-25",m:"IDF launched probe after video surfaced showing Israeli soldiers damaging solar panels in a Lebanese village. The incident raises tension during the fragile Israel-Hezbollah ceasefire extension. Trump&apos;s Pakistan envoy plan was abruptly cancelled hours after Iranian FM left Islamabad.",mk:"IDF가 레바논 마을 태양광 패널 파손 영상에 대한 조사 착수. 이스라엘-헤즈볼라 휴전 연장 와중 긴장 고조. 트럼프의 파키스탄 특사 파견 계획은 이란 외무장관 이슬라마바드 출발 직후 돌연 취소.",tg:["IDF","레바논","휴전"],u:"https://www.timesofisrael.com/liveblog-april-25-2026/"},
  {id:1046,p:8,r:"속보",t:"Saudi Arabia condemns attack on Kuwaiti border post launched from Iraq",k:"사우디, 이라크發 쿠웨이트 국경 초소 공격 강력 규탄",s:"Al Arabiya",c:"me",d:"2026-04-25",m:"Saudi Foreign Ministry strongly condemned the drone attack on Kuwaiti border posts launched from Iraqi territory. Two drones struck border installations causing damage. Saudi Arabia rejected violations of Kuwaiti sovereignty and called for joint regional response.",mk:"사우디 외무부가 이라크 영토에서 발사된 드론의 쿠웨이트 국경 초소 공격을 강력 규탄. 드론 2대가 국경 시설 타격, 인명 피해는 없음. 사우디는 쿠웨이트 주권 침해를 거부하고 역내 공동 대응 촉구.",tg:["쿠웨이트","드론공격","이라크"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/25/saudi-arabia-condemns-attack-on-kuwaiti-border-post-launched-from-iraq-"},
  {id:1048,p:10,r:"헤드라인",t:"Strait of Hormuz Remains Near-Empty With Just a Few Iran Ships Moving",k:"호르무즈 해협 거의 텅 비어, 이란 선박 소수만 통항",s:"Bloomberg",c:"global",d:"2026-04-25",m:"Strait of Hormuz traffic dropped to only two small Iranian-linked fuel carriers and one coastal cargo ship Saturday morning, with no inbound vessels observed. The crisis enters its eighth week as Iran and the US continue competing blockade enforcement.",mk:"토요일 오전 기준 호르무즈 해협 통항이 이란 연계 소형 연료선 2척과 연안 화물선 1척으로 급감. 들어오는 선박은 없음. 위기가 8주차로 접어들며 이란-미국 양측의 봉쇄 강화 경쟁 지속.",tg:["호르무즈","봉쇄","통항"],u:"https://www.bloomberg.com/news/articles/2026-04-25/strait-of-hormuz-remains-near-empty-with-just-a-few-iran-ships-moving"},
  {id:1050,p:8,r:"속보",t:"Strait of Hormuz Remains Near-Empty With Just A Few Iran Ships Moving",k:"gCaptain: 호르무즈 해협, 이란 소수 선박만 운항",s:"gCaptain",c:"global",d:"2026-04-25",m:"Industry analysis confirms Strait of Hormuz traffic remains drastically reduced as Iranian gunboat attacks and US Navy interceptions continue to deter merchant shipping. Most regional refiners are now relying on stockpiles or alternative routes.",mk:"해운 업계 분석에서 호르무즈 해협 통항량이 이란 무장 보트 공격과 미 해군 차단으로 크게 감소한 상태 확인. 대다수 역내 정유사들이 비축유나 대체 경로에 의존 중.",tg:["호르무즈","해운","분석"],u:"https://gcaptain.com/strait-of-hormuz-remains-near-empty-with-just-a-few-iran-ships-moving/"},
  {id:1051,p:9,r:"속보",t:"Trump says US team won&apos;t visit Pakistan as uncertainty surrounds Iran peace talks",k:"트럼프, 미 협상팀 파키스탄 방문 취소…이란 협상 불확실성 증폭",s:"CNN",c:"global",d:"2026-04-25",m:"Trump cancelled the planned visit by envoys Witkoff and Kushner to Pakistan about an hour after Iranian FM Araghchi departed Islamabad. Trump later claimed Iran sent a much better proposal within 10 minutes of his decision.",mk:"트럼프 대통령이 이란 아라그치 외무장관의 이슬라마바드 출발 약 1시간 후 위트코프·쿠슈너 특사 파키스탄 방문 취소. 결정 10분 후 이란이 훨씬 나은 제안을 보냈다고 주장.",tg:["트럼프","이란협상","위트코프"],u:"https://edition.cnn.com/2026/04/25/world/live-news/iran-war-israel-pakistan-talks"},
  {id:1053,p:9,r:"헤드라인",t:"Cheong Wa Dae: 74.62M barrels secured for May, 87% of last year&apos;s monthly average",k:"靑 5월 원유 7462만 배럴 확보…작년 월평균 87% 수준",s:"서울경제",c:"korean-view",d:"2026-04-24",m:"Presidential Chief of Staff Kang Hoon-sik announced May crude oil supply of 74.62M barrels, equivalent to 87% of last year&apos;s monthly average. Saudi Arabia will supply 23.99M barrels and UAE 16M barrels via routes bypassing Hormuz.",mk:"강훈식 대통령 비서실장이 5월 중 7462만 배럴 원유 확보 발표. 작년 월평균 도입량의 87% 수준. 사우디 2399만 배럴, UAE 1600만 배럴을 호르무즈 우회 경로로 도입 확정. 중동 의존도를 69%에서 56%로 13%p 인하.",tg:["원유확보","강훈식","사우디"],u:"https://www.sedaily.com/article/20036915"},
  {id:1054,p:8,r:"헤드라인",t:"Kang Hoon-sik: 74.62M barrels secured in May from non-Hormuz routes",k:"강훈식 5월 중 원유 7462만 배럴 확보…호르무즈 아닌 대체 항로로 도입",s:"한국경제",c:"korean-view",d:"2026-04-24",m:"Hankyung reports that Korea secured 74.62 million barrels for May via non-Hormuz routes. The Middle East dependency was reduced from 69% to 56% (-13%p) by adding supply from the Americas and Africa. Saudi Yanbu and UAE Fujairah routes are key alternatives.",mk:"한국경제는 5월 7462만 배럴을 호르무즈 우회 경로로 확보했다고 보도. 미주·아프리카 추가 도입으로 중동 의존도 69%→56% (-13%p). 사우디 얀부항과 UAE 푸자이라항이 핵심 대체 항로.",tg:["원유","강훈식","호르무즈우회"],u:"https://www.hankyung.com/article/2026042447287"},
  {id:1055,p:8,r:"속보",t:"Cheong Wa Dae: 74.62M barrels secured in May, 87% of last year average",k:"靑 5월중 원유 7462만배럴 확보…작년 평균 87% 수준",s:"헤럴드경제",c:"korean-view",d:"2026-04-24",m:"Herald Corp reports the Presidential Office&apos;s statement that May crude oil supply of 74.62M barrels has been secured, reaching 87% of 2025&apos;s monthly average. The announcement signals easing of supply concerns despite continued Hormuz uncertainty.",mk:"헤럴드경제 보도. 대통령실이 5월 7462만 배럴 원유 확보, 2025년 월평균의 87% 수준 달성 발표. 호르무즈 불확실성 지속에도 수급 우려 완화 신호.",tg:["원유","비서실장","수급"],u:"https://biz.heraldcorp.com/article/10725052"},
  {id:1056,p:7,r:"주요경제",t:"Kang Hoon-sik: 74.62M barrels in May, 87% of last year&apos;s monthly average",k:"강훈식 5월 중 원유 7462만 배럴 확보…작년 월평균 도입량의 87% 수준",s:"경향신문",c:"korean-view",d:"2026-04-24",m:"Kyunghyang reports the Presidential Chief of Staff briefing on May crude supply. Saudi Arabia&apos;s 23.99M barrels and UAE&apos;s 16M barrels via non-Hormuz routes are central to the diversification. Korea continues to draw on 208-day strategic reserves while sourcing alternatives.",mk:"경향신문이 비서실장의 5월 원유 도입 브리핑 보도. 사우디 2399만 배럴, UAE 1600만 배럴을 호르무즈 우회로 도입이 다변화의 핵심. 한국은 208일분 전략비축유 활용과 대체 공급선 확보 병행.",tg:["강훈식","원유다변화","전략비축"],u:"https://www.khan.co.kr/article/202604241447001"},
