<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCC & 중동 일일 뉴스 대시보드</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card-hover: #222633;
    --accent: #00d4aa; --accent2: #5b8def;
    --text: #e8eaed; --text-dim: #8b8fa3; --border: #2a2d3a;
    --saudi: #006c35; --western: #1a5276; --korean: #c0392b; --other: #7d3c98;
    --ko-bg: rgba(0,212,170,0.06); --ko-border: rgba(0,212,170,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .header { background:linear-gradient(135deg,#1a1d27,#0f1117); border-bottom:1px solid var(--border); padding:20px 32px; position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .header h1 { font-size:22px; font-weight:700; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .date-badge { background:var(--card); border:1px solid var(--border); padding:6px 14px; border-radius:20px; font-size:12px; color:var(--text-dim); display:flex; align-items:center; gap:8px; }
  .live-dot { width:8px; height:8px; background:#00ff88; border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .stats-bar { display:flex; gap:10px; flex-wrap:wrap; }
  .stat-chip { background:var(--card); border:1px solid var(--border); padding:5px 12px; border-radius:14px; font-size:11px; color:var(--text-dim); display:flex; align-items:center; gap:5px; }
  .stat-chip .count { font-weight:700; color:var(--accent); }

  .controls { padding:12px 32px; display:flex; gap:8px; flex-wrap:wrap; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:72px; z-index:99; align-items:center; }
  .filter-btn { padding:6px 14px; border-radius:18px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:12px; font-weight:500; transition:all .2s; white-space:nowrap; }
  .filter-btn:hover { border-color:var(--accent); color:var(--accent); }
  .filter-btn.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
  .filter-btn.saudi.active { background:var(--saudi); color:#fff; border-color:var(--saudi); }
  .filter-btn.western.active { background:var(--western); color:#fff; border-color:var(--western); }
  .filter-btn.korean.active { background:var(--korean); color:#fff; border-color:var(--korean); }
  .filter-btn.other.active { background:var(--other); color:#fff; border-color:var(--other); }

  .sep { width:1px; height:24px; background:var(--border); margin:0 4px; }

  .lang-btn { padding:5px 12px; border-radius:14px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:11px; transition:all .2s; }
  .lang-btn.active { background:var(--accent2); color:#fff; border-color:var(--accent2); }

  .search-bar { padding:10px 32px; background:var(--bg); }
  .search-input { width:100%; padding:10px 18px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:13px; outline:none; }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--text-dim); }

  .main { padding:16px 32px; }

  .section-title { font-size:16px; font-weight:700; margin:24px 0 12px; padding-left:12px; border-left:3px solid var(--accent); display:flex; align-items:center; gap:8px; }
  .badge { font-size:10px; padding:2px 8px; border-radius:8px; font-weight:600; color:#fff; }
  .badge-saudi{background:var(--saudi);} .badge-western{background:var(--western);} .badge-korean{background:var(--korean);} .badge-other{background:var(--other);}

  .news-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:14px; margin-bottom:10px; }

  .news-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; transition:all .2s; position:relative; overflow:hidden; }
  .news-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
  .news-card.saudi::before{background:var(--saudi);} .news-card.western::before{background:var(--western);} .news-card.korean::before{background:var(--korean);} .news-card.other::before{background:var(--other);}
  .news-card:hover { background:var(--card-hover); transform:translateY(-1px); box-shadow:0 6px 24px rgba(0,0,0,.3); }

  .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .source-tag { font-size:10px; font-weight:600; padding:2px 8px; border-radius:6px; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; }
  .source-tag.saudi{background:rgba(0,108,53,.2);color:#00d68f;} .source-tag.western{background:rgba(26,82,118,.2);color:#5dade2;} .source-tag.korean{background:rgba(192,57,43,.2);color:#e74c3c;} .source-tag.other{background:rgba(125,60,152,.2);color:#bb8fce;}
  .card-date { font-size:10px; color:var(--text-dim); white-space:nowrap; margin-left:6px; }

  .title-en { font-size:14px; font-weight:600; line-height:1.45; margin-bottom:3px; color:var(--text); }
  .title-ko { font-size:13px; font-weight:500; line-height:1.45; margin-bottom:8px; color:var(--accent); padding-left:9px; border-left:2px solid var(--accent); opacity:.9; }
  .summary-en { font-size:12px; color:var(--text-dim); line-height:1.55; margin-bottom:4px; }
  .summary-ko { font-size:12px; color:#8ecae6; line-height:1.55; margin-bottom:12px; padding:6px 10px; background:var(--ko-bg); border:1px solid var(--ko-border); border-radius:6px; }
  .title-only { font-size:14px; font-weight:600; line-height:1.45; margin-bottom:8px; color:var(--text); }
  .summary-only { font-size:12px; color:var(--text-dim); line-height:1.55; margin-bottom:12px; }

  .card-footer { display:flex; justify-content:space-between; align-items:center; }
  .topic-tags { display:flex; gap:4px; flex-wrap:wrap; }
  .topic-tag { font-size:9px; padding:2px 6px; border-radius:5px; background:rgba(255,255,255,.05); color:var(--text-dim); border:1px solid var(--border); }
  .read-link { font-size:11px; color:var(--accent); text-decoration:none; font-weight:600; white-space:nowrap; }
  .read-link:hover { opacity:.7; }

  .summary-panel { background:linear-gradient(135deg,#1a2332,#1a1d27); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
  .summary-panel h2 { font-size:15px; margin-bottom:12px; color:var(--accent); }
  .summary-points { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px; }
  .summary-point { display:flex; gap:8px; align-items:flex-start; padding:10px; background:rgba(255,255,255,.03); border-radius:8px; border:1px solid var(--border); }
  .summary-icon { font-size:18px; flex-shrink:0; }
  .summary-text { font-size:12px; line-height:1.5; color:var(--text-dim); }
  .summary-text strong { color:var(--text); }

  .scroll-top { position:fixed; bottom:24px; right:24px; width:40px; height:40px; border-radius:50%; background:var(--accent); color:#000; border:none; cursor:pointer; font-size:18px; display:none; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(0,212,170,.3); z-index:200; }
  .scroll-top.show { display:flex; }

  .article-count-note { font-size:11px; color:var(--text-dim); margin-bottom:16px; padding:8px 14px; background:var(--card); border:1px solid var(--border); border-radius:8px; }

  @media(max-width:768px) { .header{padding:12px 14px;} .controls{padding:10px 14px;} .search-bar{padding:8px 14px;} .main{padding:12px 14px;} .news-grid{grid-template-columns:1fr;} .summary-points{grid-template-columns:1fr;} .header h1{font-size:17px;} }
  .no-results { text-align:center; padding:50px 20px; color:var(--text-dim); }

  /* Priority badges */
  .prio-badge { font-size:9px; font-weight:700; padding:2px 7px; border-radius:4px; letter-spacing:.3px; margin-left:6px; vertical-align:middle; }
  .prio-headline { background:#e74c3c; color:#fff; }
  .prio-breaking { background:#f39c12; color:#000; }
  .prio-analysis { background:#3498db; color:#fff; }
  .prio-policy { background:#8e44ad; color:#fff; }
  .prio-economy { background:#27ae60; color:#fff; }
  .prio-normal { display:none; }

  .news-card.prio-top { border-color:rgba(231,76,60,.4); }
  .news-card.prio-top::after { content:''; position:absolute; top:0; right:0; width:0; height:0; border-top:28px solid rgba(231,76,60,.6); border-left:28px solid transparent; }
</style>

{id:162,p:10,r:"헤드라인",t:"US Navy begins blockade of Strait of Hormuz, halting all ship traffic near Iranian ports",k:"미 해군, 호르무즈 해협 봉쇄 개시…이란 항구 인근 모든 선박 통행 차단",s:"Gulf News",c:"me",d:"2026-04-13",m:"Trump ordered the US Navy to blockade the Strait of Hormuz starting April 13 at 6pm GST, interdicting any vessel that paid Iran tolls. Oil prices surged over 8% with Brent crude hitting $102.7 and WTI at $104.8 per barrel.",mk:"트럼프 대통령, 4월 13일 걸프 표준시 오후 6시부터 호르무즈 해협 봉쇄 명령. 이란에 통행료를 지불한 모든 선박 차단. 유가 8% 이상 급등, 브렌트유 $102.7, WTI $104.8 기록.",tg:["호르무즈","봉쇄","유가","미국"],u:"https://gulfnews.com/world/mena/us-iran-ceasefire-us-moves-to-blockade-iranian-ports-as-strait-of-hormuz-traffic-halts-oil-prices-surge-1.500504821"},
{id:163,p:10,r:"속보",t:"Saudi Arabia restores East-West pipeline to full capacity after Iranian attacks",k:"사우디, 이란 공격 이후 동-서 파이프라인 완전 복구",s:"Arab News",c:"saudi",d:"2026-04-12",m:"Saudi Energy Ministry announced full restoration of the East-West pipeline pumping capacity, recovering 700,000 bpd lost to Iranian strikes. Manifa field restored 300,000 bpd, while Khurais oilfield repairs continue.",mk:"사우디 에너지부, 이란 공격으로 손실된 일산 70만 배럴 동-서 파이프라인 완전 복구 발표. 마니파 유전 30만 bpd 복구 완료, 쿠라이스 유전 복구 작업 진행 중.",tg:["파이프라인","에너지","복구","Aramco"],u:"https://www.aljazeera.com/economy/2026/4/12/saudi-arabia-says-key-oil-pipeline-back-to-full-capacity-after-attacks"},
{id:164,p:10,r:"헤드라인",t:"Pakistan sends fighter jets and 13,000 troops to Saudi Arabia under defense pact",k:"파키스탄, 방위협정에 따라 전투기·1만3천 병력 사우디 배치",s:"Saudi Gazette",c:"saudi",d:"2026-04-11",m:"Pakistani military force including fighter jets and support aircraft arrived at King Abdulaziz Air Base in Dhahran, Saudi Arabia, as part of a strategic defense pact between the two countries amid the fragile US-Iran ceasefire.",mk:"파키스탄 전투기와 지원 항공기가 미-이란 휴전 속 양국 전략적 방위협정에 따라 사우디 다란 소재 킹 압둘아지즈 공군기지에 도착. 지상군 1만3천명 배치.",tg:["파키스탄","방위협정","군사","다란"],u:"https://saudigazette.com.sa/article/660444/saudi-arabia/pakistani-military-force-arrives-in-saudi-arabia-as-part-of-defense-pact"},
{id:165,p:9,r:"헤드라인",t:"US-Iran ceasefire talks collapse in Islamabad as Vance fails to reach deal",k:"이슬라마바드 미-이란 휴전 협상 결렬…밴스 부통령 합의 실패",s:"Al Jazeera",c:"me",d:"2026-04-12",m:"JD Vance announced that US-Iran talks in Islamabad had failed after a day of negotiations. Trump subsequently declared he no longer cared about negotiations with Iran and ordered the Hormuz blockade.",mk:"밴스 부통령, 이슬라마바드에서 하루간의 협상 끝에 미-이란 회담 결렬 발표. 트럼프 대통령은 이후 이란과의 협상에 더 이상 관심 없다고 선언하고 호르무즈 봉쇄 명령.",tg:["미국","이란","휴전","협상결렬"],u:"https://www.aljazeera.com/news/2026/4/13/iran-war-what-is-happening-on-day-45-of-the-us-iran-conflict"},

{id:177,p:9,r:"헤드라인",t:"Pakistan brokers US-Iran ceasefire: How Islamabad managed diplomatic breakthrough",k:"파키스탄, 미-이란 휴전 중재: 이슬라마바드의 외교적 돌파구",s:"Al Jazeera",c:"me",d:"2026-04-10",m:"Detailed analysis of how Pakistan managed to bring the US and Iran to a two-week ceasefire agreement starting April 8, leveraging its unique relationships with both sides.",mk:"파키스탄이 양측과의 독특한 관계를 활용하여 4월 8일 시작된 미-이란 2주 휴전 합의를 어떻게 이끌어냈는지에 대한 심층 분석.",tg:["파키스탄","외교","휴전","중재"],u:"https://www.aljazeera.com/features/2026/4/8/how-pakistan-managed-to-get-the-us-and-iran-to-a-ceasefire"},
{id:178,p:8,r:"심층분석",t:"Iran threatens Bab al-Mandeb closure: How would that affect world trade?",k:"이란, 바브알만데브 해협 폐쇄 위협: 세계 무역에 미치는 영향은?",s:"Al Jazeera",c:"me",d:"2026-04-10",m:"Analysis of Iran&apos;s threat to close the Bab al-Mandeb strait in addition to Hormuz, which would affect global shipping routes and further disrupt oil and LNG supplies.",mk:"이란의 호르무즈에 더해 바브알만데브 해협 폐쇄 위협 분석. 글로벌 해운 노선에 영향을 미치고 원유·LNG 공급을 추가로 교란할 가능성.",tg:["바브알만데브","해운","이란","무역"],u:"https://www.aljazeera.com/news/2026/4/6/iran-threatens-bab-al-mandeb-closure-how-would-that-affect-world-trade"},
{id:179,p:8,r:"심층분석",t:"UN Security Council to hold first-ever briefing on UN-GCC cooperation",k:"유엔 안보리, 유엔-GCC 협력 관련 최초 브리핑 개최",s:"Reuters",c:"gulf",d:"2026-04-13",m:"The UN Security Council is expected to hold a high-level briefing on GCC cooperation under Bahrain&apos;s April presidency, marking the first Council meeting focused on UN-GCC partnership.",mk:"유엔 안보리, 바레인의 4월 의장국 주도 하에 GCC 협력에 관한 고위급 브리핑 예정. 유엔-GCC 파트너십에 초점을 맞춘 최초의 안보리 회의.",tg:["유엔","GCC","안보리","바레인"],u:"https://www.securitycouncilreport.org/monthly-forecast/2026-04/un-gcc-cooperation.php"},
{id:180,p:8,r:"심층분석",t:"Vice Foreign Minister receives Chinese Ambassador to Saudi Arabia",k:"사우디 외무차관, 주사우디 중국 대사 접견",s:"SPA",c:"saudi",d:"2026-04-10",m:"Saudi Vice Minister of Foreign Affairs received the Chinese Ambassador in Riyadh, reflecting ongoing strategic partnership between Saudi Arabia and China amid regional tensions.",mk:"사우디 외무차관, 리야드에서 중국 대사 접견. 지역 긴장 속에서 사우디-중국 전략적 파트너십 지속 반영.",tg:["외교","중국","사우디","파트너십"],u:"https://spa.gov.sa/en/N2553526"},
{id:181,p:9,r:"헤드라인",t:"Hormuz blockade threatens Korean semiconductor supply chain via Qatar helium disruption",k:"호르무즈 봉쇄, 카타르 헬륨 공급 차단으로 한국 반도체 공급망 위협",s:"글로벌이코노믹",c:"korean-view",d:"2026-04-14",m:"Korea&apos;s semiconductor giants Samsung and SK Hynix face cooling process disruptions as Qatar helium supplies are cut off by the Hormuz blockade. Korea imports 70.7% of crude and 20.4% of LNG from the Middle East.",mk:"호르무즈 봉쇄로 카타르산 헬륨 공급 차단 시 삼성전자·SK하이닉스 반도체 생산라인 냉각 공정 차질 불가피. 한국은 원유 70.7%, LNG 20.4%를 중동에서 수입.",tg:["반도체","헬륨","호르무즈","삼성전자"],u:"https://www.g-enews.com/article/Global-Biz/2026/04/202604140540598983fbbec65dfb_1"},
{id:182,p:9,r:"속보",t:"US-Iran maritime blockade triggers emergency in Korean industry: 3rd oil shock fears",k:"미-이란 해상봉쇄에 한국 산업계 비상…제3차 오일쇼크 공포 현실화",s:"이코노믹스",c:"korean-view",d:"2026-04-14",m:"Korean industries face compound crisis from the US-Iran maritime blockade: surging oil prices, supply chain disruptions, and logistics cost spikes threatening export competitiveness.",mk:"미-이란 해상봉쇄로 한국 산업계 복합 위기 직면: 유가 급등, 공급망 교란, 물류비 폭등으로 수출 경쟁력 약화 우려.",tg:["오일쇼크","한국경제","물류","수출"],u:"https://econmingle.com/economy/us-iran-maritime-blockade-korean-industry/"},
{id:183,p:8,r:"심층분석",t:"KDI analyzes economic impact of Hormuz risk escalation on Korean economy",k:"KDI, 호르무즈 리스크 확대에 따른 한국경제 충격 진단",s:"KDI",c:"korean-view",d:"2026-04-13",m:"Korea Development Institute published analysis on the compound impact of Hormuz disruption on Korean economy, including energy supply, semiconductor production, and export logistics.",mk:"한국개발연구원(KDI), 호르무즈 해협 교란이 한국 경제에 미치는 복합 충격 진단 보고서 발표. 에너지 수급, 반도체 생산, 수출 물류 등 분석.",tg:["KDI","경제분석","호르무즈","에너지"],u:"https://eiec.kdi.re.kr/policy/domesticView.do?ac=0000204293"},
{id:184,p:8,r:"주요경제",t:"US Hormuz counter-blockade raises dual risk of energy supply deterioration and demand contraction",k:"美 호르무즈 역봉쇄, 에너지 수급 악화·수요 위축 복합 충격 우려",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-14",m:"Financial News analysis warns that US counter-blockade of Hormuz creates dual shock: energy supply disruption pushing oil above $100, combined with global demand contraction fears.",mk:"파이낸셜뉴스 분석, 미국의 호르무즈 역봉쇄가 유가 $100 돌파 에너지 수급 악화와 글로벌 수요 위축이라는 이중 충격을 야기한다고 경고.",tg:["유가","에너지","봉쇄","경제위기"],u:"https://www.fnnews.com/news/202604140615599338"},
{id:185,p:7,r:"심층분석",t:"Saudi-UAE shift to hardline stance: open military bases to US, freeze Iranian assets",k:"사우디·UAE 강경대응 선회…美에 군사기지 개방·이란자산 동결",s:"다음뉴스",c:"korean-view",d:"2026-04-12",m:"Korean media reports that Saudi Arabia and UAE have shifted to a hardline response, opening military bases to the US and freezing Iranian assets as regional tensions escalate.",mk:"사우디·UAE가 강경 대응으로 선회, 미국에 군사기지를 개방하고 이란 자산을 동결. 지역 긴장 고조에 따른 정책 전환.",tg:["사우디","UAE","군사","이란"],u:"https://v.daum.net/v/Wkug12Lx5A"},
{id:186,p:9,r:"속보",t:"Bloomberg: Pakistan sends military force to Saudi Arabia as part of defense pact",k:"블룸버그: 파키스탄, 방위협정에 따라 사우디에 군사력 파견",s:"Bloomberg",c:"global",d:"2026-04-11",m:"Bloomberg reports on Pakistan deploying military personnel and fighter jets to Saudi Arabia under a bilateral defense agreement amid the fragile US-Iran ceasefire period.",mk:"블룸버그, 미-이란 휴전 기간 양자 방위협정에 따라 파키스탄이 사우디에 군 병력과 전투기를 배치했다고 보도.",tg:["파키스탄","사우디","군사","블룸버그"],u:"https://www.bloomberg.com/news/articles/2026-04-11/pakistan-sends-military-force-to-saudi-arabia-as-part-of-pact"},

{id:190,p:8,r:"주요경제",t:"Oil prices surge past $100 as Hormuz blockade disrupts 12mn bpd of crude flow",k:"호르무즈 봉쇄로 일산 1,200만 배럴 차질…유가 $100 돌파",s:"Al Arabiya",c:"me",d:"2026-04-13",m:"Brent crude hit $102.7 and WTI reached $104.8 as the US Navy blockade of Hormuz disrupted approximately 12 million barrels per day of crude oil flow, about 12% of global supply.",mk:"미 해군 호르무즈 봉쇄로 일산 약 1,200만 배럴(글로벌 공급의 12%) 원유 흐름 차질. 브렌트유 $102.7, WTI $104.8 돌파.",tg:["유가","호르무즈","원유","급등"],u:"https://english.alarabiya.net/News/saudi-arabia"},
{id:191,p:7,r:"심층분석",t:"US-Iran negotiation collapse and Middle East tension impact Korean economy",k:"미-이란 협상 결렬, 중동 긴장 고조와 한국 경제 영향 우려",s:"전국인력신문",c:"korean-view",d:"2026-04-13",m:"Korean media analysis on the economic impact of the US-Iran negotiation collapse, including rising oil prices, supply chain risks, and potential disruption to Korean exports.",mk:"미-이란 협상 결렬에 따른 경제적 영향 분석. 유가 상승, 공급망 리스크, 한국 수출 차질 가능성 등 종합 진단.",tg:["한국경제","미이란","유가","수출"],u:"https://www.kjob.news/news/480615"}

{id:192,p:10,r:"속보",t:"OPEC output suffers record plunge as Iran war throttles exports",k:"OPEC 산유량 역대 최대 급감…이란 전쟁으로 수출 마비",s:"Bloomberg",c:"global",d:"2026-04-13",m:"OPEC production plunged 27% month-over-month from 28.7M bpd to 20.8M bpd, the steepest drop since the 1980s. Saudi output fell 23% from 10.1M to 7.8M bpd, Iraq collapsed 61%.",mk:"OPEC 산유량 전월 대비 27% 급감(2,870만→2,080만 bpd), 1980년대 이후 최대 하락폭. 사우디 23% 감소(1,010만→780만 bpd), 이라크 61% 폭락.",tg:["OPEC","산유량","이란전쟁","급감"],u:"https://www.bloomberg.com/news/articles/2026-04-13/opec-output-suffers-record-plunge-as-iran-war-throttles-exports"},
{id:193,p:9,r:"주요경제",t:"Saudi oil exports to China set to halve as Hormuz crisis lifts prices",k:"호르무즈 위기로 사우디 대중국 원유 수출 절반 감소 전망",s:"Bloomberg",c:"global",d:"2026-04-13",m:"Saudi crude sales to China are projected to halve from roughly 40M barrels in April to around 20M barrels in May as Middle East war disrupts flows through the Strait of Hormuz.",mk:"중동 전쟁으로 호르무즈 해협 흐름 차질, 사우디 대중국 원유 판매 4월 약 4,000만 배럴에서 5월 약 2,000만 배럴로 절반 감소 전망.",tg:["사우디","중국","원유수출","호르무즈"],u:"https://www.bloomberg.com/news/articles/2026-04-13/saudi-oil-sales-to-china-to-halve-as-hormuz-crisis-lifts-prices"},
{id:194,p:9,r:"헤드라인",t:"Saudi Arabia maintains oil exports from key Red Sea port for now",k:"사우디, 홍해 주요 항구 통한 원유 수출 현재까지 유지",s:"Bloomberg",c:"global",d:"2026-04-10",m:"Despite the Hormuz blockade, Saudi Arabia continues to maintain oil exports from its Red Sea port of Yanbu via the restored East-West pipeline, providing a critical bypass route.",mk:"호르무즈 봉쇄에도 불구, 사우디는 복구된 동-서 파이프라인을 통해 홍해 얀부항에서 원유 수출 유지. 핵심 우회 경로 역할.",tg:["홍해","원유수출","얀부","파이프라인"],u:"https://www.bloomberg.com/news/articles/2026-04-10/saudi-maintains-oil-exports-from-key-red-sea-port-for-now"},
{id:195,p:9,r:"속보",t:"Middle East oil production plunges due to Iran war, OPEC data shows",k:"이란 전쟁으로 중동 원유 생산 급감, OPEC 데이터 확인",s:"CNBC",c:"global",d:"2026-04-13",m:"CNBC analysis of OPEC data showing Middle East oil production in freefall. Gulf states cut production as they cannot export through Hormuz. Saudi down 23%, Iraq 61%, Kuwait 53%, UAE 44%.",mk:"CNBC의 OPEC 데이터 분석, 중동 원유 생산 급감. 걸프국들 호르무즈 수출 불가로 감산. 사우디 -23%, 이라크 -61%, 쿠웨이트 -53%, UAE -44%.",tg:["OPEC","중동","감산","호르무즈"],u:"https://www.cnbc.com/2026/04/13/iran-war-oil-opec-production-decline.html"},
{id:196,p:9,r:"헤드라인",t:"Saudi Arabia says East-West pipeline restored to full capacity",k:"사우디, 동-서 파이프라인 완전 복구 공식 발표",s:"Bloomberg",c:"global",d:"2026-04-12",m:"Bloomberg reports Saudi Arabia has restored the full 7M bpd pumping capacity of its critical East-West pipeline after it was damaged in an Iranian drone attack on April 8.",mk:"블룸버그, 사우디가 4월 8일 이란 드론 공격으로 손상된 동-서 파이프라인의 일산 700만 배럴 펌핑 용량을 완전 복구했다고 보도.",tg:["파이프라인","복구","블룸버그","에너지"],u:"https://www.bloomberg.com/news/articles/2026-04-12/saudi-arabia-says-east-west-pipeline-restored-to-full-capacity"},
{id:197,p:8,r:"심층분석",t:"How Pakistan managed to get the US and Iran to a ceasefire",k:"파키스탄은 어떻게 미-이란 휴전을 이끌어냈나",s:"Al Jazeera",c:"me",d:"2026-04-10",m:"Detailed analysis of Pakistan&apos;s unique diplomatic role in brokering the two-week US-Iran ceasefire, leveraging its relationships with both Washington and Tehran.",mk:"파키스탄의 독특한 외교적 역할에 대한 심층 분석. 워싱턴과 테헤란 양측과의 관계를 활용해 미-이란 2주 휴전을 중재한 과정.",tg:["파키스탄","외교","휴전","중재"],u:"https://www.aljazeera.com/features/2026/4/8/how-pakistan-managed-to-get-the-us-and-iran-to-a-ceasefire"},
{id:198,p:10,r:"속보",t:"US and Iran fail to reach deal after marathon 21-hour talks in Pakistan",k:"미-이란, 파키스탄서 21시간 마라톤 협상 끝 합의 실패",s:"Al Jazeera",c:"me",d:"2026-04-12",m:"US Vice President JD Vance said Tehran refused to accept Washington&apos;s terms after 21 hours of negotiations in Islamabad. Major sticking points include Lebanon ceasefire and Hormuz control.",mk:"밴스 부통령, 이슬라마바드에서 21시간 협상 끝 테헤란이 워싱턴의 조건 거부했다고 발표. 레바논 휴전과 호르무즈 통제권이 주요 쟁점.",tg:["미국","이란","협상결렬","이슬라마바드"],u:"https://www.aljazeera.com/news/2026/4/12/us-and-iran-fail-to-reach-peace-deal-after-marathon-talks-in-pakistan"},
{id:199,p:9,r:"속보",t:"GCC nations react to Iran-US ceasefire: UAE demands unconditional Hormuz reopening",k:"GCC 국가들 미-이란 휴전 반응: UAE, 호르무즈 무조건 재개방 요구",s:"Al Jazeera",c:"gulf",d:"2026-04-10",m:"Gulf nations react cautiously to the Iran-US ceasefire. UAE demands full and unconditional reopening of Hormuz. Saudi Arabia calls for regional stability. Kuwait and Bahrain express relief but concern.",mk:"걸프 국가들 미-이란 휴전에 신중한 반응. UAE는 호르무즈의 완전하고 무조건적인 재개방을 요구. 사우디는 지역 안정 촉구. 쿠웨이트·바레인은 안도와 우려 동시 표명.",tg:["GCC","UAE","호르무즈","휴전"],u:"https://www.aljazeera.com/news/2026/4/8/gulf-arab-nations-react-to-iran-us-ceasefire-announcement"},
{id:200,p:9,r:"속보",t:"Gulf states report missile and drone attacks hours after Iran-US ceasefire",k:"걸프국들, 미-이란 휴전 수시간 만에 미사일·드론 공격 보고",s:"Al Jazeera",c:"gulf",d:"2026-04-10",m:"Saudi Arabia, UAE, Kuwait, Qatar and Bahrain reported missile and drone attacks on their territories hours after the Iran-US ceasefire announcement. UAE said air defences intercepted 9 ballistic missiles and 50 drones.",mk:"사우디·UAE·쿠웨이트·카타르·바레인, 미-이란 휴전 발표 수시간 만에 미사일·드론 공격 보고. UAE 방공망, 탄도미사일 9발·드론 50기 요격.",tg:["걸프","공격","휴전위반","방공"],u:"https://www.aljazeera.com/news/2026/4/8/uae-kuwait-bahrain-report-attacks-despite-iran-us-ceasefire"},
{id:201,p:8,r:"심층분석",t:"US-Iran ceasefire deal: What are the terms, and what&apos;s next?",k:"미-이란 휴전 합의: 조건은 무엇이고, 향후 전망은?",s:"Al Jazeera",c:"me",d:"2026-04-10",m:"Analysis of the two-week ceasefire terms: Iran to reopen Hormuz, mutual suspension of attacks. Key disputes include Lebanon inclusion, war reparations, and long-term Hormuz control.",mk:"2주 휴전 조건 분석: 이란의 호르무즈 재개방, 상호 공격 중단. 레바논 포함 여부, 전쟁배상금, 호르무즈 장기 통제권이 핵심 쟁점.",tg:["휴전","조건","호르무즈","분석"],u:"https://www.aljazeera.com/news/2026/4/8/us-iran-ceasefire-deal-what-are-the-terms-and-whats-next"},
{id:202,p:9,r:"헤드라인",t:"Trump warns Iran as US military blockade on Iranian ports takes effect",k:"트럼프, 미군 이란 항구 봉쇄 발효에 이란 경고",s:"CNN",c:"global",d:"2026-04-13",m:"CNN live updates as Trump warns Iran while US Navy blockade of Iranian ports takes effect. The blockade comes after ceasefire negotiations collapsed in Islamabad.",mk:"CNN 실시간 보도, 트럼프 대통령이 미 해군의 이란 항구 봉쇄 발효와 함께 이란에 경고. 이슬라마바드 휴전 협상 결렬 이후 봉쇄 단행.",tg:["트럼프","봉쇄","이란","CNN"],u:"https://www.cnn.com/2026/04/13/world/live-news/iran-us-war-trump-hormuz"},
{id:203,p:8,r:"심층분석",t:"Saudi Arabia&apos;s fears over &apos;fragile&apos; ceasefire between US and Iran",k:"사우디, 미-이란 &apos;취약한&apos; 휴전에 대한 우려",s:"CNN",c:"global",d:"2026-04-10",m:"CNN&apos;s Clarissa Ward reports from Saudi Arabia where anxiety is growing over the fragile ceasefire between the US and Iran after reports of Iranian strikes in the Gulf.",mk:"CNN 클라리사 워드 기자 사우디 현지 보도, 걸프 지역 이란 공습 보고 이후 미-이란 휴전의 취약성에 대한 불안감 확산.",tg:["사우디","휴전","불안","CNN"],u:"https://www.cnn.com/2026/04/08/world/video/saudi-arabia-ceasefire-us-iran-gulf-ward-vrtc"},
{id:204,p:8,r:"심층분석",t:"US-Iran peace talks underway in Islamabad, Trump says Hormuz being cleared",k:"미-이란 평화 회담 이슬라마바드서 개시, 트럼프 &apos;호르무즈 정리 중&apos;",s:"Al Arabiya",c:"me",d:"2026-04-11",m:"Al Arabiya reports on the highest-level US-Iranian talks in half a century as negotiators meet in Pakistan, while Trump claims the US military is clearing the Strait of Hormuz.",mk:"알 아라비야, 반세기 만의 최고위급 미-이란 회담이 파키스탄에서 개최됐다고 보도. 트럼프, 미군이 호르무즈 해협을 정리 중이라고 주장.",tg:["회담","이슬라마바드","호르무즈","알아라비야"],u:"https://english.alarabiya.net/News/middle-east/2026/04/11/iran-peace-talks-in-islamabad-have-begun"},
{id:205,p:8,r:"심층분석",t:"Iran attacks on crucial Saudi pipeline slash kingdom&apos;s oil output",k:"이란의 사우디 핵심 파이프라인 공격, 왕국 원유 생산량 급감",s:"CNBC",c:"global",d:"2026-04-10",m:"CNBC analysis of Iran&apos;s attack on Saudi Arabia&apos;s East-West pipeline, which cut capacity by 700,000 bpd and reduced overall kingdom output by 600,000 bpd.",mk:"CNBC, 이란의 사우디 동-서 파이프라인 공격 분석. 용량 70만 bpd 차질, 왕국 전체 산유량 60만 bpd 감소.",tg:["파이프라인","공격","CNBC","산유량"],u:"https://www.cnbc.com/2026/04/09/iran-war-oil-saudi-arabia-east-west-pipeline.html"},
{id:206,p:8,r:"심층분석",t:"Gulf energy infrastructure damage tracker: Full list of affected facilities",k:"걸프 에너지 인프라 피해 현황: 영향받은 시설 전체 목록",s:"gCaptain",c:"global",d:"2026-04-12",m:"Comprehensive tracking of energy infrastructure damaged across the Gulf during the 2026 Iran war, including Saudi Aramco facilities, UAE&apos;s ADNOC, and Iraqi oil terminals.",mk:"2026 이란 전쟁 중 걸프 지역 에너지 인프라 피해 종합 추적. 사우디 아람코 시설, UAE ADNOC, 이라크 석유 터미널 등 포함.",tg:["에너지","인프라","피해","걸프"],u:"https://gcaptain.com/heres-a-list-of-gulf-energy-infrastructure-damaged-in-iran-war/"},
{id:207,p:8,r:"심층분석",t:"Amid regional conflict, Strait of Hormuz remains critical oil chokepoint",k:"지역 분쟁 속 호르무즈 해협, 여전히 핵심 원유 병목지점",s:"EIA",c:"global",d:"2026-04-11",m:"US Energy Information Administration analysis: Hormuz facilitates transit of ~20M bpd, representing 20% of global seaborne oil trade. The blockade disrupts 12M bpd of crude flow.",mk:"미 에너지정보청(EIA) 분석: 호르무즈 해협은 일산 약 2,000만 배럴(전세계 해상 원유교역의 20%) 통과. 봉쇄로 1,200만 bpd 원유 흐름 차질.",tg:["EIA","호르무즈","원유","분석"],u:"https://www.eia.gov/todayinenergy/detail.php?id=65504"},
{id:208,p:9,r:"헤드라인",t:"Saudi Arabia and UAE edge toward joining war against Iran: WSJ report",k:"WSJ: 사우디·UAE, 이란과의 전쟁 참전에 한 걸음 더",s:"WSJ",c:"global",d:"2026-04-12",m:"Wall Street Journal reports Saudi and UAE have taken steps toward joining the Iran war. Saudi opened King Fahd air base to US forces. MBS reportedly eager to re-establish deterrence.",mk:"월스트리트저널, 사우디·UAE가 이란전 참전 방향으로 조치를 취했다고 보도. 사우디, 킹 파드 공군기지를 미군에 개방. MBS, 억지력 재확립 의지.",tg:["WSJ","참전","사우디","UAE"],u:"https://www.timesofisrael.com/liveblog_entry/wsj-saudi-arabia-and-uae-inching-toward-joining-fighting-against-iran/"},
{id:209,p:8,r:"주요경제",t:"War drags on, oil prices trap world economy: 32.5M poverty warning",k:"전쟁 장기화, 유가에 발목 잡힌 세계경제…3,250만 빈곤 경고",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-14",m:"Financial News reports prolonged Middle East war and high oil prices are constraining the global economy. World Bank warns 32.5 million additional people could fall into poverty.",mk:"파이낸셜뉴스, 중동전쟁 장기화와 고유가가 세계경제를 압박하고 있다고 보도. 세계은행, 3,250만 명 추가 빈곤층 전락 경고.",tg:["세계경제","유가","빈곤","세계은행"],u:"https://www.fnnews.com/news/202604140955153709"},
{id:210,p:9,r:"헤드라인",t:"Endless Middle East war clouds Korean economic outlook: 2% growth in jeopardy",k:"끝나지 않는 중동전쟁, 한국 경제전망 혼조…2% 성장 빨간불",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-13",m:"IMF expected to downgrade Korea&apos;s 2026 growth from 1.9%. OECD already cut forecast from 2.1% to 1.7%. Consumer sentiment index dropped 5.1 points, largest fall since Dec 2024 crisis.",mk:"IMF, 한국 2026년 성장률 1.9%에서 하향 전망. OECD는 이미 2.1%→1.7%로 하향. 소비자심리지수 5.1p 하락, 2024년 12월 비상계엄 이후 최대 낙폭.",tg:["한국경제","IMF","OECD","성장률"],u:"https://www.fnnews.com/news/202604130605543502"},
{id:211,p:9,r:"헤드라인",t:"Saudi Arabia seeks early delivery of Korean Cheonkung-II air defense system",k:"사우디, 한국 천궁-II 방공체계 조기 인도 타진",s:"헤럴드경제",c:"korean-view",d:"2026-04-13",m:"Saudi Arabia contacted Hanwha and LIG Nex1 to accelerate delivery of the Cheonkung-II (M-SAM) system. Gulf nations diversifying away from US weapons amid depleted air defense stockpiles.",mk:"사우디, 한화·LIG넥스원에 천궁-II(M-SAM) 인도 일정 앞당길 수 있는지 타진. 6주간의 전쟁으로 방공탄 재고 고갈, 걸프국들 미국 외 무기 조달처 다변화.",tg:["천궁","K방산","사우디","방공"],u:"https://biz.heraldcorp.com/article/10715381"},
{id:212,p:8,r:"주요경제",t:"Gulf nations turn to K-defense: Saudi, Qatar, UAE seek non-US weapons",k:"걸프국, K방산으로 눈 돌려…사우디·카타르·UAE 비미국산 무기 모색",s:"더구루",c:"korean-view",d:"2026-04-12",m:"As air defense ammunition depletes after 6 weeks of conflict, Gulf nations including Saudi Arabia, Qatar, and UAE are diversifying arms procurement toward South Korea, UK, and Ukraine.",mk:"6주간 분쟁으로 방공탄 고갈, 사우디·카타르·UAE 등 걸프국들이 한국·영국·우크라이나 등으로 무기 조달 다변화 추진.",tg:["K방산","걸프","무기","다변화"],u:"https://www.theguru.co.kr/news/article.html?no=100497"},
{id:213,p:8,r:"주요경제",t:"K-defense scores big: Large-scale export to Saudi Arabia",k:"K방산 또 잭팟…사우디에 대규모 수출",s:"서울경제",c:"korean-view",d:"2026-04-11",m:"Seoul Economic Daily reports on expanding K-defense exports to Saudi Arabia, with LIG Nex1&apos;s 4 trillion won Cheonkung-II deal leading to further interest from Gulf nations.",mk:"서울경제, K방산의 사우디 수출 확대 보도. LIG넥스원의 4조원 규모 천궁-II 수출 성공이 걸프국들의 추가 관심으로 이어지고 있다고 분석.",tg:["K방산","수출","천궁","LIG넥스원"],u:"https://www.sedaily.com/NewsView/29W2MDKF1Z"},
{id:214,p:7,r:"심층분석",t:"MBS eager to re-establish deterrence: Saudi patience with Iran &apos;not unlimited&apos;",k:"MBS, 억지력 재확립 의지…사우디의 이란에 대한 인내심 &apos;무한하지 않다&apos;",s:"The National",c:"gulf",d:"2026-04-12",m:"Saudi FM Faisal bin Farhan stated Saudi patience with Iranian attacks is not unlimited. MBS is reportedly close to a decision on joining attacks against Iran alongside the US and Israel.",mk:"파이살 빈 파르한 사우디 외무장관, 이란 공격에 대한 사우디의 인내심이 무한하지 않다고 발언. MBS, 미국·이스라엘과 함께 이란 공격 참여 결정에 근접한 것으로 전해짐.",tg:["MBS","이란","참전","외교"],u:"https://www.thenationalnews.com/business/energy/2026/04/12/saudi-arabia-restores-east-west-pipeline-capacity/"},
{id:215,p:8,r:"심층분석",t:"PwC Korea: Assessing economic impact of US-Iran military conflict on Korea",k:"삼일PwC: 미-이란 군사 충돌에 따른 한국 경제·산업 영향 점검",s:"PwC Korea",c:"korean-view",d:"2026-04-11",m:"PwC Korea publishes comprehensive assessment of the US-Iran conflict&apos;s impact on Korean economy, covering energy security, semiconductor supply chain, and export competitiveness.",mk:"삼일PwC, 미-이란 분쟁이 한국 경제에 미치는 영향 종합 진단 보고서 발표. 에너지 안보, 반도체 공급망, 수출 경쟁력 등 분석.",tg:["PwC","경제분석","에너지","반도체"],u:"https://www.pwc.com/kr/ko/insights/issue-brief/samilpwc_us-iran-conflict-economic-impact.pdf"},
{id:216,p:9,r:"속보",t:"Iran slams US Hormuz blockade as &apos;grave violation of sovereignty&apos;",k:"이란, 미국 호르무즈 봉쇄를 &apos;중대한 주권 침해&apos;로 규탄",s:"Al Arabiya",c:"me",d:"2026-04-13",m:"Iran condemned the US naval blockade around its ports as a grave violation of sovereignty. Tehran and Washington exchanged belligerent rhetoric as the fragile truce rattled further.",mk:"이란, 미 해군의 자국 항구 주변 봉쇄를 중대한 주권 침해로 규탄. 취약한 휴전이 더욱 흔들리는 가운데 테헤란과 워싱턴 간 호전적 발언 교환.",tg:["이란","봉쇄","주권","알아라비야"],u:"https://english.alarabiya.net/News/middle-east"},
{id:217,p:7,r:"심층분석",t:"World welcomes US-Iran ceasefire, urges lasting peace in Middle East",k:"국제사회, 미-이란 휴전 환영…중동 항구적 평화 촉구",s:"Al Jazeera",c:"me",d:"2026-04-10",m:"International community broadly welcomed the US-Iran ceasefire agreement, with world leaders urging both sides to work toward a lasting peace and full reopening of the Strait of Hormuz.",mk:"국제사회, 미-이란 휴전 합의를 폭넓게 환영. 각국 정상들, 양측에 항구적 평화와 호르무즈 해협 완전 재개방을 위한 노력 촉구.",tg:["국제사회","휴전","평화","호르무즈"],u:"https://www.aljazeera.com/news/2026/4/8/world-welcomes-us-iran-ceasefire-urges-lasting-peace-in-the-middle-east"},
{id:218,p:8,r:"심층분석",t:"UN-GCC cooperation: Security Council to hold landmark briefing under Bahrain presidency",k:"유엔-GCC 협력: 안보리, 바레인 의장국 하에 획기적 브리핑 개최",s:"Security Council Report",c:"gulf",d:"2026-04-13",m:"The UN Security Council is set to hold its first-ever focused meeting on UN-GCC cooperation during Bahrain&apos;s April presidency, reflecting the growing importance of Gulf states in global diplomacy.",mk:"유엔 안보리, 바레인의 4월 의장국 기간 중 유엔-GCC 협력에 초점을 맞춘 최초의 회의 개최 예정. 글로벌 외교에서 걸프국들의 중요성 증대 반영.",tg:["유엔","GCC","안보리","바레인"],u:"https://www.securitycouncilreport.org/monthly-forecast/2026-04/un-gcc-cooperation.php"},
{id:219,p:7,r:"심층분석",t:"Middle East conflict not ending soon: Oil prices could stay elevated for over a year",k:"중동 분쟁 조기 종결 어려워…유가 1년 이상 고공행진 전망",s:"MBC",c:"korean-view",d:"2026-04-12",m:"MBC analysis: even if the Middle East war ends, damaged energy infrastructure means oil prices will stay elevated for at least a year. Korea faces compound risks across energy and exports.",mk:"MBC 분석, 중동전쟁이 끝나더라도 파괴된 에너지 인프라로 유가가 최소 1년 이상 높은 수준 유지 전망. 한국, 에너지·수출 복합 리스크 직면.",tg:["유가","전망","에너지","한국"],u:"https://imnews.imbc.com/replay/2026/nwdesk/article/6809680_37004.html"},
{id:220,p:8,r:"심층분석",t:"Saudi Arabia races to reroute oil as Gulf storage fills fast",k:"사우디, 걸프 저장시설 포화 속 원유 우회 경로 확보 총력",s:"Bloomberg",c:"global",d:"2026-04-10",m:"Bloomberg reports Saudi Arabia is racing to reroute crude exports via alternative pipelines as onshore storage in the Gulf fills up rapidly due to the Hormuz blockade.",mk:"블룸버그, 호르무즈 봉쇄로 걸프 지역 육상 저장시설이 빠르게 포화되면서 사우디가 대체 파이프라인을 통한 원유 수출 우회에 총력을 기울이고 있다고 보도.",tg:["원유","우회","저장","블룸버그"],u:"https://www.bloomberg.com/news/articles/2026-03-05/saudi-arabia-races-to-reroute-oil-as-gulf-storage-fills-up-fast"},
{id:221,p:9,r:"헤드라인",t:"세계일보: 美 대신 K방공망 눈 돌린 걸프국…사우디 천궁-II 더 빨리 달라",k:"세계일보: 걸프국들 미국 대신 한국 방공망에 주목…사우디 천궁-II 조기 인도 요청",s:"세계일보",c:"korean-view",d:"2026-04-13",m:"Segye Ilbo reports Gulf nations are turning to Korean air defense systems as an alternative to US weapons. Saudi Arabia has requested accelerated delivery of the Cheonkung-II system.",mk:"세계일보, 걸프국들이 미국 무기 대안으로 한국 방공체계에 주목하고 있다고 보도. 사우디, 천궁-II 조기 인도 요청.",tg:["천궁","K방산","걸프","방공"],u:"https://segye.com/newsView/20260413517193"}
,
{id:222,p:8,r:"주요경제",t:"OPEC Output Falls by Nearly 8 Million BPD in March — Worst Supply Shock in Decades",k:"OPEC 3월 산유량 하루 800만 배럴 급감…수십 년래 최악의 공급충격",s:"The National",c:"gulf",d:"2026-04-13",m:"OPEC output fell by nearly 8 million barrels per day in March, the worst supply shock in decades, as Iran war disrupted exports from Iraq, Kuwait, UAE and Saudi Arabia.",mk:"이란 전쟁으로 OPEC 산유량이 3월에 하루 약 800만 배럴 급감해 수십 년 만에 최악의 공급 충격을 기록했다. 이라크·쿠웨이트·UAE·사우디 전반에서 수출 차질이 발생했다.",tg:["OPEC","원유","공급충격"],u:"https://www.thenationalnews.com/business/energy/2026/04/13/opecs-output-falls-by-nearly-8-million-bpd-in-march-in-the-worst-supply-shock-in-decades/"},
{id:223,p:7,r:"정책발표",t:"Saudi-Yemen Program Lays Foundation Stone for 100MW Power Plants in Hadramout",k:"사우디 예멘 개발 프로그램, 하드라마우트 100MW 발전소 기공식 거행",s:"SPA",c:"saudi",d:"2026-04-14",m:"The Saudi Program for the Development and Reconstruction of Yemen laid the foundation stone for power plants totaling 100 megawatts in Al-Mukalla, Hadramout, including the 40MW Jawl Masah and 60MW Ambikha stations.",mk:"사우디 예멘 개발재건 프로그램이 하드라마우트주 무칼라에서 총 100MW 규모의 발전소 기공식을 거행했다. 자울 마사흐(40MW)와 암비카(60MW) 발전소가 포함된다.",tg:["예멘","발전소","개발원조"],u:"https://www.arabnews.pk/node/2639788/saudi-arabia"},
{id:224,p:7,r:"심층분석",t:"Saudi FM Discusses Regional Developments with Jordanian and Pakistani Counterparts",k:"사우디 외무장관, 요르단·파키스탄 외무장관과 지역 정세 협의",s:"Arab News",c:"saudi",d:"2026-04-14",m:"Saudi Foreign Minister Prince Faisal bin Farhan discussed latest regional developments and coordination to reduce tensions with Jordan&apos;s Ayman Safadi and Pakistan&apos;s Ishaq Dar in separate phone calls.",mk:"파이살 빈 파르한 사우디 외무장관이 요르단·파키스탄 외무장관과 각각 전화통화를 갖고 중동 지역 긴장 완화를 위한 조율 방안을 논의했다.",tg:["외교","요르단","파키스탄"],u:"https://www.arabnews.pk/node/2639785/saudi-arabia"},
{id:225,p:7,r:"주요경제",t:"Saudia Restarts Daily Flights to Dubai and Abu Dhabi as Gulf Skies Stabilise",k:"사우디아 항공, 걸프 정세 안정화 속 두바이·아부다비 노선 재개",s:"Gulf News",c:"saudi",d:"2026-04-13",m:"Saudia resumed daily Jeddah-Dubai (SV588/589) and Jeddah-Abu Dhabi (SV570/571) flights from April 11, reversing a suspension imposed during the regional conflict. Schedules remain subject to further notice.",mk:"사우디아 항공이 4월 11일부터 제다-두바이 및 제다-아부다비 노선 일일 운항을 재개했다. 지역 분쟁으로 2월 28일 이후 중단됐던 UAE 노선이 정상화됐다.",tg:["항공","사우디아","UAE"],u:"https://gulfnews.com/world/gulf/saudi/uae-travel-saudia-announces-resumption-of-flights-to-dubai-abu-dhabi-and-amman-1.500502256"},
{id:226,p:8,r:"속보",t:"South Korea Dispatches Special Envoy to Iran to Negotiate Hormuz Ship Passage",k:"한국 정부, 이란에 특사 파견…억류 선박 통항 협상 착수",s:"서울신문",c:"korean-view",d:"2026-04-14",m:"South Korea dispatched Special Envoy Jeong Byung-ha to Iran to negotiate passage of 26 stranded Korean vessels through the Strait of Hormuz. The envoy arrived over the weekend and began high-level discussions.",mk:"한국 정부가 정병하 이란 특사를 파견해 호르무즈 해협에 억류된 선박 26척·선원 169명의 통항 문제 협상에 착수했다. 특사는 지난 주말 테헤란에 도착해 고위급 면담을 시작했다.",tg:["외교","이란","호르무즈"],u:"https://www.seoul.co.kr/news/politics/diplomacy/2026/04/14/20260414004004"},
{id:227,p:7,r:"속보",t:"US Reverse Blockade of Hormuz Complicates South Korea&apos;s Bid to Free Stranded Ships",k:"미국의 호르무즈 역봉쇄…한국 억류 선박 구출 협상 난관 봉착",s:"머니투데이",c:"korean-view",d:"2026-04-14",m:"The US naval counter-blockade of the Strait of Hormuz has complicated South Korea&apos;s diplomatic efforts to recover 26 stranded vessels and 169 crew members, forcing Seoul to navigate between US and Iranian positions.",mk:"미국이 호르무즈 해협에 역봉쇄를 단행하면서 한국 정부가 추진 중인 선박·선원 귀환 협상이 난관에 처했다. 미국과 이란 양측의 입장 사이에서 외교적 해법 모색이 쉽지 않은 상황이다.",tg:["호르무즈","한국선박","외교"],u:"https://www.mt.co.kr/world/2026/04/14/2026041320095976321"},
{id:228,p:7,r:"심층분석",t:"GCC Economy Grew 5.2% in Q3 2025, Showing Resilience Before Iran War",k:"GCC 경제, 2025년 3분기 5.2% 성장…이란 전쟁 이전 견고한 성장세",s:"The National",c:"gulf",d:"2026-04-13",m:"Real GDP across the six GCC nations grew 5.2% year-on-year in Q3 2025 to $474 billion, demonstrating broad-based economic strength before the Iran war disrupted regional growth trajectories.",mk:"GCC 6개국 실질 GDP가 2025년 3분기 전년 동기 대비 5.2% 성장해 4,740억 달러를 기록했다. 이란 전쟁이 지역 경제에 충격을 가하기 전 견고한 성장세를 보였다.",tg:["GCC","경제성장","GDP"],u:"https://www.thenationalnews.com/business/economy/2026/04/11/gulf-economy-grows-52-in-the-third-quarter-of-2025-on-balanced-sectors/"},
{id:229,p:6,r:"주요경제",t:"Hormuz Blockade Creates Winners and Losers Among Middle East Oil Exporters",k:"호르무즈 봉쇄, 중동 산유국 희비 갈려…사우디 반사이익 vs 이라크·쿠웨이트 직격",s:"Khaleej Times",c:"gulf",d:"2026-04-13",m:"The Strait of Hormuz closure benefits exporters with Red Sea access like Saudi Arabia via its East-West pipeline, while devastating Iraq, Kuwait and Qatar which lack alternative export routes.",mk:"호르무즈 해협 봉쇄로 동서 송유관을 통해 홍해 수출이 가능한 사우디아라비아는 반사이익을 얻은 반면, 이라크·쿠웨이트·카타르는 대체 수출 경로가 없어 직격탄을 맞고 있다.",tg:["호르무즈","원유수출","경제"],u:"https://moderndiplomacy.eu/2026/04/06/hormuz-blockade-creates-winners-and-losers-among-middle-east-oil-exporters/"},
{id:230,p:8,r:"헤드라인",t:"Fragile US-Iran Ceasefire Hangs in Balance as Hormuz Naval Blockade Escalates",k:"미-이란 취약한 휴전 존폐 기로…호르무즈 해군 봉쇄로 위기 고조",s:"Al Jazeera",c:"me",d:"2026-04-14",m:"The fragile US-Iran ceasefire faces its most severe test as the US naval blockade of Hormuz takes full effect. Iran threatened to impose transit fees and assert IRGC control over the strategic waterway.",mk:"미국 해군의 호르무즈 해협 봉쇄가 본격화되면서 취약한 미-이란 휴전이 최대 위기를 맞고 있다. 이란은 해협 통과세 부과와 IRGC의 해협 통제권 강화를 예고했다.",tg:["휴전","이란","호르무즈"],u:"https://www.aljazeera.com/amp/news/liveblog/2026/4/14/iran-war-live-trump-claims-tehran-wants-a-deal-amid-us-blockade-of-hormuz"},

{id:231,p:9,r:"헤드라인",t:"Saudi Arabia Ranks No.1 Globally in AI Security and Female Representation, Stanford Report",k:"사우디, AI 보안·여성 대표성 전 세계 1위…스탠퍼드 AI 인덱스 보고서",s:"Arab News",c:"saudi",d:"2026-04-15",m:"Saudi Arabia ranks first globally in AI security, privacy, and cryptography, and leads in female representation among AI inventors at 32.3%, according to Stanford University&apos;s 2026 AI Index Report. The report highlighted the $5 billion AWS-HUMAIN AI Zone initiative.",mk:"스탠퍼드대 2026 AI 인덱스 보고서에 따르면 사우디아라비아는 AI 보안·프라이버시·암호화 분야 전 세계 1위를 기록했으며, 여성 AI 발명가·저자 비중(32.3%)도 세계 최고 수준이다. 50억 달러 규모의 AWS-HUMAIN AI 존 구상도 주목받고 있다.",tg:["AI","비전2030","혁신"],u:"https://www.arabnews.com/node/2639943/saudi-arabia"},
{id:232,p:8,r:"정책발표",t:"Pakistan PM Shehbaz Sharif Visits Saudi Arabia Amid Iran War Diplomacy, Strategic Defence Pact",k:"파키스탄 총리 사우디 방문…이란 전쟁 외교·전략 상호방위조약 이행 논의",s:"Arab News",c:"saudi",d:"2026-04-15",m:"Pakistan PM Shehbaz Sharif arrived in Saudi Arabia to discuss bilateral ties and Iran war diplomacy. The two countries signed a Strategic Mutual Defence Agreement in 2025, with Pakistani Air Force units already deployed at King Abdulaziz Air Base in Saudi&apos;s Eastern Province.",mk:"파키스탄 샤바즈 샤리프 총리가 사우디아라비아를 방문해 양국 관계 및 이란 전쟁 외교를 논의했다. 양국은 2025년 전략 상호방위조약을 체결했으며, 파키스탄 공군 부대가 사우디 동부지방 킹 압둘아지즈 공군기지에 이미 배치돼 있다.",tg:["파키스탄","외교","방위조약"],u:"https://www.arabnews.com/node/2639517/pakistan"},
{id:233,p:8,r:"속보",t:"OPEC Middle East Production Plunges 27% as Iran War Disrupts Gulf Exports",k:"OPEC 중동 생산량 27% 급감…이란 전쟁으로 걸프 수출 대폭 차질",s:"Arab News",c:"saudi",d:"2026-04-14",m:"OPEC overall production plunged 27% month-on-month to 20.8 million bpd in April, with Saudi Arabia&apos;s output cut from 10.1 to 7.8 million bpd. The Iran war and Hormuz closure have severely disrupted Gulf state energy exports.",mk:"OPEC 전체 생산량이 4월 전월 대비 27% 급감해 2,080만 b/d를 기록했다. 사우디아라비아 생산량도 1,010만에서 780만 b/d로 줄었다. 이란 전쟁과 호르무즈 봉쇄가 걸프 산유국 에너지 수출에 심각한 차질을 빚고 있다.",tg:["OPEC","원유생산","이란전쟁"],u:"https://www.cnbc.com/2026/04/13/iran-war-oil-opec-production-decline.html"},
{id:234,p:8,r:"속보",t:"Saudi Arabia Boosts Alternative Oil Exports via Red Sea as Hormuz Remains Blocked",k:"사우디, 호르무즈 봉쇄 속 홍해 경유 대체 수출 강화",s:"Arab News",c:"saudi",d:"2026-04-14",m:"Saudi Arabia is rerouting oil exports through its East-West pipeline to the Red Sea as the Strait of Hormuz remains disrupted. The kingdom has fully restored East-West pipeline capacity to 7 million bpd following earlier Iranian attacks.",mk:"사우디아라비아가 호르무즈 해협 봉쇄 상황에서 동서 송유관을 통해 홍해로 원유를 우회 수출하는 방안을 강화하고 있다. 이란의 공격으로 타격을 받았던 동서 송유관은 700만 b/d 용량을 완전히 회복했다.",tg:["원유수출","동서송유관","홍해"],u:"https://oilprice.com/Latest-Energy-News/World-News/Saudi-Arabia-Boosting-Oil-Output-In-Anticipation-of-US-Attacks-On-Iran.html"},
{id:235,p:9,r:"정책발표",t:"Saudi Arabia Summons Iraqi Ambassador Over Drone Attacks Launched from Iraqi Territory",k:"사우디, 이라크 대사 초치…이라크 영토서 발사된 드론 공격에 강력 항의",s:"SPA",c:"saudi",d:"2026-04-12",m:"Saudi Arabia&apos;s Foreign Ministry summoned Iraq&apos;s ambassador to deliver a formal protest over drone attacks on Saudi Arabia and Gulf states launched from Iraqi territory. Deputy Minister Dr. Saud Al-Sati condemned the attacks in the strongest terms.",mk:"사우디아라비아 외무부가 이라크 대사를 초치해 이라크 영토에서 발사된 드론 공격에 대해 강력히 항의했다. 알사티 외무 차관이 직접 이라크 대사를 불러 공식 항의문서를 전달했다.",tg:["이라크","드론공격","외교"],u:"https://www.globalsecurity.org/wmd/library/news/saudi/2026/saudi-260412-spa01.htm"},
{id:236,p:7,r:"속보",t:"Pakistani Military Force Arrives at Saudi Air Base Under Strategic Defence Agreement",k:"파키스탄 군 전력 사우디 공군기지 도착…전략 상호방위협정 이행",s:"SPA",c:"saudi",d:"2026-04-11",m:"Saudi Arabia&apos;s Ministry of Defense confirmed the arrival of a Pakistani military force including fighter and support aircraft at King Abdulaziz Air Base in the Eastern Province, under the Strategic Mutual Defence Agreement signed in September 2025.",mk:"사우디아라비아 국방부가 2025년 9월 체결된 전략 상호방위협정에 따라 파키스탄 공군 전투기 및 지원기가 동부지방 킹 압둘아지즈 공군기지에 도착했음을 확인했다.",tg:["파키스탄","방위","군사"],u:"https://www.globalsecurity.org/wmd/library/news/saudi/2026/saudi-260411-spa01.htm"},
{id:237,p:7,r:"속보",t:"Severe Flash Flooding Hits Riyadh and Eastern Saudi Arabia, Schools Shut for Days",k:"사우디 리야드·동부 지방 폭우·홍수 강타…학교 수일간 휴교",s:"Saudi Gazette",c:"saudi",d:"2026-04-13",m:"Torrential rains and flash flooding swept Riyadh and eastern Saudi Arabia on April 11-13, forcing schools and universities to close and switch to remote learning. The NCM recorded 65.6mm of rainfall at Abha airport, the season&apos;s highest. Red Crescent deployed 143 ambulances.",mk:"4월 11~13일 집중호우와 홍수가 리야드와 동부 지방을 강타해 학교·대학이 휴교하고 원격수업으로 전환됐다. 기상청은 아브하 공항에서 65.6mm 강수를 기록해 올 시즌 최고치를 나타냈다. 적신월사가 구급차 143대를 투입했다.",tg:["홍수","리야드","기상"],u:"https://watchers.news/2026/04/13/severe-flash-flooding-disrupts-riyadh-saudi-arabia-school-closures-april-2026/"},
{id:238,p:7,r:"정책발표",t:"Saudi Arabia Bans Expats from Entering Makkah Without Permit as Hajj 2026 Approaches",k:"사우디, 허가증 없는 외국인 메카 입장 전면 금지…2026년 하지 시즌 대비",s:"Saudi Gazette",c:"saudi",d:"2026-04-13",m:"Saudi Arabia barred expatriates without official Hajj permits from entering Makkah effective April 13, as part of Hajj 2026 preparations. Violations carry a SAR 20,000 fine, deportation, and a 10-year entry ban. Umrah visas will be suspended from April 18.",mk:"사우디아라비아가 2026년 하지 준비 일환으로 4월 13일부터 공식 허가증 없는 외국인의 메카 입장을 전면 금지했다. 위반 시 2만 리얄 벌금·추방·10년 입국 금지 처분이 내려진다. 4월 18일부터는 우므라 비자도 중단된다.",tg:["하지","메카","종교"],u:"https://gulfnews.com/world/gulf/saudi/makkah-entry-restricted-saudi-arabia-bans-expatriates-without-permit-from-april-13-1.500504870"},
{id:239,p:8,r:"주요경제",t:"IMF Cuts Saudi Arabia GDP Forecast to 3.1% for 2026 Amid Iran War Disruptions",k:"IMF, 이란 전쟁 여파로 사우디 2026년 성장률 전망 3.1%로 하향",s:"Argaam",c:"saudi",d:"2026-04-14",m:"The IMF cut Saudi Arabia&apos;s 2026 GDP growth forecast by 1.4 percentage points to 3.1%, down from the 4.5% projected in January, due to the Iran war and Hormuz disruptions. The 2027 outlook was revised up to 4.5% assuming a quick resolution.",mk:"IMF가 이란 전쟁과 호르무즈 봉쇄 여파를 반영해 사우디아라비아의 2026년 GDP 성장률 전망을 기존 4.5%에서 3.1%로 1.4%p 하향 조정했다. 2027년 전망은 분쟁 조기 종식을 가정해 4.5%로 상향했다.",tg:["IMF","GDP","경제전망"],u:"https://www.argaam.com/en/article/articledetail/id/1896407"},
{id:240,p:7,r:"정책발표",t:"Saudi Finance Minister Leads Delegation to IMF-World Bank Spring Meetings in Washington",k:"사우디 재무장관, IMF·세계은행 봄 총회 대표단 이끌고 워싱턴 방문",s:"Argaam",c:"saudi",d:"2026-04-14",m:"Saudi Finance Minister Mohammed Aljadaan heads the Kingdom&apos;s delegation to the 2026 IMF-WBG Spring Meetings in Washington D.C., April 13-18. Key discussions focus on the global economic fallout from the Iran war and Strait of Hormuz disruptions.",mk:"무함마드 알자단 사우디 재무장관이 4월 13~18일 워싱턴에서 열리는 2026년 IMF·세계은행 봄 총회에 왕국 대표단을 이끌고 참석했다. 이란 전쟁과 호르무즈 봉쇄에 따른 세계 경제 영향이 주요 의제다.",tg:["IMF","세계은행","재무"],u:"https://www.argaam.com/en/article/articledetail/id/1895674"},
{id:241,p:8,r:"심층분석",t:"Saudi Arabia&apos;s East-West Pipeline Restored to Full 7 Million bpd Capacity After Iranian Attacks",k:"사우디 동서 송유관, 이란 공격 피해 복구…700만 b/d 전용량 회복",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-12",m:"Saudi Arabia restored full pumping capacity on the East-West pipeline to 7 million barrels per day, recovering the 700,000 bpd lost when Iran struck pumping stations during the ceasefire period. The pipeline is the kingdom&apos;s key bypass to the Red Sea.",mk:"사우디아라비아가 이란의 공격으로 줄어들었던 동서 송유관 수송 용량을 700만 b/d로 완전히 회복했다. 이 송유관은 호르무즈를 우회해 홍해로 원유를 수송하는 핵심 인프라다.",tg:["동서송유관","이란전쟁","에너지"],u:"https://www.thenationalnews.com/business/energy/2026/04/12/saudi-arabia-restores-east-west-pipeline-capacity/"},
{id:242,p:7,r:"주요경제",t:"Saudi Arabia Approves Regulations for Four Special Economic Zones Effective April 2026",k:"사우디, 4개 특별경제구역 규정 승인…2026년 4월 발효",s:"Saudi Gazette",c:"saudi",d:"2026-04-14",m:"Saudi Arabia approved operating regulations for four special economic zones as part of Vision 2030 efforts to attract foreign investment and diversify the economy beyond oil.",mk:"사우디아라비아가 비전 2030 비석유 경제 다변화 및 외국인 투자 유치의 일환으로 4개 특별경제구역 운영 규정을 승인해 2026년 4월부터 발효됐다.",tg:["비전2030","특별경제구역","투자"],u:"https://saudigazette.com.sa/article/657879/SAUDI-ARABIA/Saudi-Arabia-approves-regulations-for-four-special-economic-zones"},
{id:243,p:7,r:"심층분석",t:"Saudi Arabia Intensifies Regional Diplomacy to Ease Iran War Tensions",k:"사우디, 이란 전쟁 긴장 완화 위한 집중 외교 활동 전개",s:"Arab News",c:"saudi",d:"2026-04-14",m:"Saudi Arabia has intensified diplomatic activity over the past 48 hours, holding a series of consultations with regional and international partners aimed at reducing tensions and coordinating efforts to resolve the Iran war conflict.",mk:"사우디아라비아가 지난 48시간 동안 이란 전쟁 긴장 완화와 분쟁 해결을 위해 지역 및 국제 파트너들과 집중적인 협의 활동을 벌이고 있다.",tg:["외교","이란전쟁","사우디"],u:"https://www.arabnews.com/saudiarabia"},
{id:244,p:8,r:"주요경제",t:"Saudi Arabia IMF Spring Meetings: GDP Cut Reflects Oil Revenue Shock from Hormuz Crisis",k:"IMF 봄 총회 핵심 의제로 사우디 경제충격…호르무즈 위기로 석유수입 급감",s:"Argaam",c:"saudi",d:"2026-04-15",m:"The Saudi economy faces significant oil revenue shocks as Hormuz disruptions have cut kingdom&apos;s exportable volumes drastically. Discussions at the IMF Spring Meetings in Washington center on Gulf state fiscal responses to the energy crisis.",mk:"호르무즈 해협 봉쇄로 사우디의 원유 수출 가능 물량이 크게 줄면서 석유 수입에 심각한 충격이 발생하고 있다. 워싱턴 IMF 봄 총회에서는 걸프 산유국의 에너지 위기 재정 대응이 핵심 의제로 다뤄지고 있다.",tg:["IMF","경제충격","원유"],u:"https://www.argaam.com/en/article/sectionarticles/sectionid/138/marketid/3/pageno/1/main-news-saudi"},
{id:245,p:7,r:"정책발표",t:"Hajj 2026: Saudi Arabia Suspends Umrah Visas from April 18 as Pilgrimage Season Nears",k:"2026 하지: 사우디, 4월 18일부터 우므라 비자 발급 중단…순례 시즌 본격 준비",s:"Saudi Gazette",c:"saudi",d:"2026-04-13",m:"Saudi Arabia will suspend Umrah visa issuance from April 18 until May 31 as Hajj season preparations intensify. The Hajj is expected to commence around May 25, with only valid Hajj visa or permit holders permitted to perform the pilgrimage.",mk:"사우디아라비아가 하지 시즌 준비 강화의 일환으로 4월 18일부터 5월 31일까지 우므라 비자 발급을 중단한다. 하지는 5월 25일경 시작될 예정이며, 유효한 하지 비자 또는 허가증 보유자만 순례가 허용된다.",tg:["하지","우므라","메카"],u:"https://www.khaleejtimes.com/world/gulf/saudi-arabia-hajj-2026-season-rules-makkah-entry-umrah-permits-suspended"},
{id:246,p:8,r:"주요경제",t:"IMF Cuts Middle East and North Africa Growth Forecast to 1.1% Over Iran War Shock",k:"IMF, 이란 전쟁 충격으로 중동·북아프리카 성장률 전망 1.1%로 대폭 하향",s:"The National",c:"gulf",d:"2026-04-14",m:"The IMF cut the 2026 growth forecast for the Middle East and North Africa by 2.8 percentage points to 1.1%, citing the Iran war&apos;s impact on energy exports and investment flows. Saudi Arabia and UAE face 3.1% and similar reduced growth paths.",mk:"IMF가 이란 전쟁의 에너지 수출·투자 위축 영향을 반영해 중동·북아프리카의 2026년 성장률 전망을 2.8%p 낮춰 1.1%로 제시했다. 사우디와 UAE는 각각 3.1% 안팎의 하향 조정된 성장경로를 걷게 됐다.",tg:["IMF","중동경제","성장률"],u:"https://www.thenationalnews.com/business/economy/2026/04/14/imf-lowers-middle-east-growth-forecast-over-iran-war-shock/"},
{id:247,p:7,r:"정책발표",t:"Makkah Entry Restricted: Saudi Arabia Bans Expatriates Without Hajj Permits Starting April 13",k:"메카 입장 제한: 4월 13일부터 허가증 없는 외국인 출입 금지",s:"Gulf News",c:"gulf",d:"2026-04-13",m:"Saudi Arabia enforced new entry restrictions on Makkah from April 13, barring expatriates and residents without official Hajj permits from entering the holy city. The ban is part of Hajj 1447/2026 crowd management measures.",mk:"사우디아라비아가 4월 13일부터 공식 하지 허가증 없는 외국인의 메카 입장을 금지하는 새로운 규정을 시행했다. 이는 하지 1447/2026년 군중 관리 대책의 일환이다.",tg:["메카","하지","입장금지"],u:"https://gulfnews.com/world/gulf/saudi/makkah-entry-restricted-saudi-arabia-bans-expatriates-without-permit-from-april-13-1.500504870"},
{id:248,p:7,r:"속보",t:"UAE Resumes Limited Air Traffic as Regional Skies Slowly Stabilise After Iran War",k:"UAE, 이란 전쟁 이후 역내 항공 정상화 속 제한적 운항 재개",s:"Khaleej Times",c:"gulf",d:"2026-04-15",m:"The UAE is gradually resuming air traffic operations as regional aviation stabilises following the Iran war. Etihad Airways announced expansion of its China network with five new routes and 28 additional weekly flights, signalling recovery in international connectivity.",mk:"이란 전쟁 이후 역내 항공이 서서히 정상화되면서 UAE가 제한적인 운항 재개에 나섰다. 에티하드 항공은 중국 노선 5개를 신규 개설하고 주 28편을 추가하는 네트워크 확장을 발표하며 국제 노선 회복을 예고했다.",tg:["UAE","항공","에티하드"],u:"https://www.khaleejtimes.com/uae"},
{id:249,p:8,r:"속보",t:"Saudi Arabia Restores East-West Pipeline to Full Capacity, Boosting Red Sea Oil Exports",k:"사우디, 동서 송유관 완전 복구…홍해 원유 수출 정상화",s:"The National",c:"gulf",d:"2026-04-12",m:"Saudi Arabia confirmed restoration of the East-West pipeline to its full 7 million bpd capacity following Iranian attacks, enabling the kingdom to maximize oil exports through the Red Sea route that bypasses the blocked Strait of Hormuz.",mk:"사우디아라비아가 이란의 공격으로 손상된 동서 송유관을 700만 b/d 전용량으로 완전히 복구했다고 확인했다. 이로써 호르무즈 봉쇄 우회 경로인 홍해를 통한 원유 수출을 최대화할 수 있게 됐다.",tg:["사우디","동서송유관","수출"],u:"https://www.thenationalnews.com/business/energy/2026/04/12/saudi-arabia-restores-east-west-pipeline-capacity/"},
{id:250,p:7,r:"심층분석",t:"Japan and Oman Agree to Cooperate on Hormuz De-escalation, Safe Navigation Restoration",k:"일본·오만, 호르무즈 긴장 완화·안전 항행 회복 협력 합의",s:"Gulf Times",c:"gulf",d:"2026-04-14",m:"Japan PM Takaichi held a phone call with Oman&apos;s Sultan Haitham, agreeing to cooperate on de-escalating the Hormuz crisis and restoring safe navigation. Oman expressed willingness to facilitate diplomacy and protect Japanese nationals in the region.",mk:"다카이치 일본 총리가 오만 하이삼 국왕과 전화통화를 갖고 호르무즈 긴장 완화 및 안전 항행 회복을 위한 협력에 합의했다. 오만 측은 외교 중재 의지와 역내 일본인 보호 의지를 표명했다.",tg:["일본","오만","호르무즈"],u:"https://www.nippon.com/en/news/yjj2026041400939/"},
{id:251,p:7,r:"속보",t:"Gulf Economies One Month into Iran War: Combined GDP Loss Reaches $20-25 Billion",k:"이란 전쟁 한 달…걸프 3국 GDP 손실 200~250억 달러 추산",s:"The National",c:"gulf",d:"2026-04-14",m:"Saudi Arabia, UAE and Qatar have suffered combined direct and indirect damage estimated at $20-25 billion one month into the Iran war, reflecting lost energy revenue and damage to the Gulf&apos;s reputation for stability that has hurt investment flows.",mk:"이란 전쟁 발발 한 달 만에 사우디아라비아·UAE·카타르가 입은 직간접 손실이 200~250억 달러에 이르는 것으로 추정된다. 에너지 수입 손실과 안정성 훼손으로 인한 투자 감소가 주요 요인이다.",tg:["걸프","경제손실","이란전쟁"],u:"https://www.ynetnews.com/business/article/rk7u9kpj11g"},
{id:252,p:10,r:"헤드라인",t:"Trump Says Iran War &apos;Close to Over&apos; as US Hints at Second Round of Talks",k:"트럼프 &apos;이란 전쟁 거의 끝나간다&apos;…2차 협상 재개 시사",s:"Al Jazeera",c:"me",d:"2026-04-15",m:"US President Trump told Fox News that the war is &apos;close to over&apos; after hinting at a second round of face-to-face talks with Iran in Pakistan. The US Hormuz blockade continued for a second day as Pakistan pushed to revive negotiations before the April 21 ceasefire expiry.",mk:"트럼프 미국 대통령이 폭스뉴스에서 &apos;전쟁이 거의 끝나간다&apos;고 밝히며 파키스탄에서의 2차 대면 협상 재개를 시사했다. 미국의 호르무즈 봉쇄가 이틀째 계속되는 가운데 파키스탄은 4월 21일 휴전 만료 전 협상 재개를 위해 중재 노력을 강화하고 있다.",tg:["이란전쟁","협상","트럼프"],u:"https://www.aljazeera.com/news/liveblog/2026/4/15/iran-war-live-trump-hints-at-second-round-of-talks-israel-pounds-lebanon"},
{id:253,p:9,r:"주요경제",t:"IEA: Iran War Wipes Out 2026 Global Oil Demand Growth, First Decline Since 2020",k:"IEA: 이란 전쟁, 2026년 세계 석유수요 증가분 전량 소멸…코로나 이후 첫 감소",s:"Al Jazeera",c:"me",d:"2026-04-14",m:"The IEA&apos;s April 2026 Oil Market Report projects global oil demand will fall by 80,000 bpd this year, the first decline since the COVID-19 pandemic, as the Iran war disrupts energy supply chains. Global supply plummeted 10.1 mbd in March to 97 mbd.",mk:"IEA 2026년 4월 석유시장 보고서는 이란 전쟁으로 에너지 공급망이 혼란에 빠지면서 올해 세계 석유수요가 8만 b/d 감소해 코로나19 이후 첫 감소를 기록할 것으로 전망했다. 3월 세계 공급량은 10.1mbd 급감해 9,700만 b/d로 줄었다.",tg:["IEA","석유수요","이란전쟁"],u:"https://www.aljazeera.com/news/2026/4/14/global-oil-demand-to-plunge-amid-middle-east-war-disruptions"},
{id:254,p:8,r:"속보",t:"Saudi Arabia Summons Iraq&apos;s Envoy Over Drone Attacks, First Such Diplomatic Move Since 2019",k:"사우디, 이라크 대사 초치…2019년 이후 첫 대이라크 외교적 책임 추궁",s:"Al Arabiya",c:"me",d:"2026-04-12",m:"Saudi Arabia summoned Iraq&apos;s ambassador over drone attacks targeting the kingdom and Gulf states launched from Iraqi territory. It was the first bilateral accountability move since 2019, timed to when the Islamabad ceasefire framework collapsed.",mk:"사우디아라비아가 이라크 영토에서 발사된 드론 공격과 관련해 이라크 대사를 초치했다. 이는 2019년 이후 처음으로 이라크에 직접적인 외교적 책임을 추궁한 조치로, 이슬라마바드 휴전 협상 붕괴와 같은 시점에 이뤄졌다.",tg:["이라크","드론","외교"],u:"https://english.alarabiya.net/News/middle-east/2026/04/12/saudi-arabia-summons-iraq-s-envoy-over-drone-attacks-from-iraqi-territory"},
{id:255,p:9,r:"속보",t:"Iran Delegation Reportedly Attacked En Route to Islamabad Talks; Regime Re-Arming",k:"이란 대표단, 이슬라마바드 회담 이동 중 피격 보도…이란 재무장 움직임",s:"Jerusalem Post",c:"me",d:"2026-04-14",m:"Reports emerged that an Iranian diplomatic delegation was attacked en route to the Islamabad peace talks. Meanwhile, Iranian regime sources say Tehran does not trust the US and is preparing for the next round of war, with accelerated re-arming efforts.",mk:"이란 외교 대표단이 이슬라마바드 평화회담으로 이동하던 중 공격을 받았다는 보도가 나왔다. 이란 정권 측 소식통은 테헤란이 미국을 신뢰하지 않으며 차기 전쟁을 대비해 재무장을 서두르고 있다고 밝혔다.",tg:["이란","협상","재무장"],u:"https://www.jpost.com/middle-east/iran-news/article-892933"},
{id:256,p:9,r:"헤드라인",t:"Israel and Lebanon Hold First Direct Talks in Decades in Washington, Agree to Continue",k:"이스라엘·레바논, 수십 년 만에 첫 직접 회담…지속 협상 합의",s:"Al Jazeera",c:"me",d:"2026-04-14",m:"Israel and Lebanon held their first direct bilateral talks since 1993 in Washington, brokered by the US, with Lebanon seeking a ceasefire and Israel demanding Hezbollah disarmament. Both sides agreed to hold further negotiations at a mutually agreed time.",mk:"이스라엘과 레바논이 미국의 중재 하에 1993년 이후 처음으로 워싱턴에서 직접 양자 회담을 가졌다. 레바논은 휴전을, 이스라엘은 헤즈볼라 무장해제를 요구하며 향후 협상 지속에 합의했다.",tg:["이스라엘","레바논","휴전"],u:"https://www.aljazeera.com/news/2026/4/14/israel-lebanon-direct-talks-in-the-us-all-to-know"},
{id:257,p:8,r:"심층분석",t:"Pakistan Balancing Act: Saudi Defence Commitments vs US-Iran Mediation Role",k:"파키스탄의 줄타기: 사우디 방위 공약 vs 미-이란 중재자 역할",s:"Al Jazeera",c:"me",d:"2026-04-14",m:"Pakistan faces a difficult balancing act between its Strategic Mutual Defence Agreement with Saudi Arabia and its role as mediator in US-Iran talks. Analysts question whether Pakistan can maintain both roles as tensions escalate.",mk:"파키스탄이 사우디아라비아와의 전략 상호방위협정 이행 의무와 미-이란 회담 중재자 역할 사이에서 어려운 줄타기를 하고 있다. 전문가들은 긴장 고조 속에서 파키스탄이 두 역할을 동시에 수행할 수 있을지 의문을 제기하고 있다.",tg:["파키스탄","외교","중재"],u:"https://www.aljazeera.com/news/2026/4/14/can-pakistan-juggle-us-iran-mediation-with-saudi-defence-commitments"},
{id:258,p:9,r:"주요경제",t:"IEA: Iran War Represents Largest Oil Supply Disruption in History of Global Markets",k:"IEA: 이란 전쟁, 세계 석유시장 역사상 최대 공급 차질 사태",s:"Bloomberg",c:"global",d:"2026-04-14",m:"The IEA characterized the Strait of Hormuz disruption as the &apos;largest supply disruption in the history of the global oil market&apos;. Global oil supply plummeted 10.1 million bpd in March, with shipments through Hormuz falling from 20+ million bpd to 3.8 million bpd in April.",mk:"IEA가 호르무즈 해협 봉쇄 사태를 &apos;세계 석유시장 역사상 최대 공급 차질&apos;로 규정했다. 3월 세계 석유 공급량은 1,010만 b/d 급감했으며, 호르무즈 해협 물동량은 2월 2,000만 b/d에서 4월 380만 b/d로 폭락했다.",tg:["IEA","석유공급","호르무즈"],u:"https://www.bloomberg.com/news/articles/2026-04-14/iran-war-wipes-out-global-oil-demand-growth-this-year-iea-says"},
{id:259,p:9,r:"헤드라인",t:"Trump Hints Second Round of US-Iran Talks as Hormuz Blockade Enters Day Two",k:"트럼프, 2차 미-이란 회담 암시…호르무즈 봉쇄 이틀째",s:"CNN",c:"global",d:"2026-04-15",m:"President Trump hinted at a second round of peace negotiations with Iran as the US naval blockade of the Strait of Hormuz entered its second day. Officials said VP Vance could lead a new round of talks if Iran signals readiness before the April 21 ceasefire expiry.",mk:"트럼프 대통령이 미국 해군의 호르무즈 봉쇄가 이틀째 계속되는 가운데 이란과의 2차 평화 협상 재개를 시사했다. 4월 21일 휴전 만료 전 이란이 협상 의지를 보이면 밴스 부통령이 새 회담을 이끌 것으로 알려졌다.",tg:["미국","이란","협상"],u:"https://www.cnn.com/2026/04/14/world/live-news/iran-war-blockade-us-trump"},
{id:260,p:8,r:"속보",t:"US Blockade of Iranian Ports in Hormuz Takes Full Effect; Oil Prices Surge Past $100",k:"미국의 이란 항구 해상봉쇄 발효…유가 배럴당 100달러 돌파",s:"CNBC",c:"global",d:"2026-04-13",m:"The US naval blockade of Iranian ports in the Strait of Hormuz took full effect after peace talks in Pakistan collapsed. Oil prices surged past $100 per barrel, with Brent and WTI both spiking as markets priced in prolonged supply disruptions.",mk:"파키스탄 평화회담 결렬 후 미국 해군의 이란 항구 호르무즈 해상봉쇄가 본격 발효됐다. 공급 차질 장기화 우려로 브렌트유와 WTI 모두 배럴당 100달러를 돌파했다.",tg:["봉쇄","유가","호르무즈"],u:"https://www.cnbc.com/2026/04/12/oil-prices-iran-war-strait-hormuz-blockade.html"},
{id:261,p:8,r:"주요경제",t:"IEA Oil Market Report April 2026: Supply Shock Greatest Since OPEC Embargo, Demand Falls",k:"IEA 4월 석유시장 보고서: OPEC 엠바고 이후 최대 공급 충격, 수요 감소",s:"IEA",c:"global",d:"2026-04-14",m:"The IEA April 2026 Oil Market Report forecasts global oil demand contracting by 80,000 bpd, the first decline since COVID-19. A forecast 1.5 mbd Q2 2026 decline would be the sharpest since the pandemic. Resuming Hormuz flows remains the key variable.",mk:"IEA 2026년 4월 석유시장 보고서는 세계 석유수요가 8만 b/d 감소해 코로나19 이후 첫 감소를 기록할 것으로 전망했다. 2026년 2분기 수요는 150만 b/d 줄어 팬데믹 이후 최대 감소 폭을 기록할 전망이다.",tg:["IEA","석유시장","공급충격"],u:"https://www.iea.org/reports/oil-market-report-april-2026"},
{id:262,p:8,r:"속보",t:"US and Iran Mutually Block Oil Exports as Global Economy Takes Hit, NPR Reports",k:"미-이란 상호 원유수출 차단…세계 경제에 직격탄",s:"NPR",c:"global",d:"2026-04-14",m:"The US blockade of Iranian oil exports and Iran&apos;s earlier Hormuz closures have effectively created a mutual oil embargo, delivering the largest supply shock to the global economy since the 1973 oil crisis, according to NPR&apos;s economic analysis.",mk:"미국의 이란 원유수출 봉쇄와 이란의 호르무즈 폐쇄가 사실상의 상호 석유 엠바고를 형성해 1973년 석유위기 이후 최대 공급 충격을 세계 경제에 가하고 있다고 NPR이 분석했다.",tg:["석유","공급충격","세계경제"],u:"https://www.npr.org/2026/04/14/nx-s1-5784042/u-s-and-iran-block-oil-exports-as-rest-of-the-world-takes-economic-hit"},
{id:263,p:8,r:"심층분석",t:"Why Iran-US Peace Talks in Islamabad Failed: Nuclear Enrichment and Regime Distrust",k:"이슬라마바드 미-이란 평화회담 결렬 이유: 핵 농축 이견과 정권 상호불신",s:"Time",c:"global",d:"2026-04-13",m:"The 21-hour marathon talks in Islamabad collapsed over Iran&apos;s insistence on maintaining uranium enrichment rights and deep mutual distrust. Iranian side cited US &apos;excessive demands&apos; while VP Vance said his &apos;final and best offer&apos; was still on the table.",mk:"이슬라마바드 21시간 마라톤 협상이 우라늄 농축 권리에 대한 이란의 고집과 깊은 상호불신으로 결렬됐다. 이란 측은 미국의 &apos;과도한 요구&apos;를 비난했고, 밴스 부통령은 자신의 &apos;최종·최선 제안&apos;이 여전히 유효하다고 밝혔다.",tg:["이란핵","협상결렬","외교"],u:"https://time.com/article/2026/04/13/iran-US-peace-talks-islamabad-war-nuclear/"},
{id:264,p:9,r:"헤드라인",t:"IMF Slashes Global Growth Forecast on Iran War; Middle East Takes Biggest Hit",k:"IMF, 이란 전쟁으로 세계 성장률 전망 대폭 삭감…중동이 최대 피해",s:"Reuters",c:"global",d:"2026-04-14",m:"The IMF cut its 2026 global growth forecast, with the Middle East and North Africa forecast slashed by 2.8 percentage points to 1.1%. Saudi Arabia&apos;s forecast was cut from 4.5% to 3.1%, while the IEA warned of the sharpest oil supply disruption in history.",mk:"IMF가 이란 전쟁을 반영해 2026년 세계 성장률 전망을 대폭 낮췄다. 중동·북아프리카 전망이 2.8%p 삭감돼 1.1%가 됐으며, 사우디아라비아는 4.5%에서 3.1%로 낮아졌다.",tg:["IMF","경제전망","이란전쟁"],u:"https://www.rte.ie/news/business/2026/0414/1568200-imf-cuts-world-economic-outlook/"},
{id:265,p:8,r:"속보",t:"White House: More US-Iran Peace Talks Under Discussion as Ceasefire Clock Ticks",k:"백악관: 추가 미-이란 평화회담 논의 중…휴전 만료 카운트다운",s:"CNBC",c:"global",d:"2026-04-14",m:"The White House confirmed that additional US-Iran peace talks are under discussion as the two-week ceasefire approaches its April 21 expiry. President Trump and VP Vance are open to resuming in-person talks if Iran signals readiness to meet key demands.",mk:"백악관은 2주 휴전이 4월 21일 만료를 앞둔 가운데 추가 미-이란 평화회담이 논의 중이라고 확인했다. 트럼프 대통령과 밴스 부통령은 이란이 핵심 요구 수용 의지를 보이면 대면 협상에 임할 준비가 돼 있다고 밝혔다.",tg:["미국","이란","휴전"],u:"https://www.cnbc.com/2026/04/14/trump-iran-war-strait-of-hormuz-negotiations.html"},
{id:266,p:8,r:"심층분석",t:"Oil Could Hit $200 a Barrel If Hormuz Crisis Persists, Wall Street and US Officials Warn",k:"호르무즈 위기 지속 시 유가 200달러 가능…월가·미국 당국자 경고",s:"Bloomberg",c:"global",d:"2026-04-14",m:"US government officials and Wall Street analysts are beginning to consider the prospect of oil prices surging to an unprecedented $200 per barrel if the Hormuz closure persists. Brent crude was trading near $95-100, already up over 31% since the Iran war began.",mk:"호르무즈 봉쇄가 계속될 경우 유가가 전례 없는 배럴당 200달러까지 치솟을 가능성을 미국 당국자와 월가 애널리스트들이 검토하기 시작했다. 브렌트유는 이란 전쟁 발발 이후 31% 이상 상승해 95~100달러 수준에서 거래되고 있다.",tg:["유가","호르무즈","에너지위기"],u:"https://www.bloomberg.com/graphics/2026-iran-war-hormuz-closure-oil-shock/"},
{id:267,p:7,r:"심층분석",t:"Iran War Cuts Exxon and Chevron Output Even as Oil Prices Hit Four-Year High",k:"이란 전쟁, 유가 4년 만에 최고치에도 엑슨·셰브런 생산량 줄어",s:"Bloomberg",c:"global",d:"2026-04-14",m:"Iran war disruptions have reduced production volumes at Exxon Mobil and Chevron even as oil prices hit four-year highs, as Middle East operations are curtailed. The conflict has created a paradox where higher prices are not translating to higher revenue for major producers.",mk:"이란 전쟁으로 중동 운영이 차질을 빚으면서 유가가 4년 만에 최고치를 기록하는데도 엑슨모빌과 셰브런의 생산량이 오히려 줄어드는 역설적 상황이 벌어지고 있다.",tg:["오일메이저","생산량","이란전쟁"],u:"https://www.bloomberg.com/news/articles/2026-04-09/iran-war-erodes-exxon-chevron-profits-even-as-oil-prices-soar"},
{id:268,p:9,r:"주요경제",t:"KDI: Hormuz Risk Shock to Cut Korea GDP by 0.8%p, Push Inflation Up 2.9%p in Worst Case",k:"KDI: 호르무즈 리스크 충격, 최악 시나리오서 한국 GDP 0.8%p 하락·물가 2.9%p 상승",s:"KDI",c:"korean-view",d:"2026-04-14",m:"KDI&apos;s analysis of the Hormuz risk shock projects that a full-scale war scenario would cut Korea&apos;s GDP growth by 0.8 percentage points, push consumer prices up 2.9 percentage points, and reduce the current account to $76.7 billion.",mk:"KDI가 발표한 호르무즈 리스크 충격 진단 보고서에 따르면, 전면전 장기화 시나리오 하에서 한국의 GDP 성장률이 0.8%p 하락하고, 소비자물가는 2.9%p 상승하며, 경상수지는 767억 달러로 줄어들 전망이다.",tg:["KDI","경제충격","호르무즈"],u:"https://eiec.kdi.re.kr/policy/domesticView.do?ac=0000204293"},
{id:269,p:9,r:"심층분석",t:"삼일PwC: US-Iran Military Conflict to Hit Korean Economy, Semiconductors and Petrochemicals Hardest",k:"삼일PwC: 미-이란 군사 충돌, 한국 반도체·석유화학에 가장 큰 타격",s:"삼일PwC",c:"korean-view",d:"2026-04-14",m:"삼일PwC&apos;s issue brief on the US-Iran conflict warns that South Korea&apos;s semiconductor and petrochemical sectors face the greatest exposure. Samsung and SK Hynix face helium supply risks from Qatar while the naphtha price surge is delivering a direct blow to the petrochemical industry.",mk:"삼일PwC가 발간한 미-이란 군사 충돌 한국 경제·산업 영향 보고서는 반도체와 석유화학 분야가 가장 큰 타격을 받을 것으로 경고했다. 삼성전자·SK하이닉스는 카타르산 헬륨 공급망 차질 위험에 처했으며, 나프타 가격 급등은 석화 산업에 직격탄이 되고 있다.",tg:["한국경제","반도체","석유화학"],u:"https://www.pwc.com/kr/ko/insights/issue-brief/samilpwc_us-iran-conflict-economic-impact.pdf"},
{id:270,p:8,r:"속보",t:"중동전쟁 장기화에 한국 경제성장 2% 목표 &apos;빨간불&apos;…물가·무역수지 비상",k:"Middle East War Threatens Korea&apos;s 2% Growth Target; Inflation, Trade Balance Under Pressure",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-13",m:"중동 전쟁 장기화로 한국의 2026년 경제성장률 2% 달성에 빨간불이 켜졌다. 유가 급등이 4월부터 본격적으로 물가에 반영되면서 인플레이션 압력이 높아지고 무역수지 악화 우려도 커지고 있다.",mk:"The prolonged Middle East war has put a red light on Korea&apos;s 2026 GDP growth target of 2%. Oil price surges are beginning to feed through into domestic inflation from April, raising concern about both price pressures and a deteriorating trade balance.",tg:["한국경제","성장률","물가"],u:"https://www.fnnews.com/news/202604130605543502"},
{id:271,p:8,r:"정책발표",t:"한국 정부, 4~5월 대체원유 1억1800만 배럴 확보…17개국서 공급 다변화",k:"Korea Secures 118 Million Barrels of Alternative Crude for April-May via 17-Country Diversification",s:"뉴시스",c:"korean-view",d:"2026-04-14",m:"한국 정부가 중동 호르무즈 사태 대응으로 17개국에서 4~5월 대체원유 1억1800만 배럴을 확보했다. 사우디아라비아가 34%로 가장 큰 비중을 차지했다. 정부는 비축유 방출 없이 4월, 5월을 넘길 수 있을 것으로 전망하고 있다.",mk:"The Korean government secured 118 million barrels of alternative crude from 17 countries for April-May amid the Hormuz crisis. Saudi Arabia accounts for 34% of supplies. The government expects to navigate April and May without tapping strategic reserves.",tg:["에너지안보","대체원유","정부"],u:"https://nwww.newsis.com/view/NISX20260414_0003590427"},
{id:272,p:8,r:"속보",t:"호르무즈 해상봉쇄, 한국 반도체·수출 물가 직격…공급망 비상",k:"Hormuz Blockade Hits Korea&apos;s Semiconductors and Export Prices; Supply Chain Emergency Declared",s:"글로벌이코노믹",c:"korean-view",d:"2026-04-14",m:"호르무즈 해상봉쇄 현실화로 한국 반도체 산업과 수출 물가에 비상이 걸렸다. 카타르산 헬륨 공급 차질로 삼성전자·SK하이닉스 등의 반도체 냉각 공정이 위협받고, 나프타 가격 급등은 석화 산업에 직격탄을 가하고 있다.",mk:"The Hormuz blockade has triggered a supply chain emergency for South Korea&apos;s semiconductor industry and export prices. Qatar helium supply disruptions threaten Samsung and SK Hynix cooling processes, while naphtha price surges are hammering the petrochemical sector.",tg:["반도체","공급망","에너지"],u:"https://www.g-enews.com/article/Global-Biz/2026/04/202604140540598983fbbec65dfb_1"},
{id:273,p:7,r:"심층분석",t:"미-이란 협상 결렬에 호르무즈 &apos;안갯속&apos;…한국 유가·석화 공급망 비상 지속",k:"US-Iran Talks Collapse Leaves Hormuz Outlook Murky; Korea Oil and Petrochemical Supply Chains Remain on Alert",s:"뉴스1",c:"korean-view",d:"2026-04-13",m:"미-이란 협상 결렬과 미국의 호르무즈 해상봉쇄로 에너지 공급망 불확실성이 최고조에 달했다. 한국 정유사들의 중동발 원유 수급 차질이 장기화될 가능성이 높아지면서 정부의 에너지 위기 대응 수위도 높아지고 있다.",mk:"The collapse of US-Iran talks and the start of the US Hormuz naval blockade has pushed energy supply chain uncertainty to its peak. Korean refiners face prolonged disruption to Middle East crude supplies, prompting the government to raise its energy crisis response level.",tg:["에너지","공급망","이란전쟁"],u:"https://www.news1.kr/amp/economy/trend/6133335"},
  {id:274,p:9,r:"정책발표",t:"Saudi Arabia Ranks No. 1 Globally in AI Security, Privacy and Women&apos;s Empowerment: Stanford 2026 AI Index",k:"사우디아라비아, AI 보안·프라이버시·여성역량 세계 1위 석권: 스탠퍼드 2026 AI 인덱스",s:"Arab News",c:"saudi",d:"2026-04-15",m:"Saudi Arabia topped the Stanford University 2026 AI Index in security, privacy, and cryptography in AI, and in women&apos;s empowerment in AI. The Kingdom leads globally in female representation among AI inventors at 32.3%, ahead of Australia and Canada. Saudi also ranks 3rd in AI model development.",mk:"사우디아라비아가 스탠퍼드 대학교 2026 AI 인덱스에서 AI 보안·프라이버시·암호화 분야와 AI 여성역량 분야 세계 1위를 차지했다. AI 발명자 중 여성 비율 32.3%로 호주·캐나다를 앞섰으며 AI 모델 개발 세계 3위를 기록했다.",tg:["AI","스탠퍼드","비전2030"],u:"https://www.arabnews.com/node/2639943/saudi-arabia"},
  {id:275,p:9,r:"정책발표",t:"Saudi Council of Ministers Affirms Uninterrupted Global Energy Flows After Facility Restoration",k:"사우디 각료회의, 피격 에너지 시설 복구 후 글로벌 에너지 공급 정상 유지 확인",s:"SPA",c:"saudi",d:"2026-04-15",m:"Saudi Arabia&apos;s Council of Ministers, chaired by Crown Prince Mohammed bin Salman, affirmed the uninterrupted flow of global energy supplies following restoration of energy facilities damaged by Iranian attacks. The Cabinet praised Aramco workers&apos; rapid efforts and reiterated the Kingdom&apos;s commitment to global energy stability.",mk:"무함마드 빈 살만 왕세자 주재 각료회의는 이란 공격으로 피해를 입은 에너지 시설 복구 후 글로벌 에너지 공급이 차질 없이 유지되고 있음을 확인했다. 아람코 직원들의 신속한 복구 작업을 치하하고 에너지 안정 공급 의지를 재확인했다.",tg:["에너지","아람코","각료회의"],u:"https://www.spa.gov.sa/en/news/latest-news"},
  {id:276,p:9,r:"주요경제",t:"Saudi Arabia Pledges $3 Billion Financial Support to Pakistan, Deepening Strategic Defence Partnership",k:"사우디, 파키스탄에 30억 달러 재정 지원 약속…상호방위협정 기반 전략 파트너십 강화",s:"Arab News",c:"saudi",d:"2026-04-15",m:"Crown Prince Mohammed bin Salman pledged $3 billion in financial support to Pakistan to bridge its financing gap. The funds will be deposited in Pakistan&apos;s State Bank. The support coincides with deployment of Pakistani Air Force assets to Saudi&apos;s Eastern Province under the Strategic Mutual Defence Agreement.",mk:"무함마드 빈 살만 왕세자가 파키스탄 재정난 해소를 위해 30억 달러를 파키스탄 중앙은행에 예치하기로 약속했다. 상호방위협정(SMDA)에 따라 파키스탄 공군이 사우디 동부주에 전개됐다.",tg:["파키스탄","외교","방위"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/07/pakistani-pm-condemns-iran-attacks-on-saudi-arabia-in-call-with-mbs"},
  {id:277,p:8,r:"속보",t:"Saudi Arabia Restores East-West Oil Pipeline to Full 7 Million bpd Capacity After Drone Attacks",k:"사우디 동서 송유관, 드론 공격 피해 복구…하루 700만 배럴 전용량 회복",s:"SPA",c:"saudi",d:"2026-04-12",m:"Saudi Arabia announced the full restoration of the East-West oil pipeline to approximately 7 million barrels per day following drone attacks during the Iran war. The Manifa offshore oilfield also restored full output of 300,000 bpd. Khurais oilfield restoration is still ongoing.",mk:"사우디아라비아가 이란 전쟁 중 드론 공격으로 피해를 입은 동서 송유관을 하루 700만 배럴의 전용량으로 완전 복구했다. 마니파 유전도 일산 30만 배럴로 복구됐으나 쿠라이스 유전 복구는 진행 중이다.",tg:["아람코","에너지","복구"],u:"https://fortune.com/2026/04/12/saudi-arabia-east-west-pipeline-full-capacity-iran-war-attack/"},
  {id:278,p:8,r:"속보",t:"Saudi Aramco Restarts Ras Tanura Refinery Operations After Drone Strike Shutdown",k:"사우디 아람코, 드론 피격 후 라스타누라 정유공장 재가동",s:"Arab News",c:"saudi",d:"2026-04-12",m:"Saudi Aramco restarted operations at the Ras Tanura refinery, the Kingdom&apos;s largest, after it was shut down as a precaution following drone strikes. Saudi air defenses intercepted the drones targeting the facility, limiting damage. Ras Tanura is a critical hub for Saudi oil exports.",mk:"사우디 아람코가 드론 공격 후 예방 차원에서 가동을 중단했던 라스타누라 정유공장을 재가동했다. 방공망이 드론을 요격해 피해를 최소화했다. 라스타누라는 사우디 최대 정유시설이자 석유 수출의 핵심 허브다.",tg:["아람코","에너지","드론"],u:"https://oilprice.com/Latest-Energy-News/World-News/Saudi-Arabia-Restarts-Ras-Tanura-Refinery-After-Drone-Attack.html"},
  {id:279,p:8,r:"속보",t:"Iran Attacks Cut Saudi Oil Output Capacity by 600,000 bpd; East-West Pipeline Flow Reduced",k:"이란 공격, 사우디 원유 생산능력 하루 60만 배럴 감소…동서 파이프라인 유량도 타격",s:"Arab News",c:"saudi",d:"2026-04-09",m:"Saudi Arabia confirmed that Iranian attacks on its energy infrastructure cut oil output capacity by 600,000 barrels per day. The Kingdom activated its east-west pipeline at maximum capacity of around 4-4.5 million bpd to route crude exports via the Red Sea port of Yanbu, bypassing the Strait of Hormuz.",mk:"사우디는 이란의 에너지 인프라 공격으로 생산능력이 하루 60만 배럴 감소했다고 확인했다. 호르무즈 해협을 우회해 홍해 얀부 항으로 수출하기 위해 동서 파이프라인을 최대 용량(하루 400~450만 배럴)으로 가동했다.",tg:["에너지","이란전쟁","아람코"],u:"https://www.bloomberg.com/news/articles/2026-04-09/saudi-oil-output-capacity-cut-600-000-barrels-a-day-in-attacks"},
  {id:280,p:8,r:"정책발표",t:"Saudi Special Economic Zone Regulations Enter Force April 16, Opening New Era for Global Investors",k:"사우디 특별경제구역 규정 4월 16일 발효…글로벌 투자자들에게 새로운 시대 개막",s:"Saudi Gazette",c:"saudi",d:"2026-04-15",m:"Saudi Arabia&apos;s regulatory frameworks for four Special Economic Zones — King Abdullah Economic City, Ras Al-Khair, Jazan, and the Cloud Computing Zone — enter into force on April 16. The frameworks offer tax and customs exemptions, 0% VAT under specific conditions, and exemptions from several commercial laws.",mk:"사우디아라비아의 4개 특별경제구역(킹압둘라경제도시, 라스알카이르, 자잔, 클라우드컴퓨팅)에 대한 규제 프레임워크가 4월 16일 발효된다. 세금·관세 면제, 특정 조건하 부가세 0%, 상업법 예외 등 외국인 투자 유인책이 적용된다.",tg:["특별경제구역","외국인투자","비전2030"],u:"https://saudigazette.com.sa/article/657879"},
  {id:281,p:7,r:"정책발표",t:"Saudi Arabia Enforces New Financial Control Law to Strengthen Public Sector Oversight Under Vision 2030",k:"사우디, 비전2030 재정 관리 강화 위한 신(新) 재정통제법 시행",s:"Saudi Gazette",c:"saudi",d:"2026-04-15",m:"Saudi Arabia enforced a new Financial Control Law across the public sector, aimed at strengthening fiscal management and transparency in line with Vision 2030 objectives. The law establishes stricter oversight mechanisms for government expenditure and public financial accountability.",mk:"사우디아라비아가 비전2030 목표 달성을 위해 공공 부문 전반에 신(新) 재정통제법을 시행했다. 정부 지출에 대한 엄격한 감독 체계와 재정 책임성 강화를 목표로 한다.",tg:["재정관리","비전2030","정책"],u:"https://gulfnews.com/amp/story/business/markets/saudi-arabia-enforces-new-financial-control-law-across-public-sector-1.500506468"},
  {id:282,p:8,r:"주요경제",t:"IMF Maintains Saudi Arabia GDP Growth Forecast at 3.1% for 2026 Despite Iran War Headwinds",k:"IMF, 이란 전쟁 역풍에도 사우디 2026년 GDP 성장률 3.1% 전망 유지",s:"Argaam",c:"saudi",d:"2026-04-15",m:"The IMF maintained its Saudi Arabia economic growth forecast at 3.1% for 2026 despite the ongoing Iran war impact. Non-oil sector growth remains a key driver, with tourism, IT, and healthcare sectors expected to expand 20%, 20%, and 16% respectively, driven by Vision 2030 transformation.",mk:"IMF는 이란 전쟁의 영향에도 불구하고 사우디 2026년 GDP 성장률 전망을 3.1%로 유지했다. 비전2030 추진 아래 관광, IT, 의료 분야가 각각 20%, 20%, 16%의 성장세를 보이며 비석유 부문이 성장을 견인할 것으로 예상된다.",tg:["경제성장","IMF","비석유"],u:"https://www.argaam.com/en/article/articledetail/id/1896407"},
  {id:283,p:8,r:"주요경제",t:"Saudi 2026 Budget Projects SR1.15 Trillion Revenue; GDP Growth Forecast at 4.6%",k:"사우디 2026년 예산, 수입 1조1500억 리얄…GDP 성장률 4.6% 전망",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-15",m:"Saudi Arabia&apos;s 2026 state budget projects total revenues of SR1.15 trillion ($306 billion), a 5.1% increase from 2025. GDP growth is projected at 4.6% for the year. The Crown Prince instructed ministers to actively implement Vision 2030 programs, particularly development and social initiatives.",mk:"사우디아라비아의 2026년 국가 예산은 총수입을 1조1500억 리얄(3,060억 달러)로 예상하며 2025년 대비 5.1% 증가한 수치다. 연간 GDP 성장률은 4.6%로 전망되며 왕세자는 비전2030 프로그램의 적극적 이행을 지시했다.",tg:["예산","경제성장","비전2030"],u:"https://gccbusinesswatch.com/news/saudi-arabia-approves-2026-budget-with-higher-revenues-and-strong-vision-2030-commitments/"},
  {id:284,p:7,r:"정책발표",t:"Pakistan PM Shehbaz Reaffirms Solidarity With Saudi Arabia, Condemns Iranian Infrastructure Attacks",k:"파키스탄 총리, 사우디 에너지 시설 이란 공격 규탄…연대 재확인",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-14",m:"Pakistan Prime Minister Shehbaz Sharif reaffirmed his country&apos;s unwavering solidarity with Saudi Arabia following Iranian attacks on the Kingdom&apos;s energy facilities. In a call with Crown Prince MBS, Sharif condemned the attacks and pledged that Pakistan would always stand shoulder to shoulder with Saudi Arabia.",mk:"샤흐바즈 샤리프 파키스탄 총리가 이란의 사우디 에너지 시설 공격을 규탄하고 사우디와의 연대를 재확인했다. MBS 왕세자와의 전화 통화에서 파키스탄은 항상 사우디 편에 서겠다고 다짐했다.",tg:["파키스탄","외교","이란전쟁"],u:"https://tribune.com.pk/story/2601531/pm-shehbaz-reaffirms-solidarity-in-talks-with-saudi-crown-prince-after-iran-attack"},
  {id:285,p:7,r:"심층분석",t:"Saudi Vision 2030 Progress: 57% of KPIs On Track, but The Line Suspended Indefinitely",k:"비전2030 진행 현황: KPI 57% 순항 중이나 더라인 무기한 중단",s:"Argaam",c:"saudi",d:"2026-04-14",m:"Saudi Vision 2030&apos;s 2026 scorecard shows 57% of 23 core KPIs are on track or ahead of schedule. Female workforce participation and 100-million visitor targets were met early. However, The Line mega-project is suspended indefinitely and the 65% private sector GDP target remains at 48%.",mk:"2026년 비전2030 성적표를 보면 23개 핵심 KPI 중 57%가 순조롭게 진행 중이다. 여성 고용 및 관광객 1억 명 목표는 조기 달성됐다. 그러나 더라인 프로젝트는 무기한 중단됐고 민간 부문 GDP 65% 목표는 48%에 머물러 있다.",tg:["비전2030","더라인","진행현황"],u:"https://houseofsaud.com/saudi-vision-2030-progress-report-2026/"},
  {id:286,p:8,r:"정책발표",t:"Saudi Arabia Officially Declares 2026 the Year of Artificial Intelligence",k:"사우디아라비아, 2026년 공식 &apos;인공지능의 해&apos; 선포",s:"SPA",c:"saudi",d:"2026-04-14",m:"The Saudi Cabinet designated 2026 as the &apos;Year of Artificial Intelligence,&apos; a strategic step toward positioning the Kingdom as a global AI hub aligned with Vision 2030. Saudi ranks 14th globally in the AI Index, 1st in the Arab world in advanced AI model development, and 5th globally in AI sector growth.",mk:"사우디 내각이 2026년을 공식 &apos;인공지능의 해&apos;로 선포했다. 비전2030에 따라 세계 AI 허브로 도약하기 위한 전략적 이정표로, 사우디는 AI 인덱스 세계 14위, 아랍권 1위, AI 부문 성장률 세계 5위를 기록 중이다.",tg:["AI","비전2030","기술"],u:"https://www.spa.gov.sa/en/N2533339"},
