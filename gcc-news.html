  {id:1057,p:7,r:"주요경제",t:"Kang Hoon-sik: May 74.62M barrels secured — Middle East dependence cut by 13%p",k:"강훈식 5월 중 원유 7462만 배럴 확보…중동 의존도 13%P 낮춰",s:"뉴스핌",c:"korean-view",d:"2026-04-24",m:"Newspim reports Korea&apos;s diversification of crude sources during the Hormuz crisis. Adding supplies from the Americas and Africa cut Middle East dependence from 69% to 56%. Saudi Arabia maintains its position as Korea&apos;s top supplier via Yanbu Red Sea route.",mk:"뉴스핌이 호르무즈 위기 기간 한국 원유 공급선 다변화 보도. 미주·아프리카 추가 도입으로 중동 의존도 69%→56%. 사우디는 얀부 홍해 경로를 통해 한국 1위 공급국 지위 유지.",tg:["다변화","사우디","공급망"],u:"https://www.newspim.com/news/view/20260424001038"}
,
  {id:1058,p:7,r:"정책발표",t:"Saudi crown prince welcomes arrival of Hajj pilgrims at Cabinet meeting",k:"사우디 왕세자, 내각회의서 핫지 순례객 도착 환영",s:"Arab News",c:"saudi",d:"2026-04-21",m:"Crown Prince Mohammed bin Salman, chairing the Cabinet in Jeddah on April 21, welcomed the arrival of Hajj pilgrims and reaffirmed the Kingdom&apos;s pride in serving the Two Holy Mosques. He directed all resources be utilized for organizational, security, and preventive plans.",mk:"빈 살만 왕세자가 4월 21일 제다에서 내각회의를 주재하며 핫지 순례객 도착을 환영하고 두 성지 봉사에 대한 왕국의 자부심을 재확인. 핫지 운영·보안·예방 계획에 모든 자원과 역량을 투입하라고 지시.",tg:["핫지","왕세자","내각"],u:"https://www.arabnews.com/node/2640757/saudi-arabia"},
  {id:1059,p:8,r:"헤드라인",t:"Saudi Crown Prince, Zelensky discuss Ukraine crisis and Middle East in Jeddah talks",k:"사우디 왕세자-젤렌스키, 제다서 우크라 위기·중동 정세 논의",s:"Saudi Gazette",c:"saudi",d:"2026-04-24",m:"Crown Prince Mohammed bin Salman held talks with Ukrainian President Volodymyr Zelensky in Jeddah on April 24, reviewing Saudi-Ukraine bilateral relations and discussing regional and international developments. Zelensky said Ukraine is finalizing an agreement covering security, energy and food cooperation.",mk:"빈 살만 왕세자가 4월 24일 제다에서 젤렌스키 우크라이나 대통령과 회담, 양자관계와 중동·국제 정세 논의. 젤렌스키는 X에서 안보·에너지·식량 협력 협정을 마무리 짓는 중이라고 밝힘.",tg:["젤렌스키","우크라이나","왕세자"],u:"https://saudigazette.com.sa/article/660821"},
  {id:1060,p:8,r:"정책발표",t:"Saudi Crown Prince, Syrian President Discuss Bilateral Ties",k:"사우디 왕세자-시리아 대통령, 양자 관계 강화 논의",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-21",m:"Crown Prince Mohammed bin Salman met Syrian President Ahmed al-Sharaa in Jeddah on April 21 to review bilateral relations and discuss latest regional developments. The meeting focused on opportunities to support and develop cooperation in various fields.",mk:"빈 살만 왕세자가 4월 21일 제다에서 알샤라 시리아 대통령과 회담, 양자관계 검토 및 다양한 분야의 협력 기회를 논의. 사우디 측은 에너지·외교·국방 장관 등이 배석.",tg:["시리아","알샤라","양자관계"],u:"https://english.aawsat.com/gulf/5265170-saudi-crown-prince-syrian-president-discuss-bilateral-ties"},
  {id:1061,p:8,r:"주요경제",t:"PIF backs State Street&apos;s new Saudi equity ETF in latest global market push",k:"PIF, 스테이트스트리트 사우디 주식 ETF에 앵커 투자",s:"Arab News",c:"saudi",d:"2026-04-21",m:"PIF anchored the State Street Saudi Arabia Enhanced Active Equity UCITS ETF (SAQL), which uses a quantitative multi-factor stock selection model to invest in Saudi-listed equities. This is PIF&apos;s fifth ETF investment across nine international markets with leading asset managers.",mk:"PIF가 스테이트스트리트의 사우디 주식 액티브 ETF(SAQL)에 앵커 투자자로 참여. 정량적 다요인 모델로 사우디 상장주식에 투자하며, PIF의 9개 글로벌 시장 5번째 ETF 투자 사례.",tg:["PIF","ETF","StateStreet"],u:"https://www.arabnews.com/node/2640836/amp"},
  {id:1062,p:9,r:"심층분석",t:"How Saudi Arabia&apos;s East-West pipeline is easing the Hormuz chokehold on global oil markets",k:"사우디 동서 송유관, 호르무즈 공급망 위기 완화 주역",s:"Arab News",c:"saudi",d:"2026-04-15",m:"Saudi Aramco ramped up Petroline operations after the war began Feb. 28, with the East-West pipeline now pumping at full 7M bpd capacity. Crude exports via Yanbu reached about 5M bpd, with an additional 700K-900K bpd of refined products. The route partially offsets 15M bpd normally passing through Hormuz.",mk:"사우디 아람코가 2월 28일 전쟁 발발 후 페트로라인 가동률을 끌어올려, 동서 송유관이 7백만 b/d 풀가동 중. 얀부항 원유 수출은 약 5백만 b/d, 추가로 정제유 70-90만 b/d 수출. 호르무즈 통상 통과 1500만 b/d의 일부 상쇄.",tg:["동서송유관","얀부","호르무즈"],u:"https://www.arabnews.com/node/2638351/saudi-arabia"},
  {id:1063,p:9,r:"헤드라인",t:"Aramco CEO sees &apos;catastrophic consequences&apos; for oil if shipping doesn&apos;t resume in Strait of Hormuz",k:"아람코 CEO &apos;호르무즈 봉쇄 지속시 원유시장 파국&apos;",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Saudi Aramco CEO Amin Nasser warned of &apos;catastrophic consequences&apos; for global oil markets if Hormuz shipping doesn&apos;t resume. The Strait of Hormuz normally carries about 20% of global oil and LNG supplies, with disruption rated as the largest oil supply shock in history.",mk:"아람코 아민 나세르 CEO가 호르무즈 운항이 재개되지 않으면 글로벌 원유시장에 &apos;파국적 결과&apos;가 올 것이라고 경고. 호르무즈는 평시 글로벌 원유·LNG 공급의 약 20%를 운반하며, 현재 차질은 사상 최대 원유 공급 충격으로 평가.",tg:["아람코","나세르","호르무즈"],u:"https://www.arabnews.com/node/2635891/business-economy"},
  {id:1064,p:8,r:"헤드라인",t:"Aramco Sees &apos;Catastrophic Consequences&apos; for Oil Markets if Hormuz Strait Remains Blocked",k:"아람코 &apos;호르무즈 폐쇄 지속시 원유시장 파국&apos; 경고",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-08",m:"Aramco said there would be catastrophic consequences for oil markets if the Iran war continues to disrupt shipping in the Strait of Hormuz. The company has been redirecting exports through the Red Sea via the East-West pipeline as a partial offset.",mk:"아람코는 이란 전쟁으로 호르무즈 해협 운항 차질이 지속되면 원유시장에 파국적 결과가 발생할 것이라고 경고. 동서 송유관을 통해 홍해 경로로 수출을 우회 처리 중.",tg:["아람코","파국","호르무즈"],u:"https://english.aawsat.com/business/5249546-aramco-sees-%E2%80%98catastrophic-consequences%E2%80%99-oil-markets-if-hormuz-strait-remains"},
  {id:1065,p:7,r:"정책발표",t:"Pakistan PM to visit Saudi Arabia, Türkiye ahead of new US-Iran talks",k:"파키스탄 총리, 미·이란 회담 앞두고 사우디·터키 방문",s:"Saudi Gazette",c:"saudi",d:"2026-04-14",m:"Pakistan Prime Minister Shehbaz Sharif undertook official visits to Saudi Arabia, Qatar and Türkiye from April 15-18 ahead of new US-Iran talks. The trips underscored Pakistan&apos;s mediation role between Washington and Tehran since Feb. 28 hostilities.",mk:"파키스탄 셰바즈 샤리프 총리가 4월 15-18일 미·이란 회담을 앞두고 사우디·카타르·터키 공식 방문. 2월 28일 적대 행위 시작 이후 워싱턴-테헤란 사이 중재자 역할 부각.",tg:["파키스탄","사리프","중재"],u:"https://saudigazette.com.sa/article/660553/world/pakistan-pm-to-visit-saudi-arabia-turkiye-ahead-of-us-iran-talks"},
  {id:1066,p:7,r:"주요경제",t:"Saudi Arabia opens April &apos;Sah&apos; sukuk issuance with 4.5% return",k:"사우디 4월 &apos;사&apos; 수쿠크 발행 개시…수익률 4.5%",s:"Arab News",c:"saudi",d:"2026-04-05",m:"Saudi Arabia opened its April Sah sukuk issuance with a subscription window from April 5-7 through accredited financial institutions. The one-year retail instrument offers a fixed 4.5% return as part of the Kingdom&apos;s domestic debt management strategy.",mk:"사우디아라비아가 4월 5-7일 인증 금융기관을 통해 &apos;사&apos; 수쿠크 청약을 개시. 1년 만기 리테일 수쿠크로 고정 4.5% 수익률을 제공하며, 국내 부채관리 전략의 일환.",tg:["수쿠크","사","리테일"],u:"https://www.arabnews.com/node/2638839/business-economy"},
  {id:1067,p:7,r:"주요경제",t:"J.P. Morgan and Bloomberg to include Saudi government sukuk on emerging market bond indices",k:"JP모건·블룸버그, 사우디 국채 수쿠크 EM 지수 편입 결정",s:"Arab News",c:"saudi",d:"2026-04-24",m:"J.P. Morgan and Bloomberg will include Saudi government sukuk on their emerging market bond indices, expanding the Kingdom&apos;s global investor base. The inclusion is expected to attract significant passive flows into Saudi sovereign Islamic debt.",mk:"JP모건과 블룸버그가 사우디 국채 수쿠크를 신흥시장 채권지수에 편입한다고 발표. 사우디 글로벌 투자자 저변이 확대되며 국채 이슬람채권으로 패시브 자금 유입 예상.",tg:["JP모건","수쿠크","EM지수"],u:"https://www.arabnews.com/node/2641096/amp"},
  {id:1068,p:7,r:"주요경제",t:"Saudi Central Bank Governor Says National Model Has Shielded Economy from Shocks",k:"사우디 중앙은행 총재 &apos;국가 모델이 경제를 충격에서 보호&apos;",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-23",m:"SAMA Governor said Saudi Arabia&apos;s policy framework and macro buffers shielded the economy from external shocks during the Iran war. The Kingdom retains strong reserves and maintained financial stability through the Hormuz disruption period.",mk:"사우디 중앙은행(SAMA) 총재가 사우디의 정책 체계와 거시 버퍼가 이란 전쟁 기간 외부 충격으로부터 경제를 보호했다고 발언. 호르무즈 사태 중에도 풍부한 외환보유고와 금융 안정성을 유지.",tg:["SAMA","중앙은행","경제안정"],u:"https://english.aawsat.com/business/5264445-saudi-central-bank-governor-says-national-model-has-shielded-economy-shocks"},
  {id:1069,p:7,r:"정책발표",t:"From Davos to Jeddah: Saudi Arabia concludes WEF 2026 with global growth meeting set for April",k:"다보스에서 제다로: 사우디, 4월 WEF 글로벌 성장회의 개최",s:"Saudi Gazette",c:"saudi",d:"2026-04-22",m:"Saudi Arabia hosted the World Economic Forum Global Collaboration and Growth Meeting in Jeddah on April 22-23 under the theme &apos;Building Common Ground and Reviving Growth&apos;. The Kingdom positioned itself as a global crossroads for political and economic dialogue amid Middle East tensions.",mk:"사우디아라비아가 4월 22-23일 제다에서 &apos;공통 기반 구축과 성장 회복&apos;을 주제로 세계경제포럼(WEF) 글로벌 협력·성장 회의 개최. 중동 긴장 속에서 정치·경제 대화의 글로벌 거점으로 위상 강화.",tg:["WEF","제다","글로벌성장"],u:"https://saudigazette.com.sa/article/658415"},
  {id:1070,p:7,r:"정책발표",t:"Saudi Arabia and Russia call for new efforts to end conflict",k:"사우디·러시아, 분쟁 종식 위한 새 노력 촉구",s:"Arab News",c:"saudi",d:"2026-04-15",m:"Saudi Arabia and Russia issued a joint call for new efforts to end the regional conflict, emphasizing diplomacy as the path forward. The statement reflects continued OPEC+ cooperation despite shifting energy markets during the Iran war.",mk:"사우디와 러시아가 지역 분쟁 종식을 위한 새로운 노력을 공동 촉구. 이란 전쟁 중 에너지 시장 변동에도 OPEC+ 협력이 지속되고 있음을 반영하는 외교적 메시지.",tg:["러시아","OPEC플러스","분쟁종식"],u:"https://www.arabnews.com/node/2638573/saudi-arabia"},
  {id:1071,p:7,r:"정책발표",t:"Saudi crown prince, Italian PM discuss Gaza",k:"사우디 왕세자-이탈리아 총리, 가자 사태 논의",s:"Arab News",c:"saudi",d:"2026-04-13",m:"Crown Prince Mohammed bin Salman spoke by phone with Italian PM Giorgia Meloni on April 13, reviewing Gaza developments and the need for international efforts to halt escalation and protect civilians.",mk:"빈 살만 왕세자가 4월 13일 멜로니 이탈리아 총리와 통화, 가자 정세를 점검하며 확전 저지 및 민간인 보호를 위한 국제사회의 노력을 강조.",tg:["가자","멜로니","외교"],u:"https://www.arabnews.com/node/2611637/saudi-arabia"},
  {id:1072,p:7,r:"정책발표",t:"Italian PM Meloni meets crown prince on Saudi visit",k:"이탈리아 멜로니 총리, 사우디 방문 중 왕세자 면담",s:"Arab News",c:"saudi",d:"2026-04-14",m:"Italian Prime Minister Giorgia Meloni met Crown Prince Mohammed bin Salman during her Saudi visit, with talks focused on bilateral cooperation in trade, investment, and regional diplomacy.",mk:"이탈리아 멜로니 총리가 사우디 방문 중 빈 살만 왕세자와 회담. 양국 무역·투자 협력 및 지역 외교 현안을 폭넓게 논의.",tg:["멜로니","이탈리아","외교"],u:"https://www.arabnews.com/node/2638685/saudi-arabia"},
  {id:1073,p:7,r:"속보",t:"Middle East flight updates: Airspaces in Kuwait and Qatar reopen as ceasefire holds",k:"중동 항공 운항 업데이트: 휴전 유지 속 쿠웨이트·카타르 영공 재개",s:"The National",c:"gulf",d:"2026-04-24",m:"Airspace restrictions are gradually easing across the Gulf, with Kuwait and Qatar joining UAE and Saudi Arabia in reopening flight routes after the US-Iran ceasefire extension. Some disruptions remain near Iranian and Iraqi airspaces.",mk:"미·이란 휴전 연장 속에서 쿠웨이트·카타르가 UAE·사우디에 이어 영공을 재개방. 항공 제한이 점차 해제되는 가운데 이란·이라크 영공 인근에선 여전히 일부 운항 차질.",tg:["항공","영공","휴전"],u:"https://www.thenationalnews.com/travel/2026/04/24/iran-war-middle-east-flight-status/"},
  {id:1074,p:7,r:"심층분석",t:"Energy crisis exposes cost of delaying renewable energy",k:"에너지 위기, 재생에너지 전환 지연 비용 드러내",s:"The National",c:"gulf",d:"2026-04-22",m:"The Iran war and Hormuz disruption are exposing the steep cost of slow renewable energy adoption, with Gulf nations accelerating solar and hydrogen plans. Analysts say the crisis could speed up GCC energy diversification by years.",mk:"이란 전쟁과 호르무즈 차질이 재생에너지 전환 지연의 높은 비용을 드러내며, 걸프 국가들이 태양광·수소 계획을 가속. 위기가 GCC 에너지 다변화를 수년 앞당길 수 있다는 분석.",tg:["재생에너지","수소","GCC"],u:"https://www.thenationalnews.com/business/energy/2026/04/22/energy-crisis-exposes-cost-of-delaying-renewable-energy/"},
  {id:1075,p:7,r:"속보",t:"US envoys heading to Pakistan for uncertain Iran talks",k:"미국 특사단, 불확실한 이란 회담 위해 파키스탄行",s:"Khaleej Times",c:"gulf",d:"2026-04-25",m:"US envoys Steve Witkoff and Jared Kushner headed to Islamabad on Saturday for renewed Iran talks. Iran&apos;s Foreign Minister arrived in Pakistan on Friday, but Tehran indicated direct talks remain uncertain.",mk:"미국 특사 스티브 위트코프와 재러드 쿠슈너가 토요일 이슬라마바드로 출발해 이란과의 회담 재개를 모색. 이란 외무장관도 금요일 도착했으나, 직접 회담은 여전히 불확실.",tg:["위트코프","쿠슈너","파키스탄"],u:"https://www.khaleejtimes.com/world/us-envoys-heading-pakistan-for-uncertain-iran-talks"},
  {id:1076,p:8,r:"속보",t:"Trump cancels envoys&apos; trip for Iran talks; Araghchi visits Oman after Pakistan",k:"트럼프, 이란 회담 위한 특사 파견 전격 취소…아라그치 오만행",s:"Khaleej Times",c:"gulf",d:"2026-04-25",m:"President Trump abruptly canceled Witkoff and Kushner&apos;s trip to Pakistan for Iran talks. Iran FM Abbas Araghchi traveled to Oman after his Islamabad visit, raising fresh uncertainty over peace talks.",mk:"트럼프 대통령이 위트코프·쿠슈너의 파키스탄行을 전격 취소. 아라그치 이란 외무장관은 이슬라마바드 방문 후 오만으로 이동, 평화 회담 전망의 불확실성 가중.",tg:["트럼프","아라그치","오만"],u:"https://www.khaleejtimes.com/world/us-israel-iran-lebanon-war-ceasefire-day-18-live-updates"},
  {id:1077,p:8,r:"헤드라인",t:"Trump extends Iran ceasefire indefinitely with peace talks in doubt",k:"트럼프, 이란 휴전 무기한 연장…평화회담은 불투명",s:"Khaleej Times",c:"gulf",d:"2026-04-21",m:"President Trump announced an indefinite extension of the Iran ceasefire to allow more time for talks, but kept the US naval blockade of Iranian ports in place. Iran insists the blockade violates the truce.",mk:"트럼프 대통령이 이란 휴전 무기한 연장을 발표하며 추가 회담을 위한 시간을 확보. 단 미국 해군의 이란 항만 봉쇄는 유지하기로 해, 이란은 봉쇄가 휴전 위반이라고 반발.",tg:["휴전","트럼프","봉쇄"],u:"https://www.khaleejtimes.com/world/us-president-trump-extends-iran-ceasefire"},
  {id:1078,p:7,r:"정책발표",t:"UAE &apos;triumphed&apos; in war it sought to avoid, top official says after US-Iran ceasefire",k:"UAE 고위 관리 &apos;피하려던 전쟁에서 승리&apos; 미·이란 휴전 후 발언",s:"Khaleej Times",c:"gulf",d:"2026-04-08",m:"A senior UAE official said the country &apos;triumphed&apos; in a war it had sought to avoid, citing successful protection of economic interests through the Iran conflict. The remarks came shortly after the initial US-Iran ceasefire announcement.",mk:"UAE 고위 관리가 &apos;피하려고 했던 전쟁에서 UAE가 승리했다&apos;고 발언, 이란 분쟁을 통해 경제적 이익을 성공적으로 지켰다고 평가. 미·이란 1차 휴전 발표 직후 나온 언급.",tg:["UAE","외교","휴전"],u:"https://www.khaleejtimes.com/uae/uae-official-says-country-victorious-after-us-iran-ceasefire"},
  {id:1079,p:8,r:"심층분석",t:"Reality check: Israeli ambitions confront US dictates in Iran and Lebanon",k:"심층분석: 이스라엘 야심, 이란·레바논 美 명령에 직면",s:"Al Jazeera",c:"me",d:"2026-04-24",m:"Analysis examines how Israeli strategic ambitions in Iran and Lebanon are increasingly clashing with US policy directives during the ceasefire phase. Tensions over Hezbollah and Hormuz reveal divergent allied priorities.",mk:"이스라엘의 이란·레바논 전략적 야심이 휴전 국면에서 미국 정책 지침과 점점 더 충돌하고 있다는 분석. 헤즈볼라·호르무즈를 둘러싼 긴장이 동맹 간 우선순위 차이를 드러냄.",tg:["이스라엘","미국","동맹"],u:"https://www.aljazeera.com/news/2026/4/24/reality-check-israeli-ambitions-confront-us-dictates-in-iran-and-lebanon"},
  {id:1080,p:8,r:"속보",t:"US sending envoys to Pakistan, raising hopes of talks with Iran&apos;s Araghchi",k:"미국, 이란 아라그치와 회담 기대 속 특사 파키스탄行",s:"Al Jazeera",c:"me",d:"2026-04-24",m:"The US announced sending envoys Witkoff and Kushner to Pakistan, raising hopes for renewed talks with Iranian FM Araghchi. Negotiations have been deadlocked over Hormuz blockade and uranium enrichment.",mk:"미국이 위트코프와 쿠슈너 특사를 파키스탄에 파견한다고 발표, 이란 아라그치 외무장관과의 회담 재개 기대. 호르무즈 봉쇄와 우라늄 농축 문제로 협상은 교착 상태.",tg:["특사","아라그치","협상"],u:"https://www.aljazeera.com/news/2026/4/24/us-envoys-head-to-pakistan-raising-hopes-of-peace-talks-with-irans-araghchi"},
  {id:1081,p:8,r:"속보",t:"Iran war updates: Trump cancels Witkoff, Kushner trip to Pakistan for talks",k:"이란전 속보: 트럼프, 위트코프·쿠슈너 파키스탄 회담 취소",s:"Al Jazeera",c:"me",d:"2026-04-25",m:"Trump abruptly cancelled the Witkoff-Kushner trip to Pakistan for Iran talks while Iran FM Araghchi was already in Islamabad. The reversal injects fresh uncertainty into the fragile US-Iran peace process.",mk:"이란 아라그치 외무장관이 이미 이슬라마바드에 도착한 가운데 트럼프가 위트코프·쿠슈너의 회담 출장을 전격 취소. 미·이란 평화 프로세스 불확실성 재고조.",tg:["취소","트럼프","협상"],u:"https://www.aljazeera.com/news/liveblog/2026/4/25/iran-war-live-tehrans-fm-in-islamabad-us-says-envoys-to-travel-for-talks"},
  {id:1082,p:7,r:"헤드라인",t:"Israel PM says Hezbollah trying to &apos;sabotage&apos; peace efforts with Lebanon",k:"이스라엘 총리 &apos;헤즈볼라가 레바논 평화 노력 방해&apos;",s:"Al Arabiya",c:"me",d:"2026-04-24",m:"PM Benjamin Netanyahu accused Hezbollah of trying to sabotage the extended Israel-Lebanon ceasefire, saying Israel maintains &apos;full freedom of action&apos; against threats. Hezbollah dismissed the truce extension as &apos;meaningless&apos;.",mk:"네타냐후 총리가 헤즈볼라가 이스라엘-레바논 휴전 연장을 방해하려 한다고 비난하며, 위협에 대해 &apos;완전한 행동의 자유&apos;를 유지한다고 주장. 헤즈볼라는 휴전 연장이 &apos;무의미&apos;하다고 일축.",tg:["네타냐후","헤즈볼라","휴전"],u:"https://english.alarabiya.net/News/middle-east/2026/04/24/israel-pm-says-hezbollah-trying-to-sabotage-peace-efforts-with-lebanon"},
  {id:1083,p:7,r:"속보",t:"Netanyahu finally comments on Lebanon ceasefire extension, accuses Hezbollah of sabotaging truce",k:"네타냐후, 레바논 휴전 연장에 입장…&apos;헤즈볼라가 휴전 방해&apos;",s:"Times of Israel",c:"me",d:"2026-04-24",m:"After days of silence, PM Netanyahu commented on the three-week Lebanon ceasefire extension, accusing Hezbollah of trying to sabotage it. He said Israel will not tolerate any reconstitution of Hezbollah&apos;s military capability.",mk:"수일간 침묵하던 네타냐후 총리가 3주 레바논 휴전 연장에 대해 입장 표명, 헤즈볼라가 휴전을 방해하려 한다고 비난. 헤즈볼라의 군사력 재건은 절대 용납하지 않을 것이라고 경고.",tg:["네타냐후","레바논","헤즈볼라"],u:"https://www.timesofisrael.com/liveblog_entry/netanyahu-finally-comments-on-lebanon-ceasefire-extension-accuses-hezbollah-of-trying-to-sabotage-truce/"},
  {id:1084,p:8,r:"주요경제",t:"Iran War: Shippers Rush for Hormuz Insurance After Ceasefire, Broker Says",k:"호르무즈 휴전 직후 화주 보험 가입 쇄도…브로커 발표",s:"Bloomberg",c:"global",d:"2026-04-08",m:"Shipowners placed huge volume requests for war risk insurance to transit the Strait of Hormuz after the US-Iran ceasefire deal, brokers report. Premiums had spiked to about 5% of vessel value during peak hostilities.",mk:"미·이란 휴전 합의 후 선주들이 호르무즈 해협 통과를 위한 전쟁위험보험 가입을 대거 신청. 브로커에 따르면 적대행위 정점에서 보험료가 선박 가치의 약 5%까지 치솟았던 상태.",tg:["보험","호르무즈","휴전"],u:"https://www.bloomberg.com/news/articles/2026-04-08/shippers-rush-for-hormuz-insurance-after-ceasefire-broker-says"},
  {id:1085,p:8,r:"주요경제",t:"US Doubles Hormuz Guarantees to $40 Billion with New Partners",k:"미국, 호르무즈 보증 400억 달러로 2배 확대…신규 파트너 추가",s:"Bloomberg",c:"global",d:"2026-04-03",m:"The US doubled its Hormuz reinsurance guarantee program to $40 billion, adding AIG and Berkshire Hathaway as partners. The expansion aims to lure ships back to the strait amid persistent traffic disruptions.",mk:"미국이 호르무즈 재보험 보증 프로그램을 400억 달러로 2배 확대, AIG와 버크셔해서웨이를 파트너로 추가. 운항 차질이 지속되는 가운데 선박 복귀를 유도하기 위한 조치.",tg:["AIG","버크셔","보증"],u:"https://www.bloomberg.com/news/articles/2026-04-03/us-doubles-hormuz-guarantees-to-40-billion-with-new-partners"},
  {id:1086,p:7,r:"주요경제",t:"U.S. Doubles Hormuz Insurance Backstop to $40B in Hopes of Luring Ships Back",k:"美 호르무즈 보험 보증 400억$로 2배 확대…선박 복귀 유도",s:"gCaptain",c:"global",d:"2026-04-03",m:"Treasury Secretary Bessent announced doubling the Hormuz insurance backstop to $40B with AIG and Berkshire as new partners. Traffic remains 90% below pre-war levels at peak disruption, with vessels still rerouting.",mk:"베센트 재무장관이 호르무즈 보험 보증을 AIG·버크셔를 추가해 400억 달러로 2배 확대한다고 발표. 차질 정점 시 운항이 전쟁 전 대비 90% 감소했으며 일부 선박은 여전히 경로 변경 중.",tg:["베센트","보증","호르무즈"],u:"https://gcaptain.com/u-s-doubles-hormuz-insurance-backstop-to-40b-in-hopes-of-luring-ships-back/"},
  {id:1087,p:9,r:"헤드라인",t:"OPEC Oil Output Posts Biggest Monthly Drop in Decades on Middle East War",k:"OPEC 원유 생산, 중동 전쟁으로 수십 년 만에 최대 월간 감소",s:"Bloomberg",c:"global",d:"2026-04-07",m:"OPEC crude output collapsed by 7.88M bpd to 20.79M bpd in March, the steepest drop since the 1980s, driven by losses from Iraq, Saudi Arabia, the UAE and Kuwait amid the Iran war and Hormuz blockade.",mk:"OPEC 원유 생산이 3월 7.88백만 b/d 감소한 20.79백만 b/d로, 1980년대 이후 최대 폭 감소. 이란 전쟁과 호르무즈 봉쇄 속 이라크·사우디·UAE·쿠웨이트 생산 차질이 주원인.",tg:["OPEC","생산감소","전쟁"],u:"https://www.bloomberg.com/news/articles/2026-04-07/opec-output-fell-most-in-decades-last-month-on-war-survey-shows"},
  {id:1088,p:9,r:"헤드라인",t:"Dated Brent Oil Price Jumps to Highest Level on Record",k:"데이티드 브렌트 유가, 사상 최고치 기록",s:"Bloomberg",c:"global",d:"2026-04-07",m:"The benchmark Dated Brent oil price soared to its highest level on record, reflecting acute physical supply tightness from the Hormuz blockade and OPEC output collapse. Refiners scrambled for alternative grades.",mk:"기준 유가 데이티드 브렌트가 사상 최고치 기록. 호르무즈 봉쇄와 OPEC 생산 급감으로 현물 공급 부족이 극심해진 결과로, 정유사들이 대체유 확보 경쟁에 돌입.",tg:["브렌트","사상최고","공급부족"],u:"https://www.bloomberg.com/news/articles/2026-04-07/key-real-world-oil-price-soars-to-highest-level-on-record"},
  {id:1089,p:8,r:"속보",t:"U.S. imposes sanctions on Chinese &apos;teapot&apos; refinery for buying Iranian oil",k:"미국, 이란산 원유 매입한 中 &apos;티팟&apos; 정유사 제재",s:"CNBC",c:"global",d:"2026-04-25",m:"The Trump administration sanctioned Hengli Petrochemical (Dalian) Refinery, a major Iran oil customer, plus 40 shadow fleet vessels and shipping companies. Treasury Secretary Bessent said the goal is a &apos;financial stranglehold&apos; on Tehran.",mk:"트럼프 행정부가 이란 원유 주요 고객인 헝리 페트로케미컬(다롄) 정유사를 비롯해 그림자 선단 40여척과 해운사를 제재. 베센트 재무장관은 테헤란에 대한 &apos;금융 압박&apos;이 목표라고 강조.",tg:["제재","헝리","베센트"],u:"https://www.cnbc.com/2026/04/25/us-china-sanctions-iran-oil.html"},
  {id:1090,p:8,r:"헤드라인",t:"US Targets Iran Oil Exports With Sanctions on Chinese Refinery, Shadow Fleet",k:"美, 中 정유사·그림자 선단 제재로 이란 원유 수출 정조준",s:"Bloomberg",c:"global",d:"2026-04-24",m:"Ahead of Pakistan talks, the US targeted Iranian oil exports through new sanctions on a Chinese refinery and shadow fleet operators. Officials called it leverage to bring Tehran to make concessions on its nuclear program.",mk:"파키스탄 회담을 앞두고 미국이 중국 정유사와 그림자 선단 운영자를 제재하며 이란 원유 수출을 표적화. 당국은 이란이 핵프로그램에서 양보하도록 유도하는 지렛대라고 설명.",tg:["제재","그림자선단","핵협상"],u:"https://www.bloomberg.com/news/articles/2026-04-24/us-sanctions-china-refinery-iran-shadow-fleet-ahead-of-talks"},
  {id:1091,p:7,r:"심층분석",t:"Trump Sanctions Pivot Helps Iran Oil Tycoons Boost War Profits",k:"트럼프 제재 전환, 이란 석유 재벌들의 전쟁 이익 확대 지원",s:"Bloomberg",c:"global",d:"2026-04-02",m:"Bloomberg analysis shows that earlier Trump sanctions waivers permitting limited Iranian oil sales at sea allowed Iranian oil tycoons to profit handsomely during the war, complicating the post-ceasefire diplomacy.",mk:"블룸버그 분석에 따르면, 트럼프의 초기 제재 면제(해상 이란 원유 제한 판매 허용)로 이란 석유 재벌들이 전쟁 중 큰 이익을 봐, 휴전 이후 외교를 복잡하게 만든다는 평가.",tg:["분석","제재면제","이란"],u:"https://www.bloomberg.com/news/articles/2026-04-02/trump-sanctions-pivot-helps-iran-oil-tycoons-boost-war-profits"},
  {id:1092,p:8,r:"속보",t:"Trump orders Navy to &apos;shoot and kill any boat&apos; laying mines in Hormuz Strait",k:"트럼프, 해군에 &apos;호르무즈 기뢰 부설 선박 발견 즉시 격침&apos; 명령",s:"CNBC",c:"global",d:"2026-04-23",m:"President Trump ordered the US Navy to &apos;shoot and kill any boat&apos; laying mines in the Strait of Hormuz, escalating naval pressure on Iran-linked operations. The directive followed reports of mining attempts during the ceasefire.",mk:"트럼프 대통령이 미 해군에 호르무즈 해협에서 기뢰를 부설하는 선박은 즉시 격침하라고 명령. 휴전 중에도 기뢰 부설 시도 보고가 이어지자 이란 연계 작전에 대한 해군 압박 강화.",tg:["기뢰","트럼프","해군"],u:"https://www.cnbc.com/2026/04/23/trump-hormuz-strait-iran-war.html"},
  {id:1093,p:7,r:"주요경제",t:"Ceasefire or not, Hormuz tanker traffic may take months to recover",k:"휴전과 관계없이 호르무즈 유조선 통행, 정상화에 수개월",s:"CNBC",c:"global",d:"2026-04-09",m:"Even with the ceasefire, Hormuz tanker traffic may take months to fully recover. Insurance, war risk premiums and lingering security concerns continue to deter operators from sending VLCCs through the strait.",mk:"휴전이 시작됐어도 호르무즈 유조선 통행 정상화는 수개월 걸릴 전망. 보험·전쟁위험할증료·잔존 안보 불안이 VLCC 운항 복귀를 가로막는 요인.",tg:["유조선","VLCC","정상화"],u:"https://www.cnbc.com/2026/04/09/tankers-return-to-hormuz-ceasefire-disruption-to-last-weeks.html"},
  {id:1094,p:7,r:"속보",t:"Iran declares Strait of Hormuz open to shipping during Lebanon ceasefire",k:"이란, 레바논 휴전 기간 호르무즈 해협 운항 개방 선언",s:"CNBC",c:"global",d:"2026-04-17",m:"Iran declared the Strait of Hormuz open to shipping during the Israel-Lebanon ceasefire window. However, the US naval blockade and lingering insurance issues kept actual transit volumes low.",mk:"이란이 이스라엘-레바논 휴전 기간 호르무즈 해협 운항 개방을 선언. 그러나 미 해군 봉쇄와 잔존 보험 문제로 실제 통과 물량은 낮은 수준에 머무름.",tg:["호르무즈","개방","휴전"],u:"https://www.cnbc.com/2026/04/17/iran-war-hormuz-strait-israel-lebanon-ceasefire.html"},
  {id:1095,p:8,r:"주요경제",t:"Kang Hoon-sik: 5월 원유 7462만 배럴 확보…수급 차질 우려 크지 않아",k:"강훈식 &quot;5월 원유 7462만배럴 확보…수급 차질 우려 크지 않아&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-24",m:"Presidential Chief of Staff Kang Hoon-sik briefed that 74.62M barrels of crude oil have been secured for May, equivalent to 87% of last year&apos;s monthly average. Saudi Arabia&apos;s 23.99M barrels via Yanbu and UAE&apos;s 16M barrels via Fujairah lead the non-Hormuz routes.",mk:"강훈식 비서실장이 5월 7462만 배럴(전년 월평균 87% 수준) 원유 확보를 공식 발표. 사우디 얀부 2399만 배럴, UAE 푸자이라 1600만 배럴 등 비호르무즈 경로가 핵심 통로.",tg:["강훈식","수급","얀부"],u:"https://www.fnnews.com/news/202604241517239862"},
  {id:1096,p:7,r:"주요경제",t:"대체원유 1억1800만 배럴 확보…일부 산유국 한국 비축기지 활용 문의",k:"대체원유 1억1800만 배럴 확보…&quot;일부 산유국, 우리 비축기지 활용 문의&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-14",m:"Korea has secured 118 million barrels of alternative crude through diversification efforts, with some oil-producing nations even inquiring about using Korean strategic petroleum reserves as storage. The success underscores Korea&apos;s growing role as Asian crude logistics hub.",mk:"한국이 다변화로 1억1800만 배럴 대체원유를 확보. 일부 산유국이 한국 비축기지 활용까지 문의해 와, 한국이 아시아 원유 물류 허브로 부상하는 모습. 비축유 활용에 대한 외교적 의미도 부각.",tg:["다변화","비축유","대체원유"],u:"https://www.fnnews.com/news/202604141319512476"},
  {id:1097,p:7,r:"정책발표",t:"호르무즈 패싱 루트 찾는다…강훈식 중동 급파",k:"호르무즈 패싱 루트 찾는다…강훈식 중동 급파",s:"서울경제",c:"korean-view",d:"2026-04-11",m:"President Lee dispatched Chief of Staff Kang Hoon-sik to the Middle East as a special envoy to secure non-Hormuz crude routes. Kang visited Saudi Arabia, Oman, Kazakhstan and Qatar to lock in alternative supply lines.",mk:"이재명 대통령이 강훈식 비서실장을 전략경제협력 특사로 중동에 급파. 사우디·오만·카자흐·카타르를 방문하며 호르무즈 우회 원유 공급선 확보에 나섬.",tg:["강훈식","특사","우회로"],u:"https://www.sedaily.com/article/20029511"},
  {id:1098,p:8,r:"헤드라인",t:"사우디, 韓 천궁Ⅱ 조기 인도 타진…UAE도 추가 요격미사일 요청",k:"&quot;사우디, 韓천궁Ⅱ 조기인도 타진…UAE도 추가 요격미사일 요청&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-13",m:"Saudi Arabia inquired with Hanwha and LIG Nex1 about accelerating delivery of the M-SAM2 (Cheongung-II) interceptor system, while the UAE requested additional interceptor missiles. The 2024 Saudi contract is worth approximately $3.2 billion across 10 batteries.",mk:"사우디 국방부가 한화·LIG넥스원에 천궁-Ⅱ(M-SAM2) 인도 일정 단축을 타진. UAE도 추가 요격미사일을 요청. 2024년 사우디 계약은 10개 포대 약 32억 달러 규모.",tg:["천궁II","LIG넥스원","방산"],u:"https://www.fnnews.com/news/202604130230436341"},
  {id:1099,p:7,r:"심층분석",t:"&apos;脫 호르무즈 하나&apos; 사우디·UAE 7조 도박",k:"&quot;탈(脫) 호르무즈 하나&quot; 사우디·UAE 7조 도박",s:"한경매거진",c:"korean-view",d:"2026-04-02",m:"Magazine Hankyung analyzes Saudi Arabia and UAE&apos;s 7 trillion won bet on bypass pipelines and ports to escape Hormuz dependence. The strategic infrastructure pivot is reshaping Gulf energy logistics for a post-Hormuz era.",mk:"한경매거진이 사우디·UAE의 7조원 규모 호르무즈 우회 인프라(송유관·항만) 도박을 분석. 전략적 인프라 전환이 호르무즈 시대 이후 걸프 에너지 물류를 재편 중.",tg:["탈호르무즈","UAE","송유관"],u:"https://magazine.hankyung.com/business/article/202604024871b"},
  {id:1100,p:7,r:"심층분석",t:"원유 확보 사활 걸었지만 정부의 섬뜩한 경고",k:"원유 확보 사활 걸었지만 정부의 섬뜩한 경고",s:"한경매거진",c:"korean-view",d:"2026-04-24",m:"Magazine Hankyung warns that despite government efforts to secure crude, structural Middle East dependency leaves Korea vulnerable to future Hormuz shocks. The article calls for accelerated diversification and strategic reserve buildup.",mk:"한경매거진이 정부의 원유 확보 노력에도 구조적 중동 의존이 향후 호르무즈 충격에 취약함을 경고. 다변화 가속과 전략비축 확대를 촉구하는 심층 분석.",tg:["원유","경고","의존도"],u:"https://magazine.hankyung.com/business/article/202604245109b"},
  {id:1101,p:10,r:"헤드라인",t:"Saudi annual Vision 2030 report shows most indicators achieve targets",k:"사우디 비전 2030 연차보고서, 대부분 지표 목표치 달성",s:"Arab News",c:"saudi",d:"2026-04-26",m:"Saudi Arabia released its Vision 2030 annual report for 2025, showing 309 of 390 performance indicators have met or nearly reached targets, a 93% completion rate. Non-oil activities now account for 55% of real GDP and the private sector contributes 51%.",mk:"사우디가 2025년도 비전 2030 연차보고서를 공개. 390개 성과지표 중 309개가 목표치에 도달해 93% 달성률을 기록. 비석유 부문이 실질 GDP의 55%, 민간부문이 51%를 차지하며 구조 전환이 가시화.",tg:["비전2030","보고서","연차"],u:"https://www.arabnews.com/node/2641250/business-economy"},
  {id:1102,p:9,r:"정책발표",t:"PIF board approves 2026-2030 strategy chaired by Crown Prince",k:"PIF 이사회, 왕세자 주재로 2026-2030 신전략 승인",s:"Arab News",c:"saudi",d:"2026-04-26",m:"The Public Investment Fund (PIF) Board, chaired by Crown Prince Mohammed bin Salman, approved the 2026-2030 strategy focused on competitive domestic ecosystems, value creation and investment efficiency across six integrated sectors including NEOM, tourism, advanced manufacturing and clean energy.",mk:"무함마드 빈 살만 왕세자가 주재한 PIF 이사회가 2026-2030 신전략을 승인. NEOM, 관광, 첨단제조, 청정에너지 등 6개 통합 생태계 중심으로 가치창출과 투자효율성에 초점을 맞춘 새로운 단계로 전환.",tg:["PIF","전략","왕세자"],u:"https://www.arabnews.com/node/2640013/business-economy"},
  {id:1103,p:8,r:"주요경제",t:"PIF strategy is powering Saudi Arabia&apos;s economic transformation",k:"PIF 신전략, 사우디 경제 대전환의 동력으로",s:"Arab News",c:"saudi",d:"2026-04-26",m:"Analysts say the PIF 2026-2030 strategy signals a sophisticated evolution from rapid expansion to sustainable value creation. The Vision Portfolio targets six integrated economic ecosystems while creating broader avenues for private sector participation.",mk:"전문가들은 PIF 2026-2030 전략이 급속 확장에서 지속가능한 가치창출로의 정교한 진화를 시사한다고 분석. 비전 포트폴리오는 6대 통합 생태계를 겨냥하면서 민간부문 참여 확대 경로를 마련.",tg:["PIF","비전2030","민간투자"],u:"https://www.arabnews.com/node/2641375"},
  {id:1104,p:9,r:"헤드라인",t:"Saudi Arabia&apos;s non-oil exports hit record SR624 billion in 2025, up 15%",k:"사우디 비석유 수출, 2025년 6240억 리얄 사상 최대 (15%↑)",s:"Saudi Gazette",c:"saudi",d:"2026-04-26",m:"Saudi Arabia&apos;s non-oil exports reached a historic SR624 billion in 2025, up 15% from SR543 billion in 2024. Their share in total exports rose to 44% from 39%, the highest on record, with the Kingdom ranking first among G20 in growth rate.",mk:"사우디 비석유 수출이 2025년 사상 최대인 6240억 리얄을 기록, 전년 5430억 대비 15% 증가. 총수출 비중도 39%에서 44%로 상승해 최고치. G20 중 성장률 1위.",tg:["비석유수출","G20","다변화"],u:"https://saudigazette.com.sa/article/660704/saudi-arabia/saudi-arabias-non-oil-exports-hit-record-sr624-billion-in-2025-up-15"},
  {id:1105,p:8,r:"주요경제",t:"Saudi non-oil exports surge 15% in 2025, highest growth among G20",k:"사우디 비석유 수출 15% 증가, G20 최고 성장률",s:"Saudi Gazette",c:"saudi",d:"2026-04-25",m:"Saudi Arabia recorded the highest growth rate among G20 economies in non-oil exports in 2025, with re-exports surging due to industrial scaling and new logistics corridors. The structural shift underpins Vision 2030 economic resilience targets.",mk:"사우디가 2025년 G20 중 비석유 수출 최고 성장률을 기록. 산업 확장과 신규 물류회랑 가동으로 재수출이 급증. 비전 2030 경제 회복력 목표를 뒷받침하는 구조 전환.",tg:["비석유수출","G20","재수출"],u:"https://saudigazette.com.sa/article/660502"},
  {id:1106,p:8,r:"주요경제",t:"PIF governor: No projects cancelled in NEOM",k:"PIF 총재: NEOM 프로젝트 취소 없다",s:"Saudi Gazette",c:"saudi",d:"2026-04-25",m:"PIF Governor Yasir Al-Rumayyan stated that no projects have been cancelled in NEOM, emphasizing that the development is undergoing a natural reassessment of spending priorities. NEOM is one of six strategic ecosystems in the new 2026-2030 PIF strategy.",mk:"PIF 야시르 알루마이얀 총재가 NEOM 프로젝트는 취소된 것이 없으며 지출 우선순위의 자연스러운 재조정 단계라고 강조. NEOM은 PIF 2026-2030 신전략의 6대 전략 생태계 중 하나로 포함.",tg:["NEOM","PIF","재조정"],u:"https://saudigazette.com.sa/article/660565"},
  {id:1107,p:7,r:"주요경제",t:"Value of Saudi date exports surpasses SR1.9 billion in 2025, up 14.3%",k:"사우디 대추야자 수출 19억 리얄 돌파, 14.3%↑",s:"Saudi Gazette",c:"saudi",d:"2026-04-25",m:"Saudi Arabia&apos;s date exports reached SR1.938 billion in 2025, up 14.3% from 2024 and surging 59.5% since 2021. The growth highlights the agricultural sector&apos;s role in Vision 2030 export diversification beyond hydrocarbons.",mk:"사우디 대추야자 수출이 2025년 19억 3800만 리얄로 전년 대비 14.3% 증가, 2021년 대비 59.5% 급증. 비전 2030 탄화수소 외 수출 다변화에서 농업 부문의 역할이 부각.",tg:["대추야자","수출","농업"],u:"https://saudigazette.com.sa/article/660826/saudi-arabia/value-of-saudi-date-exports-surpasses-sr19-billion-in-2025-up-143"},
  {id:1108,p:9,r:"헤드라인",t:"Saudi Vision 2030 Enters Third Phase with 93% of Targets Met",k:"사우디 비전 2030, 93% 목표 달성하며 3단계 진입",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-26",m:"Saudi Arabia will enter the third phase of Vision 2030 in 2026, with 93% of performance indicators having met, exceeded or nearly reached their targets. The third phase focuses on sustaining momentum, strengthening economic resilience, and maximizing long-term returns.",mk:"사우디가 2026년 비전 2030 3단계에 진입하며, 성과지표 93%가 목표 달성·초과·근접. 3단계는 추진력 유지, 경제 회복력 강화, 장기 수익 극대화에 초점.",tg:["비전2030","3단계","경제회복력"],u:"https://english.aawsat.com/business/5266581-saudi-vision-2030-enters-third-phase-93-targets-met"},
  {id:1109,p:8,r:"심층분석",t:"Analysts: Vision 2030 Accelerates Saudi Economy Reshaping Through Diversification",k:"전문가들: 비전 2030, 다변화 통한 사우디 경제 재편 가속화",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-26",m:"Analysts highlight institutional and regulatory reforms under Vision 2030 have driven economic diversification with non-oil activities making up over half of real GDP. The reforms have built a more resilient base capable of weathering geopolitical shocks.",mk:"전문가들은 비전 2030하 제도·규제 개혁이 경제 다변화를 견인해 비석유 부문이 실질 GDP의 절반 이상을 차지한다고 강조. 지정학적 충격에도 견딜 수 있는 회복력 있는 기반을 구축했다고 평가.",tg:["비전2030","다변화","회복력"],u:"https://english.aawsat.com/business/5266578-analysts-vision-2030-accelerates-saudi-economy-reshaping-through-diversification"},
  {id:1110,p:8,r:"심층분석",t:"Vision 2030 Redefines Saudi Arabia&apos;s Wealth from Oil Supplier to Global Energy Hub",k:"비전 2030, 사우디를 원유 공급국에서 글로벌 에너지 허브로 재정립",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-26",m:"The Vision 2030 framework is redefining Saudi Arabia&apos;s economic identity from a traditional crude oil exporter to a comprehensive global energy hub spanning renewables, hydrogen, and clean technology. Industry experts see the transition as essential to long-term resilience.",mk:"비전 2030이 사우디의 경제 정체성을 전통 원유 수출국에서 재생에너지·수소·청정기술을 아우르는 종합 글로벌 에너지 허브로 재정립. 업계 전문가들은 장기 회복력 확보에 필수적인 전환이라고 평가.",tg:["에너지허브","수소","재생에너지"],u:"https://english.aawsat.com/business/5266587-vision-2030-redefines-saudi-arabias-wealth-oil-supplier-global-energy-hub"},
  {id:1111,p:9,r:"주요경제",t:"Saudi Banks Post Record Quarterly Profits of $6.4 Billion",k:"사우디 10대 은행, 분기 사상 최대 64억 달러 순이익",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-26",m:"The Kingdom&apos;s 10 listed banks posted combined Q1 net profit of $6.4 billion, underscoring the sector&apos;s ability to convert Vision 2030 momentum into sustained financial gains despite regional headwinds. Loan growth and fee income drove the record performance.",mk:"사우디 상장 10대 은행이 분기 합산 사상 최대인 64억 달러 순이익을 기록. 역내 역풍에도 비전 2030 모멘텀을 지속적인 재무 성과로 전환하는 능력을 입증. 대출 성장과 수수료 수익이 견인.",tg:["은행","1분기실적","순이익"],u:"https://english.aawsat.com/business/5266891-saudi-banks-post-record-quarterly-profits-64-billion"},
  {id:1112,p:7,r:"심층분석",t:"Vision 2030 Transforms Saudi Arabia into a Global Logistics Platform",k:"비전 2030, 사우디를 글로벌 물류 플랫폼으로 변모",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-26",m:"Over the past decade, the Kingdom has demonstrated exceptional ability to overcome global shocks with greater strength, relying on the Vision 2030 approach based on resilience and proactivity. The logistics ecosystem has become a key non-oil growth engine.",mk:"지난 10년간 사우디는 회복력과 선제 대응에 기반한 비전 2030 접근을 통해 글로벌 충격을 극복할 능력을 입증. 물류 생태계가 비석유 성장의 핵심 엔진으로 부상.",tg:["물류","비전2030","허브"],u:"https://english.aawsat.com/business/5266571-vision-2030-transforms-saudi-arabia-global-logistics-platform"},
  {id:1113,p:8,r:"주요경제",t:"Saudi market well positioned for strong performance in 2026: SNB Capital",k:"SNB 캐피털: 사우디 시장, 2026년 강한 성과 기대",s:"Argaam",c:"saudi",d:"2026-04-26",m:"SNB Capital said in its Q2 outlook that the Saudi market is well positioned for strong performance in 2026, supported by structural reforms, robust banking earnings and continued PIF investment despite regional volatility from the Iran conflict.",mk:"SNB 캐피털이 2분기 전망에서 사우디 시장이 2026년 강한 성과를 낼 위치에 있다고 평가. 이란 분쟁발 역내 변동성에도 구조 개혁, 견조한 은행 실적, 지속되는 PIF 투자가 뒷받침.",tg:["SNB","전망","투자"],u:"https://www.argaam.com/en/article/articledetail/id/1872101"},
  {id:1114,p:7,r:"심층분석",t:"Overview of companies expected to list on Tadawul in 2026",k:"2026년 타다울 상장 예정 기업 개요",s:"Argaam",c:"saudi",d:"2026-04-25",m:"Argaam outlines the slate of companies preparing to list on Tadawul in 2026, with healthcare, fintech and industrial firms leading the IPO pipeline. Despite war-driven volatility, Saudi capital markets remain a key Vision 2030 channel for corporate financing.",mk:"Argaam이 2026년 타다울 상장 예정 기업 라인업을 정리. 헬스케어·핀테크·산업 기업이 IPO 파이프라인을 주도. 전쟁발 변동성에도 사우디 자본시장이 기업금융을 위한 핵심 비전 2030 채널 유지.",tg:["타다울","IPO","상장"],u:"https://www.argaam.com/en/article/articledetail/id/1870724"},
  {id:1116,p:8,r:"정책발표",t:"Foreign Ministers of Eight Countries Condemn Israeli Violations at Al-Aqsa Mosque",k:"8개국 외교장관, 알아크사 모스크 이스라엘 침해 공동 규탄",s:"SPA",c:"saudi",d:"2026-04-23",m:"Foreign ministers from Saudi Arabia, Jordan, UAE, Indonesia, Pakistan, Turkey, Qatar, and Egypt strongly condemned repeated violations at Islamic and Christian holy sites in Jerusalem, including incursions into the Al-Aqsa Mosque compound by Israeli settlers.",mk:"사우디·요르단·UAE·인도네시아·파키스탄·터키·카타르·이집트 등 8개국 외교장관들이 예루살렘 이슬람·기독교 성지의 거듭되는 침해를 공동 규탄. 이스라엘 정착민의 알아크사 모스크 침입 등이 포함.",tg:["알아크사","공동성명","예루살렘"],u:"https://spa.gov.sa/en/N2570289"},
  {id:1117,p:8,r:"주요경제",t:"UAE Economic Growth Accelerates in Early 2026 on Strong Banking Sector",k:"UAE 경제, 강한 은행권 힘입어 2026년 초 성장 가속",s:"Gulf News",c:"gulf",d:"2026-04-26",m:"UAE economic growth accelerated in early 2026 driven by expanding banking activity and rising trade flows. Banking sector assets rose 1.1% in February to exceed AED 5.472 trillion, while total credit climbed 1.2% to AED 2.63 trillion. UAE entered top 10 global merchandise exporters.",mk:"UAE 경제가 은행 활동 확대와 무역 증가에 힘입어 2026년 초 성장 가속화. 은행권 자산이 2월 1.1% 증가해 5조 4720억 디르함을 돌파, 총여신은 1.2% 상승해 2조 6300억 디르함. UAE 세계 10대 상품 수출국 진입.",tg:["UAE","은행","무역"],u:"https://gulfnews.com/business/economy/uae-growth-accelerates-in-early-2026-driven-by-banking-and-trade-gains-1.500511998"},
  {id:1118,p:7,r:"주요경제",t:"UAE Economy to Grow 5.6% in 2026 on Non-Oil Sectors: Central Bank",k:"UAE 중앙은행: 2026년 5.6% 성장, 비석유 부문이 견인",s:"Gulf News",c:"gulf",d:"2026-04-26",m:"The UAE Central Bank projected the UAE economy will grow 5.6% in 2026, supported by diversification, strong non-oil sectors and robust trade. The forecast comes despite regional disruptions from the Iran conflict and volatility in energy markets.",mk:"UAE 중앙은행이 2026년 경제성장률을 5.6%로 전망. 다변화, 강한 비석유 부문, 견조한 무역이 뒷받침. 이란 분쟁발 역내 차질과 에너지 시장 변동에도 긍정 전망 유지.",tg:["UAE","성장전망","비석유"],u:"https://gulfnews.com/business/banking/uae-economy-set-to-grow-56-in-2026-central-bank-report-1.500501523"},
  {id:1119,p:8,r:"주요경제",t:"Khalifa Fund and Chalhoub hold retail entrepreneur training in Abu Dhabi",k:"칼리파 펀드·샬후브, 아부다비서 소매업 창업가 교육",s:"Khaleej Times",c:"gulf",d:"2026-04-26",m:"Khalifa Fund for Enterprise Development partnered with Chalhoub Investment Group to deliver retail project management training to 45 entrepreneurs. The program reflects ongoing UAE commitment to SME ecosystem development as part of economic diversification.",mk:"칼리파 기업개발 펀드가 샬후브 인베스트먼트 그룹과 협력해 45명의 창업가에게 소매 프로젝트 관리 교육 실시. 경제 다변화 일환으로 중소기업 생태계 발전을 향한 UAE의 지속적 의지를 반영.",tg:["UAE","중소기업","교육"],u:"https://www.khaleejtimes.com/business/khalifa-fund-and-chalhoub-hold-training"},
  {id:1120,p:8,r:"헤드라인",t:"Qatar joins GCC talks on trade negotiations and industrial strategy",k:"카타르, 무역협상·산업전략 GCC 협의 참여",s:"Qatar Tribune",c:"gulf",d:"2026-04-26",m:"Qatar joined GCC trade and industry talks at the 48th preparatory meeting, where officials discussed defining a unified GCC national product. Oman and Kuwait jointly proposed refining localization criteria by sector, signaling deeper economic integration.",mk:"카타르가 제48차 GCC 산업장관 준비회의에 참여해 통합 GCC 국가제품 정의 논의에 동참. 오만과 쿠웨이트는 부문별 현지화 기준 정교화를 공동 제안하며 경제 통합 심화 방향을 시사.",tg:["카타르","GCC","현지화"],u:"https://www.qatar-tribune.com/article/230584/business/qatar-joins-gcc-talks-on-trade-negotiations-and-industrial-strategy"},
  {id:1121,p:7,r:"주요경제",t:"Doha emerges as GCC Tourism Capital 2026 amid recovery",k:"도하, 회복기에 GCC 관광수도 2026 부상",s:"Qatar Tribune",c:"gulf",d:"2026-04-26",m:"Qatar overtook UAE, Oman, Saudi Arabia and Kuwait as the GCC Tourism Capital for 2026, reflecting Doha&apos;s sustained investment in cultural infrastructure, sports tourism legacy and aviation hub recovery following Hamad International Airport reopening.",mk:"카타르가 UAE·오만·사우디·쿠웨이트를 제치고 2026년 GCC 관광수도로 선정. 하마드 국제공항 재개 이후 문화 인프라 투자, 스포츠 관광 유산, 항공 허브 회복 등이 도하의 강점으로 부각.",tg:["카타르","관광","도하"],u:"https://www.qatar-tribune.com/latest-news"},
  {id:1122,p:8,r:"헤드라인",t:"Amir of Qatar and Sultan of Oman discuss regional developments in Muscat",k:"카타르 국왕·오만 술탄, 무스카트서 역내 정세 협의",s:"Qatar Tribune",c:"gulf",d:"2026-04-23",m:"Sheikh Tamim bin Hamad Al Thani and Sultan Haitham bin Tariq met at Al Baraka Palace in Muscat to discuss regional developments amid rising tensions, ceasefire diplomacy with Iran and the role of Gulf states in bridging diplomatic positions.",mk:"카타르 타밈 빈 하마드 알 타니 국왕과 오만 하이삼 빈 타리크 술탄이 무스카트 알 바라카 궁에서 회담. 고조되는 긴장 속 역내 정세, 이란 휴전 외교, 걸프국의 외교적 가교 역할을 협의.",tg:["카타르","오만","정상회담"],u:"https://www.qatar-tribune.com/nation"},
  {id:1123,p:10,r:"헤드라인",t:"Iran war live: Araghchi to meet Putin; Strait of Hormuz remains shut",k:"이란전 라이브: 아락치, 푸틴 회담 예정…호르무즈 해협 봉쇄 지속",s:"Al Jazeera",c:"me",d:"2026-04-27",m:"Iran&apos;s Foreign Minister Abbas Araghchi heads to Moscow to meet President Putin as Trump indicated Tehran can call for talks. The Strait of Hormuz remains effectively shut, with traffic far below pre-war levels despite the April 8 ceasefire.",mk:"이란 아바스 아락치 외교장관이 푸틴 대통령과 회담을 위해 모스크바로 향함. 트럼프는 테헤란이 협상을 제안할 수 있다고 언급. 4월 8일 휴전에도 불구하고 호르무즈 해협 통항은 전쟁 전 수준에 크게 못 미침.",tg:["이란","푸틴","호르무즈"],u:"https://www.aljazeera.com/news/liveblog/2026/4/27/iran-war-live-araghchi-to-meet-putin-trump-says-tehran-can-call-for-talks"},
  {id:1124,p:9,r:"헤드라인",t:"Iran war updates: Standoff in Hormuz continues; Israel and Hezbollah battle",k:"이란전 업데이트: 호르무즈 대치 지속, 이스라엘-헤즈볼라 교전",s:"Al Jazeera",c:"me",d:"2026-04-26",m:"Tehran rejected talks under siege as Trump cancelled an envoys&apos; trip to Pakistan. Saudi Arabia, the UAE and Kuwait remain on alert after April attacks. Hezbollah-Israel exchanges escalated, prompting Northern Israel home front restrictions.",mk:"테헤란이 포위 상황에서의 협상을 거부하면서 트럼프가 파키스탄행 특사를 취소. 사우디·UAE·쿠웨이트가 4월 공격 후 경계 태세 지속. 헤즈볼라-이스라엘 교전 격화로 북부 이스라엘 후방 통제령 발령.",tg:["이란","호르무즈","협상"],u:"https://www.aljazeera.com/news/liveblog/2026/4/26/iran-war-live-tehran-rejects-talks-under-siege-trump-cancels-envoys-trip"},
  {id:1125,p:8,r:"심층분석",t:"Has Iran exposed the limits of what US can achieve by force?",k:"이란이 美 군사력의 한계를 드러냈는가?",s:"Al Jazeera",c:"me",d:"2026-04-26",m:"Analysts on The Bottom Line argue Iran has exposed the limits of US military power. Vali Nasr of Johns Hopkins says Washington has no other option but to pursue a diplomatic solution as ground operations would carry massive costs.",mk:"분석가들은 이란이 美 군사력의 한계를 드러냈다고 진단. 존스홉킨스대 발리 나스르는 워싱턴이 외교적 해결 외에 선택지가 없으며 지상작전은 막대한 비용을 수반할 것이라고 주장.",tg:["이란","외교","한계"],u:"https://www.aljazeera.com/video/the-bottom-line/2026/4/26/has-iran-exposed-the-limits-of-what-us-can-achieve-by-force"},
  {id:1126,p:9,r:"헤드라인",t:"April 26: Home Front Command limits gatherings in north amid Hezbollah attacks",k:"4월 26일: 헤즈볼라 공격에 이스라엘 北 집회 제한",s:"Times of Israel",c:"me",d:"2026-04-26",m:"The IDF Home Front Command imposed gathering restrictions on several northern Israeli areas amid intensified Hezbollah rocket and drone fire. Iran briefed Saudi&apos;s FM on diplomatic efforts, while Saudi normalization remains conditional on Palestinian state pathway.",mk:"IDF 후방사령부가 헤즈볼라의 로켓·드론 공격 격화로 북부 이스라엘 일부 지역 집회 제한령 발동. 이란이 사우디 외무장관에게 외교노력을 브리핑했으나 사우디 정상화는 팔레스타인 국가 경로에 조건부.",tg:["이스라엘","헤즈볼라","북부"],u:"https://www.timesofisrael.com/liveblog-april-26-2026/"},
  {id:1127,p:8,r:"헤드라인",t:"Saudi Arabia asks US to end Strait of Hormuz blockade",k:"사우디, 美에 호르무즈 해협 봉쇄 해제 요청",s:"Jerusalem Post",c:"me",d:"2026-04-25",m:"Saudi Arabia is pressing the US to end the blockade of the Strait of Hormuz and return to negotiations with Iran, Jerusalem Post reported. The Kingdom warns prolonged closure damages global energy stability and Saudi export logistics.",mk:"사우디아라비아가 미국에 호르무즈 해협 봉쇄 해제와 이란 협상 복귀를 압박하고 있다고 예루살렘포스트가 보도. 사우디는 봉쇄 장기화가 글로벌 에너지 안정성과 사우디 수출 물류에 타격을 준다고 경고.",tg:["호르무즈","사우디","봉쇄"],u:"https://www.jpost.com/middle-east/article-892994"},
  {id:1129,p:10,r:"헤드라인",t:"Goldman Sachs Raises Oil Price Forecasts on Persian Gulf Supply Disruption",k:"골드만삭스, 호르무즈 충격 격화에 유가 전망 상향",s:"Bloomberg",c:"global",d:"2026-04-27",m:"Goldman Sachs raised Q4 2026 Brent forecast to $90/bbl from $80 and WTI to $83 from previous estimates, citing 14.5 mb/d of Middle East output losses driving a record 11-12 mb/d global inventory draw in April. Risks remain skewed firmly to the upside.",mk:"골드만삭스가 2026년 4분기 브렌트유 전망을 80→90달러, WTI도 상향 조정. 중동 1450만 b/d 생산 손실이 4월 1100~1200만 b/d 규모 글로벌 재고 감소를 견인. 추가 상승 리스크 우세.",tg:["골드만삭스","유가","전망"],u:"https://www.bloomberg.com/news/articles/2026-04-27/goldman-hikes-oil-price-forecasts-on-extreme-inventory-draws"},
  {id:1130,p:10,r:"헤드라인",t:"Oil Rises as Hormuz Stays Shut for Third Month After Talks Stall",k:"협상 교착에 호르무즈 3개월째 봉쇄, 유가 상승",s:"Bloomberg",c:"global",d:"2026-04-26",m:"Brent rose as much as 2.5% to $107.97/bbl while WTI traded near $96 as Iran-US peace talks stalled and Strait of Hormuz remains effectively closed. Trump cancelled envoys&apos; trip to Pakistan; Iran refuses to negotiate under threats.",mk:"이란-美 평화협상 교착과 호르무즈 해협 사실상 봉쇄 지속에 브렌트유가 2.5% 상승해 배럴당 107.97달러 기록, WTI는 96달러 부근. 트럼프는 파키스탄행 특사를 취소했고 이란은 위협 하 협상 거부.",tg:["유가","호르무즈","협상"],u:"https://www.bloomberg.com/news/articles/2026-04-26/latest-oil-market-news-and-analysis-for-april-27"},
  {id:1133,p:8,r:"헤드라인",t:"Iran foreign minister presses on with regional tour despite Trump cancelling envoys visit",k:"트럼프 특사 취소에도 이란 외교장관, 역내 순방 강행",s:"CNN",c:"global",d:"2026-04-26",m:"Iran&apos;s FM Abbas Araghchi conducts intensive phone diplomacy with Egypt, France, Qatar, Saudi Arabia and Turkey while traveling to Pakistan, Oman and next to Russia. He briefed Saudi FM on Iran&apos;s diplomatic efforts to end the war and reduce tensions.",mk:"이란 아바스 아락치 외교장관이 이집트·프랑스·카타르·사우디·터키와 집중 전화외교를 펼치며 파키스탄·오만 방문 후 러시아행. 사우디 외무장관에게 종전과 긴장완화를 위한 이란의 외교노력을 브리핑.",tg:["이란","외교","사우디"],u:"https://edition.cnn.com/2026/04/26/world/live-news/iran-war-trump-israel"},
  {id:1135,p:8,r:"심층분석",t:"Middle East oil production plunges due to Iran war, OPEC data shows",k:"OPEC 데이터: 이란 전쟁으로 중동 산유량 급감",s:"CNBC",c:"global",d:"2026-04-13",m:"OPEC data shows Saudi Arabia&apos;s output dropped 23% from 10.1 mb/d to 7.8 mb/d due to Iran war disruptions including pipeline attacks and offshore field closures. The supply shock is the largest in history per IEA, restoring normal flows could take months even after war ends.",mk:"OPEC 자료에 따르면 사우디 생산이 송유관 공격과 해상유전 폐쇄 등 이란전 차질로 1010→780만 b/d로 23% 급감. IEA 기준 사상 최대 규모 공급 충격으로, 종전 이후에도 정상 회복까지 수개월 소요 전망.",tg:["OPEC","사우디","생산"],u:"https://www.cnbc.com/2026/04/13/iran-war-oil-opec-production-decline.html"},
  {id:1136,p:7,r:"심층분석",t:"From Iran War Panic to New Peaks: How U.S. Indexes Rallied Right Through the Fear",k:"이란전 공포에서 신고가까지: 美 증시는 어떻게 두려움을 뚫고 랠리했나",s:"Motley Fool",c:"global",d:"2026-04-26",m:"Motley Fool analysis notes oil prices doubled from $60 to $120 during the 2026 Iran conflict yet S&P 500 sits above 7,000. Earnings resilience, AI capex and Treasury demand have buffered war shock, though structural energy risks persist into Q3.",mk:"Motley Fool 분석은 2026년 이란 분쟁 중 유가가 60→120달러로 2배 올랐음에도 S&P 500이 7000선 위에 있다고 진단. 실적 회복력, AI 투자, 국채 수요가 충격을 흡수했으나 3분기까지 구조적 에너지 리스크 지속.",tg:["증시","S&P500","유가"],u:"https://www.fool.com/investing/2026/04/26/iran-war-panic-new-peaks-how-us-indexes-rally-fear/"},
  {id:1137,p:7,r:"심층분석",t:"Why Are the Saudis Sitting Out the War With Iran?",k:"사우디는 왜 이란 전쟁에 참전하지 않는가",s:"Foreign Policy",c:"global",d:"2026-04-24",m:"Foreign Policy analyzes Saudi Arabia&apos;s deliberate non-belligerent posture, declaring it reserves the right to retaliate yet refraining despite repeated Iranian missile and drone attacks. The Kingdom prioritizes economic shielding of Vision 2030 over military confrontation.",mk:"포린폴리시는 사우디의 의도적 비교전 자세를 분석. 사우디는 이란의 미사일·드론 반복 공격에도 반격 권리 유보만 선언하며 자제. 군사 충돌보다 비전 2030 경제 보호를 우선시하는 전략.",tg:["사우디","비교전","비전2030"],u:"https://foreignpolicy.com/2026/04/24/saudi-arabia-israel-united-states-iran-war/"},
  {id:1138,p:8,r:"헤드라인",t:"US halts shipment of Iraqs oil dollars to curb Iran-linked groups: WSJ",k:"美, 이란 연계세력 견제 위해 이라크 원유달러 송금 중단 (WSJ)",s:"Al Jazeera",c:"global",d:"2026-04-22",m:"The US halted shipment of Iraq&apos;s oil-dollar revenues as part of a pressure campaign targeting Iran-linked armed groups, WSJ reported. The move adds pressure on Baghdad while complicating Iraqi government finances during the regional crisis.",mk:"美가 이란 연계 무장단체를 겨냥한 압박 캠페인 일환으로 이라크 원유달러 수입 송금을 중단했다고 WSJ가 보도. 바그다드에 추가 압박을 가하는 동시에 역내 위기 속 이라크 재정을 복잡하게 만드는 조치.",tg:["이라크","달러","제재"],u:"https://www.aljazeera.com/news/2026/4/22/us-halts-iraq-dollar-shipments-in-pressure-campaign-over-iran-linked-groups"},
  {id:1139,p:8,r:"심층분석",t:"Saudi Arabia Has Strong Financial Buffers to Confront War Impact",k:"사우디, 전쟁 충격 대응할 강력한 재정 완충 보유",s:"Asharq Al-Awsat",c:"global",d:"2026-04-22",m:"IMF&apos;s Jihad Azour told Asharq Al-Awsat Saudi Arabia has strong financial buffers to confront war impact, citing FX reserves above $440bn and PIF assets. He said Vision 2030 reform discipline is anchoring market confidence despite Hormuz disruption.",mk:"IMF 지하드 아주르 중동·중앙아시아 국장이 Asharq Al-Awsat에 사우디는 4400억 달러 외환보유고와 PIF 자산 등 전쟁 충격에 대응할 강력한 재정 완충을 보유했다고 평가. 호르무즈 차질에도 비전 2030 개혁 기조가 시장 신뢰를 떠받치고 있다고 언급.",tg:["IMF","재정","완충"],u:"https://english.aawsat.com/business"},
  {id:1140,p:8,r:"주요경제",t:"World Bank Slashes 2026 Middle East Growth Forecast, Saudi Arabia Absorbs Shock",k:"세계은행, 2026 중동 성장률 대폭 하향…사우디는 충격 흡수",s:"Asharq Al-Awsat",c:"global",d:"2026-04-21",m:"World Bank slashed its 2026 Middle East growth forecast to 1.8% as Hormuz closure and energy infrastructure damage roil markets. Qatar&apos;s outlook fell 11pp to a 5.7% contraction, while Saudi Arabia&apos;s 3.1% forecast remains the strongest among Gulf economies.",mk:"세계은행이 호르무즈 봉쇄와 에너지 인프라 피해 속 시장 혼란으로 2026 중동 성장률 전망을 1.8%로 대폭 하향. 카타르 전망은 11%p 하락해 -5.7% 위축. 사우디 3.1%는 걸프 중 최고 수준 유지.",tg:["세계은행","성장전망","사우디"],u:"https://english.aawsat.com/business/5260381-world-bank-slashes-2026-middle-east-growth-forecast-saudi-arabia-absorbs-shock"},
  {id:1141,p:9,r:"헤드라인",t:"Korea-Saudi crude security deepens with Korean SPR access offered",k:"한국-사우디 원유 안보 강화…한국 비축기지 활용 제안",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-14",m:"Korea has secured 118 million barrels of alternative crude with Saudi Arabia accounting for 34% of imports. Some oil-producing nations are inquiring about using Korean strategic petroleum reserves as storage, signaling Korea&apos;s emerging role as Asia&apos;s crude logistics hub.",mk:"한국이 1억 1800만 배럴 대체원유를 확보했으며 사우디 비중이 34%. 일부 산유국들이 한국 전략비축기지(SPR)를 저장소로 활용하는 방안을 문의해와 한국이 아시아 원유 물류 허브로 부상.",tg:["대체원유","비축기지","사우디"],u:"https://www.fnnews.com/news/202604141319512476"},
  {id:1142,p:7,r:"심층분석",t:"한국, 사우디 비전 2030 3단계 진입에 인프라·방산 협력 확대 전망",k:"한국, 사우디 비전 2030 3단계 진입에 인프라·방산 협력 확대 전망",s:"연합뉴스",c:"korean-view",d:"2026-04-26",m:"Korean construction and defense firms expect expanded cooperation as Saudi Arabia enters the third phase of Vision 2030. Hyundai E&C, Hanwha and LIG Nex1 are positioning for additional contracts in NEOM, energy infrastructure and air defense systems amid 93% KPI achievement.",mk:"한국 건설·방산 기업들이 사우디 비전 2030 3단계 진입에 협력 확대를 기대. 현대건설, 한화, LIG넥스원이 KPI 93% 달성 발표 속 NEOM, 에너지 인프라, 방공시스템 추가 수주를 노리는 중.",tg:["비전2030","건설","방산"],u:"https://www.yna.co.kr/view/AKR20260426"},
  {id:1143,p:9,r:"헤드라인",t:"사우디, 韓 천궁Ⅱ 조기 인도 타진 후속…방산수출 확대 가속",k:"사우디, 韓 천궁Ⅱ 조기 인도 타진 후속…방산수출 확대 가속",s:"한국경제",c:"korean-view",d:"2026-04-22",m:"Saudi Arabia is reportedly accelerating Cheongung-II (M-SAM2) delivery negotiations with Hanwha and LIG Nex1 amid persistent Iran missile threats. The 2024 contract worth approximately $3.2 billion across 10 batteries could see expansion as UAE also requests additional interceptors.",mk:"이란 미사일 위협 지속 속 사우디가 한화·LIG넥스원과의 천궁-Ⅱ(M-SAM2) 조기 인도 협상을 가속. 2024년 10개 포대 약 32억 달러 계약은 UAE 추가 요청과 함께 확대 가능성이 부각.",tg:["천궁II","방산","사우디"],u:"https://www.hankyung.com/article/2026042287000"},
  {id:1144,p:8,r:"주요경제",t:"현대차-PIF 합작공장 4분기 첫 출고 임박, 한·사우디 자동차 협력 본격화",k:"현대차-PIF 합작공장 4분기 첫 출고 임박, 한·사우디 자동차 협력 본격화",s:"서울경제",c:"korean-view",d:"2026-04-24",m:"Hyundai Motor and PIF joint venture at King Salman Automotive Cluster targets first vehicle rollout in Q4 2026 with annual capacity of 50,000 units including EVs. The plant marks a milestone in Korea-Saudi industrial cooperation under Vision 2030 ecosystems strategy.",mk:"현대차-PIF 합작공장이 킹 살만 자동차 클러스터에서 2026년 4분기 첫 출고를 목표로 함. EV 포함 연 5만 대 생산능력으로, 비전 2030 생태계 전략 하 한·사우디 산업 협력의 이정표.",tg:["현대차","PIF","자동차"],u:"https://www.sedaily.com/article/20029655"},
  {id:1145,p:8,r:"심층분석",t:"사우디 비전2030 3단계 진입, 韓기업 수주 기회와 리스크 동시 부각",k:"사우디 비전2030 3단계 진입, 韓기업 수주 기회와 리스크 동시 부각",s:"매일경제",c:"korean-view",d:"2026-04-26",m:"Maeil Business analyzes Saudi Vision 2030 third phase brings both opportunities and risks for Korean firms. While PIF six-ecosystem strategy expands EPC and tech project pipelines, reduced direct PIF funding for mega-projects requires new financing structures from Korean partners.",mk:"매일경제는 사우디 비전 2030 3단계 진입이 한국 기업에 기회와 리스크를 동시에 부각시킨다고 분석. PIF의 6대 생태계 전략은 EPC·기술 프로젝트 파이프라인을 확대하지만, 메가 프로젝트 직접 PIF 자금 축소로 한국 파트너의 새로운 금융 구조 요구.",tg:["비전2030","건설","수주"],u:"https://www.mk.co.kr/news/world/saudi-vision-2030-phase-three"},
  {id:1146,p:7,r:"주요경제",t:"원유 시장 100달러대 고착 우려…韓 정유업계 정제마진·환율 이중고",k:"원유 시장 100달러대 고착 우려…韓 정유업계 정제마진·환율 이중고",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-26",m:"Korean refiners face dual pressure from Brent above $100 and won weakness as Goldman Sachs raises Q4 2026 forecast to $90/bbl on Hormuz disruption. Prolonged premium threatens refining margins despite Korea diversified supply through Saudi Red Sea routes.",mk:"골드만삭스의 호르무즈 차질발 4분기 브렌트 90달러 상향 속 100달러대 고착 우려. 한국 정유업계가 사우디 홍해 경로 등 다변화에도 불구하고 정제마진·원달러 환율 이중고에 직면.",tg:["유가","정유","환율"],u:"https://www.fnnews.com/news/202604261800442222"},
  {id:1147,p:8,r:"심층분석",t:"Iran War: How High Could Oil Prices Get with Strait of Hormuz Closure",k:"이란 전쟁: 호르무즈 폐쇄로 유가 어디까지 갈까",s:"Bloomberg",c:"global",d:"2026-04-24",m:"Bloomberg analysis maps how prolonged Strait of Hormuz closure could push Brent toward $130-150 in a worst-case scenario, citing 20% global oil supply transit through the strait. Asian importers including Korea face the greatest tail risk from extended disruption.",mk:"블룸버그가 호르무즈 해협 폐쇄 장기화 시 브렌트유가 최악의 경우 130~150달러까지 갈 수 있다고 분석. 세계 석유 공급의 20%가 해협을 통과한다는 점을 지적. 한국을 포함한 아시아 수입국이 장기 차질의 최대 꼬리 위험에 노출.",tg:["블룸버그","유가","꼬리위험"],u:"https://www.bloomberg.com/graphics/2026-iran-war-hormuz-closure-oil-shock/"},
  {id:1148,p:8,r:"헤드라인",t:"OPEC+ debates oil output hike amid Iran war paralysis, sources say",k:"이란전 마비 속 OPEC+, 추가 증산 논의",s:"CNBC",c:"global",d:"2026-04-05",m:"CNBC reports OPEC+ debated additional output hikes amid Iran war paralysis, with eight key producers including Saudi Arabia, Russia, Iraq, UAE, Kuwait, Kazakhstan, Algeria and Oman finalizing a 206 kb/d adjustment for May 2026. The move offsets only a fraction of war-driven supply losses.",mk:"CNBC가 이란전 마비 속 OPEC+의 추가 증산 논의를 보도. 사우디·러시아·이라크·UAE·쿠웨이트·카자흐·알제리·오만 등 8개 주력 산유국이 5월 일일 20만 6천 b/d 조정에 합의. 전쟁발 공급 손실의 극히 일부만 상쇄하는 수준.",tg:["OPEC+","증산","사우디"],u:"https://www.cnbc.com/2026/04/05/opec-debates-making-oil-output-hike-amid-iran-war-paralysis-reuters.html"},
  {id:1149,p:8,r:"정책발표",t:"Saudi govt local procurement reaches 51%: Alkhorayef",k:"사우디 정부 조달의 51%가 현지 콘텐츠…알코라예프 장관",s:"Arab News",c:"saudi",d:"2026-04-27",m:"Local content in government procurement surpassed 51% in 2025, Industry and Mineral Resources Minister Bandar Alkhorayef said. The Kingdom aims to lift the share to 70% by 2030 under Vision 2030, supporting domestic suppliers and industrial localization.",mk:"산업광물자원부 반다르 알코라예프 장관이 2025년 정부 조달의 51% 이상이 현지 콘텐츠라고 발표. 사우디는 비전2030의 일환으로 2030년까지 이 비중을 70%로 끌어올릴 목표. 국내 공급망과 산업 현지화를 뒷받침.",tg:["현지화","조달","비전2030","알코라예프"],u:"https://www.arabnews.com/node/2641465/saudi-arabia"},
  {id:1150,p:9,r:"주요경제",t:"Saudi banks post record quarterly profits of $6.4bn",k:"사우디 은행들, 분기 사상 최대 64억 달러 순이익",s:"Arab News",c:"saudi",d:"2026-04-27",m:"Saudi Arabia's 10 listed banks posted combined Q1 2026 net profit of $6.4 billion (SR23.95 billion), up 7.6% YoY. Vision 2030-driven financing demand in real estate, utilities and retail underpinned strong lending growth, with Al Rajhi (+14.32%), SNB (+6.66%) and Riyad Bank (+5%) leading.",mk:"사우디 상장은행 10곳의 1분기 순이익 합계가 64억 달러(239.5억 리얄)로 전년 동기 대비 7.6% 증가, 분기 기준 사상 최대. 비전2030이 견인한 부동산·유틸리티·소매 부문 자금 수요가 대출 성장 견인. 알라지(+14.32%)·SNB(+6.66%)·리야드뱅크(+5%) 약진.",tg:["은행","최대실적","비전2030","대출"],u:"https://www.arabnews.com/node/2641439/business-economy"},
  {id:1151,p:8,r:"정책발표",t:"Saudi tourism minister inspects hospitality facilities for pilgrims in Makkah ahead of Hajj",k:"사우디 관광장관, 하지 앞두고 메카 순례객 접객시설 점검",s:"Arab News",c:"saudi",d:"2026-04-27",m:"Tourism Minister Ahmed Al-Khateeb inspected hospitality facilities in Makkah Monday ahead of next month's Hajj. Over 566,000 beds have been added to pilgrim hospitality through a temporary accommodation licensing service launched in October. Hajj 2026 is expected to begin around May 25.",mk:"아흐메드 알카티브 관광장관이 27일 다음 달 하지 시즌을 앞두고 메카의 순례객 접객시설을 점검. 지난해 10월 도입된 임시 숙박 라이선스 제도를 통해 56만 6천 개 이상의 객실이 추가 공급. 2026년 하지는 5월 25일경 개시 예정.",tg:["하지","Hajj","관광부","메카"],u:"https://www.arabnews.com/node/2641502/saudi-arabia"},
  {id:1152,p:8,r:"주요경제",t:"Saudi Arabia signs MoUs at Hannover Messe to advance industrial localization",k:"사우디, 하노버메세서 산업현지화 양해각서 3건 체결",s:"Arab News",c:"saudi",d:"2026-04-26",m:"The Ministry of Industry and Mineral Resources signed three MoUs during Hannover Messe 2026 (April 20-24) to advance electrical manufacturing, smart grid technology and industrial localization. Partners include Phoenix Contact Saudi Arabia, Alfanar, Abunayyan Trading, and United Technology of Electric Substations & Switchgears.",mk:"산업광물자원부가 4월 20~24일 독일 하노버메세 2026에서 전기제조·스마트그리드·산업현지화를 위한 양해각서 3건 체결. 파트너로 피닉스컨택트 사우디, 알파나르, 아부나얀 트레이딩, 변전소·스위치기어 통합기술사 등 참여.",tg:["하노버메세","산업현지화","스마트그리드","MoU"],u:"https://www.arabnews.com/node/2641332/business-economy"},
  {id:1153,p:7,r:"심층분석",t:"Ancient Darb Zubaydah lives on as modern gateway for Iraq's Hajj pilgrims",k:"고대 '다르브 주바이다', 이라크 하지 순례객 위한 현대 관문으로",s:"Arab News",c:"saudi",d:"2026-04-27",m:"Saudi Arabia's Northern Borders Region is blending heritage and modern logistics to serve thousands of Hajj pilgrims arriving overland from Iraq, reviving the ancient Darb Zubaydah route through the Jadidat Arar border crossing, according to SPA.",mk:"사우디 북부 국경지역이 이라크에서 육로로 도착하는 수천 명의 하지 순례객을 위해 고대 '다르브 주바이다' 길을 자디다트 아라르 국경 통로로 재조명. SPA 보도에 따르면 역사와 현대 물류를 결합한 환영 시스템 운영.",tg:["하지","이라크","국경","순례"],u:"https://www.arabnews.com/node/2641410/saudi-arabia"},
  {id:1154,p:7,r:"주요경제",t:"Saudi Awwal Bank reports SR2.1bn net profit for Q1 2026",k:"SAB, 1분기 순이익 21억 리얄 발표",s:"Arab News",c:"saudi",d:"2026-04-26",m:"Saudi Awwal Bank reported Q1 2026 net profit of SR2.1 billion, with operating income gains underpinning steady loan-book expansion. The result aligns with the broader Saudi banking sector's record profit run amid Vision 2030-linked financing demand.",mk:"사우디 아우왈 은행(SAB)이 1분기 순이익 21억 리얄 기록. 영업이익 증가가 안정적인 대출 성장 뒷받침. 비전2030 관련 자금수요 속에 사우디 은행권의 사상 최대 분기 이익 흐름과 부합.",tg:["SAB","은행","실적","비전2030"],u:"https://www.arabnews.com/node/2641425/corporate-and-sponsored-content"},
  {id:1155,p:7,r:"주요경제",t:"Saudi chemical exports jump 18% in February on stronger demand",k:"사우디 화학제품 수출, 2월 수요 회복에 18% 급증",s:"Arab News",c:"saudi",d:"2026-04-26",m:"Saudi chemical exports jumped 18% YoY in February as global demand for petrochemicals strengthened. The rebound supports the Kingdom's downstream diversification push and offsets some impact of Iran-war-related crude export disruptions.",mk:"사우디 화학제품 수출이 2월 전년 동월 대비 18% 급증. 글로벌 석유화학 수요 강세가 회복 견인. 이란전 관련 원유 수출 차질 영향을 일부 상쇄하며 다운스트림 다각화 정책 뒷받침.",tg:["화학수출","석유화학","다각화"],u:"https://www.arabnews.com/node/2641356/business-economy"},
  {id:1156,p:8,r:"정책발표",t:"Saudi Industry Ecosystem Participates in Hannover Messe 2026 in Germany",k:"사우디 산업생태계, 독일 하노버메세 2026 참가",s:"SPA",c:"saudi",d:"2026-04-24",m:"SPA reports Saudi Arabia's industry ecosystem wrapped up its participation in Hannover Messe 2026, with the Ministry of Industry, Saudi Industrial Development Fund, MODON and Saudi Export Development Authority showcasing the Kingdom's industrial transformation journey.",mk:"SPA에 따르면 사우디 산업생태계가 하노버메세 2026 참가를 마무리. 산업부·사우디산업개발기금(SIDF)·MODON·사우디수출개발청 등이 왕국의 산업 전환 여정을 전시·소개.",tg:["하노버메세","산업부","SIDF","MODON"],u:"https://www.spa.gov.sa/en/N2560535"},
  {id:1157,p:9,r:"헤드라인",t:"Saudi Vision 2030 enters final phase as 93% of KPIs meet 2025 targets",k:"사우디 비전2030, 2025년 KPI 93% 목표 달성하며 최종 단계 진입",s:"Saudi Gazette",c:"saudi",d:"2026-04-26",m:"Saudi Vision 2030 entered its third and final phase with 93% of KPIs meeting or exceeding 2025 targets, while 90% of initiatives were completed or on track. Saudi Arabia ranks first globally in cybersecurity and third on the global AI index.",mk:"사우디 비전2030이 3단계 최종 국면 진입. 2025년 KPI의 93%가 목표 달성·초과, 이니셔티브 90%가 완료·정상 진행. 사이버보안 세계 1위, AI 지수 세계 3위 기록.",tg:["비전2030","KPI","사이버보안","AI"],u:"https://saudigazette.com.sa/article/660839/saudi-arabia/saudi-vision-2030-enters-final-phase-as-93-of-kpis-meet-2025-targets"},
  {id:1158,p:7,r:"심층분석",t:"Lower section of Kaaba's Kiswa raised in preparation for Hajj 2026",k:"카바 키스와 하단 들어올려…2026 하지 준비 본격화",s:"Saudi Gazette",c:"saudi",d:"2026-04-25",m:"The General Authority for the Care of the Affairs of the Two Holy Mosques completed the annual raising of the lower section of the Holy Kaaba's Kiswa as part of comprehensive preparations to receive Hajj pilgrims, a tradition designed to protect the sacred cloth from wear during the pilgrimage rush.",mk:"양 성지 관리청이 2026년 하지 준비의 일환으로 카바 키스와 하단부를 들어올리는 연례 작업을 완료. 순례 인파에 의한 마모로부터 신성한 천을 보호하기 위한 전통적 절차.",tg:["카바","키스와","하지","성지"],u:"https://saudigazette.com.sa/article/660640/saudi-arabia/lower-section-of-kaabas-kiswa-raised-in-preparation-for-hajj-2026"},
  {id:1159,p:8,r:"심층분석",t:"World Bank to Asharq Al-Awsat: Saudi Arabia Plays a Central Role in Stabilizing Energy Markets",k:"세계은행 \"사우디, 에너지시장 안정화에 핵심 역할\"",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-26",m:"World Bank officials told Asharq Al-Awsat that Saudi Arabia plays a central role in stabilizing global energy markets amid the Iran war, citing the Kingdom's alternative pipeline routes and substantial financial buffers as critical to absorbing supply disruptions through the Strait of Hormuz.",mk:"세계은행 관계자들이 아샤르크 알-아우사트와의 인터뷰에서 사우디가 이란전 속에서 글로벌 에너지시장 안정화에 핵심 역할을 한다고 평가. 대체 송유관 경로와 충분한 재정 완충이 호르무즈 차질을 흡수하는 데 결정적이라고 분석.",tg:["세계은행","사우디","에너지","안정화"],u:"https://english.aawsat.com/business/5262644-world-bank-asharq-al-awsat-saudi-arabia-plays-central-role-stabilizing-energy"},
  {id:1160,p:8,r:"심층분석",t:"Saudi labor market reforms strengthen compliance, protect wages under Vision 2030",k:"비전2030 노동시장 개혁, 컴플라이언스·임금보호 강화",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-26",m:"Crown Prince Mohammed bin Salman affirmed Saudi labor market is undergoing rapid transformation under Vision 2030, with reforms strengthening compliance and protecting wages, even as Iran war headwinds test broader economic resilience.",mk:"무함마드 빈살만 왕세자가 비전2030 아래 사우디 노동시장이 빠른 변화를 겪고 있다고 강조. 컴플라이언스 강화와 임금 보호를 골자로 한 개혁이 이란전 역풍 속에서도 경제 회복력을 시험 중.",tg:["노동시장","비전2030","임금","개혁"],u:"https://english.aawsat.com/home/international/section/news"},
  {id:1161,p:7,r:"심층분석",t:"Saudi Hajj Minister Al-Rabiah inspects readiness of camps in Mina ahead of pilgrimage",k:"사우디 하지장관 알-라비아, 하지 앞두고 미나 캠프 준비태세 점검",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-26",m:"Saudi Minister of Hajj and Umrah Tawfig Al-Rabiah inspected the readiness of camps in Mina ahead of the upcoming Hajj season, noting that early preparations have boosted camp readiness and operational efficiency for the millions of expected pilgrims.",mk:"사우디 토우피그 알-라비아 하지·움라부 장관이 하지 시즌을 앞두고 미나 캠프의 준비태세를 점검. 조기 준비가 캠프 가동성과 운영 효율을 끌어올렸다고 평가.",tg:["하지","미나","알-라비아","움라"],u:"https://english.aawsat.com/gulf"},
  {id:1162,p:8,r:"외교",t:"Saudi Crown Prince meets Pakistani PM Sharif twice in Jeddah within month",k:"사우디 왕세자, 한 달 새 파키스탄 총리와 제다서 두 차례 회동",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-26",m:"Crown Prince Mohammed bin Salman and Pakistani PM Shehbaz Sharif have met twice in Jeddah within less than a month, signaling Riyadh's active diplomatic role amid Pakistan's mediation between the US and Iran on the Hormuz blockade and ceasefire.",mk:"무함마드 빈살만 왕세자와 파키스탄 셰바즈 샤리프 총리가 한 달도 안 되는 기간 동안 제다에서 두 차례 회담. 호르무즈 봉쇄·휴전을 둘러싼 미·이란 사이 파키스탄의 중재 역할 속에서 사우디의 적극적 외교 행보를 시사.",tg:["빈살만","파키스탄","외교","중재"],u:"https://english.aawsat.com/gulf/5264797-pakistani-official-asharq-al-awsat-quartet-meetings-aim-promote-regional-peace"},
  {id:1163,p:8,r:"주요경제",t:"Al Rajhi Bank reports 14% growth in Q1 2026 net income to SAR 6,752M",k:"알라지 은행, 1분기 순이익 14% 증가한 67.52억 리얄",s:"Argaam",c:"saudi",d:"2026-04-27",m:"Al Rajhi Bank, the Kingdom's largest Islamic lender, reported Q1 2026 net income of SAR 6,752 million, up 14% YoY from SAR 5,906 million. Total operating income reached SAR 10,528 million (+14% YoY), driven by net financing/investment income and higher fee revenues.",mk:"왕국 최대 이슬람 은행 알라지가 1분기 순이익 67억 5,200만 리얄을 기록, 전년 동기 59억 600만 리얄에서 14% 증가. 총영업수익은 105억 2,800만 리얄로 14% 늘어났으며 순금융·투자수익과 수수료 증가가 견인.",tg:["알라지","이슬람금융","순이익","Q1"],u:"https://www.argaam.com/en/article/articledetail/id/1898138"},
  {id:1164,p:7,r:"주요경제",t:"Riyad Bank profit increases 5% to SAR 2.61B in Q1 2026",k:"리야드뱅크, 1분기 순이익 5% 증가한 26.1억 리얄",s:"Argaam",c:"saudi",d:"2026-04-27",m:"Riyad Bank reported Q1 2026 net profit of SAR 2.61 billion, up 5% from SAR 2.49 billion a year earlier. Operating income growth and steady fee revenue underpinned the result amid robust corporate lending demand.",mk:"리야드뱅크가 1분기 순이익 26억 1,000만 리얄을 기록, 전년 동기 24억 9,000만 리얄에서 5% 증가. 영업이익 증가와 안정적 수수료 수익이 견조한 기업대출 수요 속에 실적 뒷받침.",tg:["리야드뱅크","순이익","기업대출"],u:"https://www.argaam.com/sa-en/financial-reports/company-report/47/2026/70"},
  {id:1165,p:6,r:"주요경제",t:"Listed companies report Aramco notice on 2026 fuel price changes",k:"상장사들, 아람코의 2026년 연료가격 변경 통지 보고",s:"Argaam",c:"saudi",d:"2026-04-26",m:"Several Tadawul-listed companies disclosed Aramco's notice on 2026 fuel price changes, which alter input costs across petrochemicals, utilities and industrial users. Argaam tracks the disclosures as part of disclosure-driven corporate cost guidance.",mk:"여러 타다울 상장사가 사우디 아람코의 2026년 연료가격 변경 통지를 공시. 석유화학·유틸리티·산업용 수요자의 원가 구조에 영향. Argaam이 공시 기반 기업비용 가이던스 흐름을 추적 보도.",tg:["아람코","연료가격","타다울","공시"],u:"https://www.argaam.com/en/article/articledetail/id/1869885"},
  {id:1166,p:7,r:"주요경제",t:"TASI rises 7.2% in Q1 2026; Petro Rabigh, EIC top gainers",k:"타다울 지수, 1분기 7.2% 상승…페트로라비그·EIC 최대 상승",s:"Argaam",c:"saudi",d:"2026-04-27",m:"Tadawul All Share Index (TASI) ended Q1 2026 up 759 points, or 7.2%, closing at 11,250 vs. 10,491 at end-2025. Petro Rabigh and EIC led gainers as Vision 2030-linked sectors and bank earnings rallied.",mk:"타다울 종합지수(TASI)가 2026년 1분기 759포인트(7.2%) 상승해 11,250포인트로 마감(2025년 말 10,491). 비전2030 관련 업종과 은행 실적 호조 속에 페트로라비그와 EIC가 최대 상승주로 부상.",tg:["TASI","Q1","페트로라비그","EIC"],u:"https://www.argaam.com/en/article/articledetail/id/1892657"},
  {id:1167,p:8,r:"심층분석",t:"UAE Economy Defies Global Turbulence With Strong Growth, Top Credit Ratings and Record Trade",k:"UAE 경제, 글로벌 격동 속 견고한 성장·최고 신용등급·기록적 무역 시현",s:"Gulf News",c:"gulf",d:"2026-04-26",m:"Gulf News reports the UAE economy demonstrated exceptional resilience in 2025 with 5.6% real GDP growth and is projected to expand at the same pace in 2026, supported by non-oil sector growth, top sovereign ratings, and record foreign trade reaching Dh6 trillion.",mk:"걸프뉴스 보도: UAE 경제가 2025년 5.6% 실질 GDP 성장으로 비범한 회복력을 보였으며, 2026년에도 같은 속도의 확장이 예상됨. 비석유 부문 성장, 최고 수준 국가신용등급, 6조 디르함의 기록적 외국 무역이 뒷받침.",tg:["UAE","Gulf News","성장률","무역"],u:"https://gulfnews.com/business/economy/uae-economy-defies-global-turbulence-accelerates-growth-with-strong-resilience-1.500503408"},
  {id:1168,p:7,r:"정책발표",t:"Umrah open to Saudi and GCC citizens until May 3 — no Hajj permit needed for Mecca",k:"움라, 5월 3일까지 사우디·GCC 시민에 개방…메카 입경 하지 허가 불필요",s:"Gulf News",c:"gulf",d:"2026-04-27",m:"Gulf News reports Saudi Arabia's Ministry of Hajj and Umrah will allow Saudi citizens and nationals of GCC states to perform Umrah until May 3 without a Hajj permit to enter Mecca, ahead of the Hajj 2026 season ramp-up.",mk:"걸프뉴스 보도: 사우디 하지·움라부가 2026 하지 시즌 본격화에 앞서 5월 3일까지 사우디 국민과 GCC 국가 시민이 하지 허가 없이도 움라를 위해 메카에 입경할 수 있도록 허용한다고 발표.",tg:["움라","GCC","메카","하지"],u:"https://gulfnews.com/world/gulf/saudi/umrah-open-to-saudis-gcc-citizens-until-may-3-1.500521111"},
  {id:1169,p:7,r:"심층분석",t:"Fed meeting: Iran war and Powell future add to uncertain outlook",k:"이란전·파월 거취 불확실성, 이번 주 연준 회의에 부담",s:"The National",c:"gulf",d:"2026-04-27",m:"The National reports the Federal Reserve faces a complex April-May meeting amid Iran-war oil shock, persistent inflation, and uncertainty over Chair Powell's future. Markets remain divided on whether the Fed will hold or signal a delayed cut as energy prices stay elevated.",mk:"내셔널 보도: 연준이 이란전 유가 충격, 지속되는 인플레이션, 파월 의장 거취 불확실성 속에 4~5월 회의를 맞이. 에너지 가격이 고공행진을 이어가는 가운데 시장은 동결과 인하 시그널 사이에서 분열된 모습.",tg:["연준","파월","이란전","인플레"],u:"https://www.thenationalnews.com/business/economy/2026/04/27/fed-meeting-iran-war-and-powell-future-add-to-uncertain-outlook/"},
  {id:1170,p:7,r:"심층분석",t:"How the Iran war is reshaping Gulf economies, unevenly",k:"이란 전쟁이 걸프 경제를 어떻게 차등 재편하나",s:"The National",c:"gulf",d:"2026-04-17",m:"The National analyses how the Iran war is reshaping Gulf economies unevenly: Saudi Arabia weathers via alternative pipelines, the UAE absorbs an outsize share of travel/consumer-spending shock, while Qatar, Kuwait and Bahrain face contractions of 6.0%, 4.4% and 2.9% respectively, per Reuters poll.",mk:"내셔널이 이란전이 걸프 경제를 차등적으로 재편하고 있다고 분석. 사우디는 대체 송유관으로 충격 완화, UAE는 관광·소비 충격을 과도하게 흡수, 카타르·쿠웨이트·바레인은 각각 -6.0%·-4.4%·-2.9% 위축 전망(로이터 폴).",tg:["걸프경제","이란전","UAE","카타르"],u:"https://www.thenationalnews.com/business/economy/2026/04/17/how-gulf-economies-fight-back-from-effects-of-the-iran-war/"},
  {id:1171,p:6,r:"주요경제",t:"UAE travel agents expect higher airfares, packages for summer",k:"UAE 여행사들 \"여름 항공권·패키지 가격 더 오른다\"",s:"Khaleej Times",c:"gulf",d:"2026-04-26",m:"Khaleej Times reports UAE travel agents expect summer airfares and packages to be 20-30% higher year-on-year due to strong demand, longer flight routes around regional airspace closures, and ongoing disruptions from the Iran war.",mk:"UAE 여행사들이 여름 항공권과 패키지 상품 가격이 전년 대비 20~30% 더 오를 것으로 전망. 강한 수요, 지역 공역 폐쇄로 길어진 우회 노선, 이란전이 초래한 차질이 가격 상승 요인이라고 칼리지 타임스가 보도.",tg:["UAE","여행","항공권","우회노선"],u:"https://www.khaleejtimes.com/uae/planning-for-summer-trip-uae-travel-agents-expect-higher-airfares-packages"},
  {id:1172,p:6,r:"심층분석",t:"Qatar Airways resumes flights as Doha airspace recovery accelerates",k:"카타르항공, 도하 공역 회복 가속에 운항 재개",s:"Travel And Tour World",c:"gulf",d:"2026-04-26",m:"Qatar Airways joined flydubai (April 21), Air Arabia (April 22), Oman Air, Royal Jordanian, Tarco Aviation, US-Bangla (April 23) and Middle East Airlines (April 26) in resuming Hamad International Airport operations as Qatar's airspace recovery picks up pace.",mk:"카타르항공이 4월 21일 플라이두바이, 22일 에어아라비아, 23일 오만항공·로얄요르단·타르코·US방글라, 26일 미들이스트항공에 이어 하마드 국제공항 운항 재개. 카타르 공역 정상화가 가속.",tg:["카타르항공","공역","HIA","재개"],u:"https://www.travelandtourworld.com/news/article/qatar-airways-joins-flydubai-air-arabia-oman-air-royal-jordanian-biman-bangladesh-middle-east-airlines-to-resume-hia-flights-gcc-indian-european-travel-demand-set-to-explode/"},
  {id:1173,p:9,r:"속보",t:"Iran war: What's happening on day 59 amid diplomatic push to end conflict?",k:"이란전 59일째…전쟁 종식 위한 외교 압박 가속화",s:"Al Jazeera",c:"me",d:"2026-04-27",m:"Al Jazeera reports day 59 of the Iran war saw FM Araghchi shuttle between Pakistan and Oman before flying to Russia, while Trump said Iran can call to negotiate. Russia's Vienna envoy demanded the US drop \"blackmailing\" if talks are to resume.",mk:"알자지라가 이란전 59일째 보도: 아라크치 외무장관이 파키스탄·오만을 거쳐 러시아행. 트럼프는 \"이란이 원하면 전화하라\" 발언. 러시아 빈 주재 대사는 \"협박과 최후통첩 중단해야 협상 가능\" 촉구.",tg:["이란전","아라크치","러시아","외교"],u:"https://www.aljazeera.com/news/2026/4/27/iran-war-whats-happening-on-day-59-amid-diplomatic-push-to-end-conflict"},
  {id:1174,p:10,r:"속보",t:"Iran offers Hormuz deal without nuclear talks, as it seeks broader buy-in",k:"이란, 핵협상 없는 호르무즈 합의 제안…보다 폭넓은 동의 모색",s:"Al Jazeera",c:"me",d:"2026-04-27",m:"Al Jazeera reports Iran has offered the US a proposal — relayed via Pakistani mediators — to reopen the Strait of Hormuz and end the war first, while postponing nuclear talks until the US blockade is lifted. Iran is also seeking buy-in from Gulf states.",mk:"알자지라 보도: 이란이 파키스탄 중재를 통해 미국에 \"미국의 봉쇄 해제 후 핵협상은 추후로 미루고 우선 호르무즈를 개방하며 전쟁을 끝내자\"는 제안을 전달. 이란은 걸프국들의 동참도 모색 중.",tg:["이란","호르무즈","핵협상","파키스탄"],u:"https://www.aljazeera.com/news/2026/4/27/iran-offers-hormuz-deal-without-nuclear-talks-as-it-seeks-broader-buy-in"},
  {id:1175,p:9,r:"속보",t:"Israel issues forced evacuation orders for southern Lebanon in escalation",k:"이스라엘, 남부 레바논에 강제 대피령…확전 양상",s:"Al Jazeera",c:"me",d:"2026-04-26",m:"Al Jazeera reports Israel issued forced evacuation orders for parts of southern Lebanon, escalating operations despite Trump's three-week ceasefire extension announced April 23. Hezbollah lawmaker called the ceasefire \"meaningless\" amid continued Israeli strikes.",mk:"알자지라 보도: 이스라엘이 남부 레바논 일부 지역에 강제 대피령을 내리며 확전 양상. 트럼프가 4월 23일 발표한 3주 휴전 연장에도 군사작전 지속. 헤즈볼라 의원은 \"이스라엘의 적대 행위 속 휴전은 무의미\"라고 비난.",tg:["이스라엘","레바논","대피령","헤즈볼라"],u:"https://www.aljazeera.com/news/2026/4/26/israel-issues-forced-evacuation-orders-for-southern-lebanon-in-escalation"},
  {id:1176,p:7,r:"심층분석",t:"Middle East News - April 28 daily briefing on Iran war and Hormuz crisis",k:"중동 뉴스 - 4월 28일 이란전·호르무즈 위기 일일 브리핑",s:"Al Jazeera",c:"me",d:"2026-04-28",m:"Al Jazeera's Middle East news section provides ongoing daily coverage of the Iran war, Hormuz Strait standoff, Lebanon ceasefire violations, and broader regional fallout. The section consolidates updates as the war enters day 60.",mk:"알자지라 중동 뉴스 섹션이 이란전, 호르무즈 해협 대치, 레바논 휴전 위반, 광범위한 지역 여파에 대한 일일 보도를 제공. 전쟁이 60일째에 접어든 가운데 섹션이 업데이트를 통합 제공.",tg:["중동","이란전","호르무즈","레바논"],u:"https://www.aljazeera.com/middle-east/"},
  {id:1177,p:7,r:"심층분석",t:"Have US-Iran talks failed? Why no deal yet doesn't mean diplomacy is dead",k:"미·이란 협상 실패했나…아직 합의 없어도 외교는 살아있다",s:"Al Jazeera",c:"me",d:"2026-04-27",m:"Al Jazeera analyses that despite Trump cancelling the Islamabad envoy trip and Iran's defiance, multiple back-channels remain — Pakistan, Oman and Russia all engaged — leaving room for a phased Hormuz-first framework even if a comprehensive deal is far off.",mk:"알자지라 분석: 트럼프의 이슬라마바드 특사 방문 취소와 이란의 강경 자세에도 파키스탄·오만·러시아의 다중 백채널이 가동 중. 포괄 합의는 멀어졌어도 호르무즈 우선 단계적 프레임워크 여지는 남아있다는 분석.",tg:["미·이란","외교","파키스탄","오만"],u:"https://www.aljazeera.com/news/2026/4/27/have-us-iran-talks-failed-why-no-deal-yet-doesnt-mean-diplomacy-is-dead"},
  {id:1178,p:9,r:"속보",t:"Iran reportedly proposes Hormuz Strait deal to U.S. - markets watch",k:"이란, 미국에 호르무즈 합의안 제안 보도…시장 주목",s:"CNBC",c:"global",d:"2026-04-27",m:"CNBC reports Iran proposed to the U.S. — via Pakistani mediators — reopening the Strait of Hormuz and ending the war while deferring nuclear talks. The proposal calls for ceasefire extension as the path toward a lasting settlement; markets watch oil and stocks for direction.",mk:"CNBC 보도: 이란이 파키스탄 중재를 통해 미국에 호르무즈 재개통과 전쟁 종식을 우선하고 핵협상은 후속 단계로 미루는 안을 제시. 휴전 연장으로 영구 합의 경로 열어둔다는 구상. 시장은 유가·증시 방향성에 주목.",tg:["호르무즈","미·이란","CNBC","시장"],u:"https://www.cnbc.com/2026/04/27/us-iran-peace-talks-stall-global-markets-stocks-oil-treasurys.html"},
  {id:1179,p:8,r:"속보",t:"Day 59: Putin outlines support for Iran during meeting with Iranian FM",k:"이란전 59일째: 푸틴, 이란 외무장관과 회담서 지지 표명",s:"CNN",c:"global",d:"2026-04-27",m:"CNN live blog reports day 59 of the Iran war: Putin outlined his support for Iran during a meeting with FM Araghchi in Moscow. Trump said Iran could call to negotiate, while envoys' trip to Islamabad was cancelled, leaving Hormuz Strait diplomacy in flux.",mk:"CNN 라이브 블로그: 이란전 59일째 푸틴이 모스크바에서 아라크치 외무장관과 회담하며 이란 지지 입장 표명. 트럼프는 이란에 \"전화하라\"고 발언했지만 특사단의 이슬라마바드 방문은 취소되며 호르무즈 외교 지지부진.",tg:["푸틴","이란","외교","CNN"],u:"https://www.cnn.com/2026/04/27/world/live-news/iran-war-trump-israel"},
  {id:1180,p:8,r:"주요경제",t:"Saudi Oil Sales to China to Halve as Hormuz Crisis Lifts Prices",k:"사우디 대중 원유 수출, 호르무즈 위기로 5월 절반 감소",s:"Bloomberg",c:"global",d:"2026-04-13",m:"Bloomberg reports Saudi Arabia's crude sales to China are set to halve in May, with shipments expected to drop from roughly 40 million barrels allocated for April loading to around 20 million for May, as the Hormuz crisis lifts prices and reroutes flows.",mk:"블룸버그 보도: 사우디의 대중국 원유 판매가 5월 절반으로 줄어들 전망. 4월 선적 배정 4,000만 배럴에서 5월 약 2,000만 배럴로 감소. 호르무즈 위기가 가격을 끌어올리고 물동선을 재편한 영향.",tg:["사우디","중국","원유","호르무즈"],u:"https://www.bloomberg.com/news/articles/2026-04-13/saudi-oil-sales-to-china-to-halve-as-hormuz-crisis-lifts-prices"},
  {id:1181,p:8,r:"속보",t:"Latest Oil Market News and Analysis for April 28",k:"4월 28일 원유시장 최신 뉴스·분석",s:"Bloomberg",c:"global",d:"2026-04-27",m:"Bloomberg's daily oil round-up for April 28 notes Brent above $108 and WTI near $96 as Trump cancelled the envoys' Islamabad trip while Iran sent FM Araghchi to Russia, leaving Hormuz traffic at near-zero and traders pricing a longer outage.",mk:"블룸버그의 4월 28일자 원유시장 일일 정리: 트럼프가 특사단의 이슬라마바드 방문을 취소하고 이란이 아라크치 외무장관을 러시아로 보낸 가운데 브렌트유 108달러대, WTI 96달러 부근. 호르무즈 통항이 사실상 0에 가까워 트레이더들이 장기 차질 가격에 반영.",tg:["원유","브렌트","WTI","호르무즈"],u:"https://www.bloomberg.com/news/articles/2026-04-27/latest-oil-market-news-and-analysis-for-april-28"},
  {id:1182,p:7,r:"심층분석",t:"Saudi Arabia Sports Rethink Hints at More Investment Change to Come",k:"사우디 스포츠 재고…향후 투자 전략 변화 시사",s:"Bloomberg",c:"global",d:"2026-04-22",m:"Bloomberg Opinion argues Saudi Arabia's pivot in sports investment — away from sprawling acquisitions toward sharper portfolios — hints at broader Vision 2030 capital reallocation, aligned with PIF's new 2026-2030 strategy emphasizing returns and efficiency.",mk:"블룸버그 오피니언이 사우디의 스포츠 투자 방향 전환(광범위 인수에서 정교한 포트폴리오로)을 분석. PIF의 2026~2030 신전략(수익성·효율 중시)과 맞물려 비전2030의 자본 재배분 흐름을 시사한다고 평가.",tg:["스포츠","PIF","비전2030","투자전략"],u:"https://www.bloomberg.com/opinion/articles/2026-04-22/saudi-arabia-sports-rethink-hints-at-more-investment-change-to-come"},
