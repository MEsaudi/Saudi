<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCC & 중동 일일 뉴스 대시보드</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card-hover: #222633;
    --accent: #00d4aa; --accent2: #5b8def;
    --text: #e8eaed; --text-dim: #8b8fa3; --border: #2a2d3a;
    --saudi: #006c35; --western: #1a5276; --korean: #c0392b; --other: #7d3c98;
    --ko-bg: rgba(0,212,170,0.06); --ko-border: rgba(0,212,170,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .header { background:linear-gradient(135deg,#1a1d27,#0f1117); border-bottom:1px solid var(--border); padding:20px 32px; position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .header h1 { font-size:22px; font-weight:700; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .date-badge { background:var(--card); border:1px solid var(--border); padding:6px 14px; border-radius:20px; font-size:12px; color:var(--text-dim); display:flex; align-items:center; gap:8px; }
  .live-dot { width:8px; height:8px; background:#00ff88; border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .stats-bar { display:flex; gap:10px; flex-wrap:wrap; }
  .stat-chip { background:var(--card); border:1px solid var(--border); padding:5px 12px; border-radius:14px; font-size:11px; color:var(--text-dim); display:flex; align-items:center; gap:5px; }
  .stat-chip .count { font-weight:700; color:var(--accent); }

  .controls { padding:12px 32px; display:flex; gap:8px; flex-wrap:wrap; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:72px; z-index:99; align-items:center; }
  .filter-btn { padding:6px 14px; border-radius:18px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:12px; font-weight:500; transition:all .2s; white-space:nowrap; }
  .filter-btn:hover { border-color:var(--accent); color:var(--accent); }
  .filter-btn.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
  .filter-btn.saudi.active { background:var(--saudi); color:#fff; border-color:var(--saudi); }
  .filter-btn.western.active { background:var(--western); color:#fff; border-color:var(--western); }
  .filter-btn.korean.active { background:var(--korean); color:#fff; border-color:var(--korean); }
  .filter-btn.other.active { background:var(--other); color:#fff; border-color:var(--other); }

  .sep { width:1px; height:24px; background:var(--border); margin:0 4px; }

  .lang-btn { padding:5px 12px; border-radius:14px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:11px; transition:all .2s; }
  .lang-btn.active { background:var(--accent2); color:#fff; border-color:var(--accent2); }

  .search-bar { padding:10px 32px; background:var(--bg); }
  .search-input { width:100%; padding:10px 18px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:13px; outline:none; }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--text-dim); }

  .main { padding:16px 32px; }

  .section-title { font-size:16px; font-weight:700; margin:24px 0 12px; padding-left:12px; border-left:3px solid var(--accent); display:flex; align-items:center; gap:8px; }
  .badge { font-size:10px; padding:2px 8px; border-radius:8px; font-weight:600; color:#fff; }
  .badge-saudi{background:var(--saudi);} .badge-western{background:var(--western);} .badge-korean{background:var(--korean);} .badge-other{background:var(--other);}

  .news-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:14px; margin-bottom:10px; }

  .news-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; transition:all .2s; position:relative; overflow:hidden; }
  .news-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
  .news-card.saudi::before{background:var(--saudi);} .news-card.western::before{background:var(--western);} .news-card.korean::before{background:var(--korean);} .news-card.other::before{background:var(--other);}
  .news-card:hover { background:var(--card-hover); transform:translateY(-1px); box-shadow:0 6px 24px rgba(0,0,0,.3); }

  .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .source-tag { font-size:10px; font-weight:600; padding:2px 8px; border-radius:6px; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; }
  .source-tag.saudi{background:rgba(0,108,53,.2);color:#00d68f;} .source-tag.western{background:rgba(26,82,118,.2);color:#5dade2;} .source-tag.korean{background:rgba(192,57,43,.2);color:#e74c3c;} .source-tag.other{background:rgba(125,60,152,.2);color:#bb8fce;}
  .card-date { font-size:10px; color:var(--text-dim); white-space:nowrap; margin-left:6px; }

  .title-en { font-size:14px; font-weight:600; line-height:1.45; margin-bottom:3px; color:var(--text); }
  .title-ko { font-size:13px; font-weight:500; line-height:1.45; margin-bottom:8px; color:var(--accent); padding-left:9px; border-left:2px solid var(--accent); opacity:.9; }
  .summary-en { font-size:12px; color:var(--text-dim); line-height:1.55; margin-bottom:4px; }
  .summary-ko { font-size:12px; color:#8ecae6; line-height:1.55; margin-bottom:12px; padding:6px 10px; background:var(--ko-bg); border:1px solid var(--ko-border); border-radius:6px; }
  .title-only { font-size:14px; font-weight:600; line-height:1.45; margin-bottom:8px; color:var(--text); }
  .summary-only { font-size:12px; color:var(--text-dim); line-height:1.55; margin-bottom:12px; }

  .card-footer { display:flex; justify-content:space-between; align-items:center; }
  .topic-tags { display:flex; gap:4px; flex-wrap:wrap; }
  .topic-tag { font-size:9px; padding:2px 6px; border-radius:5px; background:rgba(255,255,255,.05); color:var(--text-dim); border:1px solid var(--border); }
  .read-link { font-size:11px; color:var(--accent); text-decoration:none; font-weight:600; white-space:nowrap; }
  .read-link:hover { opacity:.7; }

  .summary-panel { background:linear-gradient(135deg,#1a2332,#1a1d27); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
  .summary-panel h2 { font-size:15px; margin-bottom:12px; color:var(--accent); }
  .summary-points { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px; }
  .summary-point { display:flex; gap:8px; align-items:flex-start; padding:10px; background:rgba(255,255,255,.03); border-radius:8px; border:1px solid var(--border); }
  .summary-icon { font-size:18px; flex-shrink:0; }
  .summary-text { font-size:12px; line-height:1.5; color:var(--text-dim); }
  .summary-text strong { color:var(--text); }

  .scroll-top { position:fixed; bottom:24px; right:24px; width:40px; height:40px; border-radius:50%; background:var(--accent); color:#000; border:none; cursor:pointer; font-size:18px; display:none; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(0,212,170,.3); z-index:200; }
  .scroll-top.show { display:flex; }

  .article-count-note { font-size:11px; color:var(--text-dim); margin-bottom:16px; padding:8px 14px; background:var(--card); border:1px solid var(--border); border-radius:8px; }

  @media(max-width:768px) { .header{padding:12px 14px;} .controls{padding:10px 14px;} .search-bar{padding:8px 14px;} .main{padding:12px 14px;} .news-grid{grid-template-columns:1fr;} .summary-points{grid-template-columns:1fr;} .header h1{font-size:17px;} }
  .no-results { text-align:center; padding:50px 20px; color:var(--text-dim); }

  /* Priority badges */
  .prio-badge { font-size:9px; font-weight:700; padding:2px 7px; border-radius:4px; letter-spacing:.3px; margin-left:6px; vertical-align:middle; }
  .prio-headline { background:#e74c3c; color:#fff; }
  .prio-breaking { background:#f39c12; color:#000; }
  .prio-analysis { background:#3498db; color:#fff; }
  .prio-policy { background:#8e44ad; color:#fff; }
  .prio-economy { background:#27ae60; color:#fff; }
  .prio-normal { display:none; }

  .news-card.prio-top { border-color:rgba(231,76,60,.4); }
  .news-card.prio-top::after { content:''; position:absolute; top:0; right:0; width:0; height:0; border-top:28px solid rgba(231,76,60,.6); border-left:28px solid transparent; }
</style>

{id:162,p:10,r:"헤드라인",t:"US Navy begins blockade of Strait of Hormuz, halting all ship traffic near Iranian ports",k:"미 해군, 호르무즈 해협 봉쇄 개시…이란 항구 인근 모든 선박 통행 차단",s:"Gulf News",c:"me",d:"2026-04-13",m:"Trump ordered the US Navy to blockade the Strait of Hormuz starting April 13 at 6pm GST, interdicting any vessel that paid Iran tolls. Oil prices surged over 8% with Brent crude hitting $102.7 and WTI at $104.8 per barrel.",mk:"트럼프 대통령, 4월 13일 걸프 표준시 오후 6시부터 호르무즈 해협 봉쇄 명령. 이란에 통행료를 지불한 모든 선박 차단. 유가 8% 이상 급등, 브렌트유 $102.7, WTI $104.8 기록.",tg:["호르무즈","봉쇄","유가","미국"],u:"https://gulfnews.com/world/mena/us-iran-ceasefire-us-moves-to-blockade-iranian-ports-as-strait-of-hormuz-traffic-halts-oil-prices-surge-1.500504821"},
{id:163,p:10,r:"속보",t:"Saudi Arabia restores East-West pipeline to full capacity after Iranian attacks",k:"사우디, 이란 공격 이후 동-서 파이프라인 완전 복구",s:"Arab News",c:"saudi",d:"2026-04-12",m:"Saudi Energy Ministry announced full restoration of the East-West pipeline pumping capacity, recovering 700,000 bpd lost to Iranian strikes. Manifa field restored 300,000 bpd, while Khurais oilfield repairs continue.",mk:"사우디 에너지부, 이란 공격으로 손실된 일산 70만 배럴 동-서 파이프라인 완전 복구 발표. 마니파 유전 30만 bpd 복구 완료, 쿠라이스 유전 복구 작업 진행 중.",tg:["파이프라인","에너지","복구","Aramco"],u:"https://www.aljazeera.com/economy/2026/4/12/saudi-arabia-says-key-oil-pipeline-back-to-full-capacity-after-attacks"},
{id:164,p:10,r:"헤드라인",t:"Pakistan sends fighter jets and 13,000 troops to Saudi Arabia under defense pact",k:"파키스탄, 방위협정에 따라 전투기·1만3천 병력 사우디 배치",s:"Saudi Gazette",c:"saudi",d:"2026-04-11",m:"Pakistani military force including fighter jets and support aircraft arrived at King Abdulaziz Air Base in Dhahran, Saudi Arabia, as part of a strategic defense pact between the two countries amid the fragile US-Iran ceasefire.",mk:"파키스탄 전투기와 지원 항공기가 미-이란 휴전 속 양국 전략적 방위협정에 따라 사우디 다란 소재 킹 압둘아지즈 공군기지에 도착. 지상군 1만3천명 배치.",tg:["파키스탄","방위협정","군사","다란"],u:"https://saudigazette.com.sa/article/660444/saudi-arabia/pakistani-military-force-arrives-in-saudi-arabia-as-part-of-defense-pact"},
{id:165,p:9,r:"헤드라인",t:"US-Iran ceasefire talks collapse in Islamabad as Vance fails to reach deal",k:"이슬라마바드 미-이란 휴전 협상 결렬…밴스 부통령 합의 실패",s:"Al Jazeera",c:"me",d:"2026-04-12",m:"JD Vance announced that US-Iran talks in Islamabad had failed after a day of negotiations. Trump subsequently declared he no longer cared about negotiations with Iran and ordered the Hormuz blockade.",mk:"밴스 부통령, 이슬라마바드에서 하루간의 협상 끝에 미-이란 회담 결렬 발표. 트럼프 대통령은 이후 이란과의 협상에 더 이상 관심 없다고 선언하고 호르무즈 봉쇄 명령.",tg:["미국","이란","휴전","협상결렬"],u:"https://www.aljazeera.com/news/2026/4/13/iran-war-what-is-happening-on-day-45-of-the-us-iran-conflict"},

// ===== STATE =====
let activeFilter='all', searchQuery='', langMode='both';

function formatDate(ds){const d=new Date(ds+'T00:00:00');return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function daysAgo(ds){const t=new Date(),d=new Date(ds+'T00:00:00'),diff=Math.floor((t-d)/(864e5));return diff===0?'오늘':diff===1?'어제':`${diff}일 전`;}

// Saudi media outlet ordering: Arab News > SPA > Saudi Gazette > Argaam > Asharq Al-Awsat > others
const SAUDI_SOURCE_ORDER = {'Arab News':1,'SPA':2,'Saudi Gazette':3,'Argaam':4,'Asharq Al-Awsat':5};
function saudiSrcRank(s){return SAUDI_SOURCE_ORDER[s]||99;}

function getFiltered(){
  let f=D;
  if(activeFilter!=='all') f=f.filter(n=>n.c===activeFilter);
  if(searchQuery){const q=searchQuery.toLowerCase(); f=f.filter(n=>n.t.toLowerCase().includes(q)||n.m.toLowerCase().includes(q)||n.s.toLowerCase().includes(q)||(n.k&&n.k.toLowerCase().includes(q))||(n.mk&&n.mk.toLowerCase().includes(q))||n.tg.some(t=>t.toLowerCase().includes(q)));}
  // Sort: 1) date desc  2) for Saudi: source order  3) priority desc
  return f.sort((a,b)=>{
    const dd = new Date(b.d) - new Date(a.d);
    if(dd) return dd;
    if(a.c==='saudi' && b.c==='saudi'){
      const sd = saudiSrcRank(a.s) - saudiSrcRank(b.s);
      if(sd) return sd;
    }
    return (b.p||0) - (a.p||0);
  });
}

function renderStats(){
  const c={all:D.length,saudi:D.filter(n=>n.c==='saudi').length,western:D.filter(n=>n.c==='western').length,korean:D.filter(n=>n.c==='korean').length,other:D.filter(n=>n.c==='other').length};
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-chip"><span class="count">${c.all}</span> 전체</div>
    <div class="stat-chip">\u{1F1F8}\u{1F1E6}<span class="count">${c.saudi}</span> 사우디</div>
    <div class="stat-chip">\u{1F30D}<span class="count">${c.western}</span> 서방</div>
    <div class="stat-chip">\u{1F1F0}\u{1F1F7}<span class="count">${c.korean}</span> 한국</div>
    <div class="stat-chip">\u{1F4F0}<span class="count">${c.other}</span> 기타</div>`;
}

function renderControls(){
  const filters=[{k:'all',l:'전체'},{k:'saudi',l:'사우디 언론'},{k:'western',l:'서방 언론'},{k:'korean',l:'한국 언론'},{k:'other',l:'기타 중동 언론'}];
  const langs=[{k:'both',l:'영+한'},{k:'ko',l:'한국어만'},{k:'en',l:'영어만'}];
  document.getElementById('controls').innerHTML=
    filters.map(f=>`<button class="filter-btn ${f.k} ${activeFilter===f.k?'active':''}" data-f="${f.k}">${f.l}</button>`).join('')+
    '<div class="sep"></div>'+
    langs.map(l=>`<button class="lang-btn ${langMode===l.k?'active':''}" data-l="${l.k}">${l.l}</button>`).join('');
  document.querySelectorAll('.filter-btn').forEach(b=>b.onclick=()=>{activeFilter=b.dataset.f;renderControls();renderContent();});
  document.querySelectorAll('.lang-btn').forEach(b=>b.onclick=()=>{langMode=b.dataset.l;document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderContent();});
}

function prioBadge(n){
  if(!n.r) return '';
  const cls={'속보':'prio-breaking','헤드라인':'prio-headline','심층분석':'prio-analysis','정책발표':'prio-policy','주요경제':'prio-economy'};
  return `<span class="prio-badge ${cls[n.r]||'prio-normal'}">${n.r}</span>`;
}

function card(n){
  const isKo=n.l==='ko';
  const isTop=n.p>=9;
  let th='',mh='';
  const pb=prioBadge(n);
  if(isKo){th=`<div class="title-only">${n.t}${pb}</div>`;mh=`<div class="summary-only">${n.m}</div>`;}
  else if(langMode==='en'){th=`<div class="title-only">${n.t}${pb}</div>`;mh=`<div class="summary-only">${n.m}</div>`;}
  else if(langMode==='ko'){th=`<div class="title-only">${n.k||n.t}${pb}</div>`;mh=`<div class="summary-only">${n.mk||n.m}</div>`;}
  else{th=`<div class="title-en">${n.t}${pb}</div>${n.k?`<div class="title-ko">${n.k}</div>`:''}`;mh=`<div class="summary-en">${n.m}</div>${n.mk?`<div class="summary-ko">${n.mk}</div>`:''}`;}
  return `<div class="news-card ${n.c}${isTop?' prio-top':''}"><div class="card-header"><span class="source-tag ${n.c}">${n.s}</span><span class="card-date">${daysAgo(n.d)} · ${formatDate(n.d)}</span></div>${th}${mh}<div class="card-footer"><div class="topic-tags">${n.tg.map(t=>`<span class="topic-tag">${t}</span>`).join('')}</div><a href="${n.u}" target="_blank" class="read-link">원문 &#8594;</a></div></div>`;
}

function renderContent(){
  const f=getFiltered(),main=document.getElementById('mainContent');
  if(!f.length){main.innerHTML='<div class="no-results">검색 결과 없음</div>';return;}
  let h=`<div class="summary-panel"><h2>오늘의 핵심 요약 (2026.04.09)</h2><div class="summary-points">
    <div class="summary-point"><span class="summary-icon">\u{1F6E1}\u{FE0F}</span><div class="summary-text"><strong>이란-미국 2주 휴전 합의:</strong> 파키스탄 중재. 호르무즈 해협 재개방. 그러나 휴전 발표 후에도 걸프 전역 공격 지속 (쿠웨이트 28회, UAE 35회 드론 공격).</div></div>
    <div class="summary-point"><span class="summary-icon">\u{1F6E2}\u{FE0F}</span><div class="summary-text"><strong>에너지 위기:</strong> 사우디 동서 파이프라인(일 700만 배럴) 드론 피격, 피해 제한적. 유가 사상 최고 프리미엄 $19.50. 지속 시 $180/bbl 전망.</div></div>
    <div class="summary-point"><span class="summary-icon">\u{1F4B0}</span><div class="summary-text"><strong>경제·투자:</strong> 사우디 GDP 4.3~4.7% 전망. PIF 사모신용 펀드 출범. 걸프 SWF $810억 워너 인수 지원. TASI 2.3% 상승. GCC 신용 '안정적'.</div></div>
    <div class="summary-point"><span class="summary-icon">\u{1F1F0}\u{1F1F7}</span><div class="summary-text"><strong>한국 영향:</strong> 원/달러 1,500원 돌파. 소비자물가 2.4% 급등. 반도체 수출 151% 역대 최대. 중소기업 피해 422건. 휴전에 증시 급등.</div></div>
  </div></div>`;

  h+=`<div class="article-count-note">검색된 기사: <strong>${f.length}건</strong> / 전체 ${D.length}건 (사우디 언론: SPA, Arab News, Saudi Gazette, Argaam, Asharq Al-Awsat 포함)</div>`;

  if(activeFilter==='all'){
    [{k:'saudi',n:'사우디 언론 (Arab News → SPA → Saudi Gazette → Argaam → Asharq Al-Awsat 順)',b:'badge-saudi',i:'\u{1F1F8}\u{1F1E6}'},
     {k:'western',n:'서방 언론 (Bloomberg · WSJ · Reuters · CNN · CNBC · NPR · FT)',b:'badge-western',i:'\u{1F30D}'},
     {k:'other',n:'기타 중동·국제 언론 (Al Jazeera · Al Arabiya · UN · IMO · ICAO · PBS)',b:'badge-other',i:'\u{1F4F0}'},
     {k:'korean',n:'한국 언론 (MBC · 서울신문 · 뉴스핌 · 이데일리 · 헤럴드경제 등)',b:'badge-korean',i:'\u{1F1F0}\u{1F1F7}'}
    ].forEach(g=>{const items=f.filter(n=>n.c===g.k);if(!items.length)return;h+=`<div class="section-title">${g.i} ${g.n} <span class="badge ${g.b}">${items.length}</span></div><div class="news-grid">${items.map(card).join('')}</div>`;});
  } else h+=`<div class="news-grid">${f.map(card).join('')}</div>`;
  main.innerHTML=h;
}

document.getElementById('currentDate').textContent=(function(){const n=new Date(),w=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];return `${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일 ${w[n.getDay()]}`})();
document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderContent();});
window.addEventListener('scroll',()=>document.getElementById('scrollTop').classList.toggle('show',window.scrollY>400));
renderStats();renderControls();renderContent();
</script>
