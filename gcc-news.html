  {id:316,p:9,r:"정책발표",t:"Saudi Council of Ministers Affirms All Energy Facilities Restored to Full Operational Capacity",k:"사우디 각료회의, 모든 에너지시설 운영 능력 완전 복구 확인",s:"SPA",c:"saudi",d:"2026-04-16",m:"The Saudi Council of Ministers affirmed that all energy facilities targeted by Iranian attacks have recovered, including Manifa, Khurais fields and Jubail, Ras Tanura refineries. The East-West pipeline is at full capacity. Khurais field work continues and completion will be announced separately.",mk:"사우디 각료회의는 이란 공격을 받은 모든 에너지시설이 회복됐다고 확인했다. 마니파·카라이스 유전과 주바일·라스타누라 정유소가 복구됐으며, 동서 파이프라인은 전속력 가동 중이다.",tg:["에너지인프라","원유공급","사우디정부"],u:"https://www.spa.gov.sa/en/N2560400"},
  {id:317,p:8,r:"정책발표",t:"NEOM Projects Delayed but Not Cancelled, Saudi PIF Chief Says at Board Meeting",k:"사우디 PIF 총재: NEOM 프로젝트 지연이지만 취소는 아니다",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-16",m:"Saudi PIF chief said NEOM infrastructure projects face delays but have not been cancelled, addressing concerns from war impact on Vision 2030 finances. Over $6 billion in contracts had been cancelled. PIF leadership stressed the new 2026-2030 strategy focuses on attracting private capital and improving investment efficiency.",mk:"PIF 총재는 NEOM 인프라 프로젝트들이 지연되고 있지만 취소는 아니라고 밝혔다. 60억 달러 이상의 계약이 취소됐지만, PIF는 민간 자본 유치와 투자 효율성 향상에 초점을 맞춘 새 전략을 강조했다.",tg:["NEOM","비전2030","PIF"],u:"https://english.aawsat.com/business/5262700-neom-projects-delayed-not-cancelled"},
  {id:318,p:8,r:"주요경제",t:"Saudi Arabia Offers Oil Buyers Red Sea Yanbu Option as Hormuz Blockade Continues",k:"호르무즈 봉쇄 지속 - 사우디, 구매자들에게 홍해 얀부 항구 옵션 제공",s:"Arab News",c:"saudi",d:"2026-04-16",m:"Saudi Arabia is offering long-term oil customers the option of receiving April allocations via the Red Sea port of Yanbu as the Strait of Hormuz crisis continues. Buyers choosing Yanbu receive partial monthly supply due to pipeline capacity limits. Saudi Arabia is rerouting exports to maintain customer obligations.",mk:"사우디아라비아가 호르무즈 해협 위기가 지속됨에 따라 장기 고객들에게 4월 배정분을 홍해 얀부 항구를 통해 받을 수 있는 옵션을 제공하고 있다. 파이프라인 용량 한계로 일부 공급만 가능하다.",tg:["원유수출","얀부항","홍해"],u:"https://www.arabnews.com/node/2639900/business-economy"},
  {id:319,p:7,r:"주요경제",t:"Saudi Non-Oil GDP Growth Holds at 4.2% in Q1 2026 Despite War-Driven Oil Revenue Drop",k:"전쟁 따른 석유수입 감소에도 사우디 1분기 비석유 GDP 4.2% 성장 유지",s:"Argaam",c:"saudi",d:"2026-04-16",m:"Saudi Arabia non-oil GDP maintained 4.2% growth in Q1 2026 despite sharp decline in oil revenues from Strait of Hormuz disruptions. Services, tourism, and construction sectors supported economic performance. Analysts warn sustained disruption could pressure government spending and giga-project timelines.",mk:"사우디아라비아의 비석유 GDP가 호르무즈 해협 혼란으로 인한 석유 수익 급감에도 불구하고 2026년 1분기 4.2% 성장을 유지했다. 서비스, 관광, 건설 부문이 경제 성과를 지지했다.",tg:["비석유GDP","경제다양화","사우디경제"],u:"https://www.argaam.com"},
  {id:320,p:7,r:"심층분석",t:"Saudi Vision 2030 Under Full Review as Middle East War Drains Over $10 Billion",k:"중동 전쟁으로 100억 달러 이상 손실 - 사우디 비전2030 전면 재검토",s:"Saudi Gazette",c:"saudi",d:"2026-04-16",m:"Saudi Arabia Vision 2030 mega-projects have entered comprehensive review following war-related losses exceeding $10 billion. NEOM saw contract cancellations over $6 billion, and Sindalah resort was indefinitely suspended. WSJ reported Saudi authorities are reassessing project viability under fiscal pressures.",mk:"전쟁 관련 손실이 100억 달러를 초과하면서 사우디 비전2030 메가프로젝트들이 전면 재검토에 들어갔다. NEOM에서만 60억 달러 이상 계약이 취소됐으며, 신달라 리조트는 무기한 중단됐다.",tg:["비전2030","NEOM","재정압박"],u:"https://saudigazette.com.sa/saudi-arabia/vision2030"},
  {id:321,p:8,r:"헤드라인",t:"Saudi Extends $5 Billion Deposit for Pakistan Amid Joint Push for US-Iran Diplomacy",k:"사우디, 미국-이란 외교 공동 추진 속 파키스탄 50억 달러 예치금 연장",s:"Arab News",c:"saudi",d:"2026-04-16",m:"Alongside the new $3 billion injection, Saudi Arabia extended an existing $5 billion deposit to Pakistan for an unspecified period. The financial commitments coincide with Riyadh supporting Islamabad&apos;s role as mediator in US-Iran peace negotiations. Saudi Arabia sees stable Pakistan as vital to regional security.",mk:"새 30억 달러 지원 외에 사우디아라비아가 파키스탄에 기존 50억 달러 예치금을 기한 미정으로 연장했다. 이 금융 지원은 사우디가 미국-이란 평화협상에서 파키스탄의 중재 역할을 지지하는 것과 맞물려 있다.",tg:["사우디-파키스탄","외교","재정지원"],u:"https://www.arabnews.com/node/2640050/saudi-arabia"},
  {id:322,p:8,r:"속보",t:"UAE Officials Hold First Direct Talks with Iran Since 2026 War Began, Qatar Mediates",k:"UAE-이란, 2026년 전쟁 이후 첫 직접 대화 - 카타르 중재",s:"The National",c:"gulf",d:"2026-04-16",m:"UAE and Iranian officials held their first direct conversation since the outbreak of the 2026 war, a diplomatic breakthrough facilitated by Qatari mediation. Talks focused on deescalation and the Hormuz situation. Both sides agreed to maintain communication channels as the ceasefire enters its second week.",mk:"UAE와 이란 당국자들이 2026년 전쟁 발발 이후 처음으로 직접 대화를 가졌다. 카타르 중재로 이루어진 회담은 긴장 완화와 호르무즈 상황에 초점을 맞췄으며, 양측은 소통 채널 유지에 합의했다.",tg:["UAE","이란","외교"],u:"https://www.thenationalnews.com/world/2026/04/16/uae-iran-first-talks"},
  {id:323,p:7,r:"주요경제",t:"GCC Tourism Ministers Reaffirm Region Safe and Open Despite Geopolitical Tensions",k:"GCC 관광장관들, 지정학적 긴장에도 역내 안전 및 개방 재확인",s:"Gulf News",c:"gulf",d:"2026-04-16",m:"Tourism ministers from all six GCC nations issued a joint statement at an April 7 virtual meeting declaring their countries safe and fully open to international visitors. The statement aims to counter declining tourism bookings triggered by the Iran war. GCC tourism revenues have significantly declined since late February.",mk:"6개 GCC 국가 관광장관들이 4월 7일 화상 회의에서 역내 국가들이 안전하며 국제 관광객에 완전히 개방돼 있다는 공동 성명을 발표했다. 이란 전쟁으로 관광 예약이 급감하는 상황에 대응한 조치다.",tg:["GCC관광","지역안보","호텔"],u:"https://gulfnews.com/world/gulf"},
  {id:324,p:7,r:"정책발표",t:"Qatar Suspends Visa-On-Arrival for Lebanese Nationals Amid Regional Security Concerns",k:"카타르, 지역 안보 우려로 레바논 국민 비자온어라이벌 중단",s:"Qatar Tribune",c:"gulf",d:"2026-04-16",m:"Qatar officially suspended visa-on-arrival for Lebanese nationals from April 2, 2026, citing regional security concerns from the ongoing conflict. Travelers from Lebanon must now obtain pre-approved visas. The policy reflects broader GCC vigilance over border control amid Israel-Lebanon military confrontation.",mk:"카타르가 2026년 4월 2일부터 레바논 국민에 대한 도착 비자 서비스를 공식 중단했다. 진행 중인 분쟁에서 비롯된 지역 안보 우려가 이유다. 레바논 출발 여행자들은 이제 사전 비자를 받아야 한다.",tg:["카타르","비자정책","레바논"],u:"https://www.travelandtourworld.com/news/article/qatar-joins-saudi-arabia-uae-bahrain-kuwait-and-oman-in-tightening-entry-rules-as-visa-on-arrival-for-lebanese-nationals-suspended-from-april-2026-impacting-travel-across-other-countries-including/"},
  {id:325,p:7,r:"주요경제",t:"Gulf Investors Remain Active in US Markets Despite Middle East Geopolitical Uncertainty",k:"중동 지정학적 불확실성에도 걸프 투자자들 미국 시장 투자 활발",s:"Khaleej Times",c:"gulf",d:"2026-04-16",m:"Gulf-based investors from Saudi Arabia, UAE, and Kuwait continue pursuing US market investments despite regional conflict. Falling US tech valuations and strong dollar dynamics created attractive entry points. PIF and ADIA remain among the most active foreign investors in US equities.",mk:"사우디아라비아, UAE, 쿠웨이트 등 걸프 지역 투자자들이 지역 분쟁에도 미국 시장에서 적극 투자 중이다. 미국 기술주 평가가치 하락과 달러화 강세가 매력적인 진입 기회를 만들어냈다.",tg:["걸프투자","미국시장","PIF"],u:"https://www.khaleejtimes.com/business/gulf-investors-us-markets-2026"},
  {id:326,p:6,r:"일반",t:"Oman Increases Oil Exports via Muscat Port as Alternative Route for Gulf Producers",k:"오만 무스카트 항구, 걸프 생산국 대안 루트로 원유 수출 증가",s:"Times of Oman",c:"gulf",d:"2026-04-16",m:"Oman Port of Muscat has seen significant uptick in oil export volumes as Gulf producers seek alternatives to blockaded Strait of Hormuz. Oman location outside the Strait makes it a viable transit point. Muscat port is handling additional throughput from Saudi Aramco, QatarEnergy, and ADNOC shipments.",mk:"오만 무스카트 항구가 호르무즈 봉쇄에 대한 대안을 찾는 걸프 생산국들의 원유 수출 물량 급증을 처리하고 있다. 호르무즈 해협 밖 위치한 오만의 지리적 이점이 핵심 환적 거점으로 부상했다.",tg:["오만","원유수출","대안루트"],u:"https://timesofoman.com"},
  {id:327,p:9,r:"헤드라인",t:"Pakistan Pushes for New Round of US-Iran Talks as Ceasefire Near Expiry",k:"알자지라 생중계: 휴전 만료 임박 - 파키스탄 미국-이란 새 협상 추진",s:"Al Jazeera",c:"me",d:"2026-04-16",m:"Pakistan high-level delegation held talks with Iranian officials in Tehran on possibility of a second round of US-Iran negotiations. The White House expressed optimism for continued talks in Islamabad. The two-week ceasefire agreed April 8 is set to expire April 21, creating diplomatic urgency.",mk:"파키스탄 고위 대표단이 테헤란에서 이란 당국자들과 미국-이란 2차 협상 가능성을 논의했다. 4월 8일 체결된 2주 휴전이 4월 21일 만료될 예정이어서 외교적 긴급성이 높아졌다.",tg:["미국-이란협상","휴전","파키스탄중재"],u:"https://www.aljazeera.com/news/liveblog/2026/4/16/iran-war-live-pakistan-in-push-for-new-round-of-us-iran-peace-negotiations"},
  {id:328,p:8,r:"속보",t:"Saudi Arabia Restores East-West Pipeline; Khurais Field Recovery Still Ongoing",k:"알아라비야: 사우디 동서 파이프라인 복구 완료, 카라이스 유전은 복구 작업 진행 중",s:"Al Arabiya",c:"me",d:"2026-04-16",m:"Saudi Ministry of Energy announced East-West crude pipeline restored to full 7 million bpd capacity. The Manifa field production of 300,000 bpd also recovered. Khurais field restoration work is still ongoing, with government pledging to announce completion when accomplished.",mk:"사우디 에너지부가 동서 원유 파이프라인을 700만 배럴/일 완전 용량으로 복구했다고 발표했다. 마니파 유전도 30만 배럴/일 생산을 회복했지만 카라이스 유전은 복구 작업이 아직 진행 중이다.",tg:["에너지인프라","원유생산","사우디"],u:"https://english.alarabiya.net/News/saudi-arabia"},
  {id:329,p:8,r:"심층분석",t:"Can Pakistan Juggle US-Iran Mediation While Honoring Saudi Defence Commitments?",k:"알자지라 분석: 파키스탄, 사우디 방위 공약 지키며 미국-이란 중재 병행 가능한가?",s:"Al Jazeera",c:"me",d:"2026-04-16",m:"Pakistan faces delicate balancing between its mediation role in US-Iran talks and its defence commitments to Saudi Arabia. Islamabad signed a mutual defence agreement with Riyadh last year, obligating military support if Saudi territory is attacked. Analysts question whether Pakistan can maintain mediator neutrality.",mk:"파키스탄은 미국-이란 중재 역할과 사우디아라비아에 대한 방위 공약 사이에서 미묘한 균형을 유지해야 한다. 파키스탄은 지난해 사우디와 상호 방위 협정을 체결했으며, 중재국 중립성 유지 여부가 의문시된다.",tg:["파키스탄","사우디방위","이란중재"],u:"https://www.aljazeera.com/news/2026/4/14/can-pakistan-juggle-us-iran-mediation-with-saudi-defence-commitments#id329"},
  {id:330,p:7,r:"속보",t:"Hezbollah Rejects Israeli Buffer Zone Plans in Southern Lebanon, Direct Talks Stall",k:"헤즈볼라, 레바논 남부 완충지대 계획 거부 - 직접 협상 교착",s:"Iran International",c:"me",d:"2026-04-16",m:"Hezbollah Secretary-General Naim Qassem declared Israel plan to create a buffer zone by demolishing southern Lebanon border villages is doomed to failure. Direct Israel-Lebanon talks in Washington have stalled on this issue. Hezbollah demands full Israeli withdrawal from Lebanese territory.",mk:"헤즈볼라 사무총장 나임 카셈은 레바논 남부 국경 마을 철거를 통해 완충지대를 만들려는 이스라엘 계획이 실패로 끝날 것이라고 선언했다. 이 문제로 워싱턴 이스라엘-레바논 직접 회담이 교착 상태에 빠졌다.",tg:["헤즈볼라","레바논","이스라엘"],u:"https://www.iranintl.com/en/202604160002"},
  {id:331,p:7,r:"주요경제",t:"IMF Warns Middle East War Could Cut Regional Growth to 1.1% in 2026",k:"IMF, 중동 전쟁이 2026년 지역 성장률을 1.1%로 낮출 수 있다고 경고",s:"Jerusalem Post",c:"me",d:"2026-04-16",m:"The IMF April 2026 World Economic Outlook warns that Middle East and North Africa growth forecast was cut by 2.8 percentage points to 1.1 percent in 2026. The downgrade reflects the devastating economic impact of the Iran war, Hormuz blockade, and energy infrastructure damage across the region.",mk:"IMF의 2026년 4월 세계경제전망은 중동 및 북아프리카 지역 성장률 전망치가 2.8%p 하락한 1.1%로 낮아졌다고 경고했다. 이란 전쟁, 호르무즈 봉쇄, 에너지 인프라 피해의 경제적 충격을 반영한 것이다.",tg:["IMF","중동경제","지역성장"],u:"https://www.jpost.com/middle-east/article-imf-mideast-2026"},
  {id:332,p:9,r:"헤드라인",t:"US and Iran Consider Ceasefire Extension as Hormuz Blockade Disrupts Oil Flows",k:"블룸버그: 미국-이란, 호르무즈 봉쇄 속 휴전 연장 검토",s:"Bloomberg",c:"global",d:"2026-04-16",m:"US and Iran have reached an in principle agreement to extend the two-week ceasefire by additional days to allow more diplomatic progress, though no formal deal has been signed. A senior US official denied formal agreement. Hormuz Strait remains partially closed with oil prices near $130/bbl.",mk:"미국과 이란이 추가 외교 진전을 위해 2주 휴전을 수일 연장하는 원칙적 합의에 도달했지만, 공식 협정은 아직 체결되지 않았다. 호르무즈 해협은 여전히 부분적으로 봉쇄돼 있으며 유가는 배럴당 130달러에 근접해 있다.",tg:["미국-이란","휴전연장","호르무즈"],u:"https://www.bloomberg.com/news/articles/2026-04-15/us-and-iran-weigh-truce-extension-with-hormuz-still-shuttered"},
  {id:333,p:9,r:"속보",t:"Trump Says Iran War Close to Over as Markets Rally on Peace Deal Hopes",k:"CNBC: 트럼프, 이란 전쟁 거의 끝났다 - 평화 협상 기대감에 시장 상승",s:"CNBC",c:"global",d:"2026-04-16",m:"US President Donald Trump declared the Iran war is very close to over, citing Tehran eagerness for a peace deal. Financial markets rallied significantly with oil prices dipping below $125/bbl from highs near $150/bbl. The White House said it feels good about prospects of a deal with Iran.",mk:"트럼프 대통령이 테헤란이 평화 협정을 원하고 있다며 이란 전쟁이 거의 끝났다고 선언했다. 금융시장은 급등으로 반응했으며, 유가는 배럴당 150달러 근처 최고점에서 125달러 이하로 하락했다.",tg:["트럼프","이란전쟁","유가"],u:"https://www.cnbc.com/2026/04/15/iran-war-trump-peace-deal-us-talks-stock-market-oil-prices-.html"},
  {id:334,p:9,r:"심층분석",t:"IEA Oil Market Report April 2026: Global Supply Fell 10 Mb/d in March",k:"IEA 4월 원유시장 보고서: 글로벌 공급 1000만 배럴 감소, 역사상 최대 공급 차질",s:"IEA",c:"global",d:"2026-04-16",m:"The IEA April 2026 Oil Market Report documents the largest supply disruption in global oil market history, with supply falling 10.1 mb/d to 97 mb/d in March. Hormuz shipments averaged only 3.8 mb/d in early April versus 20+ mb/d pre-crisis. Oil demand is now expected to fall 80 kb/d in 2026.",mk:"IEA 4월 원유시장 보고서는 3월 글로벌 공급이 1,010만 배럴/일 감소한 9,700만 배럴을 기록했다며 글로벌 원유시장 역사상 최대 공급 차질로 기록했다. 호르무즈 선적량이 위기 전 2,000만 배럴 이상에서 380만 배럴로 급감했다.",tg:["IEA","원유공급","에너지위기"],u:"https://www.iea.org/reports/oil-market-report-april-2026#id334"},
  {id:335,p:8,r:"주요경제",t:"Day 47 of Middle East Conflict: Trump Optimistic, Pakistan Pursues New US-Iran Round",k:"CNN: 중동분쟁 47일째 - 트럼프 낙관론 속 파키스탄 새 미국-이란 협상 추진",s:"CNN",c:"global",d:"2026-04-16",m:"Day 47 of US-Iran conflict saw Trump declare the war very close to over while Pakistan PM Shehbaz Sharif departed Jeddah for Qatar as part of his diplomatic tour. Direct Israel-Lebanon negotiations continued in Washington with Beirut seeking ceasefire and Israel demanding Hezbollah disarmament.",mk:"미국-이란 분쟁 47일째, 트럼프가 전쟁이 거의 끝났다고 선언한 가운데 파키스탄 총리 샤리프가 외교 순방의 일환으로 제다를 출발해 카타르로 향했다.",tg:["중동분쟁","트럼프","이스라엘-레바논"],u:"https://www.cnn.com/2026/04/15/world/live-news/iran-war-blockade-us-trump"},
  {id:336,p:8,r:"주요경제",t:"Reuters: Saudi Arabia Commits to Prioritizing Korean Oil Deliveries via Red Sea Through Year-End",k:"로이터: 사우디, 연말까지 한국향 홍해 경유 원유 우선 공급 약속",s:"Reuters",c:"global",d:"2026-04-16",m:"Saudi Arabia committed to prioritizing 200 million barrels to South Korean companies from June through year-end via non-Hormuz routes. Additional 50 million barrels will be shipped in April-May through Yanbu Red Sea port. The agreement provides energy security assurance as Korea faces supply disruptions.",mk:"사우디아라비아가 6월부터 연말까지 한국 기업에 2억 배럴을 호르무즈 우회 경로를 통해 우선 공급하기로 약속했다. 4~5월 중 추가 5,000만 배럴도 얀부 홍해 항구를 통해 선적할 예정이다.",tg:["사우디-한국","원유공급","에너지안보"],u:"https://www.reuters.com/business/energy/south-korea-saudi-oil-deal-2026-04-15"},
  {id:337,p:8,r:"속보",t:"Iran War Has Damaged Up to $58 Billion in Energy Infrastructure, Rystad Estimates",k:"CNBC: 이란 전쟁으로 에너지 인프라 최대 580억 달러 피해 - 라이스타드 추산",s:"CNBC",c:"global",d:"2026-04-16",m:"Rystad Energy estimates the 2026 Iran war caused between $40-58 billion in damage to Middle East energy infrastructure. Sites hit include Saudi facilities, Iranian refineries, and Gulf LNG plants. The damage represents a generational setback to energy production capacity requiring years to fully restore.",mk:"라이스타드 에너지는 2026년 이란 전쟁이 중동 에너지 인프라에 400~580억 달러의 피해를 입혔다고 추산했다. 사우디 시설, 이란 정유소, 걸프 LNG 공장이 피해를 입었으며 완전 복구까지 수년이 걸릴 전망이다.",tg:["에너지피해","이란전쟁","인프라"],u:"https://www.cnbc.com/2026/04/15/iran-war-energy-facilities-refinery-pipeline-lng.html"},
  {id:338,p:7,r:"심층분석",t:"Saudi Arabia Fiscal Buffer Tested as Oil Revenues Halved by Hormuz Crisis",k:"FT: 호르무즈 위기로 석유수입 반토막 - 사우디 재정 완충 능력 시험대",s:"Financial Times",c:"global",d:"2026-04-16",m:"Saudi Arabia substantial fiscal reserves are being tested as oil export revenues fell roughly half due to Hormuz blockade and infrastructure attacks. The kingdom breakeven oil price around $90/barrel creates fiscal strain. Analysts estimate Saudi could sustain current spending for 12-18 months before requiring bond issuance.",mk:"사우디아라비아의 상당한 재정 여유분이 호르무즈 봉쇄와 인프라 공격으로 석유 수출 수익이 약 절반으로 줄어들며 시험대에 올랐다. 배럴당 약 90달러의 손익분기 유가가 재정 압박을 야기하고 있다.",tg:["사우디재정","유가","재정정책"],u:"https://www.ft.com/content/saudi-fiscal-buffer-hormuz-2026"},
  {id:339,p:7,r:"주요경제",t:"Saudi Vision 2030 Projects Enter Review as War Costs Mount Over $10 Billion",k:"WSJ: 전쟁 비용 100억 달러 초과 - 사우디 비전2030 프로젝트 재검토",s:"WSJ",c:"global",d:"2026-04-16",m:"Saudi officials told WSJ that most core Vision 2030 projects entered review stage as war-related cumulative costs exceed $10 billion. The review encompasses tourism, entertainment, and urban development initiatives. Projects are being reprioritized not cancelled, focusing on near-term returns.",mk:"사우디 당국자들은 WSJ에 전쟁 관련 누적 비용이 100억 달러를 초과하면서 대부분의 핵심 비전2030 프로젝트들이 재검토 단계에 들어갔다고 밝혔다. 취소가 아니라 수익성 있는 프로젝트 우선순위 재조정으로 설명됐다.",tg:["비전2030","재검토","사우디","WSJ"],u:"https://www.wsj.com/world/middle-east/saudi-vision-2030-war-review-2026"},
  {id:340,p:7,r:"주요경제",t:"Saudi Arabia Wealth Fund PIF Unveils New 2026-2030 Strategy to Boost Returns",k:"블룸버그: 사우디 PIF, 수익률 제고 위한 2026-2030 신전략 공개",s:"Bloomberg",c:"global",d:"2026-04-16",m:"Saudi Arabia PIF unveiled 2026-2030 strategy focused on maximizing returns and attracting private capital, shifting from building mega-projects independently to leveraging its $900+ billion portfolio for third-party investment. The strategy organizes investments into Vision, Strategic, and Financial portfolios.",mk:"사우디 공공투자펀드(PIF)가 9,000억 달러 이상의 포트폴리오를 민간 자본 유치에 활용하는 방향으로 전환하는 2026-2030 신전략을 공개했다. 투자를 비전, 전략, 금융 포트폴리오로 나눠 운용한다.",tg:["PIF","투자전략","사우디국부펀드"],u:"https://www.bloomberg.com/news/articles/2026-04-15/saudi-arabia-s-wealth-fund-unveils-new-strategy-to-boost-returns"},
  {id:341,p:9,r:"헤드라인",t:"Korea Secures 273 Million Barrels of Crude via Non-Hormuz Routes Through Energy Envoy Diplomacy",k:"에너지 특사 외교 성과 - 한국, 호르무즈 우회 루트로 2억7300만 배럴 확보",s:"서울경제",c:"korean-view",d:"2026-04-16",m:"South Korea secured 273 million barrels of crude oil via alternative non-Hormuz shipping routes following a week-long diplomatic tour by Presidential Chief of Staff Kang Hoon-sik to Oman, Saudi Arabia, Qatar, and Kazakhstan. Saudi Arabia committed 250 million barrels while additional volumes were secured from Oman and Kazakhstan.",mk:"강훈식 대통령 비서실장이 오만, 사우디, 카타르, 카자흐스탄을 1주일간 방문한 외교 성과로 호르무즈 우회 경로를 통해 2억7300만 배럴의 원유를 확보했다. 사우디에서만 2억5000만 배럴을 확보했다.",tg:["에너지외교","원유확보","강훈식"],u:"https://www.sedaily.com/article/20032948"},
  {id:342,p:8,r:"속보",t:"Korea Discusses Offshore Oil Storage with Middle East Producers to Reduce Hormuz Dependency",k:"한국, 중동 산유국과 해상 원유 비축 시설 논의 - 호르무즈 의존도 감소 목표",s:"서울경제",c:"korean-view",d:"2026-04-16",m:"South Korea is in discussions with Middle East oil producers about establishing offshore oil storage facilities to reduce Hormuz corridor dependency. Korea also held talks with UAE on joint oil stockpiling agreements. The initiatives are part of a broader energy security overhaul following the crisis.",mk:"한국이 호르무즈 해협 의존도를 낮추기 위해 중동 산유국들과 해상 원유 비축 시설 설립을 논의하고 있다. UAE와 공동 원유 비축 협정도 논의됐다. 이번 위기가 드러낸 에너지 취약성을 해소하기 위한 광범위한 에너지 안보 개편의 일환이다.",tg:["에너지안보","원유비축","중동"],u:"https://en.sedaily.com/finance/2026/04/15/korea-discusses-offshore-oil-storage-facilities-with-middle#id342"},
  {id:343,p:8,r:"주요경제",t:"Iran War Is Stress-Testing South Korea Energy Model, Korea Economic Institute Analysis",k:"이란 전쟁이 한국 에너지 모델의 한계를 시험하고 있다 - 한국경제연구원 분석",s:"한국경제",c:"korean-view",d:"2026-04-16",m:"The Korea Economic Institute analyzed how the 2026 Iran war exposed critical vulnerabilities in South Korea energy import model, which relies on the Middle East for 70% of crude oil. South Korea implemented energy rationing, fuel price caps, and naphtha export restrictions. The crisis is accelerating Korea nuclear energy expansion.",mk:"한국경제연구원이 2026년 이란 전쟁이 중동에 70%의 원유를 의존하는 한국 에너지 수입 모델의 심각한 취약성을 드러냈다고 분석했다. 한국은 에너지 배급, 연료가격 상한제, 납사 수출 제한을 시행했다.",tg:["에너지안보","한국경제","원유의존"],u:"https://www.hankyung.com/economy/article/2026041500000"},
  {id:344,p:7,r:"주요경제",t:"Korea and UAE in Advanced Discussions Over Joint Oil Stockpiling Agreement",k:"한국-UAE, 공동 원유 비축 협정 고급 협상 진행 중",s:"연합뉴스",c:"korean-view",d:"2026-04-16",m:"South Korea and UAE are in advanced discussions over a joint oil stockpiling agreement allowing Korean companies to store crude oil in UAE facilities as insurance against future Hormuz disruptions. The arrangement similar to existing agreements with Oman and Kuwait would provide strategic reserve buffer outside Korea borders.",mk:"한국과 UAE가 미래의 호르무즈 차단에 대비한 보험으로 한국 기업들이 UAE 시설에 원유를 비축할 수 있는 공동 원유 비축 협정 논의를 진행 중이다. 오만, 쿠웨이트와 유사한 협정으로 국경 밖 전략 비축 완충재 역할을 한다.",tg:["한국-UAE","공동비축","에너지안보"],u:"https://www.yna.co.kr/view/AKR20260416000100"},
  {id:345,p:7,r:"심층분석",t:"Korea Cannot Break Middle East Oil Dependency Despite Decades of Diversification Efforts",k:"수십 년간 다변화 노력에도 중동 원유 의존 탈출 못하는 한국",s:"한국경제",c:"korean-view",d:"2026-04-16",m:"Analysis shows that despite years of energy diversification policy, South Korea remains 70% dependent on Middle East crude. Price competitiveness, infrastructure investment costs, and long-term supply agreements locked Korea into Middle East dependency. The Iran war is forcing an accelerated strategic rethink.",mk:"한국경제 분석에 따르면 수년간의 에너지 다변화 정책에도 불구하고 한국은 원유 수입의 70%를 중동에 의존하고 있다. 가격 경쟁력과 장기 공급 계약이 중동 의존을 고착화했으며, 이란 전쟁 위기가 전략적 재고를 강제하고 있다.",tg:["한국에너지","중동의존","다변화"],u:"https://www.hankyung.com/article/2026032940851"},
  {id:346,p:9,r:"헤드라인",t:"Saudi Arabia Intercepts Missile Targeting Riyadh as Iran Attacks on Gulf Neighbors Continue",k:"사우디, 리야드 겨냥 미사일 요격…이란의 걸프 공격 계속",s:"Arab News",c:"saudi",d:"2026-04-05",m:"Saudi Arabia said it intercepted a ballistic missile targeting the Riyadh region in early Saturday hours. Six ballistic missiles were launched toward Riyadh with two intercepted, along with over 10 drones since midnight Friday, all of which were intercepted and destroyed.",mk:"사우디는 토요일 새벽 리야드 지역을 겨냥한 탄도미사일을 요격했다고 밝혔다. 금요일 자정 이후 리야드를 겨냥해 발사된 6발의 탄도미사일 중 2발이 요격되었고, 10기 이상의 드론이 모두 요격·파괴되었다.",tg:["사우디","이란","미사일방어"],u:"https://www.arabnews.com/node/2637919/saudi-arabia"},
  {id:347,p:9,r:"헤드라인",t:"Riyadh and Islamabad Sign Agreement to Roll Over $3 Billion Saudi Deposit",k:"리야드·이슬라마바드, 30억 달러 사우디 예치금 연장 합의",s:"Arab News",c:"saudi",d:"2026-04-16",m:"Saudi Arabia and Pakistan signed an agreement to extend the $3 billion deposit by the Saudi Fund for Development with the Pakistani central bank, providing Pakistan much-needed breathing space for fiscal reforms. The agreement was signed April 16 in Washington, D.C.",mk:"사우디와 파키스탄이 사우디개발기금(SFD)이 파키스탄 중앙은행에 예치한 30억 달러의 예치 기간 연장 협정을 체결했다. 4월 16일 워싱턴DC에서 서명된 이번 협정은 파키스탄의 재정개혁에 숨통을 틔워줄 전망이다.",tg:["사우디","파키스탄","금융지원"],u:"https://www.arabnews.com/node/2640220/pakistan"},
  {id:348,p:9,r:"정책발표",t:"Saudi Crown Prince and Pakistan PM Discuss US-Iran Mediation and Regional Stability",k:"사우디 왕세자·파키스탄 총리, 미·이란 중재와 역내 안정 논의",s:"Arab News",c:"saudi",d:"2026-04-17",m:"Crown Prince Mohammed bin Salman met Pakistan Prime Minister Shehbaz Sharif in Jeddah to discuss US-Iran mediation efforts and regional stability. The meeting came amid heightened tensions over Iranian attacks on Gulf states and the Strait of Hormuz crisis.",mk:"무함마드 빈 살만 왕세자가 제다에서 파키스탄의 셰바즈 샤리프 총리를 만나 미·이란 간 중재 노력과 역내 안정을 논의했다. 이번 회동은 이란의 걸프 국가 공격과 호르무즈 해협 위기 국면에서 이뤄졌다.",tg:["사우디","파키스탄","외교"],u:"https://www.arabnews.com/node/2640000/saudi-arabia#id348"},
  {id:349,p:6,r:"일반",t:"Aquarabia Rewriting the Water Park Playbook with Saudi Identity Ahead of April 23 Opening",k:"아쿠아라비아, 사우디 정체성 입힌 물놀이공원 공식 개장 임박",s:"Arab News",c:"saudi",d:"2026-04-18",m:"Aquarabia water park in Qiddiya City is set to open on April 23, 2026, promising a new chapter in Saudi entertainment and tourism. Designed around Saudi cultural identity, the park is a flagship project under Vision 2030 tourism diversification goals.",mk:"키디야시티 내 아쿠아라비아 워터파크가 4월 23일 공식 개장한다. 사우디 문화 정체성을 반영해 설계된 이 시설은 비전2030 관광 다변화의 기함 프로젝트 중 하나다.",tg:["관광","비전2030","엔터테인먼트"],u:"https://www.arabnews.com/node/2640261/saudi-arabia"},
  {id:350,p:8,r:"정책발표",t:"Saudi Arabia Designates 2026 as the Year of Artificial Intelligence",k:"사우디, 2026년을 &apos;인공지능의 해&apos;로 지정",s:"Arab News",c:"saudi",d:"2026-04-01",m:"Saudi Arabia has officially designated 2026 as the Year of Artificial Intelligence, emerging as a global hub for data and AI under Crown Prince Mohammed bin Salman support. The declaration aligns with multi-billion-dollar AI infrastructure investments via HUMAIN and PIF.",mk:"사우디가 2026년을 공식적으로 &apos;인공지능의 해&apos;로 지정했다. 무함마드 빈 살만 왕세자 후원 아래 사우디는 글로벌 데이터·AI 허브로 부상 중이며, HUMAIN·PIF를 통한 수십억 달러 규모 AI 인프라 투자가 동반된다.",tg:["AI","비전2030","기술"],u:"https://www.arabnews.com/node/2636061/saudi-arabia"},
  {id:351,p:9,r:"주요경제",t:"PIF Approves 2026-2030 Strategy to Boost Economic Diversification",k:"PIF, 경제 다변화 위한 2026-2030 전략 승인",s:"Saudi Gazette",c:"saudi",d:"2026-04-15",m:"The Public Investment Fund Board chaired by Crown Prince Mohammed bin Salman approved PIF 2026-2030 strategy. The Vision Portfolio targets six ecosystems: tourism, urban development, advanced manufacturing, industrials/logistics, clean energy, and NEOM, unlocking private sector participation.",mk:"무함마드 빈 살만 왕세자가 의장인 PIF 이사회가 2026-2030 전략을 승인했다. 비전포트폴리오는 관광·도시개발·첨단제조·산업물류·청정에너지·NEOM 6개 생태계를 중점 육성하며 민간 참여 확대를 지향한다.",tg:["PIF","비전2030","전략"],u:"https://saudigazette.com.sa/article/660562/saudi-arabia/pif-approves-20262030-strategy-to-boost-economic-diversification#id351"},
  {id:352,p:9,r:"주요경제",t:"PIF Governor: No Projects Cancelled in NEOM, Spending Reviewed",k:"PIF 총재 &quot;NEOM 프로젝트 취소 없음… 지출 우선순위 재검토&quot;",s:"Saudi Gazette",c:"saudi",d:"2026-04-15",m:"PIF Governor Yasir Al-Rumayyan stated that no projects have been cancelled in NEOM. He said the megaproject is undergoing a natural reassessment of spending priorities amid broader fiscal recalibration caused by the Iran war and oil market volatility.",mk:"야시르 알루마이얀 PIF 총재는 NEOM 어떤 프로젝트도 취소된 것이 없다고 밝혔다. 이란 전쟁과 유가 변동에 따른 재정 재조정 속에서 지출 우선순위에 대한 자연스러운 재평가가 진행 중이라는 설명이다.",tg:["NEOM","PIF","프로젝트"],u:"https://saudigazette.com.sa/article/660565/saudi-arabia/pif-governor-says-no-projects-cancelled-in-neom-spending-reviewed"},
  {id:353,p:8,r:"정책발표",t:"HR Ministry Raises Employment Contracts Compliance Rate via Qiwa Platform to 85 Percent from April 30",k:"인적자원부, 4월 30일부터 키와 플랫폼 고용계약 준수율 85%로 상향",s:"Saudi Gazette",c:"saudi",d:"2026-04-14",m:"Saudi Arabia Ministry of Human Resources announced it will raise the target compliance rate for documenting employment contracts via the Qiwa digital platform to 85 percent, effective April 30. The move forms part of labor market formalization reforms under Vision 2030.",mk:"사우디 인적자원부가 키와(Qiwa) 디지털 플랫폼을 통한 고용계약 등록 준수율 목표치를 85%로 상향해 4월 30일부터 적용한다고 발표했다. 비전2030의 노동시장 공식화 개혁의 일환이다.",tg:["노동","디지털","비전2030"],u:"https://saudigazette.com.sa/article/660467/saudi-arabia/hr-ministry-raises-employment-contracts-compliance-rate-via-qiwa-platform-to-85-from-april-30"},
  {id:354,p:7,r:"정책발표",t:"Expatriates Without Official Permit Not Allowed to Enter Makkah from Monday",k:"공식 허가 없는 외국인, 월요일부터 메카 진입 금지",s:"Saudi Gazette",c:"saudi",d:"2026-04-10",m:"Saudi authorities announced expatriates without an official permit would not be allowed to enter Makkah effective Monday, April 13. The measure aims to regulate access during the pre-Hajj preparations and security sensitive periods.",mk:"사우디 당국은 4월 13일(월)부터 공식 허가 없는 외국인의 메카 진입을 금지한다고 발표했다. 하지(Hajj) 시즌 대비와 보안 관리 차원의 조치다.",tg:["메카","비자","순례"],u:"https://saudigazette.com.sa/article/660491/saudi-arabia/expatriates-without-an-official-permit-are-not-allowed-to-enter-makkah-from-monday"},
  {id:355,p:6,r:"일반",t:"Riyadh Art Unveils 75 Permanent Works, Plans 115 More Across Capital",k:"리야드 아트, 영구 작품 75점 공개…추가 115점 설치 계획",s:"Saudi Gazette",c:"saudi",d:"2026-04-17",m:"Riyadh Art revealed 75 installed artworks across the capital as part of its permanent public art collection, with plans for an additional 115 artworks throughout 2026 and beyond. The initiative is part of a broader Vision 2030 cultural transformation effort.",mk:"리야드 아트가 수도 전역에 설치된 영구 공공미술 75점을 공개했고, 2026년 이후 115점을 추가 설치할 계획이다. 비전2030 문화 변혁의 일환이다.",tg:["문화","비전2030","리야드"],u:"https://saudigazette.com.sa/article/660603/saudi-arabia/riyadh-art-unveils-75-permanent-works-plans-115-more-across-capital"},
  {id:356,p:7,r:"정책발표",t:"Makkah Airport and Metro Plans Underway, Royal Commission Official Says",k:"메카 공항·지하철 건설 추진 중…왕립위원회 고위관리 밝혀",s:"Saudi Gazette",c:"saudi",d:"2026-04-10",m:"The CEO of the Royal Commission for Makkah City said approval has been secured for strategic directions to develop a Makkah airport to global standards and a metro system. Feasibility studies and preliminary designs for the Makkah Metro have been completed.",mk:"메카시청 왕립위원회 CEO는 메카 공항과 지하철 시스템을 세계적 수준으로 개발하기 위한 전략·경제적 방향이 승인됐다고 밝혔다. 메카 지하철의 타당성 조사와 기본 설계가 완료된 상태다.",tg:["메카","인프라","교통"],u:"https://saudigazette.com.sa/article/660176"},
  {id:357,p:10,r:"속보",t:"Saudi Arabia Strongly Condemns Failed Iranian Attacks Targeting Riyadh and Eastern Regions",k:"사우디, 리야드·동부 겨냥한 이란의 실패한 공격 강력 규탄",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-05",m:"Saudi Arabia strongly condemned the Iranian ballistic missile and drone attacks targeting Riyadh and the Eastern Region, calling them failed and cowardly. The Kingdom reaffirmed its right to defend its territory and urged the international community to take deterrent action.",mk:"사우디는 리야드와 동부지역을 겨냥한 이란의 탄도미사일·드론 공격을 실패하고 비겁한 행위로 규정하며 강력히 규탄했다. 영토 방어권을 재확인하고 국제사회의 억지 조치를 촉구했다.",tg:["사우디","이란","규탄"],u:"https://english.aawsat.com/gulf/5245738-saudi-arabia-strongly-condemns-failed-cowardly-iranian-attacks-targeting-riyadh-and"},
  {id:358,p:7,r:"주요경제",t:"Experts to Asharq Al-Awsat: Saudi Budget Strengthens Financial Sustainability",k:"전문가들 &quot;사우디 예산, 재정 지속가능성 강화&quot;",s:"Asharq Al-Awsat",c:"saudi",d:"2026-01-05",m:"Experts told Asharq Al-Awsat that Saudi Arabia fiscal framework and the newly approved PIF 2026-2030 strategy strengthen financial sustainability despite near-term pressures from the Iran war. Non-oil growth is projected at 4.6 percent in 2026.",mk:"전문가들은 이란 전쟁으로 인한 단기적 압박에도 사우디의 재정 프레임워크와 신규 승인된 PIF 2026-2030 전략이 재정 지속가능성을 강화할 것이라고 아샤르크알아와사트에 밝혔다. 2026년 비석유 부문 성장률은 4.6%로 전망된다.",tg:["재정","PIF","비석유성장"],u:"https://english.aawsat.com/business/5192422-experts-asharq-al-awsat-saudi-budget-strengthens-financial-sustainability"},
  {id:359,p:10,r:"속보",t:"Ministry of Energy: Operational Activities Halted at Several Energy Facilities Due to Recent Attacks",k:"에너지부 &quot;최근 공격으로 사우디 내 일부 에너지 시설 가동 중단&quot;",s:"SPA",c:"saudi",d:"2026-04-12",m:"An official source at the Ministry of Energy confirmed operational activities have been halted at several energy facilities in the Kingdom following recent Iranian attacks. The East-West pipeline lost approximately 700,000 barrels per day in throughput before being restored to full capacity.",mk:"에너지부 공식 소식통은 최근 이란의 공격으로 사우디 내 일부 에너지 시설의 가동이 중단됐다고 확인했다. 동서 송유관은 일일 약 70만 배럴의 수송량이 감소했다가 전량 정상 가동으로 복구됐다.",tg:["에너지","SPA","공격"],u:"https://spa.gov.sa/en/N2556681"},
  {id:360,p:9,r:"헤드라인",t:"Saudi Air Defenses Intercept 11 Ballistic Missiles Over Eastern Province as Debris Falls Near Energy Sites",k:"사우디 방공망, 동부에서 탄도미사일 11발 요격…에너지 시설 인근에 잔해 추락",s:"Saudi Gazette",c:"saudi",d:"2026-04-07",m:"Saudi air defenses intercepted and destroyed 11 ballistic missiles over the Eastern Province, with four missiles initially intercepted and an additional seven later destroyed. Debris fell near energy production sites, prompting temporary operational pauses at some facilities.",mk:"사우디 방공망이 동부 지역에서 탄도미사일 11발을 요격·파괴했다. 최초 4발이 요격됐고 이후 7발이 추가 격파됐다. 일부 잔해가 에너지 생산 시설 인근에 떨어져 일시적 가동 중단이 발생했다.",tg:["방공","사우디","동부지역"],u:"https://saudigazette.com.sa/article/660308"},
  {id:361,p:8,r:"주요경제",t:"Saudi Arabia Restores Key Oil Facilities After Attacks, Fully Recovers East-West Pipeline Capacity",k:"사우디, 공격받은 주요 석유 시설 복구…동서 송유관 전량 회복",s:"Gulf News",c:"gulf",d:"2026-04-13",m:"Saudi Arabia fully restored the East-West pipeline capacity and recovered 300,000 bpd at Manifa oil field, stabilizing global oil supply. Attacks had reduced East-West pipeline throughput by 700,000 bpd before swift response measures enabled restoration.",mk:"사우디가 이란 공격으로 중단됐던 동서 송유관을 전량 복구하고 마니파 유전 30만 b/d를 회복하며 글로벌 공급 안정화에 기여했다. 공격으로 하루 70만 배럴의 수송량이 감소했으나 신속한 대응으로 전량 복구됐다.",tg:["석유","사우디","호르무즈우회"],u:"https://gulfnews.com/business/energy/saudi-arabia-restores-key-oil-facilities-after-attacks-stabilises-global-supply-1.500504143"},
  {id:362,p:8,r:"주요경제",t:"IMF Lowers 2026 Global Growth Forecast as Middle East War Threatens Oil Supply and Inflation",k:"IMF, 중동 전쟁의 원유·인플레 위협으로 2026년 세계 성장률 하향",s:"Gulf News",c:"gulf",d:"2026-04-15",m:"The IMF lowered its 2026 global growth forecast to 3.1 percent and said inflation is expected to rise to 4.4 percent due to Middle East disruptions. Saudi Arabia and UAE growth forecasts were also revised down, though both economies are still expected to expand 3.1 percent.",mk:"IMF가 중동 교란을 반영해 2026년 세계 성장률 전망을 3.1%로 하향하고 인플레이션을 4.4%로 상향 전망했다. 사우디와 UAE 성장률도 낮췄지만 여전히 3.1% 성장 전망을 유지했다.",tg:["IMF","세계경제","인플레"],u:"https://gulfnews.com/business/economy/imf-lowers-2026-global-growth-forecast-as-war-threatens-oil-supply-inflation-1.500506782"},
  {id:363,p:7,r:"일반",t:"UAE Students to Return to Classrooms on April 20 After Over a Month of Remote Learning",k:"UAE 학생들, 한 달여 원격수업 끝에 4월 20일 등교 재개",s:"Khaleej Times",c:"gulf",d:"2026-04-16",m:"The UAE Ministry of Education announced students will return to in-person learning on Monday, April 20, marking a shift back to classrooms after more than a month of distance learning during regional uncertainty linked to the US-Israel-Iran conflict.",mk:"UAE 교육부는 미·이스라엘·이란 전쟁으로 한 달 넘게 지속된 원격수업을 마무리하고 4월 20일(월)부터 등교 수업을 재개한다고 밝혔다.",tg:["UAE","교육","전쟁영향"],u:"https://www.khaleejtimes.com/uae/uae-students-to-return-to-classrooms-on-april-20-ministry-announces"},
  {id:364,p:9,r:"주요경제",t:"UAE Records 13 Deaths and 217 Injuries Since Beginning of US-Israel-Iran War",k:"UAE, 미·이스라엘·이란 전쟁 개시 이후 13명 사망·217명 부상",s:"Khaleej Times",c:"gulf",d:"2026-04-04",m:"UAE Ministry of Defense reported 13 deaths and 217 injuries since Iran aggression began. On April 4, UAE air defenses engaged 23 ballistic missiles and 56 drones. Cumulative totals: 507 ballistic missiles, 24 cruise missiles, and 2,191 drones intercepted.",mk:"UAE 국방부는 이란 공세 이후 13명 사망, 217명 부상을 공식 집계했다. 4월 4일에만 탄도미사일 23발과 드론 56기와 교전했다. 누적으로는 탄도미사일 507발·순항 24발·드론 2,191기를 요격·교전했다.",tg:["UAE","전쟁","방공"],u:"https://www.khaleejtimes.com/uae/iran-war-mod-statement-april-4-2026"},
  {id:365,p:8,r:"심층분석",t:"How Saudi Arabia is Repositioning NEOM as Key Logistics Hub and Economic Anchor",k:"사우디, NEOM을 핵심 물류 허브·경제 축으로 재정립",s:"The National",c:"gulf",d:"2026-04-17",m:"Saudi Arabia is repositioning NEOM as a key logistics hub and economic anchor amid fiscal recalibration. The new Port of NEOM transit corridor linking Europe, Egypt, and the GCC demonstrates strategic pivot to bypass Strait of Hormuz and consolidate Red Sea presence.",mk:"사우디가 재정 재조정 속에서 NEOM을 핵심 물류 허브·경제 축으로 재정립하고 있다. 유럽·이집트·GCC를 잇는 NEOM항 신규 운송 회랑은 호르무즈 해협 우회와 홍해 거점 강화라는 전략적 전환을 보여준다.",tg:["NEOM","물류","홍해"],u:"https://www.thenationalnews.com/business/economy/2026/04/17/how-saudi-arabia-is-repositioning-neom-as-key-logistics-hub-and-economic-anchor/"},
  {id:366,p:9,r:"헤드라인",t:"For Gulf States, Hormuz Uncertainty Casts Shadow Over Fragile US-Iran Truce",k:"걸프 국가들, 호르무즈 불확실성에 미·이란 휴전 앞 그림자",s:"Al Jazeera",c:"me",d:"2026-04-09",m:"Gulf states face continued uncertainty as Iran fluctuates on Strait of Hormuz closures despite the US-Iran ceasefire. Saudi foreign ministry urged an end to attacks and the opening of the Strait, hoping the ceasefire will lead to comprehensive sustainable pacification.",mk:"걸프 국가들은 미·이란 휴전에도 이란의 호르무즈 해협 봉쇄 입장 번복으로 불확실성에 직면해 있다. 사우디 외교부는 공격 중단과 해협 개방을 촉구하며 휴전이 지속 가능한 평화로 이어지기를 희망한다고 밝혔다.",tg:["호르무즈","걸프","휴전"],u:"https://www.aljazeera.com/news/2026/4/9/for-gulf-states-hormuz-uncertainty-casts-shadow-over-fragile-us-iran-truce"},
  {id:367,p:8,r:"주요경제",t:"Oil Tankers Exit Strait of Hormuz Amid Fragile US-Iran Ceasefire",k:"불안정한 미·이란 휴전 속 유조선들 호르무즈 해협 이탈",s:"Al Jazeera",c:"me",d:"2026-04-12",m:"Oil tankers began exiting the Strait of Hormuz as shipping resumed under the fragile US-Iran ceasefire. Traffic levels remain far below normal as insurance premiums stay elevated and shippers await clarity on whether Iran will continue allowing transit.",mk:"유조선들이 불안정한 미·이란 휴전 속에서 호르무즈 해협을 빠져나가기 시작했다. 보험료 상승과 이란의 통과 허용 여부에 대한 불확실성으로 교통량은 평시보다 크게 저조한 수준에 머물러 있다.",tg:["호르무즈","원유","해운"],u:"https://www.aljazeera.com/economy/2026/4/12/oil-tankers-exit-strait-of-hormuz-amid-fragile-us-iran-ceasefire"},
  {id:368,p:8,r:"심층분석",t:"Can Pakistan Juggle US-Iran Mediation With Saudi Defence Commitments?",k:"파키스탄, 미·이란 중재와 사우디 방위 공약 양립 가능한가?",s:"Al Jazeera",c:"me",d:"2026-04-14",m:"Pakistan faces a delicate balancing act mediating between the US and Iran while simultaneously deploying military forces to Saudi Arabia. The dual role tests Islamabad diplomatic agility amid rising regional pressures and domestic political constraints.",mk:"파키스탄이 미국·이란 간 중재와 사우디 군사 지원이라는 이중 역할을 동시에 수행해야 하는 시험대에 섰다. 역내 긴장 고조와 국내 정치 제약 속에서 이슬라마바드의 외교적 민첩성이 시험받고 있다.",tg:["파키스탄","사우디","중재"],u:"https://www.aljazeera.com/news/2026/4/14/can-pakistan-juggle-us-iran-mediation-with-saudi-defence-commitments#id368"},
  {id:369,p:9,r:"헤드라인",t:"As Oil Prices Plunge Below $91 After Weeks, a New Hormuz Crisis Emerges",k:"유가 수 주 만에 배럴당 91달러 밑으로 하락…새로운 호르무즈 위기 부상",s:"Al Jazeera",c:"me",d:"2026-04-18",m:"Brent crude fell more than 9 percent to $90.38 a barrel, dropping below $91 for the first time since March 10 after Iran declared the Strait of Hormuz open. But fresh tensions over the US blockade quickly revived supply fears, leading to a new Hormuz crisis.",mk:"브렌트유는 이란의 호르무즈 해협 개방 선언 후 9% 이상 급락해 배럴당 90.38달러를 기록, 3월 10일 이후 처음으로 91달러 밑으로 떨어졌다. 그러나 미국 봉쇄 문제로 긴장이 재점화되며 새로운 호르무즈 위기가 부상했다.",tg:["유가","호르무즈","긴장"],u:"https://www.aljazeera.com/economy/2026/4/18/as-oil-prices-plunge-below-91-after-weeks-a-new-hormuz-crisis-emerges"},
  {id:370,p:9,r:"헤드라인",t:"Saudi Arabia Asks US to End Strait of Hormuz Blockade",k:"사우디, 미국에 호르무즈 해협 봉쇄 해제 요청",s:"Jerusalem Post",c:"me",d:"2026-04-15",m:"Saudi Arabia is pressing the United States to end its blockade of the Strait of Hormuz and return to negotiations with Iran. Saudi has maintained some export resilience through Red Sea routes, but renewed insecurity around Bab al-Mandeb would threaten one of its main alternatives to Hormuz.",mk:"사우디가 미국에 호르무즈 해협 봉쇄를 해제하고 이란과의 협상에 복귀할 것을 요청하고 있다. 홍해 경로로 수출 회복력을 유지해왔지만 바브엘만데브 해협 주변 불안이 재현되면 주요 대체 경로가 위협받을 수 있다.",tg:["사우디","미국","호르무즈"],u:"https://www.jpost.com/middle-east/article-892994"},
  {id:371,p:10,r:"속보",t:"Saudi Arabia Lifts Oil Price to Record Premium as Strait of Hormuz Narrows",k:"사우디, 호르무즈 해협 축소 속 원유 가격 사상 최대 프리미엄으로 인상",s:"Bloomberg",c:"global",d:"2026-04-06",m:"Saudi Aramco increased flagship Arab Light crude to a record premium of $19.50 over regional benchmarks for Asian refiners, as widening Middle East conflict and Iran near-closure of the Strait of Hormuz convulsed energy markets.",mk:"사우디 아람코가 중동 분쟁 확대와 이란의 호르무즈 해협 사실상 폐쇄로 에너지 시장이 요동치는 가운데, 아시아 정유사 대상 아랍라이트 원유 가격을 사상 최고 프리미엄인 배럴당 19.50달러로 인상했다.",tg:["아람코","유가","프리미엄"],u:"https://www.bloomberg.com/news/articles/2026-04-06/saudis-raise-oil-price-to-record-premium-as-war-riles-markets"},
  {id:372,p:9,r:"주요경제",t:"Saudi Arabia Says East-West Pipeline Restored to Full Capacity",k:"사우디, 동서 송유관 전량 복구 발표",s:"Bloomberg",c:"global",d:"2026-04-12",m:"Saudi Arabia restored the full pumping capacity of its East-West pipeline to 7 million barrels a day, rehabilitating a vital link for oil exports via the Red Sea. The pipeline had been reduced by 700,000 bpd after an Iranian attack.",mk:"사우디가 동서 송유관의 일일 700만 배럴 수송량을 전량 복구했다고 발표했다. 이란의 공격으로 70만 b/d가 줄었던 이 송유관은 홍해 경유 원유 수출의 핵심 연결통로다.",tg:["송유관","사우디","수출"],u:"https://www.bloomberg.com/news/articles/2026-04-12/saudi-arabia-says-east-west-pipeline-restored-to-full-capacity"},
  {id:373,p:8,r:"주요경제",t:"Saudi PIF Commits to Global Investments Despite Iran War",k:"사우디 PIF, 이란 전쟁에도 글로벌 투자 지속 공약",s:"Bloomberg",c:"global",d:"2026-03-26",m:"Yasir Al Rumayyan, governor of the $1 trillion Public Investment Fund, said PIF remains committed to investments around the world despite growing concerns over the mounting economic costs of the Iran war. He emphasized PIF measures returns in decades, not quarters.",mk:"야시르 알루마이얀 PIF 총재는 이란 전쟁의 경제적 부담 우려에도 PIF가 글로벌 투자 공약을 이어가겠다고 밝혔다. 그는 PIF가 분기가 아닌 수십 년 단위로 수익률을 측정한다고 강조했다.",tg:["PIF","투자","글로벌"],u:"https://www.bloomberg.com/news/articles/2026-03-26/saudi-wealth-fund-commits-to-global-investments-despite-iran-war"},
  {id:374,p:10,r:"속보",t:"U.S. Oil Price Plunges Below $84 as Iran Declares Strait of Hormuz Open",k:"이란 호르무즈 해협 개방 선언에 미국 원유 84달러 밑으로 급락",s:"CNBC",c:"global",d:"2026-04-17",m:"WTI crude plunged below $84 a barrel on April 17 after Iran declared the Strait of Hormuz completely open, easing supply fears. Brent fell more than 9 percent, the sharpest single-day drop since the start of the Iran war.",mk:"이란이 호르무즈 해협을 완전히 개방한다고 선언하면서 4월 17일 WTI 원유가 배럴당 84달러 밑으로 급락했다. 브렌트유도 9% 넘게 하락해 이란 전쟁 발발 이후 최대 일중 낙폭을 기록했다.",tg:["유가","WTI","호르무즈"],u:"https://www.cnbc.com/2026/04/17/oil-prices-wti-brent-israel-lebanon-ceasefire-trump.html"},
  {id:375,p:8,r:"심층분석",t:"Brent Oil Price Near $100 Again With U.S.-Iran Talks Uncertain and Hormuz Still Blocked",k:"미·이란 협상 불확실성과 호르무즈 봉쇄로 브렌트유 다시 100달러 근접",s:"CNBC",c:"global",d:"2026-04-16",m:"Brent oil prices climbed back toward $100 per barrel as U.S.-Iran talks remained uncertain and the Strait of Hormuz was still effectively blocked. Market volatility remains elevated as Gulf producers struggle to maintain export flows.",mk:"미·이란 협상이 불확실하고 호르무즈 해협이 사실상 봉쇄된 가운데 브렌트유가 다시 배럴당 100달러 수준으로 올라섰다. 걸프 산유국들이 수출 유지에 어려움을 겪으면서 시장 변동성이 높게 유지되고 있다.",tg:["브렌트","유가","호르무즈"],u:"https://www.cnbc.com/2026/04/16/iran-war-oil-price-strait-hormuz.html"},
  {id:376,p:7,r:"심층분석",t:"CNBC Daily Open: A Fragile Peace but a Firm Market Rally",k:"CNBC Daily Open: 불안정한 평화, 견조한 시장 랠리",s:"CNBC",c:"global",d:"2026-04-17",m:"Wall Street closed at record highs as investors bet on the US-Iran ceasefire holding and Middle East conflicts winding down. However, analysts cautioned that the rally sits on a fragile peace still subject to sudden reversals over Hormuz and broader Gulf security.",mk:"월가는 미·이란 휴전 유지와 중동 분쟁 진정에 베팅하며 사상 최고치를 기록했다. 그러나 분석가들은 이번 랠리가 호르무즈와 걸프 안보를 둘러싸고 언제든 역전될 수 있는 불안정한 평화에 기초한다고 경고했다.",tg:["시장","휴전","월가"],u:"https://www.cnbc.com/amp/2026/04/17/cnbc-daily-market-rally-oil-iran-war.html"},
  {id:377,p:7,r:"일반",t:"Asia Markets Mostly Fall as Fragile Middle East Ceasefire Tempers Sentiment",k:"아시아 증시 약세…불안정한 중동 휴전이 투자심리 위축",s:"CNBC",c:"global",d:"2026-04-17",m:"Most Asia-Pacific markets traded lower on April 17 as an Israel-Lebanon ceasefire tempered risk appetite, even after Wall Street closed at fresh record highs. Investors remained cautious over Middle East trajectory after Iran oscillated on Hormuz closures.",mk:"4월 17일 대부분의 아시아·태평양 증시가 월가의 사상 최고치에도 불구하고 이스라엘-레바논 휴전이 위험자산 선호를 눌러 하락했다. 이란의 호르무즈 봉쇄 입장 번복으로 투자자들은 신중한 태도를 유지했다.",tg:["아시아증시","휴전","중동"],u:"https://www.cnbc.com/2026/04/17/asia-markets-today-nikkei225-hang-seng-sensex-asx-ceasefire-oil.html"},
  {id:378,p:8,r:"주요경제",t:"Saudi Output Capacity Cut by 600,000 Barrels a Day Due to Iran War",k:"이란 전쟁으로 사우디 생산능력 일일 60만 배럴 축소",s:"The National",c:"global",d:"2026-04-09",m:"Attacks on Saudi energy sites have reduced the kingdom oil production by about 600,000 barrels per day. Numerous sites were struck, including East-West pipeline pumping stations, Manifa and Khurais production plants, and refineries at Jubail, Ras Tanura, Yanbu and Riyadh.",mk:"이란의 공격으로 사우디의 석유 생산량이 일일 약 60만 배럴 축소됐다. 동서 송유관 펌프장, 마니파·쿠라이스 생산시설, 주바일·라스타누라·얀부·리야드 정유소 등 다수 시설이 피격됐다.",tg:["사우디","생산","전쟁"],u:"https://www.thenationalnews.com/business/energy/2026/04/09/saudi-output-capacity-cut-by-600000-barrels-a-day-due-to-iran-war/"},
  {id:379,p:8,r:"심층분석",t:"Saudi Oil Price Talks Take on Added Urgency as Deadline Nears",k:"마감 임박 속 사우디 유가 협상 긴박감 고조",s:"Bloomberg",c:"global",d:"2026-03-30",m:"Saudi Arabia oil price talks with Asian refiners have taken on added urgency as pricing deadlines near amid heightened regional volatility. Aramco is balancing customer demands, constrained supply, and unprecedented geopolitical premiums.",mk:"사우디의 유가 협상이 지역 변동성 고조 속에서 가격 결정 마감이 다가오며 긴박감이 커지고 있다. 아람코는 고객 수요, 제한된 공급, 전례 없는 지정학적 프리미엄 사이에서 균형을 맞추고 있다.",tg:["아람코","유가협상","아시아"],u:"https://www.bloomberg.com/news/articles/2026-03-30/saudi-oil-price-talks-take-on-added-urgency-as-deadline-nears"},
  {id:380,p:8,r:"심층분석",t:"$166 a Barrel? Middle East Oil Gives Clue to Where All Prices Could Be Headed if Iran War Drags On",k:"배럴당 166달러? 이란 전쟁 장기화 시 유가 전망",s:"CNBC",c:"global",d:"2026-03-19",m:"Analysts warned that if the Iran war drags on and shipping disruptions persist, Brent crude could climb toward $166 per barrel, with cascading effects on gasoline, freight rates and inflation. Middle East oil dynamics are flashing warning signals to global commodity markets.",mk:"애널리스트들은 이란 전쟁이 장기화되고 해운 차질이 지속되면 브렌트유가 배럴당 166달러까지 상승할 수 있다고 경고했다. 중동 원유 동향이 휘발유·해운운임·물가에 연쇄 충격을 줄 수 있다는 경고음이 커지고 있다.",tg:["유가전망","브렌트","인플레"],u:"https://www.cnbc.com/2026/03/19/166-a-barrel-middle-east-oil-gives-clue-to-where-all-prices-could-be-headed-if-iran-war-drags-on.html"},
  {id:381,p:9,r:"헤드라인",t:"Pakistan Military Force Including Fighter Jets Arrive in Saudi Arabia",k:"파키스탄 군, 전투기 포함 부대 사우디 도착",s:"Al Arabiya",c:"me",d:"2026-04-11",m:"A Pakistani military force, including fighter jets, arrived in Saudi Arabia as part of enhanced defense cooperation amid Iran aggression. Many commentators in Saudi Arabia praised the deployment as a sign of Muslim brotherhood and alliance solidarity.",mk:"이란 공세 속 방위협력 강화의 일환으로 전투기를 포함한 파키스탄 군 부대가 사우디에 도착했다. 사우디 내 여론은 이번 배치를 &apos;무슬림 형제애&apos;와 동맹 결속의 신호로 평가했다.",tg:["파키스탄","방위","동맹"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/11/pakistan-military-force-including-fighter-jets-arrive-in-saudi-arabia"},
  {id:382,p:7,r:"정책발표",t:"Saudi and Iran Foreign Ministers Discuss Latest Developments After Iran-US Islamabad Talks",k:"사우디-이란 외무장관, 이란-미국 이슬라마바드 회담 후 최신 상황 논의",s:"Al Arabiya",c:"me",d:"2026-04-13",m:"Saudi Foreign Minister Prince Faisal bin Farhan Al Saud and Iranian counterpart Abbas Araghchi discussed latest regional developments after Iran-US Islamabad talks. The dialogue aims to reduce tensions and restore stability in the Gulf region.",mk:"사우디 파이살 빈 파르한 외무장관과 이란 아바스 아라그치 외무장관이 이란-미국 이슬라마바드 회담 이후 역내 상황을 논의했다. 양국 대화는 걸프 지역의 긴장 완화와 안정 회복을 목표로 한다.",tg:["사우디","이란","외교"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/13/saudi-iran-foreign-ministers-discuss-latest-developments-post-iranus-islamabad-talks-"},
  {id:383,p:9,r:"헤드라인",t:"Korea Joins Hormuz Navigation Coalition Without the US",k:"한국, 미국 뺀 호르무즈 통항 연합 참여",s:"한국경제",c:"korean-view",d:"2026-04-16",m:"South Korea has joined a multinational Hormuz navigation coalition without the United States, aimed at ensuring safe passage for commercial tankers amid the ongoing Iran war. The move reflects Seoul energy security priorities and pragmatic diplomacy in navigating US-Iran tensions.",mk:"한국이 미국을 제외한 다국적 호르무즈 통항 연합에 참여했다. 이란 전쟁이 지속되는 가운데 상업용 유조선의 안전한 통과를 보장하기 위한 조치로, 에너지 안보 우선순위와 미·이란 긴장 속 실용 외교를 보여준다.",tg:["한국","호르무즈","에너지안보"],u:"https://www.hankyung.com/article/2026041664721"},
  {id:384,p:9,r:"주요경제",t:"Presidential Envoys Secure 273 Million Barrels of Crude Oil and 2.1 Million Tons of Naphtha",k:"대통령 특사단, 원유 2억7300만 배럴·나프타 210만 톤 확보",s:"서울경제",c:"korean-view",d:"2026-04-15",m:"The Blue House announced that presidential envoy Kang Hoon-sik secured 273 million barrels of crude oil and up to 2.1 million tons of naphtha by year-end, including 50 million barrels from Saudi Arabia loaded via Red Sea alternative ports in April-May, bypassing Hormuz risk.",mk:"청와대는 강훈식 대통령 특사가 연말까지 원유 2억7300만 배럴과 나프타 최대 210만 톤을 확보했다고 밝혔다. 여기에는 4~5월 홍해 대체 항만을 통해 선적될 사우디 원유 5000만 배럴이 포함돼 호르무즈 리스크 우회 의미가 크다.",tg:["한국","원유확보","호르무즈우회"],u:"https://www.sedaily.com/article/20032960"},
  {id:385,p:8,r:"주요경제",t:"Saudi and Kazakhstan Alternative Supply Lines Secured, Refining and Petrochemical Urgency Eases",k:"사우디·카자흐 등 대체 공급선 확보… 정유·석화 &apos;급한불&apos; 껐다",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-15",m:"Korea secured alternative crude oil and naphtha supply lines from Saudi Arabia, Oman, Qatar, and Kazakhstan, bypassing Strait of Hormuz risks. Kazakhstan offers a key non-Hormuz source, Oman is Indian Ocean-facing, and Saudi can ship via Red Sea terminals, diversifying Korea energy mix.",mk:"한국은 사우디·오만·카타르·카자흐스탄으로부터 호르무즈를 거치지 않는 원유·나프타 대체 공급선을 확보했다. 카자흐스탄은 비(非)호르무즈 주요 공급원, 오만은 인도양 연안, 사우디는 홍해 터미널을 통한 선적이 가능해 에너지 수입원이 다변화된다.",tg:["대체공급선","카자흐스탄","사우디"],u:"https://www.fnnews.com/news/202604151821382168"},
  {id:386,p:8,r:"주요경제",t:"Saudi Yanbu Port Loadings Rise to Offset 40% of Export Decline from Hormuz Blockade",k:"사우디, 홍해 얀부항 원유 선적 늘려…수출감소분 40% 상쇄",s:"한국경제",c:"korean-view",d:"2026-03-26",m:"Saudi Arabia has ramped up crude oil loadings at the Red Sea Yanbu terminal to approximately 4.4 million barrels per day, offsetting about 40 percent of the export decline caused by the Strait of Hormuz blockade. Cargoes departing Yanbu head mostly to Asian buyers including Korea, Pakistan, and Thailand.",mk:"사우디가 홍해 얀부 터미널에서 선적하는 원유량을 하루 평균 약 440만 배럴로 늘려 호르무즈 봉쇄로 인한 수출 감소분의 약 40%를 상쇄했다. 얀부항을 떠난 유조선은 대부분 중국·인도 등 아시아로 향하며 한국·파키스탄·태국행 화물도 포함됐다.",tg:["사우디","얀부","수출경로"],u:"https://www.hankyung.com/article/202603266989i"},
  {id:387,p:7,r:"심층분석",t:"Korean Tanker Completes First Successful Red Sea Bypass via Saudi Yanbu Port",k:"호르무즈 막히자 홍해로…韓 유조선 첫 우회 수송 성공",s:"서울경제",c:"korean-view",d:"2026-04-17",m:"Korea Ministry of Oceans and Fisheries announced that a Korean tanker loaded crude oil at Saudi Arabia Yanbu port and safely transited the Red Sea, marking the first successful Hormuz-bypass delivery to Korea. The Saudi Petroline pipeline has been pushed to its design maximum of 7 million b/d.",mk:"해양수산부는 사우디 얀부항에서 원유를 적재한 한국 선박이 홍해를 안전하게 통과했다고 밝혔다. 이는 호르무즈 봉쇄 이후 한국의 첫 우회 수송 성공 사례로, 사우디는 페트로라인을 설계 최대치인 하루 700만 배럴로 가동 중이다.",tg:["유조선","얀부","우회수송"],u:"https://www.sedaily.com/article/20033799"},
  {id:388,p:10,r:"헤드라인",t:"Pakistan&apos;s PM arrives in Jeddah for meeting with Saudi Arabia&apos;s Crown Prince",k:"파키스탄 총리, 사우디 왕세자 회담 위해 제다 도착",s:"Al Arabiya",c:"me",d:"2026-04-15",m:"Pakistani PM Shehbaz Sharif arrived in Jeddah on the first stop of a four-day diplomatic tour through Saudi Arabia, Qatar and Türkiye to build momentum for a second round of US-Iran negotiations in Pakistan. Saudi Arabia pledged $3 billion to Islamabad.",mk:"샤바즈 샤리프 파키스탄 총리가 사우디·카타르·튀르키예 4일간의 외교 순방 첫 기착지로 제다에 도착했다. 파키스탄에서 열릴 미-이란 제2차 협상 동력 확보가 목적이며, 사우디는 파키스탄에 30억 달러를 제공하기로 약속했다.",tg:["외교","파키스탄","MBS"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/15/pakistan-s-pm-arrives-in-jeddah-for-meeting-with-saudi-arabia-s-crown-prince"},
  {id:389,p:10,r:"헤드라인",t:"Strait of Hormuz should remain open, Chinese President Xi asserts in call with Saudi Crown Prince",k:"시진핑, 사우디 왕세자와 통화…호르무즈 해협 개방 유지 강조",s:"Saudi Gazette",c:"saudi",d:"2026-04-19",m:"Chinese President Xi Jinping stressed the importance of keeping the Strait of Hormuz open to navigation during a phone call with Crown Prince Mohammed bin Salman, amid escalating US-Iran tensions in the Gulf.",mk:"시진핑 중국 국가주석이 무함마드 빈 살만 왕세자와의 전화 통화에서 호르무즈 해협을 통항 개방 상태로 유지하는 것이 중요하다고 강조했다. 걸프 지역의 미-이란 긴장 고조 속 발표된 발언이다.",tg:["호르무즈","중국","외교"],u:"https://saudigazette.com.sa/article/660699/saudi-arabia/strait-of-hormuz-should-remain-open-asserts-chinese-president-xi-in-call-with-saudi-crown-prince"},
  {id:390,p:9,r:"정책발표",t:"Saudi FM joins Gaza ministerial talks at Antalya Diplomacy Forum",k:"사우디 외교장관, 안탈리아 외교포럼서 가자 각료회담 참가",s:"Saudi Gazette",c:"saudi",d:"2026-04-18",m:"Prince Faisal bin Farhan joined two ministerial meetings on Gaza at the Antalya Diplomacy Forum 2026, including a Group of Eight session with counterparts from Egypt, Jordan, Qatar, UAE and Türkiye to discuss humanitarian aid and a permanent ceasefire.",mk:"파이살 빈 파르한 외교장관이 안탈리아 외교포럼 2026에서 가자 관련 두 건의 각료회담에 참여했다. 이집트·요르단·카타르·UAE·튀르키예와의 G8 회의에서 인도적 지원 유입과 항구적 휴전 방안이 논의됐다.",tg:["외교","가자","안탈리아포럼"],u:"https://saudigazette.com.sa/article/660654/saudi-arabia/saudi-fm-joins-gaza-ministerial-talks-at-antalya-diplomacy-forum"},
  {id:391,p:7,r:"정책발표",t:"Saudi Arabia signs Expo Belgrade 2027 participation deal, moves into execution phase",k:"사우디, 2027 베오그라드 엑스포 참가계약 체결…실행 단계 진입",s:"Saudi Gazette",c:"saudi",d:"2026-04-19",m:"Saudi Arabia signed its participation contract for Expo Belgrade 2027 under the theme &apos;Play for Humanity: Sport and Music for All,&apos; marking a milestone in the Kingdom&apos;s transition to the full implementation phase of its pavilion development.",mk:"사우디가 &apos;인류를 위한 놀이: 모두를 위한 스포츠와 음악&apos;을 주제로 2027 베오그라드 엑스포 참가계약에 서명했다. 이는 사우디 파빌리온 조성의 본격 실행 단계 진입을 의미한다.",tg:["엑스포","문화","외교"],u:"https://saudigazette.com.sa/article/660692/saudi-arabia/saudi-arabia-signs-expo-belgrade-2027-participation-deal-moves-into-execution-phase"},
  {id:392,p:8,r:"정책발표",t:"60% Saudization in 20 marketing and sales professions begins as grace period ends",k:"마케팅·영업 20개 직종 60% 사우디화 시행…유예기간 종료",s:"Saudi Gazette",c:"saudi",d:"2026-04-18",m:"The Ministry of Human Resources implemented two decisions to raise Saudization rates in marketing and sales professions effective Sunday, April 19, as the grace period expired. The move is part of the Kingdom&apos;s labor market localization push.",mk:"인력사회개발부가 4월 19일자로 마케팅·영업 직종 사우디화율 상향 결정 2건을 시행했다. 유예기간이 종료되며 적용된 이번 조치는 왕국의 노동시장 자국민화 정책의 일환이다.",tg:["사우디화","노동","비전2030"],u:"https://saudigazette.com.sa/article/660664/saudi-arabia/60-saudization-in-20-marketing-and-sales-professions-begins-as-grace-period-comes-to-an-end"},
  {id:393,p:6,r:"심층분석",t:"Lower section of Kaaba&apos;s Kiswa raised in preparation for Hajj 2026",k:"2026 하지 대비 카바 키스와 하단부 인상 작업",s:"Saudi Gazette",c:"saudi",d:"2026-04-10",m:"The General Authority for the Care of the Affairs of the Grand Mosque completed the annual raising of the lower section of the Kaaba&apos;s Kiswa cover by three meters as part of preparations to receive pilgrims for the Hajj season of 2026.",mk:"성지 관리청이 2026 하지 시즌 순례객 맞이 준비의 일환으로 카바 성스러운 덮개(키스와)의 하단부를 3미터 끌어올리는 연례 작업을 완료했다.",tg:["하지","메카","종교"],u:"https://saudigazette.com.sa/article/660640/saudi-arabia/lower-section-of-kaabas-kiswa-raised-in-preparation-for-hajj-2026"},
  {id:394,p:10,r:"속보",t:"Operational activities halted at several energy facilities in the Kingdom due to recent attacks",k:"최근 공격으로 사우디 에너지 시설 가동 중단",s:"SPA",c:"saudi",d:"2026-04-09",m:"An official source at the Ministry of Energy said operational activities were halted at several oil, gas and electricity facilities in Riyadh, Eastern Province, and Yanbu following attacks. Production capacity was cut by approximately 600,000 bpd with one fatality and seven injured.",mk:"에너지부 공식 소식통에 따르면 리야드, 동부 지역, 얀부의 석유·가스·전력 시설들이 공격 이후 가동을 중단했다. 생산 능력이 약 일일 60만 배럴 감소했으며, 1명이 사망하고 7명이 부상했다.",tg:["에너지","이란전쟁","원유"],u:"https://spa.gov.sa/en/N2556681"},
  {id:395,p:8,r:"주요경제",t:"World Bank to Asharq Al-Awsat: Saudi Arabia plays central role in stabilizing energy markets",k:"세계은행 아샤르크알아우사트 인터뷰 &apos;사우디, 에너지 시장 안정에 중심 역할&apos;",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-15",m:"The World Bank told Asharq Al-Awsat that Saudi Arabia plays a central role in stabilizing global energy markets amid the Middle East crisis, citing the Kingdom&apos;s alternative export routes and spare production capacity as key stabilizers.",mk:"세계은행은 아샤르크알아우사트와의 인터뷰에서 사우디아라비아가 중동 위기 속에서 세계 에너지 시장 안정에 중심적 역할을 하고 있다고 평가했다. 대체 수출 경로와 여유 생산 능력이 핵심 안정화 요인으로 꼽혔다.",tg:["에너지","세계은행","원유"],u:"https://english.aawsat.com/business/5262644-world-bank-asharq-al-awsat-saudi-arabia-plays-central-role-stabilizing-energy"},
  {id:396,p:6,r:"심층분석",t:"Cisco to Asharq Al-Awsat: AI boosts wireless network value in Saudi Arabia",k:"시스코, 아샤르크알아우사트 &apos;사우디 무선망, AI로 가치 상승&apos;",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-18",m:"Cisco executives said in an interview that AI deployment is significantly boosting the value of wireless networks across Saudi Arabia, driving demand for higher-capacity infrastructure as enterprises integrate AI workloads.",mk:"시스코 경영진은 인터뷰에서 AI 도입이 사우디 무선 네트워크의 가치를 크게 끌어올리고 있으며, 기업들의 AI 워크로드 통합에 따라 고용량 인프라 수요가 급증하고 있다고 밝혔다.",tg:["AI","기술","통신"],u:"https://english.aawsat.com/technology/5263736-cisco-asharq-al-awsat-ai-boosts-wireless-network-value-saudi-arabia"},
  {id:397,p:7,r:"심층분석",t:"Riyad Capital sees Saudi economy up 4.3% in 2026",k:"리야드캐피탈 &apos;사우디 경제, 2026년 4.3% 성장 전망&apos;",s:"Argaam",c:"saudi",d:"2026-04-10",m:"Riyad Capital projected Saudi GDP growth at 4.3% in 2026, supported by balanced oil and non-oil expansion, narrowing fiscal and current account deficits, and easing inflation - a more optimistic view than the IMF&apos;s 3.1% forecast despite regional headwinds.",mk:"리야드캐피탈이 2026년 사우디 GDP 성장률을 4.3%로 전망했다. 석유·비석유 부문 균형 성장, 재정·경상수지 적자 축소, 물가 상승 둔화에 힘입은 전망으로, IMF의 3.1% 전망보다 낙관적이다.",tg:["GDP","경제전망","리야드캐피탈"],u:"https://www.argaam.com/en/article/articledetail/id/1883272"},
  {id:398,p:8,r:"주요경제",t:"Saudi Arabia approves 2026 budget with $306bn in projected revenues",k:"사우디, 2026년 예산 승인…세입 3,060억 달러 전망",s:"Arab News",c:"saudi",d:"2026-04-05",m:"The 2026 budget, approved by Crown Prince Mohammed bin Salman during a Cabinet meeting in Dammam, projects SR1.15 trillion ($306bn) in revenues, up 5.1% on the 2025 estimate, with total expenditure of SR1.31 trillion and real GDP growth of 4.6%.",mk:"담맘에서 열린 내각회의에서 무함마드 빈 살만 왕세자가 승인한 2026년 예산은 세입 1조1,500억 리얄(3,060억 달러)을 계획했다. 2025년 추정치 대비 5.1% 증가한 규모이며, 총지출 1조3,100억 리얄, 실질 GDP 성장률 4.6%를 제시했다.",tg:["예산","재정","GDP"],u:"https://www.arabnews.com/node/2624756/business-economy"},
  {id:399,p:6,r:"심층분석",t:"Holy Kaaba maintenance completed with highest global standards",k:"성 카바 유지보수 작업, 최고 국제기준 맞춰 완료",s:"Saudi Gazette",c:"saudi",d:"2026-04-10",m:"The General Authority for the Care of the Affairs of the Two Holy Mosques announced completion of routine maintenance of the Holy Kaaba and Hijr Ismail using the highest engineering and technical standards ahead of Hajj 2026.",mk:"두 성지 관리청이 2026 하지를 앞두고 최고 공학·기술 기준으로 성 카바와 히즈르 이스마일의 정기 유지보수를 완료했다고 발표했다.",tg:["하지","메카","종교"],u:"https://saudigazette.com.sa/article/660647/saudi-arabia/holy-kaaba-maintenance-completed-with-highest-global-standards"},
  {id:400,p:7,r:"심층분석",t:"Dust storm hits Jeddah and other governorates of Makkah",k:"제다 등 메카주 전역에 모래폭풍",s:"Saudi Gazette",c:"saudi",d:"2026-04-10",m:"A dust storm swept across Jeddah and other governorates in Makkah Province, reducing visibility and prompting advisories from civil defense authorities, amid an unstable weather pattern across western Saudi Arabia.",mk:"모래폭풍이 제다 및 메카주 여러 지역을 덮쳐 가시거리가 크게 떨어졌다. 민방위 당국은 주의를 당부했으며, 사우디 서부 지역에 불안정한 기상 상태가 이어지고 있다.",tg:["기상","메카"],u:"https://saudigazette.com.sa/article/660649/saudi-arabia/dust-storm-hits-jeddah-and-other-governorates-of-makkah"},
  {id:401,p:8,r:"주요경제",t:"World Bank slashes 2026 Middle East growth forecast, Saudi Arabia absorbs shock",k:"세계은행, 2026 중동 성장 전망 대폭 하향…사우디는 충격 흡수",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-14",m:"The World Bank sharply cut its 2026 growth forecast for the Middle East and North Africa due to the Iran war, but noted Saudi Arabia is among the least impacted economies owing to diversification and alternative export routes through the Red Sea.",mk:"세계은행이 이란 전쟁 여파로 2026년 중동·북아프리카 성장 전망을 큰 폭으로 하향 조정했으나, 사우디는 경제 다각화와 홍해 우회 수출 경로 덕분에 가장 적게 영향을 받는 국가 중 하나로 꼽혔다.",tg:["세계은행","GDP","중동경제"],u:"https://english.aawsat.com/business/5260381-world-bank-slashes-2026-middle-east-growth-forecast-saudi-arabia-absorbs-shock"},
  {id:402,p:7,r:"심층분석",t:"Saudi market well positioned for strong performance in 2026: SNB Capital",k:"SNB캐피탈 &apos;사우디 증시, 2026년 강한 성과 기대&apos;",s:"Argaam",c:"saudi",d:"2026-04-10",m:"SNB Capital said the Saudi stock market is well positioned for strong performance in 2026 despite regional headwinds, citing resilient corporate earnings, PIF-led reforms, and the expanded foreign investor base following QFI regime changes.",mk:"SNB캐피탈은 지역 리스크에도 불구하고 사우디 증시가 2026년 견조한 실적, PIF 주도 개혁, QFI 제도 개편에 따른 외국인 투자자 기반 확대에 힘입어 강한 성과를 낼 수 있는 여건을 갖췄다고 분석했다.",tg:["TASI","증시","PIF"],u:"https://www.argaam.com/en/article/articledetail/id/1872101"},
  {id:403,p:9,r:"헤드라인",t:"Trump sends mixed signals on Iran talks as ceasefire deadline nears",k:"트럼프, 휴전 시한 임박 속 이란 협상에 엇갈린 신호",s:"The National",c:"gulf",d:"2026-04-20",m:"As the two-week US-Iran ceasefire approaches expiration Wednesday, President Trump called an extension &apos;highly unlikely&apos; while Iran said no decision has been made on attending a second round of peace talks in Pakistan.",mk:"2주간의 미-이란 휴전 종료가 수요일로 다가온 가운데, 트럼프 대통령은 연장 가능성을 &apos;매우 낮다&apos;고 평가했고 이란은 파키스탄에서 열릴 제2차 평화회담 참석 여부가 아직 결정되지 않았다고 밝혔다.",tg:["미-이란","휴전","트럼프"],u:"https://www.thenationalnews.com/news/us/2026/04/20/trump-sends-mixed-signals-on-iran-talks-as-ceasefire-deadline-nears/"},
  {id:404,p:7,r:"일반뉴스",t:"School bus services to resume in Dubai, Sharjah, Ajman starting April 20",k:"두바이·샤르자·아즈만, 4월 20일부터 스쿨버스 서비스 재개",s:"Khaleej Times",c:"gulf",d:"2026-04-19",m:"Yellow school buses returned to roads in Dubai, Sharjah and Ajman on April 20 as education authorities resumed transport alongside students&apos; return to in-person classes following the ceasefire between the US-Israel and Iran.",mk:"미-이스라엘과 이란 간 휴전 이후 학생들의 대면 수업 복귀에 맞춰 4월 20일부터 두바이·샤르자·아즈만에서 노란색 스쿨버스 운행이 재개됐다.",tg:["UAE","교육","일상복귀"],u:"https://www.khaleejtimes.com/uae/education/school-bus-services-resumption-sharjah-ajman-april-20-2026"},
  {id:405,p:6,r:"일반뉴스",t:"Parades, early lines as Dubai&apos;s Global Village reopens doors to public after closure",k:"두바이 글로벌 빌리지, 휴장 뒤 재개장…퍼레이드·이른 대기행렬",s:"Khaleej Times",c:"gulf",d:"2026-04-15",m:"Global Village reopened after a closure of more than 1.5 months due to regional tensions from the US-Israel-Iran war. The 30th edition features 30 pavilions representing over 90 cultures with 3,500+ shops and 250+ dining options.",mk:"미-이스라엘-이란 전쟁으로 인한 지역 긴장으로 1개월 반 이상 휴장했던 글로벌 빌리지가 재개장했다. 30주년 기념 시즌에는 30개 파빌리온이 90여 개국 문화를 선보이며 3,500여 상점과 250여 식음료 매장이 운영된다.",tg:["UAE","관광"],u:"https://www.khaleejtimes.com/uae/dubai-global-village-reopens-temporary-closure-2026"},
  {id:406,p:7,r:"주요경제",t:"UAE petrol, diesel prices for April 2026 announced",k:"UAE, 2026년 4월 휘발유·경유 가격 발표",s:"Khaleej Times",c:"gulf",d:"2026-04-01",m:"Super 98 petrol rose to Dh3.39 a litre for April 2026 from Dh2.59 in March, while Special 95 climbed to Dh3.28 from Dh2.48, reflecting the spike in global oil prices tied to the Middle East crisis.",mk:"UAE의 4월 수퍼98 휘발유는 3월 2.59디르함에서 3.39디르함으로, 스페셜95는 2.48디르함에서 3.28디르함으로 인상됐다. 중동 위기로 인한 국제 유가 급등이 반영됐다.",tg:["UAE","유가"],u:"https://www.khaleejtimes.com/business/energy/uae-petrol-diesel-prices-april-2026"},
  {id:407,p:6,r:"일반뉴스",t:"UAE weather tomorrow: Chance of rainfall; temperatures to decrease in some areas",k:"UAE 내일 날씨…일부 지역 강우 가능, 기온 하락",s:"Khaleej Times",c:"gulf",d:"2026-04-20",m:"UAE weather for April 21 was forecast partly cloudy to cloudy and dusty at times, with highs of 35C in Dubai, 36C in Abu Dhabi, and 34C in Sharjah, with chance of light rainfall over parts of the country.",mk:"UAE의 4월 21일 날씨는 부분 구름 또는 흐림, 때때로 먼지 바람이 전망됐으며 두바이 35도, 아부다비 36도, 샤르자 34도로 예보됐다. 일부 지역에 가벼운 강우 가능성도 보고됐다.",tg:["UAE","기상"],u:"https://www.khaleejtimes.com/uae/weather/april-21-2026"},
  {id:408,p:10,r:"헤드라인",t:"Saudi Arabia approves PIF&apos;s 2026-2030 strategy",k:"사우디, PIF 2026-2030 전략 승인",s:"Al Arabiya",c:"me",d:"2026-04-15",m:"The PIF Board of Directors, chaired by Crown Prince Mohammed bin Salman, approved the fund&apos;s 2026-2030 strategy focusing on competitive domestic ecosystems, AI infrastructure, and long-term returns as the Kingdom recalibrates Vision 2030.",mk:"무함마드 빈 살만 왕세자가 의장인 PIF 이사회가 2026-2030년 전략을 승인했다. 국내 경쟁력 있는 생태계 구축, AI 인프라, 장기 수익에 초점을 맞춘 전략으로, 왕국이 비전2030을 재조정하는 수순이다.",tg:["PIF","비전2030","AI"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/15/saudi-arabia-approves-pif-s-20262030-strategy-"},
  {id:409,p:9,r:"속보",t:"Iran war: What is happening on day 51 of the US-Iran conflict?",k:"이란 전쟁 51일차…미-이란 분쟁 현 상황은",s:"Al Jazeera",c:"me",d:"2026-04-19",m:"On day 51 of the US-Iran war, tensions surged after the US seized an Iranian-flagged ship in the Gulf of Oman and Iranian forces fired at a tanker in the Strait of Hormuz, threatening the fragile two-week ceasefire.",mk:"미-이란 전쟁 51일차, 미국이 오만만에서 이란 국적 선박을 나포하고 이란군이 호르무즈 해협을 지나던 유조선에 발포하면서 2주간의 취약한 휴전이 위협받고 있다.",tg:["이란전쟁","호르무즈","미-이란"],u:"https://www.aljazeera.com/news/2026/4/19/iran-war-what-is-happening-on-day-51-of-the-us-iran-conflict"},
  {id:410,p:9,r:"속보",t:"Iran foreign minister says Strait of Hormuz &apos;completely open&apos;",k:"이란 외교장관 &apos;호르무즈 해협 완전 개방&apos;",s:"Al Jazeera",c:"me",d:"2026-04-17",m:"Iran&apos;s foreign minister declared the Strait of Hormuz &apos;completely open&apos; to commercial traffic, sending crude prices tumbling more than 10%, though maritime analysts said the strait remained effectively closed as ships continued to turn away.",mk:"이란 외교장관이 호르무즈 해협이 상업 통항에 완전 개방됐다고 선언하며 원유 가격이 10% 이상 급락했다. 다만 해운 분석가들은 선박들이 계속 회항하며 해협이 사실상 여전히 닫힌 상태라고 지적했다.",tg:["호르무즈","원유"],u:"https://www.aljazeera.com/news/2026/4/17/iran-foreign-minister-says-strait-of-hormuz-completely-open"},
  {id:411,p:9,r:"헤드라인",t:"Iran, US still &apos;far&apos; from breakthrough amid Strait of Hormuz impasse",k:"이란·미국, 호르무즈 교착 속 &apos;돌파구 여전히 멀다&apos;",s:"Al Jazeera",c:"me",d:"2026-04-19",m:"Iran&apos;s parliament speaker and chief negotiator Mohammad Bagher Ghalibaf said progress had been made with the US but &apos;many gaps and some fundamental points remain,&apos; signaling a final deal remains distant despite a two-week ceasefire.",mk:"모함마드 바게르 갈리바프 이란 의회 의장 겸 수석협상대표는 미국과의 협상에서 진전이 있었으나 &apos;많은 격차와 일부 근본적 쟁점이 남아 있다&apos;며, 2주 휴전에도 최종 합의는 여전히 멀다고 시사했다.",tg:["미-이란","호르무즈","협상"],u:"https://www.aljazeera.com/news/2026/4/19/iran-us-still-far-from-breakthrough-in-strait-of-hormuz-impasse"},
  {id:412,p:8,r:"심층분석",t:"GCC, other Middle East nations react to Iran-US ceasefire announcement",k:"GCC 등 중동 국가들, 미-이란 휴전 발표에 반응",s:"Al Jazeera",c:"me",d:"2026-04-08",m:"GCC and other Middle East nations welcomed the two-week ceasefire between the US and Iran, urging its extension into a permanent settlement and calling for reopening the Strait of Hormuz to normalize energy flows.",mk:"GCC 회원국과 중동 국가들이 2주간의 미-이란 휴전 발표를 환영하며 항구적 합의로의 연장을 촉구했다. 에너지 흐름 정상화를 위해 호르무즈 해협 재개방을 요구하는 목소리도 이어졌다.",tg:["GCC","휴전","미-이란"],u:"https://www.aljazeera.com/news/2026/4/8/gulf-arab-nations-react-to-iran-us-ceasefire-announcement"},
  {id:413,p:8,r:"헤드라인",t:"PIF&apos;s Al-Rumayyan says no NEOM projects cancelled, spending priorities reassessed",k:"PIF 알루마얀 &apos;네옴 프로젝트 취소 없어, 지출 우선순위 재평가&apos;",s:"Al Arabiya",c:"me",d:"2026-04-15",m:"PIF Governor Yasir Al-Rumayyan said no NEOM projects have been cancelled, but spending has been reprioritized. He stressed that The Line does not need to be finished by 2030, with Expo 2030 and World Cup 2034 on the critical path instead.",mk:"야시르 알루마얀 PIF 총재는 네옴 프로젝트 중 취소된 것은 없으나 지출 우선순위가 재조정됐다고 밝혔다. &apos;더 라인&apos;은 2030년까지 완공될 필요가 없으며, 엑스포2030과 월드컵2034가 핵심 일정이라고 강조했다.",tg:["네옴","PIF","비전2030"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/15/pif-s-alrumayyan-says-no-neom-projects-cancelled-spending-priorities-reassessed"},
  {id:414,p:7,r:"심층분석",t:"Live Updates: Latest from Israel, Iran, and the Middle East",k:"이스라엘·이란·중동 최신 동향 라이브",s:"Jerusalem Post",c:"me",d:"2026-04-05",m:"The Jerusalem Post liveblog covered continued Iranian missile barrages on Israel, Israeli strikes on Iranian air defenses and petrochemical facilities in Mahshahr, and diplomatic maneuvers during the early-April escalation.",mk:"예루살렘 포스트 라이브블로그는 이란의 대이스라엘 미사일 공세 지속, IDF의 이란 방공망·마샤르 석유화학 시설 타격, 4월 초 긴장 고조 속 외교적 움직임을 전했다.",tg:["이스라엘","이란전쟁","미사일"],u:"https://www.jpost.com/middle-east/iran-news/2026-04-05/live-updates-892049"},
  {id:415,p:7,r:"일반뉴스",t:"April 20: US reportedly plans to ask Lebanon to repeal law forbidding contact with Israeli citizens",k:"4월 20일 &apos;미, 레바논에 이스라엘인 접촉 금지법 폐지 요청 계획&apos;",s:"Times of Israel",c:"me",d:"2026-04-20",m:"Times of Israel liveblog for April 20 reported that Washington plans to ask Lebanon to repeal its law forbidding contact with Israeli citizens, as part of broader regional normalization pressures following the Lebanon ceasefire.",mk:"타임스오브이스라엘 4월 20일자 라이브블로그는 미국이 레바논에 이스라엘 시민과의 접촉을 금지하는 법률 폐지를 요청할 계획이라고 전했다. 레바논 휴전 이후 지역 정상화 압력의 일환으로 해석됐다.",tg:["이스라엘","레바논","미국"],u:"https://www.timesofisrael.com/liveblog-april-20-2026/"},
  {id:416,p:10,r:"헤드라인",t:"Saudi Arabia Lifts Oil Price to Record Premium as Strait of Hormuz Narrows",k:"사우디, 호르무즈 좁아지자 원유 가격 사상 최대 프리미엄으로 인상",s:"Bloomberg",c:"global",d:"2026-04-06",m:"Saudi Aramco raised its flagship Arab Light crude to a $19.50 premium over regional benchmarks for Asian refiners, the highest on record, as the effective closure of the Strait of Hormuz upended global energy markets.",mk:"사우디 아람코가 아시아 정유사용 대표 유종 아랍라이트 원유 가격을 역대 최고인 지역 벤치마크 대비 배럴당 19.5달러 프리미엄으로 인상했다. 호르무즈 해협의 사실상 봉쇄가 글로벌 에너지 시장을 뒤흔든 결과다.",tg:["원유","아람코","호르무즈"],u:"https://www.bloomberg.com/news/articles/2026-04-06/saudis-raise-oil-price-to-record-premium-as-war-riles-markets"},
  {id:417,p:9,r:"속보",t:"Video shows ships turning away from Strait of Hormuz as confusion persists over whether sea lane is really open",k:"호르무즈 통항 개방 여부 혼선…선박들 회항 영상 공개",s:"CNBC",c:"global",d:"2026-04-17",m:"Despite Iran&apos;s declaration that the Strait of Hormuz is fully open, CNBC reported video evidence of ships turning away from the strait, with maritime analysts saying the chokepoint remains effectively closed amid conflicting signals.",mk:"이란이 호르무즈 해협을 완전 개방했다고 선언했음에도 CNBC는 선박들이 해협에서 회항하는 영상 증거를 보도했다. 해운 분석가들은 상충되는 신호 속에 요충지가 사실상 여전히 폐쇄 상태라고 평가했다.",tg:["호르무즈","해운","원유"],u:"https://www.cnbc.com/2026/04/17/iran-trump-strait-hormuz-oil-tanker-traffic.html"},
  {id:418,p:8,r:"속보",t:"U.S. Navy blockade of Iran enters fourth day. Here&apos;s the latest tanker traffic in Strait of Hormuz",k:"미 해군 대이란 봉쇄 4일차…호르무즈 유조선 통항 현황",s:"CNBC",c:"global",d:"2026-04-16",m:"CNBC&apos;s tracking shows tanker traffic in the Strait of Hormuz remains sharply depressed on day four of the US Navy blockade of Iran, with most vessels choosing to wait outside the chokepoint amid security risks.",mk:"CNBC의 추적 결과, 미 해군의 대이란 봉쇄 4일차에 호르무즈 해협 유조선 통항이 급감한 상태로 나타났다. 대부분의 선박이 안보 위험을 우려해 요충지 바깥에서 대기 중이다.",tg:["호르무즈","미 해군","유조선"],u:"https://www.cnbc.com/2026/04/16/iran-oil-tanker-traffic-strait-hormuz.html"},
  {id:419,p:9,r:"속보",t:"Strait of Hormuz ship traffic briefly rose and then slowed after weekend attacks",k:"호르무즈 선박 통항, 주말 공격 후 일시 증가 뒤 다시 둔화",s:"CNBC",c:"global",d:"2026-04-20",m:"Ship traffic through the Strait of Hormuz briefly ticked up but slowed again after weekend attacks, including Iranian fire on a tanker and the US seizure of an Iranian cargo ship in the Gulf of Oman, raising fresh disruption fears.",mk:"호르무즈 해협의 선박 통항은 일시적으로 증가했다가, 이란의 유조선 발포와 미국의 오만만 이란 화물선 나포 등 주말 공격 이후 다시 둔화됐다. 새로운 물류 교란 우려가 커지고 있다.",tg:["호르무즈","해운"],u:"https://www.cnbc.com/2026/04/20/strait-hormuz-ship-tanker-oil-iran-war.html"},
  {id:420,p:10,r:"속보",t:"Oil prices jump after Iran and U.S. attack commercial ships as tensions escalate over Strait of Hormuz",k:"이란·미국 상선 공격에 유가 급등…호르무즈 긴장 고조",s:"CNBC",c:"global",d:"2026-04-19",m:"WTI futures jumped more than 6% to $89 per barrel and Brent climbed 5.6% to $95.50 after Iran&apos;s IRGC fired on a tanker in the Strait and a US Navy destroyer disabled an Iranian-flagged cargo ship in the Gulf of Oman.",mk:"WTI 선물은 6% 이상 오른 배럴당 89달러, 브렌트는 5.6% 오른 95.50달러로 급등했다. 이란 혁명수비대가 호르무즈 해협의 유조선에 발포하고, 미 해군 구축함이 오만만에서 이란 국적 화물선을 제압한 뒤 나타난 움직임이다.",tg:["원유","WTI","브렌트","호르무즈"],u:"https://www.cnbc.com/2026/04/19/oil-price-iran-war-strait-hormuz-tanker.html"},
  {id:421,p:9,r:"헤드라인",t:"Resumption of hostilities: Seized ship, vessel attacks push U.S.-Iran ceasefire toward brink",k:"적대행위 재개…선박 나포·공격에 미-이란 휴전 벼랑 끝",s:"CNBC",c:"global",d:"2026-04-20",m:"The US-Iran ceasefire is approaching breaking point after the US seized an Iranian ship and Iran fired on vessels in the Strait of Hormuz, analysts say, with both sides signaling willingness to walk away from the two-week truce.",mk:"미국의 이란 선박 나포와 이란의 호르무즈 해협 선박 발포 이후 미-이란 휴전이 붕괴 직전에 몰렸다고 분석가들은 평가한다. 양측 모두 2주 휴전 파기 의사를 시사하고 있는 상황이다.",tg:["미-이란","휴전","호르무즈"],u:"https://www.cnbc.com/2026/04/20/us-iran-war-middle-east-conflict-peace-deal-strait-hormuz-shipping-ceasefire-tensions.html"},
  {id:422,p:8,r:"주요경제",t:"Middle East oil production plunges due to Iran war, OPEC data shows",k:"OPEC 자료 &apos;이란 전쟁에 중동 원유 생산 급락&apos;",s:"CNBC",c:"global",d:"2026-04-13",m:"OPEC data shows Middle East oil production plunged due to the Iran war, with Saudi output dropping from 10.1 million bpd to 7.8 million bpd, a 23% decline, as the conflict disrupted export infrastructure and maritime routes.",mk:"OPEC 자료에 따르면 이란 전쟁 여파로 중동 원유 생산이 급감했으며, 사우디 생산량은 일일 1,010만 배럴에서 780만 배럴로 23% 감소했다. 수출 인프라와 해상 운송로 교란이 원인으로 분석됐다.",tg:["OPEC","원유생산","사우디"],u:"https://www.cnbc.com/2026/04/13/iran-war-oil-opec-production-decline.html"},
  {id:423,p:9,r:"속보",t:"Day 52 of Middle East conflict - Trump says extension of ceasefire with Iran is &apos;highly unlikely&apos;",k:"중동 분쟁 52일차…트럼프 &apos;이란 휴전 연장 매우 어려워&apos;",s:"CNN",c:"global",d:"2026-04-20",m:"President Trump said on day 52 of the conflict that extending the two-week Iran ceasefire, set to expire Wednesday, is &apos;highly unlikely,&apos; as Iran threatened retaliation over the US seizure of one of its ships.",mk:"분쟁 52일차, 트럼프 대통령은 수요일 만료되는 2주간의 이란 휴전 연장 가능성을 &apos;매우 낮다&apos;고 평가했다. 이란은 자국 선박 나포에 대한 보복을 경고했다.",tg:["미-이란","휴전","트럼프"],u:"https://edition.cnn.com/2026/04/20/world/live-news/iran-war-us-trump-israel"},
  {id:424,p:9,r:"속보",t:"Live updates: Tehran vows retaliation after US seizes Iran-flagged vessel defying blockade",k:"테헤란 &apos;미국의 이란 국적선 나포에 보복&apos; 라이브",s:"CNN",c:"global",d:"2026-04-19",m:"Iran vowed retaliation after US forces seized an Iranian-flagged cargo ship in the Gulf of Oman defying the US blockade, escalating the confrontation and pushing the two-week US-Iran ceasefire closer to collapse.",mk:"이란은 미군이 대이란 봉쇄 속에서 오만만의 이란 국적 화물선을 나포한 데 대해 보복을 다짐했다. 양측 대치가 격화되며 2주 미-이란 휴전의 붕괴 위험이 한층 커졌다.",tg:["미-이란","호르무즈","나포"],u:"https://www.cnn.com/2026/04/19/world/live-news/iran-war-us-trump-hormuz"},
  {id:425,p:8,r:"주요경제",t:"Paramount Skydance Secures $24 Billion From Saudi Arabia, Qatar and Abu Dhabi Funds for Warner Bros. Deal",k:"파라마운트 스카이댄스, 사우디·카타르·아부다비 펀드서 240억달러 확보…워너브러더스 인수",s:"Variety",c:"global",d:"2026-04-15",m:"Paramount Skydance secured about $24 billion from Middle East sovereign funds - $10 billion from Saudi Arabia&apos;s PIF plus commitments from Qatar and Abu Dhabi funds - to finance the acquisition of Warner Bros. Discovery.",mk:"파라마운트 스카이댄스가 사우디 PIF 100억 달러를 포함해 카타르·아부다비 국부펀드로부터 약 240억 달러를 확보해 워너브러더스 디스커버리 인수 자금을 마련했다.",tg:["PIF","M&A","미디어"],u:"https://variety.com/2026/tv/news/paramount-skydance-funding-saudi-arabia-qatar-abu-dhabi-funds-warner-bros-deal-1236709251/"},
  {id:426,p:7,r:"심층분석",t:"Public Investment Fund Sticks to Overseas Deals as Regional Tensions Rise",k:"PIF, 역내 긴장 속에도 해외 투자 기조 유지",s:"Bloomberg",c:"global",d:"2026-03-26",m:"Saudi Arabia&apos;s Public Investment Fund is sticking with its global investment strategy despite the Iran war and mounting regional tensions, with commitments to continue overseas deals across private credit, entertainment and sports.",mk:"사우디 공공투자펀드(PIF)는 이란 전쟁과 역내 긴장 고조에도 글로벌 투자 전략을 고수하고 있다. 사모대출·엔터테인먼트·스포츠 전반에 걸친 해외 거래를 지속하겠다는 방침이다.",tg:["PIF","투자","사우디"],u:"https://www.bloomberg.com/news/articles/2026-03-26/saudi-wealth-fund-commits-to-global-investments-despite-iran-war"},
  {id:427,p:9,r:"헤드라인",t:"Envoy Kang Hun-sik visits Saudi, Oman, Kazakhstan to secure &apos;even a single barrel&apos; of oil",k:"강훈식, 사우디·오만·카자흐 &apos;원유 특사&apos;…&apos;단 1배럴이라도 확보&apos;",s:"서울경제",c:"korean-view",d:"2026-04-14",m:"Chief of Staff Kang Hun-sik led a presidential special envoy to Kazakhstan, Oman, Saudi Arabia and Qatar for a week, securing 273 million barrels of crude to be delivered through year-end. Saudi Arabia pledged to prioritize Korea.",mk:"강훈식 대통령비서실장이 이끄는 대통령 특사단이 일주일간 카자흐스탄·오만·사우디·카타르 4개국을 순방, 연말까지 인도될 원유 2억 7,300만 배럴을 확보했다. 사우디는 한국 우선 공급을 약속했다.",tg:["원유","한국","특사단","사우디"],u:"https://www.sedaily.com/article/20029609"},
  {id:428,p:9,r:"주요경제",t:"Saudi, Pakistan and four nations push for war-ending mediation talks",k:"사우디·파키스탄 등 4개국, 종전 중재 회담 추진",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-15",m:"Saudi Arabia, Pakistan, Egypt and Türkiye foreign ministers plan to convene at the Antalya Diplomacy Forum on April 17-19 to discuss ending the US-Iran war, pairing Strait of Hormuz reopening with a ceasefire package.",mk:"사우디·파키스탄·이집트·튀르키예 외교장관이 4월 17-19일 안탈리아 외교포럼을 계기로 미-이란 전쟁 종식 논의를 위한 별도 회담을 갖는다. 호르무즈 해협 재개방과 휴전을 하나의 패키지로 묶는 방안이 논의될 예정이다.",tg:["미-이란","중재","호르무즈"],u:"https://www.fnnews.com/news/202604150618132188"},
  {id:429,p:9,r:"헤드라인",t:"&apos;Even the Red Sea is being sealed&apos;…Saudi begs Trump to &apos;end Iran blockade&apos;",k:"&apos;홍해 눈물의 문까지 닫힌다&apos; 사우디, 트럼프에 &apos;이란 봉쇄 중단&apos; 간청",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-14",m:"Saudi Arabia publicly urged President Trump to lift the Iran naval blockade, warning that pro-Iran Houthi forces in Yemen could close the Bab-el-Mandeb alongside continued Hormuz disruption, further strangling Saudi oil exports.",mk:"사우디아라비아가 트럼프 대통령에게 이란 해상 봉쇄 해제를 공개적으로 촉구했다. 친이란 예멘 후티 세력이 호르무즈 해협 차질에 더해 바브엘만데브 해협까지 봉쇄할 수 있다는 경고도 함께 제기됐다.",tg:["호르무즈","홍해","사우디"],u:"https://www.fnnews.com/news/202604141118103641"},
  {id:430,p:8,r:"주요경제",t:"Middle East ambassadors visit National Assembly: &apos;Top-priority oil supply to Korea&apos;",k:"국회 찾은 중동 대사들 &apos;韓에 원유 최우선 공급 노력&apos;",s:"서울경제",c:"korean-view",d:"2026-04-14",m:"Ambassadors of seven Middle East nations including Saudi Arabia and UAE visited the National Assembly and pledged to prioritize crude oil supplies to Korea, amid growing Korean concerns over shipment stability from Hormuz disruptions.",mk:"사우디아라비아·UAE 등 중동 7개국 대사들이 국회를 방문해 한국에 대한 원유 최우선 공급에 노력하겠다고 약속했다. 호르무즈 해협 차질에 따른 수송 안정성 우려가 커지는 가운데 나온 발언이다.",tg:["원유","외교","중동대사"],u:"https://www.sedaily.com/article/20029857"},
  {id:431,p:8,r:"주요경제",t:"Saudi Petroline at full throttle…Hormuz bypass pipeline race intensifies",k:"사우디 페트로라인 풀가동…호르무즈 우회 송유관 쟁탈전 본격화",s:"서울경제",c:"korean-view",d:"2026-04-10",m:"Saudi Arabia&apos;s East-West Petroline is running at full capacity as Hormuz Strait shipments stall, intensifying competition among Gulf exporters for alternative pipeline routes through the Red Sea to sustain global oil supply.",mk:"호르무즈 해협 통항이 막히면서 사우디 동-서 페트로라인이 최대 가동률로 운영되고 있다. 걸프 산유국들 사이에서는 홍해를 통한 대체 송유관 확보 경쟁이 본격화되고 있다.",tg:["페트로라인","원유","홍해"],u:"https://www.sedaily.com/article/20028242"},
