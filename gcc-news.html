  {id:1669,p:7,r:"심층분석",t:"Saudi market well positioned for strong performance in 2026: SNB Capital",k:"SNB 캐피털: 사우디 증시, 2026년 강한 성과 기대",s:"Argaam",c:"saudi",d:"2026-04-25",m:"SNB Capital said the Saudi market has potential for strong performance in 2026, supported by renewed correlation with global markets, ample liquidity, oil prices, third-phase Vision 2030 implementation and attractive valuations.",mk:"SNB 캐피털은 사우디 증시가 2026년 강한 성과를 낼 잠재력이 있다고 평가했다. 글로벌 시장과의 동조 회복, 풍부한 유동성, 유가, 비전2030 3단계 이행, 매력적인 밸류에이션이 근거다.",tg:["증시","TASI","비전2030"],u:"https://www.argaam.com/en/article/articledetail/id/1872101"},
  {id:1670,p:7,r:"심층분석",t:"Azour: Saudi Arabia has strong financial buffers to confront war impact",k:"아주르: 사우디아라비아, 전쟁 충격에 맞설 강력한 재정 완충장치 보유",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-28",m:"IMF Middle East director Jihad Azour told Asharq Al-Awsat that Saudi Arabia possesses strong financial buffers to absorb the impact of the Iran war, with growth projected at about 3.1% for the year supported by alternative oil pipelines.",mk:"지하드 아주르 IMF 중동담당 국장이 아샤르크 알아우사트에 사우디는 이란 전쟁 충격을 흡수할 강력한 재정 완충장치를 갖추고 있다며, 대체 송유관에 힘입어 연간 약 3.1% 성장을 전망했다.",tg:["IMF","경제전망","재정"],u:"https://english.aawsat.com/business/5265063-azour-asharq-al-awsat-saudi-arabia-has-strong-financial-buffers-confront-war"},
  {id:1671,p:6,r:"심층분석",t:"Alawwal Capital sets 11 Saudi top picks in 2026",k:"알아우왈 캐피털, 2026년 사우디 톱픽 11종목 선정",s:"Argaam",c:"saudi",d:"2026-04-22",m:"Alawwal Capital identified 11 top picks for 2026 in the Saudi market, including names across IT, tourism, healthcare and consumer sectors expected to outperform amid Vision 2030 third-phase momentum.",mk:"알아우왈 캐피털은 비전2030 3단계 모멘텀 가운데 IT, 관광, 헬스케어, 소비재 등에서 아웃퍼폼 기대 종목을 포함한 2026년 사우디 톱픽 11종목을 선정했다.",tg:["증시","TASI","톱픽"],u:"https://www.argaam.com/en/article/articledetail/id/1874386"},
  {id:1672,p:7,r:"속보",t:"Dubai Airports to scale up operations as UAE airspace restrictions lifted",k:"두바이 공항, UAE 공역 제한 해제로 운영 확대",s:"Khaleej Times",c:"gulf",d:"2026-05-02",m:"Dubai Airports entered the next phase of recovery operations after the UAE lifted all precautionary airspace restrictions on May 2. Daily flight movements are ramping up as airlines progressively restore schedules.",mk:"두바이 공항이 UAE가 5월 2일 모든 공역 예방 제한을 해제함에 따라 회복 운영 다음 단계에 진입했다. 항공사들이 점진적으로 스케줄을 복원하면서 일일 운항편이 증가하고 있다.",tg:["두바이","공역","항공"],u:"https://www.khaleejtimes.com/business/aviation/dubai-airports-scale-operations-increase-flights-uae-airspace-reopens"},
  {id:1673,p:7,r:"속보",t:"Middle East flight updates: British Airways plans phased return to Dubai and Doha",k:"중동 항공편 업데이트: 영국항공, 두바이·도하 단계적 운항 재개 계획",s:"The National",c:"gulf",d:"2026-05-04",m:"Middle East flight updates show British Airways planning a phased return to Dubai and Doha as airspace restrictions ease. Several airlines are restoring schedules amid cautious normalization after the April ceasefire.",mk:"영국항공이 공역 제한 완화에 따라 두바이와 도하 운항 단계적 재개를 계획 중이라고 중동 항공편 업데이트가 전했다. 4월 휴전 이후 신중한 정상화 속에서 여러 항공사가 스케줄을 복원하고 있다.",tg:["항공","두바이","도하"],u:"https://www.thenationalnews.com/travel/2026/05/04/iran-war-middle-east-flight-status/"},
  {id:1674,p:10,r:"속보",t:"UAE intercepts missiles sent by Iran as three injured in Fujairah drone strike",k:"UAE, 이란 미사일 요격…후자이라 드론 공격으로 3명 부상",s:"The National",c:"gulf",d:"2026-05-04",m:"The UAE military intercepted three Iranian missiles over its waters with a fourth crashing in the sea. An Iranian drone sparked a large fire at the Fujairah Petroleum Industries Zone, injuring three Indian nationals.",mk:"UAE 군이 자국 영해 상공에서 이란 미사일 3발을 요격했고, 4번째는 바다에 추락했다. 이란 드론이 후자이라 석유산업단지에 대형 화재를 일으켜 인도 국적자 3명이 부상했다.",tg:["UAE","미사일","후자이라"],u:"https://www.thenationalnews.com/news/uae/2026/05/04/uae-intercepts-four-missiles-as-new-safety-alerts-issued/"},
  {id:1675,p:6,r:"주요경제",t:"Will petrol prices in UAE increase, hit Dh4 a litre in May?",k:"UAE 휘발유, 5월 리터당 4디르함 도달하나",s:"Khaleej Times",c:"gulf",d:"2026-04-29",m:"Analysts assessed whether UAE petrol prices could climb to Dh4 a litre in May 2026 amid ongoing Hormuz disruption, citing record-high crude oil prices and broader Middle East energy volatility.",mk:"호르무즈 차질이 지속되는 가운데, 사상 최고치 유가와 중동 에너지 변동성을 근거로 UAE 휘발유 가격이 5월 리터당 4디르함에 도달할 수 있을지 분석가들이 점검했다.",tg:["UAE","유가","리터"],u:"https://www.khaleejtimes.com/business/energy/will-petrol-prices-uae-increase-may-2026-hit-dh4-a-litre"},
  {id:1676,p:9,r:"속보",t:"UAE forces intercept three Iranian missiles, fourth crashes in sea: Ministry",k:"UAE 군 이란 미사일 3발 요격, 4번째는 바다 추락: 국방부",s:"Al Arabiya",c:"gulf",d:"2026-05-04",m:"The UAE Ministry of Defence said its air defences engaged 12 ballistic missiles, three cruise missiles and four drones launched from Iran. Three of four missiles were intercepted over UAE territorial waters; the fourth crashed in the sea.",mk:"UAE 국방부는 방공망이 이란이 발사한 탄도미사일 12발, 순항미사일 3발, 드론 4기에 대응했다고 밝혔다. 4발의 미사일 중 3발이 영해 상공에서 요격됐고 4번째는 바다에 추락했다.",tg:["UAE","미사일","방공"],u:"https://english.alarabiya.net/News/gulf/2026/05/04/uae-issues-alert-for-potential-missile-threats-"},
  {id:1677,p:10,r:"헤드라인",t:"Iran war: What&apos;s happening on day 66 as Trump announces Hormuz mission?",k:"이란 전쟁 66일차: 트럼프, 호르무즈 작전 발표",s:"Al Jazeera",c:"me",d:"2026-05-04",m:"On day 66 of the Iran war, Trump signaled confidence as Hormuz tensions rose. The US launched Operation Project Freedom to escort neutral ships out of the Strait of Hormuz, which has been largely closed since February 28.",mk:"이란 전쟁 66일차, 트럼프 대통령은 호르무즈 긴장 고조 속 자신감을 내비쳤다. 미국은 2월 28일 이후 사실상 봉쇄된 호르무즈 해협에서 중립국 선박을 호위하는 &apos;프리덤 작전&apos;을 개시했다.",tg:["이란","호르무즈","미국"],u:"https://www.aljazeera.com/news/2026/5/4/iran-war-whats-happening-on-day-66-as-trump-announces-hormuz-mission"},
  {id:1678,p:10,r:"속보",t:"UAE accuses Iran of attacks as &apos;large fire&apos; breaks out at oil refinery",k:"UAE, 이란 공격 비난…정유시설 대형 화재",s:"Al Jazeera",c:"me",d:"2026-05-04",m:"The UAE accused Iran of attacking with a barrage of missiles and drones, setting an oil refinery ablaze in Fujairah and wounding three Indian nationals. The strike marked the first attack on the UAE since the April 8 ceasefire.",mk:"UAE는 이란이 미사일과 드론으로 공격해 후자이라 정유시설에 큰 화재를 내고 인도 국적자 3명에게 부상을 입혔다고 비난했다. 4월 8일 휴전 이후 UAE에 대한 첫 공격이다.",tg:["UAE","이란","후자이라"],u:"https://www.aljazeera.com/news/2026/5/4/uae-reports-missile-and-drone-strikes-incoming-from-iran"},
  {id:1679,p:8,r:"속보",t:"Israel issues new forced displacement orders in southern Lebanon",k:"이스라엘, 남부 레바논에 새 강제이주 명령",s:"Al Jazeera",c:"me",d:"2026-05-03",m:"Israel&apos;s military issued new displacement orders to residents in towns and villages in southern Lebanon, including areas beyond its current zone of occupation, despite a US-brokered truce in force since mid-April.",mk:"4월 중순 미국 중재 휴전에도 불구하고, 이스라엘 군이 현 점령 지역을 넘어선 남부 레바논 마을 주민들에게 새로운 강제이주 명령을 발령했다.",tg:["이스라엘","레바논","휴전"],u:"https://www.aljazeera.com/news/2026/5/3/israel-issues-new-forced-displacement-orders-in-southern-lebanon"},
  {id:1680,p:8,r:"외교",t:"Lebanon&apos;s Hezbollah-allied parliament speaker: No talks with Israel until war ends",k:"레바논 헤즈볼라 우호 국회의장 &quot;전쟁 끝날 때까지 이스라엘과 협상 없다&quot;",s:"Times of Israel",c:"me",d:"2026-05-04",m:"Lebanon&apos;s parliament speaker Nabih Berri, the most senior Shia politician and a close ally of Hezbollah, said there could be no negotiations with Israel without a halt to the war that has raged on in southern Lebanon despite a ceasefire.",mk:"레바논의 최고위 시아파 정치인이자 헤즈볼라 우호 인사인 나비 베리 국회의장은 휴전에도 불구하고 남부 레바논에서 계속되는 전쟁 중단 없이는 이스라엘과 협상이 불가능하다고 밝혔다.",tg:["레바논","헤즈볼라","협상"],u:"https://www.timesofisrael.com/lebanons-hezbollah-allied-parliament-speaker-no-talks-with-israel-until-war-ends/"},
  {id:1681,p:7,r:"속보",t:"UAE lifts all air traffic restrictions introduced since Iran war",k:"UAE, 이란 전쟁 이후 도입된 모든 항공 교통 제한 해제",s:"Al Jazeera",c:"me",d:"2026-05-03",m:"The UAE General Civil Aviation Authority lifted all precautionary air traffic restrictions introduced since the start of the Iran war on February 28, signaling cautious normalization despite ongoing regional tensions.",mk:"UAE 민간항공청이 2월 28일 이란 전쟁 발발 이후 도입된 모든 항공 교통 예방 제한을 해제했다. 역내 긴장 지속에도 신중한 정상화 신호다.",tg:["UAE","항공","정상화"],u:"https://www.aljazeera.com/news/2026/5/3/uae-lifts-all-air-traffic-restrictions-introduced-since-iran-war"},
  {id:1682,p:8,r:"속보",t:"Hezbollah fires anti-tank missile at IDF soldiers in Southern Lebanon",k:"헤즈볼라, 남부 레바논서 IDF 병사들에 대전차 미사일 발사",s:"Jerusalem Post",c:"me",d:"2026-05-04",m:"Hezbollah fired an anti-tank missile at IDF soldiers operating in southern Lebanon on May 4, marking another escalation in the fragile ceasefire as Israeli forces continue strikes on Hezbollah targets in the region.",mk:"헤즈볼라가 5월 4일 남부 레바논에서 작전 중인 이스라엘군 병사들에게 대전차 미사일을 발사했다. 이스라엘군이 헤즈볼라 표적에 대한 공습을 지속하는 가운데 취약 휴전의 또 다른 격화 사례다.",tg:["헤즈볼라","IDF","레바논"],u:"https://www.jpost.com/middle-east/iran-news/2026-05-04/live-updates-895011"},
  {id:1683,p:8,r:"속보",t:"Israeli air strikes on Lebanon kill 41 people in 24 hours",k:"이스라엘 공습으로 레바논서 24시간 내 41명 사망",s:"Al Jazeera",c:"me",d:"2026-05-02",m:"Israel launched multiple strikes across southern Lebanon, killing 41 people in 24 hours according to Lebanon&apos;s Health Ministry. The strikes are a further violation of the ceasefire declared two weeks ago.",mk:"이스라엘이 남부 레바논 전역에 다수 공격을 가해 24시간 내 41명이 숨졌다고 레바논 보건부가 밝혔다. 2주 전 선언된 휴전을 다시 위반한 것이다.",tg:["이스라엘","레바논","휴전위반"],u:"https://www.aljazeera.com/news/2026/5/2/israeli-air-strikes-kill-10-people-in-southern-lebanon"},
  {id:1684,p:9,r:"심층분석",t:"Saudi Arabia-UAE OPEC Split Complicates Wall Street&apos;s Middle East Calculus",k:"사우디-UAE OPEC 분열, 월가의 중동 셈법 복잡화",s:"Bloomberg",c:"global",d:"2026-05-04",m:"The UAE&apos;s OPEC exit and split with Saudi Arabia is complicating Wall Street&apos;s Middle East calculus, while hedge funds keep expanding in Dubai/Abu Dhabi and Saudi Arabia pulls LIV Golf funding amid budget reassessment.",mk:"UAE의 OPEC 탈퇴와 사우디와의 분열이 월가의 중동 셈법을 복잡하게 만들고 있다. 헤지펀드는 두바이·아부다비 진출을 확대하는 가운데, 사우디는 예산 재평가 속에 LIV 골프 자금 지원을 철회했다.",tg:["OPEC","사우디","UAE"],u:"https://www.bloomberg.com/news/newsletters/2026-05-04/saudi-arabia-uae-opec-split-complicates-wall-street-s-middle-east-calculus"},
  {id:1685,p:10,r:"헤드라인",t:"Oil prices jump after Iran attacks UAE as US tries to open Strait of Hormuz",k:"이란의 UAE 공격에 유가 급등…미국 호르무즈 개방 시도",s:"CNBC",c:"global",d:"2026-05-04",m:"Brent crude rose nearly 6% to close at $114.44 per barrel and WTI advanced more than 4% to settle at $106.42 after Iran attacked the UAE and the US launched Operation Project Freedom to free up Hormuz shipping.",mk:"이란이 UAE를 공격하고 미국이 호르무즈 해운 자유화를 위한 &apos;프리덤 작전&apos;을 개시한 가운데, 브렌트유는 약 6% 급등해 배럴당 114.44달러, WTI는 4% 이상 올라 106.42달러에 마감했다.",tg:["유가","호르무즈","브렌트"],u:"https://www.cnbc.com/2026/05/04/oil-prices-today-wti-brent-trump-iran-us-hormuz.html"},
  {id:1686,p:8,r:"심층분석",t:"&apos;Misplaced euphoria&apos;: Markets are sleepwalking into a recession amid Iran war oil price shock",k:"&apos;안이한 낙관&apos;: 이란 전쟁 유가 충격 속 시장은 침체로 몽유 중",s:"CNBC",c:"global",d:"2026-05-04",m:"Analysts warn markets are sleepwalking into recession amid the Iran war oil price shock, with sustained $100+ Brent threatening global growth and consumer demand. Equities have largely shrugged off geopolitical risks.",mk:"이란 전쟁 유가 충격 속 시장이 침체를 향해 몽유하고 있다고 분석가들이 경고했다. 100달러 이상의 브렌트유 지속이 세계 성장과 소비를 위협하지만, 주식시장은 지정학 리스크를 대체로 무시하고 있다.",tg:["침체","유가","리스크"],u:"https://www.cnbc.com/2026/05/04/strait-hormuz-gas-price-oil-shock-recession-risk-economy-iran-us-war.html"},
  {id:1687,p:10,r:"속보",t:"UAE says Iran launched missile attack despite ceasefire",k:"UAE: 이란, 휴전에도 미사일 공격 강행",s:"CNBC",c:"global",d:"2026-05-04",m:"UAE accused Iran of launching ballistic and cruise missiles plus drones on Monday, with strikes setting an oil refinery ablaze in Fujairah. The US said it sank six small Iranian boats in the Strait of Hormuz.",mk:"UAE는 월요일 이란이 탄도·순항 미사일과 드론을 발사해 후자이라 정유시설에 화재를 일으켰다고 비난했다. 미국은 호르무즈 해협에서 이란 소형선 6척을 격침했다고 밝혔다.",tg:["UAE","이란","휴전"],u:"https://www.cnbc.com/2026/05/04/iran-war-uae-trump-ceasefire-missiles.html"},
  {id:1688,p:9,r:"헤드라인",t:"Trump declines to say whether US-Iran ceasefire is still in effect as Strait of Hormuz tensions escalate",k:"트럼프, 호르무즈 긴장 고조 속 미·이란 휴전 유효 여부 답변 거부",s:"CNN",c:"global",d:"2026-05-04",m:"President Trump declined to confirm whether the US-Iran ceasefire remains in effect as Hormuz tensions escalated. The US military &quot;blew up&quot; six small Iranian boats Monday after Iran fired cruise missiles, drones, and small boats at US Navy ships.",mk:"트럼프 대통령이 호르무즈 긴장 고조 속에서 미·이란 휴전이 유효한지 확답을 거부했다. 미군은 이란이 미 해군 함선에 순항미사일·드론·소형선을 발사한 후 월요일 이란 소형선 6척을 폭파했다.",tg:["트럼프","휴전","호르무즈"],u:"https://www.cnn.com/2026/05/04/world/live-news/iran-war-hormuz-trump"},
  {id:1689,p:9,r:"주요경제",t:"OPEC+ Agrees Symbolic Quota Hike as UAE Touts Oil Investment",k:"OPEC+, 상징적 쿼터 인상 합의…UAE는 석유 투자 부각",s:"Bloomberg",c:"global",d:"2026-05-03",m:"OPEC+ major producers led by Saudi Arabia and Russia agreed to a modest, symbolic 188,000 bpd June increase at a video conference, sending a business-as-usual message after the surprise UAE exit. UAE separately touted its oil investment plans.",mk:"사우디와 러시아 주도의 OPEC+ 주요 생산국들이 화상 회의에서 6월 18만8천 배럴/일의 완만하고 상징적인 증산에 합의해 UAE 깜짝 탈퇴 후에도 정상 운영 메시지를 발신했다. UAE는 별도로 석유 투자 계획을 부각했다.",tg:["OPEC+","쿼터","UAE"],u:"https://www.bloomberg.com/news/articles/2026-05-03/opec-agrees-to-symbolic-june-quota-increase-delegates-say"},
  {id:1690,p:8,r:"심층분석",t:"OPEC+ Meeting Offers Chance to Show Unity After UAE&apos;s Shock Exit",k:"OPEC+ 회의, UAE 깜짝 탈퇴 후 단합 과시 기회",s:"Bloomberg",c:"global",d:"2026-05-03",m:"The OPEC+ meeting offers a chance to show unity after UAE&apos;s shock exit on May 1 ended six decades of membership. The split is the culmination of years of tension with Saudi Arabia over output policy and regional political influence.",mk:"OPEC+ 회의는 60년 회원 자격을 끝낸 5월 1일 UAE의 깜짝 탈퇴 이후 단합을 과시할 기회를 제공한다. 분열은 사우디와 산유 정책 및 역내 정치적 영향력을 둘러싼 수년간 긴장의 정점이다.",tg:["OPEC+","UAE","단합"],u:"https://www.bloomberg.com/news/articles/2026-05-03/opec-meeting-offers-chance-to-show-unity-after-uae-s-shock-exit"},
  {id:1691,p:9,r:"속보",t:"Attacks in Strait of Hormuz, Gulf region imperil US-Iran ceasefire",k:"호르무즈·걸프 지역 공격, 미·이란 휴전 위협",s:"Washington Post",c:"global",d:"2026-05-04",m:"Attacks across the Strait of Hormuz and Gulf region are putting the US-Iran ceasefire on increasingly shaky footing as both sides exchange fire. Iran fired missiles at UAE while the US sank Iranian boats in Hormuz.",mk:"호르무즈와 걸프 지역의 공격이 양측의 교전 속 미·이란 휴전을 점점 더 흔들고 있다. 이란은 UAE에 미사일을 발사했고, 미국은 호르무즈에서 이란 선박을 격침시켰다.",tg:["휴전","호르무즈","걸프"],u:"https://www.washingtonpost.com/world/2026/05/04/us-ships-iran-hormuz-ceasefire/"},
  {id:1692,p:9,r:"속보",t:"US sinks 7 small Iranian boats as Iran launches attacks on UAE and ships in Strait of Hormuz",k:"미국, 이란 소형선 7척 격침…이란은 UAE·호르무즈 선박 공격",s:"CBS News",c:"global",d:"2026-05-04",m:"The US Navy sank seven small Iranian boats in the Strait of Hormuz as Iran launched cruise missiles, drones and small boats at US ships and commercial vessels under US protection. Trump warned Iran would be &quot;blown off the face of the Earth&quot; if it attacked Navy vessels.",mk:"미 해군이 호르무즈 해협에서 이란 소형선 7척을 격침한 가운데, 이란은 미 함선과 미 보호 상선에 순항미사일·드론·소형선을 발사했다. 트럼프는 이란이 해군 함선을 공격하면 &quot;지구상에서 날려버리겠다&quot;고 경고했다.",tg:["미군","이란","호르무즈"],u:"https://www.cbsnews.com/live-updates/iran-war-trump-strait-of-hormuz-ship-attack-threat-peace-proposal/"},
  {id:1693,p:7,r:"속보",t:"The US fights to reopen the Strait of Hormuz as UAE says it&apos;s attacked by Iran",k:"미국, 호르무즈 재개방 위해 분투…UAE는 이란에 공격받았다 주장",s:"NPR",c:"global",d:"2026-05-04",m:"The US is fighting to reopen the Strait of Hormuz under Operation Project Freedom as UAE accused Iran of striking with missiles and drones. NPR reports details of the escalating exchange and ceasefire fragility.",mk:"미국이 &apos;프리덤 작전&apos; 하에 호르무즈 해협 재개방에 분투하는 가운데 UAE는 이란이 미사일·드론으로 공격했다고 비난했다. NPR가 격화하는 교전과 휴전의 취약성을 보도했다.",tg:["미군","호르무즈","UAE"],u:"https://www.npr.org/2026/05/04/nx-s1-5810508/iran-war-updates"},
  {id:1694,p:8,r:"속보",t:"Iran ceasefire in peril as UAE says it&apos;s under attack",k:"UAE 공격 주장으로 이란 휴전 위기",s:"Axios",c:"global",d:"2026-05-04",m:"The Iran ceasefire is in peril as UAE says it&apos;s under attack from Iranian missiles and drones. Axios reports the strikes mark the first major attack on UAE since the April 8 ceasefire and put the truce on shaky ground.",mk:"UAE가 이란의 미사일·드론 공격을 받았다고 밝히면서 이란 휴전이 위기에 처했다. 4월 8일 휴전 이후 UAE에 대한 첫 대규모 공격으로 휴전이 흔들리고 있다고 악시오스가 보도했다.",tg:["UAE","휴전","위기"],u:"https://www.axios.com/2026/05/04/iran-attack-uae-missiles-ceasefire-hormuz"},
  {id:1695,p:9,r:"헤드라인",t:"Korean envoy team secures 273 million barrels of crude, 2.1 million tons of naphtha",k:"대통령 특사단, 원유 2억 7300만 배럴·나프타 210만 톤 확보",s:"정책브리핑",c:"korean-view",d:"2026-04-15",m:"South Korea&apos;s presidential envoy team visiting Saudi Arabia, Oman, Qatar and Kazakhstan secured 273 million barrels of crude oil and 2.1 million tons of additional naphtha for delivery by year-end, securing alternative supply via the Red Sea.",mk:"사우디·오만·카타르·카자흐스탄 4개국을 방문한 전략경제협력 대통령 특사단이 연말까지 원유 2억 7,300만 배럴, 나프타 210만 톤 추가 확보 성과를 거두며 홍해 경유 대체 공급을 확보했다.",tg:["한국","원유","대체공급"],u:"https://www.korea.kr/news/policyNewsView.do?newsId=148962757"},
  {id:1696,p:7,r:"심층분석",t:"Saudi Arabia, Kazakhstan secured as alternative supply lines: refining/petrochem urgent need eased",k:"사우디·카자흐 등 대체 공급선 확보…정유·석화 &apos;급한불&apos; 껐다",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-15",m:"South Korean refiners eased the urgent need for crude/naphtha supply by securing alternatives from Saudi Arabia, Kazakhstan, Qatar and Oman, focusing on routes that avoid Hormuz blockade risk via Red Sea adjacent ports.",mk:"한국 정유·석유화학 업계가 호르무즈 봉쇄 리스크를 피해 홍해 인접 항만 등 우회 경로에 집중된 사우디·카자흐스탄·카타르·오만 대체 공급선을 확보하며 급한불을 껐다.",tg:["정유","석화","대체공급"],u:"https://www.fnnews.com/news/202604151821382168"},
  {id:1697,p:8,r:"심층분석",t:"Middle East unrest 2nd round: &apos;OPEC exit&apos; UAE vs. Saudi Arabia in full confrontation",k:"중동 불안 2라운드…&apos;OPEC 탈퇴&apos; UAE vs 사우디 본격 대립각",s:"이투데이",c:"korean-view",d:"2026-04-29",m:"UAE&apos;s OPEC and OPEC+ exit on April 28 marked the start of full confrontation with Saudi Arabia, signaling cracks in the Gulf order led by Riyadh. Middle East risk is shifting from Iran variable to internal GCC conflict.",mk:"UAE가 4월 28일 OPEC 및 OPEC+ 탈퇴를 선언하면서 사우디와 본격 대립각이 시작됐다. 리야드 주도 걸프 질서 균열의 신호로 중동 리스크가 이란 변수에서 GCC 내부 갈등으로 확산하는 전환점이라는 평가다.",tg:["OPEC","UAE","사우디"],u:"https://www.etoday.co.kr/news/view/2580542"},
  {id:1698,p:7,r:"외교",t:"FM Cho calls Iranian counterpart, urges resumption of safe passage in Strait of Hormuz",k:"조현, 이란 외교장관과 통화 &quot;호르무즈 선박 안전 통항 재개 필요&quot;",s:"이투데이",c:"korean-view",d:"2026-05-02",m:"South Korean Foreign Minister Cho Hyun held a phone call on May 2 with Iranian FM Seyed Abbas Araghchi, stressing the need for safe passage of all vessels including Korean ships in the Strait of Hormuz, and discussed regional dynamics.",mk:"조현 외교부 장관이 5월 2일 세예드 압바스 아락치 이란 외교장관과 통화하고, 한국 선박을 포함한 모든 선박의 호르무즈 해협 안전 통항 재개 필요성을 강조하며 역내 정세를 논의했다.",tg:["한국","이란","호르무즈"],u:"https://www.etoday.co.kr/news/view/2581161"},
  {id:1699,p:7,r:"심층분석",t:"Global supply chain upended... US, South America, China affected",k:"&quot;글로벌 공급망 뒤집혔다&quot;…미국·남미·중국까지 충격",s:"헤럴드경제",c:"korean-view",d:"2026-05-02",m:"Iran war and Hormuz closure have upended global supply chains, affecting US, South America and China supply routes. Korean firms diversified to Saudi Arabia and Kazakhstan to mitigate disruption.",mk:"이란 전쟁과 호르무즈 봉쇄가 미국·남미·중국에 이르는 글로벌 공급망을 뒤집어 놓은 가운데, 한국 기업들은 사우디·카자흐스탄 등으로 다변화하며 충격을 완화하고 있다.",tg:["공급망","글로벌","한국"],u:"https://heraldk.com/2026/05/02/global-supply-chain"}
];

// ===== STATE =====
let activeFilter='all', searchQuery='', langMode='both';

function formatDate(ds){const d=new Date(ds+'T00:00:00');return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function daysAgo(ds){const t=new Date(),d=new Date(ds+'T00:00:00'),diff=Math.floor((t-d)/(864e5));return diff===0?'오늘':diff===1?'어제':`${diff}일 전`;}

// Saudi media outlet ordering: Arab News > SPA > Saudi Gazette > Argaam > Asharq Al-Awsat > others
const SAUDI_SOURCE_ORDER = {'Arab News':1,'SPA':2,'Saudi Gazette':3,'Argaam':4,'Asharq Al-Awsat':5};
function saudiSrcRank(s){return SAUDI_SOURCE_ORDER[s]||99;}

function getFiltered(){
  let f=D;
  if(activeFilter!=='all') f=f.filter(n=>n.c===activeFilter);
  if(searchQuery){const q=searchQuery.toLowerCase(); f=f.filter(n=>n.t.toLowerCase().includes(q)||n.m.toLowerCase().includes(q)||n.s.toLowerCase().includes(q)||(n.k&&n.k.toLowerCase().includes(q))||(n.mk&&n.mk.toLowerCase().includes(q))||n.tg.some(t=>t.toLowerCase().includes(q)));}
  // Sort: 1) date desc  2) for Saudi: source order  3) priority desc
  return f.sort((a,b)=>{
    const dd = new Date(b.d) - new Date(a.d);
    if(dd) return dd;
    if(a.c==='saudi' && b.c==='saudi'){
      const sd = saudiSrcRank(a.s) - saudiSrcRank(b.s);
      if(sd) return sd;
    }
    return (b.p||0) - (a.p||0);
  });
}

function renderStats(){
  const c={all:D.length,saudi:D.filter(n=>n.c==='saudi').length,gulf:D.filter(n=>n.c==='gulf').length,me:D.filter(n=>n.c==='me').length,global:D.filter(n=>n.c==='global').length,'korean-view':D.filter(n=>n.c==='korean-view').length};
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-chip"><span class="count">${c.all}</span> 전체</div>
    <div class="stat-chip">\u{1F1F8}\u{1F1E6}<span class="count">${c.saudi}</span> 사우디</div>
    <div class="stat-chip">\u{1F30D}<span class="count">${c.western}</span> 서방</div>
    <div class="stat-chip">\u{1F1F0}\u{1F1F7}<span class="count">${c.korean}</span> 한국</div>
    <div class="stat-chip">\u{1F4F0}<span class="count">${c.other}</span> 기타</div>`;
}

function renderControls(){
  const filters=[{k:'all',l:'전체'},{k:'saudi',l:'🇸🇦 사우디'},{k:'gulf',l:'🌊 GCC/걸프'},{k:'me',l:'🕌 중동/지역'},{k:'global',l:'🌍 서방'},{k:'korean-view',l:'🇰🇷 한국'}];
  const langs=[{k:'both',l:'영+한'},{k:'ko',l:'한국어만'},{k:'en',l:'영어만'}];
  document.getElementById('controls').innerHTML=
    filters.map(f=>`<button class="filter-btn ${f.k} ${activeFilter===f.k?'active':''}" data-f="${f.k}">${f.l}</button>`).join('')+
    '<div class="sep"></div>'+
    langs.map(l=>`<button class="lang-btn ${langMode===l.k?'active':''}" data-l="${l.k}">${l.l}</button>`).join('');
  document.querySelectorAll('.filter-btn').forEach(b=>b.onclick=()=>{activeFilter=b.dataset.f;renderControls();renderContent();});
  document.querySelectorAll('.lang-btn').forEach(b=>b.onclick=()=>{langMode=b.dataset.l;document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderContent();});
}

function prioBadge(n){
  if(!n.r) return '';
  const cls={'속보':'prio-breaking','헤드라인':'prio-headline','심층분석':'prio-analysis','정책발표':'prio-policy','주요경제':'prio-economy'};
  return `<span class="prio-badge ${cls[n.r]||'prio-normal'}">${n.r}</span>`;
}

function card(n){
  const isKo=n.l==='ko';
  const isTop=n.p>=9;
  let th='',mh='';
  const pb=prioBadge(n);
  if(isKo){th=`<div class="title-only">${n.t}${pb}</div>`;mh=`<div class="summary-only">${n.m}</div>`;}
  else if(langMode==='en'){th=`<div class="title-only">${n.t}${pb}</div>`;mh=`<div class="summary-only">${n.m}</div>`;}
  else if(langMode==='ko'){th=`<div class="title-only">${n.k||n.t}${pb}</div>`;mh=`<div class="summary-only">${n.mk||n.m}</div>`;}
  else{th=`<div class="title-en">${n.t}${pb}</div>${n.k?`<div class="title-ko">${n.k}</div>`:''}`;mh=`<div class="summary-en">${n.m}</div>${n.mk?`<div class="summary-ko">${n.mk}</div>`:''}`;}
  return `<div class="news-card ${n.c}${isTop?' prio-top':''}"><div class="card-header"><span class="source-tag ${n.c}">${n.s}</span><span class="card-date">${daysAgo(n.d)} · ${formatDate(n.d)}</span></div>${th}${mh}<div class="card-footer"><div class="topic-tags">${n.tg.map(t=>`<span class="topic-tag">${t}</span>`).join('')}</div><a href="${n.u}" target="_blank" class="read-link">원문 &#8594;</a></div></div>`;
}

function renderContent(){
  const f=getFiltered(),main=document.getElementById('mainContent');
  if(!f.length){main.innerHTML='<div class="no-results">검색 결과 없음</div>';return;}
  let h=`<div class="summary-panel"><h2>오늘의 핵심 요약 (2026.05.05)</h2><div class="summary-points">

    <div class="summary-point"><span class="summary-icon">🛢️</span><div class="summary-text"><strong>유가 급등·OPEC+ 6월 증산 합의:</strong> 호르무즈 긴장 재점화로 브렌트유는 약 6% 상승해 배럴당 114.44달러 마감, WTI도 4% 이상 올라 106.42달러 기록. OPEC+ 7개국은 UAE 불참한 첫 회의에서 6월 일 18만8천 배럴 증산을 발표했고, 사우디 쿼터는 1,029만1천 배럴/일로 상향됐다.</div></div>
    <div class="summary-point"><span class="summary-icon">💰</span><div class="summary-text"><strong>아람코 1분기 사상 최대 이익 전망·하지 준비 박차:</strong> 사우디 아람코가 5월 10일 1분기 실적을 공시하며 순이익 1,084억 리얄(290억 달러)로 2023년 3분기 이후 최대치 예상. 5월 5일부터 하라마인 고속철도 하지 운송 개시(좌석 221만), 환경주간 개막 등 비전2030 추진 가속.</div></div>
    <div class="summary-point"><span class="summary-icon">🇰🇷</span><div class="summary-text"><strong>조현 장관 이란과 직접 통화·대체 공급선 가동:</strong> 5월 2일 조현 외교장관이 아락치 이란 외교장관과 통화해 한국 선박 포함 모든 선박의 호르무즈 안전 통항 재개를 강조. 정부 특사단이 사우디·오만·카타르·카자흐서 원유 2.73억 배럴·나프타 210만 톤을 홍해 인접 항만 경유로 확보해 정유·석화의 &apos;급한불&apos;을 진화했다.</div></div>
  </div></div>`;

  h+=`<div class="article-count-note">검색된 기사: <strong>${f.length}건</strong> / 전체 ${D.length}건 (사우디 언론: SPA, Arab News, Saudi Gazette, Argaam, Asharq Al-Awsat 포함)</div>`;

  if(activeFilter==='all'){
    [{k:'saudi',n:'사우디 언론 (Arab News · SPA · Saudi Gazette · Argaam · Asharq Al-Awsat)',b:'badge-saudi',i:'\u{1F1F8}\u{1F1E6}'},
     {k:'gulf',n:'GCC/걸프 언론 (Gulf News · Khaleej Times · The National · Qatar Tribune · Times of Oman)',b:'badge-gulf',i:'\u{1F30A}'},
     {k:'me',n:'중동/지역 언론 (Al Jazeera · Al Arabiya · Jerusalem Post · Iran International)',b:'badge-me',i:'\u{1F54C}'},
     {k:'global',n:'서방 주요 언론 (Bloomberg · Reuters · CNN · CNBC · WSJ · NYT · FT · IEA)',b:'badge-global',i:'\u{1F30D}'},
     {k:'korean-view',n:'한국 언론 (연합뉴스 · 한국경제 · 매일경제 · KDI · 삼일PwC · 파이낸셜뉴스)',b:'badge-korean',i:'\u{1F1F0}\u{1F1F7}'}
    ].forEach(g=>{const items=f.filter(n=>n.c===g.k);if(!items.length)return;h+=`<div class="section-title">${g.i} ${g.n} <span class="badge ${g.b}">${items.length}</span></div><div class="news-grid">${items.map(card).join('')}</div>`;});
  } else h+=`<div class="news-grid">${f.map(card).join('')}</div>`;
  main.innerHTML=h;
}

document.getElementById('currentDate').textContent=(function(){const n=new Date(),w=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];return `${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일 ${w[n.getDay()]}`})();
document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderContent();});
window.addEventListener('scroll',()=>document.getElementById('scrollTop').classList.toggle('show',window.scrollY>400));
renderStats();renderControls();renderContent();
