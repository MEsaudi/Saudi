  {id:735,p:10,r:"속보",t:"Iran seizes 2 ships in Strait of Hormuz after Trump extends ceasefire",k:"이란, 트럼프 휴전 연장 후 호르무즈서 선박 2척 나포",s:"CNBC",c:"me",d:"2026-04-22",m:"Iran&apos;s navy seized two container ships in the Strait of Hormuz on Wednesday after attacking three commercial ships, coming hours after Trump&apos;s ceasefire extension and amid the continuing U.S. naval blockade of Iran&apos;s ports.",mk:"이란 해군은 수요일 호르무즈 해협에서 컨테이너선 2척을 나포했으며, 앞서 상업선박 3척이 공격받았다. 트럼프 대통령의 휴전 연장 발표 수 시간 만의 사건이자, 美의 이란 항구 봉쇄가 지속되는 가운데 발생했다.",tg:["호르무즈","선박나포","이란"],u:"https://www.cnbc.com/2026/04/22/strait-of-hormuz-ships-attacked-iran-war.html"},
  {id:736,p:9,r:"헤드라인",t:"Iran menaces Hormuz as its own oil tankers test US blockade",k:"이란, 호르무즈 위협하며 자국 유조선으로 美 봉쇄 시험",s:"Bloomberg",c:"global",d:"2026-04-22",m:"Iran&apos;s gunboats are menacing traffic in the Strait of Hormuz as Tehran&apos;s own oil tankers test the US naval blockade of Iranian ports, raising pressure on crude markets and global shipping risk.",mk:"이란 포함(砲艦)이 호르무즈 통항을 위협하는 가운데 이란 자국 유조선이 美 해상 봉쇄 시험에 나섰다. 원유 시장과 글로벌 해운 리스크가 고조되고 있다.",tg:["호르무즈","유조선","봉쇄시험"],u:"https://www.bloomberg.com/news/articles/2026-04-22/iran-gunboats-menace-hormuz-as-its-own-tankers-test-us-blockade"},
  {id:737,p:6,r:"심층분석",t:"Earth Day: Our power, our planet",k:"지구의 날 2026: 우리의 힘, 우리의 행성",s:"Arab News",c:"saudi",d:"2026-04-22",m:"On Earth Day, Arab News highlights Saudi Arabia&apos;s biodiversity push: protected areas now cover 18% of land and 6.5% of marine zones, with $25 million allocated to protect the Arabian leopard and 250,000 seedlings planted in AlUla nurseries.",mk:"지구의 날을 맞아 아랍뉴스는 사우디의 생물다양성 보호 성과를 조명했다. 보호구역은 국토의 18%, 해양의 6.5%에 달하며, 아라비아표범 보호에 2,500만 달러, 알울라에 25만 그루 식재를 투입했다.",tg:["환경","비전2030","녹색중동"],u:"https://www.arabnews.com/node/2640896/amp"},
  {id:738,p:6,r:"주요경제",t:"Saudi carrier flyadeal launches flights from Riyadh to NEOM",k:"사우디 저비용항공 flyadeal, 리야드-네옴 노선 취항",s:"Arab News",c:"saudi",d:"2026-04-15",m:"Low-cost carrier flyadeal has launched direct flights between Riyadh and NEOM Bay Airport, strengthening domestic connectivity to the kingdom&apos;s flagship northwest megaproject.",mk:"사우디 저비용항공사 flyadeal이 리야드-네옴 베이 공항 직항 노선을 취항하며 북서부 메가프로젝트와의 내륙 연결을 강화했다.",tg:["네옴","항공","비전2030"],u:"https://www.arabnews.com/node/2639230/business-economy"},
  {id:739,p:7,r:"주요경제",t:"NEOM port cuts cargo transit time with new trade corridor",k:"네옴항, 신규 무역 회랑 도입으로 화물 운송 시간 단축",s:"Arab News",c:"saudi",d:"2026-04-14",m:"NEOM introduced a new multimodal corridor connecting Europe, Egypt and GCC countries, developed with Egyptian maritime firm Pan Marine. The route already serves importers in Italy, UK, Germany and Poland.",mk:"네옴이 이집트 해운사 Pan Marine과 협력해 유럽-이집트-GCC를 잇는 복합운송 회랑을 개통했다. 이탈리아·영국·독일·폴란드 수입업체들이 이미 활용하고 있다.",tg:["네옴","물류","호르무즈대안"],u:"https://www.arabnews.com/node/2609776/business-economy"},
  {id:740,p:8,r:"주요경제",t:"NEOM Port Reshapes Global Trade Routes from Northern Saudi Arabia",k:"네옴항, 사우디 북부서 세계 무역 경로 재편",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-20",m:"NEOM Port targets European-Gulf trade via a SR7.5 billion all-electric multimodal corridor. The main container terminal with 1.5 million TEU capacity is set to open this year. Proximity to the Suez Canal strengthens its logistics hub role.",mk:"네옴항은 75억 리얄 규모 전기 구동 복합운송 회랑으로 유럽-걸프 무역을 겨냥한다. 연 150만 TEU 컨테이너 터미널이 올해 개장 예정이며, 수에즈 운하 근접성이 강점이다.",tg:["네옴","물류","무역","호르무즈대안"],u:"https://english.aawsat.com/business/5265180-neom-port-reshapes-global-trade-routes-northern-saudi-arabia"},
  {id:741,p:8,r:"주요외교",t:"President Sheikh Mohamed holds talks in Abu Dhabi with Syrian leader Al Shara",k:"UAE 무함마드 대통령, 아부다비서 시리아 알샤라와 회담",s:"The National",c:"gulf",d:"2026-04-22",m:"UAE President Sheikh Mohamed bin Zayed Al Nahyan received Syrian President Ahmad Al Shara in Abu Dhabi on April 22, discussing bilateral ties and cooperation as part of Al Shara&apos;s broader Gulf tour.",mk:"UAE 대통령 무함마드 빈 자이드 알나흐얀은 22일 아부다비에서 시리아 대통령 아흐마드 알샤라를 접견해 양자 관계 및 협력 강화 방안을 논의했다.",tg:["UAE","시리아","외교"],u:"https://www.thenationalnews.com/news/uae/2026/04/22/syrian-president-al-shara-arrives-in-abu-dhabi-to-strengthen-uae-ties/"},
  {id:742,p:7,r:"주요경제",t:"Top Goldman Sachs banker says UAE bouncing back",k:"골드만삭스 최고위 뱅커: UAE 회복세 확인",s:"The National",c:"gulf",d:"2026-04-20",m:"A top Goldman Sachs banker told The National that activity in Dubai and Abu Dhabi is rebounding, citing crowded venues and traffic as indicators of normalisation and business confidence. Regional deal volumes are expected to approach prior-year levels.",mk:"골드만삭스 최고위 임원은 두바이·아부다비 현지 일상활동이 회복되고 있다며 교통체증과 붐비는 장소가 정상화 신호라고 더 내셔널에 밝혔다. 역내 딜 규모도 전년 수준에 근접할 전망이다.",tg:["UAE","두바이","경제","M&A"],u:"https://www.thenationalnews.com/business/2026/04/20/i-got-stuck-in-traffic-its-a-healthy-sign-top-goldman-sachs-banker-says-uae-bouncing-back/"},
  {id:743,p:5,r:"주요경제",t:"Abu Dhabi to activate 24-hour Ghantoot toll gate in May",k:"아부다비, 5월부터 간투트 톨게이트 24시간 가동",s:"The National",c:"gulf",d:"2026-04-22",m:"Abu Dhabi&apos;s Integrated Transport Centre will activate two new 24-hour toll gates on May 4 to reduce congestion, with drivers charged Dh4 per crossing. The move reflects ongoing infrastructure expansion.",mk:"아부다비 통합교통센터는 5월 4일부터 혼잡 완화를 위해 24시간 운영 톨게이트 2곳을 신규 가동한다. 통과 차량당 4디르함이 부과된다.",tg:["UAE","아부다비","인프라"],u:"https://www.thenationalnews.com/news/uae/2026/04/22/abu-dhabi-to-activate-two-new-toll-gates-on-may-4/"},
  {id:744,p:9,r:"속보",t:"Iranian tankers laden with oil have broken US blockade, data firm finds",k:"데이터 기업: 이란 유조선들, 원유 만재하고 미 봉쇄 돌파",s:"The National",c:"gulf",d:"2026-04-22",m:"At least two fully laden Iranian tankers - Hero II and Hedy - have sailed past the US blockade, part of a flotilla that ferried about 9 million barrels of oil to market, according to Vortexa satellite data. US CENTCOM disputed the report.",mk:"보텍사 위성 데이터에 따르면 이란 선적 VLCC Hero II·Hedy를 포함한 유조선들이 원유를 만재한 채 미국 봉쇄선을 돌파했으며, 선단 전체가 약 900만 배럴을 시장에 실어날랐다. 미 중부사령부는 해당 보도를 반박했다.",tg:["이란","원유","호르무즈","봉쇄"],u:"https://www.thenationalnews.com/news/mena/2026/04/22/iran-tankers-us-blockade/"},
  {id:745,p:10,r:"속보",t:"Iran war live: Israel kills Lebanese journalist; Tehran-US talks stalled",k:"이란 전쟁 라이브: 이스라엘, 레바논 기자 사살…테헤란-미 협상 교착",s:"Al Jazeera",c:"me",d:"2026-04-23",m:"Al Jazeera live updates report an Israeli strike killed a Lebanese journalist on April 23 while Tehran-US talks remain stalled. Iran says it captured two foreign vessels in the Strait of Hormuz and opened fire on a third; President Pezeshkian cites the US blockade as the main obstacle to negotiations.",mk:"알자지라 실시간 속보에 따르면 23일 이스라엘의 공격으로 레바논 기자가 숨졌으며 테헤란-워싱턴 협상은 교착 상태다. 이란은 호르무즈에서 외국 선박 2척을 나포하고 또 다른 선박에 발포했다고 밝혔다.",tg:["이란전쟁","호르무즈","협상"],u:"https://www.aljazeera.com/news/liveblog/2026/4/23/iran-war-live-israel-kills-lebanese-journalist-tehran-us-talks-stalled"},
  {id:746,p:9,r:"주요외교",t:"Iran blames Trump&apos;s blockade for diplomatic impasse as fragile truce holds",k:"이란, 트럼프 봉쇄가 외교 교착 원인…취약한 휴전은 유지",s:"Al Jazeera",c:"me",d:"2026-04-22",m:"Senior Iranian officials blamed Washington for stalled peace negotiations due to the US naval blockade. President Pezeshkian said Tehran wants dialogue but cites the blockade as the main obstacle. Iranian officials skipped scheduled talks in Pakistan in protest.",mk:"이란 고위 당국자들은 미 해군 봉쇄로 평화협상이 교착됐다고 비판했다. 페제슈키안 대통령은 대화를 원하지만 봉쇄가 걸림돌이라고 밝혔으며, 이란 관리들은 파키스탄 회담에 항의 차원에서 불참했다.",tg:["이란전쟁","외교","봉쇄"],u:"https://www.aljazeera.com/news/2026/4/22/iran-blames-trumps-blockade-for-diplomatic-impasse-as-fragile-truce-holds"},
  {id:747,p:9,r:"헤드라인",t:"Trump announces extending Iran ceasefire but says blockade remains",k:"트럼프, 이란 휴전 연장 발표…봉쇄는 유지",s:"Al Jazeera",c:"me",d:"2026-04-21",m:"President Trump extended the ceasefire with Iran indefinitely to give Tehran time to present a unified proposal, but confirmed the US naval blockade will continue. The extension came at the request of mediator Pakistan.",mk:"트럼프 대통령은 이란과의 휴전을 무기한 연장한다고 발표하면서도 미 해군 봉쇄는 계속된다고 밝혔다. 중재국 파키스탄의 요청으로 2주 휴전 만료 직전 결정됐다.",tg:["이란전쟁","휴전","봉쇄"],u:"https://www.aljazeera.com/news/2026/4/21/trump-announces-extending-iran-ceasefire-but-says-blockade-remains"},
  {id:748,p:8,r:"심층분석",t:"MBS hosts Sudan&apos;s Burhan in Jeddah as $1.5B Saudi-backed arms deal stalls",k:"빈살만, 제다서 부르한 접견…15억 달러 무기거래 교착",s:"Al-Monitor",c:"me",d:"2026-04-20",m:"Al-Monitor reports MBS hosted Sudan&apos;s Burhan in Jeddah on April 20 amid reports Riyadh blocked a $1.5 billion Pakistan-Sudan arms deal. Saudi Arabia is preparing a June Sudanese-Saudi investment forum.",mk:"알모니터에 따르면 빈살만 왕세자는 20일 제다에서 수단 부르한 위원장을 접견했으며, 리야드가 15억 달러 규모의 파키스탄-수단 무기거래를 중단시켰다는 보도가 이어졌다.",tg:["수단","사우디","외교","분석"],u:"https://www.al-monitor.com/originals/2026/04/mbs-hosts-sudans-burhan-jeddah-15b-saudi-backed-arms-deal-stalls"},
  {id:749,p:7,r:"심층분석",t:"NEOM&apos;s new logistics look",k:"네옴의 새로운 물류 면모",s:"Al-Monitor",c:"me",d:"2026-04-21",m:"Al-Monitor analyzes NEOM&apos;s repositioning as a Red Sea logistics hub, offering alternatives to Hormuz-dependent routes. The piece frames scaled-back tourism ambitions and scaled-up logistics/industrial pivot as a pragmatic recalibration.",mk:"알모니터는 네옴의 홍해 물류허브 재편을 분석하며, 호르무즈 의존 노선의 대안을 제공한다고 평가했다. 관광 축소와 물류·산업 중심 전환은 비전 2030 후퇴가 아닌 실용적 재조정이다.",tg:["네옴","물류","분석","홍해"],u:"https://www.al-monitor.com/newsletter/2026-04-21/neoms-new-logistics-look"},
  {id:750,p:10,r:"헤드라인",t:"Iran Tankers Go Dark to Sail Past US Blockade Laden With Oil",k:"이란 유조선, 식별장치 끄고 미 봉쇄 돌파…원유 만재",s:"Bloomberg",c:"global",d:"2026-04-22",m:"At least two fully laden Iranian tankers sailed past the US blockade this week, part of a flotilla that ferried roughly 9 million barrels of oil to market. The Hero II and Hedy VLCCs were captured in Vortexa satellite imagery on April 20.",mk:"완전 적재된 이란 선적 VLCC Hero II·Hedy를 포함해 최소 2척의 유조선이 이번 주 미 봉쇄선을 돌파했으며, 선단 전체가 약 900만 배럴을 시장에 전달했다.",tg:["이란","원유","봉쇄","VLCC"],u:"https://www.bloomberg.com/news/articles/2026-04-22/iran-tankers-go-dark-to-sail-past-us-blockade-laden-with-crude"},
  {id:751,p:7,r:"주요경제",t:"Emerging Markets Slip as Oil Prices Rise, Iran Peace Talks Stall",k:"신흥국 증시 하락…유가 상승·이란 협상 교착 영향",s:"Bloomberg",c:"global",d:"2026-04-22",m:"Emerging market equities slipped on April 22 as oil prices rose and Iran peace talks stalled. MSCI&apos;s EM index retreated from recent highs as investors reassessed risk premiums amid the Hormuz crisis.",mk:"22일 신흥시장 주가가 하락했다. 유가 상승과 이란 협상 교착이 투자자들의 위험 프리미엄 재평가를 촉발했다.",tg:["신흥국","증시","원유","호르무즈"],u:"https://www.bloomberg.com/news/articles/2026-04-22/emerging-markets-rally-hits-pause-as-iran-risks-lift-oil"},
  {id:752,p:9,r:"속보",t:"US and Iran Deadlocked Over Hormuz Blockade After Trump Extends Truce",k:"트럼프 휴전 연장 후 미-이란, 호르무즈 봉쇄 둘러싸고 교착",s:"Bloomberg",c:"global",d:"2026-04-22",m:"The US and Iran are locked in a battle for control of the Strait of Hormuz after failing to meet for fresh peace talks, with both sides blocking the waterway to gain leverage during the extended ceasefire.",mk:"미국과 이란은 평화협상 재개 불발 속 호르무즈 통제권을 놓고 대치하고 있으며, 양측 모두 항로를 차단해 연장 휴전 기간 중 협상력을 확보하려 하고 있다.",tg:["이란전쟁","호르무즈","휴전","봉쇄"],u:"https://www.bloomberg.com/news/articles/2026-04-22/us-and-iran-deadlocked-over-hormuz-after-trump-extends-truce"},
  {id:753,p:8,r:"주요경제",t:"Oil price: WTI, Brent, Iran ceasefire extension clouds outlook",k:"WTI·브렌트, 이란 휴전 연장에도 유가 전망 불투명",s:"CNBC",c:"global",d:"2026-04-22",m:"Brent briefly surged above $100 on April 22 before easing to around $98 as Iran signaled possible openness to resumed talks, but Trump&apos;s extended blockade kept supply risks elevated. Demand destruction nears 4-5 million bpd, about 5% of global supply.",mk:"22일 브렌트유는 100달러를 잠시 돌파한 뒤 98달러 부근으로 내렸다. 이란이 협상 재개 가능성을 내비쳤지만 트럼프의 봉쇄 연장으로 공급 리스크가 계속됐다. 수요 파괴는 4-5백만 bpd에 달한다.",tg:["유가","브렌트","이란","아시아"],u:"https://www.cnbc.com/2026/04/22/oil-price-wti-brent-iran-ceasefire-extension-clouds-outlook.html"},
  {id:754,p:7,r:"심층분석",t:"Damage done by war to Mideast economy extends well beyond energy",k:"중동 전쟁의 경제 충격, 에너지 넘어 전 산업으로 확산",s:"CNBC",c:"global",d:"2026-04-22",m:"CNBC examines how the Iran war&apos;s damage to the Middle East economy extends well beyond energy to travel, tourism, real estate, and financial services in Dubai and Abu Dhabi. White House-UAE financial deal talks reportedly aim to cushion the impact.",mk:"CNBC는 이란 전쟁이 중동 경제에 미친 충격이 에너지를 넘어 두바이·아부다비의 여행·관광·부동산·금융까지 확산되고 있다고 분석했다.",tg:["UAE","경제","관광","전쟁영향"],u:"https://www.cnbc.com/2026/04/22/uae-economy-travel-tourism-dubai-abu-dhabi-war.html"},
  {id:755,p:9,r:"속보",t:"Iran seizes 2 ships in Strait of Hormuz after Trump extends ceasefire",k:"이란, 트럼프 휴전 연장 후 호르무즈서 선박 2척 나포",s:"Washington Post",c:"global",d:"2026-04-22",m:"Iran&apos;s Revolutionary Guard seized two ships in the Strait of Hormuz on April 22, hours after Trump extended the ceasefire. A White House spokesperson said this was not viewed as a ceasefire violation because the ships were not US or Israeli.",mk:"이란 혁명수비대는 22일 트럼프의 휴전 연장 몇 시간 뒤 호르무즈 해협에서 선박 2척을 나포했다. 백악관 대변인은 미국·이스라엘 선박이 아니었기에 휴전 위반으로 보지 않는다고 밝혔다.",tg:["호르무즈","이란","나포","봉쇄"],u:"https://www.washingtonpost.com/world/2026/04/22/hormuz-strait-us-iran-talks-war/"},
  {id:756,p:8,r:"속보",t:"Iran says it seized ships in Strait of Hormuz as US blockade continues",k:"이란: 호르무즈서 선박 나포…휴전 중에도 미 봉쇄 지속",s:"NPR",c:"global",d:"2026-04-22",m:"NPR reports Iran attacked three ships in the Strait of Hormuz on April 22, with the Revolutionary Guard saying it seized two. US CENTCOM said the ships it has turned around in its naval blockade has risen to 31, most being oil tankers.",mk:"NPR 보도에 따르면 22일 이란은 호르무즈 해협에서 선박 3척을 공격했으며 혁명수비대는 그중 2척을 나포했다. 미 중부사령부는 이란 항구 봉쇄로 회항시킨 선박이 31척에 달한다고 밝혔다.",tg:["호르무즈","이란","봉쇄"],u:"https://www.npr.org/2026/04/22/nx-s1-5795405/iran-middle-east-updates"},
  {id:757,p:8,r:"주요외교",t:"Trump says there is no time frame on Iran war and denies midterms driving decisions",k:"트럼프: 이란 전쟁 종료 시한 없다…중간선거 고려설 부인",s:"CNN",c:"global",d:"2026-04-22",m:"CNN live updates quote Trump saying there is no time frame for ending the Iran war, denying that US midterm elections are driving his decisions. The blockade remains despite the ceasefire extension.",mk:"CNN 실시간 속보에 따르면 트럼프는 이란 전쟁 종료에 시한은 없다고 밝히며 중간선거 고려설을 부인했다. 휴전 연장에도 봉쇄는 계속된다.",tg:["이란전쟁","트럼프","미국정치"],u:"https://www.cnn.com/2026/04/22/world/live-news/iran-war-us-trump-blockade-ceasefire"},
  {id:758,p:8,r:"속보",t:"Live updates: Iran seizes ships in Strait of Hormuz after Trump extends ceasefire",k:"속보: 트럼프 휴전 연장 후 이란, 호르무즈 선박 나포",s:"NBC News",c:"global",d:"2026-04-22",m:"NBC News live coverage tracks the April 22 developments: Iran seized two international vessels in Hormuz, peace talks stalled, and Trump said he would continue extending the ceasefire until Tehran presents a unified proposal.",mk:"NBC뉴스 실시간 보도는 22일 상황을 추적했다. 이란은 호르무즈에서 외국 선박 2척을 나포했고, 평화협상은 교착됐으며, 트럼프는 이란의 통합 제안 제출 시까지 휴전 연장을 이어가겠다고 밝혔다.",tg:["이란전쟁","호르무즈","휴전"],u:"https://www.nbcnews.com/world/iran/live-blog/live-updates-iran-trump-ceasefire-hormuz-attack-peace-talks-israel-rcna341361"},
  {id:759,p:8,r:"헤드라인",t:"파이낸셜뉴스: 이재명 대통령 생산적 금융…FIND 제27회 서울국제금융포럼",k:"이재명 대통령 생산적 금융…서울국제금융포럼",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-22",m:"파이낸셜뉴스 주최 2026 FIND·제27회 서울국제금융포럼이 22일 여의도 페어몬트 앰배서더에서 개최됐다. 이재명 대통령은 축사에서 경제 선순환 구조 복원과 지속가능한 성장동력 확보를 강조하며 생산적 금융으로의 대전환을 역설했다.",mk:"파이낸셜뉴스 주최 서울국제금융포럼이 22일 여의도에서 개최됐다. 이재명 대통령은 생산적 금융 전환을 강조했으며, 중동 정세 속 금융시장 안정 방안도 논의됐다.",tg:["한국","금융","이재명","중동영향"],u:"https://www.fnnews.com/news/202604221812179402"},
  {id:760,p:8,r:"심층분석",t:"파이낸셜뉴스: 중동사태로 달러 안정성 의문…기축통화 지위 흔들릴수도",k:"중동사태로 달러 안정성 의문…기축통화 지위 위기론",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-22",m:"나카오 타케히코 국제경제전략센터 의장은 22일 서울국제금융포럼에서 기축통화인 달러가 러시아·이란 제재에 사용되며 무기화되고 있다고 지적했다. 중동 사태로 달러 안정성에 대한 의문이 커지고 있다.",mk:"나카오 타케히코 의장은 22일 달러 무기화로 기축통화 지위가 흔들릴 수 있다고 지적했다. 중동 사태 여파로 외환 다변화 가능성이 제기됐다.",tg:["한국","환율","달러","중동영향"],u:"https://www.fnnews.com/news/202604221812199837"},
  {id:761,p:6,r:"주요경제",t:"파이낸셜뉴스: 5부제 참여 車, 보험료 할인상품 내달 출시",k:"5부제 참여 車, 자동차 보험료 할인상품 5월 출시",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-22",m:"당정청은 중동 사태 대응책으로 대중교통 혼잡 완화대책 마련, 사우디 얀부항 등 원유 대체항로 지원, 차량 5부제 참여 자동차 보험료 할인 특약상품 5월 출시 등을 발표했다. 호르무즈 위기에 따른 에너지 절약 드라이브다.",mk:"당정청은 22일 중동 사태 대응으로 얀부항 원유 대체항로 지원과 차량 5부제 참여 시 자동차 보험료 할인특약 5월 출시 계획을 제시했다.",tg:["한국","에너지안보","얀부항","5부제"],u:"https://www.fnnews.com/news/202604222113373359"},
  {id:762,p:7,r:"주요외교",t:"파이낸셜뉴스: 사우디 왕세자, 방문한 시리아 대통령과 양국 협력방안 논의",k:"사우디 왕세자, 방문한 시리아 대통령과 협력방안 논의",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-22",m:"파이낸셜뉴스는 사우디 왕세자 무함마드 빈 살만이 22일 제다에서 시리아 알샤라 대통령을 접견해 양국 협력방안을 논의했다고 보도했다. 저비용항공 공동설립, 알레포 신국제공항 건설, 10억 달러 통신 프로젝트 등에 양국은 협력하고 있다.",mk:"파이낸셜뉴스는 22일 사우디 왕세자와 시리아 알샤라 대통령의 제다 회담을 보도했다. 저비용항공·공항건설·통신 분야 협력이 확대되고 있다.",tg:["한국언론","사우디","시리아","협력"],u:"https://www.fnnews.com/news/202604220713483555"},
  {id:763,p:8,r:"주요외교",t:"파이낸셜뉴스: 이란 IRGC, 호르무즈 재봉쇄 발표 美 해상봉쇄 끝내야 해제",k:"이란 IRGC, 호르무즈 재봉쇄 발표…美 봉쇄 해제 전엔 풀지 않겠다",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-19",m:"이란 혁명수비대 해군은 18일 저녁부터 호르무즈 해협 재봉쇄를 시작했다고 발표했다. IRGC는 미국이 이란 항구에 대한 해상봉쇄를 해제하지 않는 한 해협 봉쇄를 풀지 않겠다고 못박았으며, 이는 원유시장 변동성을 키우고 있다.",mk:"이란 혁명수비대는 18일 저녁 호르무즈 재봉쇄를 선언하며 美 봉쇄 해제 전엔 불가라는 입장을 강조했다. 원유시장 변동성이 확대됐다.",tg:["이란","호르무즈","봉쇄","한국언론"],u:"https://www.fnnews.com/news/202604190923527890"},
  {id:764,p:8,r:"주요외교",t:"Saudi, Dutch foreign ministers discuss regional developments",k:"사우디-네덜란드 외교장관 회담, 국제 항행 안전 논의",s:"Arab News",c:"saudi",d:"2026-04-22",m:"Saudi Foreign Minister Prince Faisal bin Farhan met Dutch Foreign Minister Tom Berendsen in Riyadh on April 22. They reviewed bilateral cooperation and discussed efforts to maintain the security and safety of international waterways. Berendsen reaffirmed Amsterdam&apos;s condemnation of Iranian aggression against Saudi Arabia and the region.",mk:"사우디 외교장관 파이살 빈 파르한 왕자는 22일 리야드에서 톰 베렌트센 네덜란드 외교장관을 만났다. 양국은 양자협력과 국제 수로 안전보장 노력을 논의했으며, 네덜란드는 이란의 사우디 및 역내 국가 공격을 규탄한다는 입장을 재확인했다.",tg:["사우디","네덜란드","외교","호르무즈"],u:"https://www.arabnews.com/node/2640904/amp"},
  {id:765,p:8,r:"주요경제",t:"Saudi Arabia, Philippines to Join JPMorgan Emerging Market Bond Index in 2027",k:"사우디·필리핀, 2027년 JP모건 신흥국 채권지수 편입",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-22",m:"J.P. Morgan announced Saudi Arabia and the Philippines will be added to its GBI-EM local-currency index from January 29, 2027. Saudi Arabia&apos;s weight is expected to reach 2.52% once fully phased in; about eight sovereign sukuk worth roughly $69 billion could be included.",mk:"JP모건은 2027년 1월 29일부터 사우디아라비아와 필리핀을 GBI-EM 현지통화 신흥국 채권지수에 편입한다고 발표했다. 사우디 비중은 완전 편입 시 2.52%에 달할 전망이며, 약 690억 달러 규모의 국채 수쿠크 8종이 포함될 수 있다.",tg:["사우디","채권","JP모건","투자유치"],u:"https://english.aawsat.com/business/5265604-saudi-arabia-philippines-join-jpmorgan-emerging-market-bond-index-2027"},
  {id:766,p:6,r:"심층분석",t:"Rainfall rates record 162% higher across Saudi Arabia during first half of April",k:"사우디 4월 상반기 강수량, 평년대비 162% 증가",s:"Saudi Gazette",c:"saudi",d:"2026-04-21",m:"The National Center for Meteorology says Saudi Arabia&apos;s average rainfall during April 1-16 reached 20.3 mm, up 162% from the climatic normal of 7.8 mm. The surge supports water resources and vegetation recovery ahead of Hajj.",mk:"사우디 국립기상센터에 따르면 4월 1-16일 사우디 평균 강수량은 20.3mm로, 평년(7.8mm) 대비 162% 증가했다. 증가된 강수량은 핫지 시즌 전 수자원 확보와 식생 회복에 기여한다.",tg:["사우디","기후","기상","핫지"],u:"https://saudigazette.com.sa/article/660734/saudi-arabia/rainfall-rates-record-162-higher-across-saudi-arabia-during-first-half-of-april"},
  {id:767,p:5,r:"주요경제",t:"Benzema hat-trick leads Al-Hilal to crushing victory over Al-Kholood",k:"벤제마 해트트릭, 알힐랄의 6-0 대승 견인",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Karim Benzema scored a hat-trick as Al-Hilal crushed Al-Kholood 6-0 in the Saudi Pro League. His performance underscores PIF-owned Al-Hilal&apos;s continued investment firepower in the league&apos;s global talent race.",mk:"카림 벤제마가 해트트릭을 기록하며 알힐랄이 사우디 프로리그에서 알쿨루드를 6-0으로 대파했다. PIF 소유 알힐랄의 글로벌 스타 영입과 투자 전략이 결실을 맺고 있다.",tg:["사우디","축구","엔터테인먼트","PIF"],u:"https://www.arabnews.com/node/2639265/sport"},
  {id:768,p:7,r:"심층분석",t:"Saudi Arabia&apos;s Vision 2030 enters final phase with strong momentum",k:"사우디 비전 2030, 최종 국면 진입…강한 모멘텀 유지",s:"Arab News",c:"saudi",d:"2026-04-15",m:"Arab News analyzes Vision 2030&apos;s final phase, noting that 93% of key performance indicators have been fully or partially met over nine years. Over 600 economic reforms have been enacted to attract $3.3 trillion cumulative investment and $480 billion in FDI by 2030.",mk:"아랍뉴스는 비전 2030이 최종 국면에 진입했다고 분석하며, 9년간 핵심성과지표의 93%가 완전 또는 부분 달성됐다고 평가했다. 2030년까지 3.3조 달러 누적투자 및 4,800억 달러 FDI 유치를 위해 600건 이상의 경제개혁이 시행됐다.",tg:["비전2030","개혁","FDI"],u:"https://www.arabnews.com/node/2598489/business-economy"},
  {id:769,p:6,r:"주요경제",t:"Up to $10bn of inflows could be unlocked by Saudi stock market reforms",k:"사우디 증시 개방으로 최대 100억 달러 유입 전망",s:"Arab News",c:"saudi",d:"2026-04-12",m:"Experts told Arab News that CMA&apos;s February 1 opening of Tadawul to all categories of foreign investors could unlock up to $10 billion in inflows. Non-resident foreigners can now invest directly in the Main Market.",mk:"사우디 자본시장청(CMA)이 2월 1일 모든 범주의 외국인 투자자에게 타다울을 전면 개방함에 따라 최대 100억 달러의 자금 유입이 기대된다고 전문가들이 아랍뉴스에 밝혔다. 비거주 외국인이 메인 시장에 직접 투자할 수 있다.",tg:["증시","CMA","타다울","외국인투자"],u:"https://www.arabnews.com/node/2628751/amp"},
  {id:770,p:5,r:"심층분석",t:"The impact of Vision 2030 on Saudi Arabia&apos;s foreign policy",k:"비전 2030이 사우디 외교정책에 미친 영향",s:"Arab News",c:"saudi",d:"2026-04-18",m:"Arab News analyzes how Vision 2030&apos;s economic transformation has recalibrated Saudi Arabia&apos;s foreign policy toward pragmatic multi-alignment, balancing US, China, Russia, and regional neighbors to safeguard investment flows and diversification goals.",mk:"아랍뉴스는 비전 2030의 경제 전환이 사우디 외교정책을 실용적 다중 정렬로 재편했다고 분석했다. 투자 흐름과 다변화 목표 보호를 위해 미국·중국·러시아·지역 이웃국과 균형을 맞추고 있다.",tg:["비전2030","외교","다중정렬"],u:"https://www.arabnews.com/node/2599540"},
  {id:771,p:5,r:"주요경제",t:"Abu Dhabi renames 4 Darb toll gates to reflect locations accurately",k:"아부다비, 4개 Darb 톨게이트 위치 기반 개명",s:"Khaleej Times",c:"gulf",d:"2026-04-22",m:"Abu Dhabi&apos;s Integrated Transport Centre has renamed four Darb toll gates to better align names with actual locations, improving clarity for motorists as part of ongoing transport infrastructure modernization.",mk:"아부다비 통합교통센터가 4개 Darb 톨게이트 명칭을 실제 위치에 맞게 개명했다. 운전자 혼동을 줄이고 교통 인프라 현대화를 이어가는 행보다.",tg:["UAE","아부다비","교통"],u:"https://www.khaleejtimes.com/uae/abu-dhabi-renames-darb-toll-gates-reflect-locations"},
  {id:772,p:7,r:"주요외교",t:"Saudi Arabia, the Netherlands Discuss Efforts to Maintain Security of Int&apos;l Waterways",k:"사우디-네덜란드, 국제 수로 안전 유지 방안 논의",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-22",m:"Asharq Al-Awsat reports that Saudi and Dutch foreign ministers in Riyadh on April 22 discussed bilateral cooperation and efforts to maintain the security of international waterways amid the Hormuz crisis, with the Dutch side condemning Iranian aggression.",mk:"아샤르끄 알아우사트에 따르면 22일 리야드에서 사우디-네덜란드 외교장관이 양자협력 및 호르무즈 위기 속 국제 수로 안전 유지 방안을 논의했으며, 네덜란드 측은 이란의 공격을 규탄했다.",tg:["사우디","네덜란드","외교","호르무즈"],u:"https://english.aawsat.com/gulf/5265566-saudi-arabia-netherlands-discuss-efforts-maintain-security-int%E2%80%99l-waterways"},
  {id:773,p:8,r:"경제",t:"Saudi Arabia and 7 other Islamic nations denounce Israeli violations of Jerusalem holy sites",k:"사우디 등 8개 이슬람 국가, 예루살렘 성지 이스라엘 침해 강력 규탄",s:"Saudi Gazette",c:"saudi",d:"2026-04-24",m:"Foreign ministers of Saudi Arabia, Jordan, UAE, Qatar, Indonesia, Pakistan, Egypt, and Turkey jointly condemned Israeli violations of the historic and legal status quo at Jerusalem Islamic and Christian holy sites, calling them clear breaches of international law.",mk:"사우디, 요르단, UAE, 카타르, 인도네시아, 파키스탄, 이집트, 터키 외교장관은 공동 성명을 통해 이스라엘이 예루살렘 이슬람·기독교 성지의 역사적·법적 현상을 반복적으로 침해하고 있는 것에 대해 명확한 국제법 위반이라고 강력 규탄했다.",tg:["외교","예루살렘","공동성명"],u:"https://saudigazette.com.sa/article/660801"},
  {id:774,p:9,r:"헤드라인",t:"HRH Crown Prince Meets with President of Syria",k:"사우디 왕세자, 시리아 대통령과 회담",s:"SPA",c:"saudi",d:"2026-04-21",m:"SPA reports that Crown Prince Mohammed bin Salman met with Syrian President Ahmed al-Sharaa in Jeddah. Discussions covered developing relations and regional cooperation, including a $2 billion aviation investment in Aleppo.",mk:"사우디 국영통신(SPA) 보도에 따르면, 무함마드 빈 살만 왕세자가 제다에서 시리아 대통령 아흐마드 알샤라를 접견했다. 양국 관계 발전 및 알레포 공항 20억 달러 투자 등 역내 협력 방안이 논의됐다.",tg:["왕세자","시리아","투자"],u:"https://www.spa.gov.sa/en/N2567248"},
  {id:775,p:10,r:"속보",t:"Saudi Arabia Welcomes US-Iran Ceasefire Agreement",k:"사우디, 미-이란 휴전 합의 환영",s:"SPA",c:"saudi",d:"2026-04-08",m:"The Kingdom welcomed the announcement of a ceasefire between the United States and Iran, expressing hope for stability in the region and urging all parties to prioritize diplomatic channels.",mk:"사우디 정부는 미국과 이란 간 휴전 합의 발표를 환영한다고 밝혔으며, 역내 안정을 위해 모든 당사자가 외교적 해결을 우선해 줄 것을 촉구했다.",tg:["외교","이란","휴전"],u:"https://www.spa.gov.sa/en/N2555334"},
  {id:776,p:9,r:"정책발표",t:"Saudi Arabia to Host World Economic Forum Global Collaboration and Growth Meeting",k:"사우디, 다보스포럼 글로벌 협력·성장 회의 개최",s:"SPA",c:"saudi",d:"2026-04-22",m:"Saudi Arabia hosted the WEF Global Collaboration and Growth Meeting titled &quot;Building Common Ground and Reviving Growth&quot; in Jeddah on April 22-23, convening global leaders to address economic priorities.",mk:"사우디 아라비아는 4월 22~23일 제다에서 &quot;공동 기반 구축과 성장 회복&quot;을 주제로 한 세계경제포럼(WEF) 글로벌 협력·성장 회의를 개최하며, 세계 지도자들이 경제 현안을 논의하는 장을 마련했다.",tg:["WEF","외교","경제"],u:"https://www.spa.gov.sa/en/N2496597"},
  {id:777,p:7,r:"심층분석",t:"Saudi Arabia Launches Digital Transformation Index for 2026",k:"사우디, 2026년 디지털전환지수 공식 출범",s:"SPA",c:"saudi",d:"2026-04-16",m:"The Digital Government Authority launched the Digital Transformation Index 2026 to help government entities improve digital performance and service quality across all sectors.",mk:"디지털정부청(DGA)은 2026 디지털전환지수를 출범시켜, 전 부처의 디지털 성과와 서비스 품질 향상을 지원한다고 밝혔다.",tg:["디지털","정부","AI"],u:"https://www.spa.gov.sa/en/N2562888"},
  {id:778,p:7,r:"심층분석",t:"Transport and Logistic Services Sector Finalizes Strategic Readiness for Hajj 1447 AH",k:"교통물류부, 하지 1447년 운영 준비 완료",s:"SPA",c:"saudi",d:"2026-04-22",m:"The Ministry of Transport and Logistic Services announced completion of integrated operational readiness for the Hajj 1447 AH season, ensuring smooth mobility for pilgrims.",mk:"교통물류부는 하지(성지순례) 1447년도(2026년) 시즌을 위한 통합 운영 준비를 완료했다고 발표하며, 순례자들의 원활한 이동을 보장한다고 밝혔다.",tg:["하지","교통","관광"],u:"https://www.spa.gov.sa/en/N2564130"},
  {id:779,p:6,r:"심층분석",t:"Saudi Arabia Observes World Public Transport Day with Major Sector Transformation",k:"사우디, 세계 대중교통의 날 맞이 부문 대전환",s:"SPA",c:"saudi",d:"2026-04-17",m:"The Transport General Authority highlighted rapid transformation of public transport, with over 30.6 million passengers using urban public buses across Saudi Arabia in Q1 2026.",mk:"교통총국(TGA)은 1분기 도시형 공공버스 누적 이용객 3060만 명을 넘어섰다고 밝히며, 대중교통 부문이 급속히 전환되고 있음을 강조했다.",tg:["교통","도시","인프라"],u:"https://www.spa.gov.sa/en/N2564697"},
  {id:780,p:7,r:"정책발표",t:"Saudi Arabia Ranks First Globally in ITU Digital Readiness Framework 2025",k:"사우디, ITU 디지털준비지수 2025 글로벌 1위",s:"SPA",c:"saudi",d:"2026-04-14",m:"Saudi Arabia achieved a new global milestone by ranking first worldwide in the Digital Readiness Framework 2025 issued by the International Telecommunication Union.",mk:"사우디는 국제전기통신연합(ITU)이 발표한 2025년 디지털준비지수에서 세계 1위를 차지하며 또 하나의 글로벌 이정표를 세웠다.",tg:["디지털","ITU","랭킹"],u:"https://spa.gov.sa/en/N2559658"},
  {id:781,p:8,r:"주요경제",t:"Saudi cabinet backs PIF strategy, approves tax pact and cross-border deals",k:"사우디 내각, PIF 전략·세제협정·국경간 거래 승인",s:"Arab News",c:"saudi",d:"2026-04-22",m:"The Saudi cabinet backed the PIF 2026-2030 strategy focused on domestic competitive sectors and private-sector participation. Non-oil exports rose 15% in 2025 and the Kingdom ranked first in ITU digital readiness.",mk:"사우디 내각이 국부펀드(PIF) 2026~2030 전략을 승인, 국내 경쟁 부문 육성과 민간 참여 확대를 표방했다. 2025년 비석유 수출은 전년 대비 15% 증가했고, ITU 디지털준비지수에서도 1위를 기록했다.",tg:["PIF","내각","비석유"],u:"https://www.arabnews.com/node/2640829/business-economy"},
  {id:782,p:8,r:"주요경제",t:"PIF backs State Street new Saudi equity ETF in latest global market push",k:"PIF, 스테이트스트리트 사우디 주식 ETF 앵커 투자",s:"Arab News",c:"saudi",d:"2026-04-22",m:"PIF became anchor investor in State Street Saudi Arabia Enhanced Active Equity UCITS ETF (SAQL), listed on Xetra (Germany) and LSE (UK), expanding international access to Saudi equities.",mk:"PIF는 State Street가 출시한 액티브 사우디 주식 UCITS ETF(티커 SAQL)의 앵커 투자자가 됐다. SAQL은 독일 Xetra 1차 상장, 런던증권거래소 교차상장되어 국제 투자자들의 사우디 주식 접근성을 확대한다.",tg:["PIF","ETF","금융"],u:"https://www.arabnews.com/node/2640836/business-economy"},
  {id:783,p:7,r:"경제",t:"Saudi Arabia, Japan discuss boosting bilateral ties and regional stability",k:"사우디-일본, 양자 관계 및 지역 안정 강화 논의",s:"Arab News",c:"saudi",d:"2026-04-23",m:"Saudi Foreign Minister Prince Faisal bin Farhan met with Japan Foreign Minister to discuss strengthening bilateral ties across investment and energy, and coordinate on regional stability amid ongoing tensions.",mk:"사우디 외교장관 파이살 빈 파르한 왕자는 일본 외상과 만나 투자·에너지 분야 양자 관계 강화 방안 및 역내 안정 확보를 위한 공조 방안을 논의했다.",tg:["외교","일본","양자협력"],u:"https://www.arabnews.com/node/2640955"},
  {id:784,p:7,r:"경제",t:"Saudi Aramco sets Arab crude OSP for April delivery",k:"사우디 아람코, 4월 아랍 원유 공식판매가격(OSP) 책정",s:"Argaam",c:"saudi",d:"2026-04-22",m:"Saudi Aramco set the OSP for Arab Light crude at $4.60/bbl above ASCI for North America, $2.85/bbl above ICE Brent for Western Europe, $2.65 above ICE Brent for Europe-Med, and $2.50 above the Oman-Dubai average for Asia.",mk:"사우디 아람코는 4월 인도 아랍 라이트 원유의 공식판매가격을 북미는 ASCI 대비 배럴당 +4.60달러, 서유럽은 ICE 브렌트 대비 +2.85달러, 유럽-지중해는 +2.65달러, 아시아는 오만-두바이 평균 대비 +2.50달러로 책정했다.",tg:["아람코","원유","OSP"],u:"https://www.argaam.com/en/article/articledetail/id/1885678"},
  {id:785,p:7,r:"경제",t:"Pakistan seeks deeper economic ties with Saudi Arabia",k:"파키스탄, 사우디와 경제 협력 심화 추진",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-22",m:"Pakistan is actively seeking to deepen economic ties with Saudi Arabia through expanded trade, investment, and labor cooperation, viewing the Kingdom as a strategic partner during a period of regional economic turbulence.",mk:"파키스탄은 무역·투자·노동 협력 확대를 통해 사우디와의 경제 관계를 심화하기 위해 적극 움직이고 있으며, 역내 경제 격변기에 사우디를 전략적 파트너로 인식하고 있다.",tg:["경제협력","파키스탄","투자"],u:"https://english.aawsat.com/business/5261423-pakistan-seeks-deeper-economic-ties-saudi-arabia"},
  {id:786,p:6,r:"경제",t:"SPA Training Academy Launches Program to Qualify over 300 Media Graduates",k:"SPA 트레이닝 아카데미, 300명 이상 미디어 졸업생 자격인증 프로그램 출범",s:"SPA",c:"saudi",d:"2026-04-22",m:"Saudi Press Agency Training Academy launched a new program to qualify more than 300 media graduates, strengthening national media workforce capacity and supporting Vision 2030 human capital development objectives.",mk:"사우디 프레스 에이전시(SPA) 트레이닝 아카데미는 300명 이상의 미디어 전공 졸업생을 자격 인증하는 신규 프로그램을 출범하여 국가 미디어 인력 역량 강화 및 비전2030 인적 자본 개발 목표를 지원한다.",tg:["미디어","인재양성","비전2030"],u:"https://www.spa.gov.sa/en/N2565222"},
  {id:787,p:6,r:"경제",t:"GACA to Hold Future Aviation Forum 2026 in April",k:"GACA, 2026년 4월 미래항공포럼 개최",s:"SPA",c:"saudi",d:"2026-04-21",m:"Saudi General Authority of Civil Aviation will host the Future Aviation Forum 2026 in April, gathering global aviation leaders to discuss industry transformation, sustainable aviation fuels, and Saudi Vision 2030 aviation targets.",mk:"사우디 민간항공청(GACA)은 4월 2026 미래항공포럼을 개최하여 글로벌 항공업계 리더를 초빙해 항공산업 혁신, 지속가능 항공연료, 사우디 비전2030 항공 목표 등을 논의한다.",tg:["항공","GACA","포럼"],u:"https://www.spa.gov.sa/en/N2511250"},
  {id:788,p:6,r:"정세",t:"Eid Al Adha 2026: UAE set for six-day break as festival start dates predicted",k:"UAE, 2026 이드 알 아드하 6일 연휴 예정",s:"The National",c:"gulf",d:"2026-04-23",m:"UAE employees are set for a six-day holiday break for Arafat Day and Eid Al Adha at the end of May. Eid Al Adha is forecast to begin on Wednesday, May 27, combining four days of paid leave with the weekend.",mk:"UAE 근로자들은 5월 말 아라파트 데이와 이드 알 아드하를 맞아 6일간의 연휴를 보내게 된다. 이드 알 아드하는 5월 27일 수요일 시작 예정으로 4일 유급휴가와 주말이 결합된다.",tg:["UAE","이드","휴가"],u:"https://www.thenationalnews.com/news/uae/2026/04/23/eid-al-adha-2026-uae-set-for-six-day-break-as-festival-start-dates-predicted/"},
  {id:789,p:8,r:"정책발표",t:"Half of UAE government services to be powered by AI in two years",k:"UAE, 2년 내 정부 서비스 절반 AI로 제공",s:"The National",c:"gulf",d:"2026-04-23",m:"UAE Cabinet unveiled a plan whereby half of government services will be delivered through cutting-edge AI agents within two years, led by Sheikh Mohammed bin Rashid.",mk:"UAE 내각은 셰이크 무함마드 빈 라시드 주재 하에 향후 2년 내 정부 서비스의 절반을 첨단 AI 에이전트로 제공하겠다는 계획을 발표했다.",tg:["UAE","AI","정부"],u:"https://www.thenationalnews.com/news/uae/2026/04/23/uae-to-launch-new-ai-powered-government-model-within-two-years/"},
  {id:790,p:8,r:"주요경제",t:"First Abu Dhabi Bank and Emirates NBD report strong first-quarter earnings despite war uncertainty",k:"FAB·에미레이츠 NBD, 전쟁 불확실성에도 1분기 호실적",s:"The National",c:"gulf",d:"2026-04-23",m:"UAE largest lender FAB reported 5% annual operating income growth to Dh7.22bn, while Emirates NBD posted AED 8.2bn profit before tax (+6% y/y), underscoring banking sector resilience.",mk:"UAE 최대 은행 FAB는 영업이익이 전년 대비 5% 증가한 72.2억 디르함을 기록했고, 에미레이츠 NBD도 세전이익 82억 디르함(+6%)을 달성하며 전쟁 속에서도 은행 부문의 견조함을 입증했다.",tg:["은행","UAE","실적"],u:"https://www.thenationalnews.com/business/banking/2026/04/23/first-abu-dhabi-bank-and-emirates-nbd-report-strong-first-quarter-earnings-despite-war-uncertainty/"},
  {id:791,p:7,r:"헤드라인",t:"Saudi Arabia Mobilises Full Capacity for 2026 Hajj as Pilgrims Begin Arriving in Mecca and Medina",k:"사우디, 2026 하지 대응 총력…메카·메디나 순례객 도착 시작",s:"Gulf News",c:"gulf",d:"2026-04-22",m:"Saudi Arabia stepped up preparations for the 2026 Hajj season with Crown Prince directing authorities to deploy all capabilities to ensure a safe and smooth pilgrimage as arrivals begin.",mk:"사우디는 왕세자 지시에 따라 2026 하지 시즌에 대비한 모든 자원을 총동원해 안전하고 원활한 순례를 보장하고 있으며, 메카·메디나로 순례객 도착이 시작됐다.",tg:["하지","메카","왕세자"],u:"https://gulfnews.com/world/gulf/saudi/saudi-arabia-steps-up-preparations-for-hajj-2026-to-ensure-pilgrim-safety-1.500515267"},
  {id:792,p:6,r:"경제",t:"Emirates Islamic Q1 2026 Results: Operating Profit Rises to Dh1.1 Billion on Higher Financing and Deposits",k:"에미리츠 이슬라믹 Q1 2026, 대출·예금 증가로 영업이익 11억 디르함 기록",s:"Gulf News",c:"gulf",d:"2026-04-23",m:"Emirates Islamic reported Q1 2026 operating profit of Dh1.1 billion, up 7% as customers continued borrowing and depositing more. Net profit fell 16% to Dh900 million due to higher impairment charges amid regional volatility.",mk:"에미리츠 이슬라믹은 1분기 영업이익이 전년 대비 7% 증가한 11억 디르함을 기록했다고 발표했다. 다만 역내 변동성에 따른 충당금 적립 확대로 당기순이익은 16% 감소한 9억 디르함에 그쳤다.",tg:["UAE","은행","실적"],u:"https://gulfnews.com/business/banking/emirates-islamic-q1-2026-profit-rises-to-dh11-billion-1.500516602"},
  {id:793,p:7,r:"심층분석",t:"Emirates airline boss Tim Clark expects strong rebound from Iran war",k:"팀 클라크 에미레이츠 회장, 이란전 이후 강한 반등 예상",s:"The National",c:"gulf",d:"2026-04-23",m:"Emirates president Tim Clark forecast that Emirates will be the most profitable airline by end-2026, despite a subdued March, thanks to strong medium-term travel demand.",mk:"팀 클라크 에미레이츠 항공 사장은 3월 부진에도 불구하고, 중기 여행 수요의 견조함에 힘입어 2026년 말까지 에미레이츠가 세계 최고 수익성 항공사 자리를 차지할 것이라고 전망했다.",tg:["항공","UAE","이란전"],u:"https://www.thenationalnews.com/business/aviation/2026/04/23/emirates-airline-boss-tim-clark-expects-strong-rebound-from-iran-war/"},
  {id:794,p:10,r:"속보",t:"Iran war: What is happening on day 56 after Trump extended ceasefire?",k:"이란전 56일차, 트럼프 휴전 연장 이후 상황",s:"Al Jazeera",c:"me",d:"2026-04-24",m:"On day 56 of the conflict, Iranian FM Araghchi heads to Islamabad for mediated talks as Trump says he could make a deal but prefers an &quot;everlasting&quot; agreement. Ship traffic through Hormuz remains light.",mk:"이란전 56일차. 이란 아라그치 외무장관이 파키스탄 중재 협상을 위해 이슬라마바드로 이동하는 가운데, 트럼프는 &quot;지속 가능한&quot; 합의를 원한다며 협상 여유를 강조했다. 호르무즈 해협 선박 통행량도 여전히 저조하다.",tg:["이란전","휴전","파키스탄"],u:"https://www.aljazeera.com/news/2026/4/24/iran-war-whats-happening-on-day-56-after-trump-extended-ceasefire"},
  {id:795,p:9,r:"속보",t:"Iran war live: Araghchi to travel to Islamabad amid US talks deadlock",k:"이란전 라이브: 아라그치 이슬라마바드行…美 협상 교착",s:"Al Jazeera",c:"me",d:"2026-04-24",m:"Iran foreign minister Araghchi travels to Islamabad for talks amid deadlock with US, while Trump announces three-week extension to Israel-Lebanon ceasefire after White House meeting.",mk:"이란 아라그치 외무장관이 미국과의 협상 교착 속에 이슬라마바드로 향한다. 동시에 트럼프는 백악관 회담 후 이스라엘-레바논 휴전을 3주 연장한다고 발표했다.",tg:["이란전","레바논","휴전"],u:"https://www.aljazeera.com/news/liveblog/2026/4/24/iran-war-live-lebanon-truce-extended-trump-says-time-not-on-tehrans-side"},
  {id:796,p:9,r:"속보",t:"Iran war: What is happening on day 55 after Trump extended ceasefire?",k:"이란전 55일차, 휴전 연장 후 주요 쟁점",s:"Al Jazeera",c:"me",d:"2026-04-23",m:"On day 55, Hezbollah fires rockets at northern Israel accusing violations. Iran says US naval blockade remains the key obstacle to reopening Strait of Hormuz.",mk:"이란전 55일차, 헤즈볼라는 이스라엘의 휴전 위반을 이유로 북이스라엘에 로켓을 발사했다. 이란은 미국의 해상 봉쇄가 호르무즈 개방의 핵심 장애물이라고 주장했다.",tg:["이란전","헤즈볼라","호르무즈"],u:"https://www.aljazeera.com/news/2026/4/23/iran-war-whats-happening-on-day-55-after-trump-extended-ceasefire"},
  {id:797,p:7,r:"원유",t:"Oil prices surge past $103 a barrel after US announces blockade of Iran",k:"미국, 이란 봉쇄 발표에 유가 배럴당 103달러 돌파",s:"Al Jazeera",c:"me",d:"2026-04-13",m:"Oil prices surged past $103 per barrel after the US Central Command announced a naval blockade of all maritime traffic entering and exiting Iranian ports, signaling escalation of the conflict and major disruption to Middle East energy flows.",mk:"미국 중부사령부가 이란 항구에 진출입하는 모든 해상 교통에 대한 해군 봉쇄를 발표하자 유가가 배럴당 103달러를 돌파하며 급등했다. 분쟁 격화와 중동 에너지 흐름의 심각한 차질을 시사했다.",tg:["유가","이란","봉쇄"],u:"https://www.aljazeera.com/economy/2026/4/13/oil-prices-surge-past-103-a-barrel-after-us-announces-blockade-of-iran"},
  {id:798,p:6,r:"원유",t:"Energy prices may take months to normalise despite ceasefire: Analysts",k:"분석가들, 휴전에도 에너지 가격 정상화에는 수개월 소요 전망",s:"Al Jazeera",c:"me",d:"2026-04-10",m:"Energy analysts warn that oil and gas prices will take months to normalise despite the US-Iran ceasefire, citing severe shipping disruptions in the Strait of Hormuz, damaged infrastructure, and persistent geopolitical risk premium built into markets.",mk:"에너지 분석가들은 미-이란 휴전에도 불구하고 호르무즈 해협 선박 운항 차질, 인프라 피해, 시장에 고착된 지정학적 리스크 프리미엄 등으로 인해 유가·가스 가격의 정상화까지는 수개월이 소요될 것이라고 경고했다.",tg:["유가","휴전","정상화"],u:"https://www.aljazeera.com/economy/2026/4/10/energy-prices-may-take-months-to-normalise-despite-ceasefire-analysts"},
  {id:799,p:8,r:"헤드라인",t:"MBS, Swiss president discuss investment ties and cooperation",k:"MBS, 스위스 대통령과 투자 협력 논의",s:"Al Arabiya",c:"me",d:"2026-04-23",m:"Saudi Crown Prince Mohammed bin Salman met Swiss President Guy Parmelin in Jeddah. Switzerland signed an investment protection agreement with Saudi Arabia providing mutual safeguards against political risks.",mk:"무함마드 빈 살만 사우디 왕세자가 제다에서 기 파르믈랭 스위스 대통령과 회담했다. 스위스는 사우디와 투자보호협정에 서명해 양국 간 투자에 대한 정치적 리스크 보호 장치를 마련했다.",tg:["왕세자","스위스","투자"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/23/mbs-swiss-president-discuss-investment-ties-and-cooperation-"},
  {id:800,p:7,r:"정책발표",t:"Saudi Arabia condemns Israeli violations of Jerusalem holy sites",k:"사우디, 이스라엘의 예루살렘 성지 침범 강력 규탄",s:"Al Arabiya",c:"me",d:"2026-04-23",m:"Saudi Arabia condemned repeated Israeli settler and minister incursions into Al-Aqsa Mosque and the raising of the Israeli flag in its courtyards, calling for international action.",mk:"사우디는 이스라엘 정착민 및 장관들의 알아크사 모스크 반복 침입과 경내에서의 이스라엘 국기 게양을 강력 규탄하며, 국제사회의 대응을 촉구했다.",tg:["이스라엘","예루살렘","외교"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/23/saudi-arabia-condemns-israeli-violations-of-jerusalem-holy-sites-"},
  {id:801,p:7,r:"심층분석",t:"Zelenskyy says Ukraine has signed drone deals with three Gulf countries",k:"젤렌스키, 걸프 3국과 드론 협약 체결",s:"Al Arabiya",c:"me",d:"2026-04-23",m:"Ukrainian President Zelenskyy said Kyiv has signed three big security documents with Saudi Arabia, Qatar and the UAE focused on drone cooperation and defense capabilities.",mk:"젤렌스키 우크라이나 대통령은 사우디·카타르·UAE와 드론 협력 및 방위 역량에 초점을 맞춘 대규모 안보협정 3건을 체결했다고 밝혔다.",tg:["우크라이나","드론","안보"],u:"https://english.alarabiya.net/News/middle-east/2026/04/23/zelenskyy-says-ukraine-has-signed-drone-deals-with-gulf-states"},
  {id:802,p:6,r:"경제",t:"How Will Saudi Economy Shift Under PIF Strategy",k:"PIF 2026-2030 전략 아래 사우디 경제는 어떻게 재편되는가",s:"Al Arabiya",c:"me",d:"2026-04-16",m:"Analysis examines how the PIF 2026-2030 strategy will reshape Saudi Arabia economic trajectory, structuring investments into Vision, Strategic, and Financial portfolios focused on tourism, urban development, advanced manufacturing, logistics, clean energy, and NEOM.",mk:"PIF 2026-2030 전략이 사우디 경제 궤도를 어떻게 재편할지 분석한다. 투자 구조는 비전·전략·금융 3개 포트폴리오로 구성되며 관광·도시개발·첨단제조·물류·청정에너지·NEOM 등 6대 핵심 국내 에코시스템을 중점 지원한다.",tg:["PIF","전략","경제"],u:"https://english.alarabiya.net/webtv/media/2026/04/16/how-will-saudi-economy-shift-under-pif-strategy"},
  {id:803,p:10,r:"속보",t:"Brent oil price tops $103 with Hormuz shipping still disrupted during US-Iran ceasefire",k:"브렌트유 배럴당 103달러 돌파, 호르무즈 혼란 지속",s:"CNBC",c:"global",d:"2026-04-23",m:"Brent crude futures rose above $103 as Hormuz shipping remained severely disrupted. Traffic volumes are still far below pre-war levels of more than 100 vessels crossing daily.",mk:"호르무즈 해협의 해상 운송 차질이 이어지는 가운데 브렌트유 선물 가격이 배럴당 103달러를 돌파했다. 개전 전 하루 100척 이상이 지나던 해협의 선박 통행량은 여전히 크게 밑돌고 있다.",tg:["브렌트유","호르무즈","유가"],u:"https://www.cnbc.com/2026/04/23/oil-prices-edge-lower-with-no-progress-on-us-iran-talks-hormuz-shipping-still-disrupted.html"},
  {id:804,p:10,r:"속보",t:"US-Iran war evolves into naval standoff over Strait of Hormuz after both countries seize ships",k:"美-이란 호르무즈 해상 대치로 확대, 양측 선박 나포",s:"CNBC",c:"global",d:"2026-04-23",m:"The US-Iran conflict has evolved into a naval standoff over the Strait of Hormuz. Iran Revolutionary Guard seized two container ships, while the US imposes a blockade of Tehran ports.",mk:"미-이란 갈등이 호르무즈 해협을 둘러싼 해상 대치로 심화됐다. 이란 혁명수비대(IRGC)는 컨테이너선 2척을 나포했고, 미국은 이란 항구를 봉쇄 중이다.",tg:["호르무즈","IRGC","해상대치"],u:"https://www.cnbc.com/2026/04/23/iran-war-strait-hormuz-tanker-traffic-oil.html"},
  {id:805,p:9,r:"심층분석",t:"Oil exporters scramble for routes beyond Hormuz — but there are no easy options",k:"산유국, 호르무즈 우회로 모색…쉬운 대안 없어",s:"CNBC",c:"global",d:"2026-04-23",m:"Oil producers scramble for alternative pipeline routes as Hormuz disruption persists. Saudi Arabia East-West pipeline offers partial relief, but no easy substitutes exist for the global bottleneck.",mk:"호르무즈 봉쇄가 장기화되면서 산유국들이 대체 송유관을 모색하고 있다. 사우디의 동-서 송유관이 일부 완충 역할을 하지만, 세계적 병목을 완전히 대체할 쉬운 대안은 없다는 평가다.",tg:["송유관","호르무즈","원유"],u:"https://www.cnbc.com/2026/04/23/strait-hormuz-closure-alternative-routes-middle-east-oil-gas-pipelines.html"},
  {id:806,p:7,r:"원유",t:"Gold rises on bargain-hunting after one-week low, U.S.-Iran talks in focus",k:"금값, 저가매수세로 반등…미-이란 협상 주목",s:"CNBC",c:"global",d:"2026-04-22",m:"Gold prices rose on bargain-hunting after hitting a one-week low, with traders focused on US-Iran peace talks. Market volatility reflects uncertainty over ceasefire extension and whether negotiations can resume after earlier breakdown.",mk:"금값이 1주일 저점을 친 뒤 저가매수세 유입으로 반등했다. 트레이더들은 미-이란 평화 협상에 주목하고 있으며, 시장 변동성은 휴전 연장 및 앞선 협상 결렬 이후 재개 여부에 대한 불확실성을 반영한다.",tg:["금","안전자산","협상"],u:"https://www.cnbc.com/2026/04/22/gold-rises-as-oil-weakens-after-us-extends-ceasefire-with-iran.html"},
  {id:807,p:9,r:"속보",t:"Strait of Hormuz remains basically closed as Iran seizes ships after Trump ceasefire extension",k:"트럼프 휴전 연장에도 호르무즈 사실상 봉쇄 유지",s:"CNBC",c:"global",d:"2026-04-22",m:"Strait of Hormuz remains largely closed as Iran continues to seize ships despite Trump extending the ceasefire. Iran says US blockade violates deal terms.",mk:"트럼프의 휴전 연장에도 불구하고 호르무즈 해협은 사실상 봉쇄 상태를 유지하고 있다. 이란은 미국의 항만 봉쇄가 합의 위반이라며 선박 나포를 이어가고 있다.",tg:["호르무즈","이란","봉쇄"],u:"https://www.cnbc.com/2026/04/22/iran-war-strait-hormuz-tanker-ship-trump-blockade.html"},
  {id:808,p:7,r:"경제",t:"Trump extends Iran ceasefire — but market focus has already drifted elsewhere",k:"트럼프 이란 휴전 연장했으나 시장 관심은 이미 다른 곳으로",s:"CNBC",c:"global",d:"2026-04-22",m:"Markets showed a muted reaction to Trump ceasefire extension as investors grew skeptical of lasting resolution. Focus has shifted to inflation readings, Fed rate path, and earnings season rather than Middle East geopolitical risk premium.",mk:"트럼프 대통령의 휴전 연장에 시장은 미온적 반응을 보였다. 투자자들은 지속 가능한 해결을 의심하고 있으며, 관심은 중동 지정학적 리스크 프리미엄보다는 인플레이션 지표, 연준 금리 경로, 실적 시즌으로 이동했다.",tg:["시장","휴전","연준"],u:"https://www.cnbc.com/2026/04/22/markets-shrug-at-trumps-iran-ceasefire-extension.html"},
  {id:809,p:7,r:"경제",t:"Iran economy in charts: Hyperinflation and depreciating rial",k:"차트로 보는 이란 경제: 초인플레이션과 리알화 가치 폭락",s:"CNBC",c:"global",d:"2026-04-23",m:"CNBC analyzes Iran economy in charts, showing hyperinflation accelerating and the rial depreciating sharply as war disrupts oil exports and the US naval blockade chokes off revenue. IMF projects Iran GDP to shrink 6.1% in 2026 with 68.9% inflation.",mk:"CNBC는 차트 분석을 통해 이란 경제의 초인플레이션 가속화와 리알화 가치 급락을 보여주었다. 전쟁으로 석유 수출이 차질을 빚고 미 해상 봉쇄가 세입을 차단한 결과다. IMF는 2026년 이란 GDP가 6.1% 위축되고 인플레이션이 68.9%에 달할 것으로 전망했다.",tg:["이란","인플레이션","리알"],u:"https://www.cnbc.com/2026/04/23/iran-economy-war-charts-rial-oil-strait-hormuz-blockade.html"},
  {id:810,p:9,r:"속보",t:"Day 56 of Middle East conflict - Israel-Lebanon truce extended",k:"중동 분쟁 56일차: 이스라엘-레바논 휴전 연장",s:"CNN",c:"global",d:"2026-04-24",m:"Trump announced a 3-week extension of the Israel-Lebanon ceasefire following White House meetings. Iranian FM Araghchi will travel to Islamabad for Pakistan-mediated talks.",mk:"트럼프 대통령은 백악관 회담 후 이스라엘-레바논 휴전을 3주 연장한다고 발표했다. 이란 아라그치 외무장관은 파키스탄 중재 협상을 위해 이슬라마바드로 향한다.",tg:["레바논","휴전","트럼프"],u:"https://www.cnn.com/2026/04/24/world/live-news/iran-war-trump-israel-lebanon"},
  {id:811,p:8,r:"속보",t:"Day 55 of Middle East conflict - Israel-Lebanon truce extended",k:"중동 분쟁 55일차: 이스라엘-레바논 휴전 연장",s:"CNN",c:"global",d:"2026-04-23",m:"Day 55 of Middle East conflict with the Israel-Lebanon truce extended. Iran says US naval blockade remains the key obstacle to reopening the Strait of Hormuz.",mk:"중동 분쟁 55일차, 이스라엘-레바논 휴전이 연장됐다. 이란은 미국 해군의 해상 봉쇄가 호르무즈 재개방의 핵심 걸림돌이라고 거듭 주장했다.",tg:["레바논","휴전","이란"],u:"https://www.cnn.com/2026/04/23/world/live-news/iran-war-trump-blockade-israel-lebanon"},
  {id:812,p:6,r:"원유",t:"If the Iran war is over, when does everything go back to normal?",k:"이란전 종료 시 모든 것이 정상화되는 시점은 언제인가",s:"CNN",c:"global",d:"2026-04-18",m:"CNN analysis examines the path back to normal oil and gas prices even if the Iran war ends. Futures markets project Brent oil around $77 by year-end — but pre-war price levels are not expected until 2029 due to lasting infrastructure damage and reshaped supply routes.",mk:"CNN 분석은 이란전 종료 시 유가·가스 가격의 정상화 경로를 점검한다. 선물시장은 브렌트유가 연말까지 77달러 수준으로 내릴 것으로 전망하지만, 전쟁 전 수준 회복은 인프라 피해와 공급 경로 재편으로 인해 2029년까지 기대하기 어렵다.",tg:["유가","분석","정상화"],u:"https://www.cnn.com/2026/04/18/business/gas-oil-prices-economy-iran-war"},
  {id:813,p:8,r:"주요경제",t:"1350조 사우디 국부펀드 새 전략, AI·광물에 집중 투자",k:"1350조원 사우디 국부펀드, AI·광물 집중 투자 새 전략",s:"서울경제",c:"korean-view",d:"2026-04-15",m:"Saudi Arabia PIF worth about 1,348 trillion won unveiled its 2026-2030 investment strategy at a Riyadh conference, concentrating investments in mining, AI, and tourism.",mk:"약 1,348조 원 규모의 사우디 국부펀드(PIF)가 리야드 컨퍼런스에서 2026~2030 투자 전략을 공개하고, 광물·AI·관광 분야에 집중 투자할 계획이라고 밝혔다.",tg:["PIF","AI","광물"],u:"https://m.sedaily.com/amparticle/20007195"},
  {id:814,p:7,r:"주요경제",t:"대우건설, 중동 지역 재건 사업 기대감과 해외 원전 수주 모멘텀",k:"대우건설, 중동 재건·해외 원전 기대감에 급등",s:"한국경제",c:"korean-view",d:"2026-04-08",m:"Daewoo E&amp;C surged on expectations of post-war Middle East reconstruction projects and overseas nuclear plant contract momentum following US-Iran ceasefire progress.",mk:"대우건설은 미·이란 휴전 진전에 따른 중동 전후 재건 사업 참여 기대감과 해외 원전 수주 모멘텀이 부각되며 급등세를 기록했다.",tg:["대우건설","재건","원전"],u:"https://eureka.hankyung.com/insight/detail/17345"},
  {id:815,p:6,r:"심층분석",t:"흥아해운 급등 이유, 중동 리스크가 만든 기회",k:"흥아해운 급등, 중동 리스크의 역설적 기회",s:"한국경제",c:"korean-view",d:"2026-04-10",m:"Heung-A Shipping surged as Middle East shipping disruptions from Iran war increased demand for alternative routes, with Korean shipping firms benefiting from Hormuz bottleneck.",mk:"이란전에 따른 중동 해상 운송 차질로 대체 항로 수요가 증가하면서 흥아해운 등 한국 해운사들이 호르무즈 병목의 수혜를 입으며 주가가 급등했다.",tg:["해운","중동","주식"],u:"https://eureka.hankyung.com/insight/detail/17025"},
  {id:816,p:8,r:"헤드라인",t:"사우디, 호르무즈 봉쇄에 내달 對중국 원유 수출 반토막",k:"사우디, 호르무즈 봉쇄로 5월 對중국 원유 수출 반토막",s:"뉴스1",c:"korean-view",d:"2026-04-13",m:"Saudi Arabia crude oil exports to China will halve next month to about 20 million barrels due to Hormuz blockade, as the Iran war disrupts global oil flows.",mk:"사우디 아라비아의 대중국 원유 수출이 다음 달 약 2,000만 배럴로 반토막 날 것으로 예상된다. 이란전에 따른 호르무즈 봉쇄로 글로벌 원유 물류가 흔들리고 있다.",tg:["사우디","중국","원유"],u:"https://www.news1.kr/world/middleeast-africa/6134778"},
  {id:817,p:7,r:"심층분석",t:"최혜진·윤이나·방신실·이동은…한국 톱랭커 23명 사우디 대거 출격",k:"LPGA 한국 톱랭커 23명 사우디 대회 대거 출격",s:"서울경제",c:"korean-view",d:"2026-04-15",m:"A record 23 top-ranked Korean LPGA golfers including Choi Hye-jin, Yoon Yina and Bang Shin-sil will compete in Saudi Arabia tournaments thanks to LPGA schedule changes.",mk:"LPGA 일정 변경으로 인해 최혜진, 윤이나, 방신실, 이동은 등 한국 톱랭커 23명이 사우디 대회에 대거 출전한다. 지난해 7명에 비해 대폭 늘어난 규모다.",tg:["LPGA","골프","한국"],u:"https://www.sedaily.com/NewsView/2K774IZQCF"},
  {id:818,p:9,r:"주요",t:"Saudi digital readiness hits 76.04% as government accelerates emerging tech adoption",k:"사우디 디지털 준비도 76.04% 달성…정부, 신흥기술 도입 가속",s:"Saudi Gazette",c:"saudi",d:"2026-04-23",m:"Saudi Digital Government Authority announced digital readiness of 54 government entities reached 76.04%, up from 74.69% in 2025.",mk:"사우디 디지털정부청은 2026년 54개 정부기관의 디지털 준비도가 전년 74.69%에서 76.04%로 상승했다고 발표. 내무부·에너지부·우주기술위가 상위권을 차지하며 Vision 2030 디지털 전환 성과 확인.",tg:["디지털","Vision2030","정부","기술"],u:"https://saudigazette.com.sa/article/660778/saudi-arabia/saudi-digital-readiness-hits-7604-as-government-accelerates-emerging-tech-adoption"},
  {id:819,p:7,r:"",t:"Absher carries out over 43.5 million electronic transactions in March",k:"사우디 Absher, 3월 전자거래 4,350만 건 돌파",s:"Saudi Gazette",c:"saudi",d:"2026-04-22",m:"Absher digital platform processed 43.5 million transactions in March 2026, reflecting rising e-government adoption across Saudi Arabia.",mk:"내무부 Absher 전자정부 플랫폼이 2026년 3월 한 달 간 4,350만 건 이상의 전자거래를 처리. 사우디의 디지털 행정 확산과 시민 편의성 향상 추세 반영.",tg:["디지털","정부","Absher"],u:"https://saudigazette.com.sa/article/660732/saudi-arabia/absher-carries-out-over-435-million-electronic-transactions-in-march"},
  {id:820,p:8,r:"",t:"World Economic Forum reschedules Global Growth Meeting in Jeddah",k:"WEF, 제다 글로벌 성장 회의 연기",s:"Saudi Gazette",c:"saudi",d:"2026-04-20",m:"WEF rescheduled its Global Collaboration and Growth Meeting in Jeddah, originally set for April 22-23, to a later date amid regional tensions.",mk:"세계경제포럼(WEF)이 4월 22-23일 제다에서 개최 예정이던 글로벌 협력·성장 회의를 중동 긴장 고조로 인해 연기. 사우디가 글로벌 대화 플랫폼 역할 추진 중 차질.",tg:["WEF","외교","제다","Vision2030"],u:"https://saudigazette.com.sa/article/659968/saudi-arabia/world-economic-forum-reschedules-its-global-collaboration-and-growth-meeting-in-jeddah-to-a-later-date"},
  {id:821,p:7,r:"",t:"Saudi Arabia to localize 41 professions in tourism sector",k:"사우디, 관광산업 41개 직종 자국민화",s:"Saudi Gazette",c:"saudi",d:"2026-04-10",m:"Saudization of 41 tourism professions including hotel manager and receptionist begins phase 1 on April 22, 2026, with final phase January 2028.",mk:"사우디 관광부, 호텔 매니저·리셉셔니스트 등 41개 관광 직종 자국민화(Saudization) 1단계를 4월 22일 시작. 2028년 1월 최종 단계 완료 예정. 민간 관광시설 모두 적용.",tg:["관광","Saudization","고용","Vision2030"],u:"https://saudigazette.com.sa/article/651134/SAUDI-ARABIA/Saudi-Arabia-to-localize-41-professions-in-tourism-sector-including-hotel-manager-and-receptionist"},
  {id:822,p:9,r:"주요",t:"PIF anchors State Street&apos;s new Saudi equity ETF",k:"PIF, 스테이트스트리트 사우디 주식 ETF 앵커 투자",s:"Public Investment Fund",c:"saudi",d:"2026-04-22",m:"PIF becomes anchor investor in State Street&apos;s newly launched Saudi equity ETF, further expanding international access to Saudi market opportunities.",mk:"공공투자펀드(PIF), 스테이트스트리트가 신규 출시한 사우디 주식 ETF에 앵커 투자자로 참여. 사우디 자본시장에 대한 외국인 접근성 확대 및 Vision 2030 재원 조달 채널 다변화.",tg:["PIF","투자","ETF","자본시장"],u:"https://www.pif.gov.sa/en/news-and-insights/press-releases/2026/pif-anchors-state-street-newly-launched-saudi-equity-etf-further-expanding-international-access-to-investment-opportunities-within-saudi-arabia/"},
  {id:823,p:10,r:"주요",t:"Saudi Aramco Q1 2026 profit forecast to rise on higher oil prices",k:"사우디 아람코, Q1 2026 순이익 56.7% QoQ 증가 전망",s:"Zawya/TradingView",c:"saudi",d:"2026-04-23",m:"AlJazira Capital forecasts Aramco Q1 2026 net profit at SAR 108.8B ($29.01B), up 13.8% YoY and 56.7% QoQ, driven by 24.8% oil price surge.",mk:"알자지라 캐피탈은 아람코 Q1 2026 순이익을 전년 대비 13.8%, 전분기 대비 56.7% 증가한 1,088억 사우디리얄(290억 달러)로 전망. 유가 24.8% 급등이 하루 60만 배럴 감산 영향 상쇄.",tg:["아람코","실적","원유","Q1"],u:"https://www.tradingview.com/news/reuters.com,2026-04-23:newsml_Zaw8nhHQp:0-zawya-saudi-aramco-q1-2026-profit-forecast-to-rise-on-higher-oil-prices/"},
  {id:824,p:8,r:"",t:"Aramco Q1 2026: 57% profit surge on 30% less oil — the war price paradox",k:"아람코 Q1: 생산 30% 줄어도 이익 57% 급증…전쟁 유가 역설",s:"House of Saud",c:"saudi",d:"2026-04-23",m:"Analysts note Aramco paradox — production down 30% due to OPEC+ cuts and war disruption, but profits up 57% as war-driven prices exceed $100/bbl.",mk:"분석가들은 아람코가 OPEC+ 감산과 전쟁 혼란으로 생산이 30% 감소했음에도 배럴당 100달러를 넘는 전쟁 유가 덕분에 이익이 57% 급증하는 역설적 상황을 지적. 사우디 재정에 양날의 검.",tg:["아람코","원유","OPEC","재정"],u:"https://houseofsaud.com/aramco-q1-2026-war-price-paradox/"},
  {id:825,p:8,r:"",t:"PIF Governor reviews the fund&apos;s journey and highlights 2026-2030 strategy",k:"PIF 총재, 펀드 여정 회고 및 2026-2030 전략 발표",s:"SPA (Saudi Press Agency)",c:"saudi",d:"2026-04-16",m:"PIF Governor Al-Rumayyan reviewed the fund&apos;s transformation highlighting $243B contribution to non-oil GDP (2021-24) and new 2026-2030 strategy focus.",mk:"야시르 알 루마이얀 PIF 총재, 2021-2024년 비석유 GDP에 2,430억 달러 기여 실적 강조. 2026-2030 전략은 3개 포트폴리오·6개 생태계(관광·도시·제조·물류·재생에너지·NEOM)로 재편.",tg:["PIF","전략","Vision2030","비석유"],u:"https://www.spa.gov.sa/en/N2562977"},
  {id:826,p:7,r:"",t:"NEOM in 2026: What is actually being built",k:"NEOM 2026: 실제로 무엇이 지어지고 있나",s:"House of Saud",c:"saudi",d:"2026-04-20",m:"Status update on NEOM gigaprojects — The Line timeline deprioritized while Oxagon port and logistics hub advance as commercially viable pillar.",mk:"NEOM 기가프로젝트 현황 점검. The Line은 2030년 완공 목표에서 후순위로 밀린 반면, Oxagon 항만·물류 허브는 상업적 실행 가능성이 입증되며 핵심 기둥으로 부상.",tg:["NEOM","Vision2030","기가프로젝트","The Line"],u:"https://houseofsaud.com/neom-2026-the-line-saudi-arabia-status-update/"},
  {id:827,p:7,r:"",t:"Saudi Arabia scales back Red Sea luxury resort plans amid reassessment",k:"사우디, 홍해 럭셔리 리조트 계획 축소 재조정",s:"Daily Sabah",c:"saudi",d:"2026-04-18",m:"Kingdom scales back Red Sea Destination luxury resort plans as PIF 2026-2030 strategy shifts focus to AI infrastructure and more commercially viable projects.",mk:"사우디, 홍해 럭셔리 리조트 프로젝트 규모 축소. PIF 2026-2030 전략이 AI 인프라와 상업성 높은 프로젝트로 투자 우선순위를 재편하면서 기가프로젝트 구조조정 본격화.",tg:["홍해","관광","PIF","Vision2030"],u:"https://www.dailysabah.com/world/mid-east/saudi-arabia-scales-back-red-sea-luxury-resort-plans-amid-reassessment"},
  {id:828,p:6,r:"",t:"Top 10 Saudi stocks to watch for April 2026",k:"2026년 4월 주목할 사우디 10대 종목",s:"Naga",c:"saudi",d:"2026-04-01",m:"Analyst picks for Saudi Tadawul in April 2026 highlight Aramco, Al Rajhi Bank, STC and Saudi Electricity as defensive plays amid war volatility.",mk:"사우디 타다울(TASI) 2026년 4월 주목 종목 분석. 전쟁 변동성 속 아람코·알 라지히 은행·STC·사우디 전력공사 등이 방어적 투자처로 부각. TASI 1만 1,268포인트 수준.",tg:["주식","Tadawul","투자"],u:"https://naga.com/en/academy/best-saudi-stocks"},
  {id:829,p:8,r:"",t:"Aquarabia water theme park in Qiddiya City to open on April 23",k:"키디야시티 Aquarabia 워터파크, 4월 23일 개장",s:"Arab News",c:"saudi",d:"2026-04-23",m:"Aquarabia Qiddiya City, billed as Middle East&apos;s largest water park, opens April 23 with 22 rides including four world-record-breaking attractions.",mk:"중동 최대 규모 워터파크 Aquarabia가 4월 23일 키디야시티에서 개장. 22개의 라이드 운영, 세계 기록 경신 어트랙션 4종 포함. 사우디 엔터테인먼트 섹터 확장과 Vision 2030 관광 목표 기여.",tg:["관광","키디야","Vision2030","엔터테인먼트"],u:"https://www.arabnews.com/node/2638760/saudi-arabia"},
  {id:830,p:8,r:"",t:"Makkah entry permits required starting April 23 ahead of Hajj 2026",k:"메카 진입 허가 4월 23일부터 시행…Hajj 2026 준비",s:"Arab News",c:"saudi",d:"2026-04-13",m:"Saudi Arabia enforces Makkah entry permits from April 23, 2026. Residents must obtain authorization to enter holy city as Hajj preparations accelerate.",mk:"사우디, Hajj 2026 준비 단계에서 4월 23일부터 메카 진입 허가제 시행. 왕국 내 거주자도 당국에서 발급한 허가증을 받아야 메카 진입 가능. 성지 안전 확보 목적.",tg:["메카","Hajj","안전","성지"],u:"https://www.arabnews.com/node/2596847/saudi-arabia"},
  {id:831,p:7,r:"",t:"Saudia launches Hajj 2026 operations with over one million seats for pilgrims",k:"사우디아 항공, Hajj 2026 운영 개시…100만석 이상 순례객 수송",s:"NewsFileCorp",c:"saudi",d:"2026-04-20",m:"Saudia dedicates 160-aircraft fleet with 1M+ seats across domestic and international network for Hajj 2026, serving pilgrims from 145 destinations.",mk:"사우디아 항공이 Hajj 2026 운영을 4월 20일 개시. 160대 항공기 투입하여 국내외 네트워크에 100만 석 이상 배정. 전 세계 145개 목적지에서 순례객 수송. 한국 포함 주요국 연결편 운영.",tg:["사우디아","Hajj","항공","순례"],u:"https://www.newsfilecorp.com/release/293343/Saudia-Launches-Hajj-2026-Operations-with-Over-One-Million-Seats-for-Pilgrims"},

  {id:843,p:9,r:"주요",t:"IDF strikes in Gaza kill six Palestinians, including three children",k:"IDF 가자 공습, 팔레스타인 6명 사망 (어린이 3명 포함)",s:"Haaretz",c:"me",d:"2026-04-23",m:"Israeli Health Ministry reports IDF drone strike on mosque in northern Gaza killed six Palestinians, including three children. Additional strikes in Maghazi.",mk:"이스라엘 보건부 발표에 따르면 IDF의 가자 북부 모스크 드론 공격으로 팔레스타인인 6명(어린이 3명 포함) 사망. 마가지 난민캠프 민간 차량 공격으로 민방위 대원 2명 포함 3명 추가 사망.",tg:["가자","IDF","팔레스타인","어린이"],u:"https://www.haaretz.com/israel-news/israel-security/2026-04-23/ty-article/.premium/idf-strikes-in-gaza-kill-six-including-three-children-health-ministry-says/0000019d-bb7d-db2b-adfd-ff7ff21a0000"},

  {id:849,p:7,r:"",t:"2026 Strait of Hormuz crisis — overview",k:"2026년 호르무즈 해협 위기 종합",s:"Wikipedia",c:"global",d:"2026-04-22",m:"US imposed naval blockade on Iran April 13. Iran closed Strait of Hormuz April 18. Dual blockade paralyzing 20M bpd oil and LNG flows.",mk:"미국은 4월 13일 이란 해상 봉쇄 개시. 이란은 4월 18일 호르무즈 해협 재폐쇄. 미-이란 이중 봉쇄로 하루 2,000만 배럴 원유와 주요 LNG 물동량 마비. 1979년 이후 최대 에너지 위기.",tg:["호르무즈","봉쇄","이란","위기"],u:"https://en.wikipedia.org/wiki/2026_Strait_of_Hormuz_crisis"},

  {id:852,p:8,r:"",t:"Israel-Lebanon ceasefire extended by three weeks, Trump says",k:"이스라엘-레바논 휴전 3주 연장…트럼프 발표",s:"Axios",c:"global",d:"2026-04-23",m:"Trump announces 3-week extension of Israel-Lebanon ceasefire after White House talks with both sides&apos; ambassadors. Aims to protect Iran deal efforts.",mk:"트럼프, 양측 대사와 백악관 회동 후 이스라엘-레바논 10일 휴전을 3주 연장 발표. 이스라엘-레바논 직접 평화 협상 진전과 이란과의 협상 보호 목적. 네타냐후·아운 대통령과 대면 회담 추진.",tg:["이스라엘","레바논","휴전","트럼프"],u:"https://www.axios.com/2026/04/23/trump-israel-lebanon-ceasefire-extended-talks-us-iran-war"},
  {id:853,p:6,r:"",t:"UAE and Gulf states launch emergency visa extensions amid Hormuz crisis",k:"UAE·걸프 국가, 호르무즈 위기 속 긴급 비자 연장 시행",s:"Travel And Tour World",c:"global",d:"2026-04-22",m:"UAE, Qatar, Oman, Saudi, Bahrain, Jordan, Turkey, India roll out automatic 30-day visa extensions for stranded travelers amid airspace closures.",mk:"UAE·카타르·오만·사우디·바레인·요르단·튀르키예·인도, 호르무즈 위기로 발 묶인 여행객에게 자동 30일 비자 연장 제공. 항공 교통 혼란 속 대규모 체류 여행객 지원.",tg:["비자","여행","UAE","걸프"],u:"https://www.travelandtourworld.com/news/article/uae-joins-qatar-oman-saudi-arabia-bahrain-jordan-turkey-and-india-in-rolling-out-emergency-visa-extensions-and-support-to-all-abandoned-travellers-as-strait-of-hormuz-crisis-disrupts-further-glob/"},
  {id:854,p:7,r:"",t:"PIF New Strategy 2026–2030: Business Opportunities for Foreign Investors",k:"PIF 2026-2030 신전략: 외국인 투자자 비즈니스 기회",s:"Analytix",c:"global",d:"2026-04-18",m:"Analysis of PIF 2026-2030 strategy reorganizing $1T+ assets into Vision/Strategic/Financial portfolios with 6 ecosystem priorities and foreign investor opportunities.",mk:"PIF 2026-2030 신전략 분석: 1조 달러 이상 자산을 Vision·Strategic·Financial 3개 포트폴리오와 6개 우선 생태계로 재편. 외국인 투자자에게 열리는 AI 인프라·재생에너지·물류 기회 제시.",tg:["PIF","투자","전략","외국인"],u:"https://analytix.sa/pif-new-strategy-2026-2030-saudi-arabia/"},
  {id:855,p:7,r:"",t:"Aramco, ADNOC, QatarEnergy face new constraints as war impacts Gulf production",k:"아람코·ADNOC·카타르에너지, 전쟁으로 생산 제약 직면",s:"Al-Monitor",c:"global",d:"2026-04-20",m:"Gulf NOCs that aggressively expanded international portfolios now face constraints as US-Israel-Iran war exposes structural risks in regional production.",mk:"최근 수년간 공격적으로 해외 포트폴리오 확장해온 걸프 국영석유사(아람코·ADNOC·카타르에너지)가 미-이스라엘-이란 전쟁으로 구조적 리스크에 직면. 걸프 생산 차질 확산.",tg:["아람코","ADNOC","카타르에너지","전쟁"],u:"https://www.al-monitor.com/saudi-arabia"},
  {id:856,p:9,r:"주요",t:"Saudi·UAE shift to hardline response, open US military bases, freeze Iran assets",k:"사우디·UAE 강경대응 선회…美에 군사기지 개방·이란자산 동결",s:"Korean Center",c:"korean-view",d:"2026-04-22",m:"Saudi and UAE shift to hardline response — opening US military bases and freezing Iranian assets. Gulf states deepening involvement in US-Israel-Iran war.",mk:"사우디아라비아와 UAE가 이란전에 강경대응으로 선회. 미국에 군사기지 개방하고 이란 자산 동결 조치 단행. 걸프 국가들이 미-이스라엘-이란 전쟁에 점차 깊이 관여하는 방향으로 전환. 한국 에너지·건설 기업 연쇄 영향 주목.",tg:["사우디","UAE","이란전","강경대응"],u:"https://www.koreancenter.or.kr/news/articleView.html?idxno=1328730"},
  {id:857,p:8,r:"",t:"US-Iran ceasefire extended indefinitely, Hormuz blockade prolonged",k:"美·이란 휴전 무기한 연장…호르무즈 봉쇄 장기화",s:"Global Economic",c:"korean-view",d:"2026-04-22",m:"Trump extended US-Iran ceasefire indefinitely, but naval blockade continues. Hormuz Strait closure becoming protracted, raising concerns for Korean energy supply.",mk:"트럼프 대통령이 미-이란 휴전을 무기한 연장 발표했으나 해상 봉쇄는 지속. 호르무즈 해협 폐쇄 장기화되며 원유 수입의 95%를 호르무즈에 의존하는 한국 에너지 안보에 적신호. 정부 비상 대응 필요.",tg:["미국","이란","휴전","호르무즈"],u:"https://www.g-enews.com/article/Global-Biz/2026/04/2026042217202741412bd56fbc3c_1"},
  {id:858,p:9,r:"주요",t:"US-Iran Hormuz negotiations resume — Korea&apos;s energy security task",k:"美-이란 호르무즈 협상 재개와 한국의 에너지 안보 과제",s:"전국인력신문",c:"korean-view",d:"2026-04-20",m:"Analysis of US-Iran Hormuz negotiations and implications for Korea&apos;s energy security, with 70.7% oil dependence on Middle East and 95% via Hormuz.",mk:"미-이란 호르무즈 협상 재개와 한국의 에너지 안보 과제 심층 분석. 한국은 원유 수입의 70.7%를 중동에 의존하고 수입 원유의 95%가 호르무즈 해협을 통과하는 구조. 에너지 공급선 다변화·전략비축 확충 시급.",tg:["한국","에너지안보","호르무즈","원유"],u:"https://www.kjob.news/news/483105"},
  {id:859,p:8,r:"",t:"2026 Hormuz crisis: real impact on Korean economy",k:"2026년 호르무즈 해협 위기가 한국 경제에 미치는 실질적 영향",s:"워니블",c:"korean-view",d:"2026-04-10",m:"Brent rose 8% to $102-103 at market open, WTI +9.15% near $105. Oil +10% raises Korean manufacturing costs 0.71%; petroleum +6.30%, chemicals +1.59%.",mk:"브렌트유 개장 시 8% 상승해 102-103달러대 기록, WTI 선물 9.15% 상승해 105달러 근접. 국제유가 10% 상승 시 국내 제조업 평균 생산비용 0.71% 증가. 석유제품 6.30%, 화학제품 1.59% 비용 부담.",tg:["한국","경제","호르무즈","제조업"],u:"https://won.ai.kr/2026/04/10/hormuz-strait-korea-economy-2026/"},
  {id:860,p:7,r:"",t:"Iran Chabahar port: 4 Iranian vessels break US blockade",k:"이란 차바하르 항구: 이란 선박 4척 미국 봉쇄 돌파",s:"Pravda Korea",c:"korean-view",d:"2026-04-24",m:"Satellite imagery shows 9 vessels at Iran&apos;s Chabahar port April 23 vs 5 on April 21, suggesting 4 Iranian ships broke through US naval blockade.",mk:"위성 사진 분석 결과 이란 차바하르 항구에 4월 21일 5척이던 선박이 4월 23일 9척으로 증가. 이란 선박 4척이 미국 해상 봉쇄를 뚫고 진입한 것으로 추정. 봉쇄 완전성 의문 제기.",tg:["이란","차바하르","봉쇄","위성"],u:"https://korea.news-pravda.com/world/2026/04/24/63792.html"},
  {id:861,p:7,r:"",t:"Hyundai E&C wins $389M Saudi 380kV transmission line project",k:"현대건설, 사우디 3.89억 달러 380kV 송전선로 프로젝트 수주",s:"Hyundai Motor Group",c:"korean-view",d:"2026-04-15",m:"Hyundai E&C won Saudi Electricity Company 380kV transmission line project worth ~$389M (KRW 512.5B) connecting solar generation to grid.",mk:"현대건설이 사우디 전력청(SEC) 발주 &apos;태양광 발전 연계 380㎸ 송전선로 건설 프로젝트&apos; 수주 (약 3.89억 달러, 5,125억 원). 한국 건설사의 사우디 에너지 인프라 참여 확대 및 Vision 2030 재생에너지 전환 기여.",tg:["현대건설","사우디","송전","재생에너지"],u:"https://www.hyundaimotorgroup.com/ko/news/CONT0000000000169707"},
  {id:862,p:9,r:"주요경제",t:"Saudi Aramco Q1 2026 profit forecast to rise on higher oil prices",k:"아람코 1분기 순이익 109조원 전망…유가 상승 영향",s:"Reuters",c:"saudi",d:"2026-04-23",m:"Saudi Aramco Q1 2026 net profit expected to rise 13.8% YoY and 56.7% QoQ to SAR 108.8B ($29.0B) on 24.8% QoQ surge in crude oil prices despite lower production.",mk:"사우디 아람코 1분기 순이익은 유가가 전분기 대비 24.8% 급등한 영향으로 전년 동기 대비 13.8%, 전분기 대비 56.7% 증가한 1,088억 리얄(290억 달러)에 이를 전망이다.",tg:["아람코","실적","유가"],u:"https://www.reuters.com/business/energy/saudi-aramco-q1-2026-profit-forecast-2026-04-23/"},
  {id:863,p:10,r:"헤드라인",t:"Saudi Arabia&apos;s Hormuz Oil Bypass Is Yet to Maintain Full Exports",k:"사우디 호르무즈 우회 송유관, 목표 수출량 80% 수준 그쳐",s:"Bloomberg",c:"saudi",d:"2026-04-24",m:"Saudi Arabia&apos;s shipments from Yanbu averaged 4 million bpd in first three weeks of April—five times pre-war levels but only ~80% of Riyadh&apos;s target through Red Sea bypass route.",mk:"사우디는 4월 첫 3주간 얀부 항구를 통해 일평균 400만 배럴을 수출했다. 전쟁 전의 5배 수준이지만 홍해 우회 경로의 목표치 대비 약 80%에 머물고 있다.",tg:["호르무즈","얀부","수출"],u:"https://www.bloomberg.com/news/articles/2026-04-24/saudi-arabia-s-hormuz-oil-bypass-is-yet-to-maintain-full-exports"},
  {id:864,p:8,r:"주요외교",t:"Saudi Crown Prince MBS welcomes UK PM Starmer",k:"사우디 왕세자, 영국 스타머 총리 영접",s:"Al Arabiya",c:"saudi",d:"2026-04-09",m:"Saudi Crown Prince Mohammed bin Salman welcomed UK Prime Minister Keir Starmer in a meeting focused on bilateral cooperation amid the regional security situation.",mk:"무함마드 빈 살만 왕세자가 영국 키어 스타머 총리를 영접하고 역내 안보 상황 속 양자 협력 방안을 논의했다.",tg:["영국","왕세자","외교"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/09/saudi-crown-prince-mbs-welcomes-uk-pm-starmer"},
  {id:865,p:8,r:"주요경제",t:"IMF Chief: Saudi economy demonstrates robust performance as it advances diversification",k:"IMF 총재 \"사우디 경제, 다각화 진전 속 견고한 성과 입증\"",s:"Saudi Gazette",c:"saudi",d:"2026-04-21",m:"IMF Managing Director said Saudi economy demonstrates robust performance as it advances economic diversification, despite regional headwinds from the Iran war.",mk:"IMF 총재는 이란 전쟁발 역내 역풍에도 사우디 경제가 경제 다각화를 추진하며 견고한 성과를 입증하고 있다고 평가했다.",tg:["IMF","다각화","성과"],u:"https://saudigazette.com.sa/article/658834"},
  {id:866,p:7,r:"주요경제",t:"Alswaha: Value of Saudi digital economy reaches $140 billion",k:"알스와하 장관 \"사우디 디지털 경제 1,400억 달러 도달\"",s:"Saudi Gazette",c:"saudi",d:"2026-04-20",m:"Saudi Communications Minister Abdullah Alswaha said value of Saudi digital economy reached nearly $140 billion, accounting for over 50% of MENA digital growth.",mk:"압둘라 알스와하 사우디 통신부 장관은 사우디 디지털 경제 가치가 약 1,400억 달러에 달하며 MENA 지역 디지털 성장의 50% 이상을 차지한다고 밝혔다.",tg:["디지털경제","ICT","MENA"],u:"https://saudigazette.com.sa/article/658860"},
  {id:867,p:8,r:"주요외교",t:"MBS hosts Sudan&apos;s Burhan in Jeddah as $1.5B Saudi-backed arms deal stalls",k:"사우디 왕세자, 제다서 수단 부르한 회담…15억 달러 무기 거래 보류",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-20",m:"Saudi Crown Prince met Sudan&apos;s army chief al-Burhan in Jeddah, discussing Sudan&apos;s sovereignty and stability amid stalled $1.5B Pakistan-Sudan arms agreement following Saudi cancellation request.",mk:"사우디 왕세자는 제다에서 압델 파타 알부르한 수단 군 사령관과 회담하여 사우디 측의 취소 요청 이후 보류된 15억 달러 규모 파키스탄-수단 무기 거래 속 수단의 주권과 안정을 논의했다.",tg:["수단","왕세자","무기거래"],u:"https://english.aawsat.com/gulf/sudan-burhan-jeddah"},
  {id:868,p:7,r:"주요경제",t:"PIF to unveil new strategy within weeks as Saudi economy remains resilient, Al-Rumayyan says",k:"알루마이얀 \"PIF 신전략 수주 내 발표…사우디 경제는 회복력 유지\"",s:"Saudi Gazette",c:"saudi",d:"2026-04-13",m:"PIF Governor Al-Rumayyan said the Public Investment Fund will unveil its new five-year strategy within weeks while reaffirming Saudi economy remains strong, stable and resilient.",mk:"PIF 야시르 알루마이얀 총재는 PIF가 신규 5개년 전략을 수주 내 발표할 예정이라며 사우디 경제는 강하고 안정적이며 회복력 있는 상태를 유지하고 있다고 밝혔다.",tg:["PIF","전략","경제"],u:"https://saudigazette.com.sa/article/660028"},
  {id:869,p:8,r:"주요경제",t:"SPA: Crown Prince Mohammed bin Salman receives Ukrainian President Zelenskyy in Jeddah",k:"SPA: 왕세자, 제다서 우크라이나 젤렌스키 대통령 영접",s:"SPA",c:"saudi",d:"2026-04-18",m:"Saudi Press Agency reported Crown Prince Mohammed bin Salman received Ukrainian President Volodymyr Zelenskyy in Jeddah, discussing bilateral cooperation and regional security.",mk:"사우디 통신은 무함마드 빈 살만 왕세자가 제다에서 우크라이나 볼로디미르 젤렌스키 대통령을 영접하고 양자 협력 및 역내 안보 문제를 논의했다고 보도했다.",tg:["우크라이나","왕세자","제다"],u:"https://www.spa.gov.sa/en/N2237891"},
  {id:870,p:9,r:"주요경제",t:"UAE economy highly resilient, ambassador to US says after Trump discusses possible currency swap",k:"UAE 주미 대사 \"UAE 경제 회복력 매우 강해\"…트럼프 통화 스왑 거론",s:"The National",c:"gulf",d:"2026-04-21",m:"UAE Ambassador to US Yousef Al Otaiba said UAE is one of world&apos;s most financially resilient economies—$2T+ sovereign assets, $300B+ reserves, $1.5T banking deposits—after Trump raised currency swap.",mk:"UAE 유세프 알 오타이바 주미 대사는 트럼프가 통화 스왑을 거론한 후 UAE가 2조 달러 이상 국부 자산, 3,000억 달러 이상 외환보유액, 1.5조 달러 은행 예금을 보유한 세계에서 가장 회복력 있는 경제 중 하나라고 강조했다.",tg:["UAE","통화스왑","회복력"],u:"https://www.thenationalnews.com/news/us/2026/04/21/uae-economy-highly-resilient-ambassador-to-us-says-after-trump-discusses-potential-currency-swap/"},
  {id:871,p:8,r:"주요경제",t:"UAE and China sign initial pact to boost investment flows",k:"UAE-중국, 투자 활성화 위한 양해각서 체결",s:"The National",c:"gulf",d:"2026-04-15",m:"UAE and China signed initial pact to boost investment flows; non-oil bilateral trade reached $111.5B in 2025 (+24.5% YoY) with $300B target by 2030.",mk:"UAE와 중국이 투자 활성화 양해각서를 체결했다. 양국 비석유 교역은 2025년 1,115억 달러(전년 대비 24.5% 증가)를 기록했으며 2030년 3,000억 달러를 목표로 한다.",tg:["UAE","중국","투자"],u:"https://www.thenationalnews.com/business/economy/2026/04/15/uae-and-china-sign-initial-pact-to-boost-investment-flows/"},
  {id:872,p:7,r:"주요경제",t:"Mubadala&apos;s asset base grows 17% to $385bn on UAE portfolio boost",k:"무바달라, 자산 17% 증가한 3,850억 달러…UAE 포트폴리오 확대",s:"The National",c:"gulf",d:"2026-04-09",m:"Abu Dhabi sovereign fund Mubadala&apos;s asset base grew 17% to $385bn in 2025, with its UAE investment platform contributing Dh45bn to Abu Dhabi GDP.",mk:"아부다비 국부펀드 무바달라의 자산 기반은 2025년 17% 증가한 3,850억 달러를 기록했으며, UAE 투자 플랫폼은 아부다비 GDP에 450억 디르함을 기여했다.",tg:["무바달라","아부다비","국부펀드"],u:"https://www.thenationalnews.com/business/economy/2026/04/09/mubadalas-asset-base-grows-17-to-385bn-in-2025-on-uae-portfolio-boost/"},
  {id:873,p:8,r:"주요경제",t:"QatarEnergy, ExxonMobil ship 1st cargo from Texas LNG project",k:"카타르에너지·엑손모빌, 텍사스 LNG 프로젝트 첫 선적",s:"Rigzone",c:"gulf",d:"2026-04-23",m:"QatarEnergy and ExxonMobil shipped first cargo from their Texas LNG project, expanding Qatar&apos;s global LNG footprint as North Field expansion moves toward late 2026 startup.",mk:"카타르에너지와 엑손모빌이 텍사스 LNG 프로젝트의 첫 화물을 선적했다. 카타르의 글로벌 LNG 입지 확장은 노스필드 확장 프로젝트의 2026년 말 가동을 앞두고 있다.",tg:["카타르","LNG","엑손모빌"],u:"https://www.rigzone.com/news/qatarenergy_exxonmobil_ship_1st_cargo_from_texas_lng_project-23-apr-2026-183520-article/"},
  {id:874,p:9,r:"헤드라인",t:"Trump says Iran to make offer aimed at meeting US demands, as Iranian FM arrives in Pakistan",k:"트럼프 \"이란이 美 요구 충족 제안\"…이란 외무 파키스탄 도착",s:"Times of Israel",c:"me",d:"2026-04-24",m:"Iranian FM Abbas Araghchi arrived in Islamabad as Trump said Iran will make offer aimed at meeting US demands; Witkoff and Kushner to lead direct talks while Vance steps back.",mk:"이란 압바스 아락치 외무장관이 이슬라마바드에 도착했고, 트럼프는 이란이 미국 요구를 충족할 제안을 할 것이라고 밝혔다. 밴스 부통령은 빠지고 위트코프 특사와 쿠슈너가 직접 회담을 주도한다.",tg:["이란회담","파키스탄","위트코프"],u:"https://www.timesofisrael.com/liveblog-april-24-2026/"},
  {id:875,p:9,r:"헤드라인",t:"Israel-Lebanon ceasefire to extend by three weeks, Trump says, after talks at White House",k:"트럼프 \"이스라엘-레바논 휴전 3주 연장\"…백악관 회담 후 발표",s:"Jerusalem Post",c:"me",d:"2026-04-23",m:"Israel-Lebanon ceasefire extended by three weeks after White House talks between Israel and Lebanon, though Hezbollah—not party to talks—called the truce &quot;meaningless.&quot;",mk:"백악관에서의 이스라엘-레바논 회담 후 양국 휴전이 3주 연장되었으나, 회담 당사자가 아닌 헤즈볼라는 이번 휴전을 \"무의미하다\"고 일축했다.",tg:["휴전","헤즈볼라","백악관"],u:"https://www.jpost.com/israel-news/article-894031"},
  {id:876,p:9,r:"속보",t:"US envoys to head to Islamabad for talks, war justified by Iran&apos;s aggression, says top US lawyer",k:"美 특사단 이슬라마바드行 회담…법무 \"이란 공격에 의한 전쟁 정당화\"",s:"Jerusalem Post",c:"me",d:"2026-04-24",m:"US envoys Witkoff and Kushner head to Islamabad Saturday for fresh Iran talks while top US legal adviser stated US-Iran war is justified by Iran&apos;s aggression.",mk:"위트코프와 쿠슈너 미국 특사가 토요일 이슬라마바드로 향해 이란과 신규 회담을 갖는다. 미국 최고 법률 자문은 미-이란 전쟁이 이란의 공격으로 정당화된다고 밝혔다.",tg:["미특사","이란회담","이슬라마바드"],u:"https://www.jpost.com/middle-east/iran-news/2026-04-24/live-updates-894046"},
  {id:877,p:7,r:"심층분석",t:"Iraq-Jordan-Egypt oil pipeline can no longer wait amid Hormuz crisis",k:"호르무즈 위기 속 이라크-요르단-이집트 송유관 프로젝트 시급",s:"Al Jazeera",c:"me",d:"2026-04-20",m:"Atlantic Council analysis: amid Hormuz crisis, Egypt and Jordan most affected by gas disruption; Cairo&apos;s monthly energy import bill surged from $560M to $1.65B threatening reserves.",mk:"애틀랜틱 카운슬 분석: 호르무즈 위기 속 이집트와 요르단이 가스 공급 차질에 가장 큰 타격을 받고 있으며, 카이로의 월간 에너지 수입 비용은 5.6억 달러에서 16.5억 달러로 급증해 외환보유고를 위협하고 있다.",tg:["이집트","요르단","송유관"],u:"https://www.aljazeera.com/opinions/2026/4/20/iraq-jordan-egypt-oil-pipeline-hormuz"},
  {id:878,p:8,r:"주요경제",t:"Iran reasserts control of Hormuz Strait as Trump warns against blackmail",k:"이란, 호르무즈 통제권 재선언…트럼프 \"협박은 안 된다\" 경고",s:"Al Jazeera",c:"me",d:"2026-04-18",m:"Iran reasserted control of Hormuz Strait as Trump warned against blackmail; the IRGC has blocked the strait again citing continued US blockade of Iranian ports.",mk:"이란이 호르무즈 해협 통제권을 재선언하자 트럼프 대통령은 \"협박은 통하지 않는다\"고 경고했다. 이란혁명수비대(IRGC)는 미국의 이란 항구 봉쇄가 계속됨을 이유로 해협을 다시 봉쇄했다.",tg:["호르무즈","IRGC","트럼프경고"],u:"https://www.aljazeera.com/news/2026/4/18/iran-reasserts-control-of-hormuz-strait-as-trump-warns-against-blackmail"},
  {id:879,p:10,r:"속보",t:"Oil prices fall as U.S. and Iran expected to hold direct talks in Pakistan",k:"美·이란 파키스탄 직접 회담 기대로 국제유가 하락",s:"CNBC",c:"global",d:"2026-04-24",m:"Brent crude closed little changed at $105.33; WTI lost over 1% to $94.40 on April 24 as US-Iran direct talks in Pakistan eased some geopolitical risk premium.",mk:"4월 24일 미-이란 파키스탄 직접 회담 기대로 지정학적 리스크 프리미엄이 일부 완화되며 브렌트유는 105.33달러로 보합세, WTI는 1% 이상 하락한 94.40달러로 마감했다.",tg:["유가","WTI","브렌트"],u:"https://www.cnbc.com/2026/04/24/oil-price-wti-brent-after-israel-lebanon-ceasefire-extension.html"},
  {id:880,p:9,r:"헤드라인",t:"Kushner, Witkoff heading to Pakistan for direct talks with Iran, White House says",k:"백악관 \"쿠슈너·위트코프, 이란과 직접 회담 위해 파키스탄行\"",s:"CNBC",c:"global",d:"2026-04-24",m:"White House confirmed Witkoff and Kushner are traveling to Pakistan Saturday for direct talks with Iran; Vance not making the trip due to Iranian counterpart absence.",mk:"백악관은 위트코프와 쿠슈너가 이란과의 직접 회담을 위해 토요일 파키스탄에 도착할 예정이라고 확인했다. 밴스 부통령은 이란 측 카운터파트 불참으로 동행하지 않는다.",tg:["쿠슈너","위트코프","이란회담"],u:"https://www.cnbc.com/2026/04/24/iran-war-pakistan-trump-hegseth.html"},
  {id:881,p:10,r:"헤드라인",t:"Hezbollah defiant as Trump says Israel-Lebanon ceasefire extended for 3 weeks",k:"트럼프, 이스라엘-레바논 휴전 3주 연장 발표…헤즈볼라는 반발",s:"Washington Post",c:"global",d:"2026-04-24",m:"Trump announced 3-week extension of Israel-Lebanon ceasefire after White House talks; Hezbollah defiant and called truce &quot;meaningless,&quot; was not party to negotiations.",mk:"트럼프 대통령이 백악관 회담 후 이스라엘-레바논 휴전을 3주 연장한다고 발표했다. 협상 당사자가 아닌 헤즈볼라는 휴전을 \"무의미\"하다며 반발했다.",tg:["휴전","헤즈볼라","백악관"],u:"https://www.washingtonpost.com/world/middle-east/"},
  {id:882,p:9,r:"헤드라인",t:"Iran talks to resume this weekend without Vance",k:"이란 회담, 밴스 부통령 없이 이번 주말 재개",s:"Washington Post",c:"global",d:"2026-04-24",m:"Iran talks to resume in Pakistan this weekend without VP Vance; Iranian Speaker Ghalibaf, who would&apos;ve been Vance&apos;s counterpart, won&apos;t travel due to leadership infighting.",mk:"이번 주말 파키스탄에서 이란 회담이 밴스 부통령 없이 재개된다. 밴스의 카운터파트였던 갈리바프 이란 의장은 지도부 내부 갈등으로 동행하지 않는다.",tg:["이란회담","밴스","갈리바프"],u:"https://www.washingtonpost.com/politics/2026/04/24/iran-talks-resume-no-vance/"},
  {id:883,p:9,r:"속보",t:"Only Five Ships Pass Through Strait of Hormuz in 24 Hours",k:"호르무즈 해협 24시간 동안 통과 선박 단 5척",s:"Reuters",c:"global",d:"2026-04-24",m:"Only five ships including one Iranian oil tanker passed through Strait of Hormuz in 24 hours after Iran seized two container ships and US continued Iranian port blockade.",mk:"이란이 컨테이너선 2척을 나포하고 미국이 이란 항구 봉쇄를 계속하면서 24시간 동안 호르무즈 해협을 통과한 선박은 이란 석유 운반선 1척을 포함해 단 5척에 불과했다.",tg:["호르무즈","선박통과","봉쇄"],u:"https://www.reuters.com/world/middle-east/only-five-ships-pass-through-strait-hormuz-2026-04-24/"},
  {id:884,p:8,r:"헤드라인",t:"Witkoff and Kushner to meet Iranian foreign minister in Pakistan: White House",k:"백악관 \"위트코프·쿠슈너, 파키스탄에서 이란 외무 회담\"",s:"Reuters",c:"global",d:"2026-04-24",m:"Axios reports Witkoff and Kushner will meet Iranian FM Araghchi in Pakistan in coming days; meeting could take place Monday after bilateral talks with Pakistani mediators.",mk:"위트코프와 쿠슈너가 향후 며칠 내 파키스탄에서 이란 아락치 외무장관과 회담할 것이라고 백악관이 발표했다. 회담은 파키스탄 중재자와의 양자 회담 후 월요일에 열릴 수 있다.",tg:["위트코프","쿠슈너","아락치"],u:"https://www.reuters.com/world/middle-east/witkoff-kushner-iran-talks-pakistan-2026-04-24/"},
  {id:885,p:8,r:"심층분석",t:"U.S. and Iranian envoys head back to Pakistan for a new round of peace talks",k:"미·이란 특사단, 평화회담 재개 위해 파키스탄行",s:"NPR",c:"global",d:"2026-04-24",m:"US Witkoff/Kushner and Iranian Araghchi return to Pakistan for new round of peace talks mediated by Islamabad addressing Hormuz, nuclear program, sanctions and long-term peace.",mk:"미국 위트코프·쿠슈너와 이란 아락치가 호르무즈, 핵 프로그램, 제재, 장기 평화를 다루는 이슬라마바드 중재의 새로운 평화회담 라운드를 위해 파키스탄으로 향한다.",tg:["평화회담","파키스탄","중재"],u:"https://www.npr.org/2026/04/24/g-s1-118595/middle-east-war-updates"},
  {id:886,p:7,r:"헤드라인",t:"Witkoff and Kushner to meet Iranian foreign minister in Pakistan",k:"위트코프와 쿠슈너, 파키스탄서 이란 외무장관 회동 예정",s:"Axios",c:"global",d:"2026-04-24",m:"Axios reports US envoys Witkoff and Kushner will meet Iranian Foreign Minister Abbas Araghchi in Pakistan; the White House said Iranians asked for the talks.",mk:"악시오스 보도에 따르면 위트코프와 쿠슈너 미국 특사가 파키스탄에서 압바스 아락치 이란 외무장관과 회담할 예정이며, 백악관은 회담을 이란 측이 요청했다고 밝혔다.",tg:["위트코프","쿠슈너","이란회담"],u:"https://www.axios.com/2026/04/24/witkoff-kushner-iran-talks-pakistan"},
  {id:887,p:10,r:"헤드라인",t:"Korean tanker first to break through Red Sea bypass route after Hormuz blockade",k:"韓 유조선, 첫 홍해 뚫었다…호르무즈 봉쇄 후 첫 우회 수송 성공",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-17",m:"Korean tanker successfully passed Red Sea after loading Saudi crude at Yanbu—first such transit since Hormuz blockade. Saudi Arabia to prioritize 50M barrels via Red Sea route in April-May for Korea.",mk:"사우디 얀부항에서 원유를 적재한 한국 유조선이 호르무즈 봉쇄 이후 처음으로 홍해를 안전하게 통과했다. 사우디는 4-5월 5,000만 배럴을 한국에 홍해 경로로 우선 공급한다.",tg:["유조선","홍해우회","원유"],u:"https://www.fnnews.com/news/202604171856024327"},
  {id:888,p:9,r:"헤드라인",t:"Korean crude tanker safely exits Red Sea — first since Hormuz blockade",k:"한국 원유 선박, 홍해 안전하게 빠져나왔다…호르무즈 봉쇄 이후 처음",s:"한국일보",c:"korean-view",d:"2026-04-17",m:"Ministry of Oceans and Fisheries: tanker carrying Saudi crude from Yanbu safely transited Red Sea on April 17 with 24-hour real-time monitoring system.",mk:"해양수산부는 사우디 얀부항에서 원유를 실은 우리 선박이 4월 17일 24시간 실시간 모니터링 체계 하에 홍해 해역을 무사히 통과했다고 밝혔다.",tg:["해수부","유조선","모니터링"],u:"https://www.hankookilbo.com/news/article/A2026041713370003341"},
  {id:889,p:8,r:"주요경제",t:"Korea secures 273M barrels via Hormuz bypass routes through year-end",k:"정부, 호르무즈 우회로로 연말까지 원유 2.73억 배럴 확보",s:"서울신문",c:"korean-view",d:"2026-04-17",m:"Korean government negotiated with Saudi, Oman, Qatar for 273M barrels of crude and 2.1M tons of naphtha via Hormuz bypass routes through year-end with Red Sea route prioritized.",mk:"정부는 사우디·오만·카타르와 협의해 호르무즈 우회 경로로 연말까지 원유 2억7300만 배럴과 나프타 210만 톤을 확보했다. 사우디는 4-5월 5,000만 배럴을 한국에 홍해 경로로 우선 공급한다.",tg:["원유확보","우회로","에너지안보"],u:"https://www.seoul.co.kr/news/newsView.php?id=20260417500108"},
