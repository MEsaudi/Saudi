{id:1322,p:9,r:"헤드라인",t:"Crown Prince Mohammed bin Salman chairs Gulf consultative summit",k:"빈 살만 왕세자, 걸프 협의 정상회의 주재",s:"MBS Office",c:"saudi",d:"2026-04-28",m:"Crown Prince Mohammed bin Salman chaired the 19th GCC consultative summit in Jeddah, attended by Qatar's Emir, Bahrain's King, and Kuwait's Crown Prince to address the regional crisis.",mk:"빈 살만 왕세자가 제19차 GCC 협의 정상회의를 제다에서 주재했다. 카타르 에미르, 바레인 국왕, 쿠웨이트 왕세자가 참석해 역내 위기 대응을 논의했다.",tg:["MBS","GCC","Summit"],u:"https://mohammedbnsalman.com/crown-prince-mohammed-bin-salman-chairs-gulf-consultative-summit/"},
{id:1323,p:8,r:"주요경제",t:"ACWA Power signs SAR 11.5 billion deal for Rabigh 2 power plant expansion",k:"ACWA파워, 라비그2 발전소 확장 SAR 115억 계약 체결",s:"Argaam",c:"saudi",d:"2026-04-16",m:"ACWA Power signed a SAR 11.5 billion PPA with Saudi Power Procurement Company for the 2,313.5 MW Rabigh 2 IPP expansion in Makkah Region. The plant is designed with future readiness for carbon capture installation.",mk:"ACWA파워가 사우디 전력구매공사와 메카주 라비그2 IPP 확장(2,313.5MW) PPA 계약(SAR 115억)을 체결했다. 향후 탄소포집 설비 추가 가능 설계다.",tg:["ACWA","Rabigh","Power"],u:"https://www.argaam.com/en/under-spot-report/40670"},
{id:1324,p:7,r:"주요경제",t:"Maaden jumps 8% as targets 2027 phosphate production boost",k:"마덴, 2027년 인광석 증산 목표에 8% 급등",s:"Argaam",c:"saudi",d:"2026-04-08",m:"Saudi Arabian Mining Co. (Maaden) shares jumped 8% as the company targets phosphate production boost by 2027. Maaden allocated SAR 15.5 billion in 2026 capex with SAR 12.6 billion for growth projects.",mk:"마덴 주가가 2027년 인광석 증산 목표 발표에 8% 급등했다. 2026년 SAR 155억 자본투자 중 SAR 126억을 신성장 프로젝트에 배정했다.",tg:["Maaden","Phosphate","Tadawul"],u:"https://www.sahmcapital.com/news/content/market-movements-now-maaden-1211-jumps-8-today-as-targets-2027-phosphate-production-boost-3-stocks-to-52w-highs-americana-6015-proposes-sar-755-million-payout-2026-04-08"},
{id:1325,p:8,r:"심층분석",t:"Saudi commerce sector 2025: Strategic milestones bolster global competitiveness",k:"사우디 상업부문 2025: 글로벌 경쟁력 강화 이정표",s:"Zawya",c:"saudi",d:"2026-04-25",m:"Saudi Arabia secured 17th position globally in IMD World Competitiveness Yearbook through 1,000+ economic reforms via Saudi Competitiveness Center. Private sector GDP contribution reached 51%, up 4pp YoY.",mk:"사우디 경쟁력센터 주도로 1천 건 이상의 경제 개혁을 단행해 IMD 세계경쟁력연감 17위에 올랐다. 민간부문 GDP 기여도는 전년대비 4%포인트 오른 51%를 기록했다.",tg:["Competitiveness","Reform","GDP"],u:"https://www.zawya.com/en/economy/gcc/saudi-commerce-sector-2025-strategic-milestones-bolster-global-competitiveness-private-sector-expansion-gqe1g9ck"},
{id:1326,p:7,r:"정책발표",t:"Saudi Arabia approves regulations for four special economic zones, effective April 2026",k:"사우디, 4개 경제특구 규제 승인 — 2026년 4월 발효",s:"Saudi Gazette",c:"saudi",d:"2026-04-21",m:"Saudi approved regulatory frameworks for four special economic zones — Jazan, Ras Al-Khair, KAEC, and Cloud Computing IT Zone — effective April 2026, aimed at attracting foreign investment.",mk:"사우디가 자잔, 라스알카이르, KAEC, 클라우드컴퓨팅IT존 등 4개 경제특구 규제 체계를 승인해 2026년 4월부터 발효한다. 외국인 투자 유치가 목표다.",tg:["SEZ","Investment","Reform"],u:"https://www.zawya.com/en/economy/gcc/saudi-arabia-approves-regulations-for-four-special-economic-zones-effective-april-2026-onfxkrnk"},
{id:1327,p:7,r:"주요경제",t:"Saudi Arabia unveils $186.62 billion investment drive across 22 clusters",k:"사우디, 22개 클러스터 1,866억달러 투자 드라이브 공개",s:"Zawya",c:"saudi",d:"2026-04-23",m:"Saudi launched a $186.62 billion national investment plan across 22 clusters with 387 investment opportunities, aligned with major projects like NEOM, AlUla and Red Sea.",mk:"사우디가 NEOM·알울라·홍해프로젝트와 연계된 22개 클러스터, 387개 투자 기회로 구성된 1,866억달러 국가 투자계획을 발표했다.",tg:["Investment","Cluster","NEOM"],u:"https://www.zawya.com/en/economy/gcc/saudi-arabia-unveils-18662bln-investment-drive-v1fknsvm"},
{id:1328,p:7,r:"심층분석",t:"Saudi Vision 2030 milestones forge a stronger, diversified, and resilient economy",k:"비전2030 이정표, 더 강력·다각화·회복력 있는 경제 구축",s:"Zawya",c:"saudi",d:"2026-04-22",m:"Saudi Vision 2030 milestones have forged a stronger, more diversified and resilient economy, with non-oil sector now 55% of real GDP and private sector contributing 51%.",mk:"비전2030 이정표가 더 강력하고 다각화된, 회복력 있는 경제를 구축했다. 비석유 부문은 실질 GDP의 55%, 민간부문은 51%를 차지한다.",tg:["Vision2030","Diversification","NonOil"],u:"https://www.zawya.com/en/economy/gcc/saudi-vision-2030-milestones-forge-a-stronger-diversified-and-resilient-economy-d5qj1ej3"},
{id:1329,p:7,r:"주요경제",t:"Vision 2030 turns Saudi Arabia into tourism hotspot",k:"비전2030, 사우디를 관광 명소로 변모시켜",s:"Saudi Gazette",c:"saudi",d:"2026-04-20",m:"Vision 2030 has transformed Saudi Arabia into a global tourism hotspot, with Riyadh, NEOM, AlUla and Red Sea driving global travel growth despite recent strategic recalibration.",mk:"비전2030으로 사우디가 글로벌 관광 명소로 거듭났다. 리야드·NEOM·알울라·홍해가 글로벌 여행 성장을 견인하고 있다.",tg:["Tourism","Vision2030","NEOM"],u:"https://www.zawya.com/en/economy/gcc/vision-2030-turns-saudi-arabia-into-tourism-hotspot-g39kgk36"},
{id:1330,p:8,r:"속보",t:"Aramco halts LPG shipments through May, worsening Asia supply crunch",k:"아람코 5월까지 LPG 출하 중단, 아시아 공급 위기 심화",s:"서울경제",c:"korean-view",d:"2026-04-28",m:"Saudi Aramco will halt LPG shipments through May after Juaymah facility damage, hitting Asian markets hardest. India and China combined received 75% of Juaymah exports.",mk:"사우디 아람코가 주아이마 시설 피해로 5월까지 LPG 출하를 중단해 아시아 시장이 가장 큰 타격을 받는다. 인도·중국이 합쳐 주아이마 수출의 75%를 차지했다.",tg:["Aramco","LPG","Asia"],u:"https://en.sedaily.com/finance/2026/04/28/aramco-halts-lpg-shipments-through-may-worsening-asia"},
{id:1331,p:7,r:"속보",t:"아람코, 시설 손상으로 LPG 선적 5월까지 중단 — 아시아 수급난 가중",k:"아람코, 시설 손상으로 LPG 선적 5월까지 중단",s:"서울경제",c:"korean-view",d:"2026-04-28",m:"Aramco notified buyers Juaymah LPG shipments will continue suspension through May. Even if Hormuz reopens, May shipments won't resume due to facility damage from the early-April fire.",mk:"아람코가 주아이마 LPG 시설 출하를 5월까지 연장 중단한다고 매수자들에게 통보했다. 호르무즈가 재개통되더라도 4월 초 화재로 인한 시설 피해로 5월 선적은 불가능하다.",tg:["Aramco","LPG","Korea"],u:"https://www.sedaily.com/article/20038303"},
{id:1332,p:7,r:"속보",t:"사우디 아람코, 중동 전쟁 여파에 LPG 선적 5월까지 중단",k:"사우디 아람코, 중동 전쟁 여파에 LPG 선적 5월까지 중단",s:"스마트비즈",c:"korean-view",d:"2026-04-29",m:"Saudi Aramco suspending LPG shipments until May due to Middle East conflict impacts. Initial structural collapse on Feb 26 was followed by a fire from Iranian attacks in early April, prolonging repairs.",mk:"사우디 아람코가 중동 분쟁 여파로 5월까지 LPG 선적을 중단한다. 2월 26일 초기 구조 붕괴 이후 4월 초 이란 공격으로 화재가 발생해 복구가 장기화됐다.",tg:["Aramco","LPG","War"],u:"https://www.smartbizn.com/news/articleView.html?idxno=142844"},
{id:1333,p:7,r:"속보",t:"美 &quot;호르무즈 통행료, 미국인 지불 금지&quot; 외 글로벌 픽",k:"美 &quot;호르무즈 통행료, 미국인 지불 금지&quot;",s:"뉴스핌",c:"korean-view",d:"2026-04-29",m:"US Treasury announced ban on US persons paying Hormuz transit fees as Iran demands tolls. Aramco LPG May shipments suspended remain in focus for global markets.",mk:"미 재무부가 이란이 요구하는 호르무즈 통행료를 미국인이 지불하는 것을 금지한다고 발표했다. 아람코 5월 LPG 선적 중단 이슈도 글로벌 시장의 주목을 받고 있다.",tg:["Hormuz","Treasury","Iran"],u:"https://www.newspim.com/news/view/20260429000451"},
{id:1334,p:7,r:"주요경제",t:"대통령 특사단, 원유 2억7300만 배럴·나프타 210만톤 확보",k:"대통령 특사단, 원유 2.73억 배럴·나프타 210만톤 확보",s:"정책브리핑",c:"korean-view",d:"2026-04-15",m:"Korea's presidential special envoy secured 273 million barrels of crude oil and 2.1 million tons of naphtha after visits to Saudi Arabia and three other countries. Saudi committed 50m barrels via Red Sea ports during April-May.",mk:"대통령 특사단이 사우디 등 4개국 방문 후 원유 2.73억 배럴·나프타 210만톤을 확보했다. 사우디는 4-5월 홍해 우회항으로 5천만 배럴 선적을 약속했다.",tg:["Korea","Saudi","Naphtha"],u:"https://www.korea.kr/news/policyNewsView.do?newsId=148962757"},
{id:1335,p:7,r:"주요경제",t:"에쓰오일 '아람코 효과'…사우디서 원유 조달 '샤힌'도 예정대로",k:"에쓰오일 &quot;아람코 효과&quot; — 샤힌 프로젝트 예정대로",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-02",m:"S-Oil benefits from 'Aramco effect' as parent secures stable Saudi crude despite Hormuz disruption. Shaheen Project (largest Korean petrochemical investment) on track for 2026 completion in Ulsan.",mk:"에쓰오일이 모회사 아람코 덕에 호르무즈 차질 속에서도 사우디 원유를 안정적으로 확보 중이다. 울산 샤힌 프로젝트(국내 최대 석유화학 투자)는 2026년 준공 예정대로 진행된다.",tg:["S-Oil","Shaheen","Aramco"],u:"https://v.daum.net/v/20260402112527970"},
{id:1336,p:8,r:"속보",t:"Trump preparing for extended Iran blockade as US imposes fresh sanctions",k:"트럼프, 이란 봉쇄 장기화 준비 — 미국 추가 제재",s:"Jerusalem Post",c:"me",d:"2026-04-28",m:"Trump reportedly preparing for extended Iran blockade as US imposes fresh sanctions on Iranian entities. Day 60 of conflict with Hormuz still effectively closed.",mk:"트럼프 대통령이 미국의 새 제재 부과와 함께 이란 봉쇄 장기화를 준비 중인 것으로 알려졌다. 분쟁 60일차 호르무즈는 사실상 폐쇄 상태다.",tg:["Trump","Iran","Sanctions"],u:"https://www.jpost.com/middle-east/iran-news/2026-04-28/live-updates-895555"},
{id:1337,p:7,r:"속보",t:"Iran war updates: Iran says Strait of Hormuz reverted to strict control",k:"이란 &quot;호르무즈, 엄격 통제 상태로 복귀&quot;",s:"NBC News",c:"global",d:"2026-04-18",m:"Iran says Strait of Hormuz reverted to strict control; blames US. Two Indian-flagged ships came under fire as VLCC Sanmar Herald was attacked by Iranian gunboats despite prior clearance.",mk:"이란이 호르무즈를 엄격 통제 상태로 환원시켰다고 발표하며 미국에 책임을 돌렸다. 인도 국적 VLCC 산마르 헤럴드가 사전 통행허가에도 이란 함정 공격을 받았다.",tg:["Iran","Hormuz","India"],u:"https://www.nbcnews.com/world/iran/live-blog/live-updates-iran-says-strait-hormuz-reverted-strict-control-blames-us-rcna340767"},
{id:1338,p:7,r:"속보",t:"UAE quits OPEC as Iran war raises Gulf tensions",k:"UAE, 이란전쟁 걸프 긴장 고조 속 OPEC 탈퇴",s:"NBC News",c:"global",d:"2026-04-28",m:"UAE quits OPEC as Iran war raises Gulf tensions, citing the need for greater output flexibility to reach 5 million bpd capacity by 2027.",mk:"UAE가 이란전쟁발 걸프 긴장 고조 속에 OPEC을 탈퇴했다. 2027년까지 일평균 500만 배럴 생산 능력 달성을 위한 증산 유연성 확보가 명분이다.",tg:["UAE","NBC","OPEC"],u:"https://www.nbcnews.com/business/energy/uae-quits-opec-oil-iran-talks-rcna342465"},
{id:1339,p:7,r:"속보",t:"UAE exits OPEC and OPEC+, citing strategic shift amid global energy disruption",k:"UAE, 글로벌 에너지 혼란 속 OPEC·OPEC+ 동시 탈퇴",s:"Fox Business",c:"global",d:"2026-04-28",m:"UAE will leave OPEC and OPEC+ effective May 1, citing strategic shift amid global energy disruption. Decision focuses on national interests and faster expansion of domestic production.",mk:"UAE가 5월 1일부로 OPEC과 OPEC+를 동시 탈퇴한다. 글로벌 에너지 혼란 속 전략 전환과 국익, 빠른 국내 생산 확대를 사유로 들었다.",tg:["UAE","OPEC","Strategy"],u:"https://www.foxbusiness.com/markets/uae-says-leave-opec-effective-may-1"},
{id:1340,p:7,r:"속보",t:"UAE leaves OPEC: The May 1 move that could rewire oil prices and Saudi influence",k:"UAE OPEC 탈퇴: 5월 1일 결정이 유가와 사우디 영향력을 재편할 수 있다",s:"TS2 Tech",c:"global",d:"2026-04-28",m:"Analysis of how UAE's May 1 OPEC exit could rewire oil prices and reshape Saudi Arabia's influence within the cartel and broader Middle East energy politics.",mk:"UAE의 5월 1일 OPEC 탈퇴 결정이 유가와 사우디의 카르텔 내 영향력, 그리고 광범위한 중동 에너지 정치를 어떻게 재편할 수 있는지 분석.",tg:["UAE","Oil","Geopolitics"],u:"https://ts2.tech/en/uae-leaves-opec-the-may-1-move-that-could-rewire-oil-prices-and-saudi-influence/"},
{id:1341,p:7,r:"속보",t:"Day 60 — Trump says Iran can't get their act together, better get smart soon",k:"60일차 — 트럼프 &quot;이란 정신 못차려, 빨리 똑똑해져야&quot;",s:"Times of Israel",c:"me",d:"2026-04-29",m:"Trump said Iran 'can't get their act together' and warned it had better 'get smart soon.' Israeli forces continue strikes on Hezbollah sites as ceasefire strain mounts.",mk:"트럼프 대통령이 이란이 &quot;정신을 못차린다&quot;며 &quot;빨리 똑똑해져야 할 것&quot;이라고 경고했다. 휴전 균열 속 이스라엘은 헤즈볼라 시설 타격을 계속하고 있다.",tg:["Trump","Iran","Day60"],u:"https://www.timesofisrael.com/liveblog-april-29-2026/"},
{id:1342,p:7,r:"심층분석",t:"What are OPEC and OPEC+, and why has the UAE quit?",k:"OPEC과 OPEC+는 무엇이며, UAE는 왜 떠났는가?",s:"Al Jazeera",c:"me",d:"2026-04-28",m:"Explainer on OPEC, OPEC+ and why the UAE decided to quit on May 1. Cartel loses its third-largest producer amid Iran war and Hormuz closure tensions.",mk:"OPEC과 OPEC+는 무엇이며 UAE가 왜 5월 1일 탈퇴를 결정했는지 설명. 카르텔은 이란전쟁과 호르무즈 폐쇄 긴장 속 3대 산유국을 잃게 됐다.",tg:["OPEC","UAE","Explainer"],u:"https://www.aljazeera.com/news/2026/4/28/what-are-opec-and-opec-and-why-has-the-uae-quit"},
{id:1343,p:7,r:"심층분석",t:"WSJ: Up to half of nearly 1,000 drone attacks on Saudi launched from Iraq",k:"WSJ: 사우디 드론 공격 1,000건 중 절반은 이라크서 발사",s:"WSJ",c:"global",d:"2026-04-12",m:"WSJ investigation finds up to half of nearly 1,000 drone attacks on Saudi Arabia were launched from Iraq by Iran-backed militias. Saudi summoned Iraq's ambassador in formal protest.",mk:"WSJ 조사에 따르면 사우디 대상 드론 공격 1,000여 건 중 절반은 이라크에서 이란 민병대가 발사했다. 사우디는 이라크 대사를 초치해 공식 항의했다.",tg:["WSJ","Drones","Iraq"],u:"https://www.thedefensenews.com/news-details/WSJ-Report-Up-to-Half-of-Nearly-1-000-Drone-Attacks-on-Saudi-Arabia-Launched-from-Iraq-by-Iran-Backed-Militias/"},
{id:1344,p:7,r:"주요경제",t:"Saudi Arabia to review spending priorities after oil price slide",k:"사우디, 유가 하락 후 지출 우선순위 재검토",s:"OilPrice",c:"global",d:"2026-04-25",m:"Saudi Arabia signals review of spending priorities after volatile oil prices and increased war-related expenditures. Construction commitments cut by tens of billions amid PIF strategy reset.",mk:"사우디가 유가 변동성과 전쟁 관련 지출 증가 속 지출 우선순위 재검토를 시사했다. PIF 전략 재설정 속 건설 예산 수백억 달러가 삭감됐다.",tg:["Saudi","Spending","PIF"],u:"https://oilprice.com/Latest-Energy-News/World-News/Saudi-Arabia-to-Review-Spending-Priorities-After-Oil-Price-Slide.html"},
{id:1345,p:7,r:"속보",t:"Trump shares video of crumbling Iranian bridge in latest warning to Tehran",k:"트럼프, 이란 다리 붕괴 영상 공유 — 테헤란 향한 경고",s:"Khaleej Times",c:"gulf",d:"2026-04-02",m:"Trump shared a video of a crumbling Iranian bridge in his latest warning to Tehran amid the ongoing US-Israel-Iran war on Day 34.",mk:"트럼프 대통령이 미·이스라엘-이란 전쟁 34일차 테헤란을 향한 최근 경고로 이란 다리 붕괴 영상을 공유했다.",tg:["Trump","Iran","Khaleej"],u:"https://www.khaleejtimes.com/world/day-34-us-iran-israel-war-live-updates"},
{id:1346,p:7,r:"속보",t:"Kuwait deals with Iranian attacks for hours; oil facilities, power plants damaged",k:"쿠웨이트, 이란 공격 수시간 — 석유시설·발전소 피해",s:"Khaleej Times",c:"gulf",d:"2026-04-01",m:"Kuwait air defences engaged 28 drones during Iranian attacks lasting hours, causing significant material damage to oil facilities, power plants and water desalination plants.",mk:"쿠웨이트 방공망이 수시간 동안 이란 드론 28기와 교전했다. 석유시설, 발전소, 담수화 시설에 큰 피해가 발생했다.",tg:["Kuwait","Iran","Drones"],u:"https://www.khaleejtimes.com/world/gulf/kuwait-deals-with-iranian-attacks-for-hours-oil-facilities-power-plants-damaged"},
{id:1347,p:7,r:"심층분석",t:"Saudi Arabia, Russia mark 100 years of diplomatic ties with historical photo exhibition",k:"사우디·러시아, 수교 100주년 역사 사진전 개최",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-27",m:"Saudi Arabia and Russia commemorated the centennial of diplomatic relations established February 1926 through a historical photography exhibition in Moscow, organized by Russia's MFA and King Abdulaziz Foundation.",mk:"사우디와 러시아가 1926년 2월 수립된 외교관계 100주년을 기념해 모스크바에서 역사 사진전을 개최했다. 러시아 외무부와 압둘아지즈 국왕 재단이 공동 주관했다.",tg:["Russia","Centennial","Diplomacy"],u:"https://english.aawsat.com/varieties/5267299-saudi-arabia-russia-mark-100-years-diplomatic-ties-historical-photo-exhibition"},
{id:1348,p:7,r:"주요경제",t:"Saudi Arabia's al-Jadaan in Pakistan to meet Sharif",k:"사우디 알자단 재무장관, 샤리프 면담차 파키스탄 방문",s:"Al Arabiya",c:"me",d:"2026-04-11",m:"Saudi Finance Minister Mohammed Al-Jadaan visited Pakistan for talks with PM Shehbaz Sharif on bilateral economic cooperation and possible Saudi financial support amid regional tensions.",mk:"사우디 모하메드 알자단 재무장관이 파키스탄을 방문해 셰바즈 샤리프 총리와 양국 경제협력 및 사우디의 금융지원 가능성을 논의했다.",tg:["Pakistan","Aljadaan","Finance"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/11/saudi-arabia-s-aljadaan-in-pakistan-to-meet-sharif"},
{id:1349,p:6,r:"주요경제",t:"Tadawul: Details of stocks going ex-dividend, ex-bonus",k:"타다울: 배당락·무상증자 종목 상세",s:"Argaam",c:"saudi",d:"2026-04-21",m:"Argaam reports details of Tadawul stocks going ex-dividend or ex-bonus, including key dates and amounts for institutional and retail investors.",mk:"아르감이 타다울 상장사들의 배당락·무상증자 일정과 금액을 상세 보도. 기관·개인 투자자를 위한 주요 날짜와 배당액을 정리했다.",tg:["Tadawul","Dividend","Stocks"],u:"https://www.argaam.com/en/article/articledetail/id/1869799"},
{id:1350,p:7,r:"속보",t:"Aramco named Middle East's most valuable brand for 7th year",k:"아람코, 7년 연속 중동 최고 브랜드 가치 등극",s:"Arab News PK",c:"saudi",d:"2026-04-26",m:"Saudi Aramco retained position as Middle East's most valuable brand for the 7th consecutive year, with brand value rising 14% YoY to $47.3 billion according to Brand Finance.",mk:"사우디 아람코가 브랜드파이낸스 평가에서 7년 연속 중동 최고 브랜드 가치를 유지했다. 브랜드 가치는 전년대비 14% 오른 473억 달러를 기록했다.",tg:["Aramco","Brand","BrandFinance"],u:"https://www.arabnews.pk/node/2641561/business-economy"},
{id:1351,p:7,r:"속보",t:"Asia LPG prices spike after damage to Saudi facility",k:"아시아 LPG 가격, 사우디 시설 피해 후 급등",s:"Al-Monitor",c:"global",d:"2026-04-22",m:"Asia liquefied petroleum gas prices spiked sharply after damage to Saudi Aramco's Juaymah facility cut off a key 3.5% of global seaborne LPG supply, with India and China most affected.",mk:"사우디 아람코 주아이마 시설 피해로 글로벌 해상 LPG 공급의 3.5%가 끊기자 아시아 LPG 가격이 급등했다. 인도와 중국이 가장 큰 타격을 받았다.",tg:["LPG","Asia","Aramco"],u:"https://www.al-monitor.com/originals/2026/02/asia-liquefied-petroleum-gas-prices-spike-after-damage-saudi-facility"},
{id:1352,p:7,r:"심층분석",t:"Iran reimposes control of Strait of Hormuz and fires on tankers",k:"이란, 호르무즈 통제 복귀 — 유조선에 발포",s:"Time",c:"global",d:"2026-04-18",m:"Iran reimposed control of the Strait of Hormuz and fired on tankers in retaliation for the US blockade of Iranian ports. The escalation came after Trump's ceasefire extension.",mk:"이란이 미국의 이란 항만 봉쇄에 대한 보복으로 호르무즈 통제권을 재장악하고 유조선에 발포했다. 트럼프의 휴전 연장 직후 일어난 긴장 고조였다.",tg:["Iran","Hormuz","Tanker"],u:"https://time.com/article/2026/04/18/iran-strait-of-hormuz-trump-attacks-blockade-lebanon-ceasefire/"},
{id:1353,p:7,r:"주요경제",t:"Saudi crude oil sales to top Asia buyers to drop on Hormuz disruptions",k:"사우디 원유, 호르무즈 차질로 아시아 주요 매수국 판매량 감소",s:"Bloomberg",c:"global",d:"2026-03-26",m:"Saudi oil sales to top Asia buyers (China, Japan, South Korea, India) will fall in March-April due to Hormuz disruptions, despite ramping up Red Sea exports as alternative.",mk:"호르무즈 차질로 사우디의 중국·일본·한국·인도 등 아시아 주요 매수국 대상 원유 판매량이 3-4월 감소할 전망이다. 홍해 수출 확대에도 한계가 있다.",tg:["Saudi","Asia","Bloomberg"],u:"https://www.bloomberg.com/news/articles/2026-03-26/saudi-oil-sales-to-top-asia-buyers-to-drop-on-hormuz-disruptions"},
{id:1354,p:8,r:"주요경제",t:"Aramco Q1 2026: 57% profit surge despite 30% less oil",k:"아람코 1분기 실적: 생산 30% 감소에도 이익 57% 급증",s:"Argaam",c:"saudi",d:"2026-04-23",m:"Saudi Aramco Q1 2026 net profit forecast at SAR 108.8 billion ($29 billion), up 57% QoQ. Crude prices surged 24.8% QoQ to offset lower production of 600,000 bpd crude.",mk:"사우디 아람코의 1분기 순이익이 1,088억 리얄(290억 달러)로 전분기 대비 57% 급증할 전망이다. 원유 가격이 24.8% 상승해 일평균 60만 배럴 감산을 상쇄했다.",tg:["Aramco","Earnings","Q1"],u:"https://www.argaam.com/en/reports/average-estimates/57629"},
{id:1355,p:7,r:"정책발표",t:"Saudi crown prince says Vision 2030 enters final stage with strategy at peak",k:"빈 살만 &quot;비전2030 최종단계 진입 — 전략·실행 최고조&quot;",s:"Xinhua",c:"saudi",d:"2026-04-28",m:"Saudi Crown Prince said Vision 2030 entered its final stage with strategy and program execution at peak performance. Major projects continue to drive economic transformation.",mk:"빈 살만 왕세자는 비전2030이 전략·실행 최고조 상태로 최종 단계에 진입했다고 말했다. 대형 프로젝트들이 경제 전환을 견인하고 있다.",tg:["MBS","Vision2030","Xinhua"],u:"https://english.news.cn/20260428/2b93c2f36e3f4c29b25bb283235e2be8/c.html"},
{id:1356,p:7,r:"주요경제",t:"PIF and Kingdom Holding Company sign agreement for KHC to acquire 70% of Al-Hilal",k:"PIF, 킹덤홀딩스에 알힐랄 클럽 70% 매각 계약",s:"SPA",c:"saudi",d:"2026-04-16",m:"PIF and Kingdom Holding Company signed a share sale agreement for KHC to acquire 70% of Al-Hilal Club Company at SAR 1.4 billion enterprise value (€350m). KHC pays SAR 840 million for PIF's stake.",mk:"PIF가 알왈리드 빈 탈랄 회장의 킹덤홀딩스에 알힐랄 클럽 70% 지분을 매각하는 계약을 체결했다. 기업가치 14억 리얄, KHC 지급액은 8.4억 리얄(€350m)이다.",tg:["PIF","Al-Hilal","Kingdom"],u:"https://www.pif.gov.sa/en/news-and-insights/press-releases/2026/pif-and-kingdom-holding-company-khc-sign-agreement-for-khc-to-acquire-70-of-al-hilal-club-company/"},
{id:1357,p:7,r:"주요경제",t:"PIF signs deal with Kingdom Holding Co. over sale of 70% stake in Al-Hilal",k:"PIF, 알힐랄 70% 지분 킹덤홀딩스에 매각",s:"Arab News",c:"saudi",d:"2026-04-16",m:"PIF signed a deal with Kingdom Holding Co. for the sale of 70% stake in Al-Hilal Club. The transaction supports PIF's diversification strategy and brings private capital into top Saudi football.",mk:"PIF가 킹덤홀딩스에 알힐랄 클럽 70% 지분을 매각하는 계약을 체결했다. PIF의 다각화 전략에 부합하며 사우디 최고 명문 축구단에 민간자본이 유입된다.",tg:["PIF","Al-Hilal","Football"],u:"https://www.arabnews.com/node/2640140/saudi-football"},
{id:1358,p:8,r:"주요경제",t:"Saudi Prince Alwaleed buys Al-Hilal football club stake from PIF",k:"알왈리드 왕자, PIF로부터 알힐랄 축구단 지분 인수",s:"Bloomberg",c:"global",d:"2026-04-16",m:"Billionaire Saudi Prince Alwaleed bin Talal's Kingdom Holding will buy a 70% stake in Al-Hilal football club from PIF, returning ownership of one of Saudi's top clubs to private hands.",mk:"억만장자 알왈리드 빈 탈랄 왕자의 킹덤홀딩스가 PIF로부터 알힐랄 축구단 70% 지분을 인수한다. 사우디 최고 명문 축구단 소유권이 민간으로 이전된다.",tg:["Alwaleed","Al-Hilal","Bloomberg"],u:"https://www.bloomberg.com/news/articles/2026-04-16/billionaire-saudi-prince-alwaleed-buys-al-hilal-football-club"},
{id:1359,p:8,r:"주요경제",t:"Aramco announces fourth quarter and full-year 2025 results",k:"아람코, 2025년 4분기 및 연간 실적 발표",s:"SPA",c:"saudi",d:"2026-04-15",m:"Aramco announced 2025 full-year net income of SAR 392.5 billion ($104.7B) and Q4 net income of SAR 94.0 billion ($25.1B). Free cash flow reached $85.4B for full year. Q4 base dividend of $21.89B declared.",mk:"아람코가 2025년 연간 순이익 3,925억 리얄(1,047억 달러), 4분기 순이익 940억 리얄(251억 달러)을 발표했다. 연간 잉여현금흐름 854억 달러, 4분기 기본배당 218.9억 달러를 결정했다.",tg:["Aramco","Earnings","Dividend"],u:"https://spa.gov.sa/en/N2532901"}
,
{id:1366,p:10,r:"헤드라인",t:"Saudi Crown Prince: Vision 2030 has driven a qualitative leap in the Kingdom&apos;s development path",k:"왕세자 &quot;비전2030, 사우디 개발경로에 질적 도약 가져왔다&quot;",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-28",m:"Crown Prince Mohammed bin Salman said Saudi Arabia has demonstrated how national ambition can be transformed into tangible achievements after a decade of progress under Vision 2030, with 90% of 1,290 initiatives complete or on track.",mk:"무함마드 빈 살만 왕세자는 비전2030 10년의 추진을 통해 사우디가 국가적 야망을 실질 성과로 전환한 모범을 보였다고 평가했다. 1,290개 이니셔티브의 90%가 완료 또는 정상 추진 중이다.",tg:["Vision2030","CrownPrince"],u:"https://english.aawsat.com/gulf/5267019-saudi-crown-prince-vision-2030-has-driven-qualitative-leap-kingdom%E2%80%99s-development-path"},
{id:1369,p:10,r:"헤드라인",t:"Crown Prince: Saudi ambition has been turned into real results under Vision 2030",k:"왕세자 &quot;사우디의 야망, 비전2030으로 실제 성과로 구현됐다&quot;",s:"Saudi Gazette",c:"saudi",d:"2026-04-28",m:"Crown Prince said Saudi Arabia&apos;s ambition has been turned into real results under Vision 2030, citing 123 million tourists in 2025, $35.5bn FDI inflows, and 700+ international companies establishing regional HQs.",mk:"왕세자는 비전2030이 사우디의 야망을 실질 성과로 구현했다고 강조했다. 2025년 관광객 1억2,300만명, 외국인직접투자 유입 355억달러, 700여 글로벌 기업의 지역본부 설립 등을 사례로 들었다.",tg:["Vision2030","Tourism","FDI"],u:"https://saudigazette.com.sa/article/660838"},
{id:1372,p:7,r:"외교",t:"Saudi Arabia to host ERRA&apos;s 24th annual energy regulators conference in Riyadh",k:"사우디, 리야드에서 ERRA 제24차 에너지규제기관 연차회의 개최",s:"Saudi Gazette",c:"saudi",d:"2026-04-28",m:"Saudi Arabia has been selected to host the 24th annual conference of the Energy Regulators Regional Association (ERRA) in Riyadh from February 1 to 3, 2027.",mk:"사우디가 2027년 2월 1~3일 리야드에서 에너지규제기관지역연합(ERRA) 제24차 연차회의를 개최한다. 사우디 에너지 규제 위상 강화의 신호로 해석된다.",tg:["Energy","Regulator","Riyadh"],u:"https://saudigazette.com.sa/article/660923/saudi-arabia/saudi-arabia-to-host-erras-24th-annual-energy-regulators-conference-in-riyadh"},
{id:1373,p:9,r:"정책발표",t:"HRH the Crown Prince Chairs Cabinet Session",k:"왕세자, 국무회의 주재…SPA-SANA 협력 양해각서 승인",s:"SPA",c:"saudi",d:"2026-04-28",m:"Crown Prince Mohammed bin Salman chaired the Cabinet meeting in Jeddah, which approved an MoU between SPA and Syria&apos;s SANA news agency, briefed members on a message from Djibouti&apos;s president, and reviewed Vision 2030 progress.",mk:"무함마드 빈 살만 왕세자가 제다에서 국무회의를 주재했다. 회의는 사우디국영통신(SPA)과 시리아 SANA 간 협력 MOU 승인, 지부티 대통령 친서 보고, 비전2030 진행상황 검토 등을 의결했다.",tg:["Cabinet","Vision2030","SPA"],u:"https://www.spa.gov.sa/en/N2527847"},
{id:1375,p:8,r:"주요경제",t:"PIF&apos;s SALIC acquires 80% stake in Olam Agri to scale global footprint",k:"PIF 자회사 SALIC, 올람아그리 지분 80% 인수…글로벌 식량안보 확대",s:"Arab News",c:"saudi",d:"2026-04-26",m:"PIF&apos;s SALIC has agreed to acquire 80% of Singapore-based Olam Agri to scale its global agricultural and food security footprint, supporting Saudi Arabia&apos;s long-term food self-sufficiency strategy.",mk:"PIF 자회사 SALIC이 싱가포르 기반 올람아그리 지분 80% 인수에 합의했다. 글로벌 농업·식량안보 보폭을 확대해 사우디 장기 식량자급 전략을 뒷받침할 전망이다.",tg:["PIF","SALIC","FoodSecurity"],u:"https://www.arabnews.com/node/2641453/business-economy"},
{id:1378,p:8,r:"심층분석",t:"It&apos;s no longer enough to simply keep the Strait of Hormuz open",k:"&quot;호르무즈 해협 단순 개방만으론 부족&quot;…공동안보·경제 패러다임 전환 필요",s:"The National",c:"gulf",d:"2026-04-27",m:"The National opinion piece argues that simply keeping the Strait of Hormuz open is no longer sufficient amid the prolonged Iran war; Gulf states must accelerate diversified export routes and joint security architectures.",mk:"이란 전쟁 장기화 속에서 호르무즈 해협의 단순 개방만으로는 부족하며, 걸프 국가들은 다변화된 수출경로와 공동 안보체계를 가속화해야 한다고 더내셔널이 사설을 통해 주장했다.",tg:["Hormuz","Security","Opinion"],u:"https://www.thenationalnews.com/opinion/comment/2026/04/27/iran-us-gulf-strait-of-hormuz-global-economy-energy/"},
{id:1380,p:9,r:"헤드라인",t:"GCC countries to gather for extraordinary consultative session in Jeddah",k:"GCC 6개국, 제다에서 임시 자문 정상회의 개최",s:"Al Arabiya",c:"gulf",d:"2026-04-28",m:"The GCC member states gathered for an extraordinary consultative session in Jeddah to coordinate responses to ongoing regional tensions, including Iranian attacks on member states and the Hormuz blockade.",mk:"GCC 6개국이 제다에서 임시 자문 정상회의를 열어 회원국 대상 이란 공격 및 호르무즈 봉쇄 등 지역 긴장 대응 방안을 조율했다.",tg:["GCC","Summit","Iran"],u:"https://english.alarabiya.net/News/gulf/2026/04/28/gcc-countries-to-gather-for-extraordinary-consultative-session-in-jeddah"},
{id:1386,p:8,r:"외교",t:"Iran proposes reopening Strait of Hormuz, delaying nuclear deal",k:"이란, 호르무즈 재개방 제안하며 핵협상은 후순위로",s:"Al Arabiya",c:"me",d:"2026-04-27",m:"Iran has formally proposed to the US to reopen the Strait of Hormuz while postponing nuclear negotiations until after a war settlement, in a bid to relieve domestic economic pressure.",mk:"이란이 미국에 호르무즈 해협 재개방을 골자로 한 공식 제안을 전달했다. 핵협상은 종전 이후로 미루는 안으로, 국내 경제 압박 완화가 배경이다.",tg:["Iran","Diplomacy","Hormuz"],u:"https://english.alarabiya.net/News/middle-east/2026/04/27/iran-offers-proposal-to-us-to-reopen-strait-of-hormuz-postpone-nuclear-agreement-"},
{id:1387,p:8,r:"외교",t:"US will not tolerate Iranian control, tolls in Strait of Hormuz: Rubio",k:"루비오 美 국무 &quot;이란의 호르무즈 통제·통행료 용납 못 한다&quot;",s:"Al Arabiya",c:"me",d:"2026-04-27",m:"US Secretary of State Marco Rubio said the US will not tolerate Iranian control of the Strait of Hormuz or any toll-collection scheme, ruling out a &quot;Suez-style&quot; arrangement proposed by Tehran.",mk:"마르코 루비오 美 국무장관은 미국이 이란의 호르무즈 해협 통제나 통행료 부과를 용납하지 않을 것이라며 테헤란이 제안한 &apos;수에즈식&apos; 통행체제를 거부했다.",tg:["Hormuz","Iran","US"],u:"https://english.alarabiya.net/News/middle-east/2026/04/27/us-will-not-tolerate-iranian-control-tolls-in-strait-of-hormuz-rubio"},
{id:1390,p:10,r:"속보",t:"UAE&apos;s shock OPEC exit: What it means for the oil cartel&apos;s future and for crude prices",k:"UAE의 OPEC 탈퇴 충격…카르텔 미래와 유가 영향 분석",s:"CNBC",c:"global",d:"2026-04-28",m:"CNBC analyzes the UAE&apos;s exit from OPEC, noting it will undermine the cartel&apos;s ability to influence the oil market because the UAE has the second-largest spare capacity after Saudi Arabia.",mk:"CNBC는 UAE의 OPEC 탈퇴가 사우디 다음으로 큰 잉여 생산능력을 가진 회원국 이탈인 만큼 카르텔의 시장 영향력을 약화시킬 것이라고 분석했다.",tg:["UAE","OPEC","Oil"],u:"https://www.cnbc.com/2026/04/28/oil-uae-opec-saudi-arabia.html"},
{id:1392,p:8,r:"심층분석",t:"UAE&apos;s departure from the OPEC oil cartel is not without precedence. Who could be next?",k:"UAE의 OPEC 탈퇴, 전례 있다…다음 후보는 누구?",s:"CNBC",c:"global",d:"2026-04-29",m:"CNBC notes the UAE&apos;s OPEC exit is not unprecedented—Indonesia, Qatar and Ecuador have left—and explores which other members could potentially follow given divergent national priorities.",mk:"CNBC는 인도네시아, 카타르, 에콰도르 등의 사례를 들며 UAE의 OPEC 탈퇴가 전례 없는 일은 아니라며, 국익 우선순위 차이로 차기 이탈 후보국을 점검했다.",tg:["OPEC","Oil","Geopolitics"],u:"https://www.cnbc.com/2026/04/29/uae-opec-exit-oil-iran-war.html"},
{id:1393,p:10,r:"헤드라인",t:"United Arab Emirates says it will leave OPEC, a blow to the oil cartel",k:"UAE OPEC 탈퇴 선언…석유 카르텔에 큰 타격",s:"Washington Post",c:"global",d:"2026-04-28",m:"The UAE&apos;s decision to leave OPEC strips the cartel of its third-largest producer and further weakens its leverage over global oil supplies and prices, the Washington Post reported.",mk:"워싱턴포스트는 UAE의 OPEC 탈퇴가 카르텔의 3대 산유국 이탈로 글로벌 원유 공급·가격 통제력을 추가로 약화시킨다고 보도했다.",tg:["UAE","OPEC","Oil"],u:"https://www.washingtonpost.com/business/2026/04/28/opec-united-arab-emirates-leaving-cartel/c8a786fc-42fe-11f1-b19d-32431046b5b4_story.html"},
{id:1396,p:7,r:"속보",t:"The UAE is leaving OPEC on Friday",k:"UAE, 금요일자로 OPEC 탈퇴",s:"NPR",c:"global",d:"2026-04-28",m:"NPR explains the UAE will formally leave OPEC on Friday May 1, ending nearly six decades of membership and signaling a new energy strategy aligned with US interests.",mk:"NPR은 UAE가 5월 1일 금요일자로 OPEC을 공식 탈퇴해 60년 회원국 지위를 마무리한다고 전했다. 美 이해와 보조를 맞춘 새로운 에너지 전략이라는 평이다.",tg:["UAE","OPEC","Oil"],u:"https://www.npr.org/2026/04/28/nx-s1-5802735/uae-leaves-opec-oil"},
{id:1398,p:7,r:"속보",t:"Oil tanker completes rare Hormuz transit as Gulf shipping remains constrained",k:"유조선, 드물게 호르무즈 통과 성공…걸프 해상물류 여전히 제약",s:"World Oil",c:"global",d:"2026-04-28",m:"A Panama-flagged tanker, Idemitsu Maru, loaded with 2 million barrels of Saudi crude, transited the Strait of Hormuz for Nagoya, Japan, marking the first Japan-linked crude tanker through the strait since the war began.",mk:"파나마 선적 출광마루(Idemitsu Maru)가 사우디 원유 200만 배럴을 적재하고 호르무즈 해협을 통과해 일본 나고야로 향했다. 전쟁 발발 후 일본向 첫 원유 선박이다.",tg:["Hormuz","Tanker","Japan"],u:"https://worldoil.com/news/2026/4/28/oil-tanker-completes-rare-hormuz-transit-as-gulf-shipping-remains-constrained/"},
{id:1399,p:9,r:"속보",t:"UAE 새달 1일 OPEC 탈퇴…&quot;점진적으로 생산 늘릴 것&quot;",k:"UAE 새달 1일 OPEC 탈퇴…&quot;점진적으로 생산 늘릴 것&quot;",s:"서울신문",c:"korean-view",d:"2026-04-29",m:"Seoul Shinmun reports the UAE will leave OPEC and OPEC+ on May 1 and plans to gradually increase oil production to meet shifting global demand.",mk:"UAE가 5월 1일 OPEC 및 OPEC+에서 공식 탈퇴하고 변화하는 글로벌 수요에 맞춰 원유 생산량을 점진적으로 늘릴 계획이라고 서울신문이 보도했다.",tg:["UAE","OPEC","원유"],u:"https://www.seoul.co.kr/news/international/middleeast-africa/2026/04/29/20260429012005"},
{id:1400,p:8,r:"심층분석",t:"UAE, OPEC 탈퇴 선언…&quot;트럼프의 승리&quot;",k:"UAE, OPEC 탈퇴 선언…&quot;트럼프의 승리&quot;",s:"머니투데이",c:"korean-view",d:"2026-04-28",m:"Money Today reports that UAE&apos;s OPEC withdrawal is being interpreted by analysts as a strategic win for the Trump administration, given the timing alongside US Treasury swap-line negotiations.",mk:"머니투데이는 UAE의 OPEC 탈퇴가 美 재무부와의 통화스왑 협상 시점과 맞물리며 트럼프 행정부의 전략적 승리로 평가된다고 보도했다.",tg:["UAE","OPEC","Trump"],u:"https://www.mt.co.kr/world/2026/04/28/2026042821442992057"},
{id:1401,p:7,r:"심층분석",t:"사우디와 사사건건 부딪힌 UAE, 결국 OPEC 탈퇴 결정",k:"사우디와 사사건건 부딪힌 UAE, 결국 OPEC 탈퇴 결정",s:"머니투데이",c:"korean-view",d:"2026-04-28",m:"Money Today details the long-running tensions between Saudi Arabia and the UAE within OPEC over production quotas, leading to the UAE&apos;s eventual decision to leave.",mk:"머니투데이는 OPEC 내 생산쿼터를 둘러싼 사우디-UAE 간 장기 갈등이 결국 UAE의 탈퇴 결정으로 이어졌다고 분석했다.",tg:["UAE","사우디","OPEC"],u:"https://www.mt.co.kr/world/2026/04/28/2026042822353727959"},
{id:1402,p:7,r:"심층분석",t:"[사설] UAE OPEC 전격 탈퇴, 원유 공급선 다변화 계기로",k:"[사설] UAE OPEC 전격 탈퇴, 원유 공급선 다변화 계기로",s:"헤럴드경제",c:"korean-view",d:"2026-04-29",m:"Herald Economy editorial argues UAE&apos;s OPEC exit should serve as a catalyst for South Korea to accelerate diversification of crude oil supply lines beyond traditional Middle East sources.",mk:"헤럴드경제 사설은 UAE의 OPEC 전격 탈퇴를 한국이 중동 의존을 넘어 원유 공급선을 다변화할 계기로 삼아야 한다고 주장했다.",tg:["UAE","OPEC","에너지안보"],u:"https://biz.heraldcorp.com/article/10728196"},
{id:1403,p:8,r:"주요경제",t:"South Korea faces export-readiness trade-off amid Gulf defense push",k:"걸프 방산수출 압박 속 韓, 수출-내수 준비태세 트레이드오프",s:"Korea Times",c:"korean-view",d:"2026-04-29",m:"Korea Times reports South Korea is facing tough trade-offs between accelerating defense system deliveries to Saudi Arabia and the UAE, and maintaining domestic readiness amid heightened regional tensions.",mk:"코리아타임스는 사우디·UAE의 한국산 방공체계 조기납품 요구와 자국 내 작전준비태세 유지 사이에서 한국이 어려운 균형을 모색하고 있다고 보도했다.",tg:["방산","사우디","UAE"],u:"https://www.koreatimes.co.kr/southkorea/defense/20260429/south-korea-faces-export-readiness-trade-off-amid-gulf-defense-push"},
{id:1404,p:7,r:"심층분석",t:"호르무즈 봉쇄에 17개국 &apos;원유 다변화&apos;로 맞섰다…4월 확보량 평시의 60%",k:"호르무즈 봉쇄에 17개국 &apos;원유 다변화&apos;로 맞섰다…4월 확보량 평시의 60%",s:"이코노믹스",c:"korean-view",d:"2026-04-26",m:"Korean media reports that 17 countries including South Korea have responded to the Hormuz blockade by diversifying crude oil sources, securing about 60% of normal-time volumes by April through alternative routes.",mk:"한국을 포함한 17개국이 호르무즈 봉쇄에 맞서 원유 도입선 다변화로 대응, 4월까지 평시 물량의 약 60%를 대체경로를 통해 확보했다고 한국 매체가 보도했다.",tg:["호르무즈","원유","에너지안보"],u:"https://econmingle.com/economy/hormuz-strait-blockade-korea-oil-supply-res/"},
  {id:1405,p:10,r:"헤드라인",t:"HRH the Crown Prince Chairs GCC Consultative Summit",k:"무함마드 빈 살만 왕세자, 제19차 GCC 협의정상회의 주재",s:"SPA",c:"saudi",d:"2026-04-28",m:"Crown Prince Mohammed bin Salman chaired the 19th GCC Consultative Summit in Jeddah, where Gulf leaders discussed regional escalation, attacks on member states and Jordan, and ways to establish a diplomatic path to end the crisis.",mk:"무함마드 빈 살만 왕세자가 제다에서 제19차 GCC 협의정상회의를 주재하고, 걸프 정상들은 지역 긴장 고조와 회원국·요르단에 대한 공격, 위기 종식을 위한 외교적 해법을 논의했다.",tg:["GCC","왕세자","Hormuz"],u:"https://spa.gov.sa/en/N2573127"},
  {id:1406,p:9,r:"헤드라인",t:"Saudi crown prince and Canada&apos;s PM Carney discuss regional developments",k:"사우디 왕세자-캐나다 카니 총리, 지역정세·양자협력 논의",s:"Arab News",c:"saudi",d:"2026-04-29",m:"Crown Prince Mohammed bin Salman and Canadian PM Mark Carney spoke by phone on April 29, reviewing Saudi-Canada bilateral cooperation and the Middle East situation; Carney condemned Iranian strikes on Saudi Arabia and accepted an invitation to visit the Kingdom.",mk:"무함마드 빈 살만 왕세자와 마크 카니 캐나다 총리가 4월 29일 통화하고 양국 협력과 중동 정세를 논의했다. 카니 총리는 이란의 사우디 공격을 비판하고 사우디 방문 초청을 수락했다.",tg:["사우디","캐나다","외교"],u:"https://www.arabnews.com/node/2641763/saudi-arabia"},
  {id:1409,p:8,r:"정책발표",t:"Cabinet: Saudi Vision 2030 milestones forge a stronger, diversified, resilient economy",k:"각의 &quot;비전2030 성과, 더 강하고 다변화된 회복력 있는 경제 구축&quot;",s:"Saudi Gazette",c:"saudi",d:"2026-04-29",m:"The Saudi Cabinet, chaired by King Salman, said Vision 2030 milestones have created a stronger, more diversified and resilient economy as the strategy enters its third and final phase from 2026 to 2030.",mk:"살만 국왕이 주재한 각의는 비전2030이 2026~2030 3단계로 진입한 가운데, 그동안의 성과가 더 강하고 다변화된 회복력 있는 경제를 만들어냈다고 평가했다.",tg:["비전2030","각의"],u:"https://saudigazette.com.sa/article/660929/saudi-arabia/cabinet-saudi-vision-2030-milestones-forge-a-stronger-diversified-and-resilient-economy"},
  {id:1414,p:7,r:"심층분석",t:"Azour to Asharq Al-Awsat: Saudi Arabia has strong financial buffers to confront war impact",k:"IMF 아주르 &quot;사우디, 전쟁 충격 견딜 강한 재정 완충 갖춰&quot;",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-25",m:"IMF&apos;s Jihad Azour told Asharq Al-Awsat that Saudi Arabia has built strong financial buffers through diversification and institutional strengthening, giving it the fiscal space to advance Vision 2030 despite the regional war.",mk:"국제통화기금(IMF) 지하드 아주르 중동·중앙아시아 국장은 사우디가 다변화와 제도 강화를 통해 강한 재정 완충을 구축했으며, 지역 전쟁에도 비전2030 추진을 위한 재정 여력이 충분하다고 밝혔다.",tg:["IMF","재정","비전2030"],u:"https://english.aawsat.com/business/5265063-azour-asharq-al-awsat-saudi-arabia-has-strong-financial-buffers-confront-war"},
  {id:1415,p:7,r:"주요경제",t:"Flight to stability boosts Saudi real estate",k:"안전자산 수요로 사우디 부동산 20~30% 급등",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-27",m:"Saudi real estate has emerged as the biggest winner of the regional crisis, posting 20-30% growth as residents and investors from crisis-hit countries push up occupancy across residential and hotel units.",mk:"지역 위기의 최대 수혜자로 떠오른 사우디 부동산이 20~30% 급등했다. 위기국 거주자와 투자자 유입으로 주거·호텔 시설 점유율이 급등하고 자금이 사우디로 몰려들고 있다.",tg:["부동산","안전자산"],u:"https://english.aawsat.com/business/5267640-flight-stability-boosts-saudi-real-estate"},
  {id:1416,p:7,r:"심층분석",t:"&apos;There&apos;s only one Diriyah&apos;: CEO Inzerillo outlines vision for $64 billion project",k:"디리야 CEO &quot;디리야는 단 하나&quot;…640억달러 메가프로젝트 비전 공개",s:"Al Arabiya",c:"saudi",d:"2026-04-27",m:"Diriyah CEO Jerry Inzerillo outlined the vision for the $64 billion Diriyah project, positioning it as a centerpiece of Saudi Arabia&apos;s Vision 2030 transformation despite headwinds from the regional war.",mk:"디리야 CEO 제리 인제릴로는 640억달러 디리야 메가프로젝트의 비전을 발표하며, 지역 전쟁에도 불구하고 사우디 비전2030 변혁의 중심축으로 자리잡을 것이라고 강조했다.",tg:["디리야","비전2030","관광"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/27/-there-s-only-one-diriyah-ceo-jerry-inzerillo-outlines-vision-for-64-billion-project"},
  {id:1417,p:8,r:"속보",t:"Saudi Arabia condemns shooting at event attended by Trump, affirms solidarity with US",k:"사우디, 트럼프 참석 행사 총격사건 규탄…미국과 연대 재확인",s:"Al Arabiya",c:"saudi",d:"2026-04-26",m:"Saudi Arabia&apos;s Foreign Ministry condemned the shooting incident at a media gala in Washington attended by US President Trump, expressing solidarity with the United States and condolences to victims.",mk:"사우디 외교부는 트럼프 미국 대통령이 참석한 워싱턴 미디어 행사 총격 사건을 강력히 규탄하고, 미국과의 연대와 피해자에 대한 조의를 표명했다.",tg:["사우디","미국","트럼프"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/26/saudi-arabia-condemns-shooting-at-event-attended-by-trump-affirms-solidarity-with-us"},
  {id:1418,p:6,r:"심층분석",t:"Who is new Saudi Arabia coach Georgios Donis?",k:"사우디 축구대표팀 새 감독 게오르기오스 도니스는 누구인가",s:"Al Arabiya",c:"saudi",d:"2026-04-28",m:"Less than two months before the 2026 FIFA World Cup, Saudi Arabia replaced Herve Renard with Greek manager Georgios Donis as head coach of the national football team.",mk:"2026 FIFA 월드컵 개막을 두 달 앞두고 사우디는 에르베 르나르 감독을 경질하고 그리스 출신 게오르기오스 도니스를 축구대표팀 신임 감독으로 선임했다.",tg:["축구","월드컵","사우디"],u:"https://english.alarabiya.net/sports/2026/04/28/who-is-new-saudi-arabia-coach-georgios-donis"},
  {id:1419,p:5,r:"심층분석",t:"Mauritius president commends Saudi Arabia&apos;s Arabic program for non-native speakers",k:"모리셔스 대통령, 사우디 비원어민 아랍어 교육 프로그램 호평",s:"Arab News",c:"saudi",d:"2026-04-29",m:"Mauritius&apos; President praised Saudi Arabia&apos;s &quot;Arabic for Non-Arabic Speakers Curriculum Support Project&quot; during a meeting with the Sultan bin Abdulaziz Al Saud Charitable Foundation delegation.",mk:"모리셔스 대통령은 술탄 빈 압둘아지즈 알사우드 자선재단 대표단을 접견한 자리에서 사우디의 &quot;비원어민 대상 아랍어 교육과정 지원 프로젝트&quot;를 호평했다.",tg:["문화외교","아랍어"],u:"https://www.arabnews.com/node/2641766/saudi-arabia"},
  {id:1420,p:7,r:"정책발표",t:"Saudi Arabia warns of regional deterioration, reaffirms support for Palestinian state",k:"사우디, 지역정세 악화 경고…팔레스타인 국가 수립 지지 재확인",s:"Arab News",c:"saudi",d:"2026-04-28",m:"Saudi Arabia warned of worsening regional conditions, condemned Israeli attacks on Palestine and Lebanon, and reiterated that peace requires a ceasefire, halting displacement, withdrawal from Gaza, and a Palestinian state on 1967 borders.",mk:"사우디는 지역정세 악화를 경고하고 이스라엘의 팔레스타인·레바논 공격을 규탄했다. 평화 정착을 위해 휴전, 강제이주 중단, 가자 철수, 1967년 국경 기준 팔레스타인 국가 수립이 필요하다고 재확인했다.",tg:["팔레스타인","평화","사우디"],u:"https://www.arabnews.com/node/2641702/saudi-arabia"},
  {id:1421,p:4,r:"심층분석",t:"Visitors flock to Al-Mughmas Valley as nature spot gains prominence",k:"알무그마스 계곡, 자연 명소로 부상하며 방문객 급증",s:"Arab News",c:"saudi",d:"2026-04-29",m:"Saudi Arabia&apos;s Al-Mughmas Valley is gaining prominence as a nature destination; SPA reports community-driven tree-planting and clean-up campaigns are promoting environmental responsibility.",mk:"사우디 알무그마스 계곡이 자연 명소로 부상하며 방문객이 늘고 있다. SPA에 따르면 지역사회 주도의 나무심기와 정화 캠페인이 환경 책임 의식을 확산시키고 있다.",tg:["관광","환경"],u:"https://www.arabnews.com/node/2641756/saudi-arabia"},
  {id:1424,p:8,r:"심층분석",t:"How Saudi Arabia is repositioning Neom as key logistics hub and economic anchor",k:"사우디, NEOM을 핵심 물류허브·경제 거점으로 재배치",s:"The National",c:"gulf",d:"2026-04-17",m:"Saudi Arabia is repositioning NEOM as a Red Sea logistics hub anchoring non-oil growth, with $2 billion invested in all-electric Port of Neom operations as an alternative to Hormuz-dependent routes.",mk:"사우디는 NEOM을 비석유 성장 동력의 핵심인 홍해 물류 허브로 재배치하고 있다. 호르무즈 의존 경로의 대체로서 전동화된 NEOM 항만에 20억달러를 투자했다.",tg:["NEOM","물류","비전2030"],u:"https://www.thenationalnews.com/business/economy/2026/04/17/how-saudi-arabia-is-repositioning-neom-as-key-logistics-hub-and-economic-anchor/"},
  {id:1427,p:6,r:"심층분석",t:"Gold slightly recovers to Dh3 as UAE leaves OPEC, OPEC+",k:"UAE OPEC 탈퇴 속 금값 그램당 3디르함 회복",s:"Khaleej Times",c:"gulf",d:"2026-04-29",m:"Gold prices in the UAE recovered to Dh3 per gram as the country announced its OPEC departure, while Brent crude rose above $111 per barrel supported by the Hormuz crisis.",mk:"UAE의 OPEC 탈퇴 발표 가운데 UAE 금값은 그램당 3디르함을 회복했다. 호르무즈 사태에 힘입어 브렌트유는 배럴당 111달러 위로 상승했다.",tg:["금","유가","UAE"],u:"https://www.khaleejtimes.com/business/markets/uae-gold-price-recovers-april-29-2026"},
  {id:1429,p:9,r:"심층분석",t:"UAE quits OPEC: What that means for the Gulf, energy markets and beyond",k:"UAE의 OPEC 탈퇴가 걸프·에너지시장에 미칠 파장",s:"Al Jazeera",c:"me",d:"2026-04-29",m:"Al Jazeera analyzes the implications of UAE&apos;s OPEC exit for the Gulf, energy markets, and global geopolitics, noting it removes the cartel&apos;s third-largest producer and weakens output coordination.",mk:"알자지라는 UAE의 OPEC 탈퇴가 걸프, 에너지시장, 글로벌 지정학에 미칠 영향을 분석하며, 카르텔에서 3대 생산국이 빠져나감으로써 생산 조정 능력이 약화될 것이라고 짚었다.",tg:["UAE","OPEC","걸프"],u:"https://www.aljazeera.com/news/2026/4/29/uae-quits-opec-what-that-means-for-the-gulf-energy-markets-and-beyond"},
  {id:1430,p:10,r:"속보",t:"Trump vows to maintain Iran blockade, Tehran threatens &apos;practical&apos; action",k:"트럼프 &quot;이란 봉쇄 유지&quot;…테헤란 &quot;실질적·전례 없는 대응&quot; 위협",s:"Al Jazeera",c:"me",d:"2026-04-29",m:"President Trump told Axios he will continue the US naval blockade of Iran until a nuclear deal is reached, calling it &quot;more effective than the bombing&quot;; an Iranian security source said the blockade will be met with &quot;practical and unprecedented action&quot;.",mk:"트럼프 대통령은 액시오스에 핵협상 타결까지 대이란 해상 봉쇄를 유지하겠다며 &quot;폭격보다 효과적&quot;이라고 평가했다. 이란 안보 소식통은 봉쇄에 &quot;실질적이고 전례 없는 대응&quot;을 예고했다.",tg:["이란","봉쇄","트럼프"],u:"https://www.aljazeera.com/news/2026/4/29/trump-vows-to-maintain-iran-blockade-tehran-threaten-practical-action"},
  {id:1432,p:9,r:"속보",t:"Donald Trump vows to keep naval blockade on Iran until nuclear deal is reached",k:"트럼프 &quot;핵 합의 전까지 대이란 해상봉쇄 유지&quot;",s:"Jerusalem Post",c:"me",d:"2026-04-29",m:"President Trump said the US naval blockade of Iran will remain until Tehran agrees to a deal addressing US concerns over its nuclear programme; Iran&apos;s economy reportedly cannot withstand more than 6-8 weeks of blockade per a Security Council report.",mk:"트럼프 대통령은 미국이 우려하는 핵 프로그램 관련 합의에 이란이 응할 때까지 해상 봉쇄를 유지하겠다고 밝혔다. 안보리 보고서는 이란 경제가 6~8주 이상 봉쇄를 버티기 어렵다고 분석했다.",tg:["이란","봉쇄","핵"],u:"https://www.jpost.com/middle-east/iran-news/article-894640"},
  {id:1435,p:8,r:"속보",t:"Saudi Arabia to End LIV Golf Funding After Season, WSJ Reports",k:"WSJ &quot;사우디, 이번 시즌 후 LIV 골프 자금 지원 종료&quot;",s:"Bloomberg",c:"global",d:"2026-04-29",m:"Bloomberg, citing the Wall Street Journal, reports Saudi Arabia plans to end financial support for LIV Golf after the current season, signaling a recalibration of high-profile sports investments amid Vision 2030 spending review.",mk:"블룸버그는 월스트리트저널을 인용해 사우디가 이번 시즌 종료 후 LIV 골프 자금 지원을 중단할 계획이라고 전했다. 비전2030 지출 재검토 가운데 대형 스포츠 투자에 대한 우선순위 조정 신호로 해석된다.",tg:["LIV","스포츠","비전2030"],u:"https://www.bloomberg.com/news/articles/2026-04-29/saudi-arabia-to-pull-liv-golf-funding-after-season-wsj-reports"},
  {id:1436,p:7,r:"심층분석",t:"The US Should Listen to Saudi Arabia on Ending Iran War",k:"블룸버그 오피니언 &quot;美, 이란전 종전에 관해 사우디 목소리 들어야&quot;",s:"Bloomberg",c:"global",d:"2026-04-28",m:"Bloomberg Opinion argues Washington should heed Saudi Arabia&apos;s diplomatic emphasis on de-escalation and a Palestinian-track settlement to bring the Iran war to a close, arguing Riyadh has the most credible Gulf voice.",mk:"블룸버그 오피니언은 미국이 이란전 종전을 위해 긴장 완화와 팔레스타인 트랙 해결을 강조하는 사우디의 외교적 메시지를 경청해야 한다고 주장했다. 리야드가 걸프에서 가장 신뢰받는 목소리를 가지고 있다는 평가다.",tg:["사우디","미국","이란전쟁"],u:"https://www.bloomberg.com/opinion/articles/2026-04-28/the-us-should-listen-to-saudi-arabia-on-ending-iran-war"},
  {id:1437,p:9,r:"심층분석",t:"UAE Bristled at Saudis for Years Before Iran War Tipped Scales",k:"이란전쟁 전부터 누적된 사우디-UAE 갈등이 OPEC 탈퇴로 폭발",s:"Bloomberg",c:"global",d:"2026-04-29",m:"Bloomberg traces how years of UAE-Saudi friction over OPEC quotas, regional policy and economic competition culminated in Abu Dhabi&apos;s OPEC exit, with the Iran war providing the &quot;opportunity&quot; for the long-coming break.",mk:"블룸버그는 OPEC 쿼터, 지역 정책, 경제 경쟁을 둘러싸고 누적된 UAE-사우디 갈등이 결국 OPEC 탈퇴로 폭발했다고 분석했다. 이란전쟁이 오랫동안 예고된 결별의 &quot;기회&quot;를 제공했다는 평가다.",tg:["사우디","UAE","OPEC"],u:"https://www.bloomberg.com/news/articles/2026-04-29/uae-bristled-at-saudis-for-years-before-iran-war-tipped-scales"},
  {id:1438,p:10,r:"속보",t:"Brent oil tops $118 after Trump says he will blockade Iran until it agrees to a nuclear deal",k:"트럼프 &quot;핵 합의 전까지 대이란 봉쇄&quot;…브렌트유 118달러 돌파",s:"CNBC",c:"global",d:"2026-04-29",m:"Brent crude futures rose about 6% to settle at $118.03/bbl and WTI gained nearly 7% to $106.88/bbl after Trump vowed to maintain the Iran blockade until a nuclear deal is reached.",mk:"트럼프 대통령이 핵 합의 전까지 대이란 봉쇄를 유지하겠다고 밝히면서 브렌트유 선물은 6% 가까이 오른 배럴당 118.03달러, WTI는 7% 가까이 오른 106.88달러에 마감했다.",tg:["유가","Brent","이란"],u:"https://www.cnbc.com/2026/04/29/oil-prices-brent-wti-trump-iran.html"},
  {id:1440,p:8,r:"심층분석",t:"Shocking UAE exit rocks OPEC, but group will still hold significant sway over the oil market",k:"UAE 충격 탈퇴에도 OPEC 영향력은 여전히 상당",s:"CNBC",c:"global",d:"2026-04-29",m:"Despite UAE&apos;s shock exit, OPEC will retain significant sway over global oil markets given the dominance of Saudi Arabia, Iraq and Kuwait, though Bob McNally warned price volatility could amplify if discipline erodes.",mk:"UAE의 충격적 탈퇴에도 사우디·이라크·쿠웨이트의 비중을 감안할 때 OPEC의 시장 영향력은 상당 부분 유지될 전망이다. 다만 밥 맥낼리는 규율이 약화되면 유가 변동성이 확대될 수 있다고 경고했다.",tg:["OPEC","UAE","원유"],u:"https://www.cnbc.com/2026/04/29/shocking-uae-exit-rocks-opec-but-group-will-still-hold-significant-sway-over-the-oil-market.html"},
  {id:1441,p:8,r:"속보",t:"United Arab Emirates to leave OPEC May 1, energy chief says still committed to oil price stability",k:"UAE 에너지장관 &quot;5월 1일 OPEC 탈퇴…유가 안정엔 계속 기여&quot;",s:"CNBC",c:"global",d:"2026-04-28",m:"UAE Energy Minister Suhail Al Mazrouei told CNBC that the country will leave OPEC on May 1 to pursue accelerated capacity growth toward 5 million b/d by 2027, while remaining committed to oil-price stability.",mk:"UAE 수하일 알마즈루에이 에너지장관은 CNBC에 5월 1일 OPEC 탈퇴 입장을 재확인하고, 2027년 일산 500만 배럴 능력 달성을 위한 가속 증산을 추진하겠다며 유가 안정에는 계속 기여하겠다고 밝혔다.",tg:["UAE","OPEC","에너지"],u:"https://www.cnbc.com/2026/04/28/uae-opec-iran.html"},
  {id:1442,p:7,r:"심층분석",t:"Visualizing shipping through the Strait of Hormuz since war began",k:"전쟁 발발 이후 호르무즈 해협 운항 데이터 시각화",s:"CNN",c:"global",d:"2026-04-29",m:"CNN visualizes how shipping through the Strait of Hormuz has been largely blocked since the US-Israel war on Iran began on Feb 28, with about 15 million b/d of normal oil flows curtailed.",mk:"CNN은 2월 28일 미·이스라엘의 이란 전쟁 발발 이후 호르무즈 해협 운항이 사실상 봉쇄된 양상을 시각화했다. 평시 약 1500만 b/d 규모의 원유 흐름이 차단된 상태다.",tg:["Hormuz","해운","시각화"],u:"https://www.cnn.com/2026/04/29/world/iran-war-gulf-hormuz-shipping-maps-intl-vis"},
  {id:1443,p:8,r:"속보",t:"Day 61 of Middle East conflict — Hegseth at Iran war hearing, Trump discusses continuing blockade",k:"중동분쟁 61일차…헤그세스 의회 청문회·트럼프 봉쇄 지속 시사",s:"CNN",c:"global",d:"2026-04-29",m:"CNN&apos;s Day 61 live blog covers Defense Secretary Pete Hegseth at an Iran war hearing and Trump&apos;s decision to continue the Iran blockade rather than restart hostilities or end ceasefire negotiations.",mk:"CNN 라이브 블로그는 분쟁 61일차에 피트 헤그세스 국방장관의 의회 이란전 청문회 출석과, 적대행위 재개나 휴전협상 종료 대신 봉쇄 지속을 택한 트럼프의 결정 등을 전했다.",tg:["미국","이란전쟁","의회"],u:"https://www.cnn.com/2026/04/29/world/live-news/iran-war-peace-proposal-trump"},
  {id:1444,p:7,r:"심층분석",t:"Brent crude oil spot prices surge past futures price in April",k:"EIA &quot;4월 브렌트 현물가, 선물가 추월&quot;",s:"EIA",c:"global",d:"2026-04-29",m:"EIA reports physical Brent crude prices surged to record levels near $150/bbl in April, far above futures, reflecting the largest oil supply disruption on record amid the Hormuz crisis.",mk:"미 에너지정보청(EIA)은 호르무즈 사태로 인한 사상 최대 공급 차질을 반영해 4월 브렌트 현물가가 선물가를 크게 추월하며 배럴당 150달러에 근접한 사상 최고 수준에 이르렀다고 밝혔다.",tg:["EIA","Brent","유가"],u:"https://www.eia.gov/todayinenergy/detail.php?id=67544"},
  {id:1445,p:10,r:"속보",t:"Brent crude hits wartime high, soaring past $123, as US military to reportedly brief Trump on action against Iran",k:"브렌트유, 美 군사옵션 브리핑 보도에 123달러 돌파…전시 최고치",s:"CNBC",c:"global",d:"2026-04-30",m:"Brent crude hit a 4-year wartime high above $123/bbl on April 30 after a report that the US military would brief President Trump on potential action against Iran, even as crude/fuel inventories hit lows and exports surged.",mk:"4월 30일 브렌트유는 미군이 트럼프 대통령에게 대이란 군사옵션을 브리핑할 예정이라는 보도에 4년래 전시 최고치인 배럴당 123달러를 돌파했다. 원유·연료 재고가 급감하고 수출은 급증세를 보였다.",tg:["Brent","이란","미국"],u:"https://www.cnbc.com/2026/04/30/oil-prices-today-brent-wti-us-iran-war-trump.html"},
  {id:1446,p:7,r:"심층분석",t:"Latest Oil Market News and Analysis for April 29",k:"블룸버그 4월 29일 원유시장 종합 분석",s:"Bloomberg",c:"global",d:"2026-04-28",m:"Bloomberg&apos;s daily oil market wrap notes oil steadied as investors focused on next steps for Iran peace talks; the near-closure of the Strait of Hormuz continues to disrupt global markets and trigger inventory swings.",mk:"블룸버그 일일 원유시장 정리에 따르면 투자자들이 이란 평화협상 다음 단계를 주시하면서 유가는 안정세를 보였다. 호르무즈 해협 사실상 폐쇄가 계속해 글로벌 시장을 교란하고 재고 변동을 유발하고 있다.",tg:["유가","Bloomberg","원유"],u:"https://www.bloomberg.com/news/articles/2026-04-28/latest-oil-market-news-and-analysis-for-april-29"},
  {id:1447,p:9,r:"속보",t:"기름값 또 뛸 판인데…UAE는 OPEC 탈퇴, 60년 원유질서 흔들",k:"기름값 또 뛸 판인데…UAE는 OPEC 탈퇴, 60년 원유질서 흔들",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-30",m:"Financial News reports that UAE&apos;s OPEC exit shakes the 60-year cartel order amid renewed oil-price spikes, raising risks for Korea&apos;s energy import bill and inflation as the Hormuz blockade persists.",mk:"파이낸셜뉴스는 호르무즈 봉쇄 지속 속 유가 추가 상승 우려가 큰 가운데 UAE의 OPEC 탈퇴가 60년 카르텔 질서를 흔들고 있다고 보도했다. 한국의 에너지 수입 부담과 물가에 새로운 리스크다.",tg:["UAE","OPEC","유가"],u:"https://www.fnnews.com/news/202604300837196806"},
  {id:1448,p:8,r:"심층분석",t:"오일동맹 붕괴…&quot;유가, 단기 상승·중장기 하락 압력&quot;",k:"오일동맹 붕괴…&quot;유가, 단기 상승·중장기 하락 압력&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-29",m:"Financial News analyzes the disintegration of the OPEC oil alliance, projecting short-term upside in oil prices but medium-to-long-term downward pressure as UAE expands capacity outside the cartel.",mk:"파이낸셜뉴스는 OPEC 오일동맹 붕괴를 분석하며, 단기적으로는 유가 상승 압력이 우세하지만 UAE가 카르텔 밖에서 증산을 확대하면 중장기적으로는 하락 압력이 누적될 것으로 진단했다.",tg:["OPEC","유가","UAE"],u:"https://www.fnnews.com/news/202604291831437714"},
  {id:1451,p:7,r:"심층분석",t:"&apos;페트로 엑시트&apos; 산유국의 석유 카르텔 탈퇴가 보여준 신호",k:"&apos;페트로 엑시트&apos; 산유국의 석유 카르텔 탈퇴가 보여준 신호",s:"서울경제",c:"korean-view",d:"2026-04-29",m:"Seoul Economic Daily column dubs UAE&apos;s OPEC exit a &quot;Petro-Exit&quot;, arguing it signals a structural shift toward producer self-reliance and away from cartel-based price coordination as energy security takes priority.",mk:"서울경제 칼럼은 UAE의 OPEC 탈퇴를 &quot;페트로 엑시트&quot;로 명명하며, 에너지 안보를 우선시하는 가운데 카르텔 기반 가격 조정에서 산유국 자립 체제로의 구조적 전환 신호라고 진단했다.",tg:["UAE","OPEC","에너지안보"],u:"https://www.sedaily.com/article/20038844"},
  {id:1452,p:7,r:"심층분석",t:"사우디 등 돌린 UAE &apos;친미 밀착&apos;... 중국은 &apos;글로벌 사우스&apos; 결집",k:"사우디 등 돌린 UAE &apos;친미 밀착&apos;... 중국은 &apos;글로벌 사우스&apos; 결집",s:"서울경제",c:"korean-view",d:"2026-04-29",m:"Seoul Economic Daily morning brief reports UAE has tightened its alignment with the US (LNG, AI) after distancing itself from Saudi-led OPEC, while China is rallying the Global South in response to the energy realignment.",mk:"서울경제 글로벌 모닝 브리핑은 UAE가 사우디 주도 OPEC에서 등을 돌리고 LNG·AI 등에서 미국과의 밀착을 강화한 한편, 중국은 에너지 재편에 맞서 &apos;글로벌 사우스&apos; 결집에 나섰다고 전했다.",tg:["UAE","미국","중국"],u:"https://www.sedaily.com/article/20038807"},
  {id:1454,p:6,r:"주요경제",t:"Start Smart 2026 connects startups with investors in Riyadh",k:"&apos;Start Smart 2026&apos; 리야드에서 스타트업·투자자 매칭",s:"Saudi Gazette",c:"saudi",d:"2026-04-29",m:"Saudi Arabia&apos;s Start Smart 2026 forum brought startups together with investors in Riyadh, advancing the Kingdom&apos;s entrepreneurial ecosystem under Vision 2030&apos;s SME-growth pillar.",mk:"사우디는 리야드에서 &apos;Start Smart 2026&apos; 포럼을 개최해 스타트업과 투자자를 연결, 비전2030의 중소기업 성장 축에 따른 창업 생태계 활성화를 도모했다.",tg:["스타트업","투자","비전2030"],u:"https://saudigazette.com.sa/article/660949"},
  {id:1455,p:5,r:"심층분석",t:"Al Nassr face defining title run as Al Ahli clash looms",k:"알나스르, 알 아흘리와의 일전 앞두고 우승 분수령",s:"Saudi Gazette",c:"saudi",d:"2026-04-29",m:"Al Nassr face a title-defining stretch with the Al Ahli clash looming, as Cristiano Ronaldo continues to anchor the club&apos;s push for the Saudi Pro League crown.",mk:"호날두를 앞세운 알나스르가 알 아흘리와의 빅매치를 앞두고 사우디 프로리그 우승 향배를 가를 분수령에 섰다.",tg:["축구","Al Nassr","사우디"],u:"https://saudigazette.com.sa/article/660927/sports/al-nassr-face-title-defining-run-with-al-ahli-clash-ahead"},
  {id:1456,p:7,r:"심층분석",t:"PIF Governor reviews the Fund&apos;s journey and highlights 2026-2030 strategy",k:"PIF 총재, 펀드 여정 점검·2026~2030 전략 강조",s:"SPA",c:"saudi",d:"2026-04-15",m:"PIF Governor Yasir Al-Rumayyan reviewed the fund&apos;s journey, highlighting AUM growth from $150bn (2015) to over $900bn and outlining the 2026-2030 strategy with three portfolios: Vision, Strategic and Financial.",mk:"PIF 야시르 알루마얀 총재는 운용자산이 2015년 1500억달러에서 현재 9000억달러 이상으로 성장했다며, 비전·전략·재무의 3개 포트폴리오로 구성된 2026~2030 전략을 발표했다.",tg:["PIF","전략","비전2030"],u:"https://www.spa.gov.sa/en/N2562977"},
  {id:1457,p:9,r:"속보",t:"UAE announces decision to exit OPEC and OPEC+",k:"UAE 공식 통신사 WAM, OPEC·OPEC+ 탈퇴 공식 발표",s:"WAM",c:"gulf",d:"2026-04-28",m:"UAE&apos;s official news agency WAM published the formal announcement of the country&apos;s exit from OPEC and OPEC+ effective May 1, 2026, framing it as a policy-driven shift reflecting the UAE&apos;s long-term energy and economic vision.",mk:"UAE 공식 통신사 WAM은 5월 1일 OPEC·OPEC+ 탈퇴를 공식 발표했다. 장기 에너지·경제 비전을 반영한 정책적 변화라고 강조했다.",tg:["UAE","OPEC","WAM"],u:"https://www.wam.ae/en/article/bzxzuh7-uae-announces-decision-exit-opec-opec+"},
  {id:1458,p:8,r:"심층분석",t:"No more quotas: UAE&apos;s exit from OPEC paves way for independent oil strategy",k:"쿼터 종언…UAE의 OPEC 탈퇴, 독자 석유전략 발판",s:"The National",c:"gulf",d:"2026-04-29",m:"The National argues UAE&apos;s OPEC exit ends quota-driven constraints and clears the way for an independent oil strategy aligned with its 5 million b/d capacity ambition by 2027.",mk:"더 내셔널은 UAE의 OPEC 탈퇴가 쿼터 제약을 끝내고, 2027년 일산 500만 배럴 능력 목표에 맞춘 독자적 석유 전략으로 가는 발판이 된다고 분석했다.",tg:["UAE","OPEC","에너지전략"],u:"https://www.thenationalnews.com/business/energy/2026/04/29/uae-opec-exit/"},
  {id:1459,p:7,r:"심층분석",t:"Khaleej Times Explained: What is OPEC and what does UAE&apos;s exit mean?",k:"칼리지타임스 해설: OPEC이란 무엇이며 UAE 탈퇴의 의미는?",s:"Khaleej Times",c:"gulf",d:"2026-04-29",m:"Khaleej Times explainer reviews OPEC&apos;s history and quota mechanism, and assesses how UAE&apos;s exit—removing one of two key swing producers—will reshape Gulf and global oil dynamics.",mk:"칼리지 타임스 해설 기사는 OPEC의 역사와 쿼터 작동방식을 정리하고, 핵심 2대 스윙 생산국 중 하나를 잃는 UAE 탈퇴가 걸프와 세계 석유 시장에 미칠 영향을 평가했다.",tg:["UAE","OPEC","해설"],u:"https://www.khaleejtimes.com/business/energy/explained-what-is-opec-what-does-uae-exit-from-opec-mean"},
  {id:1462,p:7,r:"심층분석",t:"&apos;호르무즈 차질이 UAE의 OPEC 탈퇴 충격 압도&apos;…유가 상승·금 하락",k:"&apos;호르무즈 차질이 UAE의 OPEC 탈퇴 충격 압도&apos;…유가 상승·금 하락",s:"뉴스핌",c:"korean-view",d:"2026-04-29",m:"Newspim reports the Hormuz disruption is overwhelming the shock of UAE&apos;s OPEC exit, lifting oil prices while gold prices declined.",mk:"뉴스핌은 호르무즈 해협 차질의 영향이 UAE의 OPEC 탈퇴 충격을 압도하면서 유가는 상승하고 금값은 하락했다고 보도했다.",tg:["호르무즈","UAE","유가"],u:"https://www.newspim.com/news/view/20260429000012"},
  {id:1463,p:7,r:"속보",t:"Iran war live: Trump urges Tehran to &apos;just give up&apos; as oil prices surge",k:"이란전쟁 라이브: 트럼프 &quot;테헤란, 그냥 항복하라&quot;…유가 급등",s:"Al Jazeera",c:"me",d:"2026-04-30",m:"Al Jazeera live blog: Trump urged Iran to &quot;just give up&quot; while parliament speaker Ghalibaf mocked US strategy; oil prices surged as the standoff deepened.",mk:"알자지라 라이브 블로그에 따르면 트럼프 대통령이 이란에 &quot;그냥 항복하라&quot;고 압박한 가운데, 갈리바프 의회 의장은 미국 전략을 비웃었으며 유가는 대치 격화로 급등했다.",tg:["이란","트럼프","유가"],u:"https://www.aljazeera.com/news/liveblog/2026/4/30/iran-war-live-trump-urges-tehran-to-just-give-up-as-oil-prices-surge"},
  {id:1464,p:8,r:"속보",t:"US said working on assembling new coalition to ensure ships can pass through Hormuz",k:"美, 호르무즈 통항 보장 위한 신 연합체 구성 추진",s:"Times of Israel",c:"me",d:"2026-04-30",m:"Times of Israel reports the US is asking other countries to join a new international Maritime Freedom Construct coalition to enable ships to navigate the Strait of Hormuz, sharing intelligence and coordinating diplomatically.",mk:"타임스오브이스라엘은 미국이 호르무즈 해협 통항 보장을 위해 정보 공유와 외교 조율을 담당하는 새 국제 연합체 Maritime Freedom Construct 결성을 다른 국가들에 제안하고 있다고 전했다.",tg:["미국","Hormuz","연합체"],u:"https://www.timesofisrael.com/liveblog-april-30-2026/"},
  {id:1465,p:6,r:"심층분석",t:"Makkah authorities arrest violators of Hajj regulations",k:"메카 당국, 하지 규정 위반자 검거",s:"Arab News",c:"saudi",d:"2026-04-29",m:"Arab News reports Makkah police arrested five Egyptian residents for entering and staying in Makkah without a Hajj permit and arrested others for fraudulent permit ads, the Saudi Press Agency confirmed.",mk:"아랍뉴스에 따르면 메카 경찰은 하지 허가 없이 메카에 들어와 체류한 이집트인 5명을 검거했고, 허위 허가 광고 게시자도 검거했다고 사우디 통신(SPA)이 확인했다.",tg:["하지","메카","치안"],u:"https://www.arabnews.com/node/2641727/saudi-arabia"},
{id:1466,p:8,r:"외교",t:"Saudi Arabia hosts GCC ambassadors meeting in Poland to strengthen regional ties",k:"사우디, 폴란드 주재 GCC 대사 회의 주최…역내 결속 강화",s:"Arab News",c:"saudi",d:"2026-04-30",m:"Saudi ambassador to Poland Enass Al-Shahwan hosted GCC ambassadors accredited to Poland to discuss joint cooperation, regional developments, and ways to strengthen ties with Warsaw.",mk:"엔나스 알-샤환 주폴란드 사우디 대사가 GCC 회원국 대사들을 주재해 GCC 공동 협력, 최근 중동 정세, 폴란드와의 관계 강화 방안을 논의했다.",tg:["GCC","외교","폴란드"],u:"https://www.arabnews.com/node/2641781/saudi-arabia"},
{id:1467,p:9,r:"정책발표",t:"Saudi ambassador says adherence to Taif Accord key to any settlement in Lebanon",k:"사우디 대사 &quot;타이프 협정 준수가 레바논 해법의 핵심&quot;",s:"Arab News",c:"saudi",d:"2026-04-30",m:"Saudi Ambassador Walid Bukhari said the 1989 Taif Accord remains the backbone of any settlement in Lebanon, urging civil peace and reaffirming Riyadh&apos;s diplomatic role.",mk:"왈리드 부카리 주레바논 사우디 대사가 1989년 타이프 협정 준수를 레바논 사태 해법의 근간으로 강조하며 시민 평화와 사우디의 외교 역할을 재확인했다.",tg:["레바논","타이프협정","외교"],u:"https://www.arabnews.com/node/2641789/middle-east"},
{id:1468,p:7,r:"심층분석",t:"Makkah greens surge: 60,000 trees planted as Al-Mughmas park spotlights eco-tourism push",k:"메카 녹지화 가속…6만 그루 식재, 알-무그마스 공원 생태관광 부각",s:"Arab News",c:"saudi",d:"2026-04-30",m:"Kidana Development Co., a unit of the Royal Commission for Makkah, planted over 60,000 trees in holy sites; Al-Mughmas Valley emerging as Hajj-season eco-tourism showcase.",mk:"메카 왕립위원회 산하 키다나 개발이 성지 일대에 6만 그루 이상의 나무를 심었으며, 알-무그마스 계곡이 하지 시즌 생태관광 명소로 부상하고 있다.",tg:["메카","녹지화","생태관광"],u:"https://www.arabnews.com/node/2641804/saudi-arabia"},
{id:1469,p:9,r:"주요경제",t:"SABIC swings to net profit of $3.5m in Q1",k:"사빅, 1분기 350만 달러 흑자 전환…1년 전 적자 탈피",s:"Arab News",c:"saudi",d:"2026-04-29",m:"Saudi petrochemical giant SABIC posted SAR13.2m ($3.5m) Q1 net profit vs SAR1.21bn loss a year earlier; revenue down 10.65% to SAR26.15bn.",mk:"사우디 석유화학 기업 사빅(SABIC)이 1분기 1320만 리얄(약 350만 달러) 흑자를 기록해 전년 동기 12.1억 리얄 적자에서 흑자 전환했다. 매출은 10.65% 감소한 261.5억 리얄.",tg:["SABIC","실적","석유화학"],u:"https://www.arabnews.com/node/2641688/business-economy"},
{id:1470,p:9,r:"주요경제",t:"Saudi Arabia&apos;s economy grows 2.8% in Q1 as non-oil sector expands",k:"사우디 1분기 GDP 2.8% 성장…비석유 부문이 견인",s:"Arab News",c:"saudi",d:"2026-04-30",m:"Saudi Arabia&apos;s real GDP grew 2.8% YoY in Q1 2026—lowest since mid-2024—as Iran war hit oil exports, while non-oil activities continued to expand.",mk:"사우디 실질 GDP가 1분기에 전년 동기 대비 2.8% 성장하며 2024년 중반 이후 최저치를 기록했다. 이란 전쟁으로 원유 수출이 타격을 받았으나 비석유 부문은 확대됐다.",tg:["GDP","비석유","경제성장"],u:"https://www.arabnews.com/node/2641825/business-economy"},
{id:1471,p:8,r:"주요경제",t:"Saudi shipping firm Bahri posts 303% profit rise amid Gulf disruption",k:"사우디 국영 해운사 바흐리, 걸프 혼란 속 1분기 순이익 303% 급증",s:"Arab News",c:"saudi",d:"2026-04-30",m:"Bahri reported Q1 net profit of SAR2.15bn ($573m), up 303% YoY, as higher tanker rates and Arabian Gulf shipping disruption boosted earnings.",mk:"사우디 국영 해운사 바흐리가 유조선 운임 상승과 걸프 해운 차질로 1분기 순이익이 21.5억 리얄(5.73억 달러)로 전년 대비 303% 급증했다.",tg:["해운","바흐리","걸프"],u:"https://www.arabnews.com/node/2641823/business-economy"},
{id:1472,p:9,r:"정책발표",t:"Saudi Arabia stresses Hormuz maritime security priority",k:"사우디, 호르무즈 해상 안보가 국제 공동 책임이라고 강조",s:"Saudi Gazette",c:"saudi",d:"2026-04-28",m:"Saudi Arabia said safeguarding navigation in the Strait of Hormuz is a collective international responsibility amid unprecedented tension over the vital waterway.",mk:"사우디는 호르무즈 해협 항행 안전 보장이 국제사회 공동 책임이라며 핵심 항로를 둘러싼 긴장이 전례 없는 수준이라고 경고했다.",tg:["호르무즈","해상안보","외교"],u:"https://saudigazette.com.sa/article/660918"},

{id:1482,p:8,r:"주요경제",t:"UAE petrol and diesel prices for May: How oil surge and Strait of Hormuz disruption will impact costs",k:"UAE 5월 휘발유·경유 가격 인상…유가 급등·호르무즈 차질 반영",s:"Gulf News",c:"gulf",d:"2026-04-30",m:"UAE Fuel Price Committee announced May 2026 prices with petrol up to Dh3.66 and diesel at Dh4.69 amid Brent topping $119 and continued Hormuz disruption.",mk:"UAE 연료가격위원회가 5월 휘발유 가격을 최대 디르함 3.66, 경유 4.69로 인상한다고 발표했다. 브렌트유가 배럴당 119달러를 돌파하고 호르무즈 차질이 이어지는 가운데 단행됐다.",tg:["UAE","휘발유","유가"],u:"https://gulfnews.com/business/markets/uae-fuel-prices-for-may-out-today-petrol-diesel-costs-to-rise-as-oil-surges-1.500523775"},

{id:1493,p:9,r:"속보",t:"Donald Trump tells aides to prepare for extended blockade of Iran, WSJ reports",k:"트럼프, 측근들에 對이란 장기 봉쇄 준비 지시 (WSJ)",s:"Jerusalem Post",c:"me",d:"2026-04-29",m:"Per WSJ via Jerusalem Post: Trump instructed aides to prepare for an extended Iran naval blockade as he assessed alternative options carry more risk.",mk:"WSJ 보도(예루살렘포스트 인용)에 따르면 트럼프 대통령은 다른 선택지가 더 위험하다고 판단해 측근들에 對이란 해상 봉쇄 장기화 준비를 지시했다.",tg:["트럼프","봉쇄","이란"],u:"https://www.jpost.com/middle-east/article-894537"},
{id:1494,p:10,r:"헤드라인",t:"Oil prices surge to highest level since 2022 as Trump mulls Iran blockade extension",k:"유가, 트럼프의 對이란 봉쇄 연장 검토에 2022년 이후 최고치",s:"CNN",c:"global",d:"2026-04-30",m:"Brent crude topped $123 a barrel — its highest since 2022 — as Trump signaled plans to extend US naval blockade of Iran for months.",mk:"브렌트유가 트럼프의 對이란 해상 봉쇄 수개월 연장 시사로 배럴당 123달러를 돌파해 2022년 이후 최고치를 기록했다.",tg:["유가","CNN","봉쇄"],u:"https://www.cnn.com/2026/04/30/energy/oil-prices-iran-war-wartime-high-blockade-hnk"},
{id:1495,p:8,r:"심층분석",t:"Trump is betting his blockade will defy history and break Iran",k:"분석: 트럼프, 역사적 전례를 거스르며 봉쇄로 이란 굴복 시도",s:"CNN",c:"global",d:"2026-04-30",m:"CNN analysis: Trump&apos;s wager on a sustained Iran blockade defies historic precedent that maritime sieges rarely produce political surrender alone.",mk:"CNN 분석: 트럼프의 對이란 지속 봉쇄 전략은 해상 봉쇄만으로는 정치적 굴복을 이끌어내기 어렵다는 역사적 전례에 반한다.",tg:["봉쇄","이란","분석"],u:"https://edition.cnn.com/2026/04/30/politics/trump-iran-war-strait-of-hormuz-blockade-analysis"},
{id:1496,p:9,r:"헤드라인",t:"Trump says he rejects Iran&apos;s Hormuz offer, sustains blockade",k:"트럼프 &quot;이란의 호르무즈 제안 거부&quot;…봉쇄 유지",s:"Bloomberg",c:"global",d:"2026-04-29",m:"Trump told Axios he won&apos;t lift US naval blockade of Iran absent nuclear deal, rejecting Tehran&apos;s offer to reopen Strait of Hormuz.",mk:"트럼프는 액시오스와 인터뷰에서 핵 합의 없이는 對이란 해상 봉쇄를 해제하지 않겠다며 테헤란의 호르무즈 재개방 제안을 거부했다.",tg:["트럼프","봉쇄","이란"],u:"https://www.bloomberg.com/news/articles/2026-04-29/trump-tells-axios-he-rejects-iran-hormuz-offer-keeps-blockade"},
{id:1497,p:9,r:"주요경제",t:"Saudi economic growth slows as Iran war hits oil exports",k:"이란 전쟁이 원유 수출 강타…사우디 경제성장 둔화",s:"Bloomberg",c:"global",d:"2026-04-30",m:"Saudi Q1 GDP growth slowed to 2.8% YoY—lowest since mid-2024—as Iran war and Hormuz blockade disrupted oil exports critical to the Kingdom.",mk:"사우디 1분기 GDP 성장률이 이란 전쟁과 호르무즈 봉쇄로 원유 수출이 차질을 빚으며 2.8%(YoY)로 둔화돼 2024년 중반 이후 최저치를 기록했다.",tg:["사우디","GDP","이란전쟁"],u:"https://www.bloomberg.com/news/articles/2026-04-30/saudi-economic-growth-slows-as-iran-war-hits-oil-exports"},
{id:1498,p:7,r:"심층분석",t:"Wall Street is coming to terms with higher-for-longer oil prices",k:"월가, &apos;장기 고유가&apos; 시대 받아들이기 시작",s:"Axios",c:"global",d:"2026-04-29",m:"Axios: Wall Street strategists are revising portfolios for higher-for-longer crude as Iran war shows no near-term resolution and Hormuz remains constrained.",mk:"액시오스에 따르면 월가 전략가들은 이란 전쟁의 단기 해결 전망이 흐릿하고 호르무즈 차질이 지속됨에 따라 &apos;장기 고유가&apos;에 맞춰 포트폴리오를 재편하고 있다.",tg:["월가","유가","투자"],u:"https://www.axios.com/2026/04/29/oil-iran-wall-street"},

{id:1500,p:8,r:"속보",t:"Trump to be briefed on new wave of &apos;short, powerful&apos; strikes on Iran",k:"트럼프, &apos;단기·강력&apos; 對이란 추가 타격 브리핑 받을 예정",s:"Irish Times",c:"global",d:"2026-04-30",m:"US military to brief Trump on options for short, powerful strikes against Iranian targets as Hormuz standoff drags on and oil markets surge.",mk:"미군이 호르무즈 대치가 장기화하고 유가가 급등하는 가운데 트럼프 대통령에게 對이란 단기·강력 타격 옵션을 보고할 예정이라고 아이리시타임스가 전했다.",tg:["트럼프","이란","군사"],u:"https://www.irishtimes.com/world/middle-east/2026/04/30/us-iran-war-live-updates-israel-donald-trump-oil-prices-strait-of-hormuz/"},

{id:1513,p:8,r:"주요경제",t:"Hail hub receives Iraqi pilgrims as Saudi Arabia scales up Hajj 2026 operations",k:"하일 순례자 도시, 이라크 순례객 환영…사우디 2026 하지 운영 본격화",s:"Arab News",c:"saudi",d:"2026-05-02",m:"A convoy of Iraqi pilgrims arrived Friday at the Hail Pilgrim City, a key transit hub in northern Saudi Arabia, as the Kingdom accelerates preparations for the 2026 Hajj season. The integrated facility offers round-the-clock healthcare, rest areas and logistics support for overland pilgrims.",mk:"이라크 순례객 행렬이 금요일 사우디 북부 핵심 환승 허브인 하일 순례자 도시에 도착했다. 사우디는 2026년 하지 시즌 준비를 가속화하고 있으며, 24시간 의료·휴식·물류 지원 시설을 통합 운영한다.",tg:["하지", "순례", "하일", "이라크"],u:"https://www.arabnews.com/node/2642044/saudi-arabia"},
{id:1514,p:7,r:"심층분석",t:"Makkah Route streamlines Hajj journey for Türkiye pilgrims with tech, on-ground teams",k:"마카 루트 이니셔티브, 튀르키예 순례객 위한 첨단 기술·현장팀 운영",s:"Arab News",c:"saudi",d:"2026-05-03",m:"A Saudi-led initiative is transforming the Hajj travel experience for pilgrims departing from Türkiye, using advanced technology and coordinated on-ground services. A smart baggage coding system links luggage to pilgrim data and accommodation, allowing direct delivery to Makkah and Madinah residences.",mk:"사우디 주도의 마카 루트 이니셔티브가 첨단 기술과 현장 서비스로 튀르키예 출발 순례객 경험을 혁신하고 있다. 스마트 수하물 코딩 시스템이 짐을 순례객 데이터·숙소와 연결해 메카·메디나 숙소로 직접 운송한다.",tg:["하지", "마카루트", "튀르키예", "스마트"],u:"https://www.arabnews.com/node/2642135/saudi-arabia"},
{id:1515,p:7,r:"주요경제",t:"Stc Saudi Arabia profits beat expectations in Q1 2026",k:"사우디 STC, 1분기 순익 시장 예상 상회…SR3.7억 리얄",s:"Arab News",c:"saudi",d:"2026-04-29",m:"Net profit for STC Saudi Arabia reached approximately SR3.7 billion ($986.48 million), a 1.3 percent increase compared to the same quarter last year, surpassing the average analyst forecast compiled by Bloomberg.",mk:"사우디 STC의 1분기 순이익이 약 37억 리얄(9억8648만 달러)을 기록, 전년 동기 대비 1.3% 증가하며 블룸버그 집계 시장 평균 전망치를 웃돌았다.",tg:["STC", "실적", "통신", "리얄"],u:"https://www.arabnews.com/node/2641709/business-economy"},
{id:1516,p:6,r:"주요경제",t:"Saudi Qiwa platform tops 2m firms as labor reforms tighten contract compliance",k:"사우디 키와 노동플랫폼, 1분기 등록기업 200만 돌파…노동개혁 진전",s:"Arab News",c:"saudi",d:"2026-04-30",m:"The Qiwa labor platform of Saudi Arabia&apos;s Ministry of Human Resources and Social Development surpassed 2 million registered firms in Q1 2026, alongside 13 million workers and 12 million documented employment contracts.",mk:"사우디 인력자원·사회개발부의 키와(Qiwa) 노동 플랫폼 등록 기업이 1분기 200만 곳을 돌파했다. 등록 근로자 1300만 명, 문서화된 고용계약 1200만 건이 함께 집계됐다.",tg:["키와", "노동개혁", "고용", "비전2030"],u:"https://www.arabnews.com/node/2641945/saudi-arabia"},
{id:1517,p:6,r:"주요경제",t:"Kingdom promotes its &apos;ambitious&apos; startup industry in Tokyo",k:"사우디, 도쿄서 &apos;야심찬&apos; 스타트업 산업 홍보…한일 시장 공략",s:"Arab News",c:"saudi",d:"2026-04-29",m:"Saudi Arabia is promoting its growing startup ecosystem in Tokyo, highlighting Vision 2030&apos;s drive to attract foreign capital and talent into the Kingdom&apos;s technology and innovation sectors.",mk:"사우디아라비아가 도쿄에서 자국의 빠르게 성장하는 스타트업 생태계를 홍보하며, 비전 2030의 외국 자본·인재 유치 노력을 부각시키고 있다.",tg:["스타트업", "도쿄", "비전2030", "투자유치"],u:"https://www.arabnews.com/node/2641967/saudi-arabia"},
{id:1518,p:5,r:"심층분석",t:"Riyadh Expo 2030, Imam Abdulaziz Reserve partner to release wildlife, boost biodiversity",k:"리야드 엑스포 2030·이맘 압둘아지즈 보호구역, 야생동물 방생으로 생물다양성 강화",s:"Arab News",c:"saudi",d:"2026-05-02",m:"In partnership with Riyadh Expo 2030, the Imam Abdulaziz bin Mohammed Royal Reserve Development Authority recently released several wildlife species, including 80 spiny-tailed lizards, into the reserve as part of biodiversity preservation linked to Expo 2030 site development.",mk:"리야드 엑스포 2030과 이맘 압둘아지즈 빈 모하메드 왕립 보호구역 개발청이 협력해 가시꼬리도마뱀 80마리 등 야생동물을 방생했다. 엑스포 2030 부지 개발과 연계한 생물다양성 보전·환경 모니터링 일환이다.",tg:["엑스포2030", "생물다양성", "리야드", "환경"],u:"https://www.arabnews.com/node/2642088/saudi-arabia"},
{id:1519,p:7,r:"정책발표",t:"Saudi Interior Ministry says visit visas do not permit Hajj",k:"사우디 내무부 &quot;방문비자로는 하지 못 한다&quot;…정식 허가증 의무화 재확인",s:"Saudi Gazette",c:"saudi",d:"2026-05-01",m:"Saudi Arabia&apos;s Ministry of Interior stressed that visit visas of all types do not allow holders to perform Hajj, emphasizing that obtaining an official Hajj permit is a mandatory requirement for the 2026 pilgrimage season.",mk:"사우디 내무부는 모든 종류의 방문비자로는 하지를 수행할 수 없으며, 2026년 하지 시즌에는 공식 하지 허가증 발급이 필수라고 재차 강조했다.",tg:["하지", "비자", "내무부", "순례"],u:"https://saudigazette.com.sa/article/660999/saudi-arabia/saudi-interior-ministry-says-visit-visas-do-not-permit-hajj"},
{id:1520,p:8,r:"주요경제",t:"Saudi Arabia&apos;s PIF strategy shift strengthens financial resilience, Moody&apos;s says",k:"무디스 &quot;사우디 PIF 전략 전환, 재정 회복력 강화&quot;…2026-2030 신전략 평가",s:"Saudi Gazette",c:"saudi",d:"2026-04-30",m:"Moody&apos;s assessed that PIF&apos;s revised 2026-2030 strategy strengthens Saudi Arabia&apos;s financial resilience by reprioritizing capital toward AI, events, and housing while emphasizing returns and domestic ecosystem development.",mk:"무디스는 PIF의 2026-2030 신전략이 AI·이벤트·주택 등으로 자본을 재배분하고 수익성과 국내 생태계 개발을 강조함으로써 사우디 재정 회복력을 강화한다고 평가했다.",tg:["PIF", "무디스", "전략", "비전2030"],u:"https://saudigazette.com.sa/article/660952"},
{id:1521,p:6,r:"주요경제",t:"Saudi Arabia elected ITU Council vice chair",k:"사우디아라비아, ITU 이사회 부의장국 선출…국제 통신 영향력 확대",s:"Saudi Gazette",c:"saudi",d:"2026-04-30",m:"Saudi Arabia has been elected Vice Chair of the International Telecommunication Union (ITU) Council, with the appointment confirmed following the ITU Council&apos;s 2026 session held in Geneva.",mk:"사우디아라비아가 국제전기통신연합(ITU) 이사회 부의장국으로 선출됐다. 제네바에서 열린 ITU 이사회 2026년 회기에서 임명이 확정됐다.",tg:["ITU", "통신", "외교", "제네바"],u:"https://saudigazette.com.sa/article/660924"},
{id:1522,p:6,r:"속보",t:"Six Pakistanis apprehended while attempting to enter Makkah illegally",k:"사우디 하지 보안군, 불법 메카 진입 파키스탄인 6명 검거",s:"Saudi Gazette",c:"saudi",d:"2026-04-30",m:"Hajj Security Forces arrested a Pakistani resident for violating Hajj regulations by transporting five residents of the same nationality and attempting to enter Makkah without a Hajj permit, ahead of the 2026 pilgrimage season.",mk:"사우디 하지 보안군이 같은 국적자 5명을 태우고 하지 허가증 없이 메카 진입을 시도한 파키스탄 거주자를 체포했다. 2026 순례 시즌을 앞두고 하지 규정 단속이 강화됐다.",tg:["하지", "보안", "파키스탄", "메카"],u:"https://saudigazette.com.sa/article/660934"},
{id:1523,p:5,r:"주요경제",t:"MindSpire Education officially launches in Saudi Arabia",k:"마인드스파이어 에듀케이션, 사우디 공식 런칭…디리야서 출범식",s:"Saudi Gazette",c:"saudi",d:"2026-04-30",m:"MindSpire Education officially launched its new brand identity at a ceremony in Diriyah, Riyadh. MindSpire will convene a joint Hayah-Fulton roundtable on May 13, 2026 at Bab Samhan, Diriyah, bringing together academic leaders.",mk:"마인드스파이어 에듀케이션이 리야드 디리야에서 새로운 브랜드 정체성을 공식 출범했다. 5월 13일 디리야 밥 삼한에서 학계 지도자들이 모이는 하야-풀턴 합동 라운드테이블이 예정돼 있다.",tg:["교육", "디리야", "마인드스파이어", "리야드"],u:"https://saudigazette.com.sa/article/660951"},
{id:1524,p:7,r:"주요경제",t:"Poll: How did Saudi banks perform in Q1 2026",k:"사우디 은행권 1분기 실적 전망…전년比 견조한 성장 예상",s:"Argaam",c:"saudi",d:"2026-05-02",m:"Argaam&apos;s analyst poll surveys Q1 2026 performance of major Saudi banks. With higher oil revenue cushioning the war shock, banks are expected to deliver solid loan growth and resilient margins despite regional volatility.",mk:"아르감의 애널리스트 설문조사가 사우디 주요 은행들의 1분기 실적을 점검한다. 유가 상승에 따른 전쟁 충격 완화로 견조한 대출 성장과 마진 회복력이 예상된다.",tg:["은행", "실적", "아르감", "마진"],u:"https://www.argaam.com/en/article/articledetail/id/1899209"},
{id:1525,p:7,r:"주요경제",t:"SABIC Swings to Q1 Profit",k:"사빅(SABIC), 1분기 흑자 전환…석유화학 업황 회복 신호",s:"Asharq Al-Awsat",c:"saudi",d:"2026-05-03",m:"Saudi petrochemical giant SABIC swung to a Q1 2026 profit, reversing prior losses as higher oil prices supported margins and product spreads despite regional turmoil and Hormuz disruption.",mk:"사우디 석유화학 거인 사빅(SABIC)이 1분기 흑자 전환에 성공했다. 유가 상승이 마진과 제품 스프레드를 지지했으며, 지역 정세 불안과 호르무즈 차질에도 손실에서 회복됐다.",tg:["SABIC", "석유화학", "흑자", "실적"],u:"https://english.aawsat.com/business/5268075-sabic-swings-q1-profit"},
{id:1526,p:6,r:"주요경제",t:"Saudi Trade Offices contribute to creating 2,221 export opportunities, securing 393 new investments",k:"사우디 무역사무소, 수출기회 2,221건·신규투자 393건 창출 성과",s:"Asharq Al-Awsat",c:"saudi",d:"2026-05-03",m:"Saudi Arabia&apos;s General Authority of Foreign Trade said Saudi commercial attachés contributed to creating 2,221 export opportunities and secured 393 new investment opportunities, supporting non-oil diversification efforts.",mk:"사우디 대외무역청은 자국 상무관들이 2,221건의 수출 기회 창출과 393건의 신규 투자 유치 성과를 거뒀다고 밝혔다. 비석유 다변화 정책을 뒷받침하는 성과다.",tg:["무역", "수출", "투자", "비석유"],u:"https://english.aawsat.com/business/5267701-saudi-trade-offices-contribute-creating-2221-export-opportunities-securing-393-new"},
{id:1527,p:7,r:"심층분석",t:"Saudi Arabia raises $11.5 bln to open 2026 amid strong investor demand",k:"사우디, 2026년 초 115억 달러 채권 발행 성공…투자수요 강세",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-30",m:"Saudi Arabia raised $11.5 billion in international debt markets early in 2026 amid strong investor demand, signaling confidence in the Kingdom&apos;s creditworthiness despite war-related fiscal pressures.",mk:"사우디아라비아가 2026년 초 국제 채권시장에서 115억 달러를 조달했다. 전쟁발 재정 압박에도 강한 투자수요를 확인하며 사우디의 신용도에 대한 시장 신뢰가 입증됐다.",tg:["채권", "조달", "재정", "신용"],u:"https://english.aawsat.com/business/5227161-saudi-arabia-raises-115-bln-open-2026-amid-strong-investor-demand"},
{id:1528,p:7,r:"심층분석",t:"Oman to build dedicated AI zone in economic diversification push",k:"오만, AI 특별경제구역 신설…경제 다변화 박차",s:"The National",c:"gulf",d:"2026-04-30",m:"Oman is building a Special Artificial Intelligence Zone in Muscat, offering incentives under free zone laws to boost technology-driven economic growth as the sultanate accelerates its post-oil diversification.",mk:"오만이 무스카트에 특별 AI 경제구역을 조성한다. 자유무역지대법상 인센티브를 통해 기술 주도 성장을 촉진하며, 술탄국의 탈석유 다변화 행보를 가속화한다.",tg:["오만", "AI", "무스카트", "다변화"],u:"https://www.thenationalnews.com/business/economy/2026/04/30/oman-to-build-dedicated-ai-zone-in-economic-diversification-push/"},
{id:1529,p:6,r:"주요경제",t:"Make it in the Emirates 2026: Dates, venue, how to get there",k:"&apos;Make it in the Emirates 2026&apos; 5월 4일 개막…역대 최대규모 산업박람회",s:"Khaleej Times",c:"gulf",d:"2026-05-02",m:"The fifth edition of Make it in the Emirates (MIITE), the UAE&apos;s flagship industrial platform, runs May 4-7, 2026 at ADNEC Centre Abu Dhabi. The event features 1,245 exhibitors across 88,000 sqm — a 73% increase versus 2025.",mk:"UAE 대표 산업 플랫폼 &apos;Make it in the Emirates&apos; 5번째 행사가 5월 4-7일 ADNEC 아부다비에서 열린다. 88,000㎡ 규모로 1,245개 업체가 참가해 전년대비 73% 확대됐다.",tg:["UAE", "제조업", "산업", "아부다비"],u:"https://www.khaleejtimes.com/business/make-it-in-the-emirates-2026-adnec-group-dates-venue"},
{id:1530,p:7,r:"정책발표",t:"UAE May 2026: 7 major changes residents need to know — OPEC exit, banking, AI work permits",k:"UAE 5월 7대 변화: OPEC 탈퇴·새 은행규제·AI 취업비자·여행권 등",s:"Gulf News",c:"gulf",d:"2026-04-30",m:"UAE residents face seven major changes from May 2026: OPEC exit effective May 1, new banking rules, AI/robotics-based work permit assessments, expanded travel rights, and Eid Al Adha public holiday schedule.",mk:"5월부터 UAE 거주자에게 적용되는 7대 변화: 5월 1일 OPEC 공식 탈퇴, 새로운 은행 규제, AI·로봇 기반 취업비자 심사, 여행권 확대, 이드 알 아드하 공휴일 등이 시행된다.",tg:["UAE", "OPEC", "규제", "AI"],u:"https://gulfnews.com/amp/story/living-in-uae/ask-us/uae-may-2026-7-major-changes-residents-need-to-know-1.500524628"},
{id:1531,p:7,r:"속보",t:"UAE Civil Aviation Authority announces return of normal air traffic operations",k:"UAE 민간항공청, 항공 정상운항 복귀 발표…전쟁 일시 조치 해제",s:"Qatar Tribune",c:"gulf",d:"2026-05-02",m:"The UAE Civil Aviation Authority announced the return of normal air traffic operations in the country&apos;s airspace and the lifting of temporary precautionary measures, following a comprehensive assessment of operational and security conditions.",mk:"UAE 민간항공청은 자국 영공의 항공 정상운항 복귀와 임시 예방조치 해제를 발표했다. 운영·보안 상황에 대한 종합 평가에 따른 조치다.",tg:["UAE", "항공", "민항", "안보"],u:"http://thepeninsulaqatar.com/article/02/05/2026/uae-civil-aviation-authority-announces-return-of-normal-air-traffic-operations"},
{id:1532,p:6,r:"심층분석",t:"From railways to energy — five strategic projects linking Gulf states",k:"&apos;철도에서 에너지까지&apos; — 걸프 6개국 잇는 5대 전략 프로젝트",s:"Al Jazeera",c:"gulf",d:"2026-04-30",m:"Gulf leaders gathered in Riyadh discussed expediting longstanding joint projects including the GCC railway, electricity grid interconnection, water security, and joint missile defense, as the Iran war exposes regional vulnerabilities.",mk:"리야드 정상회의에서 걸프 지도자들이 GCC 철도·전력망 연계·수자원 안보·공동 미사일 방어 등 장기 공동 프로젝트 가속화를 논의했다. 이란 전쟁이 지역 취약성을 부각시킨 데 따른 대응이다.",tg:["GCC", "철도", "에너지", "공동프로젝트"],u:"https://www.aljazeera.com/economy/2026/4/30/from-railways-to-energy-five-strategic-projects-linking-gulf"},
{id:1533,p:9,r:"심층분석",t:"UAE exit from OPEC signals closer alignment with US interests, experts say",k:"&quot;UAE의 OPEC 탈퇴는 美와의 밀착 신호&quot;…전문가 분석",s:"Al Jazeera",c:"me",d:"2026-05-01",m:"Experts say UAE&apos;s OPEC exit signals a strategic pivot toward closer alignment with US interests. The move grants UAE flexibility to expand production and supports US-led efforts to weaken Saudi-led oil cartel pricing power.",mk:"전문가들은 UAE의 OPEC 탈퇴를 미국과의 전략적 밀착 신호로 해석한다. UAE는 증산 자율성을 확보하고, 미국이 추진해온 사우디 주도 OPEC 가격결정력 약화 노력에 부응한다.",tg:["UAE", "OPEC", "미국", "전략전환"],u:"https://www.aljazeera.com/economy/2026/5/1/uae-exit-from-opec-signals-closer-alignment-with-us-interests-experts-say"},
