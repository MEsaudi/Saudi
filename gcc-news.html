  {id:1183,p:8,r:"심층분석",t:"US-Iran Talks Stall, Highlighting Limits of Pakistan's Mediation Drive",k:"미·이란 협상 답보…파키스탄 중재력 한계 부각",s:"Bloomberg",c:"global",d:"2026-04-27",m:"Bloomberg analyses that the US and Iran failed to launch a second round of peace talks despite Pakistan's last-minute push, exposing limits of Islamabad's mediation drive. Trump cancelled Kushner-Witkoff travel to Islamabad, saying Iran \"offered a lot, but not enough\".",mk:"블룸버그 분석: 파키스탄의 막판 노력에도 미·이란 2차 평화회담이 무산되며 이슬라마바드의 중재력 한계가 드러남. 트럼프는 \"이란이 많이 제안했지만 충분치 않다\"며 쿠슈너·위트코프의 이슬라마바드 출장을 취소.",tg:["미·이란","파키스탄","쿠슈너","위트코프"],u:"https://www.bloomberg.com/news/articles/2026-04-27/stalled-us-iran-talks-show-limits-of-pakistan-s-mediation-drive"},
  {id:1184,p:9,r:"심층분석",t:"Gulf economies head for worst crisis since pandemic as war roils energy lifeline",k:"걸프 경제, 전쟁이 에너지 생명줄 흔들며 팬데믹 이후 최악 위기 직면",s:"Reuters",c:"global",d:"2026-04-27",m:"Reuters poll: Gulf economies are heading for their worst crisis since the pandemic as the Iran war roils the region's energy lifeline. Qatar, Kuwait and Bahrain are now expected to shrink 6.0%, 4.4% and 2.9% respectively in 2026, a total reversal from 4.9%, 3.4% and 2.9% growth seen in January.",mk:"로이터 조사: 이란전이 걸프지역의 에너지 생명줄을 흔들면서 걸프 경제가 팬데믹 이후 최악의 위기에 직면. 카타르·쿠웨이트·바레인은 2026년 각각 -6.0%·-4.4%·-2.9% 위축 전망으로, 1월의 +4.9%·+3.4%·+2.9% 성장 전망에서 완전히 뒤집힘.",tg:["걸프경제","로이터","위축","이란전"],u:"https://www.reuters.com/markets/commodities/"},
  {id:1185,p:7,r:"속보",t:"Iran offers US deal to reopen Hormuz strait, postpone nuclear talks",k:"이란, 미국에 호르무즈 재개통+핵협상 연기 합의안 제안",s:"Axios",c:"global",d:"2026-04-27",m:"Axios reports Iran offered the US a deal — relayed by Pakistani mediators — to reopen the Strait of Hormuz and end the war first, while deferring nuclear talks until the US blockade is lifted. Trump publicly said Iran \"offered a lot, but not enough\".",mk:"악시오스 보도: 이란이 파키스탄 중재로 미국에 \"미국 봉쇄 해제 후 호르무즈 우선 개방하며 전쟁 종식, 핵협상은 추후 단계\" 합의안 제시. 트럼프는 공개적으로 \"많이 제안했지만 충분치 않다\"고 평가.",tg:["이란","호르무즈","핵협상","악시오스"],u:"https://www.axios.com/2026/04/27/iran-us-hormuz-strait-nuclear-talks-proposal-pakistan"},
  {id:1186,p:8,r:"심층분석",t:"As U.S.-Iran talks falter, Iran's foreign minister meets with Putin",k:"美·이란 협상 흔들리자 이란 외무장관, 푸틴과 회담",s:"Washington Post",c:"global",d:"2026-04-27",m:"Washington Post reports Iranian FM Abbas Araghchi met with Russian President Vladimir Putin in Moscow as US-Iran talks faltered, signaling Tehran's pivot toward Moscow as Trump cancelled envoy travel to Islamabad and rejected Iran's Hormuz-first proposal.",mk:"워싱턴포스트 보도: 미·이란 협상이 흔들리는 가운데 압바스 아라크치 이란 외무장관이 모스크바에서 푸틴 러시아 대통령과 회담. 트럼프가 특사단의 이슬라마바드 출장을 취소하고 이란의 호르무즈 우선 제안을 거부하자 테헤란이 모스크바로 선회하는 신호로 해석.",tg:["아라크치","푸틴","모스크바","WaPo"],u:"https://www.washingtonpost.com/world/2026/04/27/iran-talks-putin-araghchi-trump-russia/"},
  {id:1187,p:7,r:"심층분석",t:"Iran's foreign minister leaves Pakistan, then Trump cancels U.S. delegation's travel",k:"이란 외무장관, 파키스탄 떠나자…트럼프, 美 대표단 출장 취소",s:"NPR",c:"global",d:"2026-04-25",m:"NPR reports Iranian FM Abbas Araghchi left Pakistan after weekend mediation talks, after which Trump cancelled the planned travel of envoys Kushner and Witkoff to Islamabad. The cancellation reflected Iran's refusal to widen talks beyond Hormuz/ceasefire.",mk:"NPR 보도: 이란 외무장관 압바스 아라크치가 주말 중재회담 뒤 파키스탄을 떠난 직후 트럼프가 쿠슈너·위트코프 특사단의 이슬라마바드 출장을 취소. 이란이 호르무즈·휴전 이외 의제로의 확대를 거부한 것이 배경.",tg:["아라크치","NPR","쿠슈너","위트코프"],u:"https://www.npr.org/2026/04/25/nx-s1-5799372/iran-middle-east-updates"},
  {id:1188,p:9,r:"속보",t:"Brent oil prices top $108 per barrel after Iran peace talks unravel",k:"브렌트유, 이란 평화회담 좌초에 배럴당 108달러 돌파",s:"CNBC",c:"global",d:"2026-04-26",m:"CNBC reports Brent oil futures with June delivery rose nearly 3% to close at $108.23 per barrel after Trump cancelled the envoys' Islamabad trip. WTI futures with June delivery added about 2% to settle at $96.37 as the Hormuz disruption persists.",mk:"CNBC 보도: 트럼프가 특사단의 이슬라마바드 출장을 취소한 뒤 6월물 브렌트유가 약 3% 상승해 배럴당 108.23달러로 마감. 6월물 WTI는 약 2% 올라 96.37달러에 마감. 호르무즈 차질 지속.",tg:["브렌트","WTI","유가","CNBC"],u:"https://www.cnbc.com/2026/04/26/oil-price-iran-war-strait-hormuz.html"},
  {id:1189,p:10,r:"헤드라인",t:"이란 중앙은행, 호르무즈 통행료 징수용 4개 통화 전용 계좌 개설",k:"이란 중앙은행, 호르무즈 통행료 징수용 4개 통화 전용 계좌 개설",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-28",m:"Iran's central bank has opened dedicated accounts in four currencies — rial, yuan, dollar and euro — to collect transit fees from vessels passing through the Strait of Hormuz, formalizing the toll regime, according to Iranian lawmaker Alaaeddin Boroujerdi.",mk:"이란 중앙은행이 호르무즈 해협 통과 선박들로부터 통행료를 거두기 위해 리알·위안·달러·유로 등 4개 통화 전용 계좌를 개설했다고 알라에딘 브루제르디 의원이 밝혀. 호르무즈 통행료 제도가 사실상 공식화되는 단계.",tg:["호르무즈","통행료","이란","중앙은행"],u:"https://www.fnnews.com/news/202604280707200169"},
  {id:1190,p:9,r:"속보",t:"\"이란, 美에 '우선 호르무즈 개방·종전 합의→이후 핵협상' 제안\"",k:"\"이란, 美에 '우선 호르무즈 개방·종전 합의→이후 핵협상' 제안\"",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-27",m:"Iran reportedly proposed to the US — via Pakistani mediators — to reopen the Strait of Hormuz and conclude an end-of-war agreement first, with nuclear talks deferred. Trump publicly expressed dissatisfaction, saying it was not enough.",mk:"이란이 파키스탄 중재로 미국에 \"우선 호르무즈 개방과 종전 합의를 도출하고 핵협상은 그 이후로 미루자\"는 제안을 한 것으로 알려져. 핵능력 제거를 핵심 목표로 내세워 온 트럼프 대통령은 \"충분치 않다\"며 불만 표명.",tg:["이란","호르무즈","핵협상","트럼프"],u:"https://www.fnnews.com/news/202604271206102475"},
  {id:1191,p:9,r:"속보",t:"\"호르무즈 열겠다\"던 트럼프…통행량 '0', 사상 첫 폐쇄 위기",k:"\"호르무즈 열겠다\"던 트럼프…통행량 '0', 사상 첫 폐쇄 위기",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-27",m:"Trump pledged to \"open Hormuz\" but actual transit traffic has fallen to near zero, raising risk of the strait's first-ever effective closure. Average daily transits have collapsed from a typical 135 vessels to about zero, signaling deeper supply-chain disruption.",mk:"트럼프 대통령이 \"호르무즈를 열겠다\"고 공언했지만 실제 통행량은 사실상 0에 가까워지며 사상 첫 해협 폐쇄 위기에 내몰려. 평시 하루 평균 135척에 달하던 통항이 0척 수준으로 추락, 글로벌 공급망 충격이 가중될 전망.",tg:["호르무즈","폐쇄","트럼프","공급망"],u:"https://www.fnnews.com/news/202604271000449082"},
  {id:1192,p:8,r:"심층분석",t:"호르무즈·핵 입장차 못 좁히고… '치킨게임' 들어간 美·이란",k:"호르무즈·핵 입장차 못 좁히고… '치킨게임' 들어간 美·이란",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-26",m:"With Hormuz blockade and nuclear positions still unbridgeable, the US and Iran have entered a \"chicken game\". Trump cancelled envoy travel to Islamabad while Iran refused talks under siege; markets price in prolonged stalemate.",mk:"호르무즈 봉쇄 해제와 핵협상의 입장차를 좁히지 못한 채 미국과 이란이 \"치킨게임\"에 돌입. 트럼프가 특사단의 이슬라마바드 출장을 취소하자 이란은 \"봉쇄 하 협상 거부\"로 맞서며 시장은 장기 교착 가격에 반영.",tg:["치킨게임","호르무즈","핵협상","교착"],u:"https://www.fnnews.com/news/202604261847345786"},
  {id:1193,p:8,r:"심층분석",t:"베이커휴즈 \"호르무즈 완전 개방, 상반기엔 어렵다\" [美-이란 전쟁]",k:"베이커휴즈 \"호르무즈 완전 개방, 상반기엔 어렵다\" [美-이란 전쟁]",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-26",m:"Baker Hughes told investors it has rebuilt corporate strategy around the assumption that the Strait of Hormuz will not fully reopen in H1 2026, treating the closure as a baseline rather than a variable. Mine clearance alone is estimated at six months by US officials.",mk:"베이커휴즈는 호르무즈 해협이 2026년 상반기 중에 완전 개방되지 않을 것이라는 전제 아래 기업 전략을 재편했다고 밝히며, 봉쇄를 \"변수\"가 아닌 \"상수\"로 다루겠다고 설명. 미 당국은 기뢰 제거에만 6개월이 걸린다고 평가.",tg:["베이커휴즈","호르무즈","기뢰","H1"],u:"https://www.fnnews.com/news/202604231822247872"},
  {id:1194,p:7,r:"주요경제",t:"1350조 사우디 국부펀드 '새 전략'...AI·광물에 집중 투자",k:"1350조 사우디 국부펀드 '새 전략'...AI·광물에 집중 투자",s:"서울경제",c:"korean-view",d:"2026-04-17",m:"Saudi PIF's newly approved 2026-2030 strategy concentrates investments in AI infrastructure, mining and tourism while scaling back sprawling real-estate megaprojects. Domestic investments rise to 80% (from ~70%) and foreign to 20% under chair-Crown Prince's vision.",mk:"무함마드 빈살만 왕세자가 의장을 맡은 사우디 국부펀드(PIF)의 2026~2030 신전략이 AI 인프라·광물·관광에 집중 투자하는 한편 대규모 부동산 메가프로젝트 비중은 축소. 국내 투자 비중은 70%에서 80%로 상향, 해외는 20%로 조정.",tg:["PIF","AI","광물","비전2030"],u:"https://www.sedaily.com/article/20007195"}

,
  {id:1195,p:9,r:"정책발표",t:"Council of Economic and Development Affairs reviews Saudi Vision 2030 achievements as it enters its 3rd phase",k:"사우디 경제개발위원회, 비전 2030 3단계 진입 점검 회의 개최",s:"Arab News",c:"saudi",d:"2026-04-27",m:"Saudi Arabia's Council of Economic and Development Affairs reviewed Vision 2030 achievements as it enters the third (2026-2030) and final phase, with Crown Prince Mohammed bin Salman affirming Vision 2030 has driven a qualitative leap in the Kingdom's development.",mk:"사우디 경제개발위원회(CEDA)는 2026~2030년 비전 2030 3단계 최종 국면 진입을 맞아 그간 성과를 점검했고, 무함마드 빈 살만 왕세자는 비전 2030이 사우디 발전 경로에 \"질적 도약\"을 가져왔다고 강조했다.",tg:["비전2030","CEDA","왕세자","3단계"],u:"https://www.arabnews.com/node/2641468/business-economy"},
  {id:1196,p:7,r:"심층분석",t:"Tourism minister inspects readiness of pilgrims' accommodation in Makkah",k:"사우디 관광장관, 메카 순례객 숙소 준비상태 점검",s:"Saudi Gazette",c:"saudi",d:"2026-04-27",m:"Tourism Minister Ahmed Al-Khateeb inspected hospitality facilities in Makkah ahead of Hajj 2026, noting the new Temporary Accommodation licensing service has added more than 566,000 beds. Hajj is expected from May 24-29.",mk:"아흐마드 알카팁 관광장관이 5월 24~29일 예상 하지를 앞두고 메카의 순례객 환대 시설을 점검했다. 임시 숙박 허가제 도입으로 56만 6천여 객실이 신규 공급되어 서비스 품질이 강화됐다고 밝혔다.",tg:["관광부","하지","메카","숙박"],u:"https://saudigazette.com.sa/article/660904/saudi-arabia/tourism-minister-inspects-readiness-of-pilgrims-accommodation-in-makkah"},
  {id:1197,p:6,r:"정책발표",t:"Saudi, GCC citizens can perform Umrah until May 3",k:"사우디·GCC 시민, 5월 3일까지 우므라 수행 가능",s:"Saudi Gazette",c:"saudi",d:"2026-04-27",m:"The Ministry of Hajj and Umrah announced that Saudi citizens, Gulf Cooperation Council (GCC) citizens and expatriates in the Kingdom can perform Umrah rituals until May 3, before transitioning operations toward Hajj 2026.",mk:"사우디 하지·우므라부는 사우디 시민과 GCC 시민, 사우디 거주 외국인이 5월 3일까지 우므라를 수행할 수 있다고 발표했다. 이후 운영은 2026년 하지 준비로 전환된다.",tg:["우므라","하지부","GCC"],u:"https://saudigazette.com.sa/article/660897/saudi-arabia/saudi-gcc-citizens-and-expats-in-kingdom-can-perform-umrah-until-may-3"},
  {id:1198,p:7,r:"심층분석",t:"Iranian pilgrims fully adhering to Saudi regulations, says envoy as first group lands in Madinah",k:"이란 대사 \"이란 순례객, 사우디 규정 철저히 준수\"…1진 메디나 도착",s:"Saudi Gazette",c:"saudi",d:"2026-04-26",m:"Iran's Ambassador Alireza Enayati expressed gratitude to Saudi authorities as the first batch of Iranian Hajj pilgrims arrived in Madinah. Iran will send around 30,000 pilgrims this season following coordination with Riyadh, signaling continued people-to-people ties despite regional tensions.",mk:"이란 대사 알리레자 에나야티가 첫 이란 하지 순례단의 메디나 도착에 맞춰 사우디 당국에 감사를 표했다. 이란은 리야드와의 조율을 거쳐 올해 약 3만 명의 순례객을 보낼 예정이며, 역내 긴장 속에서도 양국 인적 교류가 유지되고 있다는 신호다.",tg:["이란순례","메디나","외교","에나야티"],u:"https://saudigazette.com.sa/article/660878/saudi-arabia/our-pilgrims-are-fully-adhering-to-saudi-regulations-says-envoy-enayati-as-first-group-of-iranian-pilgrims-lands-in-madinah"},
  {id:1199,p:6,r:"심층분석",t:"Saudi Masam project clears 1,273 explosive devices in Yemen",k:"사우디 마삼 프로젝트, 예멘서 폭발물 1,273개 제거",s:"Arab News",c:"saudi",d:"2026-04-27",m:"Saudi Arabia's Masam project removed 1,273 explosive devices from Yemen last week, including 1,157 unexploded ordnances, 105 anti-tank mines, three anti-personnel mines and eight IEDs, advancing humanitarian demining efforts in the war-torn country.",mk:"사우디의 예멘 지뢰 제거 사업 \"마삼\"이 지난주 폭발물 1,273개(불발탄 1,157개, 대전차지뢰 105개, 대인지뢰 3개, 사제폭발물 8개)를 제거하며 인도주의 활동에 속도를 내고 있다.",tg:["마삼","예멘","지뢰제거","인도주의"],u:"https://www.arabnews.com/node/2641446/saudi-arabia"},
  {id:1200,p:5,r:"심층분석",t:"Saudi club unveils major falconry events lineup",k:"사우디 매사냥클럽, 2026년 주요 매사냥 행사 일정 공개",s:"Arab News",c:"saudi",d:"2026-04-27",m:"The Saudi Falcons Club unveiled its 2026 calendar of falconry activities aimed at promoting national heritage and reinforcing the Kingdom's status as a global falconry hub. The lineup begins with the International Falcon Breeders Auction from August 5-25.",mk:"사우디 매사냥클럽이 국가 유산 진흥과 글로벌 매사냥 허브 지위 강화를 위한 2026년 행사 일정을 공개했다. 8월 5~25일 국제 매 사육자 경매를 시작으로 다양한 행사가 이어진다.",tg:["매사냥","문화유산","경매"],u:"https://www.arabnews.com/node/2641445/saudi-arabia"},
  {id:1201,p:5,r:"심층분석",t:"Saudi lab gains global recognition for equine testing",k:"사우디 동물 위생 연구소, 33개국 마(馬) 질병 검사 인증 획득",s:"Arab News",c:"saudi",d:"2026-04-27",m:"The National Center for the Prevention and Control of Plant Pests and Animal Diseases announced its animal health laboratory in Riyadh has received international recognition from 33 countries to conduct testing for equine diseases — a milestone in the Kingdom's biosecurity capacity.",mk:"사우디 식물병해충·동물질병예방통제센터(NCAH)는 리야드 동물위생연구소가 33개국으로부터 마(馬) 질병 검사 권한을 인증받았다고 발표했다. 사우디 생물안보 역량 강화의 이정표다.",tg:["동물위생","말","바이오시큐리티"],u:"https://www.arabnews.com/node/2641438/saudi-arabia"},
  {id:1202,p:5,r:"심층분석",t:"Saudi campaign backs intellectual property awareness in sports sector",k:"사우디 SAIP, 스포츠 부문 지식재산권 인식 캠페인 전개",s:"Arab News",c:"saudi",d:"2026-04-26",m:"The Saudi Authority for Intellectual Property launched an awareness campaign marking World IP Day, with this year's theme highlighting the importance of creativity and innovation in the sports sector — a strategic pillar tied to PIF's domestic investment portfolio.",mk:"사우디 지식재산청(SAIP)이 세계 지식재산의 날을 맞아 인식 제고 캠페인을 시작했다. 올해 주제는 스포츠 부문의 창의성·혁신으로, PIF 국내 투자 포트폴리오와도 연계된 전략 분야다.",tg:["지식재산","SAIP","스포츠"],u:"https://www.arabnews.com/node/2641372/saudi-arabia"},
  {id:1203,p:5,r:"심층분석",t:"Saudi Chemistry Team participates in Mendeleev Chemistry Olympiad 2026 in Moscow",k:"사우디 화학팀, 모스크바 멘델레예프 국제화학올림피아드 2026 참가",s:"SPA",c:"saudi",d:"2026-04-22",m:"The Saudi national team of high school students, organized by Mawhiba and the Ministry of Education, is competing in the 60th Mendeleev International Chemistry Olympiad in Moscow alongside delegations from over 25 countries — a Vision 2030 human-capital signature event.",mk:"무위바(영재발굴재단)와 교육부가 구성한 사우디 고교생 화학 대표팀이 모스크바에서 열리는 제60회 멘델레예프 국제화학올림피아드에 25개국 이상과 경합하고 있다. 비전 2030 인적자본 분야의 대표 행사다.",tg:["멘델레예프","화학올림피아드","무위바"],u:"https://www.spa.gov.sa/en/N2565769"},
  {id:1204,p:7,r:"외교",t:"Saudi Crown Prince, Swiss president discuss expanding investment ties in Jeddah meeting",k:"사우디 왕세자–스위스 대통령, 제다 회담서 투자 확대 논의",s:"Saudi Gazette",c:"saudi",d:"2026-04-23",m:"Crown Prince Mohammed bin Salman met Swiss President Guy Parmelin in Jeddah and discussed expanding cooperation, particularly investment. Switzerland signed an investment protection agreement with Saudi Arabia providing safeguards against political risks for cross-border investments.",mk:"무함마드 빈 살만 왕세자가 제다에서 기 파르믈랭 스위스 대통령과 회담하고 투자 협력 확대를 논의했다. 양국은 정치적 리스크로부터 양국 간 투자를 보호하는 투자보호협정도 체결했다.",tg:["스위스","투자보호","외교","제다"],u:"https://saudigazette.com.sa/article/660779"},
  {id:1205,p:6,r:"주요경제",t:"Alawwal Capital sets 11 Saudi top picks in 2026",k:"알아우왈 캐피탈, 2026년 사우디 톱픽 11종목 선정",s:"Argaam",c:"saudi",d:"2026-04-22",m:"Alawwal Capital published its top 11 stock picks for the Saudi market in 2026, citing structural Vision 2030 demand drivers and dividend resilience even amid the regional energy supply shock.",mk:"알아우왈 캐피탈은 2026년 사우디 시장 톱픽 11종목 리스트를 공개했다. 비전 2030의 구조적 수요와 역내 에너지 공급 충격 속에서도 견조한 배당 회복력을 근거로 들었다.",tg:["TASI","증권사리포트","톱픽"],u:"https://www.argaam.com/en/article/articledetail/id/1874386"},
  {id:1206,p:5,r:"정책발표",t:"Registration open for domestic pilgrims, who previously performed Hajj, from April 18",k:"사우디, 4월 18일부터 기존 하지 수행자 대상 국내 순례 등록 시작",s:"Saudi Gazette",c:"saudi",d:"2026-04-15",m:"The Ministry of Hajj and Umrah opened the second phase of domestic Hajj registration on April 18 for citizens and expatriates who already performed Hajj within the last five years, completing the staged enrollment process.",mk:"사우디 하지·우므라부는 4월 18일부터 최근 5년 내 하지를 이미 수행한 국내 시민·외국인을 대상으로 2단계 등록을 개시한다. 단계별 등록 프로세스의 마지막 단계다.",tg:["하지등록","국내순례","하지부"],u:"https://saudigazette.com.sa/article/660481"},
  {id:1207,p:5,r:"정책발표",t:"Passports Directorate starts issuing Makkah entry e-permits for Hajj 2026",k:"사우디 여권총국, 하지 2026 메카 출입 전자허가서 발급 개시",s:"Saudi Gazette",c:"saudi",d:"2026-04-16",m:"The General Directorate of Passports started issuing electronic Makkah entry permits for Hajj 2026, integrating biometric and Absher platform data to streamline pilgrim flow and security at the Holy City entry points.",mk:"사우디 여권총국은 하지 2026을 위한 메카 진입 전자허가서 발급을 시작했다. 생체 정보와 압셰르(Absher) 플랫폼 데이터를 연계해 순례객 흐름과 보안 검문을 효율화한다.",tg:["여권총국","전자허가","압셰르"],u:"https://saudigazette.com.sa/article/660515"},
  {id:1208,p:10,r:"헤드라인",t:"Crown Prince says Saudi Vision 2030 reaches peak implementation stage in final phase",k:"빈 살만 왕세자 \"비전 2030, 최종 단계서 실행 정점 도달\"",s:"Saudi Gazette",c:"saudi",d:"2026-04-27",m:"Crown Prince Mohammed bin Salman declared Vision 2030 has reached its peak implementation stage in the final phase (2026-2030), having sustained progress despite global turmoil — including the regional war and Hormuz disruption.",mk:"무함마드 빈 살만 왕세자는 비전 2030이 2026~2030 최종 단계에서 실행 정점에 도달했다고 선언하며, 호르무즈 사태 등 글로벌 혼란 속에서도 진척을 유지했음을 강조했다.",tg:["비전2030","왕세자","최종단계","호르무즈"],u:"https://saudigazette.com.sa/article/660893/saudi-arabia/crown-prince-says-saudi-vision-2030-reaches-peak-implementation-stage-in-final-phase"},
  {id:1209,p:9,r:"헤드라인",t:"Saudi Crown Prince: Vision 2030 has driven a qualitative leap in Kingdom's development path",k:"빈 살만 왕세자 \"비전 2030이 사우디 발전 경로에 질적 도약\"",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-27",m:"Crown Prince Mohammed bin Salman said Vision 2030 has driven a qualitative leap in the Kingdom's development, with non-oil activities now 55% of GDP, FDI stock up 119% since 2017, and unemployment down to 7.2% — preparing the ground for the third-phase push toward 2030.",mk:"빈 살만 왕세자는 비전 2030이 사우디 발전 경로에 질적 도약을 이끌었다고 평가했다. 비석유 부문 GDP 비중 55%, FDI 잔액 2017년 대비 119% 증가, 실업률 7.2% 등 지표가 3단계 추진 기반이 됐다.",tg:["비전2030","비석유","FDI","고용"],u:"https://english.aawsat.com/gulf/5267019-saudi-crown-prince-vision-2030-has-driven-qualitative-leap-kingdoms-development-path"},
  {id:1210,p:7,r:"주요경제",t:"UAE sets up Dh1bn fund to support industrial sector",k:"UAE, 산업부문 지원에 10억 디르함 펀드 설립",s:"The National",c:"gulf",d:"2026-04-26",m:"The UAE launched a Dh1 billion ($272 million) national fund to bolster the industrial sector and drive economic diversification, supporting localisation, supply chains and AI adoption across production, operations and planning.",mk:"UAE는 산업부문 강화·경제 다각화를 위해 10억 디르함(2.72억 달러) 규모 국가펀드를 출범했다. 자국화, 공급망 강화, 생산·운영·기획 전반의 AI 도입을 지원한다.",tg:["UAE","산업펀드","AI","공급망"],u:"https://www.thenationalnews.com/business/economy/2026/04/26/uae-sets-up-dh1bn-national-fund-to-support-industrial-sector/"},
  {id:1211,p:6,r:"외교",t:"UAE-Azerbaijan CEPA comes into effect in boost to economic ties",k:"UAE–아제르바이잔 CEPA 발효…경제관계 강화",s:"The National",c:"gulf",d:"2026-04-15",m:"The Comprehensive Economic Partnership Agreement between the UAE and Azerbaijan came into effect, eliminating or reducing tariffs across sectors and aiming to scale non-oil bilateral trade as part of the UAE's broader CEPA strategy.",mk:"UAE–아제르바이잔 포괄적경제동반자협정(CEPA)이 발효됐다. 다수 부문에서 관세를 철폐·인하하고, 비석유 양자 교역 확대를 목표로 한다. UAE 전체 CEPA 전략의 일부다.",tg:["CEPA","아제르바이잔","UAE","교역"],u:"https://www.thenationalnews.com/business/economy/2026/04/15/uae-azerbaijan-cepa-comes-into-effect-in-boost-to-economic-ties/"},
  {id:1212,p:6,r:"심층분석",t:"As regional conflict persists, Etihad extends no-change fees till March 2027",k:"역내 분쟁 장기화…에티하드, 일정변경 무료 정책 2027년 3월까지 연장",s:"Khaleej Times",c:"gulf",d:"2026-04-22",m:"Etihad extended its waiver of change fees on eligible bookings until March 2027 as Middle East airspace disruptions continue. The move reflects how regional carriers are pricing in a prolonged Hormuz crisis and rerouting strain.",mk:"에티하드는 중동 영공 혼란이 이어지자 적격 예약 일정변경 수수료 면제를 2027년 3월까지 연장했다. 역내 항공사들이 호르무즈 사태 장기화와 우회비용을 가격에 반영하기 시작했음을 보여준다.",tg:["에티하드","UAE항공","호르무즈","영공"],u:"https://www.khaleejtimes.com/business/aviation/uae-airline-etihad-extends-no-change-fees-until-march-2027-as-regional-conflict-persists"},
  {id:1213,p:5,r:"외교",t:"Visa on arrival for all Qatar ID-holders as Oman eases visa rules for GCC residents",k:"오만, GCC 거주자 비자 완화…카타르 ID 소지자 도착비자 허용",s:"Qatar Tribune",c:"gulf",d:"2026-04-20",m:"Oman extended visa-on-arrival privileges to all Qatar ID holders, deepening intra-GCC mobility just as airspace and shipping disruptions complicate regional travel. The reform is consistent with the GCC unified tourist visa framework.",mk:"오만이 카타르 거주증 보유자 전원에 도착비자를 허용하며 역내 인적이동을 강화했다. 영공·해상 혼란이 이어지는 가운데, GCC 통합관광비자 틀과도 부합하는 조치다.",tg:["오만","카타르","비자","GCC"],u:"https://www.qatar-tribune.com/article/27975/latest-news/visa-on-arrival-for-all-qatar-id-holders-as-oman-eases-visa-rules-for-gcc-residents"},
  {id:1214,p:4,r:"심층분석",t:"Qatar steps up preparations for GCC Games Doha 2026",k:"카타르, GCC 게임즈 도하 2026 준비 박차",s:"Gulf Times",c:"gulf",d:"2026-04-20",m:"Qatar's organizing committee for the 4th GCC Games Doha 2026 staged the official draw ceremony for team sports. The Games run May 11-22 with 19 sports across GCC nations — a stability/normalization signal amid regional tensions.",mk:"제4회 GCC 게임즈 도하 2026 조직위가 단체경기 공식 추첨식을 개최했다. 5월 11~22일 열리며 GCC 6개국이 19개 종목에 출전한다. 역내 긴장 속 정상화 신호로 해석된다.",tg:["GCC게임즈","도하","스포츠","정상화"],u:"https://www.gulf-times.com/article/724671/sport/qatar-steps-up-preparations-for-gcc-games-doha-2026"},
  {id:1215,p:10,r:"속보",t:"Iran war live: Trump reviews peace plan; UN calls for Hormuz to reopen",k:"이란전쟁 실시간: 트럼프, 평화안 검토…UN \"호르무즈 재개방하라\"",s:"Al Jazeera",c:"me",d:"2026-04-28",m:"Trump's national security team is reviewing Iran's peace plan to halt the war and reopen the Strait of Hormuz while postponing nuclear talks. The UN chief warned the standoff risks triggering a global food emergency.",mk:"트럼프의 국가안보팀이 호르무즈 해협 재개방을 골자로 한 이란 평화안을 검토 중이다. 핵협상은 후순위로 미뤘다. UN 사무총장은 대치 상황이 글로벌 식량 위기를 촉발할 수 있다고 경고했다.",tg:["호르무즈","트럼프","UN","평화안"],u:"https://www.aljazeera.com/news/liveblog/2026/4/28/iran-war-live-trump-reviews-peace-plan-un-calls-for-hormuz-to-reopen"},
  {id:1216,p:7,r:"심층분석",t:"What lies ahead for Gaza after ceasefires in Iran and Lebanon?",k:"이란·레바논 휴전 이후, 가자의 앞날은",s:"Al Jazeera",c:"me",d:"2026-04-26",m:"With shaky ceasefires in Iran and Lebanon, attention turns to Gaza's status — humanitarian access, reconstruction financing, and political settlement. Saudi Arabia and Gulf donors are reportedly preparing conditional reconstruction packages.",mk:"이란·레바논 휴전이 흔들리는 가운데, 가자지구 인도주의 접근·재건 재원·정치적 해결 문제가 다시 부각된다. 사우디와 걸프 공여국들은 조건부 재건 패키지를 준비 중인 것으로 알려졌다.",tg:["가자","휴전","재건","사우디"],u:"https://www.aljazeera.com/news/2026/4/26/what-lies-ahead-for-gaza-after-ceasefires-in-iran-and-lebanon"},
  {id:1217,p:9,r:"속보",t:"April 27: White House says Trump reviewing latest Iran proposal on reopening Hormuz",k:"4월 27일: 백악관 \"트럼프, 이란의 호르무즈 재개방 최신안 검토 중\"",s:"Times of Israel",c:"me",d:"2026-04-27",m:"The White House confirmed Trump is reviewing Iran's latest proposal to halt war and reopen Hormuz while delaying nuclear talks. The IDF struck about 20 Hezbollah sites in southern Lebanon and the eastern Beqaa Valley amid ceasefire tensions.",mk:"백악관은 트럼프가 이란의 호르무즈 재개방·종전·핵협상 후순위 최신 제안을 검토 중이라고 확인했다. 이스라엘군은 휴전 긴장 속에 남부 레바논과 동부 베카계곡의 헤즈볼라 거점 약 20곳을 타격했다.",tg:["백악관","호르무즈","헤즈볼라","레바논"],u:"https://www.timesofisrael.com/liveblog-april-27-2026/"},
  {id:1218,p:9,r:"헤드라인",t:"Iran said to offer US deal to reopen Hormuz, end war and put off nuclear talks",k:"\"이란, 美에 호르무즈 개방·종전·핵협상 연기 패키지 제안\"",s:"Times of Israel",c:"me",d:"2026-04-27",m:"Iran reportedly offered Washington a package: simultaneously reopen Hormuz and end the war, while postponing nuclear negotiations. Trump's team kept red lines on enrichment and uranium removal, leaving the proposal in limbo.",mk:"이란이 미국에 호르무즈 동시 개방·종전 합의·핵협상 후순위 패키지를 제안했다는 보도. 트럼프 팀은 농축 중단과 농축우라늄 반출이라는 \"레드라인\"을 유지하며 제안을 보류한 상태다.",tg:["호르무즈","핵협상","트럼프","이란"],u:"https://www.timesofisrael.com/iran-said-to-offer-us-deal-to-reopen-hormuz-end-war-and-put-off-nuclear-talks/"},
  {id:1219,p:8,r:"속보",t:"Live Updates: Latest from Israel, Iran, and the Middle East",k:"실시간: 이스라엘·이란·중동 최신 동향",s:"Jerusalem Post",c:"me",d:"2026-04-27",m:"Live coverage on April 27: Hezbollah-Israel tit-for-tat attacks, US Central Command intercepting vessels under the Iran blockade (37 since April 13), and Iran's 59-day internet blackout deepens domestic strain.",mk:"4월 27일 실시간 보도: 헤즈볼라–이스라엘의 보복 공방, 4월 13일 이래 미 중부사령부가 봉쇄 하 차단한 선박 37척, 59일째 이어지는 이란 인터넷 차단으로 내부 압박이 가중된다는 내용 등.",tg:["헤즈볼라","봉쇄","이란인터넷","CENTCOM"],u:"http://www.jpost.com/middle-east/iran-news/2026-04-27/live-updates-894244"},
  {id:1220,p:10,r:"속보",t:"Live updates: Trump unlikely to accept Iran's latest proposal to end war, sources say",k:"실시간: 소식통 \"트럼프, 이란 최신 종전안 수용 가능성 낮아\"",s:"CNN",c:"global",d:"2026-04-28",m:"Multiple sources say Trump is unlikely to accept Iran's latest proposal because it sidesteps nuclear concessions. Trump appears to be relying on the US ports blockade to pressure Tehran into broader concessions in coming weeks.",mk:"복수 소식통은 트럼프가 핵 양보가 빠진 이란의 최신안을 수용할 가능성이 낮다고 전했다. 트럼프는 미국의 이란 항구 봉쇄를 지렛대 삼아 수 주 내 이란을 더 큰 양보로 압박할 계획으로 알려졌다.",tg:["트럼프","핵협상","봉쇄"],u:"https://www.cnn.com/2026/04/28/world/live-news/iran-war-trump-israel"},
  {id:1221,p:9,r:"헤드라인",t:"Trump discussed Iran's Hormuz Strait proposal with top aides, White House says",k:"백악관 \"트럼프, 측근들과 이란의 호르무즈 제안 논의\"",s:"CNBC",c:"global",d:"2026-04-27",m:"The White House confirmed Trump met with Secretary of State Marco Rubio and other top aides to discuss Iran's Hormuz proposal. Rubio reiterated that Iran's nuclear program is the central issue — Washington wants 10-year enrichment suspension and uranium removal.",mk:"백악관은 트럼프가 마르코 루비오 국무장관 등 핵심 측근들과 이란의 호르무즈 제안을 논의했다고 밝혔다. 루비오는 핵 문제가 핵심이라는 입장을 재확인하며, 美는 10년 농축 중단과 농축우라늄 반출을 요구하고 있다.",tg:["루비오","핵협상","호르무즈","백악관"],u:"https://www.cnbc.com/2026/04/27/trump-iran-war-strait-of-hormuz-rubio.html"},
  {id:1222,p:8,r:"속보",t:"Iran makes fresh offer hours after Trump declares US has 'all the cards'",k:"트럼프 \"美, 모든 카드 쥐었다\" 발언 몇 시간 만에 이란이 새 제안",s:"Fox News",c:"global",d:"2026-04-27",m:"Hours after Trump declared the US has 'all the cards,' Iran tabled a new proposal to end the Hormuz blockade and war while sidelining the nuclear file — a calibrated move aimed at splitting Trump's hawk-dove camp.",mk:"트럼프가 \"美는 모든 카드를 쥐었다\"고 발언한 지 몇 시간 뒤 이란이 호르무즈 봉쇄 해제와 종전, 핵협상 후순위라는 새 제안을 내놓았다. 트럼프 진영의 매파–비둘기파 분열을 노린 정교한 수순으로 평가된다.",tg:["트럼프","이란","협상카드"],u:"https://www.foxnews.com/live-news/trump-iran-peace-talks-hormuz-blockade-april-27"},
  {id:1223,p:7,r:"헤드라인",t:"Reuters Middle East: Hormuz deal stalls as Iran-US talks reach impasse",k:"로이터 중동: 美–이란 협상 교착 속 호르무즈 합의 답보",s:"Reuters",c:"global",d:"2026-04-27",m:"Reuters Middle East coverage tracks the stalled Iran-US talks: Brent settled at $108.23 (+2.75%), WTI at $96.37 (+2.09%) on April 27 as the Hormuz blockade enters its third month. Saudi/UAE pipelines are running near limits.",mk:"로이터 중동은 미–이란 협상 교착을 추적 중이다. 4월 27일 브렌트유는 배럴당 108.23달러(+2.75%), WTI는 96.37달러(+2.09%)로 마감했고, 호르무즈 봉쇄는 3개월차에 접어들었다. 사우디·UAE 파이프라인은 한계 수준 가동 중.",tg:["호르무즈","유가","파이프라인"],u:"https://www.reuters.com/world/middle-east/"},
  {id:1224,p:6,r:"심층분석",t:"Saudi Arabia's Business Travel Drove the Middle East's 2025 Growth",k:"사우디 기업 출장이 중동 2025년 성장 견인",s:"Skift",c:"global",d:"2026-04-27",m:"Skift reports Saudi Arabia's surge in business travel — fueled by Vision 2030 events, foreign investor delegations and PIF portfolio activity — was the biggest single driver of Middle East travel growth in 2025, even as leisure spend underperformed.",mk:"스키프트는 비전 2030 행사·해외 투자자 방문·PIF 포트폴리오 활동이 견인한 사우디 기업 출장 급증이 2025년 중동 여행 성장의 최대 동력이었다고 보도했다. 레저 지출은 부진했다.",tg:["기업출장","비전2030","PIF"],u:"https://skift.com/2026/04/27/saudi-arabias-business-travel-drove-the-middle-easts-2025-growth/"},
  {id:1225,p:7,r:"주요경제",t:"Current price of oil as of April 27, 2026",k:"2026년 4월 27일 기준 유가 현황",s:"Fortune",c:"global",d:"2026-04-27",m:"Fortune's daily oil dashboard places WTI near $96.5 and Brent above $108 as Iran's stalled talks keep the Strait of Hormuz nearly closed and SPR/strategic releases in major economies continue but fail to fully offset supply tightness.",mk:"포춘 일일 유가 대시보드: WTI 약 96.5달러, 브렌트유 108달러 상회. 이란과의 협상 교착으로 호르무즈가 사실상 닫힌 상태이며, 주요국 전략비축유 방출에도 공급 타이트 해소엔 한계가 있다는 평가다.",tg:["유가","WTI","브렌트","SPR"],u:"https://fortune.com/article/price-of-oil-04-27-2026/"},
  {id:1226,p:6,r:"주요경제",t:"Crude oil and petroleum product prices increased sharply in the first quarter of 2026",k:"EIA \"2026년 1분기 원유·석유제품 가격 큰 폭 상승\"",s:"EIA",c:"global",d:"2026-04-15",m:"The US Energy Information Administration confirmed sharp Q1 2026 increases in crude oil and refined product prices, citing the Iran war, the Hormuz disruption, and constrained spare capacity. The agency flagged elevated downside risks to global growth.",mk:"미 에너지정보청(EIA)은 2026년 1분기 원유·정제유 가격이 큰 폭으로 상승했다고 확인했다. 이란전쟁, 호르무즈 차질, 협소한 여유 생산능력이 원인이며, 세계 경제 하방 리스크가 커졌다고 평가했다.",tg:["EIA","유가","Q1","스페어캐파"],u:"https://www.eia.gov/todayinenergy/detail.php?id=67424"},
  {id:1227,p:6,r:"심층분석",t:"OPEC Oil Output Jumps as Saudi Arabia Raises Production Before Iran Conflict",k:"OPEC \"이란전 직전 사우디 증산에 산유량 급증\"",s:"Bloomberg",c:"global",d:"2026-03-13",m:"A Bloomberg survey shows OPEC output jumped in February as Saudi Arabia front-loaded production ahead of the Iran conflict — a key data point now used by analysts to estimate how much spare capacity is realistically deployable during the Hormuz crisis.",mk:"블룸버그 서베이에 따르면 사우디가 이란전 직전 선제 증산에 나서면서 2월 OPEC 산유량이 급증했다. 호르무즈 위기 국면에서 실제 운용 가능한 여유 생산능력 추정에 사용되는 핵심 데이터다.",tg:["OPEC","사우디","증산","스페어캐파"],u:"https://www.bloomberg.com/news/articles/2026-03-13/opec-oil-output-rose-ahead-of-iran-war-on-saudi-boost-survey-shows"},
  {id:1228,p:7,r:"주요경제",t:"Iran's central bank opens 4-currency accounts to collect Hormuz transit fees",k:"이란 중앙은행, 호르무즈 통행료 징수용 4개 통화 전용 계좌 개설",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-28",m:"Iran's central bank has opened dedicated accounts in US dollars, Chinese yuan, euros and Iranian rials to collect transit fees from ships passing through the Strait of Hormuz — a step toward institutionalizing Tehran's de-facto control of the chokepoint.",mk:"이란 중앙은행이 호르무즈 해협 통과 선박들의 통행료 징수를 위해 미국 달러·중국 위안·유로·이란 리알 등 4개 통화로 된 전용 계좌를 개설했다. 사실상의 통제 체제를 제도화하는 수순이다.",tg:["이란중앙은행","통행료","위안화","리알"],u:"https://www.fnnews.com/news/202604281146415483"},
  {id:1229,p:8,r:"헤드라인",t:"Iran proposes 'Hormuz reopening first, nuclear talks later'… Trump signals dissatisfaction",k:"이란 \"호르무즈 先개방·後핵협상\" 제안…트럼프는 \"불만\"(종합)",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-28",m:"Iran formally proposed simultaneously reopening the Strait of Hormuz and ending the war, with nuclear talks postponed. Trump signaled dissatisfaction since the proposal sidesteps Washington's enrichment red lines.",mk:"이란이 호르무즈 해협 동시 개방과 종전, 핵협상 후순위 패키지를 미국에 공식 제안했다. 트럼프 대통령은 이 제안이 농축 \"레드라인\"을 비껴간다며 불만을 표시한 것으로 전해졌다.",tg:["호르무즈","핵협상","트럼프","이란"],u:"https://www.fnnews.com/news/202604281100581512"},
  {id:1230,p:7,r:"속보",t:"4 million barrels of Iranian crude transit Hormuz despite US blockade",k:"美봉쇄에도 이란산 원유 400만배럴 호르무즈 통과",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-28",m:"Roughly 4 million barrels of Iranian crude reportedly transited the Strait of Hormuz on April 24, indicating the US blockade is not airtight. The cargoes are believed to have moved toward Asian buyers willing to handle sanctioned barrels.",mk:"지난 24일 하루 동안 이란산 원유 약 400만배럴이 호르무즈 해협을 통과한 것으로 나타났다. 미국 봉쇄가 빈틈없지 않다는 정황으로, 화물은 제재 원유를 흡수할 수 있는 아시아 매수자 측으로 이동한 것으로 추정된다.",tg:["호르무즈","이란원유","봉쇄","아시아"],u:"https://www.fnnews.com/news/202604280716306283"}
,
  {id:1231,p:10,r:"헤드라인",t:"Saudi crown prince welcomes GCC leaders ahead of Jeddah summit",k:"사우디 왕세자, 제다 정상회의 앞두고 GCC 정상들 영접",s:"Arab News",c:"saudi",d:"2026-04-28",m:"Crown Prince Mohammed bin Salman welcomed Kuwait's Crown Prince Sheikh Sabah Khaled Al Sabah, Qatar's Emir Sheikh Tamim and Bahrain's King Hamad in Jeddah for the GCC consultative summit aimed at crafting a response to thousands of Iranian missile and drone attacks against Gulf states.",mk:"무함마드 빈 살만 왕세자가 제다에서 쿠웨이트 사바 왕세자, 카타르 타밈 에미르, 바레인 하마드 국왕을 영접했다. GCC 자문 정상회의에서는 이란 미사일·드론 공격 수천 건에 대한 대응책을 논의할 예정이다.",tg:["사우디","GCC","왕세자","제다","정상회의"],u:"https://www.arabnews.com/node/2641559/saudi-arabia"},
  {id:1232,p:10,r:"헤드라인",t:"Crown Prince chairs cabinet meeting as Saudi Vision 2030 nears key targets",k:"왕세자, 비전2030 핵심목표 달성 임박 가운데 내각회의 주재",s:"Arab News",c:"saudi",d:"2026-04-28",m:"MBS chaired a cabinet session in Jeddah where ministers reviewed regional developments, Vision 2030 progress with 93% of KPIs meeting annual targets, and outcomes of the GCC consultative summit. The crown prince briefed the cabinet on discussions with leaders of Djibouti, Syria, Lebanon, Switzerland and Ukraine.",mk:"무함마드 빈 살만 왕세자가 제다에서 내각회의를 주재했다. 장관들은 지역 정세, 비전2030 핵심성과지표(KPI) 93% 목표 달성, GCC 자문 정상회의 결과를 검토했다. 왕세자는 지부티·시리아·레바논·스위스·우크라이나 정상들과의 협의 내용을 보고했다.",tg:["사우디","비전2030","내각회의","왕세자"],u:"https://www.arabnews.com/node/2641595/saudi-arabia"},
  {id:1233,p:9,r:"주요경제",t:"Saudi Arabia drives GCC bond market with $32bn in issuances: Markaz",k:"사우디, 320억 달러 발행으로 GCC 채권시장 주도",s:"Arab News",c:"saudi",d:"2026-04-28",m:"Saudi Arabia raised $32.54 billion through 42 issuances in Q1 2026, accounting for 59.1% of total GCC issuance volume, according to Markaz. The UAE followed with $13.57bn, then Qatar at $4.2bn. The entire GCC region saw $55.04bn in primary issuances during Q1.",mk:"마르카즈에 따르면 사우디아라비아는 1분기 42건 발행을 통해 325억 4천만 달러를 조달, GCC 전체 발행규모의 59.1%를 차지했다. UAE 135억 7천만 달러, 카타르 42억 달러가 뒤를 이었으며 GCC 전체로는 550억 4천만 달러가 1분기에 발행됐다.",tg:["사우디","채권","GCC","발행","경제"],u:"https://www.arabnews.com/node/2641545/business-economy"},
  {id:1234,p:9,r:"심층분석",t:"Current crisis brings 'significant opportunities' for Saudi economy, says industry minister",k:"산업부 장관: 현재 위기, 사우디 경제에 큰 기회",s:"Arab News",c:"saudi",d:"2026-04-28",m:"Saudi Arabia's industry minister said the regional crisis presents significant opportunities to expand local manufacturing and supply chains as energy disruptions force diversification. Local content in government procurement has grown from 28% in 2018 to over 51% by end-2025.",mk:"사우디 산업부 장관은 지역 위기가 사우디 경제에 큰 기회를 제공한다고 밝혔다. 정부 조달의 현지 콘텐츠 비중이 2018년 28%에서 2025년 말 51%를 넘어섰다.",tg:["사우디","산업","현지화","비전2030"],u:"https://www.arabnews.com/node/2641549/business-economy"},
  {id:1235,p:7,r:"심층분석",t:"Saudi Minister of Tourism inspects readiness of hospitality facilities for pilgrims in Makkah",k:"사우디 관광부장관, 메카 순례객 숙박시설 준비 점검",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-28",m:"Saudi Tourism Minister Ahmed Al-Khateeb inspected the readiness of hospitality facilities and temporary accommodations designated for pilgrims during this year's Hajj, reviewing service levels at pilgrim residences ahead of the Hajj season.",mk:"사우디 관광부장관 아흐메드 알 카티브는 올해 하지(성지순례)를 위한 숙박시설과 임시 숙소의 준비 상태를 점검했다. 순례객 거주지의 서비스 수준을 검토했다.",tg:["사우디","하지","관광","메카"],u:"https://english.aawsat.com/gulf/5267285-saudi-minister-tourism-inspects-readiness-hospitality-facilities-pilgrims-makkah"},
  {id:1236,p:8,r:"정책발표",t:"Gulf Leaders to meet in Jeddah to discuss Iran escalation, intl marine navigation",k:"걸프 정상들, 이란 갈등·국제 해상운송 논의차 제다 회동",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-28",m:"Saudi Arabia hosted an exceptional meeting of the Gulf Cooperation Council in Jeddah to discuss the Iranian escalation in the region and threats to international maritime navigation, with attendees from Kuwait, Qatar, Bahrain, UAE.",mk:"사우디아라비아는 제다에서 GCC 특별회의를 개최, 이란발 지역 긴장 고조와 국제 해상 운송 위협을 논의했다. 쿠웨이트·카타르·바레인·UAE가 참석했다.",tg:["사우디","GCC","이란","해상운송","제다"],u:"https://english.aawsat.com/gulf/5267342-gulf-leaders-meet-jeddah-discuss-iran-escalation"},
  {id:1237,p:6,r:"심층분석",t:"Jeddah launches Bride of the Red Sea photography exhibition",k:"제다, '홍해의 신부' 사진 전시회 개막",s:"Arab News",c:"saudi",d:"2026-04-28",m:"Jeddah Mayor Saleh Al-Turki inaugurated the &quot;Bride of the Red Sea&quot; exhibition showcasing the city through Saudi photographers' lenses with 25 photographs of sculptures and landmarks across Jeddah, part of 100 selected images for the first phase of the initiative.",mk:"제다 시장 살레 알 투르키는 '홍해의 신부' 전시회를 개막했다. 사우디 사진작가들의 시선으로 제다의 조각과 랜드마크를 담은 25점 사진이 전시되며, 1단계로 총 100점이 선정됐다.",tg:["사우디","제다","문화","홍해"],u:"https://www.arabnews.com/node/2641602/saudi-arabia"},
  {id:1238,p:6,r:"심층분석",t:"Historical photo exhibition in Moscow highlights 100 years of Saudi-Russian diplomatic relations",k:"모스크바 역사사진전, 사우디-러시아 외교 100주년 조명",s:"Arab News",c:"saudi",d:"2026-04-28",m:"The Russian Ministry of Foreign Affairs and the King Abdulaziz Foundation held a historical photography exhibition in Moscow marking 100 years since the establishment of Saudi-Russian diplomatic relations, hosted with Russian Deputy FM Borisenko and Saudi Ambassador Al-Sadhan.",mk:"러시아 외교부와 압둘아지즈 국왕 재단은 사우디-러시아 외교관계 수립 100주년을 기념해 모스크바에서 역사사진전을 개최했다. 러시아 보리센코 차관과 사우디 알사단 대사가 참석했다.",tg:["사우디","러시아","외교","100주년"],u:"https://www.arabnews.com/node/2641570/saudi-arabia"},
  {id:1239,p:7,r:"심층분석",t:"Saudi Research and Media Group awarded contract to operate and manage Al Thaqafeya channel",k:"사우디 연구미디어그룹, 알 사카피야 채널 운영권 계약",s:"Arab News",c:"saudi",d:"2026-04-28",m:"Saudi Research and Media Group has been awarded a contract to operate and manage Al Thaqafeya channel, expanding its footprint in Saudi cultural broadcasting amid Vision 2030 media sector reforms.",mk:"사우디 연구미디어그룹(SRMG)이 알 사카피야 채널의 운영·관리 계약을 체결했다. 비전2030 미디어 부문 개혁 가운데 사우디 문화방송 영역에서의 입지를 확대했다.",tg:["사우디","미디어","SRMG","문화"],u:"https://www.arabnews.com/node/2641537/business-economy"},
  {id:1240,p:7,r:"심층분석",t:"PIF Governor reviews the fund's journey and highlights 2026-2030 strategy",k:"PIF 총재, 펀드 발자취 회고하며 2026-2030 전략 강조",s:"SPA",c:"saudi",d:"2026-04-15",m:"PIF Governor Yasir al-Rumayyan reviewed the fund's journey and highlighted the new 2026-2030 strategy approved by the board chaired by Crown Prince. The plan reorganizes the portfolio into Vision, Strategic and Financial Portfolios across six ecosystem pillars.",mk:"PIF 총재 야시르 알 루마얀은 펀드의 발자취를 회고하며 왕세자 주재 이사회에서 승인된 2026-2030 전략을 강조했다. 비전·전략·금융 포트폴리오로 재편되며 6개 생태계 축으로 구성된다.",tg:["사우디","PIF","전략","비전2030","루마얀"],u:"https://www.spa.gov.sa/en/N2562977"},
  {id:1241,p:8,r:"정책발표",t:"Crown Prince approves PIF's 2026-2030 strategy",k:"왕세자, PIF 2026-2030 전략 승인",s:"Argaam",c:"saudi",d:"2026-04-15",m:"Crown Prince Mohammed bin Salman, chairing the PIF Board of Directors, approved the fund's 2026-2030 strategy focused on maximizing financial returns, strengthening investment efficiency and increasing private sector participation. Investments will be structured into Vision, Strategic and Financial Portfolios.",mk:"무함마드 빈 살만 왕세자는 PIF 이사회를 주재해 2026-2030 전략을 승인했다. 재무 수익 극대화, 투자 효율 강화, 민간 부문 참여 확대를 중심으로 비전·전략·금융 포트폴리오로 구조화된다.",tg:["사우디","PIF","왕세자","전략","투자"],u:"https://www.argaam.com/en/article/articledetail/id/1896727"},
  {id:1245,p:7,r:"심층분석",t:"PIF al-Rumayyan says no NEOM projects cancelled, spending priorities reassessed",k:"PIF 루마얀: 네옴 프로젝트 취소 없어, 지출 우선순위 재조정",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-15",m:"PIF Governor Yasir al-Rumayyan said no projects in NEOM have been cancelled, but the project company has been instructed to reprioritize spending. The next phase will focus on delivering major projects with reduced PIF financial contribution.",mk:"PIF 총재 야시르 알 루마얀은 NEOM 프로젝트 중 취소된 것은 없으나 지출 우선순위 재조정을 지시했다고 밝혔다. 다음 단계는 PIF 재정 기여를 줄이면서 주요 프로젝트 인도에 집중한다.",tg:["사우디","PIF","NEOM","루마얀","비전2030"],u:"https://english.aawsat.com/business/5266620-pif-rumayyan-neom-no-cancellation"},
  {id:1246,p:10,r:"헤드라인",t:"UAE announces it will leave Opec",k:"UAE, OPEC 탈퇴 공식 발표",s:"The National",c:"gulf",d:"2026-04-28",m:"The UAE announced it will exit OPEC and OPEC+ effective May 1, 2026, after nearly six decades of membership. The decision reflects the UAE's long-term strategic and economic vision and evolving energy profile, dealing a heavy blow to the oil-exporting groups led by Saudi Arabia.",mk:"UAE는 5월 1일부로 OPEC와 OPEC+ 탈퇴를 공식 발표했다. 약 60년 회원 자격을 종료하는 이번 결정은 장기 전략·경제 비전과 변화하는 에너지 환경을 반영한 것으로, 사우디 주도의 석유수출국 그룹에 큰 타격이 될 전망이다.",tg:["UAE","OPEC","탈퇴","에너지","원유"],u:"https://www.thenationalnews.com/business/2026/04/28/uae-announces-it-will-leave-opec/"},
  {id:1247,p:10,r:"헤드라인",t:"UAE announces decision to withdraw from Opec, Opec+ from May 1",k:"UAE, 5월 1일부 OPEC·OPEC+ 탈퇴 결정",s:"Khaleej Times",c:"gulf",d:"2026-04-28",m:"UAE Energy Minister Suhail Mohamed al-Mazrouei told Reuters the OPEC exit decision was taken after careful review of regional energy strategies. The UAE has long pushed back against OPEC production quotas it felt were too low, limiting its market share.",mk:"UAE 에너지부 장관 수하일 알 마즈루에이는 지역 에너지 전략을 면밀히 검토한 결과 OPEC 탈퇴를 결정했다고 로이터에 밝혔다. UAE는 자국 수출량을 제약하는 OPEC 쿼터에 오랜 기간 불만을 제기해왔다.",tg:["UAE","OPEC","에너지부","쿼터"],u:"https://www.khaleejtimes.com/uae/uae-announces-decision-to-withdraw-from-opec-opec-from-may-1"},
  {id:1248,p:9,r:"헤드라인",t:"Gulf Co-operation Council holds summit in Jeddah",k:"GCC, 제다에서 정상회의 개최",s:"The National",c:"gulf",d:"2026-04-28",m:"The GCC convened a consultative summit in Jeddah, the first in-person meeting of Gulf leaders since their states became a front in the Iran war two months ago. Leaders sought to craft a response to Iranian missile and drone attacks since February 28.",mk:"GCC는 제다에서 자문 정상회의를 개최했다. 두 달 전 이란전쟁의 전선이 된 이후 걸프 정상들의 첫 대면 회동으로, 2월 28일 이후 이란 미사일·드론 공격에 대한 대응책을 모색했다.",tg:["GCC","걸프","정상회의","이란","제다"],u:"https://www.thenationalnews.com/news/gulf/2026/04/28/gulf-co-operation-council-holds-summit-in-saudi-arabias-jeddah/"},
  {id:1249,p:8,r:"속보",t:"GCC leaders meet in Jeddah to forge response to Iran war, missile attacks and Gulf security threats",k:"GCC 정상들, 제다서 이란전쟁·미사일 공격·걸프 안보 위협 대응 모색",s:"Gulf News",c:"gulf",d:"2026-04-28",m:"Gulf leaders met in Jeddah to discuss the Iran war and regional security, with the war damaging key energy infrastructure across all six GCC states alongside US-linked firms and military installations. Attacks have subsided since the April 8 ceasefire but Gulf capitals remain wary.",mk:"걸프 정상들은 제다에 모여 이란전쟁과 지역 안보를 논의했다. GCC 6개국 전역의 주요 에너지 인프라가 공격받았으며 미국계 기업과 군시설도 표적이 됐다. 4월 8일 휴전 이후 공격이 줄었지만 걸프 수도들은 여전히 경계 중이다.",tg:["GCC","걸프","안보","이란전쟁","제다"],u:"https://gulfnews.com/world/gulf/gcc-leaders-meet-in-jeddah-to-discuss-iran-war-and-regional-security-1.500522013"},
  {id:1250,p:7,r:"심층분석",t:"How Saudi Arabia is repositioning Neom as key logistics hub and economic anchor",k:"사우디, 네옴을 핵심 물류 허브·경제 닻으로 재포지셔닝",s:"The National",c:"gulf",d:"2026-04-17",m:"Saudi Arabia is repositioning NEOM from a tourism mega-project to a logistics and economic anchor, integrating it with the Vision 2030 strategy that prioritizes Expo 2030 and the FIFA World Cup 2034. PIF's 2026-2030 plan reorganizes investments into six ecosystem pillars.",mk:"사우디아라비아는 NEOM을 관광 메가프로젝트에서 물류·경제 거점으로 재포지셔닝하고 있다. 엑스포 2030과 2034 FIFA 월드컵 우선순위 비전2030 전략과 통합되며, PIF 2026-2030 계획은 6개 생태계 축으로 투자를 재구성한다.",tg:["사우디","NEOM","물류","비전2030","PIF"],u:"https://www.thenationalnews.com/business/economy/2026/04/17/how-saudi-arabia-is-repositioning-neom-as-key-logistics-hub-and-economic-anchor/"},
  {id:1251,p:9,r:"헤드라인",t:"Down but not out: In war with Israel, Hezbollah shows it is still powerful",k:"꺾였지만 죽지 않았다: 이스라엘과의 전쟁에서 헤즈볼라 여전히 막강",s:"Al Jazeera",c:"me",d:"2026-04-28",m:"A Hezbollah military leader told Al Jazeera the group would return to suicide operations on Israeli targets in Lebanon, a tactic deployed in the 1980s. Hezbollah leader Naim Qassem categorically rejected direct negotiations between Lebanon and Israel.",mk:"헤즈볼라 군 지도자는 알자지라에 1980년대 사용했던 자살공격 작전을 레바논 영토 내 이스라엘 표적에 재개할 것이라고 밝혔다. 나임 카셈 헤즈볼라 지도자는 레바논-이스라엘 직접 협상을 단호히 거부했다.",tg:["헤즈볼라","레바논","이스라엘","전쟁"],u:"https://www.aljazeera.com/features/2026/4/28/down-but-not-out-in-war-with-israel-hezbollah-shows-it-is-still-powerful"},
  {id:1252,p:8,r:"심층분석",t:"When will Strait of Hormuz be safe for commercial shipping again?",k:"호르무즈 해협, 언제쯤 다시 상업 항행에 '안전'해질까?",s:"Al Jazeera",c:"me",d:"2026-04-28",m:"Vessel numbers through the Strait of Hormuz now stand at around 5% of pre-conflict levels. Since April 13, the US has blockaded Iranian ports, leading to a dual blockade of the strait, even as a tentative ceasefire holds. Insurance and freight risks remain high.",mk:"호르무즈 해협 통과 선박 수는 분쟁 전 수준의 약 5%로 떨어졌다. 미국은 4월 13일부터 이란 항만을 봉쇄해 해협의 '이중 봉쇄' 상황을 만들었으며, 불안정한 휴전에도 보험·운임 리스크가 높다.",tg:["호르무즈","해협","항행","봉쇄","해운"],u:"https://www.aljazeera.com/features/2026/4/28/when-will-strait-of-hormuz-be-safe-for-commercial-shipping-again"},
  {id:1253,p:9,r:"헤드라인",t:"UAE leaves OPEC in blow to oil cartel amid war on Iran",k:"UAE, OPEC 탈퇴…이란전쟁 와중 카르텔에 큰 타격",s:"Al Jazeera",c:"me",d:"2026-04-28",m:"The UAE's decision to quit OPEC and OPEC+ effective May 1 deals a heavy blow to the oil-exporting groups at a time when the US-Israel war on Iran has caused a historic energy shock. The UAE was the third-largest OPEC producer behind Saudi Arabia and Iraq.",mk:"UAE의 5월 1일부 OPEC·OPEC+ 탈퇴 결정은 미·이스라엘 vs 이란 전쟁이 사상 초유의 에너지 충격을 야기한 시기에 산유국 그룹에 큰 타격이다. UAE는 사우디·이라크에 이어 OPEC 3위 생산국이었다.",tg:["UAE","OPEC","이란전쟁","에너지","원유"],u:"https://www.aljazeera.com/news/2026/4/28/uae-leaves-opec-and-opec"},
  {id:1254,p:8,r:"속보",t:"IDF dismantles over 1,000 Hezbollah terror sites across southern Lebanon",k:"이스라엘군, 남부 레바논 헤즈볼라 거점 1,000여 개 해체",s:"Jerusalem Post",c:"me",d:"2026-04-27",m:"The IDF dismantled over 1,000 Hezbollah terror sites in southern Lebanon, uncovering machine guns, anti-tank missiles, RPGs, mortar shells and additional ammunition. The Air Force conducted strikes on Hezbollah targets while ground operations continued.",mk:"이스라엘군(IDF)은 남부 레바논의 헤즈볼라 거점 1,000여 곳을 해체하며 기관총·대전차미사일·RPG·박격포탄 등 무기를 발견했다. 공군은 헤즈볼라 표적을 공습했고 지상작전도 이어졌다.",tg:["이스라엘","헤즈볼라","레바논","IDF"],u:"https://www.jpost.com/israel-news/defense-news/article-894393"},
  {id:1255,p:8,r:"심층분석",t:"World faces food catastrophe if Strait of Hormuz disruption persists: FAO",k:"FAO: 호르무즈 차질 지속 시 세계 식량 '재앙' 직면",s:"Al Jazeera",c:"me",d:"2026-04-14",m:"The Strait of Hormuz normally carries about one-third of global seaborne fertiliser and one-quarter of seaborne oil. The FAO warned a prolonged crisis could lead to a global food catastrophe, with fertiliser prices estimated 20% higher in H1 2026 if unresolved.",mk:"호르무즈 해협은 통상 세계 해상 비료의 약 3분의 1, 해상 원유의 4분의 1을 처리한다. FAO는 위기 장기화 시 세계 식량 재앙으로 이어질 수 있으며, 미해결 시 2026년 상반기 비료가가 평균 20% 상승할 것으로 추정했다.",tg:["FAO","식량","호르무즈","비료","원유"],u:"https://www.aljazeera.com/news/2026/4/14/fao-warns-strait-of-hormuz-disruption-risks-triggering-a-global-food-crisis"},
  {id:1256,p:10,r:"헤드라인",t:"UAE to Leave OPEC and OPEC+ Next Month to Pursue New Strategy",k:"UAE, 다음 달 OPEC·OPEC+ 탈퇴…새 전략 추진",s:"Bloomberg",c:"global",d:"2026-04-28",m:"The UAE will quit OPEC and OPEC+ on May 1 to pursue a new energy strategy after careful review by the energy ministry. Bloomberg reports the UAE did not consult Saudi Arabia or other members. The exit removes one of the cartel's largest producers as Iran war disrupts markets.",mk:"UAE는 에너지부의 면밀한 검토 끝에 새로운 에너지 전략을 추진하기 위해 5월 1일 OPEC·OPEC+를 탈퇴한다. 블룸버그는 UAE가 사우디 등 회원국과 사전 협의하지 않았다고 보도했다. 이란전쟁이 시장을 흔드는 가운데 카르텔은 주요 생산국 1곳을 잃게 된다.",tg:["UAE","OPEC","블룸버그","에너지전략"],u:"https://www.bloomberg.com/news/articles/2026-04-28/uae-to-leave-opec-and-opec-next-month-to-pursue-new-strategy"},
  {id:1257,p:10,r:"헤드라인",t:"United Arab Emirates to leave OPEC May 1, energy chief says still committed to oil price stability",k:"UAE, 5월 1일 OPEC 탈퇴…에너지 장관: 유가 안정 기여 계속",s:"CNBC",c:"global",d:"2026-04-28",m:"The UAE will leave OPEC effective May 1, with Energy Minister Suhail al-Mazrouei saying the country remains committed to oil price stability. After leaving, the UAE plans to gradually and thoughtfully increase production in line with demand.",mk:"UAE는 5월 1일부로 OPEC를 탈퇴하지만 에너지부 장관 수하일 알 마즈루에이는 유가 안정에 계속 기여하겠다고 밝혔다. 탈퇴 후에도 수요와 시장 여건에 맞춰 점진적으로 생산을 늘릴 계획이다.",tg:["UAE","OPEC","CNBC","유가","원유"],u:"https://www.cnbc.com/2026/04/28/uae-opec-oil-iran.html"},
  {id:1258,p:9,r:"속보",t:"U.S. crude oil tops $100 on report Trump dissatisfied with Iran's proposal to open Hormuz",k:"WTI 100달러 돌파…트럼프, 이란의 호르무즈 개방 제안 불만족 보도",s:"CNBC",c:"global",d:"2026-04-28",m:"WTI crude oil futures topped $100 per barrel after reports that President Trump was dissatisfied with Iran's latest proposal to reopen the Strait of Hormuz while deferring nuclear talks. Brent advanced 2.75% to $108.23, with Goldman Sachs raising its forecast to $90/bbl in Q4.",mk:"WTI 원유 선물이 트럼프 대통령이 이란의 호르무즈 재개통 제안(핵협상은 후순위)에 불만을 가졌다는 보도 후 배럴당 100달러를 돌파했다. 브렌트는 2.75% 올라 108.23달러 마감했고, 골드만삭스는 4분기 전망치를 90달러로 상향 조정했다.",tg:["원유","WTI","브렌트","호르무즈","트럼프"],u:"https://www.cnbc.com/2026/04/28/oil-prices-us-iran-hormuz-negotiations-wti-brent-crude.html"},
  {id:1259,p:9,r:"헤드라인",t:"UAE quits OPEC in blow to cartel that could reshape global oil markets",k:"UAE, OPEC 탈퇴…글로벌 원유시장 재편할 카르텔 타격",s:"CNN",c:"global",d:"2026-04-28",m:"The UAE's decision to quit OPEC could reshape global oil markets at a critical moment, with the Strait of Hormuz still effectively closed by Iran. CNN notes it remains unclear how fast any UAE production increases could reach global markets given the blockade.",mk:"UAE의 OPEC 탈퇴 결정은 호르무즈 해협이 사실상 봉쇄된 상황에서 글로벌 원유시장을 재편할 수 있다. CNN은 봉쇄로 인해 UAE의 증산분이 글로벌 시장에 얼마나 빠르게 도달할지 불확실하다고 지적했다.",tg:["UAE","OPEC","CNN","원유","호르무즈"],u:"https://www.cnn.com/2026/04/28/business/uae-leaves-opec-oil-cartel-intl"},
  {id:1262,p:7,r:"심층분석",t:"Saudi Arabia's bond maturities to surge to $168bn, outpacing GCC peers by 2029",k:"사우디 채권 만기, 2029년까지 1,680억 달러로 GCC 최대 규모",s:"Bloomberg",c:"global",d:"2026-04-28",m:"Saudi Arabia's bond maturities are set to surge to $168 billion, outpacing GCC peers by 2029, as the kingdom relies on debt issuance to fund Vision 2030 mega-projects amid lower oil revenues. The dominance reflects deep liquidity but also rollover risk.",mk:"사우디아라비아의 채권 만기 도래액은 2029년까지 1,680억 달러로 급증해 GCC 최대 규모가 될 전망이다. 비전2030 메가프로젝트 자금 조달을 위해 채권 발행에 의존하는 가운데 풍부한 유동성과 차환 리스크를 동시에 보여준다.",tg:["사우디","채권","만기","GCC","비전2030"],u:"https://www.bloomberg.com/news/articles/2026-04-28/saudi-arabia-bond-maturities-2029-gcc"},
  {id:1263,p:9,r:"헤드라인",t:"Saudi Petroline at full capacity… competition for Hormuz bypass pipelines intensifies",k:"[영상] 사우디 페트로라인 풀가동…호르무즈 우회 송유관 쟁탈전 본격화",s:"서울경제",c:"korean-view",d:"2026-04-15",m:"Saudi Arabia raised its 1,200km Petroline pipeline (East-West) connecting eastern oilfields to Yanbu port on the Red Sea to its design maximum of 7 million barrels per day, up from 770,000 bpd before the war. However, this still doesn't reach half of the previous 20 million bpd marine volume.",mk:"사우디아라비아는 동부 유전과 홍해 얀부항을 잇는 1,200km '페트로라인' 송유관을 전쟁 전 일평균 77만 배럴에서 설계 최대치 700만 배럴로 끌어올렸다. 그러나 기존 해상 물량(약 2,000만 배럴) 절반에도 못 미쳐 글로벌 공급 차질이 장기화될 우려가 있다.",tg:["사우디","페트로라인","호르무즈","송유관","원유"],u:"https://www.sedaily.com/article/20028242"},
  {id:1264,p:8,r:"심층분석",t:"Iran plays phase 3 card despite Hormuz blockade…Trump: no meeting without nuclear surrender",k:"호르무즈 봉쇄에도 '3단계 카드' 꺼낸 이란…트럼프: 핵 포기 없인 만남 불가",s:"서울경제",c:"korean-view",d:"2026-04-27",m:"Iran has offered to reopen the Strait of Hormuz if the US lifts its blockade and the war ends, but Trump suggested he will not accept the latest proposal absent concessions on Iran's nuclear program. The standoff continues into its third week of formal ceasefire.",mk:"이란은 미국이 봉쇄를 해제하고 종전 시 호르무즈 해협 재개통을 제안했지만, 트럼프는 이란의 핵 양보 없이는 최신 제안을 수용하지 않을 것이라고 시사했다. 공식 휴전 3주차에 접어들며 대치가 이어진다.",tg:["이란","호르무즈","트럼프","핵협상","휴전"],u:"https://www.sedaily.com/article/20037806"},
  {id:1265,p:7,r:"심층분석",t:"S. Korea to send special envoy to Saudi Arabia, Oman, Algeria in search of alternative oil route",k:"한국, 대체 원유 공급선 확보 위해 사우디·오만·알제리에 특사 파견",s:"서울경제",c:"korean-view",d:"2026-04-06",m:"South Korea is sending special envoys to Saudi Arabia, Oman and Algeria to seek alternative oil transport routes. Industry Minister Kim Jung-kwan said Saudi Arabia has promised to prioritise oil shipments to Korea via the Red Sea Yanbu port amid Hormuz disruptions.",mk:"한국은 대체 원유 수송로 확보를 위해 사우디아라비아·오만·알제리에 특사를 파견한다. 김정관 산업부 장관은 호르무즈 차질 가운데 사우디가 홍해 얀부항을 통해 한국에 원유를 우선 공급하기로 약속했다고 밝혔다.",tg:["한국","사우디","원유","대체경로","얀부"],u:"https://www.sedaily.com/article/20028174"},
  {id:1266,p:7,r:"심층분석",t:"Trump warns Iran pipelines may explode within days, raising Hormuz pressure",k:"[영상] 트럼프: 이란 송유관 3일 내 폭발…호르무즈 봉쇄 압박 수위 높여",s:"서울경제",c:"korean-view",d:"2026-04-27",m:"President Trump warned Iran's pipelines could face strikes within days as he stepped up pressure tied to the Hormuz blockade. The remarks came as Trump suggested Iran's latest proposal lacked sufficient nuclear concessions to end the war.",mk:"트럼프 대통령은 이란의 호르무즈 봉쇄 관련 압박 수위를 높이며 '이란 송유관이 3일 내 폭발할 수도 있다'고 경고했다. 이란의 최신 제안이 종전을 위한 핵 양보 측면에서 부족하다는 시사 발언이 함께 나왔다.",tg:["트럼프","이란","송유관","호르무즈","압박"],u:"https://www.sedaily.com/article/20037818"},
  {id:1268,p:7,r:"심층분석",t:"S. Korea to receive 27 million barrels of crude oil in June via non-Hormuz routes",k:"한국, 6월 비호르무즈 경로 통해 원유 2,700만 배럴 도입",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-17",m:"South Korea will receive 27 million barrels of crude oil in June through alternative non-Hormuz routes, including Saudi Arabia's Yanbu port on the Red Sea. The diversification effort secured 50 million barrels for April-May with 200 million barrels planned by year-end.",mk:"한국은 6월 비(非)호르무즈 대체 경로를 통해 원유 2,700만 배럴을 도입한다. 사우디 홍해 얀부항 등을 활용하며, 4-5월 5,000만 배럴 확보에 이어 연말까지 2억 배럴 도입을 추진 중이다.",tg:["한국","원유","비호르무즈","얀부","공급"],u:"https://www.fnnews.com/news/202604171830285578"}
,
  {id:1276,p:10,r:"헤드라인",t:"Gulf leaders back missile early warning system, reject Hormuz closure",k:"걸프 정상들, 미사일 조기경보체제 합의…호르무즈 봉쇄 거부",s:"Saudi Gazette",c:"saudi",d:"2026-04-28",m:"GCC leaders underscored the importance of enhancing military integration, including the rapid deployment of a unified early warning system against ballistic missile threats. They strongly condemned Iranian attacks and rejected any attempt to close the Strait of Hormuz.",mk:"GCC 정상들은 탄도미사일 위협에 대비한 통합 조기경보체제의 신속한 배치 등 군사 통합 강화의 중요성을 강조했다. 이란 공격을 강력히 규탄하고 호르무즈 해협 봉쇄 시도를 거부했다.",tg:["GCC","미사일방어","호르무즈"],u:"https://saudigazette.com.sa/article/660932/saudi-arabia/gulf-leaders-back-missile-early-warning-system-reject-hormuz-closure"},
  {id:1277,p:10,r:"헤드라인",t:"Saudi Crown Prince chairs GCC Consultative Summit in Jeddah",k:"사우디 왕세자, 제다 GCC 임시 협의 정상회의 주재",s:"Saudi Gazette",c:"saudi",d:"2026-04-28",m:"Saudi Crown Prince Mohammed bin Salman chaired the extraordinary GCC Consultative Summit in Jeddah, addressing regional and international developments and ways to coordinate efforts. The summit affirmed the necessity of restoring navigation security in the Strait of Hormuz.",mk:"무함마드 빈 살만 왕세자가 제다에서 GCC 임시 협의 정상회의를 주재하며 지역·국제 정세와 공조 방안을 논의했다. 정상회의는 호르무즈 해협 항행 안전 회복의 필요성을 재확인했다.",tg:["GCC","제다정상회의","호르무즈"],u:"https://saudigazette.com.sa/article/660911/saudi-arabia/saudi-crown-prince-chairs-gcc-consultative-summit-in-jeddah"},
  {id:1278,p:9,r:"주요경제",t:"Saudi Arabia unveils SR700 billion investment drive as environment sectors post record gains",k:"사우디, 7천억 리얄 투자 추진…환경 부문도 사상 최대 성과",s:"Saudi Gazette",c:"saudi",d:"2026-04-28",m:"A comprehensive national plan covering 22 clusters across all regions of the Kingdom includes 387 investment opportunities valued at more than SR700 billion, aligned with major projects such as NEOM, Al-Ula, and Red Sea Project. Water supply exceeded 16 million cubic meters per day.",mk:"사우디는 NEOM·알울라·홍해 프로젝트 등과 연계된 22개 클러스터 전 지역을 포괄하는 7천억 리얄 규모(387개 투자기회) 종합 투자 계획을 발표했다. 일일 담수공급량은 1,600만㎥를 돌파했다.",tg:["투자","환경부","NEOM"],u:"https://saudigazette.com.sa/article/660919/saudi-arabia/saudi-arabia-unveils-sr700-billion-investment-drive-as-environment-sectors-post-record-gains"},
  {id:1279,p:9,r:"정책발표",t:"Crown Prince: Vision 2030 reaches peak implementation stage after sustaining progress despite global turmoil",k:"왕세자 &quot;세계적 격동 속에서도 비전2030, 최정점 이행 단계 도달&quot;",s:"Saudi Gazette",c:"saudi",d:"2026-04-28",m:"The Crown Prince affirmed Vision 2030 has reached its peak implementation stage after sustaining progress despite global turmoil. The third phase will extend over the next five years until 2030, focusing on long-term objectives while adapting implementation methods.",mk:"왕세자는 세계적 격동 속에서도 비전2030이 진척을 이어가 최정점 이행 단계에 도달했다고 평가했다. 3단계는 2030년까지 5년간 진행되며, 장기 목표 유지와 함께 단계별 이행 방식 조정에 중점을 둔다.",tg:["비전2030","왕세자","개혁"],u:"https://saudigazette.com.sa/article/660893"},
  {id:1280,p:9,r:"헤드라인",t:"Saudi Crown Prince Chairs GCC Consultative Summit on Regional Developments",k:"사우디 왕세자, 지역 정세 관련 GCC 임시 정상회의 주재",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-28",m:"Crown Prince and Prime Minister Mohammed bin Salman chaired the GCC consultative summit to address regional and international developments, with leaders from Kuwait, Bahrain, Qatar attending in person and the UAE represented by its foreign minister.",mk:"무함마드 빈 살만 왕세자 겸 총리가 GCC 임시 협의 정상회의를 주재하며 지역·국제 정세를 논의했다. 쿠웨이트·바레인·카타르 정상이 직접 참석했고 UAE는 외무장관이 대표로 참여했다.",tg:["GCC","왕세자","외교"],u:"https://english.aawsat.com/gulf/5267342-saudi-crown-prince-chairs-gcc-consultative-summit-regional-developments"},
  {id:1281,p:9,r:"심층분석",t:"Jeddah Summit Stresses Importance of Restoring Navigation Security in Hormuz",k:"제다 정상회의, 호르무즈 항행 안전 회복 중요성 강조",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-28",m:"The Jeddah summit emphasized the importance of restoring navigation security in the Strait of Hormuz, with GCC leaders calling for restoration of pre-crisis conditions and uninterrupted flow of global energy trade.",mk:"제다 정상회의는 호르무즈 해협 항행 안전 회복의 중요성을 강조하며, GCC 정상들은 위기 이전 상황 복원과 글로벌 에너지 무역의 안정적 흐름을 요구했다.",tg:["호르무즈","GCC","에너지안보"],u:"https://english.aawsat.com/gulf/5267626-jeddah-summit-stresses-importance-restoring-navigation-security-hormuz"},
  {id:1283,p:7,r:"심층분석",t:"Faisal bin Farhan, Guterres Discuss Regional Developments",k:"파이살 빈 파르한 외교, 구테레스 사무총장과 지역 정세 논의",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-28",m:"Saudi Foreign Minister Prince Faisal bin Farhan held talks with UN Secretary-General Antonio Guterres to discuss regional developments and bilateral cooperation amid the ongoing crisis.",mk:"파이살 빈 파르한 사우디 외교장관이 안토니오 구테레스 유엔 사무총장과 회담을 갖고 현 위기 속 지역 정세와 양자 협력을 논의했다.",tg:["외교","UN","구테레스"],u:"https://english.aawsat.com/gulf/5267625-faisal-bin-farhan-guterres-discuss-regional-developments"},
  {id:1284,p:9,r:"헤드라인",t:"Strait of Hormuz must remain open under all circumstances: Al Ansari",k:"카타르 알안사리 &quot;호르무즈 해협, 어떤 상황에서도 개방 유지돼야&quot;",s:"Qatar Tribune",c:"gulf",d:"2026-04-28",m:"Qatar&apos;s Advisor to the Prime Minister and official spokesperson Majed Al-Ansari stressed that the Strait of Hormuz must remain open under all circumstances and should not be used as a political or military pressure tool.",mk:"마지드 알안사리 카타르 총리실 자문 겸 외교부 대변인은 호르무즈 해협이 어떠한 상황에서도 개방돼야 하며 정치·군사적 압박 수단으로 이용되어서는 안 된다고 강조했다.",tg:["호르무즈","카타르","외교"],u:"https://www.qatar-tribune.com/article/231414/front/strait-of-hormuz-must-remain-open-under-all-circumstances-al-ansari"},
  {id:1285,p:8,r:"헤드라인",t:"Saudi Crown Prince thanks GCC leaders for their efforts at consultative Gulf summit",k:"사우디 왕세자, 협의 정상회의 마치며 GCC 정상들에 사의",s:"Qatar Tribune",c:"gulf",d:"2026-04-28",m:"Saudi Crown Prince Mohammed bin Salman thanked GCC leaders for their efforts at the consultative Gulf summit in Jeddah, which addressed regional and international developments and coordination of efforts.",mk:"무함마드 빈 살만 사우디 왕세자가 제다에서 열린 협의 정상회의 종료 후 GCC 정상들의 노력에 사의를 표했다. 회의는 지역·국제 정세와 공조 방안을 논의했다.",tg:["GCC","제다정상회의","왕세자"],u:"https://www.qatar-tribune.com/article/231369/latest-news/saudi-crown-prince-thanks-gcc-leaders-for-their-efforts-at-consultative-gulf-summit"},
  {id:1286,p:8,r:"주요경제",t:"GCC project awards decline amid Iran conflict",k:"이란 사태로 GCC 프로젝트 발주 감소",s:"Muscat Daily",c:"gulf",d:"2026-04-28",m:"Project awards across the GCC declined amid the Iran conflict, as ongoing regional tensions and supply chain disruptions led contractors to pause new commitments and delay strategic investments.",mk:"이란 사태로 인한 지역 긴장과 공급망 차질이 이어지며 GCC 전역의 프로젝트 발주가 감소했다. 계약자들은 신규 약정을 보류하고 전략 투자를 미루고 있다.",tg:["프로젝트","GCC","건설"],u:"https://www.muscatdaily.com/2026/04/28/gcc-project-awards-decline-amid-iran-conflict/"},
  {id:1287,p:9,r:"속보",t:"GCC Leaders Meet in Jeddah to Forge Response to Iran War, Missile Attacks",k:"GCC 정상들 제다서 회동…이란 전쟁·미사일 공격 대응 모색",s:"Gulf News",c:"gulf",d:"2026-04-28",m:"GCC leaders met in Jeddah to discuss collective responses to the Iran war and missile attacks on Gulf facilities. The summit emphasized unified Gulf defense and security cooperation.",mk:"GCC 정상들이 제다에서 회동해 이란 전쟁과 걸프 시설을 겨냥한 미사일 공격에 대한 집단 대응을 논의했다. 정상회의는 걸프 통합 방위와 안보 협력을 강조했다.",tg:["GCC","안보","미사일"],u:"https://gulfnews.com/world/gulf/gcc-leaders-meet-in-jeddah-to-forge-response-to-iran-war-missile-attacks-and-gulf-security-threats-1.500522013"},
  {id:1288,p:8,r:"속보",t:"UAE quits Opec: Why oil markets reacted; what happens next",k:"UAE OPEC 탈퇴…유가 반응과 향후 전망",s:"Khaleej Times",c:"gulf",d:"2026-04-28",m:"Khaleej Times analyzed why oil markets reacted strongly to the UAE&apos;s OPEC exit announcement, with analysts saying the UAE could eventually increase output by up to 30% above previous quota-constrained levels.",mk:"UAE의 OPEC 탈퇴 발표에 유가가 강하게 반응했으며, 애널리스트들은 UAE가 기존 쿼터 제약 수준 대비 최대 30%까지 증산할 수 있다고 전망했다.",tg:["OPEC","UAE","원유"],u:"https://www.khaleejtimes.com/business/energy/uae-quits-opec-oil-markets-reacted-what-next"},
  {id:1289,p:10,r:"헤드라인",t:"Trump reviews Iranian proposal aimed at reopening Strait of Hormuz",k:"트럼프, 호르무즈 재개방 위한 이란 제안 검토",s:"Al Jazeera",c:"me",d:"2026-04-28",m:"President Trump&apos;s national security team is reviewing an Iranian proposal aimed at halting the joint war with Israel, reopening the Strait of Hormuz, and delaying nuclear program negotiations until after the war ends. The offer was conveyed through Pakistan as mediator.",mk:"트럼프 미 대통령의 국가안보팀이 이스라엘과의 전쟁 중단, 호르무즈 해협 재개방, 그리고 종전 이후로 핵 협상 연기를 골자로 한 이란의 제안을 검토 중이다. 제안은 중재국 파키스탄을 통해 전달됐다.",tg:["이란","트럼프","호르무즈"],u:"https://www.aljazeera.com/news/2026/4/28/trump-reviews-iranian-proposal-aimed-at-reopening-strait-of-hormuz"},
  {id:1290,p:9,r:"심층분석",t:"As US-Iran talks remain &apos;stalled&apos;, experts warn of &apos;long-term disruptions&apos;",k:"美·이란 협상 교착에 전문가들 &quot;장기 차질&quot; 경고",s:"Al Jazeera",c:"me",d:"2026-04-28",m:"Experts warn that the stalled US-Iran negotiations could lead to long-term disruptions in global energy markets and Gulf economies, with the Strait of Hormuz blockade entering its third week with no breakthrough in sight.",mk:"美·이란 협상 교착이 글로벌 에너지 시장과 걸프 경제에 장기적 차질을 야기할 수 있다고 전문가들이 경고했다. 호르무즈 봉쇄는 돌파구 없이 3주차에 접어들었다.",tg:["美이란","호르무즈","에너지"],u:"https://www.aljazeera.com/economy/2026/4/28/as-us-iran-talks-remain-stalled-experts-warn-of-long-term-disruptions"},
  {id:1291,p:9,r:"심층분석",t:"What&apos;s in Iran&apos;s latest proposal – and how has the US responded?",k:"이란 최신 제안 내용은…美 반응은?",s:"Al Jazeera",c:"me",d:"2026-04-28",m:"Al Jazeera analyzed Iran&apos;s latest proposal, which focuses on reopening the strategic Strait of Hormuz while postponing a deal on Iran&apos;s nuclear programme. The White House confirmed Trump met his national security advisers but reports suggest he is unlikely to accept.",mk:"알자지라가 분석한 이란의 최신 제안은 핵 협상 연기를 전제로 호르무즈 해협 재개방에 초점을 맞췄다. 백악관은 트럼프가 국가안보보좌관들과 회의했다고 확인했으나, 트럼프가 수용할 가능성은 낮다는 보도다.",tg:["이란제안","트럼프","핵협상"],u:"https://www.aljazeera.com/news/2026/4/28/whats-in-irans-latest-proposal-and-how-has-the-us-responded"},
  {id:1292,p:9,r:"속보",t:"LNG tanker crosses Strait of Hormuz for first time since Iran war: Ship-tracking data",k:"LNG선, 이란 전쟁 이후 호르무즈 첫 통과…선박 추적 데이터",s:"Al Arabiya",c:"me",d:"2026-04-28",m:"Ship-tracking data shows an LNG tanker crossed the Strait of Hormuz for the first time since the Iran war began, signaling a potential easing of the maritime blockade and renewed hope for energy exports from the Gulf.",mk:"선박 추적 데이터에 따르면 이란 전쟁 발발 이후 처음으로 LNG 운반선이 호르무즈 해협을 통과했다. 해상 봉쇄 완화 가능성과 걸프 에너지 수출 재개 기대를 시사한다.",tg:["LNG","호르무즈","에너지"],u:"https://english.alarabiya.net/business/energy/2026/04/28/-lng-tanker-crosses-strait-of-hormuz-for-first-time-since-iran-war-shiptracking-data-"},
  {id:1293,p:10,r:"헤드라인",t:"Iran informed US it is in a &apos;state of collapse,&apos; Trump says",k:"트럼프 &quot;이란, &apos;붕괴 상태&apos; 美에 통보&quot;",s:"Al Arabiya",c:"me",d:"2026-04-28",m:"President Trump said in a social media post that Iran has &apos;just informed us that they are in a State of Collapse&apos; and is asking the US to lift the naval blockade and reopen the Strait of Hormuz as soon as possible.",mk:"트럼프 미 대통령은 SNS를 통해 이란이 &apos;붕괴 상태&apos;라고 美에 통보했으며 해상 봉쇄 해제와 호르무즈 해협 재개방을 가능한 빨리 요청했다고 밝혔다.",tg:["트럼프","이란","호르무즈"],u:"https://english.alarabiya.net/News/middle-east/2026/04/28/iran-informed-us-it-is-in-a-state-of-collapse-"},
  {id:1294,p:9,r:"심층분석",t:"Peace efforts stall as US examines latest Iran proposal",k:"평화 노력 교착…美, 이란 최신 제안 검토 중",s:"Al Arabiya",c:"me",d:"2026-04-28",m:"Peace efforts to end the US-Iran conflict have stalled as Washington examines Tehran&apos;s latest proposal. Secretary Rubio said Iran&apos;s offer looked &apos;better&apos; than past pitches but the core nuclear issue still has to be confronted.",mk:"美·이란 분쟁 종식을 위한 평화 노력이 워싱턴의 이란 최신 제안 검토와 함께 교착 상태에 빠졌다. 루비오 국무장관은 이란 제안이 과거보다 &apos;나아보인다&apos;면서도 핵심 핵 문제는 여전히 직면해야 한다고 밝혔다.",tg:["평화","美이란","루비오"],u:"https://english.alarabiya.net/News/middle-east/2026/04/28/peace-efforts-stall-as-us-examines-latest-iran-proposal"},
  {id:1295,p:9,r:"속보",t:"Trump reportedly preparing for extended Iran blockade as US imposes fresh sanctions",k:"트럼프, 이란 봉쇄 장기화 준비…美 추가 제재 부과",s:"Jerusalem Post",c:"me",d:"2026-04-28",m:"Trump is reportedly preparing for an extended Iran blockade as the US Treasury imposed fresh sanctions on 35 entities and individuals overseeing Iran&apos;s shadow banking system as part of Operation Economic Fury.",mk:"트럼프 행정부가 이란 봉쇄 장기화를 준비 중인 것으로 알려졌으며, 美 재무부는 &apos;경제적 분노 작전&apos; 일환으로 이란 그림자 금융 시스템 감독 기관·인사 35곳에 추가 제재를 부과했다.",tg:["트럼프","제재","이란봉쇄"],u:"https://www.jpost.com/middle-east/iran-news/2026-04-28/live-updates-894376"},
  {id:1296,p:10,r:"헤드라인",t:"UAE to leave OPEC amid Hormuz oil crisis, a blow to Saudi Arabia",k:"UAE, 호르무즈 위기 속 OPEC 탈퇴…사우디에 타격",s:"Washington Post",c:"global",d:"2026-04-28",m:"The UAE&apos;s OPEC exit will weaken the influence of the cartel and its leader Saudi Arabia on the oil market. The UAE has chafed under years of Saudi-led production cuts and quit OPEC on April 28 without consulting Saudi Arabia.",mk:"UAE의 OPEC 탈퇴는 카르텔과 리더국 사우디의 유가 영향력을 약화시킬 전망이다. 사우디 주도 감산에 불만을 누적해온 UAE는 사우디와 사전 협의 없이 28일 탈퇴를 결정했다.",tg:["OPEC","UAE","사우디"],u:"https://www.washingtonpost.com/world/2026/04/28/uae-opec-iran-hormuz-trump-saudi/"},
  {id:1297,p:9,r:"심층분석",t:"Deadlock over Iran&apos;s nuclear program and the Strait of Hormuz cripples peace efforts",k:"이란 핵·호르무즈 교착이 평화 노력 마비",s:"NPR",c:"global",d:"2026-04-28",m:"NPR reports that the deadlock over Iran&apos;s nuclear program and the Strait of Hormuz is crippling peace efforts. Trump signaled he would not accept a version of the Iranian proposal that defers nuclear talks.",mk:"NPR는 이란 핵 프로그램과 호르무즈 해협을 둘러싼 교착이 평화 노력을 마비시키고 있다고 보도했다. 트럼프는 핵 협상을 미루는 형태의 이란 제안은 수용하지 않을 것임을 시사했다.",tg:["이란핵","호르무즈","평화"],u:"https://www.npr.org/2026/04/28/nx-s1-5802283/iran-middle-east-updates"},
  {id:1298,p:9,r:"속보",t:"U.S. appears cool on Iran proposal to end war and reopen Hormuz without a nuclear deal",k:"美, 핵합의 없는 전쟁 종식·호르무즈 재개방 이란 제안에 미온적",s:"NBC News",c:"global",d:"2026-04-28",m:"The US showed little immediate enthusiasm for a new Iranian proposal that would end the war and reopen the Strait of Hormuz without resolving the impasse over Iran&apos;s nuclear program.",mk:"美는 이란 핵 프로그램 교착 해소 없이 전쟁 종식 및 호르무즈 해협 재개방만을 약속하는 이란의 새 제안에 즉각적 적극성을 보이지 않았다.",tg:["美이란","호르무즈","핵"],u:"https://www.nbcnews.com/world/iran/trumpl-iran-proposal-end-war-reopen-hormuz-nuclear-deal-oil-storage-rcna342441"},
  {id:1299,p:8,r:"속보",t:"U.S. Forces Search and Release Containership Suspected of Violating Blockade on Iran",k:"美軍, 이란 봉쇄 위반 의심 컨테이너선 검색 후 방류",s:"gCaptain",c:"global",d:"2026-04-28",m:"U.S. Marines from the 31st Marine Expeditionary Unit boarded the containership M/V Blue Star III suspected of attempting to transit to Iran in violation of the blockade. CENTCOM said 39 vessels have now been redirected since the operation began.",mk:"美 31해병원정대대 소속 해병대원들이 봉쇄 위반 의심 컨테이너선 M/V 블루스타3호에 승선해 검색했다. CENTCOM은 봉쇄 작전 개시 이후 39척의 선박이 항로를 변경했다고 밝혔다.",tg:["봉쇄","美軍","호르무즈"],u:"https://gcaptain.com/u-s-forces-search-and-release-containership-suspected-of-violating-blockade-on-iran/"},
  {id:1300,p:8,r:"심층분석",t:"Trump&apos;s Hormuz Blockade Has Deepened A Historic Shipping Crisis",k:"트럼프 호르무즈 봉쇄, 사상 최악의 해운 위기 심화",s:"gCaptain",c:"global",d:"2026-04-27",m:"gCaptain reports Trump&apos;s Hormuz blockade has deepened a historic shipping crisis, with global tanker traffic disrupted, container shipping costs surging, and supply chain bottlenecks worsening across multiple sectors.",mk:"gCaptain은 트럼프 호르무즈 봉쇄가 사상 최악의 해운 위기를 심화시켰다며 글로벌 탱커 교통 차질, 컨테이너 운임 급등, 다수 섹터의 공급망 병목 악화를 보도했다.",tg:["해운","호르무즈","봉쇄"],u:"https://gcaptain.com/trumps-hormuz-blockade-has-deepened-a-historic-shipping-crisis/"},
  {id:1301,p:9,r:"속보",t:"Brent oil prices top $111 per barrel as traders weigh Iran&apos;s Strait of Hormuz proposal",k:"브렌트유, 배럴당 111달러 돌파…트레이더들 이란 호르무즈 제안 주시",s:"CNBC",c:"global",d:"2026-04-28",m:"International benchmark Brent futures advanced nearly 3% to settle at $111.26 on April 28, with WTI futures jumping more than 3% to close at $99.93 per barrel as traders weigh Iran&apos;s Strait of Hormuz proposal.",mk:"브렌트유 선물이 28일 약 3% 상승해 배럴당 111.26달러에 마감했고, WTI 선물도 3% 이상 급등해 99.93달러로 마감했다. 트레이더들은 이란의 호르무즈 제안을 주시하고 있다.",tg:["원유","브렌트","WTI"],u:"https://www.cnbc.com/amp/2026/04/28/oil-prices-us-iran-hormuz-negotiations-wti-brent-crude.html"},
  {id:1302,p:8,r:"심층분석",t:"OPEC shocker as UAE leaves oil cartel days after negotiating swap lines with Bessent&apos;s Treasury",k:"美 재무부와 스왑라인 협상 며칠 만에 UAE OPEC 탈퇴…충격",s:"Fortune",c:"global",d:"2026-04-28",m:"The UAE&apos;s OPEC exit came days after negotiating currency swap lines with Treasury Secretary Scott Bessent, signaling closer alignment with the US dollar and a potential threat to petrodollar arrangements.",mk:"UAE의 OPEC 탈퇴는 스콧 베센트 美 재무장관과 통화 스왑라인 협상을 마친 며칠 후 단행됐으며, 美 달러와의 긴밀한 정렬 및 페트로달러 체제에 대한 잠재적 위협을 시사한다.",tg:["UAE","OPEC","페트로달러"],u:"https://fortune.com/2026/04/28/uae-leaves-opec-bessent-swap-line-petrodollar-iran-war/"},
  {id:1303,p:8,r:"속보",t:"Trump says Iran is heading toward &apos;collapse,&apos; hopes Tehran sorts out leadership",k:"트럼프 &quot;이란 붕괴 향해…테헤란이 지도부 정리하길&quot;",s:"Washington Times",c:"global",d:"2026-04-28",m:"President Trump said Iran is in a &apos;state of collapse&apos; as he squeezes the Islamic Republic by blockading its ports, expressing hope that Tehran will sort out its leadership.",mk:"트럼프 美 대통령은 항구 봉쇄로 이란을 압박하면서 이란이 &apos;붕괴 상태&apos;에 있다며 테헤란 지도부가 상황을 정리하기를 바란다고 밝혔다.",tg:["트럼프","이란","봉쇄"],u:"https://www.washingtontimes.com/news/2026/apr/28/trump-says-iran-heading-toward-collapse-hopes-tehran-sorts-leadership/"},
  {id:1304,p:8,r:"심층분석",t:"UAE Leaves OPEC in Major Blow to Global Oil Producers&apos; Group",k:"UAE의 OPEC 탈퇴…글로벌 산유국 그룹에 큰 타격",s:"US News",c:"global",d:"2026-04-28",m:"The UAE&apos;s exit from OPEC and OPEC+ is a major blow to the global oil producers&apos; group, weakening the cartel as the Iran war exposes discord among Gulf nations.",mk:"UAE의 OPEC·OPEC+ 탈퇴는 글로벌 산유국 그룹에 큰 타격이며, 이란 전쟁이 걸프 국가들의 불협화음을 드러내는 가운데 카르텔을 약화시킨다.",tg:["UAE","OPEC","산유국"],u:"https://www.usnews.com/news/world/articles/2026-04-28/uae-leaves-opec-and-opec-in-huge-blow-to-global-oil-producers-group"},
  {id:1306,p:9,r:"헤드라인",t:"UAE, OPEC 탈퇴...중동 지각 변동 시작됐다",k:"UAE, OPEC 탈퇴...중동 지각 변동 시작됐다",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-29",m:"UAE&apos;s OPEC withdrawal signals the beginning of a major shift in Middle East dynamics, with experts predicting reshuffled production hierarchies and potential Saudi-UAE strategic divergence.",mk:"UAE의 OPEC 탈퇴는 중동 지정학의 거대한 변동의 시작을 알리는 신호로, 전문가들은 산유 위계 재편과 사우디-UAE 전략 분기 가능성을 점치고 있다.",tg:["UAE","OPEC","중동"],u:"https://www.fnnews.com/news/202604290242526533"},
  {id:1307,p:8,r:"심층분석",t:"UAE OPEC 탈퇴 충격…&quot;유가 통제력 약화에도 동맹 붕괴는 아니다&quot;",k:"UAE OPEC 탈퇴 충격…&quot;유가 통제력 약화에도 동맹 붕괴는 아니다&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-29",m:"While the UAE&apos;s OPEC exit weakens the cartel&apos;s price control, analysts say it does not signal a collapse of the broader Gulf alliance, with strategic security ties expected to endure.",mk:"UAE의 OPEC 탈퇴가 카르텔의 유가 통제력은 약화시키지만, 분석가들은 보다 광범위한 걸프 동맹의 붕괴를 의미하지는 않으며 전략·안보 유대는 유지될 것이라고 평가했다.",tg:["UAE","OPEC","유가"],u:"https://www.fnnews.com/news/202604290613060216"},
  {id:1308,p:9,r:"심층분석",t:"UAE, 사우디 주도 오펙과 결별…美 밀착하며 중동질서 흔든다",k:"UAE, 사우디 주도 오펙과 결별…美 밀착하며 중동질서 흔든다",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-29",m:"The UAE&apos;s departure from Saudi-led OPEC, coupled with closer alignment with the US, is shaking the Middle East order. The move follows currency swap line negotiations with the US Treasury.",mk:"사우디 주도의 OPEC을 떠난 UAE의 美 밀착 행보가 중동 질서를 흔들고 있다. 이번 결정은 美 재무부와의 통화 스왑라인 협상에 뒤이은 조치다.",tg:["UAE","사우디","美"],u:"https://www.fnnews.com/news/202604290941108838"},
  {id:1309,p:8,r:"심층분석",t:"사우디 독주 흔든 UAE...단기 고유가, 장기 공급 경쟁",k:"사우디 독주 흔든 UAE...단기 고유가, 장기 공급 경쟁",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-29",m:"The UAE&apos;s break from Saudi dominance in oil markets is expected to drive short-term high oil prices but trigger long-term supply competition, with the UAE planning gradual production increases.",mk:"UAE가 사우디 독주에 균열을 낸 가운데 단기적으로는 고유가가 이어지지만, 장기적으로는 공급 경쟁이 본격화될 전망이다. UAE는 점진적 증산을 계획 중이다.",tg:["UAE","사우디","유가"],u:"https://www.fnnews.com/news/202604291017159983"},
  {id:1310,p:9,r:"속보",t:"트럼프 &quot;이란, 사실상 &apos;붕괴 상태&apos; 시인…호르무즈 즉시 개방 요청&quot;",k:"트럼프 &quot;이란, 사실상 &apos;붕괴 상태&apos; 시인…호르무즈 즉시 개방 요청&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-28",m:"Trump said Iran has effectively admitted being in a &apos;state of collapse&apos; and asked the US to immediately reopen the Strait of Hormuz, as oil price volatility expands and energy supply chain uncertainty deepens.",mk:"트럼프 美 대통령은 이란이 사실상 &apos;붕괴 상태&apos;임을 시인하며 호르무즈 해협 즉시 개방을 요청해왔다고 밝혔다. 유가 변동성 확대와 에너지 공급망 불확실성이 한층 깊어졌다.",tg:["트럼프","이란","호르무즈"],u:"https://www.fnnews.com/news/202604282251444271"},
  {id:1311,p:8,r:"심층분석",t:"종전 협상 교착에…이란 &apos;호르무즈 계좌&apos; 열었다",k:"종전 협상 교착에…이란 &apos;호르무즈 계좌&apos; 열었다",s:"서울경제",c:"korean-view",d:"2026-04-28",m:"As US-Iran ceasefire talks remain deadlocked, Iran has opened the &apos;Hormuz card&apos; in negotiations, proposing to reopen the strait if the US lifts its naval blockade and ends the war.",mk:"美·이란 종전 협상 교착 속 이란이 &apos;호르무즈 카드&apos;를 협상에 꺼냈다. 美가 해상 봉쇄를 해제하고 전쟁을 종식하면 해협을 재개방하겠다는 제안이다.",tg:["이란","호르무즈","협상"],u:"https://www.sedaily.com/article/20038220"}
,
  {id:1312,p:8,r:"심층분석",t:"Saudi FM, UN chief discuss regional developments in phone call",k:"파이살 빈 파르한 외교장관, 구테레스 사무총장과 전화 통화",s:"Saudi Gazette",c:"saudi",d:"2026-04-28",m:"Saudi Foreign Minister Prince Faisal bin Farhan received a phone call from UN Secretary-General Antonio Guterres on Tuesday, where they discussed regional and international developments and areas of bilateral cooperation amid the Iran war.",mk:"파이살 빈 파르한 사우디 외교장관이 28일 안토니오 구테레스 유엔 사무총장으로부터 전화를 받아 이란 전쟁 속 지역·국제 정세와 양자 협력 분야를 논의했다.",tg:["외교","UN","구테레스"],u:"https://saudigazette.com.sa/article/660933/saudi-arabia/saudi-fm-un-chief-discuss-regional-developments-in-phone-call"},
  {id:1314,p:8,r:"정책발표",t:"Saudi cabinet backs PIF strategy, approves tax pact and cross-border deals",k:"사우디 내각, PIF 전략 승인…조세협정·국경 간 거래도 통과",s:"Arab News",c:"saudi",d:"2026-04-21",m:"The Saudi cabinet, chaired by Crown Prince Mohammed bin Salman, backed the PIF&apos;s 2026-2030 strategy and approved a tax pact and cross-border deals, pointing to growth in non-oil exports as evidence of economic diversification efforts.",mk:"무함마드 빈 살만 왕세자가 주재한 사우디 내각은 PIF의 2026-2030 전략을 승인하고 조세협정 및 국경 간 거래를 통과시켰다. 비석유 수출 성장세를 경제 다각화 노력의 결실로 평가했다.",tg:["내각","PIF","조세협정"],u:"https://www.arabnews.com/node/2640829/saudi-arabia"},
  {id:1316,p:7,r:"심층분석",t:"Saudi Arabia secures leading GEM rankings, reinforcing position as premier global entrepreneurship hub",k:"사우디, GEM 글로벌 기업가정신 평가 상위권 확보…허브 지위 강화",s:"Saudi Gazette",c:"saudi",d:"2026-04-23",m:"Saudi Arabia has secured top global rankings in the Global Entrepreneurship Monitor (GEM) 2025-2026 report, reflecting a highly competitive environment and reinforcing its position as a premier global hub for entrepreneurship.",mk:"사우디는 글로벌 기업가정신모니터(GEM) 2025-2026 보고서에서 최상위권 순위를 확보하며 매우 경쟁력 있는 환경을 반영하고 글로벌 기업가정신 허브로서의 위상을 강화했다.",tg:["기업가정신","GEM","경쟁력"],u:"https://saudigazette.com.sa/article/660792"},
{id:1317,p:10,r:"헤드라인",t:"GCC leaders meet in Saudi Arabia for first time since start of war on Iran",k:"GCC 정상들, 이란전쟁 발발 후 처음 사우디서 회담",s:"Al Jazeera",c:"me",d:"2026-04-28",m:"Gulf leaders gathered in Saudi Arabia to discuss a regional crisis triggered by the US-Israel war on Iran. The six GCC leaders were greeted by Saudi Crown Prince Mohammed bin Salman in Jeddah, marking the first in-person summit since hostilities began.",mk:"걸프 정상들이 미·이스라엘의 대이란 전쟁으로 촉발된 지역 위기 대응을 논의하기 위해 사우디에 모였다. GCC 6개국 정상들은 빈 살만 왕세자의 영접을 받으며 제다에서 전쟁 발발 후 첫 대면 정상회의를 가졌다.",tg:["GCC","Iran","Jeddah"],u:"https://www.aljazeera.com/news/2026/4/28/gulf-leaders-meet-in-saudi-arabia-for-first-time-since-start-of-war-on-iran"},
{id:1318,p:10,r:"속보",t:"Aramco suspends LPG deliveries through May on facility damage",k:"아람코, 시설 피해로 5월까지 LPG 인도 중단",s:"Bloomberg",c:"global",d:"2026-04-28",m:"Saudi Aramco is suspending LPG shipments next month after damage to its main Juaymah export facility cut off supplies. The facility accounts for 3.5% of total waterborne LPG exports globally.",mk:"사우디 아람코가 주아이마 LPG 시설 피해로 다음 달 LPG 출하를 중단한다. 해당 시설은 글로벌 해상 LPG 수출의 3.5%를 차지해 아시아 공급에 심각한 영향이 예상된다.",tg:["Aramco","LPG","Juaymah"],u:"https://www.bloomberg.com/news/articles/2026-04-28/aramco-suspends-lpg-deliveries-through-may-on-facility-damage"},
{id:1319,p:9,r:"속보",t:"UAE announces it will leave OPEC",k:"UAE, OPEC 탈퇴 공식 발표",s:"The National",c:"gulf",d:"2026-04-28",m:"The UAE announced it will leave OPEC on May 1, ending more than five decades of membership to pursue an independent output strategy. Decision follows comprehensive review of UAE's production policy.",mk:"UAE가 5월 1일부로 OPEC을 탈퇴해 독자적 증산 전략을 추진한다고 공식 발표했다. 자국 생산정책 종합 검토 결과에 따른 결정이라고 에너지부는 밝혔다.",tg:["UAE","OPEC","Energy"],u:"https://www.thenationalnews.com/business/energy/2026/04/28/uae-announces-it-will-leave-opec/"},
{id:1320,p:7,r:"주요경제",t:"Oman economy set for fastest growth in GCC in 2026: IMF",k:"IMF &quot;오만, 2026년 GCC 최고 성장률 전망&quot;",s:"Khaleej Times",c:"gulf",d:"2026-04-18",m:"IMF projects Oman to record real GDP growth of 3.5% in 2026, the highest among GCC countries despite the regional war shock. Oman has been the least affected with only modest 0.5pp downgrade.",mk:"IMF는 이란전쟁 충격에도 오만이 2026년 실질 GDP 3.5% 성장으로 GCC 1위가 될 것으로 전망했다. 오만은 충격이 가장 작아 0.5%포인트만 하향됐다.",tg:["Oman","IMF","GCC"],u:"https://www.muscatdaily.com/2026/04/18/oman-economy-set-for-fastest-growth-in-gcc-in-2026-imf/"},
{id:1321,p:7,r:"속보",t:"Iranian attacks on Gulf states: 9 key takeaways from GCC meeting",k:"이란의 걸프 공격: GCC 회의 9대 시사점",s:"Khaleej Times",c:"gulf",d:"2026-04-28",m:"Khaleej Times analysis of nine key takeaways from the GCC summit on Iranian attacks, including unified defense, Hormuz reopening demand, and economic repercussions of the conflict.",mk:"칼리지 타임스가 분석한 GCC 정상회의 9대 시사점 — 통합 방위 체계, 호르무즈 재개통 요구, 경제적 후폭풍 등을 짚었다.",tg:["GCC","Iran","Khaleej"],u:"https://www.khaleejtimes.com/uae/iranian-attacks-on-gulf-states-9-key-takeaways-from-gcc-meeting"},
