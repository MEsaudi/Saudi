<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCC & 중동 일일 뉴스 대시보드</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card-hover: #222633;
    --accent: #00d4aa; --accent2: #5b8def;
    --text: #e8eaed; --text-dim: #8b8fa3; --border: #2a2d3a;
    --saudi: #006c35; --western: #1a5276; --korean: #c0392b; --other: #7d3c98;
    --ko-bg: rgba(0,212,170,0.06); --ko-border: rgba(0,212,170,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .header { background:linear-gradient(135deg,#1a1d27,#0f1117); border-bottom:1px solid var(--border); padding:20px 32px; position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .header h1 { font-size:22px; font-weight:700; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .date-badge { background:var(--card); border:1px solid var(--border); padding:6px 14px; border-radius:20px; font-size:12px; color:var(--text-dim); display:flex; align-items:center; gap:8px; }
  .live-dot { width:8px; height:8px; background:#00ff88; border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .stats-bar { display:flex; gap:10px; flex-wrap:wrap; }
  .stat-chip { background:var(--card); border:1px solid var(--border); padding:5px 12px; border-radius:14px; font-size:11px; color:var(--text-dim); display:flex; align-items:center; gap:5px; }
  .stat-chip .count { font-weight:700; color:var(--accent); }

  .controls { padding:12px 32px; display:flex; gap:8px; flex-wrap:wrap; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:72px; z-index:99; align-items:center; }
  .filter-btn { padding:6px 14px; border-radius:18px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:12px; font-weight:500; transition:all .2s; white-space:nowrap; }
  .filter-btn:hover { border-color:var(--accent); color:var(--accent); }
  .filter-btn.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
  .filter-btn.saudi.active { background:var(--saudi); color:#fff; border-color:var(--saudi); }
  .filter-btn.western.active { background:var(--western); color:#fff; border-color:var(--western); }
  .filter-btn.korean.active { background:var(--korean); color:#fff; border-color:var(--korean); }
  .filter-btn.other.active { background:var(--other); color:#fff; border-color:var(--other); }

  .sep { width:1px; height:24px; background:var(--border); margin:0 4px; }

  .lang-btn { padding:5px 12px; border-radius:14px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:11px; transition:all .2s; }
  .lang-btn.active { background:var(--accent2); color:#fff; border-color:var(--accent2); }

  .search-bar { padding:10px 32px; background:var(--bg); }
  .search-input { width:100%; padding:10px 18px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:13px; outline:none; }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--text-dim); }

  .main { padding:16px 32px; }

  .section-title { font-size:16px; font-weight:700; margin:24px 0 12px; padding-left:12px; border-left:3px solid var(--accent); display:flex; align-items:center; gap:8px; }
  .badge { font-size:10px; padding:2px 8px; border-radius:8px; font-weight:600; color:#fff; }
  .badge-saudi{background:var(--saudi);} .badge-western{background:var(--western);} .badge-korean{background:var(--korean);} .badge-other{background:var(--other);}

  .news-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:14px; margin-bottom:10px; }

  .news-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; transition:all .2s; position:relative; overflow:hidden; }
  .news-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
  .news-card.saudi::before{background:var(--saudi);} .news-card.western::before{background:var(--western);} .news-card.korean::before{background:var(--korean);} .news-card.other::before{background:var(--other);}
  .news-card:hover { background:var(--card-hover); transform:translateY(-1px); box-shadow:0 6px 24px rgba(0,0,0,.3); }

  .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .source-tag { font-size:10px; font-weight:600; padding:2px 8px; border-radius:6px; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; }
  .source-tag.saudi{background:rgba(0,108,53,.2);color:#00d68f;} .source-tag.western{background:rgba(26,82,118,.2);color:#5dade2;} .source-tag.korean{background:rgba(192,57,43,.2);color:#e74c3c;} .source-tag.other{background:rgba(125,60,152,.2);color:#bb8fce;}
  .card-date { font-size:10px; color:var(--text-dim); white-space:nowrap; margin-left:6px; }

  .title-en { font-size:14px; font-weight:600; line-height:1.45; margin-bottom:3px; color:var(--text); }
  .title-ko { font-size:13px; font-weight:500; line-height:1.45; margin-bottom:8px; color:var(--accent); padding-left:9px; border-left:2px solid var(--accent); opacity:.9; }
  .summary-en { font-size:12px; color:var(--text-dim); line-height:1.55; margin-bottom:4px; }
  .summary-ko { font-size:12px; color:#8ecae6; line-height:1.55; margin-bottom:12px; padding:6px 10px; background:var(--ko-bg); border:1px solid var(--ko-border); border-radius:6px; }
  .title-only { font-size:14px; font-weight:600; line-height:1.45; margin-bottom:8px; color:var(--text); }
  .summary-only { font-size:12px; color:var(--text-dim); line-height:1.55; margin-bottom:12px; }

  .card-footer { display:flex; justify-content:space-between; align-items:center; }
  .topic-tags { display:flex; gap:4px; flex-wrap:wrap; }
  .topic-tag { font-size:9px; padding:2px 6px; border-radius:5px; background:rgba(255,255,255,.05); color:var(--text-dim); border:1px solid var(--border); }
  .read-link { font-size:11px; color:var(--accent); text-decoration:none; font-weight:600; white-space:nowrap; }
  .read-link:hover { opacity:.7; }

  .summary-panel { background:linear-gradient(135deg,#1a2332,#1a1d27); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
  .summary-panel h2 { font-size:15px; margin-bottom:12px; color:var(--accent); }
  .summary-points { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px; }
  .summary-point { display:flex; gap:8px; align-items:flex-start; padding:10px; background:rgba(255,255,255,.03); border-radius:8px; border:1px solid var(--border); }
  .summary-icon { font-size:18px; flex-shrink:0; }
  .summary-text { font-size:12px; line-height:1.5; color:var(--text-dim); }
  .summary-text strong { color:var(--text); }

  .scroll-top { position:fixed; bottom:24px; right:24px; width:40px; height:40px; border-radius:50%; background:var(--accent); color:#000; border:none; cursor:pointer; font-size:18px; display:none; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(0,212,170,.3); z-index:200; }
  .scroll-top.show { display:flex; }

  .article-count-note { font-size:11px; color:var(--text-dim); margin-bottom:16px; padding:8px 14px; background:var(--card); border:1px solid var(--border); border-radius:8px; }

  @media(max-width:768px) { .header{padding:12px 14px;} .controls{padding:10px 14px;} .search-bar{padding:8px 14px;} .main{padding:12px 14px;} .news-grid{grid-template-columns:1fr;} .summary-points{grid-template-columns:1fr;} .header h1{font-size:17px;} }
  .no-results { text-align:center; padding:50px 20px; color:var(--text-dim); }

  /* Priority badges */
  .prio-badge { font-size:9px; font-weight:700; padding:2px 7px; border-radius:4px; letter-spacing:.3px; margin-left:6px; vertical-align:middle; }
  .prio-headline { background:#e74c3c; color:#fff; }
  .prio-breaking { background:#f39c12; color:#000; }
  .prio-analysis { background:#3498db; color:#fff; }
  .prio-policy { background:#8e44ad; color:#fff; }
  .prio-economy { background:#27ae60; color:#fff; }
  .prio-normal { display:none; }

  .news-card.prio-top { border-color:rgba(231,76,60,.4); }
  .news-card.prio-top::after { content:''; position:absolute; top:0; right:0; width:0; height:0; border-top:28px solid rgba(231,76,60,.6); border-left:28px solid transparent; }
</style>

{id:158,p:7,r:"주요경제",t:"TotalEnergies and Masdar form $2.2bn Asian renewable energy JV",k:"토탈에너지·마스다르, 22억 달러 아시아 재생에너지 합작사 설립",s:"Arab News",c:"saudi",d:"2026-04-08",

{id:160,p:8,r:"정책발표",t:"HRH the Crown Prince Chairs Cabinet Session",k:"왕세자, 내각 회의 주재",s:"SPA",c:"saudi",d:"2026-04-08",
 m:"Crown Prince Mohammed bin Salman chaired the weekly Cabinet session, reviewing latest regional developments, the Iran ceasefire status, economic measures, and government initiatives. Cabinet approved several decisions on infrastructure and social development.",
 mk:"무함마드 빈 살만 왕세자는 주례 내각 회의를 주재해 최근 지역 정세, 이란 휴전 현황, 경제 조치, 정부 이니셔티브를 검토했다. 내각은 인프라 및 사회 개발에 관한 여러 결정을 승인했다.",

 m:"Saudi Arabia achieved a milestone in global environmental leadership with the IUCN Green List recognition, advancing its commitment to protected area management and biodiversity conservation under Vision 2030 environmental goals.",
 mk:"사우디아라비아는 IUCN 그린 리스트 인증을 달성하며 비전 2030 환경 목표 하의 보호구역 관리 및 생물다양성 보존에 대한 약속을 진전시켜 글로벌 환경 리더십에서 이정표를 세웠다.",

{id:162,p:10,r:"속보",t:"Saudi air defenses intercept 11 ballistic missiles over Eastern Province",k:"사우디 방공망, 동부지역 탄도미사일 11발 요격",s:"Saudi Gazette",c:"saudi",d:"2026-04-10",
 m:"Saudi Arabia's Ministry of Defense announced the interception and destruction of 11 ballistic missiles fired toward the Eastern Province. Spokesman Maj. Gen. Turki Al-Maliki confirmed four missiles were initially intercepted, followed by seven more. Debris fell near energy facilities and authorities are assessing potential damage.",
 mk:"사우디 국방부가 동부 주를 겨냥해 발사된 탄도미사일 11발을 요격·파괴했다고 발표했다. 투르키 알말리키 대변인은 4발을 먼저 요격한 뒤 추가로 7발을 더 파괴했다고 확인했으며, 요격 잔해가 에너지 시설 인근에 낙하해 피해 조사가 진행 중이다.",
 tg:["안보","방위","동부주","탄도미사일"],u:"https://saudigazette.com.sa/article/660308"},
{id:163,p:8,r:"정책발표",t:"Saudi Arabia designates 2026 the Year of Artificial Intelligence",k:"사우디, 2026년을 인공지능의 해로 지정",s:"Arab News",c:"saudi",d:"2026-04-10",
 m:"Saudi Arabia officially designated 2026 as the Year of Artificial Intelligence, approved by Cabinet under Crown Prince Mohammed bin Salman. The Kingdom ranked 14th in the 2025 Global AI Index with AI companies securing $9.1 billion in funding and government spending on emerging tech rising 56% in 2024.",
 mk:"사우디아라비아가 2026년을 인공지능의 해로 공식 지정했다. 무함마드 빈 살만 왕세자 주도하에 내각이 승인한 이번 결정은 비전 2030의 AI 리더십 목표와 맞닿아 있으며, 사우디는 2025 글로벌 AI 지수에서 14위를 기록했다.",
 tg:["AI","비전2030","기술"],u:"https://www.arabnews.com/node/2636061/saudi-arabia"},
{id:164,p:7,r:"",t:"Saudi Arabia leads world in female-to-male ratio for AI training",k:"사우디, AI 교육 여성 비율 세계 1위",s:"Arab News",c:"saudi",d:"2026-04-10",
 m:"Saudi Arabia now leads the world in the female-to-male ratio for AI training per Humain VP Areeb Alowisheq. This reflects the Kingdom commitment to advancing women in technology as part of Vision 2030 social transformation.",
 mk:"사우디 AI 기업 후만의 부사장에 따르면, 사우디아라비아가 AI 교육에서 여성 대 남성 비율 세계 1위를 기록했다. 이는 여성 역량 강화를 핵심으로 한 비전 2030의 성과로 평가된다.",
 tg:["AI","여성","비전2030","기술"],u:"https://www.arabnews.com/node/2637817/saudi-arabia"},
{id:165,p:10,r:"속보",t:"Saudi Energy Ministry confirms broad wartime damage to energy infrastructure",k:"사우디 에너지부, 전시 에너지 인프라 대규모 피해 공식 확인",s:"Arab News",c:"saudi",d:"2026-04-10",
 m:"Saudi Energy Ministry issued its first public accounting of wartime damage revealing strikes hit oil, petrochemical, and power facilities across multiple regions. A pumping station on the East-West Pipeline cut throughput by 700,000 bpd, with further disruptions at Manifa and Khurais reducing output by 600,000 bpd.",
 mk:"사우디 에너지부가 전시 에너지 인프라 피해를 처음으로 공식 집계했다. 동서 파이프라인 펌프 스테이션이 가장 큰 피해를 입어 하루 70만 배럴 공급이 차질을 빚었으며, 마니파·쿠라이스 유전 피해로 추가 60만 배럴 생산이 감소했다.",
 tg:["에너지","원유","파이프라인","인프라"],u:"https://www.arabnews.com/saudiarabia"},
{id:166,p:7,r:"",t:"Riyadh to host ALIPH first regional hub for heritage protection",k:"리야드, 문화유산 보호기구 ALIPH 첫 지역 허브 유치",s:"Arab News",c:"saudi",d:"2026-04-10",
 m:"Riyadh is set to host ALIPH first regional hub. Saudi Arabia with eight UNESCO World Heritage sites has contributed $50 million to the organization protecting cultural heritage affected by war, climate change, and natural disasters.",
 mk:"리야드가 ALIPH(국제문화유산보호연맹)의 첫 지역 허브를 유치한다. 유네스코 세계유산 8곳을 보유한 사우디는 전쟁·기후변화·자연재해로 위협받는 문화유산 보호를 위해 5000만 달러를 기여했다.",
 tg:["문화유산","UNESCO","외교"],u:"https://www.arabnews.com/node/2639426/lifestyle"},
{id:167,p:7,r:"정책발표",t:"WEF Global Collaboration and Growth Meeting to be held in Jeddah on April 22-23",k:"세계경제포럼 글로벌 협력·성장 회의, 4월 22-23일 제다 개최",s:"Saudi Gazette",c:"saudi",d:"2026-04-10",
 m:"Saudi Arabia will host the WEF Global Collaboration and Growth Meeting titled Building Common Ground and Reviving Growth in Jeddah on April 22-23, 2026, bringing together global leaders amid unprecedented regional tensions.",
 mk:"사우디아라비아가 오는 4월 22~23일 제다에서 세계경제포럼 글로벌 협력·성장 회의를 개최한다. 지역 긴장이 고조된 가운데 글로벌 리더들이 한자리에 모인다.",
 tg:["WEF","외교","경제"],u:"https://saudigazette.com.sa/article/658415/saudi-arabia/saudi-arabia-to-host-wef-global-collaboration-and-growth-meeting-in-2026"},
{id:168,p:7,r:"주요경제",t:"Saudi Arabia four special economic zones regulations come into force April 2026",k:"사우디 4개 경제자유구역 규정, 2026년 4월 발효",s:"Saudi Gazette",c:"saudi",d:"2026-04-10",
 m:"Saudi Arabia approved regulatory frameworks for four special economic zones covering Jazan, Ras Al-Khair, King Abdullah Economic City, and the Cloud Computing and IT Zone, marking the formal operational start per Investment Minister Khalid Al-Falih.",
 mk:"사우디아라비아가 자잔, 라스알카이르, 킹압둘라경제도시, 클라우드컴퓨팅IT존 등 4개 경제자유구역(SEZ)의 운영·법적 단계를 공식 개시했다. 칼리드 알팔리 투자장관은 이를 투자 현대화의 중요한 이정표라고 평가했다.",
 tg:["경제자유구역","투자","비전2030"],u:"https://saudigazette.com.sa/article/657879"},
{id:169,p:5,r:"",t:"Saudi referees selected to officiate 2026 FIFA World Cup",k:"사우디 심판진, 2026 FIFA 월드컵 심판으로 선발",s:"Saudi Gazette",c:"saudi",d:"2026-04-10",
 m:"FIFA selected Saudi referee Khalid Al-Turais, assistant Mohammed Al-Abakri, and VAR official Abdullah Al-Shahri for the 2026 FIFA World Cup in the US, Canada, and Mexico. The Saudi football federation president called it a sign of FIFA confidence in Saudi officiating.",
 mk:"FIFA가 2026 미국·캐나다·멕시코 월드컵에 사우디 주심 칼리드 알투라이스, 부심 무함마드 알아바크리, VAR 압둘라 알샤흐리를 선발했다. 사우디 축구협회장은 FIFA의 신뢰를 반영한 쾌거라고 밝혔다.",
 tg:["FIFA","월드컵","스포츠"],u:"https://saudigazette.com.sa/article/660409/sports/saudi-referees-selected-for-2026-fifa-world-cup"},

{id:170,p:10,r:"헤드라인",t:"US-Iran peace talks open in Islamabad as ceasefire holds tenuously",k:"미·이란 평화회담 이슬라마바드 개막…휴전 아슬아슬 유지",s:"Al Jazeera",c:"me",d:"2026-04-10",
 m:"Pakistani PM Shehbaz Sharif invited US and Iranian delegations to Islamabad on April 10 for direct talks under Pakistani mediation. Iran delegation arrived despite ceasefire violations by the Israeli regime while the US halted offensive operations against Iran though defensive measures remain.",
 mk:"파키스탄 샤바즈 샤리프 총리가 미국과 이란 대표단을 4월 10일 이슬라마바드로 초청해 파키스탄 중재하 직접 회담이 시작됐다. 이란 대표단은 이스라엘의 휴전 위반에도 불구하고 참석했으며 미국은 이란에 대한 공세 작전을 중단했지만 방어 태세는 유지 중이다.",
 tg:["휴전","외교","파키스탄","이란","미국"],u:"https://www.aljazeera.com/news/2026/4/8/us-iran-ceasefire-deal-what-are-the-terms-and-whats-next"},
{id:171,p:9,r:"속보",t:"Iran accuses US and Israel of ceasefire violations as Hormuz closure continues",k:"이란, 미·이스라엘 휴전 위반 비난…호르무즈 봉쇄 지속",s:"Gulf News",c:"me",d:"2026-04-10",
 m:"Iran accused the US of violating multiple clauses of the ceasefire deal as Israeli attacks on Lebanon continued. Iranian media reported Tehran was suspending tanker traffic through the Strait of Hormuz and considering pulling out of the agreement. Over 600 vessels remain stranded in the Middle East Gulf.",
 mk:"이란이 이스라엘의 레바논 공격이 이어지는 가운데 미국이 휴전 합의 여러 조항을 위반했다고 비난했다. 이란 매체는 테헤란이 호르무즈 해협 유조선 통행을 중단하고 합의 탈퇴를 검토 중이라고 보도했다. 걸프 지역에 600척 이상의 선박이 묶여 있다.",
 tg:["호르무즈","휴전","이란","물류위기"],u:"https://gulfnews.com/world/mena/usisrael-war-on-iran-day-40-trump-israel-agree-to-twoweek-ceasefire-iran-says-talks-start-friday-in-pakistan-1.500499565"},
{id:172,p:10,r:"헤드라인",t:"Israel launches Operation Eternal Darkness across Lebanon killing 254",k:"이스라엘, 레바논 전역 영원한 어둠 작전 개시…254명 사망",s:"Gulf News",c:"me",d:"2026-04-10",
 m:"Israel launched Operation Eternal Darkness targeting all Hezbollah command and control centers in southern Lebanon, Beirut, and the Beqaa Valley. The operation killed 254 people and injured 1,165 with 92 killed in Beirut alone. Lebanon total death toll since March 2 rose to 1,530.",
 mk:"이스라엘이 영원한 어둠 작전을 개시해 레바논 남부, 베이루트, 베카 계곡 헤즈볼라 지휘통제 시설 전체를 타격했다. 이번 작전으로 254명이 사망하고 1,165명이 부상했으며 베이루트에서만 92명이 사망했다. 3월 2일 이후 레바논 총 사망자는 1,530명에 달한다.",
 tg:["레바논","이스라엘","헤즈볼라","전쟁"],u:"https://gulfnews.com/world/mena/usisrael-war-on-iran-day-40-trump-israel-agree-to-twoweek-ceasefire-iran-says-talks-start-friday-in-pakistan-1.500499565"},
{id:173,p:9,r:"속보",t:"Netanyahu vows to continue Hezbollah strikes and seeks direct Lebanon talks",k:"네타냐후, 헤즈볼라 공격 지속 맹세…레바논과 직접 협상 희망",s:"Al Arabiya",c:"me",d:"2026-04-10",
 m:"Israeli PM Benjamin Netanyahu declared Israel would keep hitting Hezbollah wherever necessary insisting there is no ceasefire in Lebanon. He said Israel wants direct negotiations with Lebanon government on disarming Hezbollah and establishing peace but Lebanese officials said no formal invitation was received.",
 mk:"이스라엘 네타냐후 총리는 어디서든 필요하다면 헤즈볼라를 계속 공격하겠다며 레바논의 휴전은 없다고 밝혔다. 헤즈볼라 무장해제와 평화 수립을 위해 레바논 정부와 직접 협상을 원한다고 했지만 레바논 측은 공식 초청을 받지 못했다고 밝혔다.",
 tg:["레바논","이스라엘","헤즈볼라","외교"],u:"https://english.alarabiya.net/News/middle-east/2026/04/09/-israel-will-continue-to-strike-hezbollah-wherever-necessary-netanyahu-"},
{id:174,p:8,r:"",t:"World leaders call for Lebanon to be included in US-Iran ceasefire",k:"세계 지도자들, 미·이란 휴전에 레바논 포함 촉구",s:"Al Arabiya",c:"me",d:"2026-04-10",
 m:"Multiple world leaders including France FM Jean-Noel Barrot called for Lebanon to be included in the US-Iran ceasefire. The UK Foreign Secretary expressed deep concern over escalating Israeli attacks in Lebanon and said Britain strongly wanted the ceasefire extended to include Lebanon.",
 mk:"프랑스 외무장관 장노엘 바로를 비롯한 세계 지도자들이 미·이란 휴전에 레바논을 포함해야 한다고 촉구했다. 영국 외무장관도 이스라엘의 레바논 공격 확대에 우려를 표하며 영국은 레바논까지 휴전이 확대되기를 강력히 원한다고 밝혔다.",
 tg:["레바논","휴전","외교","국제사회"],u:"https://english.alarabiya.net/News/world/2026/04/09/countries-say-lebanon-sovereignty-must-be-respected"},
{id:175,p:9,r:"속보",t:"Kuwait fights off hostile drone attack amid regional conflict",k:"쿠웨이트, 역내 분쟁 속 적대적 드론 공격 격퇴",s:"Gulf News",c:"gulf",d:"2026-04-10",
 m:"Kuwait National Guard reported one of its sites was targeted by hostile drones causing material damage but no injuries. Iran Revolutionary Guard denied responsibility suggesting the attacks may have originated from Israel or the US.",
 mk:"쿠웨이트 국가수비대는 자국 시설 중 한 곳이 적대적 드론의 공격을 받아 물적 피해를 입었지만 인명 피해는 없었다고 밝혔다. 이란 혁명수비대는 책임을 부인하며 이스라엘이나 미국의 소행일 가능성을 시사했다.",
 tg:["쿠웨이트","드론","안보"],u:"https://gulfnews.com/world/us-iran-ceasefire-trump-holds-forces-near-iran-as-talks-move-to-pakistan-1.500500887"},
{id:176,p:8,r:"주요경제",t:"Over 600 vessels stranded in Middle East Gulf as Hormuz crisis deepens",k:"호르무즈 위기 심화…걸프 지역 600척 이상 선박 발이 묶여",s:"Gulf News",c:"me",d:"2026-04-10",

 tg:["호르무즈","물류","에너지","선박"],u:"https://gulfnews.com/world/mena/usisrael-war-on-iran-day-40-trump-israel-agree-to-twoweek-ceasefire-iran-says-talks-start-friday-in-pakistan-1.500499565"},
{id:177,p:8,r:"",t:"UAE air defenses have engaged 537 missiles and 2256 UAVs since conflict began",k:"UAE 방공망, 분쟁 발발 이후 미사일 537발·UAV 2256대 요격",s:"The National",c:"gulf",d:"2026-04-10",
 m:"The UAE Ministry of Defence announced that since the onset of Iranian attacks UAE air defences cumulatively engaged 537 ballistic missiles, 26 cruise missiles, and 2,256 UAVs. No new injuries were recorded on April 9.",
 mk:"UAE 국방부는 이란 공격 개시 이후 UAE 방공망이 누적으로 탄도미사일 537발, 순항미사일 26발, UAV 2,256대를 요격했다고 발표했다. 4월 9일에는 새로운 인명 피해가 없었다.",
 tg:["UAE","방위","방공망"],u:"https://www.thenationalnews.com"},
{id:178,p:9,r:"주요경제",t:"Qatar Ras Laffan LNG site may not return to full capacity for months",k:"카타르 라스라판 LNG 시설, 완전 가동 복구에 수개월 소요 전망",s:"The National",c:"gulf",d:"2026-04-10",
 m:"Qatar Ras Laffan LNG complex one of the world largest natural gas processing facilities may not be fully back online for months, compounding regional energy supply concerns from the ongoing conflict and adding to global LNG price volatility.",
 mk:"세계 최대 규모 LNG 시설 중 하나인 카타르 라스라판 단지가 완전 가동 복구에 수개월이 걸릴 것으로 예상된다. 이 사태는 분쟁으로 인한 지역 에너지 공급 차질을 더하고 글로벌 LNG 가격 변동성을 키우고 있다.",
 tg:["카타르","LNG","에너지","가스"],u:"https://www.thenationalnews.com"},
{id:179,p:7,r:"",t:"UK PM Starmer visits Gulf and urges Lebanon ceasefire inclusion",k:"영국 총리 스타머, 걸프 순방…레바논 휴전 포함 촉구",s:"Gulf News",c:"gulf",d:"2026-04-10",
 m:"UK Prime Minister Keir Starmer arrived in Qatar as part of a Gulf visit, meeting Bahrain king and crown prince to discuss regional developments. Britain called for Lebanon to be included in the ceasefire and expressed deep concern over escalating Israeli strikes.",
 mk:"영국 키어 스타머 총리가 걸프 지역 순방의 일환으로 카타르에 도착해 바레인 국왕 및 왕세자와 지역 정세를 논의했다. 영국은 레바논을 휴전에 포함시켜야 한다고 촉구하며 이스라엘의 레바논 공격 확대에 깊은 우려를 표명했다.",
 tg:["영국","외교","레바논","걸프"],u:"https://gulfnews.com/world/mena/usisrael-war-on-iran-day-40-trump-israel-agree-to-twoweek-ceasefire-iran-says-talks-start-friday-in-pakistan-1.500499565"},
{id:180,p:8,r:"",t:"Pakistan declares Islamabad public holidays ahead of US-Iran peace talks",k:"파키스탄, 미·이란 회담 앞두고 이슬라마바드 공휴일 선포",s:"Al Arabiya",c:"me",d:"2026-04-10",
 m:"Pakistan declared public holidays in Islamabad to facilitate high-level US-Iran talks under its mediation. PM Shehbaz Sharif and Gen. Asim Munir brokered the initial ceasefire based on a 10-point Iranian proposal that Trump described as a workable basis on which to negotiate.",
 mk:"파키스탄이 자국 중재하에 열리는 미·이란 고위급 회담을 앞두고 이슬라마바드 공휴일을 선포했다. 샤바즈 샤리프 총리와 아심 무니르 장군이 중재한 이란의 10개 항 제안을 트럼프 대통령이 협상 가능한 기반이라고 평가했다.",
 tg:["파키스탄","외교","미국","이란"],u:"https://english.alarabiya.net/News/middle-east/2026/04/09/pakistan-declares-islamabad-holidays-ahead-of-usiran-talks"},

{id:181,p:9,r:"심층분석",t:"[Korean view] MBS pushes for war until Iran fully weakened",k:"[한국 시각] MBC: 빈살만, 이란 완전 약화까지 전쟁 지속 주장",s:"MBC뉴스",c:"korean-view",d:"2026-04-10",

 mk:"MBC는 사우디 왕세자 빈살만이 이란이 완전히 약화될 때까지 전쟁을 계속해야 한다고 주장하며 미국의 지상 작전도 지지했다고 보도했다. 튀르키예·이집트·파키스탄이 적극 중재에 나선 가운데 빈살만은 지역 패권 경쟁자인 이란의 힘을 완전히 빼자는 의도로 분석됐다.",

{id:182,p:8,r:"주요경제",t:"[Korean view] Hormuz closure threatens South Korea energy supply chain",k:"[한국 시각] 호르무즈 봉쇄, 한국 에너지 공급망 위협",s:"오늘의클릭",c:"korean-view",d:"2026-04-10",
 m:"South Korean analysts warn Iran closure of the Strait of Hormuz threatens South Korea energy supply with approximately 1,000 South Korean vessels using the route annually. The government froze petroleum product supply prices to minimize impact but fundamental supply chain vulnerabilities remain.",
 mk:"한국 분석가들은 이란의 호르무즈 해협 봉쇄가 연간 약 1,000척의 선박이 이용하는 한국의 에너지 공급망을 위협한다고 경고했다. 정부는 물가 부담 최소화를 위해 석유제품 공급가를 동결했지만 근본적인 공급망 취약성은 여전하다.",
 tg:["에너지","호르무즈","한국경제","유가"],u:"https://www.cliktoday.com/2026/04/20260410-today-news.html"},
{id:183,p:7,r:"심층분석",t:"[Korean view] IEA chief: era of cheap energy over even after Middle East war ends",k:"[한국 시각] IEA 사무총장: 중동 전쟁 후에도 저렴한 에너지 시대는 끝났다",s:"오늘의클릭",c:"korean-view",d:"2026-04-10",
 m:"IEA Director General stated that even after the Middle East war ends the era of cheap energy is over, urging expansion of nuclear power and renewables. South Korean analysts see this as a signal to accelerate clean energy transition.",
 mk:"IEA 사무총장은 중동 전쟁이 끝나도 저렴한 에너지 시대는 끝났다고 선언하며 원전과 신재생에너지 확대를 촉구했다. 한국 전문가들은 이를 청정에너지 전환 전략 가속화의 신호로 분석했다.",
 tg:["에너지","IEA","재생에너지","한국시각"],u:"https://www.cliktoday.com/2026/04/20260410-today-news.html"},

{id:184,p:10,r:"속보",t:"Saudi oil output capacity cut 600000 bpd after Manifa and Khurais attacks",k:"사우디 마니파·쿠라이스 공격으로 하루 60만 배럴 생산 차질",s:"Bloomberg",c:"global",d:"2026-04-10",
 m:"Bloomberg reported attacks on Saudi Manifa and Khurais oil facilities cut the Kingdom crude output capacity by 600,000 barrels per day. Combined with the East-West Pipeline attack cutting 700,000 bpd, total Saudi production losses now exceed 1.3 million bpd.",
 mk:"블룸버그는 사우디 마니파·쿠라이스 석유 시설 공격으로 하루 60만 배럴 생산 능력이 감소했다고 보도했다. 동서 파이프라인 피해로 인한 70만 배럴 손실까지 합하면 사우디 총 생산 손실은 하루 130만 배럴을 넘어선다.",
 tg:["원유","에너지","블룸버그","생산차질"],u:"https://www.bloomberg.com/news/articles/2026-04-09/saudi-oil-output-capacity-cut-600-000-barrels-a-day-in-attacks"},
{id:185,p:10,r:"속보",t:"Saudi Arabia crucial East-West Pipeline hit by drone attack",k:"사우디 핵심 동서 파이프라인, 드론 공격으로 타격",s:"Bloomberg",c:"global",d:"2026-04-10",
 m:"Saudi Arabia East-West Pipeline, a crucial oil artery connecting oil fields to Red Sea export terminals, was struck in a drone attack cutting throughput by approximately 700,000 barrels per day. The attack occurred shortly after the US-Iran ceasefire announcement raising questions about the deal durability.",
 mk:"사우디의 핵심 원유 수송로인 동서 파이프라인이 드론 공격을 받아 하루 약 70만 배럴의 공급이 차질을 빚었다. 이 공격은 미·이란 휴전 발표 직후 발생해 합의의 지속 가능성에 심각한 의문을 제기하고 있다.",
 tg:["사우디","파이프라인","드론","에너지"],u:"https://www.bloomberg.com/news/articles/2026-04-08/saudi-arabia-s-crucial-east-west-pipeline-hit-by-drone-attack"},
{id:186,p:8,r:"심층분석",t:"Saudi Arabia intensifies direct channel to Iran to help defuse regional war",k:"사우디, 이란과 직접 채널 강화…지역 전쟁 진화 나서",s:"Bloomberg",c:"global",d:"2026-04-10",
 m:"Bloomberg reported citing European officials that Saudi Arabia has intensified its direct engagement with Iran to help contain the regional war. This channel has become increasingly important as the fragile US-Iran ceasefire came under strain from Israeli operations in Lebanon.",
 mk:"블룸버그는 유럽 당국자들을 인용해 사우디아라비아가 지역 전쟁 억제를 위해 이란과의 직접 채널을 강화했다고 보도했다. 미·이란 휴전이 레바논 내 이스라엘 작전으로 흔들리면서 이 채널의 중요성이 더욱 커지고 있다.",
 tg:["사우디","이란","외교","채널"],u:"https://www.bloomberg.com/middleeast"},
{id:187,p:9,r:"주요경제",t:"Saudi Arabia raises oil price to record premium as Hormuz closure disrupts markets",k:"사우디, 호르무즈 봉쇄 속 석유 가격 사상 최고 프리미엄으로 인상",s:"Bloomberg",c:"global",d:"2026-04-10",
 m:"Saudi Arabia raised the price of its main oil grade for Asian buyers to a record high premium as Middle East conflict and Iran near-closure of the Strait of Hormuz disrupted global energy markets. Oil prices surged above $97 a barrel amid ceasefire skepticism.",
 mk:"사우디아라비아가 중동 분쟁과 이란의 호르무즈 해협 봉쇄로 글로벌 에너지 시장이 흔들리는 가운데 아시아 구매자향 원유 가격을 사상 최고 프리미엄 수준으로 인상했다. 휴전 회의론 속에 유가는 배럴당 97달러를 돌파했다.",
 tg:["원유","유가","에너지시장","호르무즈"],u:"https://www.bloomberg.com/news/articles/2026-04-06/saudis-raise-oil-price-to-record-premium-as-war-riles-markets"},
{id:188,p:7,r:"심층분석",t:"Iran ceasefire: Not an off-ramp for the US but a life-saving ejection seat",k:"이란 휴전: 미국의 출구 전략 아닌 생존을 위한 탈출",s:"Al Jazeera",c:"global",d:"2026-04-10",
 m:"Al Jazeera analysis argues the US-Iran ceasefire is not a planned diplomatic off-ramp but a life-saving ejection seat triggered by Iran unexpectedly fierce response to US-Israeli strikes. The piece questions whether the fragile truce can survive ongoing Israeli operations in Lebanon.",
 mk:"알자지라 분석은 미·이란 휴전이 계획된 외교적 출구가 아니라 이란의 예상외로 강렬한 반격에 의해 촉발된 생존용 탈출이라고 주장했다. 레바논 내 이스라엘 작전이 이어지는 가운데 이 불안한 휴전이 지속될 수 있을지에 의문을 제기했다.",
 tg:["이란","휴전","분석","미국"],u:"https://www.aljazeera.com/opinions/2026/4/10/iran-ceasefire-not-an-off-ramp-for-the-us-but-a-life-saving-ejection-seat"},

 tg:["외교","영국","스타머","MBS"],u:"https://www.arabnews.com/node/2639238/saudi-arabia"},
{id:191,p:9,r:"속보",t:"Saudi Arabia stops ballistic missiles aimed at Prince Sultan Air Base",k:"사우디, 프린스 술탄 공군기지 겨냥 탄도미사일 요격",s:"Arab News",c:"saudi",d:"2026-04-11",
 m:"Saudi air defenses intercepted multiple ballistic missiles targeting the Prince Sultan Air Base, which hosts US forces, as Iran-linked attacks continued despite the ceasefire. No casualties were reported and the base remained operational.",

 tg:["방공","탄도미사일","프린스술탄","미군"],u:"https://www.arabnews.com/node/2636009/saudi-arabia"},
{id:192,p:8,r:"",t:"Shipping shocks boost Saudi brands as retail grows",k:"해운 충격 속 사우디 브랜드 부상…소매시장 성장",s:"Arab News",c:"saudi",d:"2026-04-11",
 m:"Supply chain disruptions from the regional conflict are accelerating the rise of domestic Saudi brands in retail. With imports delayed and freight costs soaring, local producers are capturing market share in food, apparel and household goods.",

 tg:["소매","브랜드","공급망","해운"],u:"https://www.arabnews.com/saudiarabia"},

 tg:["문화유산","나즈란","고고학"],u:"https://www.arabnews.com/saudiarabia"},
{id:194,p:9,r:"속보",t:"SPA: Operations halted at several Saudi energy facilities after recent attacks",k:"SPA: 최근 공격으로 사우디 주요 에너지 시설 가동 중단",s:"SPA",c:"saudi",d:"2026-04-11",
 m:"The Saudi Press Agency, citing an official at the Ministry of Energy, confirmed that recent attacks have halted operations at several energy facilities including SATORP in Jubail, Ras Tanura refinery, SAMREF in Yanbu and the Riyadh refinery, slowing recovery efforts and adding to market tightness.",
 mk:"사우디 공식 통신사 SPA는 에너지부 관계자를 인용해 최근 공격으로 주바일 SATORP, 라스타누라 정유공장, 얀부 SAMREF, 리야드 정유공장 등 주요 에너지 시설의 가동이 중단됐으며, 복구 작업 속도가 느려지고 시장 긴장이 가중되고 있다고 확인했다.",
 tg:["에너지","정유","SATORP","피해"],u:"https://www.spa.gov.sa/en"},
{id:195,p:9,r:"주요경제",t:"SPA confirms 700,000 bpd cut on East-West pipeline and 600,000 bpd production loss",k:"SPA, 동서 파이프라인 하루 70만 배럴·생산 60만 배럴 감소 확인",s:"SPA",c:"saudi",d:"2026-04-11",
 m:"SPA reported that attacks on Manifa and Khurais oilfields and the East-West pipeline cut Saudi Arabia oil output capacity by about 600,000 barrels per day and pipeline throughput by roughly 700,000 bpd, a Ministry of Energy source said.",
 mk:"SPA는 마니파·쿠라이스 유전과 동서(East-West) 파이프라인 공격으로 사우디 원유 생산능력이 하루 약 60만 배럴, 파이프라인 처리량이 하루 약 70만 배럴 감소했다고 에너지부 관계자를 인용해 보도했다.",
 tg:["원유","파이프라인","마니파","쿠라이스"],u:"https://www.spa.gov.sa/en"},

 tg:["외교","외무장관","레바논","이란"],u:"https://www.spa.gov.sa/en"},
{id:197,p:8,r:"헤드라인",t:"Saudi Gazette: MBS and Starmer review bilateral ties and Hormuz reopening",k:"Saudi Gazette: MBS·스타머, 양국 관계·호르무즈 재개방 논의",s:"Saudi Gazette",c:"saudi",d:"2026-04-11",

 tg:["TASI","증시","주간","시장심리"],u:"https://www.argaam.com/en"},
{id:200,p:5,r:"",t:"Argaam: Jadwa REIT reports SAR 680M proceeds from fund exit",k:"Argaam: 자드와 리츠, 펀드 청산 수익 6억 8천만 리얄",s:"Argaam",c:"saudi",d:"2026-04-11",
 m:"Argaam said Jadwa REIT Saudi announced that proceeds from the exit of one of its underlying funds reached SAR 680 million, a notable boost to unit holders amid wartime market volatility.",
 mk:"Argaam은 자드와 사우디 리츠가 기초 펀드 중 하나의 청산으로 6억 8천만 리얄의 수익을 확보했다고 발표했다고 전했다. 전시 시장 변동성 속에서 투자자에게 의미 있는 분배 재원이 됐다.",
 tg:["리츠","자드와","청산","수익"],u:"https://www.argaam.com/en"},
{id:201,p:5,r:"",t:"Argaam: Elm awarded SAR 12M HR outsourcing contract from IHR",k:"Argaam: 엘름, IHR로부터 1,200만 리얄 규모 인사 아웃소싱 수주",s:"Argaam",c:"saudi",d:"2026-04-11",
 m:"Argaam reported that Saudi digital services company Elm has been awarded a SAR 12 million human resources outsourcing contract from IHR, adding to its fast-growing government and enterprise services backlog.",
 mk:"Argaam은 사우디 디지털 서비스 기업 엘름이 IHR로부터 1,200만 리얄 규모의 인사(HR) 아웃소싱 계약을 수주했다고 보도했다. 정부·기업 서비스 수주 잔고가 빠르게 확대되고 있다.",

{id:203,p:7,r:"",t:"Asharq Al-Awsat: MBS-Starmer summit positions Saudi Arabia as pivotal mediator",k:"Asharq Al-Awsat: MBS·스타머 정상회담, 사우디를 핵심 중재자로 부각",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-11",
 m:"Asharq Al-Awsat analysis argued that the Jeddah summit between MBS and Keir Starmer cemented Saudi Arabia as a pivotal mediator between Tehran, Washington and Europe, noting Riyadh backchannel to Iran and its influence over Hormuz shipping diplomacy.",
 mk:"아샤르크 알아우사트는 심층분석에서 제다 정상회담이 사우디아라비아를 테헤란·워싱턴·유럽 사이의 핵심 중재자로 자리매김시켰다고 평가했다. 이란과의 비공식 채널과 호르무즈 해운 외교 영향력이 근거로 제시됐다.",

{id:204,p:9,r:"속보",t:"Al Arabiya: ADNOC chief says Strait of Hormuz not open as Iran controls access",k:"알아라비야: ADNOC 사장 &quot;이란 통제로 호르무즈 해협 여전히 폐쇄&quot;",s:"Al Arabiya",c:"gulf",d:"2026-04-11",
 m:"ADNOC Group CEO Sultan Al Jaber said in a statement the Strait of Hormuz is not open and access is being restricted, conditioned and controlled by Iran. He said around 230 loaded oil vessels are waiting to sail and warned every day of restricted passage deepens global energy disruption.",
 mk:"ADNOC 그룹 CEO 술탄 알자베르는 성명에서 호르무즈 해협이 열리지 않았으며, 접근이 이란에 의해 제한·조건부·통제되고 있다고 밝혔다. 약 230척의 만재 유조선이 출항하지 못하고 대기 중이며, 통과 제한이 하루라도 길어질수록 글로벌 에너지 공급 차질이 심화된다고 경고했다.",
 tg:["ADNOC","호르무즈","이란","유조선"],u:"https://english.alarabiya.net/News/gulf"},
{id:205,p:8,r:"",t:"Al Arabiya: MBS welcomes UK PM Starmer to Jeddah for Gulf consultations",k:"알아라비야: MBS, 제다에서 영국 총리 스타머 영접",s:"Al Arabiya",c:"gulf",d:"2026-04-11",
 m:"Al Arabiya reported that Crown Prince Mohammed bin Salman welcomed UK PM Keir Starmer to Jeddah for the first stop of his Gulf tour, with the two sides discussing strategic cooperation, ceasefire consolidation and efforts to reopen Hormuz.",
 mk:"알아라비야는 무함마드 빈 살만 왕세자가 걸프 순방 첫 방문지로 제다를 찾은 키어 스타머 영국 총리를 영접했다고 보도했다. 양측은 전략적 협력, 휴전 공고화, 호르무즈 재개방 방안을 논의했다.",
 tg:["MBS","스타머","제다","외교"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/09/saudi-crown-prince-mbs-welcomes-uk-pm-starmer"},
{id:206,p:8,r:"",t:"Gulf News: 230 loaded oil tankers stranded as Hormuz crisis drags on",k:"걸프뉴스: 호르무즈 사태 장기화…만재 유조선 230척 발이 묶여",s:"Gulf News",c:"gulf",d:"2026-04-11",
 m:"Gulf News reported that some 230 loaded oil tankers are stranded in the Gulf unable to transit Hormuz, with shipping analysts warning that routine transit is unlikely to resume for the remainder of 2026 unless a durable political settlement is reached.",
 mk:"걸프뉴스는 만재 유조선 약 230척이 호르무즈 해협을 통과하지 못한 채 걸프 지역에 발이 묶여 있다고 보도했다. 해운 애널리스트들은 지속 가능한 정치적 해법이 없으면 2026년 잔여 기간 내 정상 통항 재개가 어렵다고 경고했다.",
 tg:["호르무즈","유조선","해운","차단"],u:"https://gulfnews.com/"},
{id:207,p:7,r:"",t:"The National: UAE Habshan gas fire contained after Iran-linked strike",k:"더 내셔널: 이란발 공격 UAE 합샨 가스시설 화재 진압 완료",s:"The National",c:"gulf",d:"2026-04-11",

 tg:["UAE","ADNOC","합샨","가스"],u:"https://www.thenationalnews.com/"},
{id:208,p:10,r:"헤드라인",t:"Al Jazeera: US-Iran direct talks begin in Islamabad despite disagreements",k:"알자지라: 이견 속 미·이란 직접 협상 이슬라마바드에서 개막",s:"Al Jazeera",c:"me",d:"2026-04-11",
 m:"Al Jazeera live coverage confirmed that direct US-Iran negotiations kicked off on Saturday afternoon in Islamabad, with Pakistan PM Shehbaz Sharif hosting separate bilaterals. Sources say proximity talks quickly turned into direct engagement.",

 tg:["미국","이란","이슬라마바드","협상"],u:"https://www.aljazeera.com/news/2026/4/11/us-iran-talks-on-ending-war-begin-in-pakistan"},
{id:209,p:8,r:"심층분석",t:"Al Jazeera: Israel-Lebanon tensions threaten to unravel Iran ceasefire",k:"알자지라: 이스라엘-레바논 긴장, 이란 휴전 위협",s:"Al Jazeera",c:"me",d:"2026-04-11",
 m:"Al Jazeera analysis said escalating Israeli strikes in Lebanon and Hezbollah rejection of direct talks without a truce are threatening to unravel the fragile US-Iran ceasefire just days after it was agreed, with Beirut hospitals overwhelmed by casualties.",
 mk:"알자지라는 심층분석에서 레바논 내 이스라엘의 공습 격화와 헤즈볼라의 휴전 없는 직접 협상 거부로 불과 며칠 전 체결된 미·이란 휴전이 위태로워지고 있다고 진단했다. 베이루트 병원들은 사상자 급증으로 포화 상태다.",

{id:210,p:7,r:"",t:"Jerusalem Post: Netanyahu authorizes direct negotiations with Lebanon",k:"예루살렘포스트: 네타냐후, 레바논과의 직접 협상 승인",s:"Jerusalem Post",c:"me",d:"2026-04-11",
 m:"The Jerusalem Post reported that PM Benjamin Netanyahu authorized direct negotiations with Lebanon aimed at disarming Hezbollah and establishing peaceful ties, though Israel insists strikes will continue until northern Israel security is restored.",
 mk:"예루살렘포스트는 베냐민 네타냐후 이스라엘 총리가 헤즈볼라 무장해제와 평화관계 수립을 목표로 레바논과의 직접 협상을 승인했다고 보도했다. 다만 이스라엘은 북부 지역 안보 회복 시까지 공습을 계속하겠다는 입장이다.",

{id:211,p:9,r:"주요경제",t:"Bloomberg: Saudi Arabia hikes Asia crude OSP to record $19.50 premium for May",k:"블룸버그: 사우디, 5월 아시아향 원유 프리미엄 사상 최고 19.5달러로 인상",s:"Bloomberg",c:"western",d:"2026-04-11",

 tg:["아람코","OSP","원유가격","아시아"],u:"https://www.bloomberg.com/"},
{id:212,p:8,r:"주요경제",t:"Reuters: Aramco asks customers to nominate May loadings from Yanbu and Ras Tanura",k:"로이터: 아람코, 5월 선적지로 얀부·라스타누라 양쪽 노미네이션 요청",s:"Reuters",c:"western",d:"2026-04-11",
 m:"Reuters reported that Saudi Aramco has asked customers to submit nominations for May liftings from both Yanbu on the Red Sea and Ras Tanura in the Gulf, suggesting Riyadh is preparing for scenarios where Hormuz remains only partially accessible.",
 mk:"로이터는 사우디 아람코가 고객사에 5월 선적분을 홍해의 얀부와 걸프의 라스타누라 양쪽 항구에서 노미네이션하도록 요청했다고 보도했다. 리야드가 호르무즈 해협의 부분 개방 시나리오에 대비하고 있다는 신호다.",

{id:214,p:8,r:"헤드라인",t:"CNN: How Pakistan became an unlikely bridge between the US and Iran",k:"CNN: 파키스탄, 미·이란 사이 예상 밖 가교로 부상",s:"CNN",c:"western",d:"2026-04-11",
 m:"CNN analysis examined how Pakistan emerged as an unlikely but pivotal mediator between Washington and Tehran, citing PM Shehbaz Sharif, FM Ishaq Dar and army chief Asim Munir facilitation of the Islamabad Talks and Pakistan own stake in ending the oil crisis.",
 mk:"CNN은 심층분석을 통해 파키스탄이 워싱턴과 테헤란 사이에서 예상 밖이지만 핵심적인 중재자로 부상한 과정을 조명했다. 셰바즈 샤리프 총리, 이사크 다르 외무장관, 아심 무니르 육군참모총장이 이슬라마바드 협상을 주선했으며, 파키스탄 자체의 석유 위기 해소 이해관계도 배경으로 꼽힌다.",
 tg:["파키스탄","중재","이슬라마바드","분석"],u:"https://www.cnn.com/2026/04/09/asia/pakistan-islamabad-talks-us-iran-ceasefire-intl-hnk"},
{id:215,p:7,r:"",t:"NPR: Lebanon fighting throws doubt on US-Israel ceasefire with Iran",k:"NPR: 레바논 교전 격화, 미·이스라엘-이란 휴전 신뢰성 흔들어",s:"NPR",c:"western",d:"2026-04-11",

{id:216,p:7,r:"",t:"Washington Post: Netanyahu approves Lebanon talks after Israeli strikes imperil ceasefire",k:"워싱턴포스트: 이스라엘 공습이 휴전 위협…네타냐후, 레바논 협상 승인",s:"WaPo",c:"western",d:"2026-04-11",

{id:217,p:6,r:"심층분석",t:"CNN Politics: A teetering ceasefire bodes ill for treacherous US-Iran talks",k:"CNN 정치: 흔들리는 휴전, 험난한 미·이란 협상 예고",s:"CNN",c:"western",d:"2026-04-11",

{id:229,p:8,r:"헤드라인",t:"Italian PM Meloni meets Crown Prince on Saudi visit for energy security talks",k:"이탈리아 멜로니 총리, 에너지 안보 논의 위해 사우디 방문·왕세자 면담",s:"Arab News",c:"saudi",d:"2026-04-03",m:"Italian PM Giorgia Meloni met Crown Prince MBS in Jeddah as the first NATO and EU leader to visit the Gulf since the start of the Iran war, focusing on energy supply security and defense cooperation.",mk:"이탈리아 멜로니 총리가 이란 전쟁 이후 첫 NATO·EU 지도자로 걸프를 방문, 제다에서 MBS 왕세자와 에너지 공급 안보·방위 협력을 논의했다.",tg:["외교","이탈리아","에너지"],u:"https://www.arabnews.com/node/2638685/saudi-arabia"},
{id:230,p:7,r:"심층분석",t:"How does Saudi Arabia maintain price stability despite the war?",k:"사우디, 전쟁 속에서 어떻게 물가 안정을 유지하는가?",s:"Arab News",c:"saudi",d:"2026-04-10",m:"Analysis examines Saudi Arabia&apos;s success in maintaining domestic price stability through strategic reserves, subsidies, and redirecting oil exports westward amid the Iran war disruptions.",mk:"이란 전쟁 혼란 속에서 전략 비축, 보조금, 석유 수출 서향 전환을 통해 국내 물가 안정에 성공한 사우디의 전략을 분석한다.",tg:["경제","물가","전략"],u:"https://www.arabnews.com/node/2639064/business-economy"},
{id:231,p:7,r:"",t:"Pakistan deploys air force contingent to Saudi base under defense pact",k:"파키스탄, 방위 협정에 따라 사우디 기지에 공군 파견",s:"Arab News",c:"saudi",d:"2026-04-12",m:"A Pakistani air force contingent including fighter jets arrived at a Saudi base under the Strategic Mutual Defence Agreement, deepening military ties between the two countries.",mk:"전략적 상호방위협정에 따라 전투기를 포함한 파키스탄 공군 부대가 사우디 기지에 도착하며 양국 군사 관계가 심화됐다.",tg:["방위","파키스탄","공군"],u:"https://www.arabnews.com/node/2639539/pakistan"},
{id:232,p:7,r:"주요경제",t:"Riyad Capital sees Saudi economy up 4.3% in 2026 despite war disruptions",k:"리야드캐피탈, 전쟁 혼란에도 2026년 사우디 경제 4.3% 성장 전망",s:"Argaam",c:"saudi",d:"2026-04-10",m:"Riyad Capital projected Saudi GDP growth of 4.3% in 2026, with oil sector up 6.2% and non-oil at 4.3%, though fiscal deficit may widen to 4.3% of GDP.",mk:"리야드캐피탈은 2026년 사우디 GDP 4.3% 성장을 전망하며, 석유 부문 6.2%, 비석유 4.3% 성장하나 재정적자가 GDP의 4.3%로 확대될 수 있다고 분석했다.",tg:["경제","GDP","전망"],u:"https://www.argaam.com/en/article/articledetail/id/1883272"},
{id:233,p:7,r:"주요경제",t:"SNB Capital: Saudi market well positioned for strong performance in 2026",k:"SNB캐피탈: 사우디 시장, 2026년 강한 성과 기대",s:"Argaam",c:"saudi",d:"2026-04-09",m:"SNB Capital expects the Saudi economy to grow 4.7% in 2026, with oil GDP up 8% and non-oil 4%, reinforced by Vision 2030 third phase and attractive valuations.",mk:"SNB캐피탈은 비전2030 3단계와 매력적 밸류에이션에 힘입어 2026년 사우디 경제 4.7% 성장을 전망하며, 석유 GDP 8%, 비석유 4% 증가를 예상했다.",tg:["경제","시장","비전2030"],u:"https://www.argaam.com/en/article/articledetail/id/1872101"},
{id:234,p:6,r:"",t:"FIFA selects Saudi refereeing crew for 2026 World Cup",k:"FIFA, 사우디 심판진 2026 월드컵 선정",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-11",m:"Asharq Al-Awsat reported FIFA&apos;s selection of three Saudi match officials for the 2026 World Cup, marking a milestone for Saudi football officiating.",mk:"아샤르끄 알아우삿은 FIFA의 사우디 심판 3명 2026 월드컵 선정 소식을 보도하며, 사우디 축구 심판계의 이정표라고 전했다.",tg:["스포츠","월드컵"],u:"https://english.aawsat.com/sports/5260777"},
{id:235,p:8,r:"정책발표",t:"Makkah international airport wins approval, metro plan moves ahead",k:"메카 국제공항 승인, 메트로 계획 추진",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-10",m:"Saudi Arabia approved the construction of Makkah International Airport and advanced metro feasibility studies, aiming to transform pilgrim access and reduce reliance on Jeddah airport.",mk:"사우디는 메카 국제공항 건설을 승인하고 메트로 타당성 조사를 진전시켜 순례자 접근성 향상과 제다 공항 의존도 축소를 목표로 한다.",tg:["인프라","메카","비전2030"],u:"https://english.aawsat.com/"},
{id:236,p:5,r:"",t:"Saudi Arabia reports heavy rain and dust storms disrupting classes in multiple regions",k:"사우디, 폭우·모래폭풍으로 여러 지역 수업 중단",s:"SPA",c:"saudi",d:"2026-04-12",m:"Heavy rains and dust storms disrupted school classes across several Saudi provinces, with authorities issuing weather warnings for the coming days.",mk:"폭우와 모래폭풍으로 사우디 여러 주에서 학교 수업이 중단됐으며, 당국은 향후 며칠간 기상 경보를 발령했다.",tg:["날씨","교육"],u:"https://www.spa.gov.sa/en"},
{id:237,p:10,r:"속보",t:"US-Iran direct talks on ending war under way in Pakistan",k:"미국-이란, 파키스탄서 종전 직접 협상 개시",s:"Al Jazeera",c:"me",d:"2026-04-11",m:"US VP Vance and Iran&apos;s delegation began historic face-to-face peace talks in Islamabad, the first direct high-level meeting since the 1979 revolution, mediated by Pakistan.",mk:"밴스 미국 부통령과 이란 대표단이 1979년 혁명 이후 최초의 직접 고위급 회담을 파키스탄 중재 아래 이슬라마바드에서 시작했다.",tg:["미국","이란","협상","파키스탄"],u:"https://www.aljazeera.com/news/2026/4/11/us-iran-talks-on-ending-war-begin-in-pakistan"},
{id:238,p:10,r:"속보",t:"Vance leaves Islamabad without deal as US-Iran talks collapse",k:"밴스, 미-이란 협상 결렬로 합의 없이 이슬라마바드 떠나",s:"Al Jazeera",c:"me",d:"2026-04-12",m:"VP Vance announced the US and Iran failed to reach an agreement after a day of talks, citing Iran&apos;s refusal to commit to abandoning its nuclear weapons program as the key sticking point.",mk:"밴스 부통령은 하루간의 협상 끝에 미국과 이란이 합의에 실패했다고 발표하며, 이란의 핵무기 포기 약속 거부가 핵심 쟁점이었다고 밝혔다.",tg:["미국","이란","핵","협상결렬"],u:"https://www.aljazeera.com/news/liveblog/2026/4/11/iran-war-live-us-negotiators-due-to-arrive-in-pakistan-for-ceasefire-talks"},
{id:239,p:9,r:"속보",t:"UAE intercepts 17 ballistic missiles and 35 drones after ceasefire",k:"UAE, 휴전 후 탄도미사일 17발·드론 35대 요격",s:"The National",c:"gulf",d:"2026-04-08",m:"UAE armed forces intercepted 17 ballistic missiles and 35 drones launched by Iran within 24 hours of the ceasefire, with debris causing fires at the Habshan gas complex.",mk:"UAE 군은 휴전 발효 24시간 내 이란이 발사한 탄도미사일 17발과 드론 35대를 요격했으며, 잔해로 하브샨 가스 단지에서 화재가 발생했다.",tg:["UAE","안보","미사일"],u:"https://www.thenationalnews.com/news/uae/2026/04/08/uae-intercepts-17-ballistic-missiles-and-35-drones-in-wednesdays-figures/"},
{id:240,p:9,r:"헤드라인",t:"Saudi output capacity cut by 600,000 barrels a day due to Iran war",k:"이란 전쟁으로 사우디 석유 생산능력 일일 60만 배럴 감소",s:"The National",c:"gulf",d:"2026-04-09",m:"Iran war attacks cut Saudi oil production capacity by 600,000 bpd, with Manifa and Khurais fields each losing 300,000 bpd and East-West pipeline throughput reduced by 700,000 bpd.",mk:"이란 전쟁 공격으로 사우디 석유 생산능력이 일일 60만 배럴 감소했으며, 마니파·쿠라이스 유전 각 30만 배럴, 동서 파이프라인 처리량 70만 배럴이 줄었다.",tg:["석유","에너지","전쟁피해"],u:"https://www.thenationalnews.com/business/energy/2026/04/09/saudi-output-capacity-cut-by-600000-barrels-a-day-due-to-iran-war/"},
{id:241,p:8,r:"헤드라인",t:"8 April Lebanon attacks: Israel strikes kill at least 357 on &apos;Black Wednesday&apos;",k:"4월 8일 레바논 공격: 이스라엘 &apos;블랙 수요일&apos; 공습으로 최소 357명 사망",s:"Al Jazeera",c:"me",d:"2026-04-08",m:"Hours after the Iran-US ceasefire was announced, Israel launched massive strikes across Lebanon killing at least 357 people, in what Lebanon called &apos;Black Wednesday.&apos;",mk:"이란-미국 휴전 발표 수시간 후 이스라엘이 레바논 전역에 대규모 공습을 감행해 최소 357명이 사망했으며, 레바논은 이를 &apos;블랙 수요일&apos;이라 불렀다.",tg:["이스라엘","레바논","공습"],u:"https://en.wikipedia.org/wiki/8_April_2026_Lebanon_attacks"},
{id:242,p:8,r:"",t:"Netanyahu says no ceasefire in Lebanon, instructs cabinet for direct negotiations",k:"네타냐후, 레바논 휴전 부인…내각에 직접 협상 지시",s:"Al Arabiya",c:"me",d:"2026-04-09",m:"Israeli PM Netanyahu said there is no ceasefire with Lebanon, while instructing his cabinet to pursue direct negotiations focused on Hezbollah disarmament and peaceful relations.",mk:"이스라엘 네타냐후 총리는 레바논과의 휴전을 부인하면서도, 내각에 헤즈볼라 무장 해제와 평화 관계를 위한 직접 협상을 추진하라고 지시했다.",tg:["이스라엘","레바논","헤즈볼라"],u:"https://english.alarabiya.net"},
{id:243,p:8,r:"주요경제",t:"Three oil supertankers sail through Strait of Hormuz in first major transit since ceasefire",k:"휴전 후 첫 대규모 통과: 초대형 유조선 3척 호르무즈 해협 항행",s:"Al Arabiya",c:"gulf",d:"2026-04-11",m:"Two Chinese and one Greek supertanker sailed through the Strait of Hormuz, marking a significant uptick in oil shipping despite Iran still restricting and charging transit fees.",mk:"중국 초대형 유조선 2척과 그리스 유조선 1척이 호르무즈 해협을 통과했으나, 이란은 여전히 통행을 제한하고 통행료를 부과하고 있다.",tg:["호르무즈","석유","해운"],u:"https://fortune.com/2026/04/11/oil-supertankers-strait-of-hormuz-crossing-us-iran-talks/"},
{id:244,p:7,r:"심층분석",t:"Gulf economies suffer brunt of Iran war as recession risk looms",k:"걸프 경제, 이란 전쟁 직격탄…경기침체 위험 고조",s:"Al Jazeera",c:"gulf",d:"2026-04-10",m:"Goldman Sachs warned Qatar and Kuwait could see GDP plunge 14% if war lasts through April, with UAE and Saudi facing 5% and 3% contractions respectively.",mk:"골드만삭스는 전쟁이 4월까지 지속되면 카타르·쿠웨이트 GDP가 14% 급락하고, UAE와 사우디는 각각 5%, 3% 위축될 수 있다고 경고했다.",tg:["경제","경기침체","GCC"],u:"https://www.aljazeera.com/economy/2026/3/17/gulf-economies-suffer-brunt-of-iran-war-as-recession-risk-looms"},
{id:245,p:7,r:"",t:"GCC single tourist visa expected to launch in 2026",k:"GCC 단일 관광 비자, 2026년 출시 예정",s:"Gulf News",c:"gulf",d:"2026-04-10",m:"A single GCC tourist visa allowing travel across all six Gulf countries is expected to launch in 2026, covering UAE, Saudi Arabia, Oman, Qatar, Kuwait and Bahrain.",mk:"UAE, 사우디, 오만, 카타르, 쿠웨이트, 바레인 등 GCC 6개국 여행이 가능한 단일 관광 비자가 2026년 출시될 예정이다.",tg:["관광","GCC","비자"],u:"https://gulfnews.com/"},
{id:246,p:7,r:"",t:"IMF chief warns Iran war could lead to higher interest rates globally",k:"IMF 총재, 이란 전쟁이 글로벌 금리 인상 초래할 수 있다고 경고",s:"The National",c:"gulf",d:"2026-04-09",m:"The IMF Managing Director warned that prolonged conflict in the Middle East could push global interest rates higher, disrupting the expected easing cycle.",mk:"IMF 총재는 중동 분쟁 장기화가 글로벌 금리를 끌어올려 예상된 금리 인하 사이클을 저해할 수 있다고 경고했다.",tg:["IMF","금리","글로벌경제"],u:"https://www.thenationalnews.com/business/economy/2026/04/09/imf-chief-warns-iran-war-could-lead-to-higher-interest-rates/"},
{id:247,p:10,r:"속보",t:"Iran war ceasefire: Trump backtrack eases fears over Strait of Hormuz",k:"이란 전쟁 휴전: 트럼프 입장 변경으로 호르무즈 우려 완화",s:"Bloomberg",c:"global",d:"2026-04-08",m:"The US and Iran agreed to a two-week ceasefire mediated by Pakistan, with Iran committing to reopen the Strait of Hormuz, averting Trump&apos;s threatened escalation.",mk:"파키스탄 중재로 미국과 이란이 2주 휴전에 합의했으며, 이란은 호르무즈 해협 재개방을 약속해 트럼프의 확전 위협을 피했다.",tg:["휴전","호르무즈","트럼프"],u:"https://www.bloomberg.com/news/articles/2026-04-08/us-and-iran-agree-to-ceasefire-easing-fears-of-energy-crisis"},
{id:248,p:9,r:"주요경제",t:"Saudi oil output capacity cut 600,000 barrels a day in Iran war attacks",k:"이란 전쟁 공격으로 사우디 석유 생산능력 일 60만 배럴 감소",s:"Bloomberg",c:"global",d:"2026-04-09",m:"Bloomberg reported Saudi production capacity was reduced by 600,000 bpd after attacks hit Manifa, Khurais oilfields and the East-West pipeline, equivalent to 10% of pre-conflict exports.",mk:"블룸버그는 마니파·쿠라이스 유전과 동서 파이프라인 피격으로 사우디 생산능력이 전쟁 전 수출의 10%인 일 60만 배럴 줄었다고 보도했다.",tg:["석유","블룸버그","피해"],u:"https://www.bloomberg.com/news/articles/2026-04-09/saudi-oil-output-capacity-cut-600-000-barrels-a-day-in-attacks"},
{id:249,p:9,r:"속보",t:"Pakistan sends military force to Saudi Arabia as part of defense pact",k:"파키스탄, 방위 협정에 따라 사우디에 군사력 파견",s:"Bloomberg",c:"global",d:"2026-04-11",m:"Pakistan deployed fighter jets and military personnel to Saudi Arabia under the 2025 Strategic Mutual Defence Agreement, amid heightened regional tensions from Iran strikes.",mk:"파키스탄은 이란 공격으로 지역 긴장이 고조된 가운데, 2025년 전략적 상호방위협정에 따라 전투기와 군인을 사우디에 파견했다.",tg:["방위","파키스탄","블룸버그"],u:"https://www.bloomberg.com/news/articles/2026-04-11/pakistan-sends-military-force-to-saudi-arabia-as-part-of-pact"},
{id:250,p:8,r:"주요경제",t:"WSJ: Saudi Arabia&apos;s damage from US war against Iran exceeds $10 billion",k:"WSJ: 미국의 이란 전쟁으로 사우디 피해 100억 달러 초과",s:"WSJ",c:"global",d:"2026-04-10",m:"The Wall Street Journal reported Saudi financial losses from the Iran war exceed $10 billion due to shipping restrictions, military damage, and cancellation of events like the Formula 1 race.",mk:"월스트리트저널은 해운 제한, 군사적 피해, F1 등 행사 취소로 사우디의 이란 전쟁 관련 재정 손실이 100억 달러를 초과했다고 보도했다.",tg:["경제","피해","WSJ"],u:"https://www.islamtimes.com/en/news/1273170/wsj-saudi-arabia-s-damage-from-us-war-against-iran-exceeds-10bln"},
{id:252,p:7,r:"",t:"2,000 ships stranded in Persian Gulf as Strait of Hormuz remains restricted",k:"호르무즈 해협 통행 제한 지속…페르시아만에 2,000척 발묶여",s:"CNN",c:"global",d:"2026-04-09",m:"Despite ceasefire, the IMO estimates 2,000 ships including tankers and cargo vessels remain stranded in the Persian Gulf, with Iran still charging up to $2 million per tanker transit.",mk:"휴전에도 불구하고 IMO는 유조선·화물선 등 2,000척이 페르시아만에 발이 묶여 있으며, 이란은 유조선당 최대 200만 달러의 통행료를 부과하고 있다고 추정했다.",tg:["해운","호르무즈","IMO"],u:"https://www.cnn.com/2026/04/09/business/shipping-vessels-oil-ceasefire-strait-of-hormuz"},
{id:253,p:7,r:"",t:"Gold surges toward $4,700 as Middle East tensions ignite flight to safety",k:"중동 긴장에 금값 4,700달러 돌파…안전자산 선호 급증",s:"Reuters",c:"global",d:"2026-04-09",m:"Spot gold reached $4,743.50 an ounce amid escalating Middle East tensions, central bank buying, and energy supply fears from the Hormuz crisis.",mk:"중동 긴장 고조, 중앙은행 매입, 호르무즈 위기로 인한 에너지 공급 우려 속에 현물 금이 온스당 4,743.50달러에 도달했다.",tg:["금","안전자산","시장"],u:"https://markets.financialcontent.com/wss/article/marketminute-2026-4-6-gold-surges-toward-4700-as-middle-east-tensions-ignite-flight-to-safety"},
{id:254,p:8,r:"심층분석",t:"Could the Pakistani-Saudi defense pact be the first step toward a NATO-style alliance?",k:"파키스탄-사우디 방위 협정, NATO식 동맹의 첫걸음?",s:"CSIS",c:"global",d:"2026-04-11",m:"CSIS analysis examines whether the Saudi-Pakistan Strategic Mutual Defence Agreement could evolve into a broader NATO-style collective security framework in the Gulf region.",mk:"CSIS 분석은 사우디-파키스탄 전략적 상호방위협정이 걸프 지역의 NATO식 집단안보 체제로 발전할 수 있는지를 검토한다.",tg:["방위","동맹","CSIS"],u:"https://www.csis.org/analysis/could-pakistani-saudi-defense-pact-be-first-step-toward-nato-style-alliance"},
{id:255,p:7,r:"",t:"UN ceasefire raises hopes for reopening Strait of Hormuz",k:"UN, 휴전으로 호르무즈 해협 재개방 기대감 고조",s:"UN News",c:"global",d:"2026-04-09",m:"UN Secretary-General welcomed the ceasefire as a critical step toward reopening the Strait of Hormuz and de-escalating the broader Middle East conflict.",mk:"UN 사무총장은 휴전을 호르무즈 해협 재개방과 중동 분쟁 완화를 위한 중요한 조치라고 환영했다.",tg:["UN","호르무즈","휴전"],u:"https://news.un.org/en/story/2026/04/1167270"},
{id:256,p:8,r:"심층분석",t:"[Korean view] Iran war shakes Korean stock market: 7 out of 10 stocks in red over 40 days",k:"[한국 시각] 이란 전쟁이 한국 증시를 뒤흔든 40일, 10종목 중 7개 하락",s:"이콘밍글",c:"korean",d:"2026-04-10",m:"Analysis shows 70% of Korean stocks declined over the 40 days since the Iran war began, with KOSPI rallying 6.87% on ceasefire news before falling 1.61% on uncertainty.",mk:"이란 전쟁 개시 이후 40일간 한국 상장 종목의 70%가 하락했으며, 코스피는 휴전 소식에 6.87% 급등했다가 불확실성에 1.61% 하락했다.",tg:["코스피","증시","이란전쟁"],u:"https://econmingle.com/economy/iran-war-korean-stock-market-impact-2026/"},
{id:257,p:7,r:"심층분석",t:"[Korean view] KDI diagnoses Korean economic shock from expanded Hormuz risk in 2026",k:"[한국 시각] KDI, 2026년 호르무즈 리스크 확대에 따른 한국경제 충격 진단",s:"KDI",c:"korean",d:"2026-04-10",m:"KDI report warns that if the war escalates, Korea&apos;s GDP growth could fall 0.8%p, consumer prices rise 2.9%p, and current account drop to $76.7 billion.",mk:"KDI 보고서는 전쟁 장기화 시 한국 GDP 성장률 0.8%p 하락, 소비자물가 2.9%p 상승, 경상수지 767억 달러까지 감소할 수 있다고 경고했다.",tg:["KDI","경제","호르무즈"],u:"https://eiec.kdi.re.kr/policy/domesticView.do?ac=0000204293"},
{id:258,p:7,r:"",t:"[Korean view] Hormuz blockade makes EU fuel rationing real, Korean manufacturing costs up 12%",k:"[한국 시각] 호르무즈 봉쇄로 EU 연료 배급 현실화…한국 제조업 원가 12% 상승",s:"글로벌이코노믹",c:"korean",d:"2026-04-10",m:"With Iran re-blocking the Strait of Hormuz, the EU faces fuel rationing while Korean manufacturers see production costs rise 12% due to energy supply disruptions.",mk:"이란의 호르무즈 해협 재봉쇄로 EU가 연료 배급제에 직면한 가운데, 한국 제조업체는 에너지 공급 차질로 생산비가 12% 상승했다.",tg:["제조업","에너지","EU"],u:"https://www.g-enews.com/article/Global-Biz/2026/04/202604031923115218fbbec65dfb_1"},
{id:259,p:7,r:"심층분석",t:"[Korean view] Trump&apos;s Middle East policy: hope or chaos? Mixed reviews in April 2026",k:"[한국 시각] 트럼프의 중동 정책: 희망인가 혼란인가 - 2026년 4월 엇갈린 평가",s:"아이티인사이트",c:"korean",d:"2026-04-11",m:"Korean analysis examines conflicting assessments of Trump&apos;s Middle East strategy, with some praising ceasefire efforts and others criticizing escalation that dragged Gulf allies into conflict.",mk:"한국 분석은 트럼프 중동 전략에 대한 엇갈린 평가를 검토하며, 휴전 노력을 평가하는 쪽과 걸프 동맹을 분쟁에 끌어들인 확전을 비판하는 쪽으로 나뉜다.",tg:["트럼프","중동정책","분석"],u:"https://www.itinsight.kr/news/444215"},
{id:260,p:6,r:"",t:"[Korean view] Saudi complex hit as Middle East crisis deepens: MBC analysis",k:"[한국 시각] 사우디·UAE 복잡한 심경…전쟁 원하는 이스라엘이 걸림돌?",s:"MBC",c:"korean",d:"2026-04-11",m:"MBC reports on Saudi and UAE&apos;s complex positions, noting MBS urged prolonging the war until Iran is fully weakened, while Israel&apos;s exclusion of Lebanon from ceasefire complicates peace.",mk:"MBC는 사우디·UAE의 복잡한 입장을 보도하며, MBS가 이란이 완전히 약화될 때까지 전쟁을 촉구했고 이스라엘의 레바논 휴전 배제가 평화를 복잡하게 한다고 전했다.",tg:["사우디","UAE","이스라엘"],u:"https://imnews.imbc.com/replay/2026/nwdesk/article/6810249_37004.html"},
{id:261,p:7,r:"",t:"[Korean view] PwC Korea: US-Iran conflict impact assessment on Korean economy and industry",k:"[한국 시각] PwC 코리아: 미국-이란 충돌이 한국 경제·산업에 미치는 영향 점검",s:"PwC코리아",c:"korean",d:"2026-04-09",m:"PwC Korea published a comprehensive impact assessment of the US-Iran war on Korean industries, noting 68% oil import dependence on the Middle East and supply chain vulnerabilities.",mk:"PwC 코리아는 미국-이란 전쟁의 한국 산업 영향 종합 평가를 발표하며, 중동 원유 수입 의존도 68%와 공급망 취약성을 지적했다.",tg:["PwC","산업","원유"],u:"https://www.pwc.com/kr/ko/insights/issue-brief/samilpwc_us-iran-conflict-economic-impact.pdf"},
{id:262,p:6,r:"",t:"[Korean view] OECD cuts Korea 2026 growth forecast to 1.7% from 2.1% due to Middle East crisis",k:"[한국 시각] OECD, 중동 위기로 한국 2026년 성장률 전망 2.1%→1.7%로 하향",s:"연합뉴스",c:"korean",d:"2026-04-10",m:"OECD downgraded Korea&apos;s 2026 GDP growth forecast from 2.1% to 1.7%, citing Middle East war disruptions to energy supply and global trade.",mk:"OECD가 중동 전쟁의 에너지 공급·글로벌 무역 교란을 이유로 한국의 2026년 GDP 성장률 전망을 2.1%에서 1.7%로 하향 조정했다.",tg:["OECD","성장률","하향"],u:"https://www.yna.co.kr"}
,
