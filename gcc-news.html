{id:1534,p:10,r:"속보",t:"US-Israel war on Iran updates: Trump &apos;not satisfied&apos; with Tehran&apos;s new proposal",k:"美·이스라엘 對이란 전쟁: 트럼프 &quot;테헤란 새 제안 만족스럽지 않다&quot;",s:"Al Jazeera",c:"me",d:"2026-05-01",m:"Iran said US ports siege intolerable as Trump mulls military action. Iran submitted a new proposal through Pakistani mediators while Tehran warned ceasefire could collapse without progress on Hormuz reopening and US blockade lifting.",mk:"이란은 미국의 항구 봉쇄를 &quot;감내할 수 없다&quot;고 밝혔고, 트럼프는 군사 옵션을 검토했다. 이란은 파키스탄 중재로 새 제안을 제출했으나, 호르무즈 재개방·美 봉쇄 해제 진전이 없으면 휴전 붕괴 가능성을 경고했다.",tg:["이란전쟁", "트럼프", "호르무즈", "휴전"],u:"https://www.aljazeera.com/news/liveblog/2026/5/1/iran-war-live-tehran-says-us-ports-siege-intolerable-trump-mulls-action"},
{id:1535,p:10,r:"속보",t:"Iran war updates: IRGC warns conflict may resume, says it&apos;s fully prepared",k:"이란 전쟁: IRGC &quot;갈등 재개 가능…완전 준비&quot; 경고…트럼프 조기종전 부정",s:"Al Jazeera",c:"me",d:"2026-05-02",m:"IRGC senior officials warned renewed conflict with the US is &quot;possible&quot; after Trump rejected the latest Iranian proposal. Trump said no early end to the war, expressed dissatisfaction with Tehran offer.",mk:"이란혁명수비대(IRGC) 고위관계자가 트럼프의 최신 이란 제안 거부 후 미국과의 갈등 재개 &quot;가능성&quot;을 경고했다. 트럼프는 전쟁 조기 종결을 부정하며 테헤란 제안에 불만을 표했다.",tg:["IRGC", "이란전쟁", "트럼프", "휴전"],u:"https://www.aljazeera.com/news/liveblog/2026/5/2/iran-war-live-trump-says-no-early-end-to-war-unhappy-with-tehran-offer"},
{id:1536,p:9,r:"속보",t:"Trump tells Congress Iran war hostilities &apos;terminated&apos;, deadline doesn&apos;t apply",k:"트럼프, 의회에 &quot;이란 적대행위 종결&quot;…전쟁권한법 시한 회피",s:"The Times of Israel",c:"me",d:"2026-05-01",m:"Trump&apos;s message effectively skirts a May 1 legal deadline to gain Congressional approval for Iran war, with the deadline passing without action from Republican lawmakers. Trump said hostilities started Feb 28 had &quot;terminated&quot; though the war &quot;may be far from over.&quot;",mk:"트럼프 대통령의 의회 통보는 이란 전쟁 의회 승인을 위한 5월 1일 법적 시한을 사실상 회피했다. 공화당 의원들이 침묵한 가운데 시한이 지났고, 트럼프는 2월 28일 시작된 적대행위가 &quot;종결&quot;됐다고 밝혔다.",tg:["트럼프", "의회", "전쟁권한법", "이란"],u:"https://www.timesofisrael.com/liveblog-may-01-2026/"},
{id:1537,p:9,r:"속보",t:"Iran submits new proposal to end war; Trump says he&apos;s &apos;not satisfied&apos;",k:"이란, 전쟁 종결 새 제안 제출…트럼프 &quot;만족스럽지 않다&quot;",s:"The Times of Israel",c:"me",d:"2026-05-02",m:"Trump said he was dissatisfied with Iran&apos;s new ceasefire offer and confirmed he had been briefed on options to &quot;blast the hell out of them&quot; if no deal. Talks faltered over Iran&apos;s nuclear program and Hormuz control.",mk:"트럼프는 이란의 새 휴전 제안에 불만을 표하고, 합의 불발시 이란을 &quot;박살낼&quot; 옵션을 보고받았다고 확인했다. 이란 핵 프로그램과 호르무즈 통제권을 둘러싸고 협상이 교착됐다.",tg:["이란", "휴전", "핵", "트럼프"],u:"https://www.timesofisrael.com/iran-submits-new-proposal-to-end-war-trump-says-hes-not-satisfied/"},
{id:1538,p:9,r:"속보",t:"Trump: There&apos;s a possibility we could renew strikes on Iran &apos;if they misbehave&apos;",k:"트럼프 &quot;이란이 잘못 행동하면 공격 재개 가능&quot;…재타격 가능성 시사",s:"The Times of Israel",c:"me",d:"2026-05-03",m:"Trump told reporters there is a possibility the United States could restart strikes on Iran &quot;if they misbehave.&quot; An Iranian military official said renewed conflict is &quot;likely&quot; as peace talks remain stalled.",mk:"트럼프는 기자들에게 이란이 &quot;잘못 행동&quot;하면 미국이 공습을 재개할 가능성이 있다고 말했다. 이란 군관계자도 평화 협상 교착 속 분쟁 재발이 &quot;가능성 높다&quot;고 밝혔다.",tg:["트럼프", "이란", "재공격", "협상"],u:"https://www.timesofisrael.com/liveblog-may-3-2026/"},
{id:1539,p:9,r:"속보",t:"Live Updates: Latest from Israel, Iran, and Middle East",k:"이스라엘·이란·중동 라이브 업데이트…휴전 위기 속 외교 가속",s:"Jerusalem Post",c:"me",d:"2026-05-01",m:"Live updates cover the precarious US-Iran ceasefire, Trump&apos;s rejection of Tehran&apos;s latest proposal, IDF operations in Lebanon, and continuing diplomatic efforts via Pakistani mediators.",mk:"미·이란 휴전 불안정, 트럼프의 테헤란 최신 제안 거부, IDF의 레바논 작전, 파키스탄 중재 외교 등 중동 정세 라이브 업데이트.",tg:["이스라엘", "이란", "휴전", "중동"],u:"https://www.jpost.com/middle-east/iran-news/2026-05-01/live-updates-894813"},
{id:1540,p:8,r:"심층분석",t:"At Riyadh summit, Saudi crown prince backs Iran, accuses Israel of genocide",k:"리야드 정상회의서 사우디 왕세자, 이란 옹호·이스라엘 &quot;집단학살&quot; 비판",s:"The Times of Israel",c:"me",d:"2026-04-29",m:"At the Riyadh GCC summit, Saudi Crown Prince Mohammed bin Salman publicly backed Iran in the regional conflict and accused Israel of committing genocide, marking a sharp tonal shift amid the Iran war.",mk:"리야드 GCC 정상회의에서 사우디 왕세자 모하메드 빈 살만이 지역 분쟁에서 이란을 공개적으로 옹호하고 이스라엘을 &quot;집단학살&quot;로 비판했다. 이란 전쟁 와중 사우디의 어조 변화를 보여준다.",tg:["MBS", "이란", "이스라엘", "리야드"],u:"https://www.timesofisrael.com/at-riyadh-summit-saudi-crown-prince-backs-iran-accuses-israel-of-genocide/"},
{id:1541,p:10,r:"헤드라인",t:"Saudi Arabia Set for Oil Windfall After Hormuz Boosts Prices",k:"사우디, 호르무즈 봉쇄發 유가 급등으로 오일 횡재…주간 수익 10% 증가",s:"Bloomberg",c:"global",d:"2026-05-01",m:"A blockade of the Strait of Hormuz creates an economic split among Persian Gulf oil exporters, with Saudi Arabia and Oman set for a windfall as they divert exports via Red Sea. Goldman estimates Saudi weekly oil revenue rose 10% vs pre-war levels while UAE fell 25%.",mk:"호르무즈 봉쇄가 페르시아만 산유국 사이에 경제적 명암을 가르고 있다. 홍해 우회 수출 가능한 사우디·오만은 횡재를 누리고 있으며, 골드만은 사우디 주간 유가 수익이 전쟁 전 대비 10% 상승, UAE는 25% 감소했다고 추정했다.",tg:["사우디", "호르무즈", "유가", "골드만"],u:"https://www.bloomberg.com/news/articles/2026-05-01/saudi-arabia-set-for-oil-windfall-after-hormuz-boosts-prices"},
{id:1542,p:9,r:"속보",t:"OPEC+ set for another oil output quota hike despite Hormuz closure, sources say",k:"OPEC+, 호르무즈 봉쇄에도 또 한차례 산유량 쿼터 인상 추진",s:"CNBC",c:"global",d:"2026-05-02",m:"Eight OPEC+ countries are set to meet May 3 and agree to raise oil output targets in June by about 188,000 barrels per day, the third consecutive monthly increase, despite war and UAE departure. Reuters notes the hike is under 2% of supply blocked by Hormuz.",mk:"OPEC+ 8개국이 5월 3일 회의에서 6월 산유량 목표를 일평균 약 18.8만 배럴 추가 인상하는 방안에 합의할 것으로 보인다. 전쟁과 UAE 탈퇴에도 3개월 연속 증산 결정이며, 로이터는 호르무즈 봉쇄로 막힌 공급의 2% 미만이라고 지적했다.",tg:["OPEC+", "증산", "쿼터", "호르무즈"],u:"https://www.cnbc.com/amp/2026/05/02/opec-set-for-another-oil-output-quota-hike-despite-hormuz-closure.html"},
{id:1543,p:9,r:"속보",t:"Trump says he is reviewing a new Iranian proposal to end the war",k:"트럼프 &quot;새 이란 제안 검토 중…수용 가능성 상상 어렵다&quot;",s:"CNBC",c:"global",d:"2026-05-02",m:"Trump said Saturday he would soon review Iran&apos;s new 14-point proposal but &quot;can&apos;t imagine it would be acceptable.&quot; The proposal would reopen Hormuz shipping and end US blockade while leaving nuclear talks for later.",mk:"트럼프는 토요일 이란의 새 14개항 제안을 곧 검토하겠다면서도 &quot;수용 가능할 것이라 상상할 수 없다&quot;고 밝혔다. 이란 제안은 호르무즈 항행 재개와 美 봉쇄 종료를 골자로 하되 핵 협상은 추후 진행하는 내용이다.",tg:["트럼프", "이란", "호르무즈", "핵"],u:"https://www.cnbc.com/2026/05/02/trump-iran-strait-of-hormuz.html"},
{id:1544,p:8,r:"속보",t:"Oil prices fall after Iran sends updated peace proposal to mediators in Pakistan",k:"이란, 파키스탄 중재 통해 새 평화안 제출에 유가 하락…휴전 기대 부활",s:"CNBC",c:"global",d:"2026-05-01",m:"Brent crude futures fell to almost $108 per barrel, trimming weekly gains, as hopes grew that a fragile US-Iran ceasefire could lead to lasting peace after Iran submitted updated proposal via Pakistani mediators.",mk:"브렌트유 선물이 배럴당 108달러 부근으로 하락하며 주간 상승분을 일부 반납했다. 이란이 파키스탄 중재로 새 제안을 제출하면서 미·이란 휴전이 항구적 평화로 이어질 수 있다는 기대가 커졌다.",tg:["유가", "브렌트", "이란", "휴전"],u:"https://www.cnbc.com/2026/05/01/oil-prices-today-brent-wti-us-iran-war-trump-war-powers-deadline.html"},
{id:1545,p:9,r:"속보",t:"Day 64 of Middle East conflict — Israel and Hezbollah continue to trade blows despite declared ceasefire",k:"중동 분쟁 64일차 — 이스라엘·헤즈볼라, 휴전 선언에도 공방 지속",s:"CNN",c:"global",d:"2026-05-02",m:"Israel and Hezbollah continue exchanging strikes despite declared ceasefire on day 64 of the Middle East conflict. US-Iran talks remain stalled while regional tensions show no signs of fully easing.",mk:"중동 분쟁 64일차에도 이스라엘과 헤즈볼라가 휴전 선언에도 불구하고 공방을 지속했다. 미·이란 협상은 교착 상태이며, 지역 긴장은 완전 진정 기미를 보이지 않고 있다.",tg:["이스라엘", "헤즈볼라", "휴전", "레바논"],u:"https://www.cnn.com/2026/05/02/world/live-news/iran-war-news"},
{id:1546,p:9,r:"속보",t:"Day 63 of Middle East conflict — Trump considers it &apos;treasonous&apos; to say US isn&apos;t winning war",k:"중동 분쟁 63일차 — 트럼프 &quot;美 승리하지 않는다는 발언은 반역적&quot;",s:"CNN",c:"global",d:"2026-05-01",m:"Trump labels critics suggesting the US isn&apos;t winning the Iran war as &quot;treasonous&quot; on Day 63, as US blockades continue and Iranian counter-proposals fail to satisfy Washington.",mk:"중동 분쟁 63일차, 트럼프는 미국이 이란 전쟁에서 이기고 있지 않다고 시사하는 비판자들을 &quot;반역적&quot;이라고 규정했다. 미국 봉쇄가 지속되는 가운데 이란 측 대안은 워싱턴을 만족시키지 못하고 있다.",tg:["트럼프", "이란전쟁", "미국", "비판"],u:"https://www.cnn.com/2026/05/01/world/live-news/iran-war-news"},
{id:1547,p:9,r:"심층분석",t:"Ceasefire hangs in the balance as Iran sends peace proposal to mediators",k:"휴전 운명 갈림길…이란, 중재자에 평화안 제출",s:"CNN",c:"global",d:"2026-05-01",m:"The US-Iran ceasefire teeters as Iran submitted a 14-point response calling for &quot;ending the war on all fronts, including Lebanon.&quot; Trump rejected previous version; renewed conflict risk grows.",mk:"미·이란 휴전이 위태롭다. 이란은 &quot;레바논을 포함한 전 전선의 전쟁 종결&quot;을 요구하는 14개항 답변을 제출했다. 트럼프는 이전 안을 거부했고, 분쟁 재발 위험이 커지고 있다.",tg:["휴전", "이란", "평화안", "트럼프"],u:"https://www.cnn.com/2026/05/01/middleeast/iran-trump-ceasefire-response-intl"},
{id:1548,p:7,r:"심층분석",t:"GCC summit shows unity, but highlights coordination gaps",k:"GCC 정상회의, 결속 과시 속 조율 한계 노출…UAE 대통령 불참",s:"Euronews",c:"global",d:"2026-04-29",m:"The Jeddah GCC summit displayed unity but exposed coordination limits. UAE was represented by FM Abdullah bin Zayed instead of its president, and Emirati official Anwar Gargash described the bloc&apos;s stance as &quot;weakest in its history.&quot;",mk:"제다 GCC 정상회의는 결속을 과시했으나 조율 한계도 드러냈다. UAE는 대통령 대신 압둘라 빈 자이드 외교장관을 보냈고, 에미리트 관계자 안와르 가르가시는 GCC 입장을 &quot;역사상 가장 약하다&quot;고 평가했다.",tg:["GCC", "제다", "UAE", "결속"],u:"https://www.euronews.com/2026/04/29/gulf-unity-on-display-in-jeddah-but-absences-and-signals-reveal-limits-to-coordination"},
{id:1549,p:8,r:"심층분석",t:"The UAE&apos;s OPEC exit signals strategic shift as Gulf unity faces new test over oil policy",k:"UAE OPEC 탈퇴, 전략적 전환 신호…걸프 결속 새 시험대",s:"Euronews",c:"global",d:"2026-05-01",m:"UAE&apos;s OPEC exit effective May 1 signals a strategic shift as Gulf unity faces new tests over oil policy. UAE is investing billions to expand production capacity from 3 to 5 million bpd by 2027.",mk:"5월 1일 발효된 UAE의 OPEC 탈퇴가 전략적 전환을 알리며, 석유 정책을 둘러싼 걸프 결속을 새로운 시험대에 올렸다. UAE는 2027년까지 산유능력을 일평균 300만에서 500만 배럴로 확대하기 위해 수십억 달러를 투자해왔다.",tg:["UAE", "OPEC", "전략전환", "증산"],u:"https://www.euronews.com/business/2026/05/01/uaes-opec-exit-signals-strategic-shift-as-gulf-unity-faces-new-test-over-oil-policy"},
{id:1550,p:7,r:"심층분석",t:"How the Iran war is reshaping Saudi strategy: From Hormuz and Houthis to the UAE&apos;s OPEC exit",k:"이란 전쟁이 재편하는 사우디 전략: 호르무즈·후티에서 UAE OPEC 탈퇴까지",s:"Chatham House",c:"global",d:"2026-05-01",m:"Chatham House analysis examines how the Iran war is reshaping Saudi strategy across Hormuz security, Houthi threats, and the UAE&apos;s OPEC departure. Saudi seeks to consolidate regional leadership amid shifting Gulf alignments.",mk:"채텀하우스 분석은 이란 전쟁이 호르무즈 안보·후티 위협·UAE의 OPEC 탈퇴를 통해 사우디 전략을 어떻게 재편하는지 조명한다. 사우디는 변화하는 걸프 동맹 구도 속 지역 리더십 강화를 모색하고 있다.",tg:["사우디", "이란전쟁", "호르무즈", "후티"],u:"https://www.chathamhouse.org/2026/05/how-iran-war-reshaping-saudi-strategy-hormuz-and-houthis-uaes-opec-exit"},
{id:1551,p:8,r:"주요경제",t:"사우디 아람코, 시설 손상으로 5월까지 LPG 선적 중단",k:"사우디 아람코, 시설 손상으로 5월까지 LPG 선적 중단…아시아 수급난 가중",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-29",m:"Saudi Aramco suspended LPG shipments through May after structural collapse and fire damage at the Juaymah export terminal. The shutdown affects ~3.5% of global waterborne LPG, worsening Asian supply crunch.",mk:"사우디 국영 아람코가 주아이마 LPG 수출 터미널의 구조물 붕괴와 화재 피해로 5월까지 LPG 선적을 중단한다. 전세계 LPG 해상 물동의 3.5%를 차지하는 시설 가동 중단으로 아시아 지역 수급난이 가중되고 있다.",tg:["아람코", "LPG", "주아이마", "아시아"],u:"https://www.fnnews.com/ampNews/202604290824484653"},
{id:1552,p:7,r:"주요경제",t:"&quot;사우디 아람코, LPG 선적 5월까지 중단...시설 피해 복구 못해&quot;",k:"&quot;사우디 아람코, LPG 선적 5월까지 중단&quot;…주아이마 시설 복구 지연",s:"뉴스핌",c:"korean-view",d:"2026-04-29",m:"Saudi Aramco told buyers it could not complete necessary repairs at Juaymah, meaning LPG shipments will remain halted through May even if Hormuz reopens. Loss equates to ~170,000 bpd of Saudi LPG exports.",mk:"사우디 아람코는 구매자들에게 주아이마 시설 필수 수리를 완료하지 못해 호르무즈가 재개방되더라도 5월까지 LPG 선적이 중단된다고 통보했다. 사우디 LPG 수출 일평균 약 17만 배럴 손실에 해당한다.",tg:["아람코", "LPG", "주아이마", "수출"],u:"https://www.newspim.com/news/view/20260429000038"},
{id:1553,p:7,r:"심층분석",t:"블룸버그 &ldquo;사우디 아람코 LPG 선적 다음달까지 중단&rdquo;",k:"블룸버그 &quot;사우디 아람코 LPG 선적 다음달까지 중단&quot;…국제 LPG 시장 충격",s:"경향신문",c:"korean-view",d:"2026-04-28",m:"Bloomberg reported that Saudi Aramco will halt LPG shipments through May due to facility damage. The disruption hits global LPG markets, with India facing severe shortages of cooking fuel.",mk:"블룸버그는 사우디 아람코가 시설 피해로 인해 5월까지 LPG 선적을 중단한다고 보도했다. 글로벌 LPG 시장에 충격이 가해지고 있으며, 조리용 연료로 LPG 의존도가 높은 인도에서는 심각한 품귀 현상이 발생했다.",tg:["블룸버그", "아람코", "LPG", "인도"],u:"https://www.khan.co.kr/article/202604282228001"},
{id:1554,p:7,r:"속보",t:"&quot;아람코, 시설 손상 탓 5월까지 LPG 선적 중단&quot;",k:"&quot;아람코, 시설 손상 탓 5월까지 LPG 선적 중단&quot;…한국 LPG 가격 영향",s:"MBC뉴스",c:"korean-view",d:"2026-04-29",m:"Saudi Aramco&apos;s extended LPG shipment halt through May raises concerns over Korean domestic LPG prices and supply security. SK Gas and E1 are monitoring market impact closely.",mk:"사우디 아람코의 5월까지 LPG 선적 중단 연장이 한국 국내 LPG 가격과 공급 안보에 대한 우려를 키우고 있다. SK가스와 E1은 시장 충격을 면밀히 모니터링하고 있다.",tg:["아람코", "LPG", "SK가스", "E1"],u:"https://imnews.imbc.com/news/2026/world/article/6818688_36925.html"},
{id:1555,p:7,r:"심층분석",t:"OPEC+ 5월 증산 결정… &quot;호르무즈 해협서 막힌 물량 2％&quot;",k:"OPEC+ 5월 증산 결정… 호르무즈 봉쇄에도 &quot;상징적&quot; 인상",s:"헤럴드경제",c:"korean-view",d:"2026-04-29",m:"OPEC+ agreed to raise May output by 206,000 bpd despite Hormuz closure. Reuters notes the increase is under 2% of blocked supply, making it largely symbolic. The next meeting on May 3 may add 188,000 bpd.",mk:"OPEC+가 호르무즈 봉쇄에도 5월 산유량을 일평균 20만6천 배럴 늘리기로 합의했다. 로이터는 이번 인상이 봉쇄로 막힌 공급의 2% 미만으로 상징적 수준이라고 평가했다. 5월 3일 회의에서 추가 18.8만 배럴 증산이 논의될 예정이다.",tg:["OPEC+", "증산", "호르무즈", "사우디"],u:"https://biz.heraldcorp.com/article/10710337"},
{id:1556,p:7,r:"심층분석",t:"걸프협력회의, 전쟁 후 첫 대면 정상회담…결속·내부 균열 동시에",k:"GCC, 이란전쟁 후 첫 대면 정상회담…결속 과시 속 UAE-사우디 균열 노출",s:"아시아투데이",c:"korean-view",d:"2026-04-29",m:"GCC leaders held first in-person summit in Jeddah since the start of the Iran war. While displaying unity, the summit also exposed widening Saudi-UAE rifts over OPEC, Yemen, and security policy. UAE sent FM not President.",mk:"GCC 정상들이 이란 전쟁 발발 후 처음으로 제다에서 대면 정상회의를 열었다. 결속을 과시했으나 OPEC·예멘·안보 정책을 둘러싼 사우디-UAE 간 갈등 균열도 함께 드러났다. UAE는 대통령 대신 외교장관을 파견했다.",tg:["GCC", "제다", "사우디", "UAE"],u:"https://www.asiatoday.co.kr/kn/view.php?key=20260429010009517"},
    {id:1557,p:9,r:"헤드라인",t:"Saudi Economy Grows 2.8% as Non-Oil Sector Drives Expansion",k:"사우디 1분기 GDP 2.8% 성장…비석유 부문이 견인",s:"Asharq Al-Awsat",c:"saudi",d:"2026-05-02",m:"Saudi Arabia&apos;s real GDP grew 2.8% in Q1 2026, with non-oil sectors contributing about 60% of the increase. Non-oil activities grew 2.8% and oil activities increased 2.3% YoY. Economists say diversification policies are delivering tangible results.",mk:"사우디 실질 GDP가 2026년 1분기에 전년 대비 2.8% 성장했으며, 비석유 부문이 성장의 약 60%를 견인했다. 비석유 활동은 2.8%, 석유 활동은 2.3% 성장했다. 전문가들은 다각화 정책이 가시적 성과를 내고 있다고 평가했다.",tg:["GDP","비석유","Vision2030"],u:"https://english.aawsat.com/business/5268364-saudi-economy-grows-28-non-oil-sector-drives-expansion"},
    {id:1558,p:7,r:"정책발표",t:"Madinah airport receives first Hajj pilgrim flights from Algeria, Morocco, Philippines and Somalia",k:"마디나 공항, 알제리·모로코·필리핀·소말리아발 첫 하지 순례객 항공편 도착",s:"Arab News",c:"saudi",d:"2026-05-01",m:"Saudi Arabia&apos;s Prince Mohammad Bin Abdulaziz International Airport in Madinah began receiving the first Hajj pilgrim flights from the Philippines, Algeria, Somalia and Morocco. The Kingdom is mobilising full capacity for the 2026 Hajj season expected to begin around May 25.",mk:"사우디 마디나의 프린스 모하마드 빈 압둘아지즈 국제공항이 필리핀·알제리·소말리아·모로코발 첫 하지 순례객 항공편을 받기 시작했다. 사우디는 5월 25일경 시작될 2026 하지 시즌을 위해 전면 가동 체제에 돌입했다.",tg:["하지","마디나","순례"],u:"https://www.arabnews.com/node/2642042/saudi-arabia"},
    {id:1559,p:8,r:"주요경제",t:"PIF-backed Humain secures up to $1.2bn to expand AI infrastructure",k:"PIF 산하 휴메인, AI 인프라 확장 위해 12억 달러 자금 조달",s:"Arab News",c:"saudi",d:"2026-04-22",m:"Saudi Arabia&apos;s National Infrastructure Fund and Humain agreed on a financing framework worth up to $1.2 billion to expand AI and digital infrastructure, developing as much as 250 megawatts of AI data center capacity. Humain is PIF&apos;s vehicle for AI bets.",mk:"사우디 국가인프라기금과 휴메인이 AI·디지털 인프라 확장을 위해 최대 12억 달러 규모 금융 프레임워크에 합의했다. 250MW 규모 AI 데이터센터 용량을 개발한다. 휴메인은 PIF의 AI 투자 핵심 비히클이다.",tg:["PIF","Humain","AI","데이터센터"],u:"https://www.arabnews.com/node/2630217/business-economy"},
    {id:1560,p:7,r:"심층분석",t:"Saudi Economy Poised for Strong Non-Oil Momentum in 2026",k:"사우디 경제, 2026년 비석유 부문 강한 성장세 예고",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-15",m:"Saudi Arabia&apos;s GDP is expected to expand by 4.5 percent in 2026, outperforming the global growth average of 3.4 percent. The non-oil sector is expected to expand steadily at 4.5 percent, supported by investment and consumption.",mk:"사우디 GDP는 2026년 4.5% 확장이 예상되며, 이는 글로벌 평균 3.4%를 상회한다. 비석유 부문은 투자와 소비에 힘입어 4.5% 안정적 확장이 예상된다.",tg:["비석유","GDP","성장"],u:"https://english.aawsat.com/business/5226455-saudi-economy-poised-strong-non-oil-momentum-2026"},
    {id:1561,p:7,r:"심층분석",t:"World Bank Forecasts 4.3% Growth for Saudi Economy, Supported by Non-Oil Activities",k:"세계은행, 사우디 경제 4.3% 성장 전망…비석유 부문이 견인",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-10",m:"The World Bank forecast Saudi Arabia&apos;s economy to grow 4.3% in 2026, supported by non-oil activities and Vision 2030 reforms. The forecast aligns with broader institutional confidence in the Kingdom&apos;s diversification path.",mk:"세계은행이 비석유 부문과 비전2030 개혁에 힘입어 사우디 경제가 2026년 4.3% 성장할 것으로 전망했다. 이는 사우디 다각화 경로에 대한 광범위한 기관 신뢰와 일치한다.",tg:["세계은행","비석유","Vision2030"],u:"https://english.aawsat.com/business/5216202-world-bank-forecasts-43-growth-saudi-economy-supported-non-oil-activities"},
    {id:1562,p:8,r:"정책발표",t:"Crown Prince receives written message from Japanese PM Takaichi",k:"빈살만 왕세자, 일본 다카이치 총리 친서 접수",s:"Saudi Gazette",c:"saudi",d:"2026-04-30",m:"Crown Prince and Prime Minister Mohammed bin Salman received a written message from Japanese PM Sanae Takaichi pertaining to further improving bilateral relations between Saudi Arabia and Japan, including in energy, AI, and economic cooperation.",mk:"빈살만 왕세자 겸 총리가 일본 다카이치 사나에 총리로부터 양국 관계 강화에 관한 친서를 접수했다. 에너지·AI·경제협력 등 분야에서 한층 진전된 관계 구축에 관한 내용이 담겼다.",tg:["빈살만","일본","외교"],u:"https://saudigazette.com.sa/article/660980"},
    {id:1563,p:6,r:"주요경제",t:"McDonald&apos;s Saudi Arabia contributed SR3.6 billion to GDP and supported over 22,500 jobs",k:"맥도날드 사우디, GDP에 36억 리얄 기여하고 2만2,500개 일자리 지원",s:"Saudi Gazette",c:"saudi",d:"2026-04-30",m:"According to Oxford Economics, McDonald&apos;s contribution to Saudi Arabia&apos;s GDP reached approximately SR3.6 billion during April 2024 to March 2025, while operations supported more than 22,500 jobs across various sectors.",mk:"옥스퍼드 이코노믹스 보고서에 따르면 맥도날드의 사우디 GDP 기여는 2024년 4월~2025년 3월 약 36억 리얄에 달했고, 운영을 통해 2만2,500개 이상 일자리가 지원됐다.",tg:["맥도날드","GDP","고용"],u:"https://saudigazette.com.sa/article/660974"},
    {id:1564,p:6,r:"주요경제",t:"Red Sea resorts hit 82% occupancy during Eid surge in Q1 2026",k:"홍해 럭셔리 리조트, 라마단 성수기 객실 점유율 82% 달성",s:"Saudi Gazette",c:"saudi",d:"2026-04-30",m:"Occupancy at ultra-luxury Red Sea resorts reached 82% during the final 10 days of Ramadan, according to the Ministry of Tourism&apos;s Q1 2026 performance report. Tourism continues to be a key Vision 2030 pillar.",mk:"관광부 1분기 실적 보고에 따르면 라마단 마지막 10일 동안 홍해 초고급 리조트 객실 점유율이 82%에 달했다. 관광은 비전2030의 핵심 축으로 자리잡고 있다.",tg:["홍해","관광","Vision2030"],u:"https://saudigazette.com.sa/article/660983"},
    {id:1565,p:7,r:"주요경제",t:"40 firms disclosed Q1 2026 financials last week, including stc, Bahri, Petro Rabigh, SABIC",k:"지난주 40개 사우디 상장사 1분기 실적 공시…28사 증익·10사 감익",s:"Argaam",c:"saudi",d:"2026-05-02",m:"A total of 40 TASI-listed companies disclosed Q1 2026 financial results in the week leading up to May 1, including stc, Bahri, Petro Rabigh, and SABIC. 28 companies posted profit increases, 10 reported declines, and 2 incurred losses.",mk:"타다울(TASI) 상장사 40곳이 5월 1일까지 한 주간 1분기 실적을 공시했다. STC·바흐리·페트로라비·SABIC 등이 포함됐으며, 28사 증익·10사 감익·2사 적자를 기록했다.",tg:["TASI","실적","Q1"],u:"https://www.argaam.com/en/market-daily-financial-report/3/58024"},
    {id:1566,p:5,r:"일반",t:"Filipino conjoined twins stable one week after successful separation in Riyadh",k:"리야드서 분리수술 받은 필리핀 결합쌍둥이, 수술 1주 후 안정",s:"Saudi Gazette",c:"saudi",d:"2026-04-30",m:"Filipino conjoined twins Klea and Maurice Ann, who underwent a successful surgical separation in Riyadh, are stable one week after the procedure. The case highlights Saudi Arabia&apos;s growing medical capability and humanitarian outreach.",mk:"리야드에서 분리수술을 받은 필리핀 결합쌍둥이 클레아와 모리스 앤이 수술 1주일 후 안정적인 상태를 유지하고 있다. 이번 사례는 사우디의 의료 역량과 인도적 지원 확대를 보여준다.",tg:["의료","리야드","인도주의"],u:"https://saudigazette.com.sa/article/660985/saudi-arabia/filipino-conjoined-twins-stable-one-week-after-successful-separation"},
    {id:1567,p:7,r:"주요경제",t:"Saudi investment contributes 30% of GDP amid FDI surge",k:"사우디 투자 GDP 비중 30%로 확대…외국인직접투자 급증",s:"Saudi Gazette",c:"saudi",d:"2026-04-22",m:"Saudi Arabia&apos;s investment now contributes 30% of GDP amid a continued surge in foreign direct investment. The figure underscores Vision 2030&apos;s success in attracting international capital despite regional tensions.",mk:"사우디 투자의 GDP 기여 비중이 외국인직접투자(FDI) 급증 속에 30%까지 확대됐다. 지역 긴장에도 불구하고 비전2030이 국제 자본 유치에 성공하고 있음을 보여준다.",tg:["FDI","투자","Vision2030"],u:"https://saudigazette.com.sa/article/660851"},
    {id:1568,p:8,r:"주요경제",t:"Saudi banks post record quarterly profits of $6.4bn in Q1",k:"사우디 10대 은행, 1분기 사상 최대 64억 달러 순이익",s:"Arab News",c:"saudi",d:"2026-04-29",m:"Saudi Arabia&apos;s 10 listed banks posted combined net profit of $6.4 billion (SR23.95 billion) in Q1 2026, up 7.6% year-on-year. Profits were supported by loan portfolio growth and operational efficiency.",mk:"사우디 10대 상장은행이 1분기 합산 순이익 64억 달러(239억5,000만 리얄)를 기록, 전년 동기 대비 7.6% 증가했다. 대출 포트폴리오 성장과 운영 효율성이 실적을 뒷받침했다.",tg:["은행","Q1","실적"],u:"https://www.arabnews.com/node/2641439/amp"},
    {id:1569,p:7,r:"심층분석",t:"Saudi minerals sector driving industrial clusters and downstream growth",k:"사우디 광물 부문, 산업 클러스터·다운스트림 성장 견인",s:"Arab News",c:"saudi",d:"2026-05-02",m:"Saudi Arabia&apos;s mineral resources, estimated at $2.5 trillion in untapped value, are emerging as a third pillar of the economy alongside oil and petrochemicals. The sector is driving industrial clusters and downstream growth under Vision 2030.",mk:"2조5,000억 달러 규모로 추정되는 미개발 광물 자원이 사우디 경제의 석유·석유화학에 이은 제3의 축으로 부상하고 있다. 비전2030 하에서 산업 클러스터와 다운스트림 성장을 견인하고 있다.",tg:["광물","Vision2030","산업"],u:"https://www.arabnews.com/node/2642043/business-economy"},
    {id:1570,p:7,r:"주요경제",t:"SABIC Reshapes Global Footprint With $950m Divestment Deals",k:"SABIC, 9억5천만 달러 매각으로 글로벌 사업 재편",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-16",m:"SABIC agreed to sell its European petrochemicals business to AEQUITA for $500 million and its engineering thermoplastics operations in the Americas and Europe to Mutares for $450 million. The deals reshape SABIC&apos;s global footprint.",mk:"SABIC가 유럽 석유화학 사업을 AEQUITA에 5억 달러, 미주·유럽 엔지니어링 열가소성 수지 사업을 Mutares에 4억5천만 달러에 매각하기로 합의했다. 이 거래로 SABIC의 글로벌 사업 구조가 재편된다.",tg:["SABIC","매각","구조조정"],u:"https://english.aawsat.com/business/5227933-sabic-reshapes-global-footprint-950m-divestment-deals"},
    {id:1571,p:7,r:"심층분석",t:"Aramco CEO: Company Serves as Cornerstone of Saudi Vision 2030",k:"아람코 CEO &quot;아람코는 사우디 비전2030의 초석&quot;",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-08",m:"Aramco CEO Amin Nasser said the company serves as the cornerstone of Saudi Vision 2030, supporting energy security, downstream expansion, and the Kingdom&apos;s broader diversification agenda even amid heightened regional volatility.",mk:"아람코 아민 나세르 CEO는 회사가 사우디 비전2030의 초석으로서 지역 변동성 심화 속에서도 에너지 안보·다운스트림 확장·왕국의 광범위한 다각화 어젠다를 뒷받침하고 있다고 밝혔다.",tg:["아람코","Vision2030","CEO"],u:"https://english.aawsat.com/business/5202428-aramco-ceo-company-serves-cornerstone-saudi-vision-2030"},
    {id:1572,p:7,r:"주요경제",t:"UAE announces petrol and diesel prices for May 2026",k:"UAE, 2026년 5월 휘발유·경유 가격 발표",s:"Gulf News",c:"gulf",d:"2026-04-30",m:"UAE announced May 2026 fuel prices: E-Plus petrol Dh3.48/L (up from Dh3.20 in April), with diesel unchanged. Higher prices reflect global oil surge from Hormuz disruption and Iran war-related supply tensions.",mk:"UAE가 2026년 5월 연료 가격을 발표했다. E-플러스 휘발유는 리터당 3.48디르함(4월 3.20디르함에서 인상), 경유는 동결. 호르무즈 봉쇄와 이란전 관련 공급 긴장으로 글로벌 유가 급등이 반영됐다.",tg:["UAE","연료","유가"],u:"https://gulfnews.com/business/energy/uae-announces-petrol-and-diesel-prices-for-may-2026-1.500524014"},
    {id:1573,p:10,r:"헤드라인",t:"UAE announces decision to exit OPEC and OPEC+",k:"UAE, OPEC·OPEC+ 탈퇴 공식 결정",s:"Gulf News",c:"gulf",d:"2026-04-28",m:"UAE announced exit from OPEC and OPEC+ effective May 1, 2026, ending its 1967-onwards membership. The decision reflects UAE&apos;s push for production flexibility and long-term energy diversification.",mk:"UAE가 2026년 5월 1일자로 OPEC·OPEC+ 탈퇴를 공식 결정했다고 발표했다. 1967년 이후 회원국 지위가 종료되며, 생산 유연성 확보와 장기 에너지 다각화 추진이 결정 배경이다.",tg:["UAE","OPEC","탈퇴"],u:"https://gulfnews.com/business/energy/uae-announces-decision-to-exit-opec-opec-1.500522017"},
    {id:1574,p:8,r:"심층분석",t:"UAE to Exit OPEC: Officials and Experts Explain Reasons, Impact on Oil Markets",k:"UAE OPEC 탈퇴 배경 분석…석유시장 영향 전문가 진단",s:"Gulf News",c:"gulf",d:"2026-04-28",m:"UAE Energy Minister Suhail al-Mazrouei said the decision followed review of national energy strategy. UAE plans to expand production capacity from 3.4 million bpd to 5 million bpd by 2027, signaling growing OPEC dissatisfaction.",mk:"UAE 수하일 알-마즈루에이 에너지부 장관은 국가 에너지 전략 재검토 후 결정이 내려졌다고 밝혔다. UAE는 2027년까지 생산 능력을 일일 340만 배럴에서 500만 배럴로 확대 계획이며, OPEC 정책 불만이 누적된 결과다.",tg:["UAE","OPEC","증산"],u:"https://gulfnews.com/business/energy/why-did-uae-decide-to-exit-opecgovernment-officials-industry-experts-reveal-reasons-behind-move-1.500522343"},
    {id:1575,p:8,r:"심층분석",t:"UAE&apos;s Exit from OPEC Explained: What It Means for Global Oil Prices",k:"UAE OPEC 탈퇴 분석…글로벌 유가에 미치는 영향",s:"Gulf News",c:"gulf",d:"2026-05-01",m:"Most analysts expect little immediate price effect from UAE&apos;s OPEC exit, as global supply remains constrained by the Iran conflict and Hormuz closure. Long-term, however, UAE&apos;s 1.6 million bpd spare capacity could pressure the cartel&apos;s pricing power.",mk:"분석가들은 이란 분쟁과 호르무즈 봉쇄로 글로벌 공급이 제약된 상황에서 UAE의 OPEC 탈퇴가 단기 유가에 미치는 영향은 제한적일 것으로 본다. 다만 장기적으로 UAE의 일일 160만 배럴 여유 생산 능력이 카르텔 가격 결정력을 압박할 수 있다.",tg:["UAE","OPEC","유가"],u:"https://gulfnews.com/business/energy/will-oil-prices-rise-or-fall-in-the-months-after-uae-exits-opec-1.500522402"},
    {id:1576,p:6,r:"주요경제",t:"UAE Fuel Prices May 2026: Why Petrol May Stay High Despite Iran Ceasefire",k:"UAE 5월 휘발유 가격, 이란 휴전에도 고공행진 전망",s:"Gulf News",c:"gulf",d:"2026-04-29",m:"Despite the Iran ceasefire announced April 7-8, UAE petrol prices may remain elevated through May 2026 as Hormuz closure, supply chain disruptions, and elevated crude benchmarks continue to feed into retail prices.",mk:"4월 7-8일 이란 휴전 발표에도 불구하고 호르무즈 봉쇄·공급망 차질·국제유가 강세 지속으로 UAE 휘발유 소매가격은 5월에도 높은 수준을 유지할 전망이다.",tg:["UAE","연료","휴전"],u:"https://gulfnews.com/business/energy/uae-fuel-prices-for-may-2026-will-it-rise-or-fall-sharply-after-iran-ceasefire-1.500515303"},
    {id:1577,p:8,r:"심층분석",t:"Tracking the shadow fleet: How Iran evaded the US naval blockade in Hormuz",k:"&apos;섀도 플릿&apos; 추적…이란이 호르무즈 美 해상봉쇄 회피하는 법",s:"Al Jazeera",c:"me",d:"2026-04-30",m:"Al Jazeera investigation tracks how Iran has used a shadow fleet of dark-flagged tankers to evade the US naval blockade of Hormuz, smuggling crude exports and circumventing sanctions even amid the dual-blockade environment since April 13.",mk:"알자지라가 4월 13일 美·이란 이중 봉쇄 환경 속에서도 이란이 다크플래그 유조선 &apos;섀도 플릿&apos;을 활용해 호르무즈 美 해상봉쇄를 회피하고 원유 밀수출을 지속하는 방식을 추적 보도했다.",tg:["이란","호르무즈","제재"],u:"https://www.aljazeera.com/economy/2026/4/30/tracking-the-shadow-fleet-how-iran-evaded-the-us-naval-blockade-in-hormuz"},
    {id:1578,p:8,r:"속보",t:"Iran war: What&apos;s happening on day 61 as UAE exits OPEC?",k:"이란전쟁 61일째…UAE OPEC 탈퇴와 동시에 진행되는 정세",s:"Al Jazeera",c:"me",d:"2026-04-29",m:"On day 61 of the US-Israel war on Iran, the UAE&apos;s OPEC exit announcement coincides with continued Hormuz closure, ceasefire fragility, and ongoing diplomatic mediation by Pakistan and Qatar. Tensions remain high across the region.",mk:"美·이스라엘의 대이란 전쟁 61일째에 UAE OPEC 탈퇴 발표가 호르무즈 봉쇄 지속·휴전 불안정·파키스탄·카타르 중재 외교와 동시에 진행됐다. 역내 긴장은 여전히 높은 수준이다.",tg:["이란전쟁","UAE","OPEC"],u:"https://www.aljazeera.com/news/2026/4/29/iran-war-whats-happening-on-day-61-as-uae-exits-opec"},
    {id:1579,p:8,r:"심층분석",t:"How long can Iran survive the US&apos;s Hormuz blockade?",k:"이란, 美 호르무즈 봉쇄 얼마나 버틸 수 있나",s:"Al Jazeera",c:"me",d:"2026-04-24",m:"Al Jazeera analysis examines Iran&apos;s capacity to withstand the US Hormuz blockade, considering oil revenue losses, foreign reserves, sanctions evasion networks, and domestic political pressures since the April 13 counter-blockade.",mk:"알자지라가 4월 13일 美 역봉쇄 이후 원유 수익 감소·외환보유고·제재 회피망·국내 정치 압력을 종합해 이란이 美 호르무즈 봉쇄를 얼마나 버틸 수 있는지 심층 분석했다.",tg:["이란","호르무즈","제재"],u:"https://www.aljazeera.com/news/2026/4/24/how-long-can-iran-survive-the-uss-hormuz-blockade"},
    {id:1580,p:9,r:"헤드라인",t:"Iran gives US proposal for reopening Strait of Hormuz, ending war",k:"이란, 美에 호르무즈 재개·종전 14개항 제안서 전달",s:"Jerusalem Post",c:"me",d:"2026-05-01",m:"Iran, through Pakistani mediators, gave the US a 14-point proposal on reopening the Strait of Hormuz and ending the war. Nuclear negotiations are postponed for a later stage. Trump said he is reviewing it.",mk:"이란이 파키스탄 중재자를 통해 호르무즈 재개·종전을 위한 14개항 제안서를 美 측에 전달했다. 핵협상은 추후 단계로 미뤄졌다. 트럼프 대통령은 검토 중이라고 밝혔다.",tg:["이란","호르무즈","평화협상"],u:"https://www.jpost.com/middle-east/iran-news/article-894243"},
    {id:1581,p:7,r:"속보",t:"Pakistani PM condemns Iran attacks on Saudi Arabia in call with MBS",k:"파키스탄 총리, MBS 통화서 이란의 사우디 공격 규탄",s:"Al Arabiya",c:"me",d:"2026-04-07",m:"Pakistani PM Shehbaz Sharif condemned Iran&apos;s missile and drone attacks on Saudi Arabia in a phone call with Crown Prince MBS, vowing solidarity. The call followed the Iran-US ceasefire announcement of April 7.",mk:"파키스탄 셰바즈 샤리프 총리가 빈살만 왕세자와의 전화 통화에서 이란의 사우디 미사일·드론 공격을 규탄하며 연대를 다짐했다. 통화는 4월 7일 이란-美 휴전 발표 직후 이뤄졌다.",tg:["파키스탄","사우디","연대"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/07/pakistani-pm-condemns-iran-attacks-on-saudi-arabia-in-call-with-mbs"},
    {id:1582,p:9,r:"심층분석",t:"Strait of Hormuz: Why Vital Oil Route Has Become a Weapon of War",k:"호르무즈 해협, 핵심 원유 수송로에서 전쟁의 무기로 변모",s:"Bloomberg",c:"global",d:"2026-05-01",m:"Bloomberg analysis explains how the Strait of Hormuz, normally carrying one-fifth of global oil flows, has become a weapon of war since Iran&apos;s February 28 closure. Both sides use it to apply pressure in the broader US-Iran conflict.",mk:"블룸버그가 통상적으로 전 세계 원유 물동량의 5분의 1을 처리하는 호르무즈 해협이 2월 28일 이란의 봉쇄 이후 어떻게 전쟁의 무기로 변모했는지 분석했다. 양측은 광범위한 美·이란 분쟁에서 압력 수단으로 활용 중이다.",tg:["호르무즈","전쟁","원유"],u:"https://www.bloomberg.com/news/articles/2026-05-01/strait-of-hormuz-why-vital-oil-route-has-become-a-weapon-of-war"},
    {id:1583,p:8,r:"주요경제",t:"US oil prices will exceed Iran wartime high to above $125 as conflict drags on, Kalshi traders say",k:"&apos;칼시&apos; 트레이더 &quot;美유가 전시 최고치 넘어 125달러 돌파 가능&quot;",s:"CNBC",c:"global",d:"2026-05-01",m:"Kalshi traders forecast US oil prices will exceed the Iran wartime high and breach $125 per barrel as the conflict drags on. Brent and WTI are already up around 60% since the Feb 28 war began.",mk:"예측시장 칼시(Kalshi) 트레이더들이 美 유가가 분쟁 장기화로 이란 전시 최고치를 넘어 배럴당 125달러를 돌파할 것으로 전망했다. 브렌트유와 WTI는 2월 28일 전쟁 발발 이후 약 60% 상승했다.",tg:["WTI","Kalshi","유가"],u:"https://www.cnbc.com/2026/05/01/kalshi-traders-think-us-oil-prices-are-set-to-hit-new-2026-highs.html"},
    {id:1584,p:8,r:"정책발표",t:"Trump admin faces critical 60-day Iran war deadline, but floats ceasefire loophole",k:"트럼프 행정부, 이란전쟁 60일 시한 직면…&apos;휴전 루프홀&apos; 모색",s:"CNBC",c:"global",d:"2026-04-30",m:"Trump faces a 60-day War Powers Resolution deadline. The admin argues the April 7 ceasefire &apos;terminated&apos; hostilities, claiming the absence of direct fire since means the 60-day clock no longer applies.",mk:"트럼프 대통령이 전쟁권한법(60일) 시한에 직면했다. 행정부는 4월 7일 휴전이 적대행위를 &apos;종료&apos;시켰다며 이후 직접 교전이 없는 만큼 60일 시한이 더는 적용되지 않는다고 주장하고 있다.",tg:["트럼프","War Powers","의회"],u:"https://www.cnbc.com/2026/04/30/trump-iran-war-centcom-hormuz-congress.html"},
    {id:1585,p:7,r:"심층분석",t:"Trump said his blockade would cause Iran&apos;s oil industry to &apos;explode&apos; this week. Why that won&apos;t happen",k:"트럼프 &quot;美봉쇄가 이란 석유산업 &apos;폭파&apos;시킬 것&quot;…현실은 그렇지 않다",s:"CNBC",c:"global",d:"2026-04-30",m:"Trump claimed his Hormuz counter-blockade would cause Iran&apos;s oil industry to &apos;explode&apos; this week. CNBC analysis explains why structural factors — shadow fleet evasion, Chinese buying, sanctions infrastructure — prevent rapid collapse.",mk:"트럼프 대통령은 美 호르무즈 역봉쇄가 이번 주 이란 석유산업을 &apos;폭파&apos;시킬 것이라고 주장했다. CNBC는 섀도 플릿 회피·중국 구매·제재 인프라 등 구조적 요인 때문에 급격한 붕괴는 어렵다고 분석했다.",tg:["트럼프","이란","제재"],u:"https://www.cnbc.com/2026/04/30/trump-blockade-iran-oil-strait-hormuz.html"},
    {id:1586,p:8,r:"주요경제",t:"Barclays lifts 2026 Brent forecast to $100 on prolonged Hormuz disruption",k:"바클레이즈, 호르무즈 차질 장기화에 2026 브렌트유 전망 100달러로 상향",s:"The Drive",c:"global",d:"2026-05-01",m:"Barclays raised its 2026 Brent crude forecast to $100/barrel from $85, citing the impasse in the Strait of Hormuz. The bank notes that fragile ceasefire holds but flows through the strait are at a trickle, with global inventory draws accelerating.",mk:"바클레이즈가 호르무즈 해협 교착을 이유로 2026년 브렌트유 전망을 배럴당 85달러에서 100달러로 상향했다. 불안정한 휴전이 유지되지만 해협 통과량은 미미한 수준에 머물고 글로벌 재고 감소가 가속되고 있다고 지적했다.",tg:["바클레이즈","브렌트","호르무즈"],u:"https://www.933thedrive.com/2026/05/01/barclays-lifts-2026-brent-forecast-to-100-on-prolonged-hormuz-disruption/"},
    {id:1587,p:8,r:"심층분석",t:"Saudi Oil Prince&apos;s Iron Grip Faces Ultimate Test With UAE&apos;s Shock OPEC Exit",k:"&apos;석유 왕세자&apos; 빈살만의 철권, UAE OPEC 탈퇴 충격 속 최대 시험대",s:"US News",c:"global",d:"2026-05-01",m:"MBS&apos;s decade-long iron grip on OPEC oil policy faces its ultimate test as UAE&apos;s shock departure splinters the cartel. The test centers on whether Riyadh can maintain price discipline as Gulf rivals chart independent paths.",mk:"10년간 OPEC 석유 정책을 철권으로 이끈 빈살만 왕세자가 UAE의 충격적 탈퇴로 카르텔이 분열되며 최대 시험대에 직면했다. 핵심은 걸프 라이벌이 독자 노선을 걷는 가운데 리야드가 가격 규율을 유지할 수 있는지다.",tg:["MBS","UAE","OPEC"],u:"https://money.usnews.com/investing/news/articles/2026-05-01/saudi-oil-princes-iron-grip-faces-ultimate-test-with-uaes-shock-opec-exit"},
    {id:1588,p:7,r:"심층분석",t:"Old and new Gulf faultlines exposed by Iran war",k:"이란전쟁이 노출시킨 걸프의 오래된 균열과 새 균열",s:"Asia Times",c:"global",d:"2026-05-01",m:"Asia Times analysis examines how the Iran war has exposed both legacy Gulf faultlines (Saudi-Qatar, Saudi-UAE, Saudi-Oman) and new fissures over Yemen, Israel normalization, and energy policy. The OPEC exit by UAE crystallizes the divergence.",mk:"아시아타임스가 이란전쟁이 사우디-카타르·사우디-UAE·사우디-오만 등 기존 걸프 균열과 예멘·이스라엘 정상화·에너지 정책을 둘러싼 새 균열을 어떻게 동시에 노출시켰는지 분석했다. UAE의 OPEC 탈퇴가 분기점을 상징한다.",tg:["걸프","사우디","UAE"],u:"https://asiatimes.com/2026/05/old-and-new-gulf-faultlines-exposed-by-iran-war/"},
    {id:1589,p:7,r:"심층분석",t:"Iran Conflict Brief: Why the UAE Is Leaving OPEC Now",k:"콜럼비아 CGEP &quot;UAE가 지금 OPEC을 떠나는 이유&quot;",s:"CGEP",c:"global",d:"2026-04-29",m:"Columbia&apos;s Center on Global Energy Policy examines why UAE chose this moment for OPEC exit, citing accumulated production-quota frustration, post-war strategic recalculation, alignment with Trump admin&apos;s anti-OPEC stance, and pivot to non-oil GDP.",mk:"콜럼비아 글로벌에너지정책센터(CGEP)가 UAE의 OPEC 탈퇴 시점에 대해 누적된 생산 쿼터 불만·전후 전략 재계산·트럼프 행정부 반(反)OPEC 기조와의 정렬·비석유 GDP 전환이라는 4가지 요인을 들어 분석했다.",tg:["UAE","OPEC","CGEP"],u:"https://www.energypolicy.columbia.edu/iran-conflict-brief-why-the-uae-is-leaving-opec-now/"},
    {id:1590,p:8,r:"주요경제",t:"Saudi Arabia Set For Oil Windfall After Hormuz Boosts Prices",k:"사우디, 호르무즈 봉쇄로 유가 상승…석유 횡재 예상",s:"gCaptain",c:"global",d:"2026-05-01",m:"gCaptain reports Saudi Arabia is set for an oil revenue windfall as Hormuz disruption boosts prices and Riyadh diverts exports via the Red Sea. Goldman Sachs estimates Saudi weekly oil revenue rose 10% relative to pre-war levels.",mk:"gCaptain은 호르무즈 봉쇄로 유가가 상승하고 사우디가 홍해 우회 수출을 늘리면서 사우디가 석유 수익 횡재를 누릴 전망이라고 보도했다. 골드만삭스는 전쟁 전 대비 사우디 주간 원유 수익이 10% 증가했다고 추정했다.",tg:["사우디","호르무즈","수익"],u:"https://gcaptain.com/saudi-arabia-set-for-oil-windfall-after-hormuz-boosts-prices/"},
    {id:1591,p:7,r:"속보",t:"Iran threatens shipping in Gulf, Red Sea; Trump&apos;s Strait of Hormuz blockade continues",k:"이란, 걸프·홍해 선박 위협…트럼프의 호르무즈 봉쇄 지속",s:"NBC News",c:"global",d:"2026-05-01",m:"NBC News live blog reports Iran threatens shipping in the Gulf and Red Sea while Trump&apos;s Strait of Hormuz blockade continues, escalating concerns over global maritime security and energy supply chains.",mk:"NBC뉴스 라이브 블로그는 이란이 걸프·홍해 선박을 위협하는 가운데 트럼프 대통령의 호르무즈 해협 봉쇄가 지속되며 글로벌 해상 안보와 에너지 공급망에 대한 우려가 커지고 있다고 전했다.",tg:["이란","트럼프","해상"],u:"https://www.nbcnews.com/world/iran/live-blog/live-updates-us-blockade-iran-hormuz-trump-peace-talks-rcna331890"},
    {id:1592,p:8,r:"속보",t:"&quot;UAE OPEC 탈퇴는 강훈식 특사단이 가져온 &apos;원유 우선권&apos; 실익 커질 듯&quot;",k:"&quot;UAE OPEC 탈퇴는 강훈식 특사단 &apos;원유 우선권&apos; 실익 커질 듯&quot;",s:"뉴스핌",c:"korean-view",d:"2026-04-30",m:"Newspim analysis says UAE&apos;s OPEC exit may amplify the practical benefits of the &apos;crude priority&apos; commitment Korea&apos;s envoy Kang Hoon-shik secured from UAE, making Korea a preferred buyer as UAE accelerates production growth.",mk:"뉴스핌은 UAE의 OPEC 탈퇴가 강훈식 특사단이 UAE로부터 받아낸 &apos;원유 우선 공급&apos; 약속의 실익을 키울 가능성이 높다고 분석했다. UAE의 증산 가속에 따라 한국이 우선 구매자로 위치하게 된다.",tg:["UAE","강훈식","원유"],u:"https://www.newspim.com/news/view/20260430000889"},
    {id:1593,p:8,r:"속보",t:"&quot;국제유가 폭등 &apos;임계점&apos; 4주 남았다&quot; FT",k:"파이낸셜타임스 &quot;국제유가 폭등 &apos;임계점&apos; 4주 남았다&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-05-02",m:"Financial Times warns that global crude, gasoline, diesel, and aviation fuel inventories will fall below dangerous levels by the end of May, putting prices on track for an explosive spike. Korean Financial News reported the FT analysis.",mk:"파이낸셜타임스(FT)가 글로벌 원유·휘발유·경유·항공유 재고가 5월 말까지 위험 수준 이하로 떨어져 유가가 폭등할 가능성이 임박했다고 경고했다. 파이낸셜뉴스가 FT 분석을 인용 보도했다.",tg:["FT","유가","재고"],u:"https://www.fnnews.com/news/202605020311342079"},
    {id:1594,p:9,r:"속보",t:"호르무즈 봉쇄 이후 한국 유조선 홍해 두 번째 통과…원유 운송 중",k:"호르무즈 봉쇄 이후 한국 유조선 홍해 두 번째 통과…원유 운송 중",s:"파이낸셜뉴스",c:"korean-view",d:"2026-05-03",m:"A second Korean tanker has successfully transited the Red Sea since the Hormuz closure, transporting crude oil to Korea. The route via Yanbu port is becoming a critical lifeline for Korean refiners and SK·GS·Hyundai Oilbank.",mk:"호르무즈 봉쇄 이후 한국 유조선이 두 번째로 홍해를 안전하게 통과해 원유를 한국으로 운송하고 있다. 얀부항 경유 노선은 SK·GS·현대오일뱅크 등 한국 정유사들의 핵심 생명선으로 자리잡고 있다.",tg:["홍해","유조선","원유"],u:"https://www.fnnews.com/news/202605031111585885"},
    {id:1595,p:8,r:"외교",t:"UAE &quot;호르무즈에 대한 이란의 일방적 조치 신뢰 못해&quot;",k:"UAE &quot;호르무즈에 대한 이란의 일방적 조치 신뢰 못해&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-05-01",m:"UAE officials said Iran cannot be trusted on the Strait of Hormuz, criticizing Iran&apos;s unilateral actions and demanding multilateral oversight of the strait. The position underscores deep Gulf-Iran distrust.",mk:"UAE 당국자들이 &quot;호르무즈 해협에 대한 이란의 일방적 조치를 신뢰할 수 없다&quot;며 다자 감독 체제를 요구했다. 이란에 대한 걸프의 깊은 불신을 드러낸다.",tg:["UAE","호르무즈","이란"],u:"https://www.fnnews.com/news/202605011732026466"},
    {id:1596,p:7,r:"속보",t:"호르무즈 발 묶인 선원 &quot;출항 준비만 반복…언제 풀릴지 몰라&quot;",k:"호르무즈 발 묶인 선원 &quot;출항 준비만 반복…언제 풀릴지 몰라&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-05-01",m:"Korean seafarers stranded near the Strait of Hormuz say they have repeatedly prepared for departure but the situation remains uncertain. About 161 Korean maritime workers are reportedly stranded.",mk:"호르무즈 해협 인근에 발이 묶인 한국 선원들이 &quot;출항 준비만 반복하고 있을 뿐 언제 풀릴지 모른다&quot;고 호소했다. 약 161명의 한국 해양 종사자가 발이 묶인 것으로 알려졌다.",tg:["선원","호르무즈","한국"],u:"https://www.fnnews.com/news/202605010730305237"},
  {id:1597,p:9,r:"정책발표",t:"What Phase 3 of Saudi Vision 2030 means for growth, jobs and the future",k:"사우디 비전2030 3단계가 의미하는 성장·일자리·미래",s:"Saudi Gazette",c:"saudi",d:"2026-04-28",m:"Saudi Vision 2030 enters its third and final phase in 2026, focusing on accelerating delivery, expanding the private sector role, and capitalizing on emerging growth opportunities. Unemployment fell to 7.2% by end-2025 from 12.3% in 2016, while non-oil sectors now account for 55% of GDP.",mk:"사우디 비전2030이 2026년 3단계 최종 국면에 진입했다. 실행 가속화와 민간 역할 확대에 집중한다. 실업률은 2025년 말 7.2%로 2016년 12.3%에서 하락했고 비석유 부문은 GDP의 55%를 차지한다.",tg:["비전2030","3단계","고용"],u:"https://saudigazette.com.sa/article/660947"},
  {id:1598,p:8,r:"정책발표",t:"Saudi Vision 2030 enters final phase as 93% of KPIs meet 2025 targets",k:"비전2030, KPI 93% 달성하며 최종 단계 진입",s:"Saudi Gazette",c:"saudi",d:"2026-04-27",m:"Saudi Arabia entered the third and final phase of Vision 2030 with 93% of performance indicators achieving annual targets or close to them in 2025. Real GDP exceeded SR4.9 trillion, and non-oil activities contributed 55% to GDP.",mk:"사우디아라비아가 비전2030 3단계 최종 국면에 진입했다. 2025년 KPI 93%가 연간 목표를 달성했거나 근접했다. 실질 GDP는 4.9조 리얄을 돌파했고 비석유 활동이 GDP의 55%를 기여했다.",tg:["비전2030","KPI","GDP"],u:"https://saudigazette.com.sa/article/660839"},
  {id:1599,p:8,r:"정책발표",t:"3rd phase to focus on accelerating delivery and maximizing impact with expanding private sector role",k:"비전2030 3단계, 민간 역할 확대로 실행 가속·임팩트 극대화",s:"Saudi Gazette",c:"saudi",d:"2026-04-27",m:"The third phase of Vision 2030 will focus on accelerating delivery, maximizing impact, and expanding the private sector role. SMEs have tripled since 2016 to over 1.7 million, and the private sector now contributes 51% to real GDP.",mk:"비전2030 3단계는 실행 가속화, 임팩트 극대화, 민간부문 역할 확대에 집중한다. 2016년 이후 중소기업이 3배 늘어 170만 개를 넘었고, 민간부문은 실질 GDP의 51%를 기여한다.",tg:["비전2030","민간부문","중소기업"],u:"https://saudigazette.com.sa/article/660896"},
  {id:1600,p:9,r:"주요경제",t:"Saudi Arabia opens May Sah sukuk issuance with 4.56% return",k:"사우디, 5월 사 수쿠크 4.56% 수익률로 발행",s:"Arab News",c:"saudi",d:"2026-05-04",m:"Saudi Arabia opened subscriptions for its May issuance of the government-backed Sah savings sukuk, offering an annual return of 4.56%, up from 4.50% in April. The product is open to Saudi citizens aged 18 and above through digital platforms of approved entities.",mk:"사우디가 5월 정부 발행 사(Sah) 수쿠크 청약을 개시했다. 연 수익률은 4.56%로 4월의 4.50%에서 인상됐다. 18세 이상 사우디 시민이 인가 기관 디지털 플랫폼을 통해 가입할 수 있다.",tg:["수쿠크","Sah","공공부채"],u:"https://www.arabnews.com/node/2642157/business-economy"},
  {id:1601,p:7,r:"주요경제",t:"Closing Bell: Saudi main index edges higher to 11,193",k:"사우디 TASI, 11,193으로 소폭 상승 마감",s:"Arab News",c:"saudi",d:"2026-05-04",m:"Saudi Arabia&apos;s main index TASI edged higher to close at 11,193 points. Trading volumes were also covered alongside the parallel Nomu market in the daily session report.",mk:"사우디 대표 지수 타다울(TASI)이 11,193포인트로 소폭 상승 마감했다. 거래량과 병행 시장 누무(Nomu) 동향도 함께 보도됐다.",tg:["TASI","증시"],u:"https://www.arabnews.com/node/2642177/business-economy"},
  {id:1602,p:8,r:"속보",t:"Haramain high-speed rail boosts Hajj capacity to 2.2 million seats",k:"하라마인 고속철, 하지 좌석 220만 석으로 확대",s:"Arab News",c:"saudi",d:"2026-05-04",m:"Saudi Arabia Railways (SAR) expanded capacity on the Haramain High-Speed Railway to over 2.21 million seats for the 2026 Hajj season — an 11% increase with 5,308 planned trips. Hajj transport operations begin May 5 from King Abdulaziz International Airport in Jeddah to Makkah.",mk:"사우디 철도공사(SAR)가 2026년 하지 시즌 하라마인 고속철 좌석을 221만 석 이상으로 11% 확대했다. 5,308회 운행이 예정됐고 하지 수송은 5월 5일 제다 압둘아지즈 국왕 국제공항-메카 구간에서 개시된다.",tg:["하지","하라마인","철도"],u:"https://www.arabnews.com/node/2642231/saudi-arabia"},
  {id:1603,p:9,r:"정책발표",t:"PIF board approves 2026-2030 strategy chaired by crown prince",k:"PIF 이사회, 왕세자 주재로 2026-2030 전략 승인",s:"Arab News",c:"saudi",d:"2026-04-26",m:"Saudi Arabia&apos;s Public Investment Fund Board, chaired by Crown Prince Mohammed bin Salman, approved PIF&apos;s 2026-2030 strategy. The strategy focuses on six ecosystems: NEOM, Tourism/Travel/Entertainment, Urban Development, Advanced Manufacturing, Industrials & Logistics, and Clean Energy/Water/Renewables.",mk:"사우디 PIF 이사회가 왕세자 무함마드 빈 살만 주재로 2026-2030 전략을 승인했다. 6개 에코시스템(네옴, 관광·여행·엔터, 도시개발, 첨단제조, 산업물류, 청정에너지·수자원·재생)에 집중한다.",tg:["PIF","전략","에코시스템"],u:"https://www.arabnews.com/node/2640013/business-economy"},
  {id:1604,p:8,r:"심층분석",t:"Saudi Aramco to disclose Q1 2026 results on May 10",k:"사우디 아람코, 5월 10일 1분기 실적 발표",s:"Argaam",c:"saudi",d:"2026-04-23",m:"Saudi Aramco will disclose Q1 2026 results on May 10, followed by an earnings call on May 11. Net profit is forecast to rise 13.8% YoY and 56.7% QoQ to SAR108.8 billion ($29 billion), driven by higher crude prices despite production cuts of 600,000 bpd.",mk:"사우디 아람코가 5월 10일 1분기 실적을 발표한다. 5월 11일 컨퍼런스 콜이 이어진다. 순이익은 전년동기비 13.8%, 전분기비 56.7% 증가한 1,088억 리얄(290억 달러)로 전망된다. 60만 배럴 감산에도 유가 상승이 견인했다.",tg:["아람코","실적","유가"],u:"https://www.argaam.com/en/article/articledetail/id/1898844"},
  {id:1605,p:7,r:"주요경제",t:"TASI rises 7.2% in Q1 2026; Petro Rabigh, EIC top gainers",k:"TASI 1분기 7.2% 상승…페트로 라비, EIC가 최대 상승",s:"Argaam",c:"saudi",d:"2026-04-01",m:"Saudi Arabia&apos;s Tadawul All Share Index (TASI) ended Q1 2026 up 759 points, or 7.2%, closing at 11,250 points compared to 10,491 at the end of Q4 2025. Petro Rabigh and Etihad International Communication (EIC) led gainers, while household and personal products sector rose 26%.",mk:"사우디 타다울 종합지수(TASI)가 2026년 1분기 759포인트(7.2%) 상승해 11,250포인트로 마감했다. 2025년 4분기 말 10,491포인트와 비교된다. 페트로 라비, EIC가 상승률 1,2위였고 가정용·개인용품 섹터가 26% 급등했다.",tg:["TASI","1분기","증시"],u:"https://www.argaam.com/en/article/articledetail/id/1892657"},
  {id:1610,p:8,r:"정책발표",t:"Cabinet: Saudi Vision 2030 milestones forge a stronger, diversified, and resilient economy",k:"내각: 비전2030, 더 강하고 다각화·회복력 있는 경제 구축",s:"Saudi Gazette",c:"saudi",d:"2026-04-29",m:"Saudi Cabinet declared Vision 2030 milestones have forged a stronger, more diversified, and resilient economy. Real GDP grew to SR4.9 trillion by end-2025, with the private sector contributing 51% to real GDP. The Cabinet emphasized continued momentum into Phase 3.",mk:"사우디 내각이 비전2030 성과로 더 강하고 다각화되고 회복력 있는 경제가 구축됐다고 선언했다. 2025년 말 실질 GDP가 4.9조 리얄로 성장했고 민간부문이 실질 GDP의 51%를 기여했다. 내각은 3단계로의 모멘텀 지속을 강조했다.",tg:["내각","비전2030","경제"],u:"https://saudigazette.com.sa/article/660929"},
  {id:1611,p:8,r:"심층분석",t:"PIF Governor: No projects cancelled in NEOM, spending priorities reassessed",k:"PIF 총재: 네옴 프로젝트 취소된 것 없다…지출 우선순위 재조정",s:"Al Arabiya",c:"saudi",d:"2026-04-15",m:"PIF Governor Yasir Al-Rumayyan said no projects have been cancelled in NEOM, stressing that the development is undergoing a natural reassessment of spending priorities. The project company has been directed to reorganize expenditure as priorities shift toward Oxagon and the green hydrogen plant.",mk:"PIF 총재 야시르 알루마이얀이 네옴에서 취소된 프로젝트는 없다며 지출 우선순위의 자연스러운 재평가가 진행 중이라고 강조했다. 프로젝트 회사는 옥사곤과 녹색수소 플랜트로 우선순위가 이동하면서 지출을 재구성하라는 지시를 받았다.",tg:["PIF","네옴","지출"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/15/pif-s-alrumayyan-says-no-neom-projects-cancelled-spending-priorities-reassessed"},
  {id:1612,p:7,r:"심층분석",t:"How Saudi Arabia is repositioning Neom as key logistics hub and economic anchor",k:"사우디, 네옴을 핵심 물류 허브·경제 앵커로 재포지셔닝",s:"The National",c:"saudi",d:"2026-04-17",m:"Saudi Arabia is repositioning Neom as a Red Sea logistics hub, anchoring non-oil growth and offering alternatives to Hormuz-dependent routes. Oxagon&apos;s green hydrogen plant is 80% complete, and a $5 billion data center partnership with DataVolt signals a strategic pivot toward AI infrastructure.",mk:"사우디가 네옴을 홍해 물류 허브로 재포지셔닝하고 있다. 비석유 성장의 닻이자 호르무즈 의존 노선의 대안 제공이 목표다. 옥사곤의 녹색수소 플랜트는 80% 완공됐고 데이터볼트와 50억 달러 데이터센터 파트너십은 AI 인프라로의 전략적 전환을 시사한다.",tg:["네옴","물류","옥사곤"],u:"https://www.thenationalnews.com/business/economy/2026/04/17/how-saudi-arabia-is-repositioning-neom-as-key-logistics-hub-and-economic-anchor/"},
  {id:1614,p:8,r:"주요경제",t:"Adnoc unveils Dh55 billion expansion plan between 2026 and 2028",k:"아드녹, 2026-2028 550억 디르함 확장 계획 공개",s:"Khaleej Times",c:"gulf",d:"2026-04-25",m:"Abu Dhabi National Oil Company (Adnoc) unveiled plans to award Dh200 billion ($55 billion) worth of projects between 2026 and 2028, signalling a new execution phase in its multi-year capital expenditure programme. The pipeline connects top EPC contractors with 70 qualified Emirati manufacturers under the new Local+ initiative.",mk:"아부다비 국영석유회사(아드녹)가 2026-2028년 사이 2,000억 디르함(550억 달러) 규모의 프로젝트 발주 계획을 공개했다. 다년 자본지출 프로그램의 새로운 실행 단계를 알린다. Local+ 이니셔티브로 70개 인증 에미리트 제조업체를 EPC 컨트랙터와 연결한다.",tg:["아드녹","UAE","투자"],u:"https://www.khaleejtimes.com/business/energy/adnoc-unveils-dh55-billion-expansion-plan-between-2026-and-2028"},
  {id:1615,p:7,r:"심층분석",t:"Investing in UAE is no longer optional, Adnoc CEO tells private sector",k:"아드녹 CEO: UAE 투자는 더 이상 선택 아닌 국가 우선순위",s:"Khaleej Times",c:"gulf",d:"2026-04-21",m:"Adnoc CEO Sultan Al Jaber told private sector that investing at home is no longer an option but a national priority. The remarks at the largest edition of Make it in the Emirates emphasized strengthening economic sovereignty, local manufacturing, and industrial resilience.",mk:"아드녹 CEO 술탄 알 자베르가 민간부문에 국내 투자는 더 이상 선택이 아닌 국가 우선순위라고 밝혔다. 역대 최대 메이크 잇 인 더 에미리츠 행사에서 경제 주권, 현지 제조, 산업 회복력 강화를 강조했다.",tg:["아드녹","UAE","투자"],u:"https://www.khaleejtimes.com/business/energy/investing-uae-national-priority-adnoc-ceo-tells-private-sector"},
  {id:1616,p:7,r:"주요경제",t:"UAE economic expansion set to scale new highs in 2026",k:"UAE 경제, 2026년 새 정점 향해 확장세",s:"Khaleej Times",c:"gulf",d:"2026-04-20",m:"Standard Chartered upgraded its UAE 2026 GDP growth forecast to 5.0%, a sharp increase from the earlier 4.0% projection. Non-hydrocarbon growth, fintech, AI, and continued real estate investment are expected to underpin the expansion.",mk:"스탠다드차타드가 UAE 2026년 GDP 성장 전망을 4.0%에서 5.0%로 대폭 상향 조정했다. 비석유 성장, 핀테크, AI, 부동산 투자 지속이 확장세를 뒷받침할 전망이다.",tg:["UAE","GDP","StanChart"],u:"https://www.khaleejtimes.com/business/economy/uae-economic-expansion-set-to-scale-new-highs-in-2026"},
  {id:1619,p:9,r:"헤드라인",t:"OPEC+ announces symbolic oil output rise during Strait of Hormuz closure",k:"OPEC+, 호르무즈 봉쇄 와중 상징적 증산 발표",s:"Al Jazeera",c:"me",d:"2026-05-03",m:"OPEC+ agreed to a modest, largely symbolic oil output increase of 188,000 bpd for June. With UAE&apos;s exit, only seven members participated. The increase is largely symbolic given Hormuz disruptions throttling exports from Saudi Arabia, Iraq, and Kuwait.",mk:"OPEC+가 6월 일일 18만 8천 배럴의 소폭, 상징적 증산에 합의했다. UAE 탈퇴로 7개국만 참여했다. 호르무즈 차질로 사우디·이라크·쿠웨이트 수출이 묶인 가운데 실질적 영향은 제한적이다.",tg:["OPEC+","증산","호르무즈"],u:"https://www.aljazeera.com/news/2026/5/3/opec-announces-symbolic-oil-output-rise-during-strait-of-hormuz-closure"},
  {id:1620,p:9,r:"헤드라인",t:"What is Iran&apos;s 14-point proposal to end the war? And will Trump accept it?",k:"이란의 14개 항목 종전 제안…트럼프는 수용할까?",s:"Al Jazeera",c:"me",d:"2026-05-03",m:"Iran submitted a 14-point peace proposal via Pakistan that calls for ending the war on all fronts within 30 days, reopening the Strait of Hormuz, and deferring nuclear talks. Trump said he was not satisfied with the offer.",mk:"이란이 파키스탄을 통해 14개 항목 평화 제안을 제출했다. 30일 내 모든 전선 종전, 호르무즈 재개통, 핵 협상은 후순위 등이 골자다. 트럼프는 만족하지 않는다고 답했다.",tg:["이란","평화제안","14개항"],u:"https://www.aljazeera.com/news/2026/5/3/whats-irans-14-point-proposal-to-end-the-war-and-will-trump-accept-it"},
  {id:1625,p:10,r:"헤드라인",t:"OPEC+ announces 188,000 barrels-per-day output increase in first meeting without UAE",k:"OPEC+, UAE 없는 첫 회의서 일 18만 8천 배럴 증산",s:"CNBC",c:"global",d:"2026-05-03",m:"OPEC+ announced a 188,000 barrels-per-day production increase for June at its first meeting without the UAE, which formally exited May 1. The seven remaining producers — Saudi Arabia, Russia, Iraq, Kuwait, Kazakhstan, Algeria, Oman — will share the modest hike.",mk:"OPEC+가 5월 1일 공식 탈퇴한 UAE 없이 첫 회의에서 6월 일일 18만 8천 배럴 증산을 발표했다. 사우디, 러시아, 이라크, 쿠웨이트, 카자흐스탄, 알제리, 오만 등 잔류 7개국이 소폭 증산을 분담한다.",tg:["OPEC+","UAE","증산"],u:"https://www.cnbc.com/2026/05/03/opec-announces-188000-barrels-per-day-output-increase-.html"},
  {id:1626,p:9,r:"주요경제",t:"US crude oil exports surge to record as tankers flock to Gulf Coast during Iran war",k:"美 원유 수출 사상 최대…이란전에 유조선 걸프 코스트로 몰려",s:"CNBC",c:"global",d:"2026-05-03",m:"US crude oil exports surged to a record 5.2 million barrels per day in April, according to Kpler data. Asian buyers and others sought US crude as alternative to Middle East supplies lost during the Iran war.",mk:"Kpler 데이터에 따르면 미국 원유 수출이 4월 일 520만 배럴로 사상 최대를 기록했다. 아시아 등 구매자들이 이란전으로 잃은 중동 공급을 대체하기 위해 미국 원유를 찾았다.",tg:["미국","원유수출","대체공급"],u:"https://www.cnbc.com/2026/05/03/us-crude-oil-exports-surge-to-record-as-tankers-flock-to-gulf-coast.html"},
  {id:1627,p:9,r:"헤드라인",t:"Trump says he is likely to reject Iran peace proposal as Tehran has not yet paid a big enough price",k:"트럼프: 이란 충분한 대가 안 치러…평화 제안 거부 시사",s:"CNBC",c:"global",d:"2026-05-03",m:"President Trump said he is likely to reject Iran&apos;s latest peace proposal, saying Tehran has not yet paid a big enough price. Trump said the US received Iran&apos;s response and is reviewing the new proposal but appeared inclined to dismiss it.",mk:"트럼프 대통령이 이란이 아직 충분한 대가를 치르지 않았다며 최신 평화 제안 거부 가능성을 시사했다. 트럼프는 이란의 응답을 받고 검토 중이지만 일축할 의향을 드러냈다.",tg:["트럼프","이란","평화제안"],u:"https://www.cnbc.com/2026/05/03/trump-iran-war-peace-proposal.html"},
  {id:1629,p:9,r:"헤드라인",t:"Latest Oil Market News and Analysis for May 4",k:"5월 4일 오일 시장 뉴스·분석 종합",s:"Bloomberg",c:"global",d:"2026-05-03",m:"Brent was little changed above $108 a barrel and WTI near $102 as traders questioned Trump&apos;s plan to guide neutral ships out through the Strait of Hormuz, after a tanker was reportedly hit in the waterway.",mk:"브렌트유는 배럴당 108달러 이상으로 큰 변동 없었고 WTI는 102달러 부근이었다. 트레이더들은 호르무즈 해협에서 유조선이 피격됐다는 보도 후 트럼프의 중립 선박 호송 계획의 실효성에 의문을 표했다.",tg:["오일시장","브렌트","호르무즈"],u:"https://www.bloomberg.com/news/articles/2026-05-03/latest-oil-market-news-and-analysis-for-may-4"},
  {id:1630,p:8,r:"주요경제",t:"Latest Oil Market News and Analysis for May 1",k:"5월 1일 오일 시장 뉴스·분석 종합",s:"Bloomberg",c:"global",d:"2026-04-30",m:"Bloomberg&apos;s daily oil market wrap covered Brent&apos;s continued elevated levels above $115/bbl, as the Hormuz blockade and OPEC+ pre-meeting positioning shaped market sentiment heading into the May 3 OPEC+ ministerial.",mk:"블룸버그의 일일 오일 시장 정리. 브렌트유는 호르무즈 봉쇄와 OPEC+ 사전 포지셔닝이 5월 3일 OPEC+ 장관급 회의 직전 시장 심리를 형성하면서 배럴당 115달러 이상의 고공 행진을 이어갔다.",tg:["오일시장","브렌트","OPEC+"],u:"https://www.bloomberg.com/news/articles/2026-04-30/latest-oil-market-news-and-analysis-for-may-1"},
  {id:1631,p:9,r:"헤드라인",t:"Day 65 of Middle East conflict — Trump says US having very positive discussions with Iran",k:"중동 갈등 65일째…트럼프: 이란과 매우 긍정적 협의 중",s:"CNN",c:"global",d:"2026-05-03",m:"On Day 65 of the Middle East conflict, Trump said the US is having very positive discussions with Iran, even as he simultaneously rejected Iran&apos;s 14-point peace proposal. Live updates noted continued Lebanon-Israel skirmishes despite the declared ceasefire extension.",mk:"중동 갈등 65일째, 트럼프가 미국이 이란과 매우 긍정적 협의 중이라고 밝혔다. 동시에 이란의 14개 항목 평화 제안을 거부했다. 라이브 업데이트는 휴전 연장 선언에도 레바논-이스라엘 교전이 지속됐다고 전했다.",tg:["중동","이란","트럼프"],u:"https://www.cnn.com/2026/05/03/world/live-news/iran-war-news"},
  {id:1632,p:8,r:"심층분석",t:"The weirdest aspect of the Iran war that has befuddled oil experts",k:"이란전의 가장 이상한 측면…오일 전문가들 당혹",s:"CNN",c:"global",d:"2026-05-01",m:"Despite the largest oil supply disruption in market history with Hormuz shut, oil prices rose less dramatically than 1970s oil shocks. Experts cite massive US shale reserves, OPEC+ spare capacity, and demand destruction as factors restraining the spike.",mk:"호르무즈 폐쇄로 시장 사상 최대 공급 차질에도 유가 상승이 1970년대 오일 쇼크보다 덜 극적이다. 전문가들은 대규모 미국 셰일 매장량, OPEC+ 잉여 생산능력, 수요 파괴가 가격 급등을 억제했다고 분석한다.",tg:["오일","이란전","셰일"],u:"https://www.cnn.com/2026/05/01/business/oil-market-price-high-low-iran"},
  {id:1633,p:9,r:"속보",t:"Trump says US will guide stranded ships from the Strait of Hormuz, starting on Monday",k:"트럼프: 월요일부터 美가 호르무즈 발묶인 선박 호송",s:"Washington Post",c:"global",d:"2026-05-03",m:"President Trump said the US will begin guiding ships through the Strait of Hormuz starting Monday, with military support including guided-missile destroyers, more than 100 aircraft, and 15,000 service members. Iran&apos;s Ebrahim Azizi warned the plan is a ceasefire violation.",mk:"트럼프 대통령이 미국이 월요일부터 호르무즈 해협을 통과하는 선박을 호송한다고 밝혔다. 유도탄 구축함, 100여 항공기, 1만 5천 병력 등 군 지원이 포함된다. 이란의 에브라힘 아지지는 휴전 위반이라고 경고했다.",tg:["트럼프","호르무즈","미군"],u:"https://www.washingtonpost.com/world/2026/05/03/iran-us-war-ceasefire-negotiations-strait/0190238c-46e9-11f1-a119-857cd2bf4fd4_story.html"},
  {id:1634,p:8,r:"주요경제",t:"Middle East War to Spark Biggest Energy Price Surge in Four Years",k:"세계은행: 중동전, 4년 만의 최대 에너지 가격 급등 촉발",s:"World Bank",c:"global",d:"2026-04-28",m:"World Bank&apos;s April 2026 Commodity Markets Outlook said Brent could average $86/bbl in 2026, up from $69/bbl in 2025, with prices potentially reaching $115/bbl if energy infrastructure damage worsens and exports remain slow to recover. Largest energy price surge in four years.",mk:"세계은행의 2026년 4월 원자재 시장 전망에 따르면 브렌트유는 2026년 평균 86달러로 2025년 69달러에서 상승할 전망이다. 에너지 인프라 피해 악화와 수출 회복 지연 시 배럴당 115달러까지 갈 수 있다. 4년 만의 최대 에너지 가격 급등이다.",tg:["세계은행","에너지","브렌트"],u:"https://www.worldbank.org/en/news/press-release/2026/04/28/commodity-markets-outlook-april-2026-press-release"},
  {id:1635,p:7,r:"주요경제",t:"Current price of oil as of May 1, 2026",k:"5월 1일 기준 오일 가격…배럴당 116달러",s:"Fortune",c:"global",d:"2026-05-01",m:"As of May 1, 2026, oil was priced at $116.10 per barrel using Brent as the benchmark. Prices remained elevated as the Hormuz blockade continues, with WTI also above $100/bbl.",mk:"2026년 5월 1일 기준 브렌트유 기준 오일 가격은 배럴당 116.10달러를 기록했다. 호르무즈 봉쇄가 계속되면서 가격이 고공 행진했고 WTI도 배럴당 100달러를 상회했다.",tg:["오일가격","브렌트","116달러"],u:"https://fortune.com/article/price-of-oil-05-01-2026/"},
  {id:1636,p:8,r:"심층분석",t:"Saudi Arabia Sets Record Premium for Flagship Crude as Hormuz Crisis Deepens",k:"사우디, 호르무즈 위기 심화에 대표 원유 사상 최대 프리미엄",s:"OilPrice.com",c:"global",d:"2026-04-06",m:"Saudi Arabia raised the price of Arab Light crude going to Asia to a premium of 19.50 dollars above the average Oman/Dubai benchmark — the highest premium in Saudi pricing history. The move reflects tight supply as Hormuz disruption continues.",mk:"사우디가 아시아행 아랍 라이트 원유 가격을 오만/두바이 평균 벤치마크 대비 배럴당 19.50달러 프리미엄으로 인상했다. 사우디 가격 책정 사상 최고 프리미엄이다. 호르무즈 차질 지속에 따른 공급 타이트함을 반영한다.",tg:["사우디","아랍라이트","프리미엄"],u:"https://oilprice.com/Latest-Energy-News/World-News/Saudi-Arabia-Sets-Record-Premium-for-Flagship-Crude-as-Hormuz-Crisis-Deepens.html"},
  {id:1637,p:9,r:"헤드라인",t:"호르무즈 막혀도, 공급망 뚫은 韓기업 저력",k:"호르무즈 막혀도, 공급망 뚫은 韓기업 저력",s:"머니투데이",c:"korean-view",d:"2026-05-04",m:"Korean companies have demonstrated resilience by diversifying crude oil sourcing despite the Hormuz blockade. Refiners SK, GS, and Hyundai Oilbank have secured Red Sea routing via Yanbu port, while Middle East import dependence dropped to 56% in May from 69% earlier.",mk:"호르무즈 봉쇄에도 한국 기업들이 원유 다변화로 저력을 보였다. SK·GS·현대오일뱅크 정유사는 얀부항을 통한 홍해 우회 노선을 확보했고, 5월 중동 의존도는 기존 69%에서 56%로 13%포인트 하락했다.",tg:["공급망","한국기업","호르무즈"],u:"https://www.mt.co.kr/industry/2026/05/04/2026050319582743665"},
  {id:1638,p:8,r:"속보",t:"호르무즈 열린다…1400만배럴, 4.8일분 원유 국내로",k:"호르무즈 열린다…1400만 배럴, 4.8일분 원유 국내로",s:"헤럴드경제",c:"korean-view",d:"2026-04-28",m:"Approximately 14 million barrels (4.8 days of consumption) of crude oil that had been held near the Strait of Hormuz on 7 Korean refiner tankers will arrive in Korea in May, joining the 60 million barrels of alternative supply already secured for the month.",mk:"호르무즈 해협 인근에 묶여 있던 국내 정유사 유조선 7척의 약 1,400만 배럴(소비 4.8일분) 원유가 5월 중 국내에 도달한다. 5월 대체 도입 물량 6,000만 배럴과 합산되며 5월 확보량은 약 7,400만 배럴로 늘어난다.",tg:["호르무즈","1400만배럴","정유"],u:"https://biz.heraldcorp.com/article/10712454"},
  {id:1639,p:8,r:"정책발표",t:"정부, 정유사 원유스왑 7월까지 연장 검토…중동전쟁 장기화에 진땀",k:"정부, 정유사 원유스왑 7월까지 연장 검토…중동전쟁 장기화에 진땀",s:"뉴스핌",c:"korean-view",d:"2026-04-30",m:"Korea&apos;s industry ministry is considering extending the strategic petroleum reserve swap program for refiners from May to July, as the Middle East war drags on. April swap volume was 14.77 million barrels, with 16 million more applied for May.",mk:"산업통상자원부가 중동전쟁 장기화에 따라 정유사 비축유 스왑(단기대여) 기간을 5월에서 7월까지 연장하는 방안을 검토 중이다. 4월 스왑 실적은 1,477만 배럴이었고 5월에는 1,600만 배럴 신청이 들어왔다.",tg:["비축유","스왑","정유사"],u:"https://www.newspim.com/news/view/20260430000620"},
  {id:1640,p:8,r:"속보",t:"중동 발주 가뭄에 해외건설 수주 비상…3월 수주액 전년比 76% 줄어",k:"중동 발주 가뭄에 해외건설 수주 비상…3월 수주액 전년比 76% 감소",s:"뉴스핌",c:"korean-view",d:"2026-04-30",m:"Korean overseas construction orders plunged 76% YoY in March 2026 due to the Middle East war and order drought. April Middle East orders totaled only 30 million dollars (3.7%), as conflict-driven project delays and reduced new orders weighed on the regional construction market.",mk:"중동 발주 가뭄과 전쟁 여파로 한국 해외건설 수주액이 2026년 3월 전년 동기 대비 76% 급감했다. 4월 중동 수주는 2,997만 6천 달러(3.7%)에 그쳤다. 갈등에 따른 사업 지연과 신규 발주 축소가 지역 건설 시장을 위축시켰다.",tg:["해외건설","중동","발주가뭄"],u:"https://www.newspim.com/news/view/20260430001322"},
  {id:1641,p:7,r:"심층분석",t:"[정책의속살] 유조선 호르무즈 탈출했는데 7일간 상황파악도 못한 정부",k:"[정책의속살] 유조선 호르무즈 탈출했는데 7일간 상황파악도 못한 정부",s:"뉴스핌",c:"korean-view",d:"2026-04-22",m:"Newspim&apos;s analysis points out that despite Korean tankers escaping Hormuz, the government failed to grasp the situation for 7 days. The piece criticizes maritime ministry&apos;s coordination gap during the energy security emergency.",mk:"뉴스핌 분석에 따르면 한국 유조선이 호르무즈를 탈출했음에도 정부는 7일간 상황 파악도 하지 못했다. 에너지 안보 비상 시 해양수산부의 조정 공백을 비판하는 기사다.",tg:["정부대응","유조선","호르무즈"],u:"https://www.newspim.com/news/view/20260422000607"},
  {id:1642,p:8,r:"속보",t:"호르무즈 봉쇄 후 한국 유조선 두 번째 홍해 통과",k:"호르무즈 봉쇄 후 한국 유조선 두 번째 홍해 통과",s:"서울신문",c:"korean-view",d:"2026-05-03",m:"Korean Maritime Affairs Ministry confirmed a second Korean tanker passed through the Red Sea after the Hormuz closure as of 10am May 3, transporting about 2 million barrels of crude oil to Korea via the Yanbu port route.",mk:"해양수산부가 5월 3일 오전 10시 기준 한국 선박이 호르무즈 봉쇄 이후 두 번째로 홍해를 통과했다고 확인했다. 얀부항 경유 노선으로 약 200만 배럴의 원유를 한국으로 운송 중이다.",tg:["홍해","유조선","두번째"],u:"https://www.seoul.co.kr/news/economy/2026/05/03/20260503500030"},
  {id:1643,p:8,r:"속보",t:"OPEC+ 7개국, 6월부터 원유 증산 합의",k:"OPEC+ 7개국, 6월부터 일 18만 8천 배럴 원유 증산 합의",s:"세계일보",c:"korean-view",d:"2026-05-03",m:"Seven OPEC+ countries (Saudi Arabia, Russia, Iraq, Kuwait, Kazakhstan, Algeria, Oman) agreed on May 3 to a production adjustment of 188,000 bpd starting in June 2026 — the third quota hike since the Hormuz closure. UAE, having quit OPEC+, was not mentioned.",mk:"OPEC+ 7개국(사우디·러시아·이라크·쿠웨이트·카자흐스탄·알제리·오만)이 5월 3일 6월부터 일 18만 8천 배럴 증산에 합의했다. 호르무즈 봉쇄 이후 세 번째 쿼터 인상이다. OPEC+ 탈퇴한 UAE는 언급되지 않았다.",tg:["OPEC+","증산","6월"],u:"https://segye.com/newsView/20260503510596"}
,
  {id:1644,p:7,r:"속보",t:"Saudi project clears 1,009 explosive devices in Yemen",k:"사우디 마스암 프로젝트, 예멘서 1,009발 폭발물 제거",s:"Arab News",c:"saudi",d:"2026-05-04",m:"Saudi Arabia&apos;s Project Masam cleared 1,009 explosive devices in Yemen during the past week, including landmines, unexploded ordnance, and explosively formed projectiles. The total number of mines cleared since the project began has reached over 525,000.",mk:"사우디 마스암 프로젝트가 지난주 예멘에서 지뢰, 불발탄, 성형작약탄 등 1,009발의 폭발물을 제거했다. 프로젝트 출범 이후 누적 제거량은 52만 5천 발을 넘어섰다.",tg:["예멘","마스암","지뢰"],u:"https://www.arabnews.com/node/2642203/saudi-arabia"},
  {id:1645,p:7,r:"정책발표",t:"Ministry of Industry issues 29 new mining licenses in Jan 2026",k:"산업부, 1월 신규 광업 라이선스 29건 발급",s:"Arab News",c:"saudi",d:"2026-04-15",m:"Saudi Arabia&apos;s Ministry of Industry and Mineral Resources issued 29 new mining licenses in January 2026 covering 24 companies, signaling continued sector expansion. Total licenses issued reached 297, with cumulative investment in the mining sector accelerating under Vision 2030 plans.",mk:"사우디 산업광물부가 2026년 1월 24개 기업을 대상으로 광업 라이선스 29건을 신규 발급했다. 누적 라이선스는 297건에 이르렀고 비전2030에 따라 광업 부문 투자가 가속화되고 있다.",tg:["광업","라이선스","산업부"],u:"https://www.arabnews.com/node/2635786/amp"},
  {id:1646,p:7,r:"정책발표",t:"SFDA finalizes comprehensive operational plan to ensure hassle-free Hajj",k:"SFDA, 원활한 하지 위한 종합 운영계획 확정",s:"Saudi Gazette",c:"saudi",d:"2026-05-02",m:"The Saudi Food and Drug Authority finalized a comprehensive integrated operational plan for the 2026 Hajj season, covering food safety, pharmaceutical oversight, and medical device regulation across pilgrim routes and accommodation sites.",mk:"사우디 식약처(SFDA)가 2026년 하지 시즌을 위한 종합 통합 운영계획을 확정했다. 순례자 경로와 숙박 시설 전반에서 식품 안전, 의약품 감독, 의료기기 규제를 다룬다.",tg:["SFDA","하지","식약처"],u:"https://saudigazette.com.sa/article/660986/saudi-arabia/sfda-finalizes-comprehensive-operational-plan-to-ensure-hassle-free-hajj"},
  {id:1647,p:7,r:"정책발표",t:"Municipalities Ministry announces readiness of Hajj operational plan with over 22,000 personnel",k:"시정부부, 하지 운영계획 완료…2만 2천 인력 투입",s:"Saudi Gazette",c:"saudi",d:"2026-05-03",m:"Saudi Arabia&apos;s Ministry of Municipalities and Housing announced full readiness of its Hajj 2026 operational and service plan, deploying over 22,000 personnel across pilgrim routes. The integrated approach covers cleaning, sanitation, and infrastructure support during the season.",mk:"사우디 시정부주택부가 2026년 하지 운영·서비스 계획을 완료하고 순례자 경로에 2만 2천 명 이상의 인력을 배치한다고 발표했다. 시즌 중 청소, 위생, 인프라 지원이 통합적으로 제공된다.",tg:["하지","시정부부","인력"],u:"https://saudigazette.com.sa/article/661042/saudi-arabia/municipalities-ministry-announces-readiness-of-hajj-operational-plan-with-deploying-over-22000-personnel"},
  {id:1648,p:7,r:"속보",t:"Dubai Police say criminal, disturbing reports decline in first quarter of 2026",k:"두바이 경찰: 1분기 범죄·소요 신고 감소",s:"Khaleej Times",c:"gulf",d:"2026-04-25",m:"Dubai Police recorded a decline in criminal and disturbing reports during the first quarter of 2026 compared to the same period last year, even as the wider region experienced wartime stresses. Officials credited prevention programs and AI-driven monitoring.",mk:"두바이 경찰이 2026년 1분기 범죄·소요 신고가 전년 동기 대비 감소했다고 발표했다. 광범위한 지역이 전시 긴장 속에서도 예방 프로그램과 AI 기반 모니터링 덕분이라고 설명했다.",tg:["두바이","경찰","범죄"],u:"https://www.khaleejtimes.com/uae/dubai-police-say-criminal-disturbing-reports-decline-in-first-quarter-of-2026"},
  {id:1649,p:7,r:"주요경제",t:"UAE announces fuel prices: How much will a full tank cost in May 2026?",k:"UAE 5월 연료가격 발표…풀 탱크 비용 인상",s:"Khaleej Times",c:"gulf",d:"2026-04-30",m:"UAE Super 98 petrol will cost Dh3.66/liter in May 2026, compared to Dh3.39 in April. Special 95 will be Dh3.55/liter, up from Dh3.28. Filling a full tank will cost Dh13.77 to Dh20.72 more than April depending on vehicle type.",mk:"UAE 5월 슈퍼98 휘발유 가격이 4월 3.39디르함에서 3.66디르함으로 인상됐다. 스페셜95는 3.28디르함에서 3.55디르함으로 올랐다. 차량 종류별로 풀 탱크 비용이 4월 대비 13.77~20.72디르함 더 든다.",tg:["UAE","연료","휘발유"],u:"https://www.khaleejtimes.com/business/energy/uae-fuel-prices-full-tank-cost-may-2026"},
  {id:1650,p:7,r:"정책발표",t:"Dubai updates two-year residency visa rule for property investors",k:"두바이, 부동산 투자자 2년 거주 비자 규정 개정",s:"Khaleej Times",c:"gulf",d:"2026-04-22",m:"Dubai authorities revised conditions for the two-year property-linked residency permit, removing the minimum property value requirement for sole owners and relaxing conditions for jointly-owned properties. The change aims to broaden investor eligibility.",mk:"두바이 당국이 2년 부동산 연계 거주허가증 조건을 개정해 단독 소유자의 최저 부동산 가치 요건을 폐지하고 공동 소유 부동산 조건도 완화했다. 투자자 자격 확대가 목표다.",tg:["두바이","비자","부동산"],u:"https://www.khaleejtimes.com/life-and-living/visa-and-immigration-in-uae/dubai-property-investor-visa-rules-removes-minimum-property-value-requirement"},
  {id:1651,p:8,r:"외교",t:"Israel rejects ceasefire with Hezbollah ahead of Lebanon talks next week",k:"이스라엘, 다음주 레바논 협상 앞두고 헤즈볼라 휴전 거부",s:"Al Jazeera",c:"me",d:"2026-04-11",m:"Israel rejected a ceasefire with Hezbollah ahead of Lebanon talks scheduled for the following week, even as US and Pakistani mediators pushed both sides toward a broader regional truce. The IDF said it would only consider a comprehensive deal that included Hezbollah disarmament.",mk:"이스라엘이 다음주 예정된 레바논 협상에 앞서 헤즈볼라와의 휴전을 거부했다. 미국과 파키스탄 중재자들이 광범위한 지역 휴전을 압박하는 가운데, IDF는 헤즈볼라 무장해제를 포함한 포괄적 합의만 고려한다고 밝혔다.",tg:["이스라엘","헤즈볼라","레바논"],u:"https://www.aljazeera.com/news/2026/4/11/israel-rejects-ceasefire-with-hezbollah-ahead-of-lebanon-talks-next-week"},
  {id:1652,p:8,r:"외교",t:"Does Israel&apos;s Yellow Line violate the Lebanon ceasefire?",k:"이스라엘의 옐로 라인은 레바논 휴전 위반인가?",s:"Al Jazeera",c:"me",d:"2026-04-19",m:"Al Jazeera analyzes whether Israel&apos;s so-called Yellow Line — a buffer zone established in southern Lebanon — violates the terms of the April 16 ceasefire. Critics say the line effectively annexes Lebanese territory while Israel argues it is a security necessity.",mk:"알자지라가 이스라엘이 남부 레바논에 설치한 이른바 옐로 라인 완충지대가 4월 16일 휴전 조건을 위반하는지 분석했다. 비판론자들은 사실상 레바논 영토 합병이라고 주장하나 이스라엘은 안보상 필요라고 반박한다.",tg:["옐로라인","레바논","휴전"],u:"https://www.aljazeera.com/news/2026/4/19/does-israels-yellow-line-violate-the-lebanon-ceasefire"},
  {id:1653,p:7,r:"외교",t:"What we know about the Israel-Lebanon ceasefire",k:"이스라엘-레바논 휴전, 우리가 아는 모든 것",s:"Al Jazeera",c:"me",d:"2026-04-17",m:"Al Jazeera explainer outlines the April 16 Israel-Lebanon ceasefire, the four-week initial term, US-Pakistani mediation, and key disputes including Lebanon&apos;s inclusion in the wider Iran ceasefire framework, Hezbollah&apos;s status, and the buffer zone.",mk:"알자지라가 4월 16일 이스라엘-레바논 휴전, 4주 초기 기간, 미·파키스탄 중재, 광범위한 이란 휴전 틀에서의 레바논 포함 여부, 헤즈볼라의 지위, 완충지대 등 핵심 쟁점을 정리했다.",tg:["휴전","레바논","이스라엘"],u:"https://www.aljazeera.com/news/2026/4/17/what-we-know-about-the-israel-lebanon-ceasefire"},
  {id:1654,p:7,r:"외교",t:"Pakistan sends fighter jets to Saudi Arabia amid fragile US-Iran ceasefire",k:"파키스탄, 미·이란 취약 휴전 가운데 사우디로 전투기 파견",s:"Al Jazeera",c:"me",d:"2026-04-11",m:"Pakistan sent fighter jets to Saudi Arabia amid the fragile US-Iran ceasefire as part of its longstanding defense commitments. The deployment also reflects Islamabad&apos;s role as mediator and Riyadh&apos;s continued security concerns over Iranian retaliation risk.",mk:"파키스탄이 미·이란 취약 휴전 가운데 오랜 방위 공약의 일환으로 사우디아라비아에 전투기를 파견했다. 이슬라마바드의 중재자 역할과 리야드의 이란 보복 위험에 대한 안보 우려를 동시에 반영한다.",tg:["파키스탄","사우디","전투기"],u:"https://www.aljazeera.com/news/2026/4/11/pakistan-sends-fighter-jets-to-saudi-arabia-amid-fragile-us-iran-ceasefire"},
  {id:1655,p:8,r:"심층분석",t:"ZAWYA: Saudi Aramco Q1 2026 profit forecast to rise on higher oil prices",k:"자우야: 사우디 아람코 1분기 이익 전망, 유가 상승에 증가",s:"Reuters",c:"global",d:"2026-04-23",m:"Reuters/Zawya report says Saudi Aramco&apos;s Q1 2026 net profit is forecast to rise on higher oil prices. AlJazira Capital estimates net profit at SAR108.8 billion ($29 billion), up 13.8% YoY and 56.7% QoQ, despite production cuts of 600,000 bpd.",mk:"로이터/자우야 보도에 따르면 사우디 아람코의 2026년 1분기 순이익은 유가 상승에 힘입어 증가할 전망이다. 알자지라 캐피털은 60만 배럴 감산에도 불구 순이익을 1,088억 리얄(290억 달러)로 추정했다(전년동기비 +13.8%, 전분기비 +56.7%).",tg:["아람코","로이터","Q1"],u:"https://www.reuters.com/business/energy/saudi-aramco-q1-2026-profit-forecast-rise-higher-oil-prices-2026-04-23/"},
  {id:1656,p:8,r:"주요경제",t:"Saudi GDP grows 2.8% in Q1 2026, driven by non-oil sector",k:"사우디 1분기 GDP 2.8% 성장, 비석유 부문이 견인",s:"Saudi Gazette",c:"saudi",d:"2026-04-30",m:"Saudi Arabia&apos;s GDP grew 2.8% year-on-year in Q1 2026, driven by non-oil activities expansion. The result reflects Vision 2030 diversification gains even as oil production was disrupted by the Iran war.",mk:"사우디 GDP가 2026년 1분기 전년동기비 2.8% 성장하며 비석유 부문이 견인했다. 이란 전쟁으로 원유 생산이 차질을 빚는 가운데서도 비전2030 다각화 성과를 보여준다.",tg:["GDP","비석유","비전2030"],u:"https://saudigazette.com.sa/article/660978/saudi-arabia/saudi-gdp-grows-28-in-q1-2026-driven-by-non-oil-sector"},
  {id:1657,p:7,r:"정책발표",t:"Saudi Environment Week 2026 highlights a year of environmental progress",k:"사우디 환경주간 2026, 1년간의 환경 진전 조명",s:"Arab News",c:"saudi",d:"2026-05-03",m:"Saudi Environment Week (May 3-9, 2026) opened under the theme &quot;Green Impact,&quot; highlighting environmental progress through stronger governance, expanding protected areas, increased recycling and restoration programs across the Kingdom.",mk:"&apos;그린 임팩트&apos;를 주제로 5월 3-9일 개막한 사우디 환경주간은 거버넌스 강화, 보호구역 확대, 재활용·복원 프로그램 등 1년간의 환경 진전을 조명한다.",tg:["환경","지속가능성","비전2030"],u:"https://www.arabnews.com/node/2642301/saudi-arabia"},
  {id:1658,p:8,r:"주요경제",t:"Saudi mining licenses jump 220% as investments hit $11.7bn in 2025",k:"사우디 광업 라이선스 220% 급증, 2025년 투자 117억 달러",s:"Arab News",c:"saudi",d:"2026-05-02",m:"Saudi Arabia&apos;s mining sector recorded unprecedented growth in 2025: exploitation licenses soared 220%, and total investments climbed to SR44 billion ($11.7 billion), reflecting Vision 2030&apos;s push to diversify away from oil.",mk:"사우디 광업 부문이 2025년 채굴 라이선스 220% 급증, 총 투자액 440억 리얄(117억 달러)로 사상 최대 성장을 기록했다. 비전2030의 탈석유 다각화 동력이다.",tg:["광업","비전2030","투자"],u:"https://www.arabnews.com/node/2642263/business-economy"},
  {id:1659,p:10,r:"헤드라인",t:"Saudi crown prince condemns attacks on UAE in call with Sheikh Mohammed bin Zayed",k:"사우디 왕세자, UAE 모하메드 빈 자이드 대통령과 통화…UAE 공격 규탄",s:"Arab News",c:"saudi",d:"2026-05-04",m:"Saudi Crown Prince Mohammed bin Salman held a phone call with UAE President Sheikh Mohammed bin Zayed, condemning Iranian attacks on the UAE and reaffirming Saudi support for UAE security and stability.",mk:"무함마드 빈 살만 사우디 왕세자가 UAE 모하메드 빈 자이드 대통령과 통화에서 이란의 UAE 공격을 규탄하고 UAE의 안보·안정에 대한 사우디의 지지를 재확인했다.",tg:["왕세자","UAE","외교"],u:"https://www.arabnews.com/node/2642330/saudi-arabia"},
  {id:1660,p:7,r:"외교",t:"Saudi FM discusses regional developments with Egyptian counterpart",k:"사우디 외무장관, 이집트 외무장관과 역내 정세 논의",s:"Arab News",c:"saudi",d:"2026-05-04",m:"Saudi Foreign Minister Prince Faisal bin Farhan received a call from Egyptian counterpart Badr Abdelatty, discussing regional developments and the importance of continued coordination amid the Iran war ceasefire fragility.",mk:"파이살 빈 파르한 사우디 외무장관이 바드르 압델라티 이집트 외무장관과 통화하고, 이란 전쟁 휴전의 취약성 속 역내 정세와 지속적인 공조의 중요성을 논의했다.",tg:["외교","이집트","휴전"],u:"https://www.arabnews.com/node/2642292/saudi-arabia"},
  {id:1661,p:8,r:"정책발표",t:"Saudi Arabia affirms uninterrupted global energy flows, reinforcing economic stability",k:"사우디, 글로벌 에너지 공급 중단 없음 확약…경제 안정 강화",s:"Saudi Gazette",c:"saudi",d:"2026-04-29",m:"Saudi Arabia affirmed its commitment to uninterrupted global energy flows, reinforcing economic stability for partners despite ongoing Hormuz disruption. Officials emphasized Red Sea export routes and full East-West pipeline capacity.",mk:"사우디아라비아가 호르무즈 차질이 지속되는 가운데서도 파트너들을 위한 글로벌 에너지 공급의 중단 없는 흐름을 확약하며 경제 안정을 강화했다. 당국은 홍해 수출 경로와 동서 송유관의 완전 가동을 강조했다.",tg:["에너지","공급","사우디"],u:"https://saudigazette.com.sa/article/660552"},
  {id:1662,p:8,r:"심층분석",t:"PIF&apos;s al-Rumayyan says no NEOM projects cancelled, spending priorities reassessed",k:"알루마이얀 PIF 총재 &quot;NEOM 프로젝트 취소 없어, 지출 우선순위 재평가&quot;",s:"Al Arabiya",c:"saudi",d:"2026-04-15",m:"PIF Governor Yasir Al-Rumayyan said no NEOM projects have been cancelled, with the project company instructed to reprioritize spending under the new 2026-2030 strategy. He pointed to Oxagon as the most vital near-term component.",mk:"야시르 알루마이얀 PIF 총재는 NEOM에서 취소된 프로젝트가 없으며 신 2026-2030 전략에 따라 프로젝트사가 지출 우선순위를 재조정하도록 지시받았다고 밝혔다. 옥사곤을 최단기 핵심 요소로 지목했다.",tg:["PIF","NEOM","비전2030"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/15/pif-s-alrumayyan-says-no-neom-projects-cancelled-spending-priorities-reassessed"},
  {id:1663,p:6,r:"정책발표",t:"Saudi Arabia upgrades roads as part of sweeping Hajj transport readiness plan",k:"사우디, 하지 교통 종합 준비계획 일환으로 도로 업그레이드",s:"Arab News",c:"saudi",d:"2026-05-03",m:"Saudi authorities upgraded road infrastructure across pilgrimage corridors as part of a sweeping Hajj transport readiness plan, ensuring smooth movement of pilgrims to and from the holy sites.",mk:"사우디 당국이 종합적인 하지 교통 준비계획의 일환으로 순례 회랑 전반의 도로 인프라를 업그레이드해 성지 왕복 순례 이동을 원활화했다.",tg:["하지","도로","인프라"],u:"https://www.arabnews.com/node/2642233/saudi-arabia"},
  {id:1664,p:8,r:"심층분석",t:"Saudi Arabia&apos;s PIF targets 80% domestic investment in new five-year strategy",k:"사우디 PIF, 5개년 신전략에서 국내 투자 80% 목표",s:"The National",c:"saudi",d:"2026-04-15",m:"Saudi Arabia&apos;s Public Investment Fund will direct about 80% of its $925 billion portfolio into domestic investments under its new five-year strategy, scaling back international exposure to 20% from a peak of 30%.",mk:"사우디 공공투자기금(PIF)이 신 5개년 전략 하에서 9,250억 달러 포트폴리오의 약 80%를 국내 투자에 배분하기로 했으며, 해외 비중은 최고 30%에서 20%로 축소된다.",tg:["PIF","국내투자","비전2030"],u:"https://www.thenationalnews.com/business/economy/2026/04/15/saudi-arabias-pif-targets-80-domestic-allocation-cuts-overseas-share-to-20/"},
  {id:1665,p:6,r:"정책발표",t:"Makkah deputy governor reviews Hajj operations readiness",k:"메카 부지사, 하지 운영 준비 점검",s:"Arab News",c:"saudi",d:"2026-05-04",m:"Prince Saud bin Mishaal, Makkah Deputy Governor, inspected the Hajj and Umrah halls at King Abdulaziz International Airport in Jeddah, reviewing security checkpoints, capacity expansion and the operations center for crowd management.",mk:"메카 부지사 사우드 빈 미샬 왕자가 제다 킹 압둘아지즈 국제공항의 하지·움라 홀을 시찰하며 보안 검문소, 수용 확장, 군중 관리 운영센터를 점검했다.",tg:["하지","메카","운영"],u:"https://www.arabnews.com/node/2642303/saudi-arabia"},
  {id:1666,p:8,r:"정책발표",t:"PIF governor: No projects cancelled in NEOM, spending reviewed",k:"PIF 총재: NEOM 프로젝트 취소 없어, 지출 재검토 중",s:"Saudi Gazette",c:"saudi",d:"2026-04-30",m:"PIF Governor Yasir Al-Rumayyan said no projects have been cancelled in NEOM, stressing the development is undergoing a natural reassessment of spending priorities under the new 2026-2030 strategy. He pointed to Oxagon as a key pillar.",mk:"야시르 알루마이얀 PIF 총재는 NEOM에서 취소된 프로젝트는 없으며, 2026-2030 신전략에 따라 지출 우선순위를 재평가하는 자연스러운 과정이라고 밝혔다. 옥사곤을 핵심 축으로 지목했다.",tg:["NEOM","PIF","비전2030"],u:"https://saudigazette.com.sa/article/660565/saudi-arabia/pif-governor-says-no-projects-cancelled-in-neom-spending-reviewed"},
  {id:1667,p:6,r:"정책발표",t:"Hajj pilgrims can travel within Saudi Arabia carrying digital visitor ID instead of passport",k:"하지 순례자, 여권 대신 디지털 방문 ID로 사우디 국내 이동 가능",s:"Saudi Gazette",c:"saudi",d:"2026-05-03",m:"The General Directorate of Passports announced that Hajj pilgrims can obtain a digital visitor ID to travel within Saudi Arabia, serving as an official document and eliminating the need to carry a paper passport.",mk:"사우디 출입국청은 하지 순례자가 디지털 방문 ID를 발급받아 사우디 내에서 이동할 수 있으며, 종이 여권 휴대 없이 공식 서류로 사용 가능하다고 발표했다.",tg:["하지","디지털ID","순례"],u:"https://saudigazette.com.sa/article/661044/saudi-arabia/hajj-pilgrims-can-travel-within-saudi-arabia-carrying-digital-visitor-id-instead-of-passport"},
  {id:1668,p:7,r:"심층분석",t:"Genesys targets launch of full-service Genesys Cloud Region in Saudi Arabia by end of 2026",k:"제네시스, 2026년 말까지 사우디에 풀 서비스 클라우드 리전 출범 목표",s:"Saudi Gazette",c:"saudi",d:"2026-04-22",m:"Genesys announced plans to launch a full-service Genesys Cloud Region in Saudi Arabia by end of 2026 as the &quot;Experience Economy&quot; accelerates, supporting the Kingdom&apos;s digital infrastructure under Vision 2030.",mk:"제네시스가 &quot;경험 경제&quot; 가속화에 따라 2026년 말까지 사우디에 풀 서비스 제네시스 클라우드 리전을 출범할 계획을 발표하며 비전2030 디지털 인프라를 지원한다.",tg:["IT","클라우드","비전2030"],u:"https://saudigazette.com.sa/article/657670"},
