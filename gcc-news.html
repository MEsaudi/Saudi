  {id:287,p:8,r:"속보",t:"Saudi Arabia Rerouting 4.5 Million bpd via Yanbu Red Sea Port as Hormuz Crisis Deepens",k:"사우디, 호르무즈 위기 심화 속 얀부 홍해 항구로 하루 450만 배럴 우회 수출",s:"Arab News",c:"saudi",d:"2026-04-14",m:"Saudi Arabia activated its east-west pipeline at maximum capacity of 4-4.5 million barrels per day, routing crude exports through the Red Sea port of Yanbu to bypass the disrupted Strait of Hormuz. This alternative route is critical for maintaining Saudi export commitments to key customers including Asia and Europe.",mk:"사우디아라비아가 동서 파이프라인을 최대 용량인 하루 400~450만 배럴로 가동해 홍해 얀부 항을 통해 원유를 수출하고 있다. 호르무즈 봉쇄 상황에서 아시아·유럽 주요 고객사에 대한 수출 약속을 이행하기 위한 핵심 대안 경로다.",tg:["얀부","에너지","호르무즈"],u:"https://abcnews.com/International/wireStory/saudi-arabia-intercepted-drones-targeting-ras-tanura-oil-130667464"},
  {id:288,p:8,r:"속보",t:"Saudi Arabia Intercepts Drone Attacks on Shaybah Oil Field; Air Defenses Hold Under Pressure",k:"사우디, 샤이바 유전 겨냥 드론 공격 요격 성공…방공망 압박 속 방어력 유지",s:"Arab News",c:"saudi",d:"2026-04-14",m:"Saudi Arabia&apos;s air defense systems successfully intercepted multiple drone attacks targeting the remote Shaybah oil field in the Empty Quarter. The interceptions prevented production disruption at the strategic facility, which produces approximately 1 million barrels per day.",mk:"사우디아라비아 방공망이 룹알할리 사막 내 샤이바 유전을 겨냥한 복수의 드론 공격을 성공적으로 요격했다. 하루 약 100만 배럴을 생산하는 전략 시설의 생산 차질을 막는 데 성공했다.",tg:["드론","방공","에너지"],u:"https://discoveryalert.com.au/critical-energy-infrastructure-petroleum-defense-strategies-2026/"},
  {id:289,p:8,r:"정책발표",t:"UAE Extends Nafis Programme to 2040 With Unlimited Child Allowance and AED 6,000 Monthly Salary Aid",k:"UAE, 나피스 프로그램 2040년까지 연장…자녀수당 상한 폐지·월 최대 6,000디르함 급여 지원",s:"Gulf News",c:"gulf",d:"2026-04-14",m:"The UAE extended its Nafis Emirati employment programme to 2040, announcing the removal of the child allowance cap for private sector workers and salary support of up to AED6,000 monthly for bachelor&apos;s degree holders. The programme has helped employ over 176,000 Emiratis since launch.",mk:"UAE가 나피스 에미라티 고용 프로그램을 2040년까지 연장하고 민간 부문 자녀수당 상한 폐지 및 학사 학위 소지자에게 월 최대 6,000디르함 급여 지원 등의 혜택을 발표했다. 프로그램 출범 이후 17만6,000명 이상의 에미라티가 취업했다.",tg:["UAE","나피스","고용정책"],u:"https://sharjah24.ae/en/Articles/2026/04/14/mm05"},
  {id:290,p:7,r:"속보",t:"UAE Announces Phased Return to In-Person Learning for Schools and Nurseries from April 15",k:"UAE, 4월 15일부터 학교·보육원 대면 수업 단계적 재개 발표",s:"Gulf News",c:"gulf",d:"2026-04-15",m:"UAE authorities announced a phased return to in-person learning starting April 15, following disruptions from regional tensions. Nurseries in government and commercial buildings reopen in the first phase, with schools to follow based on Ministry of Education guidance issued the same day.",mk:"UAE 당국이 역내 긴장으로 인한 혼란 이후 4월 15일부터 학교와 보육원의 대면 수업을 단계적으로 재개한다고 발표했다. 1단계로 정부 건물과 상업시설 내 보육원이 먼저 문을 열고 학교는 교육부 지침에 따라 순차 복귀한다.",tg:["UAE","교육","복귀"],u:"https://gulfnews.com/uae/education/uae-announces-gradual-return-to-in-person-learning-for-schools-and-nurseries-1.500506351"},
  {id:291,p:7,r:"속보",t:"Emirates, Qatar Airways, Etihad Resume Partial Flights; 5.4 Million April Seats Still Cancelled",k:"에미레이트·카타르항공·에티하드, 부분 운항 재개…4월 취소 좌석 540만 석",s:"The National",c:"gulf",d:"2026-04-14",m:"Major Gulf carriers including Emirates, Qatar Airways, and Etihad Airways resumed partial flight operations following the ceasefire, but capacity remains 40-50% below pre-conflict levels. Qatar Airways plans to restore services to over 120 destinations by mid-May 2026 as regional airspace gradually reopens.",mk:"에미레이트항공, 카타르항공, 에티하드항공 등 걸프 주요 항공사들이 휴전 이후 부분 운항을 재개했으나 운항 좌석은 분쟁 전 대비 40~50% 부족한 상태다. 카타르항공은 5월 중순까지 120개 이상 노선을 복구할 계획이다.",tg:["항공","걸프","휴전"],u:"https://nomadlawyer.org/emirates-etihad-qatar-airways-resume-middle-east-flights-post-ceasefire-5-4m-seats-cancelled-in-april-2026"},
  {id:292,p:7,r:"속보",t:"Middle East Tourism Revival Gains Momentum as Ceasefire Reopens Airspace Across Gulf States",k:"중동 관광 회복: 휴전으로 카타르·UAE·사우디·오만 등 영공 재개방",s:"Khaleej Times",c:"gulf",d:"2026-04-14",m:"Middle East tourism is showing signs of revival as the ceasefire has reopened airspace across Qatar, UAE, Saudi Arabia, Bahrain, Kuwait, and Oman. Major hubs including Dubai, Doha, and Riyadh are seeing a return of scheduled flights, though full recovery to pre-conflict levels will take months.",mk:"휴전으로 카타르, UAE, 사우디아라비아, 바레인, 쿠웨이트, 오만 등의 영공이 재개방되면서 중동 관광 회복의 신호가 나타나고 있다. 두바이, 도하, 리야드 등 주요 허브에 정기 항공편이 점차 복귀 중이나 완전 회복까지는 수개월이 소요될 전망이다.",tg:["관광","항공","휴전"],u:"https://www.travelandtourworld.com/news/article/qatar-joins-uae-kuwait-bahrain-saudi-arabia-oman-and-syria-as-middle-east-tourism-revival-gains-momentum-with-the-ceasefire-reopening-airspace-restoring-flights-normalising-travel-demand-and-rec/"},
  {id:293,p:8,r:"속보",t:"Qatar, Kuwait, Bahrain Report Continued Attacks After Ceasefire; GCC Demands Full Halt to Hostilities",k:"카타르·쿠웨이트·바레인, 휴전 이후에도 공격 지속 보고…GCC, 완전 적대행위 중단 촉구",s:"Khaleej Times",c:"gulf",d:"2026-04-08",m:"Qatar, Kuwait, Bahrain, and the UAE reported continued attacks hours after the Iran-US ceasefire. Kuwait&apos;s FM urged Iran to &apos;cease all hostile acts,&apos; Bahrain called for preventing Iran from obtaining nuclear weapons, and Qatar described the ceasefire as &apos;an initial step toward de-escalation.&apos;",mk:"카타르, 쿠웨이트, 바레인, UAE가 미-이란 휴전 합의 수 시간 이후에도 공격이 지속됐다고 보고했다. 쿠웨이트 외무장관은 이란의 &apos;모든 적대행위&apos; 중단을 촉구했고 카타르는 휴전을 &apos;긴장 완화를 향한 첫 걸음&apos;으로 평가했다.",tg:["걸프","휴전","이란"],u:"https://www.aljazeera.com/news/2026/4/8/uae-kuwait-bahrain-report-attacks-despite-iran-us-ceasefire"},
  {id:294,p:9,r:"헤드라인",t:"Iran War Day 45: US Naval Blockade of Iranian Ports Raises New Escalation Fears as Talks Collapse",k:"이란 전쟁 45일차: 협상 결렬 후 미 해군의 이란 항구 봉쇄로 재확전 우려 고조",s:"Al Jazeera",c:"me",d:"2026-04-13",m:"On Day 45 of the US-Iran conflict, the US announced a naval blockade of Iranian ports after Islamabad peace negotiations collapsed without a deal. At least two ships defied the blockade and passed through the Strait of Hormuz. The ceasefire remains under strain with both sides citing violations.",mk:"미-이란 분쟁 45일째, 이슬라마바드 평화협상 결렬 후 미국이 이란 항구에 대한 해상봉쇄를 선언했다. 적어도 선박 2척이 봉쇄를 무시하고 호르무즈 해협을 통과했다. 양측이 상대방의 휴전 위반을 주장하는 가운데 휴전은 여전히 불안한 상태다.",tg:["이란전쟁","봉쇄","미국"],u:"https://www.aljazeera.com/news/2026/4/13/iran-war-what-is-happening-on-day-45-of-the-us-iran-conflict"},
  {id:295,p:9,r:"헤드라인",t:"GCC States Continue to Face Attacks After Ceasefire; Saudi Arabia Summons Iraq Envoy Over Drones",k:"GCC 국가들, 휴전 이후에도 피격 지속…사우디, 이라크 대사 초치",s:"Al Jazeera",c:"me",d:"2026-04-08",m:"Saudi Arabia, UAE, Kuwait, Qatar, and Bahrain all reported attacks on their territory hours after the Iran-US ceasefire. Saudi Arabia summoned Iraq&apos;s envoy over drone attacks launched from Iraqi territory. Iran-aligned militias continued striking Gulf energy infrastructure despite the truce.",mk:"미-이란 휴전 선언 수 시간 만에 사우디아라비아, UAE, 쿠웨이트, 카타르, 바레인이 모두 피격 피해를 보고했다. 사우디는 이라크 영토에서 발사된 드론을 이유로 이라크 대사를 초치했다. 친이란 세력은 휴전에도 불구하고 걸프 에너지 인프라 공격을 이어갔다.",tg:["GCC","이란","휴전"],u:"https://www.aljazeera.com/news/2026/4/8/uae-kuwait-bahrain-report-attacks-despite-iran-us-ceasefire"},
  {id:296,p:8,r:"헤드라인",t:"US Begins Naval Blockade of Iranian Ports After Peace Talks Fail; Iran Rejects 15-Point Plan",k:"미국, 협상 결렬 후 이란 항구 해상봉쇄 개시…이란, 15개항 평화안 거부",s:"Times of Israel",c:"me",d:"2026-04-14",m:"The US military began a naval blockade of Iranian ports on April 14 after the Islamabad peace talks ended without a deal. Iran rejected the US-presented 15-point peace plan, insisting Lebanon must be included in any ceasefire deal. Oil prices surged on the news.",mk:"이슬라마바드 장기 평화협상이 합의 없이 종료된 후 미국이 4월 14일 이란 항구에 대한 해상봉쇄를 개시했다. 이란은 미국이 제시한 15개항 평화안을 거부하며 레바논을 포함한 포괄적 합의를 요구했다. 유가가 이 소식에 급등했다.",tg:["미국","이란","봉쇄"],u:"https://www.timesofisrael.com/liveblog-april-14-2026/"},
  {id:297,p:7,r:"심층분석",t:"Can Pakistan Juggle US-Iran Mediation With Saudi Defence Commitments? Al Jazeera Analysis",k:"파키스탄, 미-이란 중재와 사우디 방위 공약 사이 균형 가능한가? 알자지라 분석",s:"Al Jazeera",c:"me",d:"2026-04-14",m:"Al Jazeera examines Pakistan&apos;s delicate balancing act between mediating the US-Iran conflict — having helped broker the April 8 ceasefire — and its deepening defence commitments to Saudi Arabia under the SMDA. The report questions whether Islamabad can maintain credibility with both sides.",mk:"알자지라는 4월 8일 휴전 중재에 기여한 파키스탄이 SMDA에 따른 사우디 방위 공약도 이행해야 하는 아슬아슬한 균형을 유지하고 있다고 분석했다. 이슬라마바드가 양측 모두에게 신뢰성을 유지할 수 있을지 의문이 제기된다.",tg:["파키스탄","이란","사우디"],u:"https://www.aljazeera.com/amp/news/2026/4/14/can-pakistan-juggle-us-iran-mediation-with-saudi-defence-commitments"},
  {id:298,p:8,r:"심층분석",t:"Hormuz Crisis: Saudi and UAE Emerge as Alternative Energy Hubs as Gulf Order Reshapes",k:"호르무즈 위기: 사우디·UAE, 대안 에너지 허브로 부상…걸프 질서 재편",s:"Al Arabiya",c:"me",d:"2026-04-14",m:"The Strait of Hormuz crisis has caused the largest oil supply disruption in recorded history, with approximately 8 million bpd of Gulf crude stranded. The crisis is reshaping the Middle East&apos;s geopolitical order, with Saudi Arabia and UAE&apos;s alternative pipeline routes becoming critical for global oil supply.",mk:"호르무즈 해협 위기로 역사상 최대 규모의 석유 공급 차질이 발생해 하루 800만 배럴의 걸프산 원유가 묶여 있다. 이 위기로 사우디아라비아와 UAE의 대안 파이프라인 경로가 글로벌 석유 공급의 핵심이 되면서 중동 지정학적 질서가 재편되고 있다.",tg:["호르무즈","이란전쟁","에너지"],u:"https://english.alarabiya.net/News/middle-east"},
  {id:299,p:9,r:"헤드라인",t:"IEA April 2026 Report: Iran War Causes Largest Oil Supply Disruption in History; Global Demand to Contract",k:"IEA 4월 보고서: 이란 전쟁, 사상 최대 석유 공급 충격…2026년 글로벌 수요 위축",s:"IEA",c:"global",d:"2026-04-14",m:"The IEA&apos;s April 2026 Oil Market Report describes the Hormuz crisis as the largest oil supply disruption in history, with global supply falling 10.1 million bpd in March. Shipments through Hormuz dropped to 3.8 mb/d from over 20 mb/d pre-crisis. Global oil demand is now projected to contract by 80,000 bpd in 2026.",mk:"IEA의 2026년 4월 석유시장 보고서는 호르무즈 위기를 사상 최대 석유 공급 충격으로 규정했다. 3월 글로벌 공급이 하루 1,010만 배럴 감소했으며, 호르무즈 통과 물량이 위기 전 하루 2,000만 배럴에서 380만 배럴로 급감했다. 2026년 글로벌 석유 수요는 하루 8만 배럴 감소로 전환될 전망이다.",tg:["IEA","에너지","공급충격"],u:"https://www.iea.org/reports/oil-market-report-april-2026"},
  {id:300,p:9,r:"헤드라인",t:"Bloomberg: Iran Oil — For Markets, the War Might as Well Be Over as Saudi Supply Is Rerouted",k:"블룸버그: 이란 원유, 시장 입장에서 전쟁은 사실상 종료…사우디 공급 우회로 확보",s:"Bloomberg",c:"global",d:"2026-04-15",m:"Bloomberg analysis argues that for oil markets, the Iran war&apos;s impact is effectively priced in, as Saudi Arabia, UAE, and other producers successfully reroute supply through pipelines bypassing Hormuz. Brent crude has stabilized near $100/bbl, but analysts warn the fragile ceasefire keeps upside risk elevated.",mk:"블룸버그 분석은 사우디아라비아와 UAE 등이 호르무즈를 우회하는 파이프라인으로 공급을 성공적으로 재편함으로써 이란 전쟁의 석유 시장 영향이 사실상 반영됐다고 진단했다. 브렌트유는 배럴당 100달러 내외에서 안정됐으나 불안한 휴전으로 상방 위험은 여전히 높다.",tg:["유가","이란전쟁","블룸버그"],u:"https://www.bloomberg.com/opinion/newsletters/2026-04-15/iran-oil-for-markets-the-war-might-as-well-be-over"},
  {id:301,p:9,r:"헤드라인",t:"CNBC: OPEC Production Plunges 27% in March as Iran War Devastates Gulf Output",k:"CNBC: 이란 전쟁으로 3월 OPEC 생산량 27% 급감…걸프 원유 생산 초토화",s:"CNBC",c:"global",d:"2026-04-13",m:"OPEC production plunged 27% month-over-month in March from 28.7 million bpd to 20.8 million bpd. Saudi Arabia fell 23%, Iraq dropped 61%, Kuwait fell 53%, and UAE fell 44% as the Iran war severely disrupted Gulf energy infrastructure.",mk:"OPEC 생산량이 3월 전월 대비 27% 급감해 하루 2,870만 배럴에서 2,080만 배럴로 줄었다. 사우디(-23%), 이라크(-61%), 쿠웨이트(-53%), UAE(-44%)가 이란 전쟁으로 심각한 타격을 받았다.",tg:["OPEC","에너지","이란전쟁"],u:"https://www.cnbc.com/2026/04/13/iran-war-oil-opec-production-decline.html"},
  {id:302,p:8,r:"속보",t:"CNN: Oil Prices Jump 7% to $102 as US Navy Blockades Iranian Ports in Strait of Hormuz",k:"CNN: 미 해군, 호르무즈 이란 항구 봉쇄 개시…국제유가 7% 급등 배럴당 102달러",s:"CNN",c:"global",d:"2026-04-13",m:"Oil prices climbed 7% to $102 a barrel after the US military announced a shipping blockade against Iranian ports in the Strait of Hormuz following the collapse of peace talks. US gas prices rose to $4.12/gallon on average, up 38% since the start of the war.",mk:"미군이 평화 협상 결렬 후 호르무즈 해협의 이란 항구에 대한 해상봉쇄를 선언하자 국제유가가 7% 급등해 배럴당 102달러에 달했다. 미국 평균 휘발유 가격은 갤런당 4.12달러로 전쟁 시작 이후 38% 상승했다.",tg:["유가","봉쇄","CNN"],u:"https://www.cnn.com/2026/04/13/business/oil-prices-us-blockade-hormuz-intl"},
  {id:303,p:8,r:"주요경제",t:"Reuters: Iran War Oil Shock to Flip Global Market Into Supply Deficit in 2026, Analysts Warn",k:"로이터: 이란 전쟁 석유 충격으로 2026년 글로벌 시장 공급 부족 전환 우려",s:"Reuters",c:"global",d:"2026-04-14",m:"The sharp hit to global oil production from the Iran war is poised to flip the oil market into a supply deficit in 2026, Reuters reports. Previously expected comfortable oversupply has been erased, with analysts now forecasting 2-3 million bpd supply deficits for Q2 and Q3 2026.",mk:"로이터는 이란 전쟁의 원유 생산 타격이 2026년 글로벌 석유 시장을 공급 부족으로 전환시킬 것이라고 분석가들의 전망을 인용해 보도했다. 당초 예상됐던 공급 과잉은 사라지고, 2026년 2·3분기에 하루 200~300만 배럴의 공급 부족이 예상된다.",tg:["로이터","에너지","공급부족"],u:"https://www.investing.com/news/commodities-news/oil-whiplash-iran-war-shock-to-flip-market-to-deficit-in-2026-analysts-say-4609125"},
  {id:304,p:9,r:"헤드라인",t:"Bloomberg: Saudi Oil Exports to China Set to Halve in May as Hormuz Crisis Upends Trade Flows",k:"블룸버그: 호르무즈 위기로 5월 사우디의 대중 원유 수출 절반으로 줄 전망",s:"Bloomberg",c:"global",d:"2026-04-13",m:"Saudi Arabia&apos;s crude sales to China are set to halve in May as the Iran war and Hormuz disruptions upend trade flows and lift prices. China is now seeking alternative suppliers from Africa and the Americas, potentially reshaping long-term Saudi-China energy trade patterns.",mk:"블룸버그는 이란 전쟁과 호르무즈 혼란으로 5월 사우디의 대중(對中) 원유 수출이 절반으로 줄 것이라고 보도했다. 중국은 아프리카·미주에서 대체 공급처를 물색 중이며 이는 사우디-중국 장기 에너지 교역 구조를 재편할 수 있다.",tg:["중국","에너지","블룸버그"],u:"https://www.bloomberg.com/news/articles/2026-04-13/saudi-oil-sales-to-china-to-halve-as-hormuz-crisis-lifts-prices"},
  {id:305,p:8,r:"속보",t:"Oil Plunges 16%, Dow Surges 1,000 Points After US-Iran Ceasefire Announced on April 8",k:"미-이란 4월 8일 휴전 선언에 유가 16% 급락·다우지수 1,000포인트 폭등",s:"CNN",c:"global",d:"2026-04-08",m:"Oil prices plunged 16.4% — their largest one-day decline since 2020 — and global stocks surged after the US and Iran agreed to a two-week ceasefire on April 8. US crude closed at $94.41 and Brent fell 13.3% to $94.75. The Dow Jones surged over 1,000 points, its best single-day gain in a year.",mk:"4월 8일 미국과 이란이 2주간 휴전에 합의하자 국제유가가 16.4% 급락(2020년 이후 최대)하고 글로벌 증시가 폭등했다. 미국 원유는 94.41달러, 브렌트유는 13.3% 하락한 94.75달러로 마감했다. 다우지수는 1,000포인트 이상 급등해 1년 만의 최대 상승폭을 기록했다.",tg:["유가","휴전","시장"],u:"https://www.cnn.com/2026/04/07/markets/us-stocks-oil-trump-iran-ceasefire"},
  {id:306,p:7,r:"심층분석",t:"CNBC: Fragile Iran Ceasefire Sparks Market Relief but &apos;Significant Hurdles Remain&apos; for Peace",k:"CNBC: 불안한 이란 휴전으로 시장 안도…그러나 항구적 평화까지 &apos;난관 산적&apos;",s:"CNBC",c:"global",d:"2026-04-08",m:"While the Iran ceasefire provided immediate market relief, CNBC warns significant hurdles remain for a lasting peace deal. The Strait of Hormuz remains effectively closed with Iran charging over $1 million per ship in transit fees, and ceasefire violations continued within hours of the truce announcement.",mk:"이란 휴전이 즉각적인 시장 안도를 가져다줬지만, CNBC는 항구적 평화를 위해 넘어야 할 장애물이 여전히 크다고 경고했다. 호르무즈 해협은 여전히 봉쇄 상태로 이란이 선박당 100만 달러 이상의 통행료를 부과하고 있으며, 휴전 선언 수 시간 만에 위반 행위가 이어졌다.",tg:["휴전","이란","CNBC"],u:"https://www.cnbc.com/2026/04/08/us-iran-war-ceasefire-middle-east-strait-of-hormuz-oil-markets.html"},
  {id:307,p:8,r:"주요경제",t:"EIA April 2026 Short-Term Energy Outlook: Oil Market to Swing to Deficit as War Erases Surplus",k:"EIA 2026년 4월 단기에너지전망: 이란 전쟁으로 공급 과잉 사라지고 시장 적자 전환",s:"EIA",c:"global",d:"2026-04-14",m:"The EIA&apos;s April 2026 Short-Term Energy Outlook projects global oil demand contraction and a supply deficit, reversing previous surplus forecasts. Brent crude is now projected to average $96/bbl in Q2 2026 versus pre-war forecasts of around $70/bbl.",mk:"EIA의 2026년 4월 단기에너지전망은 이란 전쟁으로 기존 공급과잉 전망이 사라지고 글로벌 수요도 위축되며 공급 적자로 전환될 것으로 전망했다. 2026년 2분기 브렌트유는 배럴당 96달러로 전쟁 전 전망치(70달러 내외)를 크게 상회할 전망이다.",tg:["EIA","유가","에너지"],u:"https://www.eia.gov/outlooks/steo/report/global_oil.php"},
  {id:308,p:7,r:"심층분석",t:"WSJ Analysis: Saudi $3 Billion Pakistan Pledge and SMDA Deployment Signal Expanded Gulf Security Architecture",k:"WSJ 분석: 사우디 30억 달러 파키스탄 지원·SMDA 병력 배치, 걸프 안보 구조 확장 신호",s:"WSJ",c:"global",d:"2026-04-14",m:"The Wall Street Journal analyzes Saudi Arabia&apos;s $3 billion financial pledge to Pakistan alongside Pakistan&apos;s deployment of 13,000 troops and Air Force assets to Saudi Arabia&apos;s Eastern Province under the SMDA, describing it as a significant expansion of Gulf security architecture amid the Iran war.",mk:"월스트리트저널은 사우디아라비아의 파키스탄 30억 달러 재정 지원과 상호방위협정(SMDA)에 따른 파키스탄의 1만3,000명 병력 및 공군 자산 배치를 이란 전쟁 속 걸프 안보 구조의 중대한 확장으로 분석했다.",tg:["WSJ","안보","파키스탄"],u:"https://houseofsaud.com/pakistan-troops-eastern-province-smda-deployment/"},
  {id:309,p:8,r:"정책발표",t:"한국, UAE와 원유 공동비축 논의 본격화…산업부 &apos;비축기지 활용 협의 요청 잇따라&apos;",k:"Korea and UAE in Talks on Joint Oil Stockpiling; Middle East Producers Eye Korea&apos;s Reserve Facilities",s:"서울경제",c:"korean-view",d:"2026-04-14",m:"산업통상자원부는 UAE와 원유 공동비축을 논의 중이라고 밝혔다. 중동 산유국들이 한국석유공사의 유휴 비축시설을 &apos;역외 비축기지&apos;로 활용하고자 협의를 잇따라 요청하고 있다. 한국은 이를 통해 원유 수급 위기 시 우선 구매권을 확보할 수 있다.",mk:"Korea&apos;s Ministry of Trade, Industry and Energy is in discussions with UAE&apos;s ADNOC on joint crude stockpiling. Middle East producers seek to use KNOC storage as offshore reserves, giving Korea priority purchase rights in supply emergencies.",tg:["에너지안보","공동비축","UAE"],u:"https://en.sedaily.com/finance/2026/04/14/korea-discusses-joint-oil-stockpiling-with-uae-amid-strait"},
  {id:310,p:8,r:"정책발표",t:"중동 7개국, 한국에 원유 우선 공급 약속…GCC 6개국·요르단 대사 국회서 확인",k:"7 Middle East Nations Pledge Priority Crude Supply to Korea; All 6 GCC States Commit at National Assembly",s:"연합뉴스",c:"korean-view",d:"2026-04-09",m:"사우디아라비아, UAE, 쿠웨이트, 카타르, 오만, 바레인 등 GCC 6개국 및 요르단 대사들이 한국 국회 외교통일위원회에서 자국 정부가 한국에 원유를 우선 공급하겠다고 약속했다. 한국의 중동 원유 의존도는 약 70%에 달한다.",mk:"Ambassadors from Saudi Arabia, UAE, Kuwait, Qatar, Oman, Bahrain, and Jordan affirmed to South Korea&apos;s National Assembly that their governments will prioritize crude supply to Korea. Korea relies on Middle Eastern crude for about 70% of oil imports.",tg:["에너지안보","GCC","원유"],u:"https://www.koreaherald.com/article/10711740"},
  {id:311,p:9,r:"정책발표",t:"강훈식 대통령비서실장, 특사로 사우디·카자흐스탄·오만 방문…유가 100달러 대응 에너지 외교",k:"Presidential Chief of Staff Kang Visits Saudi Arabia, Kazakhstan, Oman as Energy Envoy Amid $100 Oil Crisis",s:"한국경제",c:"korean-view",d:"2026-04-07",m:"강훈식 대통령 비서실장이 대통령 특사로 카자흐스탄, 사우디아라비아, 오만을 방문해 원유·나프타 추가 공급을 협의했다. 국제유가가 배럴당 100달러에 육박한 상황에서 산업부 관계자와 에너지 기업 대표가 동행하며 에너지 외교를 펼쳤다.",mk:"Presidential Chief of Staff Kang Hoon-sik visited Kazakhstan, Saudi Arabia, and Oman as presidential envoy to negotiate additional crude oil and naphtha supplies. The mission comes as oil prices approach $100/bbl, with Ministry of Trade officials and energy company representatives accompanying the delegation.",tg:["에너지외교","특사","사우디"],u:"https://en.sedaily.com/politics/2026/04/07/breaking-news-kang-hoon-sik-to-visit-kazakhstan-saudi"},
  {id:312,p:8,r:"주요경제",t:"사우디, 한국에 홍해 얀부 항구 통한 원유 우선 공급 합의…유조선 5척 파견",k:"Saudi Arabia Agrees to Prioritize Oil Shipments to Korea via Red Sea Yanbu; 5 Tankers Dispatched",s:"연합뉴스",c:"korean-view",d:"2026-04-14",m:"사우디아라비아가 한국에 홍해 얀부 항구를 통한 원유 우선 공급에 합의했다고 산업부 장관이 발표했다. 한국 정부는 한국 국적 유조선 5척을 얀부로 파견해 호르무즈 해협을 우회하는 대안 수송로를 구축하고 있다.",mk:"Saudi Arabia agreed to prioritize oil shipments to South Korea through the Red Sea port of Yanbu, the Korean Industry Minister announced. Korea is dispatching five Korean-flagged tankers to establish alternative supply routes bypassing the Strait of Hormuz.",tg:["에너지","얀부","공급망"],u:"https://qazinform.com/news/saudi-arabia-agrees-to-prioritize-oil-shipments-to-s-korea-minister-b7874a/amp"},
  {id:313,p:8,r:"심층분석",t:"호르무즈 봉쇄 속 한국 에너지 3중 위기: 원유·LNG·나프타 동시 수급 비상",k:"Triple Energy Crisis for Korea Amid Hormuz Blockade: Crude, LNG and Naphtha All at Risk",s:"글로벌이코노믹",c:"korean-view",d:"2026-04-14",m:"호르무즈 해협 봉쇄로 한국이 원유, LNG, 나프타의 동시 수급 비상에 직면했다. 한국의 중동 원유 의존도 70.7%, LNG 20.4%가 모두 위협받고 있으며 OECD는 이번 위기로 한국 성장률이 주요국 중 가장 큰 폭으로 하락할 것으로 전망했다.",mk:"The Hormuz blockade has put Korea in a simultaneous supply emergency for crude oil, LNG, and naphtha. With 70.7% of crude and 20.4% of LNG from the Middle East, Korea faces the largest growth rate decline among OECD nations due to the crisis.",tg:["에너지위기","호르무즈","OECD"],u:"https://www.g-enews.com/article/Global-Biz/2026/04/202604031923115218fbbec65dfb_1"},
  {id:314,p:7,r:"심층분석",t:"중동 산유국, 한국 비축기지 &apos;러브콜&apos;…전쟁이 바꾼 에너지 저장 지형",k:"Middle East Producers Court Korea&apos;s Strategic Reserves as War Reshapes Global Energy Storage Landscape",s:"서울신문",c:"korean-view",d:"2026-04-14",m:"중동 산유국들이 지정학적 위험 분산을 위해 한국석유공사의 유휴 비축시설을 역외 비축기지로 활용하고자 협의를 잇따라 요청하고 있다. ADNOC 외 여러 기업이 접촉 중이며, 한국은 임대료 수입과 위기 시 우선 구매권을 모두 확보할 수 있다.",mk:"Middle East oil producers are approaching Korea National Oil Corporation to use idle storage as offshore reserves, diversifying geopolitical risk. Multiple firms beyond ADNOC are in contact, and Korea gains both rental income and priority purchase rights during emergencies.",tg:["비축유","에너지안보","석유공사"],u:"https://www.seoul.co.kr/news/economy/2026/04/14/20260414500135"}
];

let activeFilter='all', searchQuery='', langMode='both';

function formatDate(ds){const d=new Date(ds+'T00:00:00');return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function daysAgo(ds){const t=new Date(),d=new Date(ds+'T00:00:00'),diff=Math.floor((t-d)/(864e5));return diff===0?'오늘':diff===1?'어제':`${diff}일 전`;}

// Saudi media outlet ordering: Arab News > SPA > Saudi Gazette > Argaam > Asharq Al-Awsat > others
const SAUDI_SOURCE_ORDER = {'Arab News':1,'SPA':2,'Saudi Gazette':3,'Argaam':4,'Asharq Al-Awsat':5};
function saudiSrcRank(s){return SAUDI_SOURCE_ORDER[s]||99;}

function getFiltered(){
  let f=D;
  if(activeFilter!=='all') f=f.filter(n=>n.c===activeFilter);
  if(searchQuery){const q=searchQuery.toLowerCase(); f=f.filter(n=>n.t.toLowerCase().includes(q)||n.m.toLowerCase().includes(q)||n.s.toLowerCase().includes(q)||(n.k&&n.k.toLowerCase().includes(q))||(n.mk&&n.mk.toLowerCase().includes(q))||n.tg.some(t=>t.toLowerCase().includes(q)));}
  // Sort: 1) date desc  2) for Saudi: source order  3) priority desc
  return f.sort((a,b)=>{
    const dd = new Date(b.d) - new Date(a.d);
    if(dd) return dd;
    if(a.c==='saudi' && b.c==='saudi'){
      const sd = saudiSrcRank(a.s) - saudiSrcRank(b.s);
      if(sd) return sd;
    }
    return (b.p||0) - (a.p||0);
  });
}

  document.getElementById('controls').innerHTML=

    '<div class="sep"></div>'+
    langs.map(l=>`<button class="lang-btn ${langMode===l.k?'active':''}" data-l="${l.k}">${l.l}</button>`).join('');

function prioBadge(n){
  if(!n.r) return '';
  const cls={'속보':'prio-breaking','헤드라인':'prio-headline','심층분석':'prio-analysis','정책발표':'prio-policy','주요경제':'prio-economy'};
  return `<span class="prio-badge ${cls[n.r]||'prio-normal'}">${n.r}</span>`;
}

function card(n){
  const isKo=n.l==='ko';
  const isTop=n.p>=9;
  let th='',mh='';
  const pb=prioBadge(n);
  if(isKo){th=`<div class="title-only">${n.t}${pb}</div>`;mh=`<div class="summary-only">${n.m}</div>`;}
  else if(langMode==='en'){th=`<div class="title-only">${n.t}${pb}</div>`;mh=`<div class="summary-only">${n.m}</div>`;}
  else if(langMode==='ko'){th=`<div class="title-only">${n.k||n.t}${pb}</div>`;mh=`<div class="summary-only">${n.mk||n.m}</div>`;}
  else{th=`<div class="title-en">${n.t}${pb}</div>${n.k?`<div class="title-ko">${n.k}</div>`:''}`;mh=`<div class="summary-en">${n.m}</div>${n.mk?`<div class="summary-ko">${n.mk}</div>`:''}`;}
  return `<div class="news-card ${n.c}${isTop?' prio-top':''}"><div class="card-header"><span class="source-tag ${n.c}">${n.s}</span><span class="card-date">${daysAgo(n.d)} · ${formatDate(n.d)}</span></div>${th}${mh}<div class="card-footer"><div class="topic-tags">${n.tg.map(t=>`<span class="topic-tag">${t}</span>`).join('')}</div><a href="${n.u}" target="_blank" class="read-link">원문 &#8594;</a></div></div>`;
}
