  {id:432,p:7,r:"심층분석",t:"Energy diversification a decades-old puzzle…why can&apos;t Korea leave the Middle East?",k:"에너지 다변화 수십년째 난제…한국은 왜 탈중동 못하나",s:"한국경제",c:"korean-view",d:"2026-03-29",m:"The Korea Economic Daily examined why Korea has failed to diversify away from Middle East oil dependence over decades, citing refinery configurations, long-term Aramco contracts, and geopolitical contingencies in shaping the import mix.",mk:"한국경제신문은 한국이 수십 년간 중동 원유 의존도를 다변화하지 못한 배경으로 정유시설 구성, 아람코와의 장기 계약, 지정학적 변수 등을 꼽으며 원유 수입 구조를 분석했다.",tg:["에너지안보","탈중동","원유"],u:"https://www.hankyung.com/article/2026032940851"},
  {id:433,p:9,r:"정책발표",t:"Transport minister highlights seamless Hajj travel as Makkah Route flights arrive",k:"교통부 장관, 메카 루트 항공편 도착과 함께 원활한 하지 여행 강조",s:"Arab News",c:"saudi",d:"2026-04-20",m:"Saudi Transport Minister Saleh Al-Jasser visited the dedicated Makkah Route terminal at King Abdulaziz International Airport in Jeddah to welcome pilgrims from Bangladesh, reviewing procedures to reduce processing times.",mk:"살레 알자세르 사우디 교통부 장관이 제다 킹 압둘아지즈 국제공항의 메카 루트 전용 터미널을 방문해 방글라데시 순례객들을 맞이하고 처리 시간 단축을 위한 절차를 점검했다.",tg:["Hajj","Makkah Route","교통부"],u:"https://www.arabnews.com/node/2640490/saudi-arabia"},
  {id:434,p:8,r:"정책발표",t:"Saudi Arabia reiterates Hajj permit rule to safeguard pilgrims for 2026",k:"사우디, 2026년 하지 순례객 보호 위한 허가제 재천명",s:"Arab News",c:"saudi",d:"2026-04-19",m:"Saudi Ministry of Hajj and Umrah stressed that only pilgrims holding official permits will be allowed to perform the 2026 Hajj. Violators face SR100,000 fines and deportation.",mk:"사우디 하지·움라부는 2026년 하지는 공식 허가증을 소지한 순례객만 수행할 수 있다고 강조했다. 위반자는 10만 사우디리얄 벌금과 추방 처분을 받는다.",tg:["Hajj","허가제","벌금"],u:"https://www.arabnews.com/node/2640325/saudi-arabia"},
  {id:435,p:9,r:"헤드라인",t:"Saudi Arabia joins Arab, Islamic states in condemning Israeli envoy appointment to Somaliland",k:"사우디, 아랍·이슬람 국가들과 함께 이스라엘의 소말릴란드 대사 임명 규탄",s:"Arab News",c:"saudi",d:"2026-04-18",m:"Saudi Arabia joined Arab and Islamic countries including Egypt, Somalia, Sudan, Libya, Bangladesh, Algeria, Palestine, Turkey and Indonesia in condemning Israel&apos;s appointment of a diplomatic envoy to Somaliland as a &quot;flagrant violation&quot; of Somalia&apos;s sovereignty.",mk:"사우디는 이집트, 소말리아, 수단, 리비아, 방글라데시, 알제리, 팔레스타인, 튀르키예, 인도네시아 등 아랍·이슬람 국가들과 함께 이스라엘의 소말릴란드 대사 임명을 소말리아 주권에 대한 &apos;노골적 침해&apos;로 규탄했다.",tg:["외교","소말릴란드","이스라엘"],u:"https://www.arabnews.com/node/2640392/saudi-arabia"},
  {id:436,p:7,r:"심층분석",t:"Greening the desert: How Saudi Arabia is cultivating a new era in sustainable agriculture",k:"사막의 녹화: 사우디가 지속가능 농업의 새 시대를 여는 방법",s:"Arab News",c:"saudi",d:"2026-04-19",m:"Saudi Arabia is accelerating adoption of greenhouse solutions through targeted financing programs, investing several billion riyals to advance food security and sustainable agriculture under Vision 2030.",mk:"사우디는 비전2030 하에서 식량안보와 지속가능 농업 진전을 위해 맞춤형 금융 프로그램을 통해 온실 솔루션 도입을 가속화하며 수십억 리얄을 투자하고 있다.",tg:["비전2030","식량안보","농업"],u:"https://www.arabnews.com/node/2640301/business-economy"},
  {id:437,p:7,r:"정책발표",t:"Supreme Court announces Sunday first day of Dhul Qada",k:"대법원, 일요일을 둘카다월 첫날로 공식 발표",s:"Saudi Gazette",c:"saudi",d:"2026-04-18",m:"The Saudi Supreme Court announced that Sunday, April 19 will be the first day of the Islamic month Dhul Qada 1447AH, marking the countdown to Hajj 2026.",mk:"사우디 대법원은 4월 19일 일요일이 이슬람력 1447년 둘카다월 첫날이 될 것이라고 발표하며 2026년 하지 카운트다운이 시작됐다.",tg:["Hajj","이슬람력","대법원"],u:"https://saudigazette.com.sa/article/660667"},
  {id:438,p:8,r:"주요경제",t:"Saudi Land Bridge design contract awarded to Spanish firm Sener",k:"사우디 랜드브리지 설계 계약, 스페인 업체 세너에 낙찰",s:"Saudi Gazette",c:"saudi",d:"2026-04-15",m:"The Saudi Land Bridge project has progressed significantly after Spanish engineering firm Sener won the design contract for the massive east-west rail corridor connecting Dammam and Jeddah.",mk:"담맘과 제다를 연결하는 대규모 동서 철도 회랑 사업인 사우디 랜드브리지 설계 계약을 스페인 엔지니어링 기업 세너가 수주하며 사업이 크게 진전됐다.",tg:["철도","인프라","랜드브리지"],u:"https://saudigazette.com.sa/article/660576"},
  {id:439,p:7,r:"주요경제",t:"Saudi property prices fall by 1.6% in Q1 2026",k:"사우디 부동산 가격, 1분기 2026년 1.6% 하락",s:"Saudi Gazette",c:"saudi",d:"2026-04-20",m:"Saudi Arabia&apos;s property price index recorded a 1.6 percent year-on-year decline in Q1 2026 amid heightened regional tensions and the impact of the Iran war on the economy.",mk:"사우디 부동산 가격지수는 역내 긴장 고조와 이란 전쟁의 경제 영향 속에 2026년 1분기 전년 대비 1.6% 하락을 기록했다.",tg:["부동산","주택","경제지표"],u:"https://saudigazette.com.sa/article/660706"},
  {id:440,p:7,r:"정책발표",t:"First batches of pilgrims land in Madinah and Jeddah as international arrivals commence for Hajj 2026",k:"2026 하지 국제 순례객 도착 시작, 첫 순례객들 메디나·제다 입국",s:"Saudi Gazette",c:"saudi",d:"2026-04-18",m:"The first batches of Hajj pilgrims from multiple countries arrived in Madinah and Jeddah on Saturday, marking the commencement of international arrivals for the 2026 pilgrimage season.",mk:"여러 국가의 첫 하지 순례객들이 토요일 메디나와 제다에 도착하며 2026년 순례 시즌의 국제 도착이 시작됐다.",tg:["Hajj","순례","메디나"],u:"https://saudigazette.com.sa/article/660646"},
  {id:441,p:6,r:"정책발표",t:"Saudi Arabia deports 7,392 illegal residents in a week",k:"사우디, 1주일간 불법체류자 7,392명 추방",s:"Saudi Gazette",c:"saudi",d:"2026-04-13",m:"Saudi authorities deported 7,392 illegal residents in a single week as part of stepped-up enforcement ahead of Hajj season.",mk:"사우디 당국은 하지 시즌에 앞서 강화된 단속의 일환으로 1주일 동안 불법체류자 7,392명을 추방했다.",tg:["출입국","단속","Hajj"],u:"https://saudigazette.com.sa/article/660455"},
  {id:442,p:7,r:"주요경제",t:"Preemptive arrangements for transhipments are in place at Saudi ports",k:"사우디 항만, 환적 대비 선제 조치 완료",s:"Saudi Gazette",c:"saudi",d:"2026-04-14",m:"Saudi ports authority confirmed preemptive logistics arrangements are in place for transhipments amid the ongoing Strait of Hormuz disruption, supporting alternative trade routes.",mk:"사우디 항만당국은 호르무즈 해협 장애가 지속되는 가운데 환적을 위한 선제적 물류 조치가 완료되어 대체 무역 경로를 지원하고 있다고 확인했다.",tg:["항만","물류","호르무즈"],u:"https://saudigazette.com.sa/article/660542"},
  {id:443,p:7,r:"주요경제",t:"Saudi Tadawul Group Successfully Concludes the Capital Markets Select New York Co-hosted by Nasdaq",k:"사우디 타다울, 나스닥과 공동 개최 &apos;캐피탈 마켓 셀렉트 뉴욕&apos; 성공적 개최",s:"Argaam",c:"saudi",d:"2026-04-16",m:"Saudi Tadawul Group concluded the Capital Markets Select New York event co-hosted with Nasdaq, highlighting Saudi market opportunities for US investors ahead of the Riyadh Capital Markets Forum.",mk:"사우디 타다울 그룹이 나스닥과 공동 주최한 &apos;캐피탈 마켓 셀렉트 뉴욕&apos; 행사를 성공적으로 마무리하며 리야드 캐피탈 마켓 포럼에 앞서 미국 투자자들에게 사우디 시장 기회를 강조했다.",tg:["타다울","나스닥","자본시장"],u:"https://www.argaam.com/en/article/articledetail/id/1877888"},
  {id:444,p:6,r:"주요경제",t:"Listed companies report Aramco notice on 2026 fuel price changes",k:"상장기업들, 아람코의 2026년 연료 가격 변동 통보 공시",s:"Argaam",c:"saudi",d:"2026-04-11",m:"Saudi listed companies disclosed Aramco&apos;s April 2026 fuel price update: 91 and 95 octane held steady at SAR 2.18 and SAR 2.33 per litre, diesel unchanged at SAR 1.79.",mk:"사우디 상장사들은 아람코의 2026년 4월 연료 가격 업데이트를 공시했다. 91옥탄과 95옥탄은 리터당 2.18·2.33 사우디리얄로 유지, 경유도 1.79리얄로 변동 없음.",tg:["아람코","연료가격","공시"],u:"https://www.argaam.com/en/article/articledetail/id/1869885"},
  {id:445,p:6,r:"심층분석",t:"Overview of companies expected to list on Tadawul in 2026",k:"2026년 타다울 상장 예정 기업 총정리",s:"Argaam",c:"saudi",d:"2026-04-10",m:"Argaam compiled an overview of companies expected to list on the Saudi Tadawul in 2026, with IPO activity expected to accelerate as market conditions stabilize.",mk:"아르감은 2026년 사우디 타다울에 상장할 예정인 기업들을 총정리하며 시장 여건 안정화와 함께 IPO 활동이 가속화될 것으로 전망했다.",tg:["IPO","타다울","상장"],u:"https://www.argaam.com/en/article/articledetail/id/1870724"},
  {id:446,p:8,r:"주요경제",t:"Saudi Arabia Leads Gulf Growth at 3.1% in 2026",k:"사우디, 2026년 걸프 성장률 3.1%로 선도",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-15",m:"Saudi Arabia is expected to lead regional growth at about 3.1% in 2026 according to the IMF, supported by alternative pipeline capacity that bypasses the Strait of Hormuz.",mk:"사우디는 IMF에 따르면 호르무즈 해협을 우회하는 대체 파이프라인 용량에 힘입어 2026년 약 3.1%의 성장률로 역내 성장을 선도할 것으로 전망된다.",tg:["IMF","성장률","걸프"],u:"https://english.aawsat.com/business/5262520-saudi-arabia-leads-gulf-growth-31"},
  {id:447,p:7,r:"정책발표",t:"Saudi Arabia to Host World Economic Forum Global Collaboration and Growth Meeting in April",k:"사우디, 4월 세계경제포럼 글로벌 협력·성장 회의 제다 개최",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-14",m:"Saudi Arabia will host the World Economic Forum (WEF) Global Collaboration and Growth Meeting: &quot;Building Common Ground and Reviving Growth&quot; in Jeddah on April 22-23, 2026.",mk:"사우디는 2026년 4월 22-23일 제다에서 세계경제포럼(WEF) 글로벌 협력·성장 회의 &apos;공동기반 구축과 성장 회복&apos;을 개최할 예정이다.",tg:["WEF","제다","외교"],u:"https://english.aawsat.com/business/5232928-saudi-arabia-host-world-economic-forum-global-collaboration-and-growth-meeting"},
  {id:448,p:8,r:"심층분석",t:"IEA Hails Saudi Arabia&apos;s &apos;Rapid Response&apos; to Strait of Hormuz Crisis",k:"IEA, 사우디의 호르무즈 해협 위기 &apos;신속 대응&apos; 칭송",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-14",m:"Saudi Arabia rerouted over two-thirds of its oil exports through the East-West pipeline to the Red Sea, earning IEA praise for its rapid response to the Hormuz energy crisis.",mk:"사우디는 동서 파이프라인을 통해 홍해로 원유 수출의 3분의 2 이상을 우회 수송하며 호르무즈 에너지 위기에 대한 신속 대응으로 IEA의 찬사를 받았다.",tg:["IEA","파이프라인","호르무즈"],u:"https://english.aawsat.com/business/5259224-iea-hails-saudi-arabia%E2%80%99s-%E2%80%98rapid-response%E2%80%99-strait-hormuz-crisis"},
  {id:449,p:7,r:"심층분석",t:"Japan to release state oil reserves as Hormuz Strait remains all but closed",k:"일본, 호르무즈 해협 봉쇄 지속에 전략비축유 방출",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Japan announced release of state oil reserves as the Strait of Hormuz remained largely closed, joining other Asian consumers in tapping strategic stockpiles amid the Iran war.",mk:"일본은 이란 전쟁 속에 호르무즈 해협 봉쇄가 지속되자 전략비축유 방출을 발표하며 다른 아시아 소비국들과 함께 전략 재고 소진에 나섰다.",tg:["일본","비축유","호르무즈"],u:"https://saudigazette.com.sa/article/659991"},
  {id:450,p:8,r:"속보",t:"UAE Schools Resume In-Person Classes for All Students from April 20, 2026",k:"UAE, 4월 20일부터 모든 학생 대면 수업 재개",s:"Gulf News",c:"gulf",d:"2026-04-19",m:"Regular classes resumed in all nurseries, kindergartens, and public/private schools in the UAE on April 20 after distance learning since March 2 due to regional conflict.",mk:"이란과의 지역 분쟁으로 3월 2일부터 원격 수업이 시행된 UAE에서 모든 유치원·유아원·공립/사립학교가 4월 20일부터 정규 수업을 재개했다.",tg:["UAE","학교","대면수업"],u:"https://gulfnews.com/uae/education/uae-in-person-education-for-all-students-to-begin-on-monday-1.500508148"},
  {id:451,p:6,r:"속보",t:"Dubai announces return of school bus services from April 20",k:"두바이, 4월 20일부터 사립학교 통학버스 운행 재개",s:"Gulf News",c:"gulf",d:"2026-04-19",m:"Dubai resumed private school bus services from April 20, 2026, under strict safety protocols, coinciding with the reopening of schools after regional tensions.",mk:"두바이는 역내 긴장 완화 이후 학교 개교와 함께 엄격한 안전 프로토콜 하에 2026년 4월 20일부터 사립학교 통학버스 서비스를 재개했다.",tg:["두바이","학교","통학버스"],u:"https://gulfnews.com/uae/education/dubai-announces-return-of-school-bus-services-from-april-20-1.500511364"},
  {id:452,p:6,r:"주요경제",t:"UAE fuel prices: April 2026 petrol and diesel rates announced",k:"UAE 연료가격, 2026년 4월 휘발유·경유 인상",s:"Gulf News",c:"gulf",d:"2026-04-01",m:"UAE announced April 2026 fuel prices: Super 98 petrol at Dh3.39/litre (up from Dh2.59 in March), Special 95 at Dh3.28, reflecting Iran war supply disruption.",mk:"UAE는 2026년 4월 연료 가격을 발표했다. 슈퍼 98 휘발유는 리터당 3.39디르함(3월 2.59디르함에서 상승), 스페셜 95는 3.28디르함으로 이란 전쟁 공급 차질을 반영한다.",tg:["UAE","연료가격","에너지"],u:"https://gulfnews.com/business/energy/uae-announces-petrol-and-diesel-prices-for-april-2026-1.500491487"},
  {id:453,p:7,r:"속보",t:"&apos;So excited to be back&apos;: Pupils return to classrooms amid Iran ceasefire",k:"&apos;돌아와서 너무 신나요&apos;: 이란 휴전 속 UAE 학생들 교실 복귀",s:"The National",c:"gulf",d:"2026-04-20",m:"Schools across Dubai and Abu Dhabi reopened on April 20 after weeks of remote learning during the Iran war, with pupils returning to classrooms under strict safety protocols.",mk:"두바이와 아부다비 학교들은 이란 전쟁 중 수주간의 원격 수업 끝에 4월 20일 개학했으며, 학생들이 엄격한 안전 프로토콜 하에 교실로 복귀했다.",tg:["UAE","학교","개학"],u:"https://www.thenationalnews.com/news/uae/2026/04/20/dubai-abu-dhabi-schools-reopen/"},
  {id:454,p:6,r:"심층분석",t:"Qatar to host International LNG conference in 2026",k:"카타르, 2026년 국제 LNG 컨퍼런스 주최",s:"Qatar Tribune",c:"gulf",d:"2026-04-05",m:"Qatar hosted the 21st International Conference and Exhibition on Liquefied Natural Gas (LNG2026) in Doha, hosted by QatarEnergy with ExxonMobil as a global sponsor.",mk:"카타르는 도하에서 제21회 국제 LNG 컨퍼런스·전시회(LNG2026)를 카타르에너지 주최, 엑손모빌 글로벌 스폰서로 개최했다.",tg:["LNG","카타르","에너지"],u:"https://www.qatar-tribune.com/article/74353/business/qatar-to-host-international-lng-conference-in-2026"},
  {id:455,p:6,r:"주요경제",t:"Cheapest prices in UAE: New platform to compare rates of essential goods",k:"UAE 최저가 플랫폼: 필수 품목 가격 비교 서비스 출시",s:"Khaleej Times",c:"gulf",d:"2026-04-20",m:"The UAE Ministry of Economy and Tourism launched the Essential Goods Prices Platform, enabling residents to compare prices of cooking oils, eggs, dairy, rice, sugar, poultry, meat, fish, and staple produce.",mk:"UAE 경제관광부는 주민들이 식용유, 계란, 유제품, 쌀, 설탕, 가금류, 육류, 어류 및 주요 농산물 가격을 비교할 수 있는 필수재 가격 플랫폼을 출시했다.",tg:["UAE","물가","소비자"],u:"https://www.khaleejtimes.com/business/uae-new-digital-platform-display-essential-goods-price"},
  {id:456,p:10,r:"헤드라인",t:"Iran war: What is happening on day 52 of US-Israeli attacks?",k:"이란 전쟁: 미·이스라엘 공격 52일째 상황은?",s:"Al Jazeera",c:"me",d:"2026-04-20",m:"Day 52 of the US-Israeli conflict with Iran featured renewed Strait of Hormuz tensions after US Marines seized an Iranian cargo ship, with Tehran vowing retaliation as ceasefire deadline looms.",mk:"미·이스라엘 대이란 분쟁 52일째는 미 해병대가 이란 화물선을 나포한 후 테헤란이 보복을 맹세하며 휴전 시한이 임박한 가운데 호르무즈 해협 긴장이 재점화됐다.",tg:["이란전쟁","호르무즈","휴전"],u:"https://www.aljazeera.com/news/2026/4/20/iran-war-what-is-happening-on-day-52-of-the-us-israeli-conflict"},
  {id:457,p:9,r:"속보",t:"UAE reports dismantling of Iran-linked &apos;terror&apos; cell",k:"UAE, 이란 연계 &apos;테러&apos; 조직 해체 발표",s:"Al Jazeera",c:"me",d:"2026-04-20",m:"The UAE arrested members of an Iran-linked group accused of plotting &quot;systematic terrorist and sabotage acts,&quot; with the State Security Service detaining members of a cell linked to Iran&apos;s Velayat-e Faqih doctrine.",mk:"UAE는 &apos;체계적 테러·파괴 행위&apos;를 모의한 혐의의 이란 연계 조직원들을 체포했으며, 국가안보국이 이란 벨라야트-에 파키 교리 연계 조직원들을 구금했다.",tg:["UAE","테러","이란"],u:"https://www.aljazeera.com/news/2026/4/20/uae-reports-dismantling-of-iran-linked-terror-cell"},
  {id:458,p:9,r:"헤드라인",t:"Saudi Arabia, Arab and Muslim countries condemn Israel appointment of envoy to Somaliland",k:"사우디 등 아랍·이슬람 국가, 이스라엘의 소말릴란드 특사 임명 규탄",s:"Al Arabiya",c:"me",d:"2026-04-18",m:"Saudi Arabia and multiple Arab/Muslim countries condemned Israel&apos;s appointment of a diplomatic envoy to Somaliland, calling it a &quot;flagrant violation&quot; of Somalia&apos;s sovereignty and territorial integrity.",mk:"사우디와 여러 아랍·이슬람 국가는 이스라엘의 소말릴란드 특사 임명을 소말리아 주권과 영토 보전에 대한 &apos;노골적 침해&apos;로 규탄했다.",tg:["소말릴란드","이스라엘","외교"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/18/saudi-arabia-arab-and-muslim-countries-condemn-israel-appointment-of-envoy-to-somaliland"},
  {id:459,p:10,r:"헤드라인",t:"Live Updates: Latest from Israel, Iran, and the Middle East (April 20)",k:"실시간 업데이트: 이스라엘·이란·중동 최신 소식 (4월 20일)",s:"Jerusalem Post",c:"me",d:"2026-04-20",m:"Jerusalem Post live updates for April 20 covered Israel&apos;s Memorial Day commemoration, IDF Chief Zamir&apos;s warning on Iran ambitions, and US preparations for Pakistan talks.",mk:"예루살렘 포스트의 4월 20일 실시간 업데이트는 이스라엘 현충일 추모, 자미르 IDF 총참모장의 이란 야망 경고, 미국의 파키스탄 협상 준비를 다뤘다.",tg:["이스라엘","현충일","IDF"],u:"https://www.jpost.com/middle-east/iran-news/2026-04-20/live-updates-893561"},
  {id:460,p:9,r:"속보",t:"Iran war updates: Uncertainty over talks, Trump says deal to come &apos;quickly&apos;",k:"이란 전쟁 업데이트: 협상 불확실, 트럼프 &apos;곧 합의&apos; 발언",s:"Al Jazeera",c:"me",d:"2026-04-20",m:"Tehran slammed US &apos;piracy&apos; after seizure of Iranian ship Touska and vowed response, as uncertainty grows over Tuesday&apos;s planned second round of US-Iran talks in Islamabad.",mk:"테헤란은 이란 화물선 투스카 나포 후 미국의 &apos;해적 행위&apos;를 맹비난하며 보복을 다짐했고, 화요일 이슬라마바드에서 예정된 제2차 미-이란 협상에 불확실성이 커지고 있다.",tg:["이란","미국","협상"],u:"https://www.aljazeera.com/news/liveblog/2026/4/20/iran-war-live-tehran-slams-uss-piracy-after-ship-seizure-vows-response"},
  {id:461,p:9,r:"속보",t:"Oil claws back losses as Strait of Hormuz is closed again",k:"국제유가, 호르무즈 해협 재봉쇄에 낙폭 회복",s:"CNBC",c:"global",d:"2026-04-20",m:"WTI futures jumped more than 6% to $89/barrel while Brent climbed 5.6% to $95.50 on April 20 after Iran re-closed the Strait of Hormuz and the US seized an Iranian cargo ship.",mk:"이란의 호르무즈 해협 재봉쇄와 미국의 이란 화물선 나포로 4월 20일 WTI 선물은 배럴당 89달러로 6% 이상 급등했고, 브렌트유도 5.6% 오른 95.50달러를 기록했다.",tg:["유가","호르무즈","WTI"],u:"https://www.cnbc.com/2026/04/20/oil-claws-back-losses-as-strait-of-hormuz-is-closed-again.html"},
  {id:462,p:9,r:"속보",t:"Stocks, Bonds Fall as Oil Jumps After Hormuz Chaos: Markets Wrap",k:"호르무즈 혼란 속 주식·채권 하락, 유가 급등: 마켓 랩",s:"Bloomberg",c:"global",d:"2026-04-19",m:"US futures fell and oil jumped as Iran tensions worsened, with Brent near $95/barrel recouping roughly half of Friday&apos;s slump after reopening announcement reversal.",mk:"이란 긴장 악화로 미국 선물이 하락하고 유가는 급등했으며, 브렌트유는 배럴당 95달러 수준으로 금요일 재개방 발표 번복 후 낙폭의 절반을 회복했다.",tg:["증시","유가","호르무즈"],u:"https://www.bloomberg.com/news/articles/2026-04-19/us-futures-fall-oil-jumps-as-iran-tensions-worsen-markets-wrap"},
  {id:463,p:9,r:"헤드라인",t:"Oil Prices Soar After US Seizes Iranian Ship",k:"미국의 이란 선박 나포에 국제유가 급등",s:"Bloomberg",c:"global",d:"2026-04-20",m:"Oil and natural gas prices rose after the US Navy seized an Iranian ship during a chaotic weekend that saw Tehran firing at vessels and reimposing controls in the Strait of Hormuz.",mk:"미 해군이 주말 혼란 속에 이란 선박을 나포하고 테헤란이 선박에 발포하며 호르무즈 해협 통제를 재부과하자 원유와 천연가스 가격이 상승했다.",tg:["유가","미해군","이란"],u:"https://www.bloomberg.com/news/newsletters/2026-04-20/oil-prices-soar-after-us-seizes-iranian-ship"},
  {id:464,p:9,r:"헤드라인",t:"Oil prices jump after U.S. seizes Iranian vessel, imperiling ceasefire",k:"미국의 이란 선박 나포로 국제유가 급등, 휴전 위태",s:"Washington Today",c:"global",d:"2026-04-19",m:"Iran threatened retaliation after the US military seized an Iranian-flagged cargo ship in the Gulf of Oman, sending oil prices soaring as US oil futures jumped 7.14% to $89.94.",mk:"미군의 오만만 이란 국적 화물선 나포 후 이란이 보복을 위협했고, 미국산 원유 선물이 7.14% 급등한 89.94달러를 기록하며 유가가 치솟았다.",tg:["유가","나포","오만만"],u:"https://www.washingtonpost.com/world/2026/04/19/trump-iran-war-hormuz-strait-negotiations/"},
  {id:465,p:8,r:"주요경제",t:"Italy&apos;s Edison Secures US LNG Cargoes to Offset Qatar Supply Shortfall",k:"이탈리아 에디슨, 카타르 공급 부족 대체로 미국 LNG 물량 확보",s:"Bloomberg",c:"global",d:"2026-04-15",m:"Edison SpA said it has replaced most Qatari gas supplies disrupted by the Middle East war, securing US LNG cargoes to ensure no immediate risk to Italian customers.",mk:"에디슨 SpA는 중동 전쟁으로 차질을 빚은 카타르 가스 공급 대부분을 미국 LNG 물량 확보로 대체해 이탈리아 고객에게 즉각적인 리스크가 없다고 밝혔다.",tg:["LNG","카타르","이탈리아"],u:"https://www.bloomberg.com/news/articles/2026-04-15/italy-s-edison-replaces-most-qatar-lng-cargoes-disrupted-by-war"},
  {id:466,p:8,r:"심층분석",t:"Qatar Starts Work to Restart LNG Production After Middle East Ceasefire",k:"카타르, 중동 휴전 후 LNG 생산 재개 작업 착수",s:"Bloomberg",c:"global",d:"2026-04-08",m:"Qatar is mobilizing engineers and workers to resume production at the world&apos;s biggest LNG export plant following the ceasefire, though return to significant output requires Strait of Hormuz passage.",mk:"카타르는 휴전 후 세계 최대 LNG 수출기지 생산 재개를 위해 엔지니어와 작업자들을 동원하고 있으나, 본격적 산출 회복은 호르무즈 해협 통과가 필요하다.",tg:["LNG","카타르","휴전"],u:"https://www.bloomberg.com/news/articles/2026-04-08/qatar-begins-work-to-resume-lng-production-after-ceasefire"},
  {id:467,p:7,r:"심층분석",t:"Hormuz Oil: Markets Get in Tune to the Strait and Narrow",k:"호르무즈 원유: 시장, 해협 상황에 적응",s:"Bloomberg",c:"global",d:"2026-04-20",m:"Bloomberg opinion analysis examines how oil markets have adapted to the prolonged Strait of Hormuz disruption, with shadow fleet workarounds and pipeline bypass shaping new trade flows.",mk:"블룸버그 오피니언 분석은 장기화된 호르무즈 해협 장애에 원유 시장이 섀도우 플릿 우회와 파이프라인 우회를 통해 새로운 무역 흐름을 형성하며 적응해 온 과정을 조명한다.",tg:["호르무즈","원유","시장"],u:"https://www.bloomberg.com/opinion/newsletters/2026-04-20/hormuz-oil-markets-get-in-tune-to-the-strait-and-narrow"},
  {id:468,p:7,r:"주요경제",t:"Treasuries Rally as Oil Prices Drop on Middle East Peace Hopes",k:"중동 평화 기대에 유가 하락, 미 국채 랠리",s:"Bloomberg",c:"global",d:"2026-04-17",m:"Treasuries rallied and oil tumbled as markets embraced Middle East peace deal optimism briefly, before weekend ship seizure reversed the move.",mk:"주말 선박 나포 전 시장이 중동 평화 합의 낙관론을 반영하면서 미 국채가 랠리하고 유가는 급락했다.",tg:["국채","유가","평화"],u:"https://www.bloomberg.com/news/articles/2026-04-17/treasuries-rally-as-oil-tumbles-on-mideast-peace-deal-optimism"},
  {id:469,p:8,r:"속보",t:"Oil falls as investors assess mixed messaging on Iran peace talks ahead of ceasefire deadline",k:"휴전 시한 앞두고 이란 협상 엇갈린 메시지, 유가 하락",s:"CNBC",c:"global",d:"2026-04-21",m:"Oil prices dropped on April 21 as investors assessed mixed signals from the US and Iran ahead of the April 22 ceasefire expiration, with hopes of second-round talks lifting risk sentiment.",mk:"투자자들이 4월 22일 휴전 만료를 앞두고 미국과 이란의 엇갈린 신호를 점검하는 가운데 4월 21일 유가는 하락했으며, 2차 협상 기대가 위험 선호 심리를 지지했다.",tg:["유가","휴전","협상"],u:"https://www.cnbc.com/2026/04/21/oil-price-iran-war-strait-hormuz-tanker-ceasefire-peace-talks.html"},
  {id:470,p:7,r:"심층분석",t:"Greek Shipowner Sends Biggest Oil Tanker Yet Through Hormuz",k:"그리스 선사, 호르무즈 최대 유조선 통과 감행",s:"gCaptain",c:"global",d:"2026-04-17",m:"Dynacom Tankers sent the Atokos VLCC (2 million bbl capacity) through Hormuz on April 17, the biggest non-Iranian shipment since the crisis began, bringing their total to 6.5 million barrels.",mk:"다이나콤 탱커스는 4월 17일 200만 배럴 용량의 아토코스 VLCC를 호르무즈 해협 통과시켜 위기 발생 이후 비이란계 최대 선적을 기록했으며, 누적 650만 배럴을 운송했다.",tg:["유조선","그리스","호르무즈"],u:"https://gcaptain.com/greek-shipowner-sends-biggest-oil-tanker-yet-through-hormuz/"},
  {id:471,p:7,r:"심층분석",t:"Hormuz Traffic at Standstill as US Vessel Seizure Widens Risk",k:"미국의 선박 나포로 리스크 확대, 호르무즈 통행 정지",s:"gCaptain",c:"global",d:"2026-04-20",m:"Commercial traffic through the Strait of Hormuz is at a virtual standstill as of April 20, 2026, after a brief and confused reopening over the weekend ended with the first US seizure of an Iranian vessel.",mk:"2026년 4월 20일 기준 호르무즈 해협 상업 통행은 주말 동안의 잠시간 혼란스러운 재개방이 미국의 첫 이란 선박 나포로 끝나면서 사실상 정지된 상태다.",tg:["호르무즈","해운","나포"],u:"https://gcaptain.com/hormuz-traffic-at-standstill-as-us-vessel-seizure-widens-risk/"},
  {id:472,p:7,r:"심층분석",t:"Shipping Industry Pushes Back on &apos;Open&apos; Hormuz Narrative as Risks Persist",k:"해운업계, 리스크 지속 속 &apos;개방&apos; 호르무즈 논리에 반발",s:"gCaptain",c:"global",d:"2026-04-18",m:"Despite declarations that Hormuz is &quot;open,&quot; shipping lanes are not declared safe. Several oil tankers u-turned in the Persian Gulf amid shipowner disarray.",mk:"호르무즈 해협이 &apos;개방&apos;이라는 선언에도 해운 항로는 안전으로 선언되지 않았다. 여러 유조선이 선주들의 혼란 속에 페르시아만에서 회항했다.",tg:["해운","호르무즈","유조선"],u:"https://gcaptain.com/shipping-industry-pushes-back-on-open-hormuz-narrative-as-risks-persist/"},
  {id:473,p:8,r:"속보",t:"Trump threatens Iran again as ceasefire deadline looms, U.S. gears up for peace talks",k:"휴전 시한 임박, 트럼프 또 이란 위협…美 평화협상 준비",s:"CNBC",c:"global",d:"2026-04-20",m:"CNBC reports VP Vance, Kushner and Witkoff preparing to travel to Pakistan for second round of Iran talks as Trump threatens military action if no deal reached by ceasefire deadline.",mk:"CNBC에 따르면 밴스 부통령, 쿠슈너·위트코프 특사가 2차 이란 협상을 위해 파키스탄행을 준비하는 가운데, 트럼프는 휴전 시한까지 합의가 없으면 군사 행동을 할 수 있다고 위협했다.",tg:["트럼프","협상","파키스탄"],u:"https://www.cnbc.com/2026/04/20/trump-defense-iran-war-pakistan-vance-witkoff-kushner.html"},
  {id:474,p:7,r:"심층분석",t:"U.S. EIA weekly crude oil inventories -913K vs +154K expected",k:"미 EIA 주간 원유 재고, 예상 +15.4만 대비 -91.3만 감소",s:"EIA",c:"global",d:"2026-04-15",m:"US EIA weekly petroleum status report showed crude oil inventories fell 913,000 barrels versus expected 154,000 build, reflecting tight supply amid Middle East conflict.",mk:"미 EIA 주간 석유 현황 보고서에 따르면 원유 재고가 예상 +15.4만 배럴 대비 -91.3만 배럴 감소하며 중동 분쟁 속 공급 긴축을 반영했다.",tg:["EIA","재고","원유"],u:"https://www.eia.gov/petroleum/supply/weekly/"},
  {id:475,p:8,r:"심층분석",t:"호르무즈 다음 지정학적 분쟁 가능성 해협 어디?",k:"호르무즈 다음 지정학적 분쟁 가능성 해협 어디?",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-21",m:"파이낸셜뉴스는 호르무즈 해협 위기 이후 지정학적 리스크가 부각될 다음 해협들(말라카, 바브엘만다브 등)을 분석했다.",mk:"파이낸셜뉴스는 호르무즈 해협 위기 이후 지정학적 리스크가 부각될 다음 해협들(말라카, 바브엘만다브 등)을 분석했다.",tg:["호르무즈","지정학","해협"],u:"https://www.fnnews.com/news/202604211102323551"},
  {id:476,p:8,r:"헤드라인",t:"호르무즈·핵 집중한 美-이란…걸프국 &quot;미사일·대리세력 뒷전&quot; 우려",k:"호르무즈·핵 집중한 美-이란…걸프국 &quot;미사일·대리세력 뒷전&quot; 우려",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-21",m:"파이낸셜뉴스에 따르면 미-이란이 호르무즈·핵 이슈에 집중하는 가운데 걸프국들은 이란 미사일 프로그램과 예멘 후티 등 대리세력 문제가 뒷전으로 밀릴 수 있다고 우려한다.",mk:"파이낸셜뉴스에 따르면 미-이란이 호르무즈·핵 이슈에 집중하는 가운데 걸프국들은 이란 미사일 프로그램과 예멘 후티 등 대리세력 문제가 뒷전으로 밀릴 수 있다고 우려한다.",tg:["美-이란","걸프국","핵협상"],u:"https://www.fnnews.com/news/202604210856233148"},
  {id:477,p:8,r:"속보",t:"또 막힌 호르무즈… 美·이란 협상 주도권 힘겨루기",k:"또 막힌 호르무즈… 美·이란 협상 주도권 힘겨루기",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-19",m:"이란이 해협을 재개방한 지 하루 만에 봉쇄를 선언하고 선박 공격까지 이어지면서 미국과 이란 간 2차 종전협상의 주도권 힘겨루기가 격화되고 있다.",mk:"이란이 해협을 재개방한 지 하루 만에 봉쇄를 선언하고 선박 공격까지 이어지면서 미국과 이란 간 2차 종전협상의 주도권 힘겨루기가 격화되고 있다.",tg:["호르무즈","美-이란","협상"],u:"https://www.fnnews.com/news/202604191948118650"},
  {id:478,p:9,r:"헤드라인",t:"휴전 시한 임박…미국·이란, 극적 합의냐 전쟁 재개냐 갈림길",k:"휴전 시한 임박…미국·이란, 극적 합의냐 전쟁 재개냐 갈림길",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-20",m:"4월 22일 휴전 시한을 앞두고 미-이란이 극적 합의냐 전쟁 재개냐 갈림길에 섰으며, 펜스 부통령 일행의 이슬라마바드 방문이 임박한 상황이다.",mk:"4월 22일 휴전 시한을 앞두고 미-이란이 극적 합의냐 전쟁 재개냐 갈림길에 섰으며, 펜스 부통령 일행의 이슬라마바드 방문이 임박한 상황이다.",tg:["휴전","美-이란","협상"],u:"https://www.fnnews.com/news/202604201206428708"},
  {id:479,p:8,r:"정책발표",t:"김정관 장관 &quot;전쟁 끝나도 美 원유 늘리고 수입선 넓힌다&quot;",k:"김정관 장관 &quot;전쟁 끝나도 美 원유 늘리고 수입선 넓힌다&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-19",m:"김정관 산업통상자원부 장관은 이란 전쟁이 끝나도 한국의 미국산 원유 도입을 늘리고 수입선을 다변화하겠다고 밝혔다.",mk:"김정관 산업통상자원부 장관은 이란 전쟁이 끝나도 한국의 미국산 원유 도입을 늘리고 수입선을 다변화하겠다고 밝혔다.",tg:["산업부","원유","美산원유"],u:"https://www.fnnews.com/news/202604191333594216"},
  {id:480,p:7,r:"주요경제",t:"비축유 없이 4~5월 넘긴다…정부 &quot;공급 80% 회복&quot;",k:"비축유 없이 4~5월 넘긴다…정부 &quot;공급 80% 회복&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-12",m:"정부는 비축유 추가 방출 없이 4~5월을 넘길 수 있다고 밝히며, 사우디·카자흐 등 대체 공급선을 통해 원유 공급이 평시의 80% 수준까지 회복됐다고 설명했다.",mk:"정부는 비축유 추가 방출 없이 4~5월을 넘길 수 있다고 밝히며, 사우디·카자흐 등 대체 공급선을 통해 원유 공급이 평시의 80% 수준까지 회복됐다고 설명했다.",tg:["비축유","원유","공급"],u:"https://www.fnnews.com/news/202604121313378212"},
  {id:481,p:7,r:"심층분석",t:"호르무즈 리스크에 캐나다 원유 뜬다…정유업계 &apos;탈중동&apos; 속도",k:"호르무즈 리스크에 캐나다 원유 뜬다…정유업계 &apos;탈중동&apos; 속도",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-17",m:"호르무즈 해협 리스크가 지속되면서 국내 정유업계가 캐나다산 원유 도입을 늘리며 &apos;탈중동&apos; 다변화 속도를 높이고 있다.",mk:"호르무즈 해협 리스크가 지속되면서 국내 정유업계가 캐나다산 원유 도입을 늘리며 &apos;탈중동&apos; 다변화 속도를 높이고 있다.",tg:["캐나다원유","정유","탈중동"],u:"https://www.fnnews.com/news/202604171703183840"},
  {id:482,p:7,r:"주요경제",t:"걸프국 에너지 시설 피해 86조원... 당분간 미국산 석유 수요 높을듯",k:"걸프국 에너지 시설 피해 86조원... 당분간 미국산 석유 수요 높을듯",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-16",m:"이란 전쟁으로 걸프국 에너지 시설 피해 규모가 86조 원에 달하면서 당분간 미국산 석유 수요가 높게 유지될 것으로 전망된다.",mk:"이란 전쟁으로 걸프국 에너지 시설 피해 규모가 86조 원에 달하면서 당분간 미국산 석유 수요가 높게 유지될 것으로 전망된다.",tg:["걸프국","에너지시설","美산석유"],u:"https://www.fnnews.com/news/202604161037466920"},
  {id:483,p:6,r:"정책발표",t:"기름값 상한제, 전기료 그대로…중동發 에너지 대응, 왜 다를까",k:"기름값 상한제, 전기료 그대로…중동發 에너지 대응, 왜 다를까",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-18",m:"정부는 유류세 추가 인하와 기름값 상한제를 도입했으나 전기요금은 동결을 유지했다. 파이낸셜뉴스는 중동발 에너지 대응 정책이 품목별로 차별화된 배경을 분석했다.",mk:"정부는 유류세 추가 인하와 기름값 상한제를 도입했으나 전기요금은 동결을 유지했다. 파이낸셜뉴스는 중동발 에너지 대응 정책이 품목별로 차별화된 배경을 분석했다.",tg:["유류세","전기요금","에너지정책"],u:"https://www.fnnews.com/news/202604180802074814"},
  {id:484,p:8,r:"주요경제",t:"중동 전쟁에도 반도체↑…4월 중순 수출 504억달러 &apos;역대 최대&apos;",k:"중동 전쟁에도 반도체↑…4월 중순 수출 504억달러 &apos;역대 최대&apos;",s:"머니투데이",c:"korean-view",d:"2026-04-21",m:"중동 전쟁으로 인한 물류·에너지 부담에도 불구하고 4월 중순까지 한국 수출이 504억 달러로 역대 최대를 기록했으며, 반도체 수출이 이를 견인했다.",mk:"중동 전쟁으로 인한 물류·에너지 부담에도 불구하고 4월 중순까지 한국 수출이 504억 달러로 역대 최대를 기록했으며, 반도체 수출이 이를 견인했다.",tg:["수출","반도체","역대최대"],u:"https://www.mt.co.kr/economy/2026/04/21/2026042108261845016"},
  {id:485,p:9,r:"정책발표",t:"PIF Board Approves 2026-2030 Strategy Under Crown Prince Leadership",k:"PIF 이사회, 왕세자 주재 하에 2026-2030 전략 승인",s:"Saudi Gazette",c:"saudi",d:"2026-04-15",m:"The Public Investment Fund approved its new five-year strategy focused on six economic ecosystems including tourism, logistics, clean energy and NEOM. Assets under management have grown from $150 billion in 2015 to over $900 billion, contributing 10% of non-oil GDP in 2024.",mk:"공공투자기금(PIF)은 관광·물류·청정에너지·네옴 등 6대 경제 생태계에 집중하는 새 5개년 전략을 승인했다. 운용자산은 2015년 1,500억 달러에서 9,000억 달러를 초과하는 수준으로 성장했고, 2024년 비석유 GDP의 10%에 기여했다.",tg:["PIF","비전2030","전략","왕세자"],u:"https://saudigazette.com.sa/article/660562"},
  {id:486,p:8,r:"주요경제",t:"Saudi Arabia Set for 4.6% GDP Growth in 2026 — Pre-Budget Statement",k:"사우디, 2026년 GDP 성장률 4.6% 전망 — 예산 예고서",s:"Arab News",c:"saudi",d:"2026-04-15",m:"Saudi Arabia is forecasting real GDP growth of 4.6 percent in 2026, supported by an expected increase in the output of non-oil activities. The government is maintaining a voluntary deficit stance to accelerate Vision 2030 project rollout.",mk:"사우디아라비아는 비석유 부문 생산 증가에 힘입어 2026년 실질 GDP 성장률 4.6%를 전망하고 있다. 정부는 비전 2030 프로젝트 이행 가속화를 위해 자발적 재정 적자 기조를 유지한다.",tg:["GDP","경제성장","예산","비전2030"],u:"https://www.arabnews.com/node/2617313/business-economy"},
  {id:487,p:7,r:"심층분석",t:"Rapid Recovery of Oil Facilities Reinforces Saudi Arabia&apos;s Reliability as Global Energy Supplier",k:"석유시설 신속 복구, 사우디의 글로벌 에너지 공급자 신뢰 재확인",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-14",m:"Saudi officials emphasized that restoring throughput to around 7 million barrels per day via the East-West pipeline sends clear reassurance to global markets. The Kingdom&apos;s logistical resilience reinforces its reputation as a reliable supplier in times of turmoil.",mk:"사우디 당국은 동서 파이프라인 통과량이 일 700만 배럴 수준으로 복구된 것이 글로벌 시장에 명확한 안도 신호를 보냈다고 강조했다. 사우디의 물류 회복력은 위기 국면에서도 신뢰할 수 있는 공급자로서의 위상을 재확인시켰다.",tg:["석유시설","동서파이프라인","복구","공급안정"],u:"https://english.aawsat.com/business/5261531-rapid-recovery-oil-facilities-reinforces-saudi-arabia-reliability-global-energy"},
  {id:488,p:8,r:"헤드라인",t:"First Batches of Pilgrims Land in Madinah and Jeddah as International Arrivals Commence for Hajj 2026",k:"2026 하지 첫 국제 순례자, 메디나·제다 공항에 도착",s:"Saudi Gazette",c:"saudi",d:"2026-04-19",m:"The first international pilgrims for Hajj 2026 arrived at Madinah and Jeddah airports. Saudia mobilized 160 aircraft with over 1 million seats to serve pilgrims from around 145 destinations, with 3.1 million airline seats activated across the Hajj operations.",mk:"2026년 하지(Hajj)를 위한 첫 국제 순례자들이 메디나와 제다 공항에 도착했다. 사우디항공은 160대 항공기와 100만 석 이상을 투입해 약 145개 노선에서 순례자를 수송하며, 전체 하지 운영에는 항공 좌석 310만 석이 가동된다.",tg:["하지","순례","메디나","제다"],u:"https://saudigazette.com.sa/article/660646/saudi-arabia/first-batches-of-pilgrims-land-in-madinah-and-jeddah-as-international-arrivals-commence-for-hajj-2026"},
  {id:489,p:7,r:"주요경제",t:"Gold Prices Ease in Dubai as Investors Await Clarity on US-Iran Talks",k:"미·이란 회담 불확실에 두바이 금값 소폭 하락",s:"Khaleej Times",c:"gulf",d:"2026-04-21",m:"Spot gold traded at $4,788 per ounce, down 0.45%, while silver fell 1.1% to $79 per ounce on Tuesday. Investors are awaiting clarity on the second round of US-Iran peace talks ahead of the ceasefire deadline expiring Wednesday.",mk:"화요일 두바이 현물 금은 온스당 4,788달러로 0.45% 하락했고 은도 79달러로 1.1% 내렸다. 수요일 만료되는 휴전 시한을 앞두고 미-이란 2차 협상 결과에 대한 불확실성이 투자심리를 좌우하고 있다.",tg:["금값","두바이","미이란회담","휴전"],u:"https://www.khaleejtimes.com/business/markets/dubai-gold-prices-drop-april-21-us-iran-talks"},
  {id:490,p:8,r:"주요경제",t:"UAE Economic Growth Accelerates in Early 2026 on Banking and Trade Gains",k:"UAE, 2026년 초 은행·무역 성장에 힘입어 경제 성장 가속",s:"Gulf News",c:"gulf",d:"2026-04-18",m:"UAE growth accelerated in early 2026 with total banking assets up 1.1% in February to over AED 5.472 trillion. Total foreign trade reached AED 6 trillion in 2025, a 15% rise, putting UAE among the world&apos;s top 10 merchandise exporters. Moody&apos;s reaffirmed its Aa2 rating.",mk:"UAE 총 은행자산은 2월 1.1% 증가한 5조 4,720억 디르함을 넘어섰다. 2025년 총 교역액은 6조 디르함으로 전년 대비 15% 증가해 UAE가 세계 10대 상품 수출국에 진입했다. 무디스는 Aa2 등급을 재확인했다.",tg:["UAE","경제성장","은행","무역"],u:"https://gulfnews.com/business/economy/uae-growth-accelerates-in-early-2026-driven-by-banking-and-trade-gains-1.500511998"},
  {id:491,p:8,r:"심층분석",t:"Gulf Trade Exposure Index: Nations at Greatest Risk from Hormuz Strait Closure",k:"걸프 무역 노출 지수: 호르무즈 폐쇄 최대 위험 국가는?",s:"The National",c:"gulf",d:"2026-04-20",m:"The National&apos;s Gulf Trade Exposure Index ranks nations most vulnerable to disruptions at the Strait of Hormuz. Korea, Japan, and India are highlighted as the most exposed major economies due to high Gulf oil import dependence.",mk:"The National의 걸프 무역 노출 지수는 호르무즈 해협 봉쇄에 가장 취약한 국가들을 순위화했다. 한국·일본·인도가 걸프 원유 수입 의존도가 높아 가장 큰 영향을 받는 주요 경제로 지목됐다.",tg:["호르무즈","걸프","무역노출","한국"],u:"https://www.thenationalnews.com/news/2026/04/20/gulf-trade-exposure-index-nations-at-greatest-risk-from-hormuz-strait-closure/"},
  {id:492,p:7,r:"헤드라인",t:"Hajj 2026: Kaaba Works Finished, First Pilgrim Flights Land in Jeddah",k:"2026 하지: 카바 보수 완료, 첫 순례 항공편 제다 도착",s:"Gulf News",c:"gulf",d:"2026-04-19",m:"Works around the Kaaba in Makkah have been finished ahead of the Hajj 2026 season, while the first pilgrim flights have landed in Jeddah. Saudi authorities say infrastructure is ready to receive millions of pilgrims.",mk:"2026년 하지 시즌을 앞두고 메카 카바 주변 보수공사가 완료됐고, 첫 순례자 항공편이 제다에 도착했다. 사우디 당국은 수백만 순례객 수용을 위한 인프라 정비가 완료됐다고 밝혔다.",tg:["하지","카바","제다","순례"],u:"https://gulfnews.com/world/gulf/saudi/hajj-2026-kaaba-works-finished-first-pilgrim-flights-land-in-jeddah-1.500511938"},
  {id:493,p:10,r:"속보",t:"Iran War Live: Tehran Spurns Talks Under Threats; Trump Says Blockade Stays",k:"[속보] 이란, 압박 속 회담 거부…트럼프 &quot;봉쇄 유지&quot;",s:"Al Jazeera",c:"me",d:"2026-04-21",m:"Tehran said it will not negotiate under the &quot;shadow of threats&quot; on the day the two-week ceasefire expires. President Trump said the US blockade on Iranian ports will remain until Tehran agrees to a deal.",mk:"이란은 2주 휴전 만료일을 맞아 &quot;위협의 그림자 아래&quot;에서는 협상하지 않겠다고 밝혔다. 트럼프 대통령은 이란이 합의에 동의할 때까지 미국의 이란 항구 봉쇄를 유지하겠다고 선언했다.",tg:["이란전쟁","휴전","봉쇄","트럼프"],u:"https://www.aljazeera.com/news/liveblog/2026/4/21/iran-war-live-tehran-shuns-talks-trump-says-us-blockade-to-remain"},
  {id:494,p:8,r:"심층분석",t:"Cloud over US-Iran Talks: What Are the Key Sticking Points?",k:"미·이란 회담에 드리운 그림자: 핵심 쟁점은 무엇인가",s:"Al Jazeera",c:"me",d:"2026-04-20",m:"Core sticking points remain Iran&apos;s nuclear programme and control of the Strait of Hormuz. US demands include ending Iran&apos;s nuclear program, missile limits, reopening Hormuz, restrictions on armed-group support, and sanctions relief.",mk:"핵심 쟁점은 이란의 핵 프로그램과 호르무즈 해협 통제권이다. 미국의 요구안은 이란 핵 프로그램 종료, 미사일 제한, 호르무즈 재개방, 대리세력 지원 제한, 제재 완화 등이 포함된다.",tg:["미이란회담","핵프로그램","호르무즈","쟁점"],u:"https://www.aljazeera.com/news/2026/4/20/cloud-over-us-iran-talks-what-are-the-key-sticking-points"},
  {id:495,p:9,r:"속보",t:"Iran Says No Talks with US for Now, Casting Doubt over Pakistan Efforts",k:"이란, 당분간 미국과 회담 없어…파키스탄 중재 노력 의문시",s:"Al Jazeera",c:"me",d:"2026-04-20",m:"Iran said it will not be sending negotiators to Pakistan for talks with the US, amid rising tensions. Foreign Ministry spokesman Esmaeil Baghaei said Washington had &quot;violated the ceasefire from the beginning of its implementation&quot;.",mk:"이란은 긴장 고조 속에 미국과의 회담을 위해 파키스탄에 협상단을 파견하지 않겠다고 밝혔다. 외무부 대변인 에스마일 바그하이는 워싱턴이 &quot;처음부터 휴전을 위반해왔다&quot;고 주장했다.",tg:["이란","파키스탄","회담거부","휴전위반"],u:"https://www.aljazeera.com/news/2026/4/20/pakistan-ready-for-multi-day-us-iran-talks-but-tehran-unsure-about-joining"},
  {id:496,p:8,r:"헤드라인",t:"Live Updates April 21: Sirens Mark Memorial Day as IDF Chief Vows to Stop Iran",k:"이스라엘 현충일 사이렌…IDF 참모총장 &quot;이란 막을 것&quot;",s:"Times of Israel",c:"me",d:"2026-04-21",m:"Sirens rang out across Israel at 11am marking Memorial Day. IDF Chief of Staff Lt. Gen. Eyal Zamir said at the Western Wall ceremony that Israel will not allow Iran to &quot;realize its ambitions&quot;. Since last Memorial Day, 174 members of Israel&apos;s security forces have been killed in service.",mk:"오전 11시 이스라엘 전역에 사이렌이 울려 현충일을 알렸다. 에얄 자미르 IDF 참모총장은 통곡의 벽 행사에서 이스라엘이 &quot;이란의 야망 실현&quot;을 용납하지 않겠다고 선언했다. 지난 현충일 이후 복무 중 사망한 이스라엘 보안군은 174명에 달한다.",tg:["이스라엘","현충일","IDF","이란"],u:"https://www.timesofisrael.com/liveblog-april-21-2026/"},
  {id:497,p:10,r:"속보",t:"Live Updates: Iran Demands Immediate Release of Seized Vessel as Ceasefire Deadline Looms",k:"[속보] 이란, 나포 선박 즉시 석방 요구…휴전 시한 임박",s:"CNN",c:"global",d:"2026-04-20",m:"Iran demanded the immediate release of the Iranian cargo ship seized by the US Navy on Sunday. Both sides accused each other of ceasefire violations as the two-week truce is set to expire Tuesday evening ET.",mk:"이란은 일요일 미 해군에 나포된 이란 화물선의 즉시 석방을 요구했다. 양측은 상대방의 휴전 위반을 주장하는 가운데 2주 휴전이 화요일 저녁(미국 동부시간) 만료 예정이다.",tg:["이란","나포","휴전","CNN"],u:"https://www.cnn.com/2026/04/20/world/live-news/iran-war-us-trump-israel"},
  {id:498,p:8,r:"심층분석",t:"Both Iran and US Think They&apos;re Winning the War. Both Can&apos;t Be Right",k:"이란과 미국 모두 &quot;전쟁에서 이기고 있다&quot; 주장…현실은?",s:"CNN",c:"global",d:"2026-04-20",m:"CNN analysis examines how both Iran and the US believe they have the upper hand in the ongoing conflict. The cognitive gap may be making a negotiated resolution harder to achieve as the ceasefire deadline approaches.",mk:"CNN 분석은 이란과 미국이 모두 현 분쟁에서 우위에 있다고 믿는 양상을 짚는다. 휴전 시한이 다가오는 가운데 이 인식 격차가 협상 타결을 더 어렵게 만들고 있다고 평가한다.",tg:["이란전쟁","분석","CNN","협상"],u:"https://www.cnn.com/2026/04/20/politics/trump-iran-war-ceasefire-peace-talks-strait-analysis"},
  {id:499,p:8,r:"헤드라인",t:"A Deal to End the Iran War Seemed Close. Then Trump Started Posting on Social Media",k:"이란전 종식 합의 임박했는데…트럼프 SNS 글이 변수로",s:"CNN",c:"global",d:"2026-04-20",m:"CNN reports that a deal to end the Iran war appeared close before President Trump&apos;s social media posts complicated negotiations. Iranian officials cited the posts as evidence of bad faith at the negotiating table.",mk:"CNN은 이란 전쟁 종식 합의가 임박한 듯 보였으나 트럼프 대통령의 SNS 글이 협상을 복잡하게 만들었다고 보도했다. 이란 측은 해당 발언들을 협상 진정성 결여의 증거로 지적했다.",tg:["트럼프","SNS","협상","이란전쟁"],u:"https://www.cnn.com/2026/04/20/politics/social-media-posts-trump-iran-deal"},
  {id:500,p:9,r:"헤드라인",t:"1,350 Trillion Won Saudi Wealth Fund&apos;s New Strategy: Concentrate on AI and Minerals",k:"1350조 사우디 국부펀드 &apos;새 전략&apos;...AI·광물에 집중 투자",s:"서울경제",c:"korean-view",d:"2026-04-15",m:"Saudi PIF will concentrate investments on mining, AI and tourism sectors going forward, scaling back some mega real-estate development projects. Governor Yasir Al-Rumayyan said NEOM projects will see spending priorities reordered rather than canceled.",mk:"사우디 공공투자기금(PIF)은 앞으로 광업·인공지능(AI)·관광 분야에 투자를 집중하고 일부 대형 부동산 개발 사업은 축소·재배치한다. 야시르 알루마이얀 총재는 네옴시티 사업은 취소가 아닌 우선순위 재조정이라고 밝혔다.",tg:["PIF","AI","광물","네옴"],u:"https://www.sedaily.com/article/20007195"},
  {id:501,p:8,r:"심층분석",t:"Saudi PIF assets triple with 390% surge since 2016, 2030 target raised",k:"사우디 PIF 자산, 2016년 이후 390% 급증…2030년 목표 상향",s:"Arab News",c:"saudi",d:"2026-04-16",m:"Saudi PIF assets have surged 390% since 2016 and the 2030 target has been raised. The fund now manages over $925 billion, projecting continued aggressive domestic investment under the 2026-2030 strategy with 80% local, 20% international split.",mk:"사우디 PIF 자산이 2016년 이후 390% 급증했고 2030년 목표가 상향됐다. 운용자산 9,250억 달러를 넘어섰으며 2026-2030 전략 하에 국내 80%·해외 20% 배분으로 공격적 국내 투자가 지속될 전망이다.",tg:["PIF","자산","390%","국내투자"],u:"https://www.arabnews.com/node/2598543/business-economy"},
  {id:502,p:8,r:"심층분석",t:"Art Basel names Diriyah Biennale Foundation as 2026 award medalist",k:"Art Basel, 디리야 비엔날레 재단을 2026 어워드 메달리스트로 선정",s:"Arab News",c:"saudi",d:"2026-04-19",m:"The Diriyah Biennale Foundation has been named a medalist in the 2026 Art Basel Awards in the Museum and Institution category, recognized as a key platform for regional artistic development. The third Diriyah Contemporary Art Biennale is running until May 2, 2026 at JAX District.",mk:"디리야 비엔날레 재단이 Art Basel 2026 어워드 박물관·기관 부문 메달리스트로 선정됐다. 스위스 아트페어 운영측은 &quot;지역 예술 발전의 핵심 플랫폼&quot;이라 평가했다. 현재 제3회 디리야 현대미술 비엔날레는 5월 2일까지 리야드 JAX 디스트릭트에서 열리고 있다.",tg:["문화","디리야","비전2030","예술"],u:"https://www.arabnews.com/node/2640470/saudi-arabia"},
  {id:503,p:7,r:"주요경제",t:"Logistics, entertainment help lift Saudi Operating Revenue Index 5.9%",k:"물류·엔터테인먼트, 사우디 영업수익지수 5.9% 상승 견인",s:"Arab News",c:"saudi",d:"2026-04-20",m:"Business activity across Saudi Arabia in February lifted the Kingdom&apos;s Operating Revenue Index by 5.9 percent year-on-year with gains across manufacturing, mining and transportation. The information and communication sector posted the highest annual increase of 19 percent.",mk:"사우디 영업수익지수가 2월 기준 전년 동기 대비 5.9% 상승했다. 제조업·광업·운송업이 모두 증가세를 보인 가운데 정보통신 부문이 19%로 최대 상승폭을 기록했다. 비석유 부문이 경제성장의 주춧돌 역할을 하고 있다는 평가다.",tg:["비석유경제","통계","경제지표"],u:"https://www.arabnews.com/node/2640567/business-economy"},
  {id:504,p:9,r:"헤드라인",t:"Saudi Arabia reaffirms full support for Palestinian government&apos;s reform program",k:"사우디, 팔레스타인 정부 개혁 프로그램 완전 지지 재천명",s:"Saudi Gazette",c:"saudi",d:"2026-04-20",m:"Saudi Arabia, the EU, and Norway co-chaired the ninth meeting of the Global Alliance for Implementation of the Two-State Solution, with 83 countries and international organizations attending. Saudi Minister Plenipotentiary Manal Radwan affirmed full support for the Palestinian government&apos;s reform program.",mk:"사우디아라비아·EU·노르웨이가 공동의장으로 주재한 제9차 &apos;두 국가 해법 이행 글로벌 동맹&apos; 회의에 83개국·국제기구가 참석했다. 사우디 전권대사 마날 라드완은 팔레스타인 정부의 개혁 프로그램에 대한 왕국의 완전한 지지를 재확인했다.",tg:["팔레스타인","외교","두국가해법"],u:"https://saudigazette.com.sa/article/660710/saudi-arabia/saudi-arabia-reaffirms-full-support-for-palestinian-governments-reform-program"},
  {id:505,p:6,r:"정책발표",t:"Interior Ministry warns against fraudulent Hajj campaigns",k:"내무부, 부정 하지 캠페인 주의 당부",s:"Saudi Gazette",c:"saudi",d:"2026-04-20",m:"Saudi Arabia&apos;s Interior Ministry warned against fraudulent Hajj campaigns, urging pilgrims to book only through authorized channels. Those who facilitate Hajj with improper visit visas face fines of up to SR100,000. The warning comes as international arrivals for Hajj 2026 commence.",mk:"사우디 내무부가 부정 하지 캠페인 주의를 당부하며 공인 경로를 통한 예약만 이용할 것을 촉구했다. 방문 비자로 하지 수행을 돕는 자에겐 최대 10만 사우디리얄(약 SR100,000) 벌금이 부과된다. 하지 2026 국제 순례객 도착이 시작된 시점에 나온 경고다.",tg:["하지","내무부","사기주의"],u:"https://saudigazette.com.sa/article/660705"},
  {id:506,p:7,r:"정책발표",t:"PIF governor: No projects cancelled in NEOM, spending priorities reassessed",k:"PIF 총재 &quot;네옴 프로젝트 취소 없다, 지출 우선순위 재조정 중&quot;",s:"Saudi Gazette",c:"saudi",d:"2026-04-15",m:"PIF Governor Yasir Al-Rumayyan stated that no projects in NEOM have been cancelled, adding that the project company has instead been instructed to reprioritize its spending. He emphasized NEOM remains on track despite recent construction commitment reductions.",mk:"PIF 야시르 알-루마이얀 총재가 &quot;네옴에서 취소된 프로젝트는 없다&quot;며 &quot;사업체에 지출 우선순위 재조정을 지시했을 뿐&quot;이라고 밝혔다. 최근 수백억 달러 규모의 건설 약정 축소에도 네옴은 정상 궤도에 있다고 강조했다.",tg:["네옴","PIF","비전2030"],u:"https://saudigazette.com.sa/article/660565"},
  {id:507,p:5,r:"심층분석",t:"Lyrid meteor shower to peak over Saudi skies Wednesday night",k:"수요일 밤 사우디 하늘에서 거문고자리 유성우 절정",s:"Saudi Gazette",c:"saudi",d:"2026-04-21",m:"The Lyrid meteor shower is expected to peak over Saudi Arabian skies on Wednesday night, offering skywatchers the opportunity to observe up to 18 meteors per hour. The annual event is associated with Comet Thatcher and provides bright, fast-moving meteors.",mk:"연례 거문고자리(Lyrid) 유성우가 수요일 밤 사우디 하늘에서 절정을 이룰 전망이다. 시간당 최대 18개 유성 관측이 가능할 것으로 예상되며, 이 유성우는 대처 혜성과 연관된 밝고 빠른 유성으로 유명하다.",tg:["과학","우주","유성우"],u:"https://saudigazette.com.sa/article/660728/saudi-arabia/lyrid-meteor-shower-to-peak-over-saudi-skies-wednesday-night"},
  {id:508,p:10,r:"헤드라인",t:"Mohammed bin Salman, Burhan Discuss Developments in Sudan",k:"MBS, 수단 주권위원회 의장 부르한과 제다서 수단 정세 논의",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-20",m:"Saudi Crown Prince Mohammed bin Salman met with General Abdel Fattah al-Burhan, head of Sudan&apos;s Transitional Sovereign Council, in Jeddah. The two leaders emphasized the importance of Sudan&apos;s security, stability, sovereignty and territorial integrity, and discussed Red Sea regional security.",mk:"MBS 사우디 왕세자가 제다에서 수단 과도주권위원회 의장 압델 파타 알-부르한 장군과 회담했다. 양측은 수단의 안보·안정·주권·영토 보전의 중요성을 강조했으며, 홍해 지역 안보도 의제로 다뤘다. 수단이 RSF로부터 수도 하르툼을 탈환한 직후 이뤄진 회담이다.",tg:["수단","홍해","외교","MBS"],u:"https://english.aawsat.com/gulf/5264758-mohammed-bin-salman-burhan-discuss-developments-sudan"},
  {id:509,p:8,r:"정책발표",t:"Saudi Foreign Minister Discusses Regional Developments with US, Spanish Counterparts",k:"사우디 외교장관, 미국·스페인 외교장관과 역내 정세 논의",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-17",m:"Saudi Foreign Minister Prince Faisal bin Farhan held separate phone talks with his US and Spanish counterparts, focusing on the latest regional developments including US-Iran ceasefire, Gaza situation, and Strait of Hormuz navigation.",mk:"사우디 파이살 빈 파르한 외교장관이 미국·스페인 외교장관과 개별 전화 통화를 갖고 미-이란 휴전, 가자 상황, 호르무즈 해협 통항 등 최신 역내 정세를 논의했다.",tg:["외교","미국","스페인","중동정세"],u:"https://english.aawsat.com/gulf/5260757-saudi-foreign-minister-discusses-regional-developments-us-spanish-counterparts"},
  {id:510,p:8,r:"정책발표",t:"Saudi Arabia Holds 9 Rounds of Regional Political Consultations in 48 Hours",k:"사우디, 48시간 내 9건의 역내 정치 협의 진행",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-18",m:"Saudi Foreign Minister Prince Faisal bin Farhan conducted intensive political consultations following the US-Iran talks in Islamabad. Over 48 hours, Saudi Arabia held at least nine publicly disclosed rounds of consultations aimed at easing regional tensions and coordinating positions.",mk:"사우디 파이살 외교장관이 이슬라마바드 미-이란 회담 후 집중 정치 협의를 진행했다. 사우디 외교부에 따르면 지난 48시간 동안 최소 9건의 공개 협의가 이뤄져 역내 긴장 완화와 입장 조율이 모색됐다.",tg:["외교","미-이란","협의","중재"],u:"https://english.aawsat.com/gulf/5262371-saudi-arabia-holds-9-rounds-regional-political-cosultations-48-hours"},
  {id:511,p:8,r:"정책발표",t:"Saudi Foreign Minister, Korean Presidential Special Envoy Discuss Regional Developments",k:"사우디 외교장관, 한국 대통령 특사와 역내 정세 논의",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-18",m:"Saudi Foreign Minister Prince Faisal bin Farhan met with the Korean Presidential Special Envoy to discuss the latest regional developments and Saudi-Korea bilateral cooperation amid the ongoing US-Iran tensions.",mk:"사우디 파이살 외교장관이 한국 대통령 특사와 만나 최신 역내 정세 및 한-사우디 양자 협력 방안을 논의했다. 미-이란 긴장이 지속되는 가운데 이뤄진 회동이다.",tg:["한국","외교","특사"],u:"https://english.aawsat.com/gulf/5261482-saudi-foreign-minister-korean-presidential-special-envoy-discuss-regional-developments"},
  {id:512,p:9,r:"주요경제",t:"Crown Prince approves PIF&apos;s 2026-2030 strategy",k:"왕세자, PIF 2026-2030 신전략 승인",s:"Argaam",c:"saudi",d:"2026-04-15",m:"Saudi Crown Prince Mohammed bin Salman approved the Public Investment Fund&apos;s 2026-2030 strategy. The strategy will focus on delivering six competitive domestic ecosystems, maximizing long-term returns, and continuing to drive the economic transformation of Saudi Arabia.",mk:"MBS 사우디 왕세자가 PIF 2026-2030 신전략을 승인했다. 신전략은 경쟁력 있는 국내 6대 에코시스템 구축, 장기 수익 극대화, 경제 전환 지속 등을 골자로 한다. PIF는 2021-2025년 국내에 1,990억달러 신규 투자를 집행했다.",tg:["PIF","전략","비전2030"],u:"https://www.argaam.com/en/article/articledetail/id/1896727"},
  {id:513,p:6,r:"주요경제",t:"Saudi Aramco (2222) trades at SAR 27.20 amid market volatility",k:"사우디 아람코(2222), 시장 변동성 속 SAR 27.20 거래",s:"Argaam",c:"saudi",d:"2026-04-20",m:"Saudi Aramco stock (2222) is trading at SAR 27.20 with a dividend yield of 4.99% and market cap of SAR 6.58 trillion. The 52-week range is 23.04-27.76. Next earnings report is scheduled for May 11, 2026 amid ongoing Iran war oil market volatility.",mk:"사우디 아람코 주가(2222)가 시장 변동성 속 SAR 27.20에 거래됐다. 배당수익률 4.99%, 시가총액 약 6.58조 SAR 수준이다. 52주 범위는 23.04-27.76이며, 5월 11일 예정된 차기 실적 발표 전 이란전 유가 변동성이 이어지고 있다.",tg:["아람코","TASI","주가","배당"],u:"https://www.argaam.com/en/tadawul/tasi/saudi-aramco"},
  {id:514,p:8,r:"주요경제",t:"Saudi Arabia Says East-West Pipeline Restored to Full Capacity",k:"사우디 &quot;동서송유관, 피격 후 완전 용량 복구&quot;",s:"Saudi Gazette",c:"saudi",d:"2026-04-12",m:"Saudi Arabia&apos;s Ministry of Energy announced that the East-West oil pipeline was restored to full capacity after being damaged in attacks during the Iran war. The pipeline can again pump approximately 7 million barrels of oil per day. Production at the Manifa oilfield has also been restored to 300,000 bpd.",mk:"사우디 에너지부가 이란전 중 피격으로 손상됐던 동서송유관을 완전 용량으로 복구했다고 밝혔다. 송유관 처리량이 하루 약 700만 배럴로 회복됐으며 마니파 유전도 일산 30만 배럴의 완전 가동에 복귀했다. 쿠라이스 유전은 여전히 복구 진행 중이다.",tg:["원유","송유관","아람코","에너지인프라"],u:"https://saudigazette.com.sa/article/660712/saudi-arabia/saudi-arabia-says-east-west-pipeline-restored-to-full-capacity"},
  {id:515,p:8,r:"정책발표",t:"Saudi Foreign Minister, UN Secretary-General Discuss Regional Developments",k:"사우디 외교장관, UN 사무총장과 역내 정세 논의",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-16",m:"Saudi Foreign Minister Prince Faisal bin Farhan held talks with UN Secretary-General Antonio Guterres to discuss regional developments including the US-Iran ceasefire, Gaza humanitarian situation, and efforts toward peace in Sudan.",mk:"사우디 파이살 외교장관이 안토니우 구테흐스 UN 사무총장과 회담을 갖고 미-이란 휴전, 가자 인도주의 상황, 수단 평화 노력 등 역내 정세를 논의했다.",tg:["UN","외교","사무총장"],u:"https://english.aawsat.com/gulf/5257895-saudi-foreign-minister-un-secretary-general-discuss-regional-developments"},
  {id:516,p:7,r:"심층분석",t:"UAE &apos;not on sidelines&apos; of Iran war talks as it resets regional ties",k:"UAE &quot;이란전 회담서 옆으로 빠지지 않겠다&quot;…역내 관계 재정립",s:"Khaleej Times",c:"gulf",d:"2026-04-20",m:"UAE is not on the sidelines of Iran war talks and is actively resetting regional ties, a top official told Khaleej Times. The UAE is positioning itself as a diplomatic interlocutor while discussing financial backstops with Washington amid energy infrastructure damage.",mk:"UAE가 이란전 회담에서 수동적이지 않으며 역내 관계 재정립에 나서고 있다고 고위 당국자가 칼리지 타임스에 밝혔다. UAE는 에너지 인프라 피해 속 워싱턴과 금융 백스톱을 논의하면서 외교 중재자로 입지를 다지고 있다.",tg:["UAE","외교","중재","역내관계"],u:"https://www.khaleejtimes.com/uae/uae-reset-regional-ties-not-on-sidelines-iran-war-top-official"},
  {id:517,p:9,r:"헤드라인",t:"IMF&apos;s Jihad Azour: Iran war more disruptive than typical oil shock for the UAE",k:"IMF 지하드 아주르 &quot;이란전, UAE엔 일반 유가 쇼크보다 더 파괴적&quot;",s:"The National",c:"gulf",d:"2026-04-21",m:"IMF Middle East Director Jihad Azour said the Iran war is proving more disruptive than a typical oil shock for the UAE, citing the closure of the Strait of Hormuz and energy infrastructure damage. IMF cut UAE&apos;s 2026 growth forecast from 5% to 3.1%.",mk:"IMF 지하드 아주르 중동국장이 &quot;이란전은 UAE에 일반적 유가 쇼크보다 더 파괴적&quot;이라고 밝혔다. 호르무즈 해협 봉쇄와 에너지 인프라 피해를 근거로 들었다. IMF는 UAE 2026년 성장률 전망을 5.0%에서 3.1%로 하향했다.",tg:["IMF","UAE","이란전","성장률"],u:"https://www.thenationalnews.com/business/economy/2026/04/21/imfs-jihad-azour-says-iran-war-more-disruptive-than-oil-shock-for-the-uae/"},
  {id:518,p:8,r:"심층분석",t:"How the Iran war is reshaping Gulf economies, unevenly",k:"이란전, 걸프 경제 비대칭적으로 재편",s:"The National",c:"gulf",d:"2026-04-17",m:"The Iran war is reshaping Gulf economies unevenly, with UAE hit hardest due to Iranian strikes (537 ballistic missiles intercepted) and oil production fall of 35% to 2.37 mbpd in March. Saudi Arabia and Qatar show more resilience due to diversified export routes.",mk:"이란전이 걸프 경제를 비대칭적으로 재편하고 있다. UAE는 이란 공격(탄도미사일 537발 요격)과 3월 원유생산 35% 감소(236.7만 bpd)로 가장 큰 타격을 입은 반면, 사우디·카타르는 다각화된 수출 경로 덕에 상대적 회복탄력성을 보였다.",tg:["걸프경제","이란전","석유생산","UAE"],u:"https://www.thenationalnews.com/business/economy/2026/04/17/how-gulf-economies-fight-back-from-effects-of-the-iran-war/"},
  {id:519,p:9,r:"헤드라인",t:"Saudi Crown Prince Meets Chairman of Sudan&apos;s Transitional Sovereign Council",k:"사우디 왕세자, 수단 과도주권위 의장과 제다서 회동",s:"The Peninsula Qatar",c:"gulf",d:"2026-04-20",m:"Saudi Crown Prince Mohammed bin Salman met General Abdel Fattah al-Burhan in Jeddah, discussing Sudan&apos;s sovereignty, stability and Red Sea regional security. Saudi Arabia is preparing to host a Sudanese-Saudi investment forum in June.",mk:"사우디 MBS 왕세자가 제다에서 수단 부르한 과도주권위 의장과 만나 수단의 주권·안정·홍해 역내 안보를 논의했다. 사우디는 6월 수단-사우디 투자포럼 개최를 준비하고 있다.",tg:["수단","MBS","홍해","투자포럼"],u:"https://thepeninsulaqatar.com/article/20/04/2026/saudi-crown-prince-meets-chairman-of-sudans-transitional-sovereign-council"},
  {id:520,p:8,r:"심층분석",t:"IMF downgrades global growth forecast for 2026 due to Middle East war",k:"IMF, 중동 전쟁으로 2026년 세계 성장 전망 하향",s:"Khaleej Times",c:"gulf",d:"2026-04-17",m:"The IMF downgraded its global growth forecast for 2026 due to the Middle East war, cutting overall growth expectations for the Middle East and Central Asia region by roughly half to 1.9 percent for the year. Saudi Arabia&apos;s 2026 projection was revised to 3.1 percent from 4.5 percent.",mk:"IMF가 중동 전쟁으로 2026년 세계 성장 전망을 하향 조정했다. 중동·중앙아시아 지역 성장률은 약 절반으로 삭감돼 올해 1.9%로 전망됐다. 사우디아라비아 2026년 전망치도 4.5%에서 3.1%로 수정됐다.",tg:["IMF","성장률","중동전쟁","전망"],u:"https://www.khaleejtimes.com/business/imf-downgrades-global-growth-forecast-for-2026-due-to-middle-east-war"},
  {id:521,p:10,r:"헤드라인",t:"US, Iran exchange threats as fragile ceasefire set to expire",k:"미-이란, 불안정한 휴전 만료 앞두고 위협 교환",s:"Al Jazeera",c:"me",d:"2026-04-21",m:"The US-Iran ceasefire expiring Wednesday faces serious doubt as both sides exchange threats. Trump warned of massive bombing if no deal is reached, while Iran&apos;s parliament speaker Ghalibaf said Tehran is prepared to reveal new battlefield cards.",mk:"수요일 만료 예정인 미-이란 휴전이 심각한 불투명성에 직면, 양측이 위협을 교환했다. 트럼프는 합의 불발 시 대규모 공습을 경고했으며, 이란 의회의장 갈리바프는 &quot;새로운 전장 카드를 공개할 준비가 돼 있다&quot;고 맞섰다.",tg:["미-이란","휴전","협상","트럼프"],u:"https://www.aljazeera.com/news/2026/4/21/us-and-iran-exchange-threats-as-fragile-ceasefire-set-to-expire"},
  {id:522,p:9,r:"속보",t:"Trump says US seized Iranian ship trying to get past blockade near Hormuz",k:"트럼프 &quot;호르무즈 인근 봉쇄 돌파 시도 이란 선박 나포&quot;",s:"Al Jazeera",c:"me",d:"2026-04-19",m:"US Navy seized an Iranian-flagged container ship in the Gulf of Oman after it ignored orders to stop while exiting Hormuz. Trump said the US fired on and captured the vessel, further straining diplomatic efforts and pushing oil prices up.",mk:"미 해군이 호르무즈를 빠져나오던 중 정선 명령을 무시한 이란 국적 컨테이너선을 오만만에서 나포했다. 트럼프 대통령은 &quot;미군이 사격 후 선박을 장악&quot;했다고 발언, 외교 노력에 찬물을 끼얹고 유가 급등을 유발했다.",tg:["이란","나포","호르무즈","미해군"],u:"https://www.aljazeera.com/news/2026/4/19/trump-says-us-seized-iran-flagged-ship-trying-to-get-past-hormuz-blockade"},
  {id:523,p:8,r:"심층분석",t:"What to know about US-Iran standoff over the Strait of Hormuz",k:"미-이란 호르무즈 해협 대치, 무엇을 알아야 하나",s:"Al Jazeera",c:"me",d:"2026-04-19",m:"Al Jazeera explainer on the US-Iran standoff at the Strait of Hormuz: Iran has largely closed the strait to foreign ships since the war began February 28; Washington began blockading Iranian ports in mid-April. A US-Iran peace deal hinges on Hormuz reopening and nuclear program.",mk:"알자지라가 미-이란 호르무즈 대치 상황을 해설했다. 이란은 2월 28일 개전 이후 외국 선박에 대한 해협을 대폭 폐쇄해왔고, 미국은 4월 중순부터 이란 항구 봉쇄를 시작했다. 미-이란 평화 합의는 호르무즈 재개와 핵 프로그램 문제가 관건이다.",tg:["호르무즈","해설","미-이란","외교"],u:"https://www.aljazeera.com/news/2026/4/19/what-to-know-about-us-iran-standoff-over-the-strait-of-hormuz"},
  {id:524,p:8,r:"정책발표",t:"Saudi Arabia condemns attack on UNIFIL in Lebanon",k:"사우디, 레바논 UNIFIL 공격 규탄",s:"Al Arabiya",c:"me",d:"2026-04-18",m:"Saudi Arabia condemned an attack on the UN Interim Force in Lebanon (UNIFIL) that killed one French soldier in southern Lebanon. The Kingdom called for accountability and urged restraint amid the fragile Lebanon ceasefire.",mk:"사우디아라비아가 레바논 남부에서 프랑스군 1명이 사망한 UN 레바논 평화유지군(UNIFIL) 공격을 규탄했다. 왕국은 책임 추궁을 촉구하고 불안정한 레바논 휴전 와중의 자제를 요청했다.",tg:["레바논","UNIFIL","평화유지군"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/18/saudi-arabia-condemns-attack-on-unifil-in-lebanon"},
  {id:525,p:8,r:"심층분석",t:"Gulf states considering new pipelines to avoid Strait of Hormuz",k:"걸프 국가들, 호르무즈 우회 신규 파이프라인 검토",s:"Al Arabiya",c:"me",d:"2026-04-02",m:"Gulf states are revisiting plans for pipelines to bypass the Strait of Hormuz chokepoint to continue exporting oil and gas. Officials and industry executives say new pipelines may be the only way to guarantee continuity of energy exports away from potential Iranian control of the Strait.",mk:"걸프 국가들이 호르무즈 해협을 우회해 원유·가스를 계속 수출하기 위한 신규 파이프라인 계획을 재검토하고 있다. 당국자와 업계 경영진은 이란의 해협 통제 가능성에서 에너지 수출 연속성을 보장할 유일한 방법이라고 말했다.",tg:["파이프라인","호르무즈","에너지인프라","걸프"],u:"https://english.alarabiya.net/business/energy/2026/04/02/gulf-states-considering-new-pipelines-to-avoid-strait-of-hormuz-report-"},
  {id:526,p:8,r:"속보",t:"Israeli Navy targets Hezbollah, Hamas, and Iran in multi-front ops",k:"이스라엘 해군, 헤즈볼라·하마스·이란 상대 다전선 작전",s:"Jerusalem Post",c:"me",d:"2026-04-19",m:"The Israeli Navy has conducted multi-front operations targeting Hezbollah, Hamas, and Iran-linked networks. Naval forces operated in coordination with ground divisions in southern Lebanon while maintaining interdiction capabilities against Iranian-linked maritime assets.",mk:"이스라엘 해군이 헤즈볼라·하마스·이란 연계 네트워크를 상대로 다전선 작전을 수행했다. 해군은 남부 레바논에서 지상 사단과 공조하며 이란 연계 해상 자산에 대한 차단 능력을 유지했다.",tg:["이스라엘","해군","헤즈볼라","다전선"],u:"https://www.jpost.com/israel-news/defense-news/article-893282"},
  {id:527,p:8,r:"속보",t:"April 19 Liveblog: Iran&apos;s president said to have told Pakistan the US is likely to betray diplomacy",k:"4월 19일 라이브블로그: 이란 대통령 &quot;美, 외교를 배신할 가능성&quot; 파키스탄에 전달",s:"Times of Israel",c:"me",d:"2026-04-19",m:"Times of Israel liveblog reports Iran&apos;s President Masoud Pezeshkian reportedly told Pakistan that the US is likely to betray diplomacy. This came amid US ship seizures and Iran&apos;s threats of withdrawal from the upcoming Pakistan-mediated talks.",mk:"타임스 오브 이스라엘 라이브블로그는 이란 페제시키안 대통령이 파키스탄에 &quot;미국이 외교를 배신할 가능성이 크다&quot;고 전했다고 보도했다. 미국의 선박 나포와 이란의 파키스탄 중재 회담 불참 위협이 이어지는 와중이다.",tg:["이란","페제시키안","파키스탄","외교"],u:"https://www.timesofisrael.com/liveblog-april-19-2026/"},
  {id:528,p:10,r:"헤드라인",t:"China&apos;s Xi Urges Ceasefire, Full Hormuz Transit in Saudi Call",k:"中 시진핑, MBS와 통화서 휴전·호르무즈 완전 통항 촉구",s:"Bloomberg",c:"global",d:"2026-04-20",m:"Chinese President Xi Jinping called Saudi Crown Prince Mohammed bin Salman urging immediate ceasefire and normal passage through Strait of Hormuz. Xi stressed supporting efforts to restore peace and resolving disputes through political and diplomatic means. China is the main buyer of Iranian crude.",mk:"시진핑 중국 주석이 MBS 사우디 왕세자와 통화해 즉각적인 휴전과 호르무즈 해협 정상 통항을 촉구했다. 시 주석은 평화 회복 노력 지지와 정치·외교적 분쟁 해결을 강조했다. 중국은 이란 원유의 주요 구매국이다.",tg:["시진핑","중국","호르무즈","외교"],u:"https://www.bloomberg.com/news/articles/2026-04-20/china-s-xi-urges-ceasefire-full-hormuz-transit-in-saudi-call"},
  {id:529,p:8,r:"정책발표",t:"US Expands Sanctions on Oil Tycoon to Keep Up Pressure on Iran",k:"美, 이란산 원유 거물 제재 확대…對이란 압박 지속",s:"Bloomberg",c:"global",d:"2026-04-15",m:"The Trump administration sanctioned more than a dozen entities tied to the network of Iranian oil kingpin Hossein Shamkhani, part of its campaign to maintain pressure on Tehran. OFAC imposed penalties on individuals, firms and vessels connected to the businessman, son of late security official Ali Shamkhani.",mk:"트럼프 행정부가 이란 원유 거물 호세인 샴카니 네트워크와 연관된 10여 개 단체에 제재를 부과했다. 해외자산통제국(OFAC)은 故 알리 샴카니 전 안보보좌관의 아들과 관련된 개인·기업·선박에 제재를 부과하며 對이란 압박을 유지했다.",tg:["제재","이란","원유","샴카니"],u:"https://www.bloomberg.com/news/articles/2026-04-15/us-expands-sanctions-on-oil-tycoon-to-keep-up-pressure-on-iran"},
  {id:530,p:8,r:"주요경제",t:"US to Let Iran Oil Sanctions Waiver Expire Amid Hormuz Blockade",k:"美, 호르무즈 봉쇄 와중 이란산 원유 제재 면제 만료 허용",s:"Bloomberg",c:"global",d:"2026-04-14",m:"The Trump administration will allow a waiver temporarily authorizing the purchase of certain Iranian crude oil to expire, US officials said. The move tightens pressure on Tehran amid the Strait of Hormuz blockade and ceasefire negotiations.",mk:"트럼프 행정부가 이란산 원유 특정 종류 구매를 한시 허용한 제재 면제(waiver) 만료를 허용한다고 美 당국자들이 밝혔다. 호르무즈 봉쇄와 휴전 협상 와중에 對테헤란 압박을 강화하는 조치다.",tg:["제재면제","이란원유","호르무즈","트럼프"],u:"https://www.bloomberg.com/news/articles/2026-04-14/us-to-let-iran-oil-sanctions-waiver-expire-amid-hormuz-blockade"},
  {id:531,p:8,r:"정책발표",t:"US to End Russian, Iranian Oil Waivers, Treasury&apos;s Bessent Says",k:"美 재무 베센트 &quot;러·이란산 원유 제재 면제 갱신 안 해&quot;",s:"Bloomberg",c:"global",d:"2026-04-15",m:"Treasury Secretary Scott Bessent confirmed the US will not renew general licenses on Iranian and Russian oil, significantly tightening restrictions on both countries&apos; energy exports amid the Iran war and ongoing Ukraine conflict.",mk:"스콧 베센트 美 재무장관이 이란산·러시아산 원유 일반 면허(general license) 갱신을 하지 않겠다고 확인했다. 이란전과 우크라이나 분쟁이 지속되는 가운데 양국 에너지 수출에 대한 규제를 대폭 강화하는 조치다.",tg:["베센트","재무부","제재","러시아"],u:"https://www.bloomberg.com/news/articles/2026-04-15/us-won-t-renew-iranian-russian-oil-waivers-bessent-says-mo0cwii7"},
  {id:532,p:9,r:"헤드라인",t:"UAE Discusses Financial Backstop With US as Iran War Threatens Economy",k:"UAE, 이란전 경제 위협 속 美와 금융 백스톱 논의",s:"Bloomberg",c:"global",d:"2026-04-19",m:"The UAE has begun talks with the US about a financial backstop in case the Iran war plunges the country into further crisis. UAE Central Bank Governor Khaled Balama raised the idea of a currency swap line with Federal Reserve and US Treasury officials.",mk:"UAE가 이란전으로 추가 위기에 빠질 경우에 대비한 금융 백스톱에 대해 미국과 협상을 시작했다. UAE 중앙은행 총재 할레드 발라마는 연준·재무부 관계자들에게 통화 스와프 라인 아이디어를 제시했다.",tg:["UAE","통화스와프","금융백스톱","연준"],u:"https://www.bloomberg.com/news/articles/2026-04-19/uae-in-talks-with-us-for-possible-financial-lifeline-wsj-says"},
  {id:533,p:9,r:"속보",t:"US Seizes Iranian Ship in Blockade, Casting Doubt on Peace Talks",k:"美, 봉쇄 중 이란 선박 나포…평화회담 불투명",s:"Bloomberg",c:"global",d:"2026-04-19",m:"The US seized an Iranian cargo ship amid its blockade of Iranian ports, with Hormuz at standstill denting US-Iran peace deal hopes. Oil prices rallied on supply risk fears; Iran vowed response to what it called piracy.",mk:"미국이 이란 항구 봉쇄 중 이란 화물선을 나포, 호르무즈 해협이 정체되면서 미-이란 평화 합의 전망이 흐려졌다. 공급 위험 우려로 유가가 급등했고, 이란은 &quot;해적 행위&quot;라며 보복을 다짐했다.",tg:["나포","호르무즈","평화회담","봉쇄"],u:"https://www.bloomberg.com/news/articles/2026-04-19/hormuz-at-standstill-denting-us-iran-peace-deal-hopes"},
  {id:534,p:8,r:"심층분석",t:"UAE, Saudi Arabia, Gulf Peers Spend $47 Billion on Deals Since Iran War Began",k:"UAE·사우디 등 걸프 국가, 이란전 개전 이후 M&amp;A 470억 달러 집행",s:"Bloomberg",c:"global",d:"2026-04-20",m:"Gulf states including UAE and Saudi Arabia have spent $47 billion on deals since the Iran war began, with Gulf acquisitions rising more than 120%. Abu Dhabi wealth funds are planning a China strategy revamp, and Dubai is granting hedge funds more flexibility.",mk:"UAE·사우디 등 걸프 국가가 이란전 개전 이후 470억 달러 규모 M&amp;A를 집행했으며, 걸프 인수는 120% 이상 증가했다. 아부다비 국부펀드는 중국 전략 개편을 계획 중이며 두바이는 헤지펀드에 더 많은 유연성을 부여하고 있다.",tg:["걸프","M&amp;A","PIF","국부펀드"],u:"https://www.bloomberg.com/news/newsletters/2026-04-20/uae-saudi-arabia-gulf-peers-spend-47-billion-on-deals-since-iran-war-began"},
  {id:535,p:8,r:"심층분석",t:"Oil prices little changed as Trump expects Iran deal but prepared to resume war if talks fail",k:"유가 보합…트럼프 &quot;이란 합의 예상하나 협상 실패 시 전쟁 재개 준비&quot;",s:"CNBC",c:"global",d:"2026-04-21",m:"Oil prices were little changed on April 21 as Trump said he expects an Iran deal but is prepared to resume war if talks fail. Brent crude hovered near $95, WTI near $89 amid conflicting signals from ceasefire negotiations and continuing US naval blockade.",mk:"4월 21일 유가는 트럼프 대통령이 &quot;이란 합의를 예상하지만 협상 실패 시 전쟁 재개 준비&quot; 발언에 보합세를 보였다. 브렌트유 $95·WTI $89 부근을 맴돌았으며, 휴전 협상과 美 해군 봉쇄의 엇갈린 신호가 시장을 흔들었다.",tg:["유가","트럼프","협상","보합"],u:"https://www.cnbc.com/amp/2026/04/21/oil-price-iran-war-strait-hormuz-tanker-ceasefire-peace-talks.html"},
  {id:536,p:8,r:"심층분석",t:"A timeline of how the Iran war shook oil prices — and what comes next",k:"이란전이 유가를 뒤흔든 타임라인과 향후 전망",s:"CNBC",c:"global",d:"2026-04-21",m:"CNBC provided a timeline of how the 2026 Iran war has shaken oil markets since February 28: Brent surged past $128 on April 2, plunged 9% on April 17 when Hormuz reopened, then rebounded above $95 on April 20 as blockade tensions returned.",mk:"CNBC가 2026년 이란전이 2월 28일 이후 유가를 어떻게 뒤흔들었는지 타임라인을 정리했다. 브렌트유는 4월 2일 $128 돌파, 4월 17일 호르무즈 재개에 9% 급락, 4월 20일 봉쇄 긴장 재점화로 $95대 복귀하며 극심한 변동성을 보였다.",tg:["유가","타임라인","이란전","브렌트유"],u:"https://www.cnbc.com/2026/04/21/oil-price-iran-war-middle-east.html"},
  {id:537,p:7,r:"주요경제",t:"European markets: Stoxx 600, FTSE, DAX, CAC, oil, Iran latest news",k:"유럽 증시: Stoxx 600·FTSE·DAX·CAC 등락, 유가·이란 뉴스 반영",s:"CNBC",c:"global",d:"2026-04-20",m:"European markets tracked mixed developments on April 20 as Iran tensions rekindled. Stoxx 600 edged lower amid risk-off sentiment, oil majors gained on Brent rally, and defensive sectors outperformed cyclicals amid ceasefire uncertainty.",mk:"유럽 증시는 4월 20일 이란 긴장 재고조 속 엇갈린 움직임을 보였다. Stoxx 600은 리스크 회피 심리로 소폭 하락, 브렌트유 랠리에 석유 메이저는 강세, 휴전 불확실성으로 방어주가 경기주보다 앞섰다.",tg:["유럽증시","Stoxx600","유가","리스크오프"],u:"https://www.cnbc.com/2026/04/20/european-markets-stoxx-600-ftse-dax-cac-oil-iran-latest-news.html"},
  {id:538,p:7,r:"심층분석",t:"Here are all the ways the Iran war has affected the U.S. economy so far",k:"이란전이 지금까지 美 경제에 미친 영향들",s:"CNBC",c:"global",d:"2026-04-15",m:"CNBC analysis of how the 2026 Iran war has impacted the US economy: gasoline prices rose, inflation expectations climbed, airlines faced fuel cost pressure, and defense sector equities rallied. The Fed is reassessing its rate path as energy-driven inflation risks emerge.",mk:"CNBC가 2026년 이란전이 지금까지 미국 경제에 미친 영향을 분석했다. 휘발유 가격 상승, 인플레이션 기대 상승, 항공사 연료비 압박, 방산주 랠리 등이 포착됐다. 연준은 에너지 주도 물가 리스크 부상에 금리 경로 재평가 중이다.",tg:["미경제","이란전","인플레이션","연준"],u:"https://www.cnbc.com/2026/04/15/here-are-all-the-ways-the-iran-war-has-affected-the-us-economy-so-far.html"},
  {id:539,p:10,r:"헤드라인",t:"휴전 하루 늘린 트럼프 &quot;제대로 끝낼것…합의까지 봉쇄 유지&quot;",k:"휴전 하루 늘린 트럼프 &quot;제대로 끝낼것…합의까지 봉쇄 유지&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-21",m:"Trump extended the US-Iran ceasefire deadline by one day to Wednesday (April 22). He maintained that the Iranian port blockade will remain until a deal is signed, while VP JD Vance heads to Pakistan for a second round of talks.",mk:"트럼프 대통령이 미-이란 휴전 시한을 수요일(22일)로 하루 연장하면서도 &quot;합의 서명 때까지 이란 항구 봉쇄 유지&quot;를 고수했다. J.D. 밴스 부통령은 2차 협상을 위해 파키스탄으로 향한다.",tg:["트럼프","휴전","이란","봉쇄"],u:"https://www.fnnews.com/news/202604210658468023"},
  {id:540,p:8,r:"속보",t:"&quot;이란 국적 인도행 화물선, 美봉쇄에도 호르무즈 통과&quot; 이란매체",k:"&quot;이란 국적 인도행 화물선, 美봉쇄에도 호르무즈 통과&quot; 이란매체",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-21",m:"Iranian media reported that an Iran-flagged cargo ship bound for India successfully passed through the Strait of Hormuz despite the US blockade of Iranian ports. The report signals Iran&apos;s continued defiance of US naval pressure.",mk:"이란 매체는 미국의 이란 항구 봉쇄에도 불구하고 이란 국적 인도행 화물선이 호르무즈 해협을 성공적으로 통과했다고 보도했다. 미 해군 압박에 대한 이란의 계속된 저항을 시사한다.",tg:["이란","호르무즈","봉쇄","인도"],u:"https://www.fnnews.com/news/202604211245544745"},
  {id:541,p:9,r:"주요경제",t:"호르무즈 다시 막히자 유가 폭등…배럴당 95달러 재돌파",k:"호르무즈 다시 막히자 유가 폭등…배럴당 95달러 재돌파",s:"전자신문",c:"korean-view",d:"2026-04-21",m:"Brent crude jumped back above $95 per barrel after Iran re-blockaded the Strait of Hormuz. Brent June futures rose 5.64% to $95.48, while WTI May futures gained 6.87% to $89.61, reigniting Korean economy inflation and currency concerns.",mk:"이란의 호르무즈 해협 재봉쇄로 브렌트유가 배럴당 95달러를 재돌파했다. 6월물 브렌트유 선물이 5.64% 오른 $95.48, 5월물 WTI 선물이 6.87% 오른 $89.61에 마감, 한국경제의 인플레이션·환율 우려가 재점화됐다.",tg:["유가","호르무즈","브렌트유","한국경제"],u:"https://www.etnews.com/20260421000014"},
  {id:542,p:8,r:"속보",t:"트럼프 &quot;이란 휴전 22일까지&quot; 사실상 하루 연장…의도적 혼선 분석도",k:"트럼프 &quot;이란 휴전 22일까지&quot; 사실상 하루 연장…의도적 혼선 분석도",s:"머니투데이",c:"korean-view",d:"2026-04-21",m:"Trump effectively extended the Iran ceasefire by one day to April 22. Analysts suggest this may be intentional ambiguity to maintain negotiating leverage while delaying potential military escalation amid the Hormuz blockade standoff.",mk:"트럼프 대통령이 이란 휴전을 4월 22일까지 사실상 하루 연장했다. 일부 분석가들은 이를 호르무즈 봉쇄 대치 속 협상 지렛대를 유지하고 군사 확전을 미루기 위한 의도적 모호성으로 해석하고 있다.",tg:["트럼프","휴전","협상","이란"],u:"https://www.mt.co.kr/world/2026/04/21/2026042102204368147"},
  {id:543,p:7,r:"속보",t:"트럼프 &quot;봉쇄 뚫으려던 화물선 나포&quot; vs 이란 &quot;협상 거부&quot;…2차 협상 &apos;안갯속&apos;",k:"트럼프 &quot;봉쇄 뚫으려던 화물선 나포&quot; vs 이란 &quot;협상 거부&quot;…2차 협상 &apos;안갯속&apos;",s:"머니투데이",c:"korean-view",d:"2026-04-20",m:"Trump announced US seizure of an Iranian cargo ship attempting to breach the blockade, while Iran rejected further talks. This has clouded prospects for the second round of US-Iran negotiations scheduled for this week in Pakistan.",mk:"트럼프 대통령이 봉쇄를 돌파하려 한 이란 화물선 나포를 발표한 반면 이란은 추가 협상을 거부했다. 이번 주 파키스탄에서 예정됐던 미-이란 2차 협상 전망이 안갯속이다.",tg:["나포","협상","이란","미국"],u:"https://www.mt.co.kr/world/2026/04/20/2026042006571241843"},
  {id:544,p:7,r:"심층분석",t:"호르무즈 리스크 재부상…월가 낙관론 흔들",k:"호르무즈 리스크 재부상…월가 낙관론 흔들",s:"네이트뉴스",c:"korean-view",d:"2026-04-20",m:"The re-emergence of Hormuz risk is shaking Wall Street optimism. Traders who had bet on US-Iran de-escalation are being caught off-guard by the renewed blockade tensions and ship seizures, forcing a repricing of Middle East risk premium.",mk:"호르무즈 리스크 재부상으로 월가 낙관론이 흔들리고 있다. 미-이란 긴장 완화에 베팅했던 트레이더들이 봉쇄 재긴장과 선박 나포로 허를 찔리며 중동 리스크 프리미엄 재설정에 나섰다.",tg:["월가","호르무즈","리스크","시장"],u:"https://news.nate.com/view/20260420n02828"},
  {id:546,p:9,r:"주요경제",t:"Saudi Arabia&apos;s economy to grow by 4.5% in 2026 on non-oil gains",k:"사우디 경제 2026년 4.5% 성장 전망…비석유 부문이 견인",s:"Arab News",c:"saudi",d:"2026-04-01",m:"Saudi Arabia&apos;s GDP is expected to expand by 4.5 percent in 2026, outperforming the global growth average of 3.4 percent. The non-oil sector is also expected to expand steadily at 4.5 percent, supported by investment and consumption.",mk:"사우디 GDP는 2026년 4.5% 성장해 글로벌 평균 3.4%를 상회할 전망이다. 비석유 부문도 투자와 소비에 힘입어 4.5% 성장이 예상된다.",tg:["경제성장","비석유","GDP","전망"],u:"https://www.arabnews.com/node/2628458/business-economy"},
  {id:548,p:9,r:"속보",t:"Saudi air defenses intercept 11 ballistic missiles over Eastern Province as debris falls near energy sites",k:"사우디 방공망, 동부주서 탄도미사일 11발 요격…잔해 에너지 시설 인근 낙하",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi air defenses intercepted 11 ballistic missiles over the Eastern Province, though debris fell near energy facilities. The successful interception occurred amid continued Iranian strikes during the US-Israel war on Iran.",mk:"사우디 방공망이 동부주 상공에서 탄도미사일 11발을 요격했으나 잔해가 에너지 시설 인근에 낙하했다. 미·이스라엘의 대이란 전쟁 중 이란의 공격이 이어지던 시점에 발생한 사건이다.",tg:["방공","탄도미사일","동부주","안보"],u:"https://saudigazette.com.sa/article/660308"},
  {id:550,p:6,r:"정책발표",t:"Holy Kaaba maintenance completed with highest global standards",k:"성 카바 정기 유지보수, 최고 수준 글로벌 기준으로 완료",s:"Saudi Gazette",c:"saudi",d:"2026-04-18",m:"The General Authority for the Care of the Grand Mosque and the Prophet&apos;s Mosque announced the completion of routine maintenance of the Holy Kaaba and Hijr Ismail in line with the highest engineering and technical standards.",mk:"성 모스크 및 예언자 모스크 관리청은 최고 수준의 공학·기술 기준에 따라 성 카바와 히지르 이스마일의 정기 유지보수를 완료했다고 발표했다.",tg:["종교","메카","유지보수"],u:"https://saudigazette.com.sa/article/660647/saudi-arabia/holy-kaaba-maintenance-completed-with-highest-global-standards"},
  {id:551,p:8,r:"속보",t:"Saudi air defenses intercept ballistic missile, down 5 drones",k:"사우디 방공망, 탄도미사일 1발 요격·드론 5기 격추",s:"Saudi Gazette",c:"saudi",d:"2026-04-02",m:"Saudi air defenses intercepted a ballistic missile and shot down five drones targeting the kingdom, continuing successful interception operations during the ongoing US-Israel war on Iran.",mk:"사우디 방공망이 왕국을 겨냥한 탄도미사일 1발을 요격하고 드론 5기를 격추했다. 미·이스라엘의 대이란 전쟁 중 성공적인 요격 작전이 계속되고 있다.",tg:["방공","드론","탄도미사일","안보"],u:"https://saudigazette.com.sa/article/660200/saudi-arabia/saudi-air-defenses-intercept-ballistic-missile-down-5-drones"},
  {id:552,p:10,r:"헤드라인",t:"Official Source at the Ministry of Energy: Operational Activities Halted at Several Energy Facilities due to Recent Attacks",k:"사우디 에너지부 &quot;최근 공격으로 일부 에너지 시설 가동 중단&quot;",s:"SPA",c:"saudi",d:"2026-04-09",m:"Saudi Arabia&apos;s Ministry of Energy confirmed operational activities halted at several energy facilities following attacks on oil, gas and electricity sites in Riyadh, the Eastern Province, and Yanbu Industrial City, reducing output capacity by approximately 600,000 bpd.",mk:"사우디 에너지부는 리야드, 동부주, 얀부 산업단지의 석유·가스·전력 시설에 대한 공격으로 일부 에너지 시설의 가동이 중단됐으며 생산능력이 일일 약 60만 배럴 감소했다고 확인했다.",tg:["에너지","아람코","얀부","생산감축"],u:"https://spa.gov.sa/en/N2556681"},
  {id:553,p:8,r:"심층분석",t:"Azour to Asharq Al-Awsat: Saudi Arabia Has Strong Financial Buffers to Confront War Impact",k:"IMF 아주르 &quot;사우디, 전쟁 충격 견딜 강력한 재정 완충력 보유&quot;",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-17",m:"IMF&apos;s Jihad Azour told Asharq Al-Awsat that Saudi Arabia has built strong financial buffers through income diversification and institutional strengthening, giving it fiscal space to advance Vision 2030 and shield mega projects from regional turbulence.",mk:"IMF의 지하드 아주르는 아샤르크 알-아우사트와의 인터뷰에서 사우디가 소득 다변화와 제도적 강화를 통해 강력한 재정 완충력을 구축해 비전2030 추진과 메가프로젝트 보호를 위한 재정 여력을 확보했다고 밝혔다.",tg:["IMF","재정","비전2030","전쟁영향"],u:"https://english.aawsat.com/business"},
  {id:554,p:8,r:"정책발표",t:"Pakistani Official to Asharq Al-Awsat: Quartet Meetings Aim to Promote Regional Peace",k:"파키스탄 당국자 &quot;4자 회담, 역내 평화 증진 목적&quot;",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-19",m:"Quartet meetings were held three times over the past month among foreign ministers of Saudi Arabia, Pakistan, Turkey and Egypt, within ongoing efforts to promote peace in the region amid the US-Iran war.",mk:"지난 한 달 간 사우디, 파키스탄, 튀르키예, 이집트 외교장관 4자 회담이 세 차례 개최됐다. 미·이란 전쟁 속 역내 평화 증진 노력의 일환이다.",tg:["외교","파키스탄","튀르키예","4자회담"],u:"https://english.aawsat.com/gulf/5264797-pakistani-official-asharq-al-awsat-quartet-meetings-aim-promote-regional-peace"},
  {id:555,p:9,r:"속보",t:"Saudi Arabia Intercepts 7 Missiles Targeting Riyadh, Downs 10 Drones",k:"사우디, 리야드 겨냥 미사일 7발 요격·드론 10기 격추",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-14",m:"Saudi air defenses thwarted a series of Iranian missile attacks and drone incursions, intercepting 7 ballistic missiles targeting the Riyadh region and the Eastern Province and downing 10 drones.",mk:"사우디 방공망이 리야드 지역과 동부주를 겨냥한 탄도미사일 7발을 요격하고 드론 10기를 격추하며 이란의 일련의 공격을 저지했다.",tg:["방공","리야드","드론","안보"],u:"https://english.aawsat.com/gulf/5257183-saudi-arabia-intercepts-7-missiles-targeting-riyadh-downs-10-drones"},
  {id:556,p:7,r:"주요경제",t:"TASI rises 7.2% in Q1 2026; Petro Rabigh, EIC top gainers",k:"타다울 TASI 1분기 7.2% 상승…페트로라비그·EIC 최대 상승",s:"Argaam",c:"saudi",d:"2026-04-03",m:"Saudi Arabia&apos;s Tadawul All Share Index (TASI) ended Q1 2026 up 759 points, or 7.2%, closing at 11,250 points. Petro Rabigh and Etihad Etisalat were among the top gainers.",mk:"사우디 타다울 종합지수(TASI)는 2026년 1분기에 759포인트(7.2%) 상승해 11,250선에서 마감했다. 페트로라비그와 에티하드 에티살랏이 최대 상승 종목에 포함됐다.",tg:["TASI","증시","타다울","1분기"],u:"https://www.argaam.com/en/article/articledetail/id/1892657"},
  {id:557,p:7,r:"심층분석",t:"Saudi market well positioned for strong performance in 2026: SNB Capital",k:"SNB캐피털 &quot;사우디 증시, 2026년 강세 유지 여건 갖춰&quot;",s:"Argaam",c:"saudi",d:"2026-04-10",m:"The Saudi market has the potential to deliver strong performance in 2026, supported by renewed correlation with global markets, ample liquidity, and oil prices, reinforced by Vision 2030 phase three implementation and attractive valuations.",mk:"사우디 증시는 글로벌 시장과의 상관관계 회복, 풍부한 유동성, 유가, 비전2030 3단계 시행, 매력적인 밸류에이션에 힘입어 2026년 강한 실적을 낼 잠재력을 갖췄다고 SNB캐피털이 분석했다.",tg:["증시","전망","SNB캐피털","밸류에이션"],u:"https://www.argaam.com/en/article/articledetail/id/1872101"},
  {id:560,p:5,r:"정책발표",t:"Ancient pond in northern Saudi Arabia fills with water after heavy rains",k:"사우디 북부 고대 연못, 폭우로 만수위 달성",s:"Arab News",c:"saudi",d:"2026-04-19",m:"The Al-Jumaimiyah pond, a historic feature of the Northern Borders Province, was filled to a level rarely seen following recent rainfall in northern Saudi Arabia.",mk:"사우디 북부 국경주의 역사적 명소인 알-주마이미야 연못이 최근 폭우로 보기 드문 수준으로 가득 찼다.",tg:["환경","북부주","강수"],u:"https://www.arabnews.com/node/2640599/saudi-arabia"},
  {id:561,p:7,r:"주요경제",t:"Saudi Arabia February Crude Exports Up, Output Highest Since 2022, JODI Says",k:"JODI &quot;사우디 2월 원유 수출 증가, 생산량 2022년 이래 최고&quot;",s:"Argaam",c:"saudi",d:"2026-04-21",m:"Saudi Arabia&apos;s crude oil exports rose to 7.276 million barrels per day in February, from 6.993 million bpd in January, while crude output hit its highest level since October 2022, according to JODI data.",mk:"사우디 원유 수출이 2월 일일 727만 6천 배럴로 1월의 699만 3천 배럴에서 증가했고, 생산량은 2022년 10월 이래 최고치를 기록했다고 JODI가 밝혔다.",tg:["JODI","원유수출","생산","아람코"],u:"https://www.argaam.com/en/article/entityarticles/sectionid/205/entityid/4/3509/pageno/1"},
  {id:562,p:8,r:"주요경제",t:"UAE Economy to Grow 5.6% in 2026 on Non-Oil Sectors, Diversification and Strong Trade: Central Bank Report",k:"UAE 경제, 2026년 5.6% 성장 전망…비석유·다변화·무역 호조",s:"Gulf News",c:"gulf",d:"2026-04-15",m:"The UAE Central Bank reports the economy saw real GDP growth of 5.6% in 2025 and is projected to expand at the same pace in 2026, driven by non-oil sectors, diversification, and strong trade performance.",mk:"UAE 중앙은행은 실질 GDP가 2025년 5.6% 성장했고 2026년에도 동일 속도로 확대될 것으로 전망했다. 비석유 부문, 다변화, 견조한 무역 실적이 성장 동력이다.",tg:["UAE","경제성장","중앙은행","비석유"],u:"https://gulfnews.com/business/banking/uae-economy-set-to-grow-56-in-2026-central-bank-report-1.500501523"},
  {id:563,p:7,r:"정책발표",t:"UAE Tightens Tax Procedures from April 1, 2026: New Rules on Disclosures, Refunds and Audit Record-Keeping",k:"UAE, 4월 1일부로 세제 절차 강화…공시·환급·감사기록 새 규정",s:"Gulf News",c:"gulf",d:"2026-04-03",m:"The UAE updated tax procedures from April 1, 2026, tightening rules on disclosures, refunds and record-keeping. The Ministry of Finance introduced new rules to boost transparency and taxpayer compliance.",mk:"UAE는 2026년 4월 1일부로 세제 절차를 업데이트해 공시·환급·기록 관리 규정을 강화했다. 재무부는 투명성과 납세 준수 제고를 위한 신규 규정을 도입했다.",tg:["UAE","세제","재무부","규제"],u:"https://gulfnews.com/business/tax-news/uae-tightens-tax-procedures-regulations-effective-april-1-1.500493055"},
  {id:566,p:9,r:"주요경제",t:"Middle East faces one of sharpest downgrades since global financial crisis, IMF warns",k:"IMF &quot;중동, 금융위기 이래 최대 폭 성장률 하향&quot; 경고",s:"The National",c:"gulf",d:"2026-04-16",m:"Growth in MENAP is projected to slow to 1.4 percent in 2026, a downgrade of 2.3 percentage points from the October forecast. A prolonged conflict could push oil prices higher for longer, dragging global growth down to 2.6 percent.",mk:"IMF는 MENAP(중동·북아프리카·파키스탄) 성장률이 2026년 1.4%로 둔화될 것으로 전망했다. 10월 전망 대비 2.3%p 하향 조정이다. 분쟁 장기화 시 글로벌 성장률도 2.6%까지 하락할 수 있다.",tg:["IMF","성장률","MENAP","전쟁영향"],u:"https://www.thenationalnews.com/business/economy/2026/04/16/middle-east-faces-one-of-sharpest-downgrades-since-global-financial-crisis-imf-warns/"},
  {id:567,p:9,r:"심층분석",t:"Months expected until Qatar&apos;s Ras Laffan LNG site resumes full operations",k:"카타르 라스라판 LNG, 완전 재가동까지 수개월 소요 전망",s:"The National",c:"gulf",d:"2026-04-09",m:"Qatar&apos;s Ras Laffan, the world&apos;s largest LNG refinery, will not be fully back online until the end of August at the earliest, with a fifth of its capacity gone for years. QatarEnergy declared long-term force majeure to buyers in China, South Korea, Italy and Belgium.",mk:"세계 최대 LNG 정제소인 카타르 라스라판은 빨라야 8월 말에야 완전 재가동되며, 용량의 20%는 수년 간 사라질 것으로 전망된다. 카타르에너지는 중국·한국·이탈리아·벨기에 구매자에게 장기 불가항력을 선언했다.",tg:["카타르","LNG","라스라판","에너지공급"],u:"https://www.thenationalnews.com/business/energy/2026/04/09/months-expected-until-qatars-ras-laffan-lng-site-resumes-full-operations/"},
