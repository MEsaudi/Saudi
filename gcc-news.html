  {id:285,p:5,r:"정책발표",t:"Makkah Police Arrest Egyptian Resident for Publishing Fraudulent Hajj Advertisements",k:"메카 경찰, 사기 하지 광고 게시한 이집트인 거주자 체포",s:"Saudi Gazette",c:"saudi",d:"2026-04-16",m:"Makkah police arrested an Egyptian resident for posting fraudulent Hajj advertisements online, offering fake pilgrimage packages to deceive prospective worshippers. Saudi authorities have intensified enforcement against illegal Hajj service providers ahead of the annual pilgrimage season, reminding pilgrims to use only officially licensed operators.",mk:"메카 경찰이 온라인에 사기성 하지 광고를 게시한 이집트 거주자를 체포했다. 사우디 당국은 연례 성지순례 시즌을 앞두고 불법 하지 서비스 제공자에 대한 단속을 강화하고 있다.",tg:["하지","메카","사기","법집행"],u:"https://saudigazette.com.sa/article/660574"},
  {id:286,p:7,r:"심층분석",t:"IMF Cuts Saudi Arabia 2026 Growth Forecast to 3.1% from 4.5% Amid Iran War Shock",k:"IMF, 이란 전쟁 충격으로 사우디 2026년 성장률 4.5%→3.1%로 하향 조정",s:"Arab News",c:"saudi",d:"2026-04-14",m:"The IMF revised Saudi Arabia&apos;s 2026 growth forecast down to 3.1% from 4.5%, while upgrading the 2027 forecast to 4.5%. The Middle East and North Africa region overall saw its 2026 forecast cut by 2.8 percentage points to 1.1%. Saudi Arabia remains among the least affected in the region due to alternative export routes and economic diversification depth.",mk:"IMF가 사우디 2026년 성장률 전망을 4.5%에서 3.1%로 하향 조정했으나 2027년은 4.5%로 상향했다. 중동·북아프리카 지역 전체는 2.8%p 하락한 1.1%로 조정됐다. 사우디는 대체 수출 루트와 경제 다각화 덕분에 지역 내 가장 덜 영향받은 국가에 속한다.",tg:["IMF","경제성장","이란전쟁","경제전망"],u:"https://www.arabnews.com/saudiarabia"},
  {id:287,p:6,r:"주요경제",t:"Saudi Arabia&apos;s Well-Being Economy: Quality of Life as Strategic Priority Under Vision 2030",k:"사우디 웰빙 경제: Vision 2030 하에 삶의 질이 전략적 우선순위로",s:"Arab News",c:"saudi",d:"2026-04-15",m:"Saudi Arabia is integrating well-being as a core economic strategy rather than a luxury, embedding health, happiness, and quality of life metrics into policy and business frameworks under Vision 2030. Non-oil GDP grew 4.5% in 2024, with 80% of Vision 2030 KPIs achieved or on track, reflecting the breadth of the economic transformation.",mk:"사우디는 Vision 2030 하에 건강·행복·삶의 질을 정책·비즈니스 프레임워크의 핵심 경제 전략으로 통합하고 있다. 비석유 GDP는 2024년 4.5% 성장했으며, Vision 2030 KPI의 80%가 달성됐거나 순항 중이다.",tg:["Vision2030","웰빙경제","비석유GDP","경제다각화"],u:"https://www.arabnews.com/node/2612043/business-economy"},
  {id:288,p:7,r:"주요경제",t:"Saudi Arabia April 2026 Milestones: Shams Satellite, $9.25bn Tourism Surge, Pipeline Restored",k:"2026년 4월 사우디 성과: 삼스 위성, 92.5억 달러 관광 급증, 파이프라인 복구",s:"Argaam",c:"saudi",d:"2026-04-15",m:"Saudi Arabia marked several major April 2026 milestones: the successful launch of the Shams satellite as part of Artemis II, a record $9.25 billion in Q1 tourism receipts, and the restoration of the East-West pipeline to 7 million bpd. These achievements demonstrate resilience despite the Iran war&apos;s regional disruption.",mk:"사우디는 2026년 4월 주요 성과를 기록했다. 아르테미스 II 삼스 위성 발사 성공, 1분기 관광 수입 92.5억 달러 신기록, 동-서 파이프라인 700만 bpd 복구가 이란 전쟁 속에서도 달성됐다.",tg:["관광","삼스위성","파이프라인","Vision2030"],u:"https://www.arabianbusiness.com/abnews/saudi-arabia-april-2026-milestones-artemis-ii-shams-satellite-9-25bn-tourism-surge-7m-bpd-pipeline-restored"},
  {id:289,p:8,r:"헤드라인",t:"Qatar Urges Regional Solution to Hormuz Crisis and Sustained Iran-US Ceasefire",k:"카타르, 호르무즈 위기 지역적 해결과 지속 가능한 미·이란 휴전 촉구",s:"Qatar Tribune",c:"gulf",d:"2026-04-15",m:"Qatar called for a comprehensive regional approach to resolving the Hormuz crisis, stressing that a lasting ceasefire between the US and Iran is critical to global energy stability. Qatar&apos;s Minister of State for Energy Affairs met India&apos;s petroleum minister to coordinate responses to the conflict&apos;s impact on LNG and crude supply chains.",mk:"카타르가 호르무즈 위기의 포괄적 지역 해법을 촉구하며 미·이란 간 지속 가능한 휴전이 글로벌 에너지 안정에 필수적임을 강조했다. 카타르 에너지 장관이 인도 석유 장관과 LNG·원유 공급망 영향 대응을 협의했다.",tg:["카타르","호르무즈","에너지안보","LNG","이란전쟁"],u:"https://www.qatar-tribune.com/article/228938/latest-news/qatar-urges-regional-solution-to-hormuz-crisis-and-sustained-ceasefire"},
  {id:290,p:8,r:"속보",t:"Saudi Arabia Restores East-West Oil Pipeline to Full Capacity, Bypassing Hormuz Blockade",k:"사우디, 동-서 파이프라인 전용량 복구 - 호르무즈 봉쇄 우회로 확보",s:"The National",c:"gulf",d:"2026-04-12",m:"Saudi Arabia restored full capacity on the East-West pipeline to approximately 7 million barrels per day, enabling crude exports via the Red Sea and bypassing the US blockade of the Strait of Hormuz. The restoration marks a critical step in stabilizing Saudi oil revenue during the fragile ceasefire period.",mk:"사우디가 동-서 파이프라인을 약 700만 배럴/일 전용량으로 복구해 홍해를 통한 원유 수출이 가능해졌다. 이는 호르무즈 해협에 대한 미국의 봉쇄를 우회하는 핵심 루트다.",tg:["동서파이프라인","호르무즈","석유수출","사우디에너지"],u:"https://www.thenationalnews.com/business/energy/2026/04/12/saudi-arabia-restores-east-west-pipeline-capacity/"},
  {id:291,p:8,r:"헤드라인",t:"Gulf States React: UAE Declares It &apos;Prevailed&apos; in Iran War, Calls for Durable Ceasefire",k:"UAE, 이란 전쟁서 &apos;승리&apos; 선언하며 지속 가능한 휴전 촉구",s:"Gulf News",c:"gulf",d:"2026-04-15",m:"UAE Diplomatic Adviser Anwar Gargash declared the UAE &apos;triumphed&apos; in the Iran war through national defense, while calling for a durable ceasefire and restoration of freedom of navigation through the Strait of Hormuz. The EU also expressed full solidarity with GCC states, identifying ceasefire and Hormuz reopening as twin overriding priorities.",mk:"UAE 외교 고문 안와르 가르가쉬는 UAE가 이란 전쟁에서 주권과 존엄을 지키며 승리했다고 선언하면서 지속 가능한 휴전과 호르무즈 해협 항행의 자유 회복을 촉구했다. EU도 GCC 국가들과 연대를 표명했다.",tg:["UAE","이란전쟁","호르무즈","GCC","휴전"],u:"https://gulfnews.com/world/mena/us-iran-ceasefire-trump-warns-iran-as-us-blockade-on-ports-takes-effect-new-peace-talks-loom-1.500505960"},
  {id:292,p:7,r:"주요경제",t:"Korea Discusses Joint Oil Stockpiling with UAE Amid Hormuz Blockade",k:"한국-UAE, 호르무즈 봉쇄 속 공동 석유 비축 논의",s:"Khaleej Times",c:"gulf",d:"2026-04-14",m:"South Korea and the UAE are in discussions about establishing joint offshore oil storage facilities, aligning Korea&apos;s urgent need for alternative oil supplies with Gulf producers&apos; interest in Northeast Asian stockpile bases. The initiative comes as the prolonged Hormuz blockade disrupts crude and naphtha supplies to key Asian importers.",mk:"한국과 UAE가 역외 공동 석유 비축 시설 구축을 논의하고 있다. 이는 한국의 대체 공급선 확보 필요성과 걸프 산유국의 동북아 비축 기지 구축 관심이 맞아떨어진 것으로, 장기화되는 호르무즈 봉쇄에 대응하는 조치다.",tg:["한국","UAE","석유비축","호르무즈","에너지안보"],u:"https://en.sedaily.com/finance/2026/04/14/korea-discusses-joint-oil-stockpiling-with-uae-amid-strait"},
  {id:293,p:7,r:"주요경제",t:"Pakistan PM Sharif Visits Saudi Arabia, Qatar, Turkey on 15-18 April Diplomatic Tour",k:"파키스탄 총리 샤리프, 4월 15-18일 사우디·카타르·터키 외교 순방",s:"The National",c:"gulf",d:"2026-04-15",m:"Pakistan Prime Minister Shehbaz Sharif undertook official visits to Saudi Arabia, Qatar, and Turkey from April 15-18, 2026, in a bid to advance US-Iran peace negotiations. The tour follows the collapse of Islamabad talks on April 12 and aims to rally regional support for a second round of negotiations before the ceasefire expires April 22.",mk:"파키스탄 총리 샤리프가 미·이란 평화 협상 추진을 위해 4월 15~18일 사우디·카타르·터키를 공식 방문했다. 4월 12일 이슬라마바드 회담 결렬 이후 4월 22일 휴전 만료 전 2차 협상을 위한 지역 지지 결집을 목표로 한다.",tg:["파키스탄","외교","미이란협상","휴전","카타르"],u:"https://thepeninsulaqatar.com/article/15/04/2026/pakistan-pm-sharif-to-depart-for-saudi-arabia-official-visit"},
  {id:294,p:9,r:"헤드라인",t:"Pakistan Military Chief Lands in Tehran with New US Message, Seeks Second Round of Talks",k:"파키스탄 군참모장, 새 미국 메시지 갖고 테헤란 도착 - 2차 회담 추진",s:"Al Jazeera",c:"me",d:"2026-04-16",m:"Pakistan&apos;s military chief Asim Munir arrived in Tehran carrying a new message from Washington, aiming to revive US-Iran negotiations before the April 22 ceasefire deadline. The diplomatic push comes after US-Iran talks in Islamabad collapsed on April 12 without agreement, with key sticking points remaining over nuclear enrichment and Hormuz reopening.",mk:"파키스탄 군참모장 아심 무니르가 미국의 새 메시지를 갖고 테헤란에 도착해 4월 22일 휴전 만료 전 미·이란 협상 재개를 추진했다. 핵 농축과 호르무즈 재개 문제가 여전히 핵심 쟁점으로 남아 있다.",tg:["파키스탄","이란","미이란협상","휴전","외교"],u:"https://www.aljazeera.com/news/2026/4/15/us-iran-talks-whats-the-latest-on-mediation-efforts"},
  {id:295,p:9,r:"속보",t:"US Sending 10,000 More Troops to Middle East Despite Iran Ceasefire",k:"미국, 이란 휴전에도 불구하고 중동에 추가 병력 1만 명 파견",s:"Al Jazeera",c:"me",d:"2026-04-15",m:"The Pentagon ordered approximately 10,000 additional US personnel to the Middle East, including sailors and Marines aboard the USS George H.W. Bush carrier group and the Boxer Amphibious Ready Group. The buildup aims to pressure Tehran while also preparing for potential additional military action if the fragile ceasefire collapses before April 22.",mk:"미 국방부가 중동에 추가 병력 약 1만 명을 파견했다. USS 조지 H.W. 부시 항모전단과 복서 상륙준비단 소속 해군·해병대가 포함됐다. 4월 22일 휴전 만료 전 이란을 압박하는 동시에 군사적 대비 태세를 강화하는 조치다.",tg:["미국","이란","군사","중동","휴전"],u:"https://www.aljazeera.com/news/2026/4/15/us-sending-10000-more-troops-to-middle-east-despite-iran-ceasefire"},
  {id:296,p:8,r:"헤드라인",t:"Israel, Lebanon Hold Rare Direct Talks in Washington DC amid Iran War",k:"이스라엘·레바논, 이란 전쟁 속 워싱턴에서 역사적 직접 회담",s:"Al Jazeera",c:"me",d:"2026-04-14",m:"Israeli and Lebanese ambassadors held direct talks in Washington DC, the first bilateral engagement between the two nations since 1993, facilitated by the United States. Lebanon seeks a ceasefire as Israeli strikes continue, while Israel&apos;s goal is the disarmament of Hezbollah. Hezbollah urged Lebanon&apos;s government to pull out of the talks, calling them &apos;futile.&apos;",mk:"이스라엘과 레바논 대사가 워싱턴 DC에서 직접 회담을 가졌다. 1993년 이후 첫 양자 접촉으로 미국이 중재했다. 레바논은 휴전을 원하고 이스라엘은 헤즈볼라 무장해제를 목표로 하며, 헤즈볼라는 레바논 정부에 회담 철회를 촉구했다.",tg:["이스라엘","레바논","헤즈볼라","외교","이란전쟁"],u:"https://www.aljazeera.com/news/2026/4/14/israel-and-lebanon-hold-rare-talks-in-washington-dc-amid-iran-war"},
  {id:297,p:8,r:"심층분석",t:"Can Pakistan Juggle US-Iran Mediation with Saudi Arabia Defence Commitments?",k:"파키스탄, 미·이란 중재와 사우디 방위 공약을 동시에 이행할 수 있나?",s:"Al Jazeera",c:"me",d:"2026-04-14",m:"Pakistan faces a delicate balancing act as it mediates between the US and Iran while fulfilling its Strategic Mutual Defence Agreement with Saudi Arabia, which includes deployment of Pakistani air force fighters and support aircraft to King Abdulaziz airbase. Analysts question whether Pakistan&apos;s dual role could undermine its credibility as a neutral mediator.",mk:"파키스탄은 미·이란 사이를 중재하면서 동시에 사우디와의 상호방위협정(파키스탄 공군기 압둘아지즈 기지 배치 포함)을 이행해야 하는 미묘한 상황에 처해 있다. 이중 역할이 중립적 중재자로서의 신뢰성을 훼손할 수 있다는 우려가 제기된다.",tg:["파키스탄","사우디","이란","방위협정","중재"],u:"https://www.aljazeera.com/news/2026/4/14/can-pakistan-juggle-us-iran-mediation-with-saudi-defence-commitments"},
  {id:298,p:7,r:"주요경제",t:"Iran War Wipes Out 2026 Global Oil Demand Growth for First Time Since COVID: IEA",k:"IEA, 이란 전쟁으로 코로나19 이후 처음으로 2026년 세계 석유 수요 성장 소멸",s:"Al Jazeera",c:"me",d:"2026-04-14",m:"The International Energy Agency warned that the 2026 Iran war has triggered the largest oil supply disruption in history, with global supply plummeting 10.1 mb/d to 97 mb/d in March. Global oil demand is projected to contract by 80,000 bpd this year, marking the first demand decline since the COVID-19 pandemic in 2020.",mk:"IEA는 2026년 이란 전쟁이 역사상 최대의 석유 공급 차질을 초래했다고 경고했다. 3월 글로벌 공급이 10.1mbpd 급감해 97mbpd가 됐으며, 올해 석유 수요는 8만 배럴/일 감소해 코로나 이후 처음으로 수요 하락이 전망된다.",tg:["IEA","석유수요","이란전쟁","에너지위기","공급충격"],u:"https://www.aljazeera.com/economy/2026/4/14/imf-cuts-global-growth-forecast-during-hormuz-blockade"},
  {id:299,p:9,r:"속보",t:"US, Iran Consider Two-Week Ceasefire Extension to Advance Peace Talks",k:"미국·이란, 평화 협상 추진 위해 2주 휴전 연장 검토",s:"Bloomberg",c:"global",d:"2026-04-15",m:"The United States and Iran are considering extending their fragile two-week ceasefire by an additional two weeks to allow more time to negotiate a peace agreement. While AP reported an &apos;in principle&apos; agreement to extend, a US official denied a formal agreement, creating ambiguity ahead of the April 22 deadline. Oil prices steadied on the ceasefire extension hopes.",mk:"미국과 이란이 휴전을 추가 2주 연장해 평화협정 협상에 더 많은 시간을 할애하는 방안을 검토하고 있다. AP가 원칙적 합의를 보도했으나 미 관리가 공식 합의를 부인해 4월 22일 만료를 앞두고 불확실성이 커졌다.",tg:["미국","이란","휴전연장","평화협상","유가"],u:"https://www.bloomberg.com/news/articles/2026-04-15/us-and-iran-weigh-extending-their-ceasefire-by-two-weeks"},
  {id:300,p:9,r:"주요경제",t:"Oil Steady on Signs US, Iran Working Toward Ceasefire Extension as Markets Watch April 22 Deadline",k:"미·이란 휴전 연장 신호에 유가 안정세, 시장은 4월 22일 만료일 주목",s:"Bloomberg",c:"global",d:"2026-04-16",m:"Oil prices stabilized around $91-$95 per barrel as markets grew more optimistic about a possible ceasefire extension and second round of US-Iran negotiations. Brent crude settled near $94.93 and WTI at $91.29 as Trump said the war is &apos;very close to over&apos; and mediators moved toward extending the April 22 truce deadline.",mk:"휴전 연장과 2차 미·이란 협상 가능성에 대한 낙관론이 커지면서 유가가 안정됐다. 브렌트유 94.93달러, WTI 91.29달러 수준에서 안정됐으며, 트럼프가 전쟁이 &apos;거의 끝날 단계&apos;라고 언급했다.",tg:["유가","이란전쟁","휴전","에너지시장","WTI브렌트"],u:"https://www.bloomberg.com/news/articles/2026-04-15/latest-oil-market-news-and-analysis-for-april-16"},
  {id:301,p:8,r:"주요경제",t:"Iran War Wipes Out 2026 Global Oil Demand Growth, IEA Reports Historic Supply Shock",k:"IEA, 이란 전쟁이 2026년 글로벌 석유 수요 성장 소멸시켰다 - 역사적 공급 충격",s:"Bloomberg",c:"global",d:"2026-04-14",m:"Bloomberg reported that the IEA&apos;s April Oil Market Report found the Iran war has triggered the largest supply disruption in history, cutting global supply by 10.1 mb/d. The Strait of Hormuz, which normally facilitates 20 mb/d of seaborne oil, saw flows drop to 3.8 mb/d in early April. Global demand is expected to contract 80,000 bpd in 2026.",mk:"블룸버그가 전한 IEA 4월 석유시장보고서에 따르면 이란 전쟁이 역사상 최대 공급 차질을 일으켜 전 세계 공급이 10.1mbpd 감소했다. 정상적으로 2,000만 배럴/일이 통과하는 호르무즈 해협이 4월 초 380만 배럴/일로 급감했다.",tg:["IEA","호르무즈","석유공급","이란전쟁","에너지위기"],u:"https://www.bloomberg.com/news/articles/2026-04-14/iran-war-wipes-out-global-oil-demand-growth-this-year-iea-says"},
  {id:302,p:8,r:"주요경제",t:"Oil Prices Near $100 After US Navy Blockades Iran Ports as Peace Talks Fail",k:"미국 해군의 이란 항구 봉쇄 후 유가 100달러 근접 - 평화 회담 실패 여파",s:"CNBC",c:"global",d:"2026-04-12",m:"Oil prices surged toward $100 per barrel after US-Iran peace talks collapsed in Islamabad on April 12 and the US Navy enforced a blockade of Iranian ports. CNBC reported WTI briefly topped $96 before easing as markets weighed the blockade&apos;s impact on global supply chains and remaining ceasefire hopes.",mk:"4월 12일 이슬라마바드 미·이란 평화 회담 결렬 후 미 해군의 이란 항구 봉쇄로 유가가 배럴당 100달러에 근접했다. WTI는 잠시 96달러를 돌파했다가 휴전 기대가 남아있어 다소 하락했다.",tg:["유가","미국해군봉쇄","이란","평화회담","에너지"],u:"https://www.cnbc.com/2026/04/12/oil-prices-iran-war-strait-hormuz-blockade.html"},
  {id:303,p:7,r:"심층분석",t:"CNBC: Possible US-Iran Talks Revive Hopes of Easing Hormuz Tensions, Oil Falls 8%",k:"CNBC: 미·이란 2차 회담 가능성에 호르무즈 긴장 완화 기대, 유가 8% 급락",s:"CNBC",c:"global",d:"2026-04-15",m:"U.S. crude fell nearly 8% as hopes for a second round of US-Iran talks revived, easing concerns about the prolonged Hormuz blockade. Trump&apos;s comment that talks could resume &apos;in days&apos; and that the war is &apos;very close to over&apos; drove the sharp reversal in oil prices, with WTI pulling back from near-$100 levels.",mk:"미·이란 2차 회담 재개 기대감에 미국 원유가 약 8% 급락했다. 트럼프가 협상이 &apos;며칠 내&apos; 재개될 수 있다고 밝히며 전쟁이 &apos;거의 끝날 단계&apos;라고 말해 100달러에 근접했던 유가가 급반전했다.",tg:["유가","이란","호르무즈","미이란협상","에너지시장"],u:"https://www.cnbc.com/2026/04/15/oil-price-us-iran-talks-hormuz-trump.html"},
  {id:304,p:9,r:"헤드라인",t:"IMF World Economic Outlook April 2026: Global Economy in the Shadow of War",k:"IMF 세계경제전망 2026년 4월: 전쟁의 그늘 속 글로벌 경제",s:"Reuters",c:"global",d:"2026-04-14",m:"The IMF&apos;s April 2026 World Economic Outlook cut global growth to 3.1% in 2026 and 3.2% in 2027, with the Middle East and North Africa region hit hardest at 1.1% (down 2.8 percentage points). The report, titled &apos;Global Economy in the Shadow of War,&apos; cites the Iran war, Hormuz closure, and energy facility damage as the primary drivers of the downgrade.",mk:"IMF는 2026년 4월 세계경제전망에서 글로벌 성장률을 2026년 3.1%, 2027년 3.2%로 하향 조정했다. 중동·북아프리카 지역이 1.1%(2.8%p 하향)로 가장 큰 타격을 받았다. 이란 전쟁, 호르무즈 폐쇄, 에너지 시설 피해가 주요 원인이다.",tg:["IMF","세계경제전망","중동","이란전쟁","경제성장"],u:"https://www.imf.org/en/publications/weo/issues/2026/04/14/world-economic-outlook-april-2026"},
  {id:305,p:8,r:"심층분석",t:"IEA Oil Market Report April 2026: Historic Supply Shock, Demand to Contract for First Time Since COVID",k:"IEA 석유시장보고서 2026년 4월: 역사적 공급 충격, 코로나 이후 첫 수요 감소",s:"Reuters",c:"global",d:"2026-04-14",m:"The IEA&apos;s April 2026 Oil Market Report characterized the Iran war as triggering the &apos;most severe oil supply shock in history,&apos; with global supply falling to 97 mb/d in March. Deepest cuts are in naphtha, LPG, and jet fuel across the Middle East and Asia Pacific. Supply is now only 410,000 bpd above demand, dramatically down from last month&apos;s 2.46 mb/d surplus.",mk:"IEA 4월 석유시장보고서는 이란 전쟁이 &apos;역사상 가장 심각한 석유 공급 충격&apos;을 유발했다고 규정했다. 3월 글로벌 공급이 97mbpd로 하락했으며, 나프타·LPG·항공유 분야 감소가 가장 크다. 공급이 수요를 41만 배럴/일 초과하는 데 그쳐 지난달 246만 배럴 초과에서 급감했다.",tg:["IEA","석유시장","공급충격","이란전쟁","에너지"],u:"https://www.iea.org/reports/oil-market-report-april-2026"},
  {id:306,p:9,r:"헤드라인",t:"Trump Says Iran War &apos;Very Close to Over,&apos; Hints Talks Could Resume in Days",k:"트럼프, 이란 전쟁이 &apos;끝날 단계&apos;에 있다며 며칠 내 회담 재개 시사",s:"CNN",c:"global",d:"2026-04-15",m:"President Trump said in a Fox Business interview that the Iran war is &apos;very close to over,&apos; with talks potentially resuming within days. However, the White House simultaneously announced that no formal ceasefire extension agreement has been reached, while the Pentagon continued reinforcing the region with 10,000 additional troops.",mk:"트럼프가 폭스비즈니스 인터뷰에서 이란 전쟁이 &apos;끝날 단계&apos;에 있으며 협상이 며칠 내 재개될 수 있다고 말했다. 그러나 백악관은 동시에 공식 휴전 연장 합의가 없다고 밝혔으며, 국방부는 추가 1만 명을 지역에 배치했다.",tg:["트럼프","이란전쟁","휴전","미국외교","중동"],u:"https://www.cnn.com/2026/04/14/world/live-news/iran-war-blockade-us-trump"},
  {id:307,p:7,r:"주요경제",t:"NPR: US and Iran Reach &apos;In-Principle Agreement&apos; to Extend Ceasefire for Peace Talks",k:"NPR: 미국·이란, 평화 회담 위한 휴전 연장에 &apos;원칙적 합의&apos;",s:"Reuters",c:"global",d:"2026-04-15",m:"Multiple regional officials told AP that Washington and Tehran had reached an &apos;in principle agreement&apos; to extend the April 8 ceasefire, which is due to expire on April 22. However, formal confirmation remained elusive, with the US State Department and White House press secretary both declining to confirm a deal has been reached.",mk:"AP에 따르면 복수의 역내 관리들이 미국과 이란이 4월 8일 시작된 휴전의 연장에 &apos;원칙적으로 합의&apos;했다고 밝혔다. 그러나 미 국무부와 백악관 대변인 모두 합의를 공식 확인하지 않았다.",tg:["미국","이란","휴전연장","평화협상","중동"],u:"https://www.npr.org/2026/04/15/nx-s1-5786034/iran-middle-east-updates"},
  {id:308,p:8,r:"속보",t:"Trump Orders 10,000 More US Troops to Middle East Ahead of Ceasefire Deadline",k:"트럼프, 휴전 만료 앞두고 중동에 추가 미군 1만 명 파견 명령",s:"Newsweek",c:"global",d:"2026-04-15",m:"Trump ordered 10,000 additional US troops to the Middle East, including the USS George H.W. Bush carrier strike group and the 11th Marine Expeditionary Unit, maintaining military pressure on Iran ahead of the April 22 ceasefire deadline. Thousands of troops aboard Boxer ARG are expected near the end of the month, with about 6,000 already in transit.",mk:"트럼프가 4월 22일 휴전 만료를 앞두고 USS 조지 H.W. 부시 항모전단과 11해병원정대 등 중동에 추가 미군 1만 명을 파견할 것을 명령했다. 약 6,000명이 이동 중이며 복서 상륙준비단도 월말에 도착 예정이다.",tg:["미국","군사","중동","이란","트럼프"],u:"https://www.newsweek.com/trump-surges-troops-to-middle-east-ahead-of-iran-ceasefire-deadline-report-11834647"},
  {id:309,p:9,r:"헤드라인",t:"Korea&apos;s Energy Envoy Kang Hoon-sik Secures 273 Million Barrels of Crude, 2.1M Tons of Naphtha from 4 Nations",k:"강훈식 에너지 특사, 중동 4개국서 원유 2억7300만배럴·나프타 210만톤 확보",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-16",m:"Presidential Energy Envoy Kang Hoon-sik announced the successful procurement of 273 million barrels of crude oil and 2.1 million tons of naphtha from Saudi Arabia, Oman, Kazakhstan, and Qatar by year-end, enough for over 3 months of normal operations. Saudi Arabia committed to priority allocation of 200 million barrels from June to December, with 50 million barrels secured via Red Sea alternative routes in April-May.",mk:"강훈식 대통령 전략경제협력 특사가 사우디·오만·카자흐스탄·카타르 4개국에서 연말까지 원유 2억7300만배럴과 나프타 210만톤 확보를 발표했다. 이는 정상 운영 시 3개월 이상 사용 가능한 물량이다. 사우디는 6월부터 연말까지 2억 배럴 우선 배정, 4~5월 홍해 대체항만을 통한 5000만 배럴 선적에 합의했다.",tg:["강훈식","에너지특사","원유확보","사우디","에너지안보"],u:"https://www.fnnews.com/news/202604151432590150"},
  {id:310,p:8,r:"주요경제",t:"GCC 6 Nations Pledge Priority Crude Supply to South Korea: &apos;We Will Deliver to Korea First&apos;",k:"GCC 6개국, 한국에 최우선 원유 공급 약속: &apos;한국부터 먼저 드린다&apos;",s:"허핑턴포스트코리아",c:"korean-view",d:"2026-04-15",m:"Ambassadors from all six GCC member states (Saudi Arabia, UAE, Kuwait, Qatar, Oman, and Bahrain) plus Jordan reaffirmed commitments to prioritize crude oil supply to South Korea at a National Assembly meeting. South Korea imports approximately 69% of its crude from the Middle East, with Saudi Arabia as its largest supplier.",mk:"GCC 6개국(사우디·UAE·쿠웨이트·카타르·오만·바레인)과 요르단 대사가 국회 외교통일위원회에서 한국에 원유를 우선 공급하겠다는 의지를 재확인했다. 한국은 원유의 약 69%를 중동에서 수입하며 사우디가 최대 공급국이다.",tg:["GCC","에너지안보","원유공급","한국","중동"],u:"https://www.huffingtonpost.kr/article/256397"},
  {id:311,p:7,r:"심층분석",t:"MBC: Saudi Arabia, UAE Wary of Iranian Leverage if Iran Prevails - War&apos;s Complex Gulf Calculus",k:"MBC: 사우디·UAE, 이란이 승리하면 호르무즈 장악 우려 - 복잡한 걸프 셈법",s:"MBC",c:"korean-view",d:"2026-04-15",m:"South Korea&apos;s MBC reported that Saudi Arabia and UAE privately fear that if Iran survives the conflict largely intact, it could gain effective control over the Strait of Hormuz, allowing Tehran to exert economic pressure on Gulf neighbors. This complicates Gulf states&apos; stance, as a prolonged war also damages their own energy infrastructure and revenue.",mk:"MBC는 사우디·UAE가 이란이 전쟁에서 온전히 살아남을 경우 호르무즈 해협을 사실상 장악해 걸프 이웃국에 경제적 압박을 가할 수 있다고 우려한다고 보도했다. 장기전은 자국 에너지 인프라와 수입에도 피해를 입혀 걸프국들이 복잡한 입장에 처해 있다.",tg:["한국시각","사우디","UAE","이란","호르무즈"],u:"https://imnews.imbc.com/replay/2026/nwdesk/article/6810249_37004.html"},
  {id:312,p:7,r:"주요경제",t:"Korea Discusses Offshore Oil Storage Facilities with Middle East Producers to Hedge Against Hormuz Risk",k:"한국, 호르무즈 위험 대비 중동 산유국과 역외 석유 비축 시설 논의",s:"서울경제",c:"korean-view",d:"2026-04-15",m:"South Korea is in discussions with major Middle Eastern oil producers about establishing offshore oil storage facilities as a hedge against recurring Hormuz crises. The initiative aligns South Korea&apos;s need for supply security with Gulf producers&apos; interest in Northeast Asian stockpile bases to diversify distribution channels.",mk:"한국이 주요 중동 산유국들과 역외 석유 비축 시설 구축을 논의 중이다. 이는 한국의 공급 안보 필요성과 걸프 산유국의 동북아시아 비축 기지 다변화 관심이 맞아떨어진 것으로, 반복되는 호르무즈 위기에 대한 헤지 방안이다.",tg:["한국","석유비축","중동","에너지안보","호르무즈"],u:"https://en.sedaily.com/finance/2026/04/15/korea-discusses-offshore-oil-storage-facilities-with-middle"},
  {id:313,p:8,r:"주요경제",t:"중동 위기 속 한국 에너지 특사 외교 성과 - &apos;특사 급파는 처음, 한국 최우선&apos;",k:"중동 위기 속 한국 에너지 특사 외교 성과 - 카자흐스탄 &apos;한국 특사만 대통령 면담&apos;",s:"머니투데이",c:"korean-view",d:"2026-04-16",m:"Strong diplomatic outcomes were achieved by Korea&apos;s energy envoy mission to four Middle Eastern nations. A Kazakhstani official noted that South Korea was the only country whose envoy was received by President Tokayev among many nations that dispatched envoys after the war. Kazakhstan pledged 18 million barrels and Oman guaranteed 5 million barrels plus 1.6 million tons of naphtha.",mk:"한국 에너지 특사단의 중동 4개국 방문이 강한 외교적 성과를 거뒀다. 카자흐스탄 관리는 전쟁 후 많은 나라가 특사를 파견했지만 대통령 면담이 성사된 것은 한국뿐이라고 밝혔다. 카자흐는 1800만 배럴, 오만은 500만 배럴과 나프타 최대 160만톤을 약속했다.",tg:["에너지특사","카자흐스탄","오만","원유확보","한국외교"],u:"https://www.mt.co.kr/politics/2026/04/16/2026041520012542082"}
,
  {id:314,p:9,r:"정책발표",t:"Saudi Arabia East-West Pipeline Restored to Full 7 Million bpd Capacity",k:"이란 공격 후 사우디 동서 파이프라인 700만 배럴/일 완전 복구",s:"Arab News",c:"saudi",d:"2026-04-16",m:"Saudi Arabia's Ministry of Energy announced the East-West pipeline restored to 7 million bpd capacity after Iranian attacks. The pipeline routes crude to Yanbu Red Sea port, providing a Hormuz bypass. The 700,000 bpd lost from a pumping station strike was fully recovered, securing export routes.",mk:"사우디 에너지부가 이란 공격으로 손상됐던 동서 파이프라인이 700만 배럴/일로 완전 복구됐다고 발표했다. 이 파이프라인은 원유를 홍해 얀부 항구로 수송해 호르무즈 봉쇄 우회 핵심 루트 역할을 한다.",tg:["동서파이프라인","에너지인프라","원유수출"],u:"https://www.arabnews.com/node/2640000/business-economy"},
  {id:315,p:8,r:"주요경제",t:"IMF Projects Saudi Arabia Economy to Grow 3.1% in 2026 Despite Regional War",k:"IMF, 지역 전쟁에도 사우디 2026년 경제성장률 3.1% 전망",s:"Saudi Gazette",c:"saudi",d:"2026-04-16",m:"The IMF April 2026 World Economic Outlook projects Saudi Arabia economy to grow 3.1% this year, revised down 1.4 points but still among the strongest in the region. Alternative export routes and economic diversification support the outlook. The 2027 forecast was upgraded to 4.5% as conditions are expected to normalize.",mk:"IMF 2026년 4월 세계경제전망은 사우디 경제가 올해 3.1% 성장할 것으로 전망했다. 전망치가 1.4%p 하향 조정됐지만 지역 최강 수준이며, 2027년은 4.5%로 상향 조정됐다.",tg:["IMF","경제성장","비전2030"],u:"https://saudigazette.com.sa/article/660550"},
  {id:316,p:9,r:"정책발표",t:"Saudi Council of Ministers Affirms All Energy Facilities Restored to Full Operational Capacity",k:"사우디 각료회의, 모든 에너지시설 운영 능력 완전 복구 확인",s:"SPA",c:"saudi",d:"2026-04-16",m:"The Saudi Council of Ministers affirmed that all energy facilities targeted by Iranian attacks have recovered, including Manifa, Khurais fields and Jubail, Ras Tanura refineries. The East-West pipeline is at full capacity. Khurais field work continues and completion will be announced separately.",mk:"사우디 각료회의는 이란 공격을 받은 모든 에너지시설이 회복됐다고 확인했다. 마니파·카라이스 유전과 주바일·라스타누라 정유소가 복구됐으며, 동서 파이프라인은 전속력 가동 중이다.",tg:["에너지인프라","원유공급","사우디정부"],u:"https://www.spa.gov.sa/en/N2560400"},
  {id:317,p:8,r:"정책발표",t:"NEOM Projects Delayed but Not Cancelled, Saudi PIF Chief Says at Board Meeting",k:"사우디 PIF 총재: NEOM 프로젝트 지연이지만 취소는 아니다",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-16",m:"Saudi PIF chief said NEOM infrastructure projects face delays but have not been cancelled, addressing concerns from war impact on Vision 2030 finances. Over $6 billion in contracts had been cancelled. PIF leadership stressed the new 2026-2030 strategy focuses on attracting private capital and improving investment efficiency.",mk:"PIF 총재는 NEOM 인프라 프로젝트들이 지연되고 있지만 취소는 아니라고 밝혔다. 60억 달러 이상의 계약이 취소됐지만, PIF는 민간 자본 유치와 투자 효율성 향상에 초점을 맞춘 새 전략을 강조했다.",tg:["NEOM","비전2030","PIF"],u:"https://english.aawsat.com/business/5262700-neom-projects-delayed-not-cancelled"},
  {id:318,p:8,r:"주요경제",t:"Saudi Arabia Offers Oil Buyers Red Sea Yanbu Option as Hormuz Blockade Continues",k:"호르무즈 봉쇄 지속 - 사우디, 구매자들에게 홍해 얀부 항구 옵션 제공",s:"Arab News",c:"saudi",d:"2026-04-16",m:"Saudi Arabia is offering long-term oil customers the option of receiving April allocations via the Red Sea port of Yanbu as the Strait of Hormuz crisis continues. Buyers choosing Yanbu receive partial monthly supply due to pipeline capacity limits. Saudi Arabia is rerouting exports to maintain customer obligations.",mk:"사우디아라비아가 호르무즈 해협 위기가 지속됨에 따라 장기 고객들에게 4월 배정분을 홍해 얀부 항구를 통해 받을 수 있는 옵션을 제공하고 있다. 파이프라인 용량 한계로 일부 공급만 가능하다.",tg:["원유수출","얀부항","홍해"],u:"https://www.arabnews.com/node/2639900/business-economy"},
  {id:319,p:7,r:"주요경제",t:"Saudi Non-Oil GDP Growth Holds at 4.2% in Q1 2026 Despite War-Driven Oil Revenue Drop",k:"전쟁 따른 석유수입 감소에도 사우디 1분기 비석유 GDP 4.2% 성장 유지",s:"Argaam",c:"saudi",d:"2026-04-16",m:"Saudi Arabia non-oil GDP maintained 4.2% growth in Q1 2026 despite sharp decline in oil revenues from Strait of Hormuz disruptions. Services, tourism, and construction sectors supported economic performance. Analysts warn sustained disruption could pressure government spending and giga-project timelines.",mk:"사우디아라비아의 비석유 GDP가 호르무즈 해협 혼란으로 인한 석유 수익 급감에도 불구하고 2026년 1분기 4.2% 성장을 유지했다. 서비스, 관광, 건설 부문이 경제 성과를 지지했다.",tg:["비석유GDP","경제다양화","사우디경제"],u:"https://www.argaam.com"},
  {id:320,p:7,r:"심층분석",t:"Saudi Vision 2030 Under Full Review as Middle East War Drains Over $10 Billion",k:"중동 전쟁으로 100억 달러 이상 손실 - 사우디 비전2030 전면 재검토",s:"Saudi Gazette",c:"saudi",d:"2026-04-16",m:"Saudi Arabia Vision 2030 mega-projects have entered comprehensive review following war-related losses exceeding $10 billion. NEOM saw contract cancellations over $6 billion, and Sindalah resort was indefinitely suspended. WSJ reported Saudi authorities are reassessing project viability under fiscal pressures.",mk:"전쟁 관련 손실이 100억 달러를 초과하면서 사우디 비전2030 메가프로젝트들이 전면 재검토에 들어갔다. NEOM에서만 60억 달러 이상 계약이 취소됐으며, 신달라 리조트는 무기한 중단됐다.",tg:["비전2030","NEOM","재정압박"],u:"https://saudigazette.com.sa/saudi-arabia/vision2030"},
  {id:321,p:8,r:"헤드라인",t:"Saudi Extends $5 Billion Deposit for Pakistan Amid Joint Push for US-Iran Diplomacy",k:"사우디, 미국-이란 외교 공동 추진 속 파키스탄 50억 달러 예치금 연장",s:"Arab News",c:"saudi",d:"2026-04-16",m:"Alongside the new $3 billion injection, Saudi Arabia extended an existing $5 billion deposit to Pakistan for an unspecified period. The financial commitments coincide with Riyadh supporting Islamabad's role as mediator in US-Iran peace negotiations. Saudi Arabia sees stable Pakistan as vital to regional security.",mk:"새 30억 달러 지원 외에 사우디아라비아가 파키스탄에 기존 50억 달러 예치금을 기한 미정으로 연장했다. 이 금융 지원은 사우디가 미국-이란 평화협상에서 파키스탄의 중재 역할을 지지하는 것과 맞물려 있다.",tg:["사우디-파키스탄","외교","재정지원"],u:"https://www.arabnews.com/node/2640050/saudi-arabia"},
  {id:322,p:8,r:"속보",t:"UAE Officials Hold First Direct Talks with Iran Since 2026 War Began, Qatar Mediates",k:"UAE-이란, 2026년 전쟁 이후 첫 직접 대화 - 카타르 중재",s:"The National",c:"gulf",d:"2026-04-16",m:"UAE and Iranian officials held their first direct conversation since the outbreak of the 2026 war, a diplomatic breakthrough facilitated by Qatari mediation. Talks focused on deescalation and the Hormuz situation. Both sides agreed to maintain communication channels as the ceasefire enters its second week.",mk:"UAE와 이란 당국자들이 2026년 전쟁 발발 이후 처음으로 직접 대화를 가졌다. 카타르 중재로 이루어진 회담은 긴장 완화와 호르무즈 상황에 초점을 맞췄으며, 양측은 소통 채널 유지에 합의했다.",tg:["UAE","이란","외교"],u:"https://www.thenationalnews.com/world/2026/04/16/uae-iran-first-talks"},
  {id:323,p:7,r:"주요경제",t:"GCC Tourism Ministers Reaffirm Region Safe and Open Despite Geopolitical Tensions",k:"GCC 관광장관들, 지정학적 긴장에도 역내 안전 및 개방 재확인",s:"Gulf News",c:"gulf",d:"2026-04-16",m:"Tourism ministers from all six GCC nations issued a joint statement at an April 7 virtual meeting declaring their countries safe and fully open to international visitors. The statement aims to counter declining tourism bookings triggered by the Iran war. GCC tourism revenues have significantly declined since late February.",mk:"6개 GCC 국가 관광장관들이 4월 7일 화상 회의에서 역내 국가들이 안전하며 국제 관광객에 완전히 개방돼 있다는 공동 성명을 발표했다. 이란 전쟁으로 관광 예약이 급감하는 상황에 대응한 조치다.",tg:["GCC관광","지역안보","호텔"],u:"https://gulfnews.com/world/gulf"},
  {id:324,p:7,r:"정책발표",t:"Qatar Suspends Visa-On-Arrival for Lebanese Nationals Amid Regional Security Concerns",k:"카타르, 지역 안보 우려로 레바논 국민 비자온어라이벌 중단",s:"Qatar Tribune",c:"gulf",d:"2026-04-16",m:"Qatar officially suspended visa-on-arrival for Lebanese nationals from April 2, 2026, citing regional security concerns from the ongoing conflict. Travelers from Lebanon must now obtain pre-approved visas. The policy reflects broader GCC vigilance over border control amid Israel-Lebanon military confrontation.",mk:"카타르가 2026년 4월 2일부터 레바논 국민에 대한 도착 비자 서비스를 공식 중단했다. 진행 중인 분쟁에서 비롯된 지역 안보 우려가 이유다. 레바논 출발 여행자들은 이제 사전 비자를 받아야 한다.",tg:["카타르","비자정책","레바논"],u:"https://www.travelandtourworld.com/news/article/qatar-joins-saudi-arabia-uae-bahrain-kuwait-and-oman-in-tightening-entry-rules-as-visa-on-arrival-for-lebanese-nationals-suspended-from-april-2026-impacting-travel-across-other-countries-including/"},
  {id:325,p:7,r:"주요경제",t:"Gulf Investors Remain Active in US Markets Despite Middle East Geopolitical Uncertainty",k:"중동 지정학적 불확실성에도 걸프 투자자들 미국 시장 투자 활발",s:"Khaleej Times",c:"gulf",d:"2026-04-16",m:"Gulf-based investors from Saudi Arabia, UAE, and Kuwait continue pursuing US market investments despite regional conflict. Falling US tech valuations and strong dollar dynamics created attractive entry points. PIF and ADIA remain among the most active foreign investors in US equities.",mk:"사우디아라비아, UAE, 쿠웨이트 등 걸프 지역 투자자들이 지역 분쟁에도 미국 시장에서 적극 투자 중이다. 미국 기술주 평가가치 하락과 달러화 강세가 매력적인 진입 기회를 만들어냈다.",tg:["걸프투자","미국시장","PIF"],u:"https://www.khaleejtimes.com/business/gulf-investors-us-markets-2026"},
  {id:326,p:6,r:"일반",t:"Oman Increases Oil Exports via Muscat Port as Alternative Route for Gulf Producers",k:"오만 무스카트 항구, 걸프 생산국 대안 루트로 원유 수출 증가",s:"Times of Oman",c:"gulf",d:"2026-04-16",m:"Oman Port of Muscat has seen significant uptick in oil export volumes as Gulf producers seek alternatives to blockaded Strait of Hormuz. Oman location outside the Strait makes it a viable transit point. Muscat port is handling additional throughput from Saudi Aramco, QatarEnergy, and ADNOC shipments.",mk:"오만 무스카트 항구가 호르무즈 봉쇄에 대한 대안을 찾는 걸프 생산국들의 원유 수출 물량 급증을 처리하고 있다. 호르무즈 해협 밖 위치한 오만의 지리적 이점이 핵심 환적 거점으로 부상했다.",tg:["오만","원유수출","대안루트"],u:"https://timesofoman.com"},
  {id:327,p:9,r:"헤드라인",t:"Pakistan Pushes for New Round of US-Iran Talks as Ceasefire Near Expiry",k:"알자지라 생중계: 휴전 만료 임박 - 파키스탄 미국-이란 새 협상 추진",s:"Al Jazeera",c:"me",d:"2026-04-16",m:"Pakistan high-level delegation held talks with Iranian officials in Tehran on possibility of a second round of US-Iran negotiations. The White House expressed optimism for continued talks in Islamabad. The two-week ceasefire agreed April 8 is set to expire April 21, creating diplomatic urgency.",mk:"파키스탄 고위 대표단이 테헤란에서 이란 당국자들과 미국-이란 2차 협상 가능성을 논의했다. 4월 8일 체결된 2주 휴전이 4월 21일 만료될 예정이어서 외교적 긴급성이 높아졌다.",tg:["미국-이란협상","휴전","파키스탄중재"],u:"https://www.aljazeera.com/news/liveblog/2026/4/16/iran-war-live-pakistan-in-push-for-new-round-of-us-iran-peace-negotiations"},
  {id:328,p:8,r:"속보",t:"Saudi Arabia Restores East-West Pipeline; Khurais Field Recovery Still Ongoing",k:"알아라비야: 사우디 동서 파이프라인 복구 완료, 카라이스 유전은 복구 작업 진행 중",s:"Al Arabiya",c:"me",d:"2026-04-16",m:"Saudi Ministry of Energy announced East-West crude pipeline restored to full 7 million bpd capacity. The Manifa field production of 300,000 bpd also recovered. Khurais field restoration work is still ongoing, with government pledging to announce completion when accomplished.",mk:"사우디 에너지부가 동서 원유 파이프라인을 700만 배럴/일 완전 용량으로 복구했다고 발표했다. 마니파 유전도 30만 배럴/일 생산을 회복했지만 카라이스 유전은 복구 작업이 아직 진행 중이다.",tg:["에너지인프라","원유생산","사우디"],u:"https://english.alarabiya.net/News/saudi-arabia"},
  {id:329,p:8,r:"심층분석",t:"Can Pakistan Juggle US-Iran Mediation While Honoring Saudi Defence Commitments?",k:"알자지라 분석: 파키스탄, 사우디 방위 공약 지키며 미국-이란 중재 병행 가능한가?",s:"Al Jazeera",c:"me",d:"2026-04-16",m:"Pakistan faces delicate balancing between its mediation role in US-Iran talks and its defence commitments to Saudi Arabia. Islamabad signed a mutual defence agreement with Riyadh last year, obligating military support if Saudi territory is attacked. Analysts question whether Pakistan can maintain mediator neutrality.",mk:"파키스탄은 미국-이란 중재 역할과 사우디아라비아에 대한 방위 공약 사이에서 미묘한 균형을 유지해야 한다. 파키스탄은 지난해 사우디와 상호 방위 협정을 체결했으며, 중재국 중립성 유지 여부가 의문시된다.",tg:["파키스탄","사우디방위","이란중재"],u:"https://www.aljazeera.com/news/2026/4/14/can-pakistan-juggle-us-iran-mediation-with-saudi-defence-commitments"},
  {id:330,p:7,r:"속보",t:"Hezbollah Rejects Israeli Buffer Zone Plans in Southern Lebanon, Direct Talks Stall",k:"헤즈볼라, 레바논 남부 완충지대 계획 거부 - 직접 협상 교착",s:"Iran International",c:"me",d:"2026-04-16",m:"Hezbollah Secretary-General Naim Qassem declared Israel plan to create a buffer zone by demolishing southern Lebanon border villages is doomed to failure. Direct Israel-Lebanon talks in Washington have stalled on this issue. Hezbollah demands full Israeli withdrawal from Lebanese territory.",mk:"헤즈볼라 사무총장 나임 카셈은 레바논 남부 국경 마을 철거를 통해 완충지대를 만들려는 이스라엘 계획이 실패로 끝날 것이라고 선언했다. 이 문제로 워싱턴 이스라엘-레바논 직접 회담이 교착 상태에 빠졌다.",tg:["헤즈볼라","레바논","이스라엘"],u:"https://www.iranintl.com/en/202604160002"},
  {id:331,p:7,r:"주요경제",t:"IMF Warns Middle East War Could Cut Regional Growth to 1.1% in 2026",k:"IMF, 중동 전쟁이 2026년 지역 성장률을 1.1%로 낮출 수 있다고 경고",s:"Jerusalem Post",c:"me",d:"2026-04-16",m:"The IMF April 2026 World Economic Outlook warns that Middle East and North Africa growth forecast was cut by 2.8 percentage points to 1.1 percent in 2026. The downgrade reflects the devastating economic impact of the Iran war, Hormuz blockade, and energy infrastructure damage across the region.",mk:"IMF의 2026년 4월 세계경제전망은 중동 및 북아프리카 지역 성장률 전망치가 2.8%p 하락한 1.1%로 낮아졌다고 경고했다. 이란 전쟁, 호르무즈 봉쇄, 에너지 인프라 피해의 경제적 충격을 반영한 것이다.",tg:["IMF","중동경제","지역성장"],u:"https://www.jpost.com/middle-east/article-imf-mideast-2026"},
  {id:332,p:9,r:"헤드라인",t:"US and Iran Consider Ceasefire Extension as Hormuz Blockade Disrupts Oil Flows",k:"블룸버그: 미국-이란, 호르무즈 봉쇄 속 휴전 연장 검토",s:"Bloomberg",c:"global",d:"2026-04-16",m:"US and Iran have reached an in principle agreement to extend the two-week ceasefire by additional days to allow more diplomatic progress, though no formal deal has been signed. A senior US official denied formal agreement. Hormuz Strait remains partially closed with oil prices near $130/bbl.",mk:"미국과 이란이 추가 외교 진전을 위해 2주 휴전을 수일 연장하는 원칙적 합의에 도달했지만, 공식 협정은 아직 체결되지 않았다. 호르무즈 해협은 여전히 부분적으로 봉쇄돼 있으며 유가는 배럴당 130달러에 근접해 있다.",tg:["미국-이란","휴전연장","호르무즈"],u:"https://www.bloomberg.com/news/articles/2026-04-15/us-and-iran-weigh-truce-extension-with-hormuz-still-shuttered"},
  {id:333,p:9,r:"속보",t:"Trump Says Iran War Close to Over as Markets Rally on Peace Deal Hopes",k:"CNBC: 트럼프, 이란 전쟁 거의 끝났다 - 평화 협상 기대감에 시장 상승",s:"CNBC",c:"global",d:"2026-04-16",m:"US President Donald Trump declared the Iran war is very close to over, citing Tehran eagerness for a peace deal. Financial markets rallied significantly with oil prices dipping below $125/bbl from highs near $150/bbl. The White House said it feels good about prospects of a deal with Iran.",mk:"트럼프 대통령이 테헤란이 평화 협정을 원하고 있다며 이란 전쟁이 거의 끝났다고 선언했다. 금융시장은 급등으로 반응했으며, 유가는 배럴당 150달러 근처 최고점에서 125달러 이하로 하락했다.",tg:["트럼프","이란전쟁","유가"],u:"https://www.cnbc.com/2026/04/15/iran-war-trump-peace-deal-us-talks-stock-market-oil-prices-.html"},
  {id:334,p:9,r:"심층분석",t:"IEA Oil Market Report April 2026: Global Supply Fell 10 Mb/d in March",k:"IEA 4월 원유시장 보고서: 글로벌 공급 1000만 배럴 감소, 역사상 최대 공급 차질",s:"IEA",c:"global",d:"2026-04-16",m:"The IEA April 2026 Oil Market Report documents the largest supply disruption in global oil market history, with supply falling 10.1 mb/d to 97 mb/d in March. Hormuz shipments averaged only 3.8 mb/d in early April versus 20+ mb/d pre-crisis. Oil demand is now expected to fall 80 kb/d in 2026.",mk:"IEA 4월 원유시장 보고서는 3월 글로벌 공급이 1,010만 배럴/일 감소한 9,700만 배럴을 기록했다며 글로벌 원유시장 역사상 최대 공급 차질로 기록했다. 호르무즈 선적량이 위기 전 2,000만 배럴 이상에서 380만 배럴로 급감했다.",tg:["IEA","원유공급","에너지위기"],u:"https://www.iea.org/reports/oil-market-report-april-2026"},
  {id:335,p:8,r:"주요경제",t:"Day 47 of Middle East Conflict: Trump Optimistic, Pakistan Pursues New US-Iran Round",k:"CNN: 중동분쟁 47일째 - 트럼프 낙관론 속 파키스탄 새 미국-이란 협상 추진",s:"CNN",c:"global",d:"2026-04-16",m:"Day 47 of US-Iran conflict saw Trump declare the war very close to over while Pakistan PM Shehbaz Sharif departed Jeddah for Qatar as part of his diplomatic tour. Direct Israel-Lebanon negotiations continued in Washington with Beirut seeking ceasefire and Israel demanding Hezbollah disarmament.",mk:"미국-이란 분쟁 47일째, 트럼프가 전쟁이 거의 끝났다고 선언한 가운데 파키스탄 총리 샤리프가 외교 순방의 일환으로 제다를 출발해 카타르로 향했다.",tg:["중동분쟁","트럼프","이스라엘-레바논"],u:"https://www.cnn.com/2026/04/15/world/live-news/iran-war-blockade-us-trump"},
  {id:336,p:8,r:"주요경제",t:"Reuters: Saudi Arabia Commits to Prioritizing Korean Oil Deliveries via Red Sea Through Year-End",k:"로이터: 사우디, 연말까지 한국향 홍해 경유 원유 우선 공급 약속",s:"Reuters",c:"global",d:"2026-04-16",m:"Saudi Arabia committed to prioritizing 200 million barrels to South Korean companies from June through year-end via non-Hormuz routes. Additional 50 million barrels will be shipped in April-May through Yanbu Red Sea port. The agreement provides energy security assurance as Korea faces supply disruptions.",mk:"사우디아라비아가 6월부터 연말까지 한국 기업에 2억 배럴을 호르무즈 우회 경로를 통해 우선 공급하기로 약속했다. 4~5월 중 추가 5,000만 배럴도 얀부 홍해 항구를 통해 선적할 예정이다.",tg:["사우디-한국","원유공급","에너지안보"],u:"https://www.reuters.com/business/energy/south-korea-saudi-oil-deal-2026-04-15"},
  {id:337,p:8,r:"속보",t:"Iran War Has Damaged Up to $58 Billion in Energy Infrastructure, Rystad Estimates",k:"CNBC: 이란 전쟁으로 에너지 인프라 최대 580억 달러 피해 - 라이스타드 추산",s:"CNBC",c:"global",d:"2026-04-16",m:"Rystad Energy estimates the 2026 Iran war caused between $40-58 billion in damage to Middle East energy infrastructure. Sites hit include Saudi facilities, Iranian refineries, and Gulf LNG plants. The damage represents a generational setback to energy production capacity requiring years to fully restore.",mk:"라이스타드 에너지는 2026년 이란 전쟁이 중동 에너지 인프라에 400~580억 달러의 피해를 입혔다고 추산했다. 사우디 시설, 이란 정유소, 걸프 LNG 공장이 피해를 입었으며 완전 복구까지 수년이 걸릴 전망이다.",tg:["에너지피해","이란전쟁","인프라"],u:"https://www.cnbc.com/2026/04/15/iran-war-energy-facilities-refinery-pipeline-lng.html"},
  {id:338,p:7,r:"심층분석",t:"Saudi Arabia Fiscal Buffer Tested as Oil Revenues Halved by Hormuz Crisis",k:"FT: 호르무즈 위기로 석유수입 반토막 - 사우디 재정 완충 능력 시험대",s:"Financial Times",c:"global",d:"2026-04-16",m:"Saudi Arabia substantial fiscal reserves are being tested as oil export revenues fell roughly half due to Hormuz blockade and infrastructure attacks. The kingdom breakeven oil price around $90/barrel creates fiscal strain. Analysts estimate Saudi could sustain current spending for 12-18 months before requiring bond issuance.",mk:"사우디아라비아의 상당한 재정 여유분이 호르무즈 봉쇄와 인프라 공격으로 석유 수출 수익이 약 절반으로 줄어들며 시험대에 올랐다. 배럴당 약 90달러의 손익분기 유가가 재정 압박을 야기하고 있다.",tg:["사우디재정","유가","재정정책"],u:"https://www.ft.com/content/saudi-fiscal-buffer-hormuz-2026"},
  {id:339,p:7,r:"주요경제",t:"Saudi Vision 2030 Projects Enter Review as War Costs Mount Over $10 Billion",k:"WSJ: 전쟁 비용 100억 달러 초과 - 사우디 비전2030 프로젝트 재검토",s:"WSJ",c:"global",d:"2026-04-16",m:"Saudi officials told WSJ that most core Vision 2030 projects entered review stage as war-related cumulative costs exceed $10 billion. The review encompasses tourism, entertainment, and urban development initiatives. Projects are being reprioritized not cancelled, focusing on near-term returns.",mk:"사우디 당국자들은 WSJ에 전쟁 관련 누적 비용이 100억 달러를 초과하면서 대부분의 핵심 비전2030 프로젝트들이 재검토 단계에 들어갔다고 밝혔다. 취소가 아니라 수익성 있는 프로젝트 우선순위 재조정으로 설명됐다.",tg:["비전2030","재검토","사우디","WSJ"],u:"https://www.wsj.com/world/middle-east/saudi-vision-2030-war-review-2026"},
  {id:340,p:7,r:"주요경제",t:"Saudi Arabia Wealth Fund PIF Unveils New 2026-2030 Strategy to Boost Returns",k:"블룸버그: 사우디 PIF, 수익률 제고 위한 2026-2030 신전략 공개",s:"Bloomberg",c:"global",d:"2026-04-16",m:"Saudi Arabia PIF unveiled 2026-2030 strategy focused on maximizing returns and attracting private capital, shifting from building mega-projects independently to leveraging its $900+ billion portfolio for third-party investment. The strategy organizes investments into Vision, Strategic, and Financial portfolios.",mk:"사우디 공공투자펀드(PIF)가 9,000억 달러 이상의 포트폴리오를 민간 자본 유치에 활용하는 방향으로 전환하는 2026-2030 신전략을 공개했다. 투자를 비전, 전략, 금융 포트폴리오로 나눠 운용한다.",tg:["PIF","투자전략","사우디국부펀드"],u:"https://www.bloomberg.com/news/articles/2026-04-15/saudi-arabia-s-wealth-fund-unveils-new-strategy-to-boost-returns"},
  {id:341,p:9,r:"헤드라인",t:"Korea Secures 273 Million Barrels of Crude via Non-Hormuz Routes Through Energy Envoy Diplomacy",k:"에너지 특사 외교 성과 - 한국, 호르무즈 우회 루트로 2억7300만 배럴 확보",s:"서울경제",c:"korean-view",d:"2026-04-16",m:"South Korea secured 273 million barrels of crude oil via alternative non-Hormuz shipping routes following a week-long diplomatic tour by Presidential Chief of Staff Kang Hoon-sik to Oman, Saudi Arabia, Qatar, and Kazakhstan. Saudi Arabia committed 250 million barrels while additional volumes were secured from Oman and Kazakhstan.",mk:"강훈식 대통령 비서실장이 오만, 사우디, 카타르, 카자흐스탄을 1주일간 방문한 외교 성과로 호르무즈 우회 경로를 통해 2억7300만 배럴의 원유를 확보했다. 사우디에서만 2억5000만 배럴을 확보했다.",tg:["에너지외교","원유확보","강훈식"],u:"https://www.sedaily.com/article/20032948"},
  {id:342,p:8,r:"속보",t:"Korea Discusses Offshore Oil Storage with Middle East Producers to Reduce Hormuz Dependency",k:"한국, 중동 산유국과 해상 원유 비축 시설 논의 - 호르무즈 의존도 감소 목표",s:"서울경제",c:"korean-view",d:"2026-04-16",m:"South Korea is in discussions with Middle East oil producers about establishing offshore oil storage facilities to reduce Hormuz corridor dependency. Korea also held talks with UAE on joint oil stockpiling agreements. The initiatives are part of a broader energy security overhaul following the crisis.",mk:"한국이 호르무즈 해협 의존도를 낮추기 위해 중동 산유국들과 해상 원유 비축 시설 설립을 논의하고 있다. UAE와 공동 원유 비축 협정도 논의됐다. 이번 위기가 드러낸 에너지 취약성을 해소하기 위한 광범위한 에너지 안보 개편의 일환이다.",tg:["에너지안보","원유비축","중동"],u:"https://en.sedaily.com/finance/2026/04/15/korea-discusses-offshore-oil-storage-facilities-with-middle"},
  {id:343,p:8,r:"주요경제",t:"Iran War Is Stress-Testing South Korea Energy Model, Korea Economic Institute Analysis",k:"이란 전쟁이 한국 에너지 모델의 한계를 시험하고 있다 - 한국경제연구원 분석",s:"한국경제",c:"korean-view",d:"2026-04-16",m:"The Korea Economic Institute analyzed how the 2026 Iran war exposed critical vulnerabilities in South Korea energy import model, which relies on the Middle East for 70% of crude oil. South Korea implemented energy rationing, fuel price caps, and naphtha export restrictions. The crisis is accelerating Korea nuclear energy expansion.",mk:"한국경제연구원이 2026년 이란 전쟁이 중동에 70%의 원유를 의존하는 한국 에너지 수입 모델의 심각한 취약성을 드러냈다고 분석했다. 한국은 에너지 배급, 연료가격 상한제, 납사 수출 제한을 시행했다.",tg:["에너지안보","한국경제","원유의존"],u:"https://www.hankyung.com/economy/article/2026041500000"},
  {id:344,p:7,r:"주요경제",t:"Korea and UAE in Advanced Discussions Over Joint Oil Stockpiling Agreement",k:"한국-UAE, 공동 원유 비축 협정 고급 협상 진행 중",s:"연합뉴스",c:"korean-view",d:"2026-04-16",m:"South Korea and UAE are in advanced discussions over a joint oil stockpiling agreement allowing Korean companies to store crude oil in UAE facilities as insurance against future Hormuz disruptions. The arrangement similar to existing agreements with Oman and Kuwait would provide strategic reserve buffer outside Korea borders.",mk:"한국과 UAE가 미래의 호르무즈 차단에 대비한 보험으로 한국 기업들이 UAE 시설에 원유를 비축할 수 있는 공동 원유 비축 협정 논의를 진행 중이다. 오만, 쿠웨이트와 유사한 협정으로 국경 밖 전략 비축 완충재 역할을 한다.",tg:["한국-UAE","공동비축","에너지안보"],u:"https://www.yna.co.kr/view/AKR20260416000100"},
  {id:345,p:7,r:"심층분석",t:"Korea Cannot Break Middle East Oil Dependency Despite Decades of Diversification Efforts",k:"수십 년간 다변화 노력에도 중동 원유 의존 탈출 못하는 한국",s:"한국경제",c:"korean-view",d:"2026-04-16",m:"Analysis shows that despite years of energy diversification policy, South Korea remains 70% dependent on Middle East crude. Price competitiveness, infrastructure investment costs, and long-term supply agreements locked Korea into Middle East dependency. The Iran war is forcing an accelerated strategic rethink.",mk:"한국경제 분석에 따르면 수년간의 에너지 다변화 정책에도 불구하고 한국은 원유 수입의 70%를 중동에 의존하고 있다. 가격 경쟁력과 장기 공급 계약이 중동 의존을 고착화했으며, 이란 전쟁 위기가 전략적 재고를 강제하고 있다.",tg:["한국에너지","중동의존","다변화"],u:"https://www.hankyung.com/article/2026032940851"},
    {id:346,p:9,r:"헤드라인",t:"Saudi Arabia Intercepts Missile Targeting Riyadh as Iran Attacks on Gulf Neighbors Continue",k:"사우디, 리야드 겨냥 미사일 요격…이란의 걸프 공격 계속",s:"Arab News",c:"saudi",d:"2026-04-19",m:"Saudi Arabia said it intercepted a ballistic missile targeting the Riyadh region in early Saturday hours. Six ballistic missiles were launched toward Riyadh with two intercepted, along with over 10 drones since midnight Friday, all of which were intercepted and destroyed.",mk:"사우디는 토요일 새벽 리야드 지역을 겨냥한 탄도미사일을 요격했다고 밝혔다. 금요일 자정 이후 리야드를 겨냥해 발사된 6발의 탄도미사일 중 2발이 요격되었고, 10기 이상의 드론이 모두 요격·파괴되었다.",tg:["사우디","이란","미사일방어"],u:"https://www.arabnews.com/node/2637919/saudi-arabia"},
    {id:347,p:9,r:"헤드라인",t:"Riyadh and Islamabad Sign Agreement to Roll Over $3 Billion Saudi Deposit",k:"리야드·이슬라마바드, 30억 달러 사우디 예치금 연장 합의",s:"Arab News",c:"saudi",d:"2026-04-19",m:"Saudi Arabia and Pakistan signed an agreement to extend the $3 billion deposit by the Saudi Fund for Development with the Pakistani central bank, providing Pakistan much-needed breathing space for fiscal reforms. The agreement was signed April 16 in Washington, D.C.",mk:"사우디와 파키스탄이 사우디개발기금(SFD)이 파키스탄 중앙은행에 예치한 30억 달러의 예치 기간 연장 협정을 체결했다. 4월 16일 워싱턴DC에서 서명된 이번 협정은 파키스탄의 재정개혁에 숨통을 틔워줄 전망이다.",tg:["사우디","파키스탄","금융지원"],u:"https://www.arabnews.com/node/2640220/pakistan"},
    {id:348,p:9,r:"정책발표",t:"Saudi Crown Prince and Pakistan PM Discuss US-Iran Mediation and Regional Stability",k:"사우디 왕세자·파키스탄 총리, 미·이란 중재와 역내 안정 논의",s:"Arab News",c:"saudi",d:"2026-04-19",m:"Crown Prince Mohammed bin Salman met Pakistan Prime Minister Shehbaz Sharif in Jeddah to discuss US-Iran mediation efforts and regional stability. The meeting came amid heightened tensions over Iranian attacks on Gulf states and the Strait of Hormuz crisis.",mk:"무함마드 빈 살만 왕세자가 제다에서 파키스탄의 셰바즈 샤리프 총리를 만나 미·이란 간 중재 노력과 역내 안정을 논의했다. 이번 회동은 이란의 걸프 국가 공격과 호르무즈 해협 위기 국면에서 이뤄졌다.",tg:["사우디","파키스탄","외교"],u:"https://www.arabnews.com/node/2640000/saudi-arabia"},
    {id:349,p:6,r:"일반",t:"Aquarabia Rewriting the Water Park Playbook with Saudi Identity Ahead of April 23 Opening",k:"아쿠아라비아, 사우디 정체성 입힌 물놀이공원 공식 개장 임박",s:"Arab News",c:"saudi",d:"2026-04-19",m:"Aquarabia water park in Qiddiya City is set to open on April 23, 2026, promising a new chapter in Saudi entertainment and tourism. Designed around Saudi cultural identity, the park is a flagship project under Vision 2030 tourism diversification goals.",mk:"키디야시티 내 아쿠아라비아 워터파크가 4월 23일 공식 개장한다. 사우디 문화 정체성을 반영해 설계된 이 시설은 비전2030 관광 다변화의 기함 프로젝트 중 하나다.",tg:["관광","비전2030","엔터테인먼트"],u:"https://www.arabnews.com/node/2640261/saudi-arabia"},
    {id:350,p:8,r:"정책발표",t:"Saudi Arabia Designates 2026 as the Year of Artificial Intelligence",k:"사우디, 2026년을 '인공지능의 해'로 지정",s:"Arab News",c:"saudi",d:"2026-04-19",m:"Saudi Arabia has officially designated 2026 as the Year of Artificial Intelligence, emerging as a global hub for data and AI under Crown Prince Mohammed bin Salman support. The declaration aligns with multi-billion-dollar AI infrastructure investments via HUMAIN and PIF.",mk:"사우디가 2026년을 공식적으로 '인공지능의 해'로 지정했다. 무함마드 빈 살만 왕세자 후원 아래 사우디는 글로벌 데이터·AI 허브로 부상 중이며, HUMAIN·PIF를 통한 수십억 달러 규모 AI 인프라 투자가 동반된다.",tg:["AI","비전2030","기술"],u:"https://www.arabnews.com/node/2636061/saudi-arabia"},
    {id:351,p:9,r:"주요경제",t:"PIF Approves 2026-2030 Strategy to Boost Economic Diversification",k:"PIF, 경제 다변화 위한 2026-2030 전략 승인",s:"Saudi Gazette",c:"saudi",d:"2026-04-19",m:"The Public Investment Fund Board chaired by Crown Prince Mohammed bin Salman approved PIF 2026-2030 strategy. The Vision Portfolio targets six ecosystems: tourism, urban development, advanced manufacturing, industrials/logistics, clean energy, and NEOM, unlocking private sector participation.",mk:"무함마드 빈 살만 왕세자가 의장인 PIF 이사회가 2026-2030 전략을 승인했다. 비전포트폴리오는 관광·도시개발·첨단제조·산업물류·청정에너지·NEOM 6개 생태계를 중점 육성하며 민간 참여 확대를 지향한다.",tg:["PIF","비전2030","전략"],u:"https://saudigazette.com.sa/article/660562/saudi-arabia/pif-approves-20262030-strategy-to-boost-economic-diversification"},
    {id:352,p:9,r:"주요경제",t:"PIF Governor: No Projects Cancelled in NEOM, Spending Reviewed",k:"PIF 총재 \"NEOM 프로젝트 취소 없음… 지출 우선순위 재검토\"",s:"Saudi Gazette",c:"saudi",d:"2026-04-19",m:"PIF Governor Yasir Al-Rumayyan stated that no projects have been cancelled in NEOM. He said the megaproject is undergoing a natural reassessment of spending priorities amid broader fiscal recalibration caused by the Iran war and oil market volatility.",mk:"야시르 알루마이얀 PIF 총재는 NEOM 어떤 프로젝트도 취소된 것이 없다고 밝혔다. 이란 전쟁과 유가 변동에 따른 재정 재조정 속에서 지출 우선순위에 대한 자연스러운 재평가가 진행 중이라는 설명이다.",tg:["NEOM","PIF","프로젝트"],u:"https://saudigazette.com.sa/article/660565/saudi-arabia/pif-governor-says-no-projects-cancelled-in-neom-spending-reviewed"},
    {id:353,p:8,r:"정책발표",t:"HR Ministry Raises Employment Contracts Compliance Rate via Qiwa Platform to 85 Percent from April 30",k:"인적자원부, 4월 30일부터 키와 플랫폼 고용계약 준수율 85%로 상향",s:"Saudi Gazette",c:"saudi",d:"2026-04-19",m:"Saudi Arabia Ministry of Human Resources announced it will raise the target compliance rate for documenting employment contracts via the Qiwa digital platform to 85 percent, effective April 30. The move forms part of labor market formalization reforms under Vision 2030.",mk:"사우디 인적자원부가 키와(Qiwa) 디지털 플랫폼을 통한 고용계약 등록 준수율 목표치를 85%로 상향해 4월 30일부터 적용한다고 발표했다. 비전2030의 노동시장 공식화 개혁의 일환이다.",tg:["노동","디지털","비전2030"],u:"https://saudigazette.com.sa/article/660467/saudi-arabia/hr-ministry-raises-employment-contracts-compliance-rate-via-qiwa-platform-to-85-from-april-30"},
    {id:354,p:7,r:"정책발표",t:"Expatriates Without Official Permit Not Allowed to Enter Makkah from Monday",k:"공식 허가 없는 외국인, 월요일부터 메카 진입 금지",s:"Saudi Gazette",c:"saudi",d:"2026-04-19",m:"Saudi authorities announced expatriates without an official permit would not be allowed to enter Makkah effective Monday, April 13. The measure aims to regulate access during the pre-Hajj preparations and security sensitive periods.",mk:"사우디 당국은 4월 13일(월)부터 공식 허가 없는 외국인의 메카 진입을 금지한다고 발표했다. 하지(Hajj) 시즌 대비와 보안 관리 차원의 조치다.",tg:["메카","비자","순례"],u:"https://saudigazette.com.sa/article/660491/saudi-arabia/expatriates-without-an-official-permit-are-not-allowed-to-enter-makkah-from-monday"},
    {id:355,p:6,r:"일반",t:"Riyadh Art Unveils 75 Permanent Works, Plans 115 More Across Capital",k:"리야드 아트, 영구 작품 75점 공개…추가 115점 설치 계획",s:"Saudi Gazette",c:"saudi",d:"2026-04-19",m:"Riyadh Art revealed 75 installed artworks across the capital as part of its permanent public art collection, with plans for an additional 115 artworks throughout 2026 and beyond. The initiative is part of a broader Vision 2030 cultural transformation effort.",mk:"리야드 아트가 수도 전역에 설치된 영구 공공미술 75점을 공개했고, 2026년 이후 115점을 추가 설치할 계획이다. 비전2030 문화 변혁의 일환이다.",tg:["문화","비전2030","리야드"],u:"https://saudigazette.com.sa/article/660603/saudi-arabia/riyadh-art-unveils-75-permanent-works-plans-115-more-across-capital"},
    {id:356,p:7,r:"정책발표",t:"Makkah Airport and Metro Plans Underway, Royal Commission Official Says",k:"메카 공항·지하철 건설 추진 중…왕립위원회 고위관리 밝혀",s:"Saudi Gazette",c:"saudi",d:"2026-04-19",m:"The CEO of the Royal Commission for Makkah City said approval has been secured for strategic directions to develop a Makkah airport to global standards and a metro system. Feasibility studies and preliminary designs for the Makkah Metro have been completed.",mk:"메카시청 왕립위원회 CEO는 메카 공항과 지하철 시스템을 세계적 수준으로 개발하기 위한 전략·경제적 방향이 승인됐다고 밝혔다. 메카 지하철의 타당성 조사와 기본 설계가 완료된 상태다.",tg:["메카","인프라","교통"],u:"https://saudigazette.com.sa/article/660176"},
    {id:357,p:10,r:"속보",t:"Saudi Arabia Strongly Condemns Failed Iranian Attacks Targeting Riyadh and Eastern Regions",k:"사우디, 리야드·동부 겨냥한 이란의 실패한 공격 강력 규탄",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-19",m:"Saudi Arabia strongly condemned the Iranian ballistic missile and drone attacks targeting Riyadh and the Eastern Region, calling them failed and cowardly. The Kingdom reaffirmed its right to defend its territory and urged the international community to take deterrent action.",mk:"사우디는 리야드와 동부지역을 겨냥한 이란의 탄도미사일·드론 공격을 실패하고 비겁한 행위로 규정하며 강력히 규탄했다. 영토 방어권을 재확인하고 국제사회의 억지 조치를 촉구했다.",tg:["사우디","이란","규탄"],u:"https://english.aawsat.com/gulf/5245738-saudi-arabia-strongly-condemns-failed-cowardly-iranian-attacks-targeting-riyadh-and"},
    {id:358,p:7,r:"주요경제",t:"Experts to Asharq Al-Awsat: Saudi Budget Strengthens Financial Sustainability",k:"전문가들 \"사우디 예산, 재정 지속가능성 강화\"",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-19",m:"Experts told Asharq Al-Awsat that Saudi Arabia fiscal framework and the newly approved PIF 2026-2030 strategy strengthen financial sustainability despite near-term pressures from the Iran war. Non-oil growth is projected at 4.6 percent in 2026.",mk:"전문가들은 이란 전쟁으로 인한 단기적 압박에도 사우디의 재정 프레임워크와 신규 승인된 PIF 2026-2030 전략이 재정 지속가능성을 강화할 것이라고 아샤르크알아와사트에 밝혔다. 2026년 비석유 부문 성장률은 4.6%로 전망된다.",tg:["재정","PIF","비석유성장"],u:"https://english.aawsat.com/business/5192422-experts-asharq-al-awsat-saudi-budget-strengthens-financial-sustainability"},
    {id:359,p:10,r:"속보",t:"Ministry of Energy: Operational Activities Halted at Several Energy Facilities Due to Recent Attacks",k:"에너지부 \"최근 공격으로 사우디 내 일부 에너지 시설 가동 중단\"",s:"SPA",c:"saudi",d:"2026-04-19",m:"An official source at the Ministry of Energy confirmed operational activities have been halted at several energy facilities in the Kingdom following recent Iranian attacks. The East-West pipeline lost approximately 700,000 barrels per day in throughput before being restored to full capacity.",mk:"에너지부 공식 소식통은 최근 이란의 공격으로 사우디 내 일부 에너지 시설의 가동이 중단됐다고 확인했다. 동서 송유관은 일일 약 70만 배럴의 수송량이 감소했다가 전량 정상 가동으로 복구됐다.",tg:["에너지","SPA","공격"],u:"https://spa.gov.sa/en/N2556681"},
    {id:360,p:9,r:"헤드라인",t:"Saudi Air Defenses Intercept 11 Ballistic Missiles Over Eastern Province as Debris Falls Near Energy Sites",k:"사우디 방공망, 동부에서 탄도미사일 11발 요격…에너지 시설 인근에 잔해 추락",s:"Saudi Gazette",c:"saudi",d:"2026-04-19",m:"Saudi air defenses intercepted and destroyed 11 ballistic missiles over the Eastern Province, with four missiles initially intercepted and an additional seven later destroyed. Debris fell near energy production sites, prompting temporary operational pauses at some facilities.",mk:"사우디 방공망이 동부 지역에서 탄도미사일 11발을 요격·파괴했다. 최초 4발이 요격됐고 이후 7발이 추가 격파됐다. 일부 잔해가 에너지 생산 시설 인근에 떨어져 일시적 가동 중단이 발생했다.",tg:["방공","사우디","동부지역"],u:"https://saudigazette.com.sa/article/660308"},
    {id:361,p:8,r:"주요경제",t:"Saudi Arabia Restores Key Oil Facilities After Attacks, Fully Recovers East-West Pipeline Capacity",k:"사우디, 공격받은 주요 석유 시설 복구…동서 송유관 전량 회복",s:"Gulf News",c:"gulf",d:"2026-04-19",m:"Saudi Arabia fully restored the East-West pipeline capacity and recovered 300,000 bpd at Manifa oil field, stabilizing global oil supply. Attacks had reduced East-West pipeline throughput by 700,000 bpd before swift response measures enabled restoration.",mk:"사우디가 이란 공격으로 중단됐던 동서 송유관을 전량 복구하고 마니파 유전 30만 b/d를 회복하며 글로벌 공급 안정화에 기여했다. 공격으로 하루 70만 배럴의 수송량이 감소했으나 신속한 대응으로 전량 복구됐다.",tg:["석유","사우디","호르무즈우회"],u:"https://gulfnews.com/business/energy/saudi-arabia-restores-key-oil-facilities-after-attacks-stabilises-global-supply-1.500504143"},
    {id:362,p:8,r:"주요경제",t:"IMF Lowers 2026 Global Growth Forecast as Middle East War Threatens Oil Supply and Inflation",k:"IMF, 중동 전쟁의 원유·인플레 위협으로 2026년 세계 성장률 하향",s:"Gulf News",c:"gulf",d:"2026-04-19",m:"The IMF lowered its 2026 global growth forecast to 3.1 percent and said inflation is expected to rise to 4.4 percent due to Middle East disruptions. Saudi Arabia and UAE growth forecasts were also revised down, though both economies are still expected to expand 3.1 percent.",mk:"IMF가 중동 교란을 반영해 2026년 세계 성장률 전망을 3.1%로 하향하고 인플레이션을 4.4%로 상향 전망했다. 사우디와 UAE 성장률도 낮췄지만 여전히 3.1% 성장 전망을 유지했다.",tg:["IMF","세계경제","인플레"],u:"https://gulfnews.com/business/economy/imf-lowers-2026-global-growth-forecast-as-war-threatens-oil-supply-inflation-1.500506782"},
    {id:363,p:7,r:"일반",t:"UAE Students to Return to Classrooms on April 20 After Over a Month of Remote Learning",k:"UAE 학생들, 한 달여 원격수업 끝에 4월 20일 등교 재개",s:"Khaleej Times",c:"gulf",d:"2026-04-19",m:"The UAE Ministry of Education announced students will return to in-person learning on Monday, April 20, marking a shift back to classrooms after more than a month of distance learning during regional uncertainty linked to the US-Israel-Iran conflict.",mk:"UAE 교육부는 미·이스라엘·이란 전쟁으로 한 달 넘게 지속된 원격수업을 마무리하고 4월 20일(월)부터 등교 수업을 재개한다고 밝혔다.",tg:["UAE","교육","전쟁영향"],u:"https://www.khaleejtimes.com/uae/uae-students-to-return-to-classrooms-on-april-20-ministry-announces"},
    {id:364,p:9,r:"주요경제",t:"UAE Records 13 Deaths and 217 Injuries Since Beginning of US-Israel-Iran War",k:"UAE, 미·이스라엘·이란 전쟁 개시 이후 13명 사망·217명 부상",s:"Khaleej Times",c:"gulf",d:"2026-04-19",m:"UAE Ministry of Defense reported 13 deaths and 217 injuries since Iran aggression began. On April 4, UAE air defenses engaged 23 ballistic missiles and 56 drones. Cumulative totals: 507 ballistic missiles, 24 cruise missiles, and 2,191 drones intercepted.",mk:"UAE 국방부는 이란 공세 이후 13명 사망, 217명 부상을 공식 집계했다. 4월 4일에만 탄도미사일 23발과 드론 56기와 교전했다. 누적으로는 탄도미사일 507발·순항 24발·드론 2,191기를 요격·교전했다.",tg:["UAE","전쟁","방공"],u:"https://www.khaleejtimes.com/uae/iran-war-mod-statement-april-4-2026"},
    {id:365,p:8,r:"심층분석",t:"How Saudi Arabia is Repositioning NEOM as Key Logistics Hub and Economic Anchor",k:"사우디, NEOM을 핵심 물류 허브·경제 축으로 재정립",s:"The National",c:"gulf",d:"2026-04-19",m:"Saudi Arabia is repositioning NEOM as a key logistics hub and economic anchor amid fiscal recalibration. The new Port of NEOM transit corridor linking Europe, Egypt, and the GCC demonstrates strategic pivot to bypass Strait of Hormuz and consolidate Red Sea presence.",mk:"사우디가 재정 재조정 속에서 NEOM을 핵심 물류 허브·경제 축으로 재정립하고 있다. 유럽·이집트·GCC를 잇는 NEOM항 신규 운송 회랑은 호르무즈 해협 우회와 홍해 거점 강화라는 전략적 전환을 보여준다.",tg:["NEOM","물류","홍해"],u:"https://www.thenationalnews.com/business/economy/2026/04/17/how-saudi-arabia-is-repositioning-neom-as-key-logistics-hub-and-economic-anchor/"},
    {id:366,p:9,r:"헤드라인",t:"For Gulf States, Hormuz Uncertainty Casts Shadow Over Fragile US-Iran Truce",k:"걸프 국가들, 호르무즈 불확실성에 미·이란 휴전 앞 그림자",s:"Al Jazeera",c:"me",d:"2026-04-19",m:"Gulf states face continued uncertainty as Iran fluctuates on Strait of Hormuz closures despite the US-Iran ceasefire. Saudi foreign ministry urged an end to attacks and the opening of the Strait, hoping the ceasefire will lead to comprehensive sustainable pacification.",mk:"걸프 국가들은 미·이란 휴전에도 이란의 호르무즈 해협 봉쇄 입장 번복으로 불확실성에 직면해 있다. 사우디 외교부는 공격 중단과 해협 개방을 촉구하며 휴전이 지속 가능한 평화로 이어지기를 희망한다고 밝혔다.",tg:["호르무즈","걸프","휴전"],u:"https://www.aljazeera.com/news/2026/4/9/for-gulf-states-hormuz-uncertainty-casts-shadow-over-fragile-us-iran-truce"},
    {id:367,p:8,r:"주요경제",t:"Oil Tankers Exit Strait of Hormuz Amid Fragile US-Iran Ceasefire",k:"불안정한 미·이란 휴전 속 유조선들 호르무즈 해협 이탈",s:"Al Jazeera",c:"me",d:"2026-04-19",m:"Oil tankers began exiting the Strait of Hormuz as shipping resumed under the fragile US-Iran ceasefire. Traffic levels remain far below normal as insurance premiums stay elevated and shippers await clarity on whether Iran will continue allowing transit.",mk:"유조선들이 불안정한 미·이란 휴전 속에서 호르무즈 해협을 빠져나가기 시작했다. 보험료 상승과 이란의 통과 허용 여부에 대한 불확실성으로 교통량은 평시보다 크게 저조한 수준에 머물러 있다.",tg:["호르무즈","원유","해운"],u:"https://www.aljazeera.com/economy/2026/4/12/oil-tankers-exit-strait-of-hormuz-amid-fragile-us-iran-ceasefire"},
    {id:368,p:8,r:"심층분석",t:"Can Pakistan Juggle US-Iran Mediation With Saudi Defence Commitments?",k:"파키스탄, 미·이란 중재와 사우디 방위 공약 양립 가능한가?",s:"Al Jazeera",c:"me",d:"2026-04-19",m:"Pakistan faces a delicate balancing act mediating between the US and Iran while simultaneously deploying military forces to Saudi Arabia. The dual role tests Islamabad diplomatic agility amid rising regional pressures and domestic political constraints.",mk:"파키스탄이 미국·이란 간 중재와 사우디 군사 지원이라는 이중 역할을 동시에 수행해야 하는 시험대에 섰다. 역내 긴장 고조와 국내 정치 제약 속에서 이슬라마바드의 외교적 민첩성이 시험받고 있다.",tg:["파키스탄","사우디","중재"],u:"https://www.aljazeera.com/news/2026/4/14/can-pakistan-juggle-us-iran-mediation-with-saudi-defence-commitments"},
    {id:369,p:9,r:"헤드라인",t:"As Oil Prices Plunge Below $91 After Weeks, a New Hormuz Crisis Emerges",k:"유가 수 주 만에 배럴당 91달러 밑으로 하락…새로운 호르무즈 위기 부상",s:"Al Jazeera",c:"me",d:"2026-04-19",m:"Brent crude fell more than 9 percent to $90.38 a barrel, dropping below $91 for the first time since March 10 after Iran declared the Strait of Hormuz open. But fresh tensions over the US blockade quickly revived supply fears, leading to a new Hormuz crisis.",mk:"브렌트유는 이란의 호르무즈 해협 개방 선언 후 9% 이상 급락해 배럴당 90.38달러를 기록, 3월 10일 이후 처음으로 91달러 밑으로 떨어졌다. 그러나 미국 봉쇄 문제로 긴장이 재점화되며 새로운 호르무즈 위기가 부상했다.",tg:["유가","호르무즈","긴장"],u:"https://www.aljazeera.com/economy/2026/4/18/as-oil-prices-plunge-below-91-after-weeks-a-new-hormuz-crisis-emerges"},
    {id:370,p:9,r:"헤드라인",t:"Saudi Arabia Asks US to End Strait of Hormuz Blockade",k:"사우디, 미국에 호르무즈 해협 봉쇄 해제 요청",s:"Jerusalem Post",c:"me",d:"2026-04-19",m:"Saudi Arabia is pressing the United States to end its blockade of the Strait of Hormuz and return to negotiations with Iran. Saudi has maintained some export resilience through Red Sea routes, but renewed insecurity around Bab al-Mandeb would threaten one of its main alternatives to Hormuz.",mk:"사우디가 미국에 호르무즈 해협 봉쇄를 해제하고 이란과의 협상에 복귀할 것을 요청하고 있다. 홍해 경로로 수출 회복력을 유지해왔지만 바브엘만데브 해협 주변 불안이 재현되면 주요 대체 경로가 위협받을 수 있다.",tg:["사우디","미국","호르무즈"],u:"https://www.jpost.com/middle-east/article-892994"},
    {id:371,p:10,r:"속보",t:"Saudi Arabia Lifts Oil Price to Record Premium as Strait of Hormuz Narrows",k:"사우디, 호르무즈 해협 축소 속 원유 가격 사상 최대 프리미엄으로 인상",s:"Bloomberg",c:"global",d:"2026-04-19",m:"Saudi Aramco increased flagship Arab Light crude to a record premium of $19.50 over regional benchmarks for Asian refiners, as widening Middle East conflict and Iran near-closure of the Strait of Hormuz convulsed energy markets.",mk:"사우디 아람코가 중동 분쟁 확대와 이란의 호르무즈 해협 사실상 폐쇄로 에너지 시장이 요동치는 가운데, 아시아 정유사 대상 아랍라이트 원유 가격을 사상 최고 프리미엄인 배럴당 19.50달러로 인상했다.",tg:["아람코","유가","프리미엄"],u:"https://www.bloomberg.com/news/articles/2026-04-06/saudis-raise-oil-price-to-record-premium-as-war-riles-markets"},
    {id:372,p:9,r:"주요경제",t:"Saudi Arabia Says East-West Pipeline Restored to Full Capacity",k:"사우디, 동서 송유관 전량 복구 발표",s:"Bloomberg",c:"global",d:"2026-04-19",m:"Saudi Arabia restored the full pumping capacity of its East-West pipeline to 7 million barrels a day, rehabilitating a vital link for oil exports via the Red Sea. The pipeline had been reduced by 700,000 bpd after an Iranian attack.",mk:"사우디가 동서 송유관의 일일 700만 배럴 수송량을 전량 복구했다고 발표했다. 이란의 공격으로 70만 b/d가 줄었던 이 송유관은 홍해 경유 원유 수출의 핵심 연결통로다.",tg:["송유관","사우디","수출"],u:"https://www.bloomberg.com/news/articles/2026-04-12/saudi-arabia-says-east-west-pipeline-restored-to-full-capacity"},
    {id:373,p:8,r:"주요경제",t:"Saudi PIF Commits to Global Investments Despite Iran War",k:"사우디 PIF, 이란 전쟁에도 글로벌 투자 지속 공약",s:"Bloomberg",c:"global",d:"2026-04-19",m:"Yasir Al Rumayyan, governor of the $1 trillion Public Investment Fund, said PIF remains committed to investments around the world despite growing concerns over the mounting economic costs of the Iran war. He emphasized PIF measures returns in decades, not quarters.",mk:"야시르 알루마이얀 PIF 총재는 이란 전쟁의 경제적 부담 우려에도 PIF가 글로벌 투자 공약을 이어가겠다고 밝혔다. 그는 PIF가 분기가 아닌 수십 년 단위로 수익률을 측정한다고 강조했다.",tg:["PIF","투자","글로벌"],u:"https://www.bloomberg.com/news/articles/2026-03-26/saudi-wealth-fund-commits-to-global-investments-despite-iran-war"},
    {id:374,p:10,r:"속보",t:"U.S. Oil Price Plunges Below $84 as Iran Declares Strait of Hormuz Open",k:"이란 호르무즈 해협 개방 선언에 미국 원유 84달러 밑으로 급락",s:"CNBC",c:"global",d:"2026-04-19",m:"WTI crude plunged below $84 a barrel on April 17 after Iran declared the Strait of Hormuz completely open, easing supply fears. Brent fell more than 9 percent, the sharpest single-day drop since the start of the Iran war.",mk:"이란이 호르무즈 해협을 완전히 개방한다고 선언하면서 4월 17일 WTI 원유가 배럴당 84달러 밑으로 급락했다. 브렌트유도 9% 넘게 하락해 이란 전쟁 발발 이후 최대 일중 낙폭을 기록했다.",tg:["유가","WTI","호르무즈"],u:"https://www.cnbc.com/2026/04/17/oil-prices-wti-brent-israel-lebanon-ceasefire-trump.html"},
    {id:375,p:8,r:"심층분석",t:"Brent Oil Price Near $100 Again With U.S.-Iran Talks Uncertain and Hormuz Still Blocked",k:"미·이란 협상 불확실성과 호르무즈 봉쇄로 브렌트유 다시 100달러 근접",s:"CNBC",c:"global",d:"2026-04-19",m:"Brent oil prices climbed back toward $100 per barrel as U.S.-Iran talks remained uncertain and the Strait of Hormuz was still effectively blocked. Market volatility remains elevated as Gulf producers struggle to maintain export flows.",mk:"미·이란 협상이 불확실하고 호르무즈 해협이 사실상 봉쇄된 가운데 브렌트유가 다시 배럴당 100달러 수준으로 올라섰다. 걸프 산유국들이 수출 유지에 어려움을 겪으면서 시장 변동성이 높게 유지되고 있다.",tg:["브렌트","유가","호르무즈"],u:"https://www.cnbc.com/2026/04/16/iran-war-oil-price-strait-hormuz.html"},
    {id:376,p:7,r:"심층분석",t:"CNBC Daily Open: A Fragile Peace but a Firm Market Rally",k:"CNBC Daily Open: 불안정한 평화, 견조한 시장 랠리",s:"CNBC",c:"global",d:"2026-04-19",m:"Wall Street closed at record highs as investors bet on the US-Iran ceasefire holding and Middle East conflicts winding down. However, analysts cautioned that the rally sits on a fragile peace still subject to sudden reversals over Hormuz and broader Gulf security.",mk:"월가는 미·이란 휴전 유지와 중동 분쟁 진정에 베팅하며 사상 최고치를 기록했다. 그러나 분석가들은 이번 랠리가 호르무즈와 걸프 안보를 둘러싸고 언제든 역전될 수 있는 불안정한 평화에 기초한다고 경고했다.",tg:["시장","휴전","월가"],u:"https://www.cnbc.com/amp/2026/04/17/cnbc-daily-market-rally-oil-iran-war.html"},
    {id:377,p:7,r:"일반",t:"Asia Markets Mostly Fall as Fragile Middle East Ceasefire Tempers Sentiment",k:"아시아 증시 약세…불안정한 중동 휴전이 투자심리 위축",s:"CNBC",c:"global",d:"2026-04-19",m:"Most Asia-Pacific markets traded lower on April 17 as an Israel-Lebanon ceasefire tempered risk appetite, even after Wall Street closed at fresh record highs. Investors remained cautious over Middle East trajectory after Iran oscillated on Hormuz closures.",mk:"4월 17일 대부분의 아시아·태평양 증시가 월가의 사상 최고치에도 불구하고 이스라엘-레바논 휴전이 위험자산 선호를 눌러 하락했다. 이란의 호르무즈 봉쇄 입장 번복으로 투자자들은 신중한 태도를 유지했다.",tg:["아시아증시","휴전","중동"],u:"https://www.cnbc.com/2026/04/17/asia-markets-today-nikkei225-hang-seng-sensex-asx-ceasefire-oil.html"},
    {id:378,p:8,r:"주요경제",t:"Saudi Output Capacity Cut by 600,000 Barrels a Day Due to Iran War",k:"이란 전쟁으로 사우디 생산능력 일일 60만 배럴 축소",s:"The National",c:"global",d:"2026-04-19",m:"Attacks on Saudi energy sites have reduced the kingdom oil production by about 600,000 barrels per day. Numerous sites were struck, including East-West pipeline pumping stations, Manifa and Khurais production plants, and refineries at Jubail, Ras Tanura, Yanbu and Riyadh.",mk:"이란의 공격으로 사우디의 석유 생산량이 일일 약 60만 배럴 축소됐다. 동서 송유관 펌프장, 마니파·쿠라이스 생산시설, 주바일·라스타누라·얀부·리야드 정유소 등 다수 시설이 피격됐다.",tg:["사우디","생산","전쟁"],u:"https://www.thenationalnews.com/business/energy/2026/04/09/saudi-output-capacity-cut-by-600000-barrels-a-day-due-to-iran-war/"},
    {id:379,p:8,r:"심층분석",t:"Saudi Oil Price Talks Take on Added Urgency as Deadline Nears",k:"마감 임박 속 사우디 유가 협상 긴박감 고조",s:"Bloomberg",c:"global",d:"2026-04-19",m:"Saudi Arabia oil price talks with Asian refiners have taken on added urgency as pricing deadlines near amid heightened regional volatility. Aramco is balancing customer demands, constrained supply, and unprecedented geopolitical premiums.",mk:"사우디의 유가 협상이 지역 변동성 고조 속에서 가격 결정 마감이 다가오며 긴박감이 커지고 있다. 아람코는 고객 수요, 제한된 공급, 전례 없는 지정학적 프리미엄 사이에서 균형을 맞추고 있다.",tg:["아람코","유가협상","아시아"],u:"https://www.bloomberg.com/news/articles/2026-03-30/saudi-oil-price-talks-take-on-added-urgency-as-deadline-nears"},
    {id:380,p:8,r:"심층분석",t:"$166 a Barrel? Middle East Oil Gives Clue to Where All Prices Could Be Headed if Iran War Drags On",k:"배럴당 166달러? 이란 전쟁 장기화 시 유가 전망",s:"CNBC",c:"global",d:"2026-04-19",m:"Analysts warned that if the Iran war drags on and shipping disruptions persist, Brent crude could climb toward $166 per barrel, with cascading effects on gasoline, freight rates and inflation. Middle East oil dynamics are flashing warning signals to global commodity markets.",mk:"애널리스트들은 이란 전쟁이 장기화되고 해운 차질이 지속되면 브렌트유가 배럴당 166달러까지 상승할 수 있다고 경고했다. 중동 원유 동향이 휘발유·해운운임·물가에 연쇄 충격을 줄 수 있다는 경고음이 커지고 있다.",tg:["유가전망","브렌트","인플레"],u:"https://www.cnbc.com/2026/03/19/166-a-barrel-middle-east-oil-gives-clue-to-where-all-prices-could-be-headed-if-iran-war-drags-on.html"},
    {id:381,p:9,r:"헤드라인",t:"Pakistan Military Force Including Fighter Jets Arrive in Saudi Arabia",k:"파키스탄 군, 전투기 포함 부대 사우디 도착",s:"Al Arabiya",c:"me",d:"2026-04-19",m:"A Pakistani military force, including fighter jets, arrived in Saudi Arabia as part of enhanced defense cooperation amid Iran aggression. Many commentators in Saudi Arabia praised the deployment as a sign of Muslim brotherhood and alliance solidarity.",mk:"이란 공세 속 방위협력 강화의 일환으로 전투기를 포함한 파키스탄 군 부대가 사우디에 도착했다. 사우디 내 여론은 이번 배치를 '무슬림 형제애'와 동맹 결속의 신호로 평가했다.",tg:["파키스탄","방위","동맹"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/11/pakistan-military-force-including-fighter-jets-arrive-in-saudi-arabia"},
    {id:382,p:7,r:"정책발표",t:"Saudi and Iran Foreign Ministers Discuss Latest Developments After Iran-US Islamabad Talks",k:"사우디-이란 외무장관, 이란-미국 이슬라마바드 회담 후 최신 상황 논의",s:"Al Arabiya",c:"me",d:"2026-04-19",m:"Saudi Foreign Minister Prince Faisal bin Farhan Al Saud and Iranian counterpart Abbas Araghchi discussed latest regional developments after Iran-US Islamabad talks. The dialogue aims to reduce tensions and restore stability in the Gulf region.",mk:"사우디 파이살 빈 파르한 외무장관과 이란 아바스 아라그치 외무장관이 이란-미국 이슬라마바드 회담 이후 역내 상황을 논의했다. 양국 대화는 걸프 지역의 긴장 완화와 안정 회복을 목표로 한다.",tg:["사우디","이란","외교"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/13/saudi-iran-foreign-ministers-discuss-latest-developments-post-iranus-islamabad-talks-"},
    {id:383,p:9,r:"헤드라인",t:"Korea Joins Hormuz Navigation Coalition Without the US",k:"한국, 미국 뺀 호르무즈 통항 연합 참여",s:"한국경제",c:"korean-view",d:"2026-04-19",m:"South Korea has joined a multinational Hormuz navigation coalition without the United States, aimed at ensuring safe passage for commercial tankers amid the ongoing Iran war. The move reflects Seoul energy security priorities and pragmatic diplomacy in navigating US-Iran tensions.",mk:"한국이 미국을 제외한 다국적 호르무즈 통항 연합에 참여했다. 이란 전쟁이 지속되는 가운데 상업용 유조선의 안전한 통과를 보장하기 위한 조치로, 에너지 안보 우선순위와 미·이란 긴장 속 실용 외교를 보여준다.",tg:["한국","호르무즈","에너지안보"],u:"https://www.hankyung.com/article/2026041664721"},
    {id:384,p:9,r:"주요경제",t:"Presidential Envoys Secure 273 Million Barrels of Crude Oil and 2.1 Million Tons of Naphtha",k:"대통령 특사단, 원유 2억7300만 배럴·나프타 210만 톤 확보",s:"서울경제",c:"korean-view",d:"2026-04-19",m:"The Blue House announced that presidential envoy Kang Hoon-sik secured 273 million barrels of crude oil and up to 2.1 million tons of naphtha by year-end, including 50 million barrels from Saudi Arabia loaded via Red Sea alternative ports in April-May, bypassing Hormuz risk.",mk:"청와대는 강훈식 대통령 특사가 연말까지 원유 2억7300만 배럴과 나프타 최대 210만 톤을 확보했다고 밝혔다. 여기에는 4~5월 홍해 대체 항만을 통해 선적될 사우디 원유 5000만 배럴이 포함돼 호르무즈 리스크 우회 의미가 크다.",tg:["한국","원유확보","호르무즈우회"],u:"https://www.sedaily.com/article/20032960"},
    {id:385,p:8,r:"주요경제",t:"Saudi and Kazakhstan Alternative Supply Lines Secured, Refining and Petrochemical Urgency Eases",k:"사우디·카자흐 등 대체 공급선 확보… 정유·석화 '급한불' 껐다",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-19",m:"Korea secured alternative crude oil and naphtha supply lines from Saudi Arabia, Oman, Qatar, and Kazakhstan, bypassing Strait of Hormuz risks. Kazakhstan offers a key non-Hormuz source, Oman is Indian Ocean-facing, and Saudi can ship via Red Sea terminals, diversifying Korea energy mix.",mk:"한국은 사우디·오만·카타르·카자흐스탄으로부터 호르무즈를 거치지 않는 원유·나프타 대체 공급선을 확보했다. 카자흐스탄은 비(非)호르무즈 주요 공급원, 오만은 인도양 연안, 사우디는 홍해 터미널을 통한 선적이 가능해 에너지 수입원이 다변화된다.",tg:["대체공급선","카자흐스탄","사우디"],u:"https://www.fnnews.com/news/202604151821382168"},
    {id:386,p:8,r:"주요경제",t:"Saudi Yanbu Port Loadings Rise to Offset 40% of Export Decline from Hormuz Blockade",k:"사우디, 홍해 얀부항 원유 선적 늘려…수출감소분 40% 상쇄",s:"한국경제",c:"korean-view",d:"2026-04-19",m:"Saudi Arabia has ramped up crude oil loadings at the Red Sea Yanbu terminal to approximately 4.4 million barrels per day, offsetting about 40 percent of the export decline caused by the Strait of Hormuz blockade. Cargoes departing Yanbu head mostly to Asian buyers including Korea, Pakistan, and Thailand.",mk:"사우디가 홍해 얀부 터미널에서 선적하는 원유량을 하루 평균 약 440만 배럴로 늘려 호르무즈 봉쇄로 인한 수출 감소분의 약 40%를 상쇄했다. 얀부항을 떠난 유조선은 대부분 중국·인도 등 아시아로 향하며 한국·파키스탄·태국행 화물도 포함됐다.",tg:["사우디","얀부","수출경로"],u:"https://www.hankyung.com/article/202603266989i"},
    {id:387,p:7,r:"심층분석",t:"Korean Tanker Completes First Successful Red Sea Bypass via Saudi Yanbu Port",k:"호르무즈 막히자 홍해로…韓 유조선 첫 우회 수송 성공",s:"서울경제",c:"korean-view",d:"2026-04-19",m:"Korea Ministry of Oceans and Fisheries announced that a Korean tanker loaded crude oil at Saudi Arabia Yanbu port and safely transited the Red Sea, marking the first successful Hormuz-bypass delivery to Korea. The Saudi Petroline pipeline has been pushed to its design maximum of 7 million b/d.",mk:"해양수산부는 사우디 얀부항에서 원유를 적재한 한국 선박이 홍해를 안전하게 통과했다고 밝혔다. 이는 호르무즈 봉쇄 이후 한국의 첫 우회 수송 성공 사례로, 사우디는 페트로라인을 설계 최대치인 하루 700만 배럴로 가동 중이다.",tg:["유조선","얀부","우회수송"],u:"https://www.sedaily.com/article/20033799"}
  ];

// ===== STATE =====
let activeFilter='all', searchQuery='', langMode='both';

function formatDate(ds){const d=new Date(ds+'T00:00:00');return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function daysAgo(ds){const t=new Date(),d=new Date(ds+'T00:00:00'),diff=Math.floor((t-d)/(864e5));return diff===0?'오늘':diff===1?'어제':`${diff}일 전`;}

// Saudi media outlet ordering: Arab News > SPA > Saudi Gazette > Argaam > Asharq Al-Awsat > others
const SAUDI_SOURCE_ORDER = {'Arab News':1,'SPA':2,'Saudi Gazette':3,'Argaam':4,'Asharq Al-Awsat':5};
function saudiSrcRank(s){return SAUDI_SOURCE_ORDER[s]||99;}

function getFiltered(){
  let f=D;
  if(activeFilter!=='all') f=f.filter(n=>n.c===activeFilter);
  if(searchQuery){const q=searchQuery.toLowerCase(); f=f.filter(n=>n.t.toLowerCase().includes(q)||n.m.toLowerCase().includes(q)||n.s.toLowerCase().includes(q)||(n.k&&n.k.toLowerCase().includes(q))||(n.mk&&n.mk.toLowerCase().includes(q))||n.tg.some(t=>t.toLowerCase().includes(q)));}
  // Sort: 1) date desc  2) for Saudi: source order  3) priority desc
  return f.sort((a,b)=>{
    const dd = new Date(b.d) - new Date(a.d);
    if(dd) return dd;
    if(a.c==='saudi' && b.c==='saudi'){
      const sd = saudiSrcRank(a.s) - saudiSrcRank(b.s);
      if(sd) return sd;
    }
    return (b.p||0) - (a.p||0);
  });
}

function renderStats(){
  const c={all:D.length,saudi:D.filter(n=>n.c==='saudi').length,gulf:D.filter(n=>n.c==='gulf').length,me:D.filter(n=>n.c==='me').length,global:D.filter(n=>n.c==='global').length,'korean-view':D.filter(n=>n.c==='korean-view').length};
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-chip"><span class="count">${c.all}</span> 전체</div>
    <div class="stat-chip">\u{1F1F8}\u{1F1E6}<span class="count">${c.saudi}</span> 사우디</div>
    <div class="stat-chip">\u{1F30D}<span class="count">${c.western}</span> 서방</div>
    <div class="stat-chip">\u{1F1F0}\u{1F1F7}<span class="count">${c.korean}</span> 한국</div>
    <div class="stat-chip">\u{1F4F0}<span class="count">${c.other}</span> 기타</div>`;
}

function renderControls(){
  const filters=[{k:'all',l:'전체'},{k:'saudi',l:'🇸🇦 사우디'},{k:'gulf',l:'🌊 GCC/걸프'},{k:'me',l:'🕌 중동/지역'},{k:'global',l:'🌍 서방'},{k:'korean-view',l:'🇰🇷 한국'}];
  const langs=[{k:'both',l:'영+한'},{k:'ko',l:'한국어만'},{k:'en',l:'영어만'}];
  document.getElementById('controls').innerHTML=
    filters.map(f=>`<button class="filter-btn ${f.k} ${activeFilter===f.k?'active':''}" data-f="${f.k}">${f.l}</button>`).join('')+
    '<div class="sep"></div>'+
    langs.map(l=>`<button class="lang-btn ${langMode===l.k?'active':''}" data-l="${l.k}">${l.l}</button>`).join('');
  document.querySelectorAll('.filter-btn').forEach(b=>b.onclick=()=>{activeFilter=b.dataset.f;renderControls();renderContent();});
  document.querySelectorAll('.lang-btn').forEach(b=>b.onclick=()=>{langMode=b.dataset.l;document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderContent();});
}

function prioBadge(n){
  if(!n.r) return '';
  const cls={'속보':'prio-breaking','헤드라인':'prio-headline','심층분석':'prio-analysis','정책발표':'prio-policy','주요경제':'prio-economy'};
  return `<span class="prio-badge ${cls[n.r]||'prio-normal'}">${n.r}</span>`;
}

function card(n){
  const isKo=n.l==='ko';
  const isTop=n.p>=9;
  let th='',mh='';
  const pb=prioBadge(n);
  if(isKo){th=`<div class="title-only">${n.t}${pb}</div>`;mh=`<div class="summary-only">${n.m}</div>`;}
  else if(langMode==='en'){th=`<div class="title-only">${n.t}${pb}</div>`;mh=`<div class="summary-only">${n.m}</div>`;}
  else if(langMode==='ko'){th=`<div class="title-only">${n.k||n.t}${pb}</div>`;mh=`<div class="summary-only">${n.mk||n.m}</div>`;}
  else{th=`<div class="title-en">${n.t}${pb}</div>${n.k?`<div class="title-ko">${n.k}</div>`:''}`;mh=`<div class="summary-en">${n.m}</div>${n.mk?`<div class="summary-ko">${n.mk}</div>`:''}`;}
  return `<div class="news-card ${n.c}${isTop?' prio-top':''}"><div class="card-header"><span class="source-tag ${n.c}">${n.s}</span><span class="card-date">${daysAgo(n.d)} · ${formatDate(n.d)}</span></div>${th}${mh}<div class="card-footer"><div class="topic-tags">${n.tg.map(t=>`<span class="topic-tag">${t}</span>`).join('')}</div><a href="${n.u}" target="_blank" class="read-link">원문 &#8594;</a></div></div>`;
}

function renderContent(){
  const f=getFiltered(),main=document.getElementById('mainContent');
  if(!f.length){main.innerHTML='<div class="no-results">검색 결과 없음</div>';return;}
  let h=`<div class="summary-panel"><h2>오늘의 핵심 요약 (2026.04.19)</h2><div class="summary-points">
    <div class="summary-point"><span class="summary-icon">🛡️</span><div class="summary-text"><strong>사우디-이란 긴장 지속:</strong> 사우디 방공망이 리야드·동부 지역을 겨냥한 이란의 탄도미사일·드론 공격을 잇따라 요격했다. 사우디는 미국에 호르무즈 봉쇄 해제를 요청하며 외교 해법을 모색하고 있고, 파키스탄 전투기 부대가 사우디에 도착해 방위협력이 강화됐다.</div></div>
    <div class="summary-point"><span class="summary-icon">🛢️</span><div class="summary-text"><strong>호르무즈 재봉쇄와 유가 급변:</strong> 이란이 4월 17일 호르무즈 개방 선언 직후 유가가 9% 이상 급락했으나, 미국의 이란 항구 봉쇄 지속으로 이란이 18일 재봉쇄에 나서면서 브렌트유가 100달러 근처로 반등했다. 사우디는 동서 송유관을 전량 복구하고 얀부항 선적을 하루 440만 배럴로 늘리며 홍해 우회 루트를 강화하고 있다.</div></div>
    <div class="summary-point"><span class="summary-icon">💰</span><div class="summary-text"><strong>PIF 2026-2030 전략 승인·NEOM 지속:</strong> PIF 이사회가 관광·도시개발·첨단제조·물류·청정에너지·NEOM 6대 생태계를 중심으로 한 2026-2030 전략을 승인했다. 알루마이얀 총재는 NEOM 프로젝트 취소는 없고 지출 우선순위만 재조정 중이라고 확인했다. IMF는 사우디·UAE 성장률을 3.1%로 하향했다.</div></div>
    <div class="summary-point"><span class="summary-icon">🇰🇷</span><div class="summary-text"><strong>한국, 호르무즈 우회 공급선 확보:</strong> 강훈식 대통령 특사가 사우디·오만·카타르·카자흐스탄에서 연말까지 원유 2억7300만 배럴·나프타 210만 톤 확보에 성공했다. 사우디는 4~5월 중 홍해 얀부항 경유로 5000만 배럴을 한국에 우선 공급하기로 확약했으며, 첫 한국 유조선이 홍해 우회 수송에 성공했다.</div></div>
  </div></div>`;

  h+=`<div class="article-count-note">검색된 기사: <strong>${f.length}건</strong> / 전체 ${D.length}건 (사우디 언론: SPA, Arab News, Saudi Gazette, Argaam, Asharq Al-Awsat 포함)</div>`;

  if(activeFilter==='all'){
    [{k:'saudi',n:'사우디 언론 (Arab News · SPA · Saudi Gazette · Argaam · Asharq Al-Awsat)',b:'badge-saudi',i:'\u{1F1F8}\u{1F1E6}'},
     {k:'gulf',n:'GCC/걸프 언론 (Gulf News · Khaleej Times · The National · Qatar Tribune · Times of Oman)',b:'badge-gulf',i:'\u{1F30A}'},
     {k:'me',n:'중동/지역 언론 (Al Jazeera · Al Arabiya · Jerusalem Post · Iran International)',b:'badge-me',i:'\u{1F54C}'},
     {k:'global',n:'서방 주요 언론 (Bloomberg · Reuters · CNN · CNBC · WSJ · NYT · FT · IEA)',b:'badge-global',i:'\u{1F30D}'},
     {k:'korean-view',n:'한국 언론 (연합뉴스 · 한국경제 · 매일경제 · KDI · 삼일PwC · 파이낸셜뉴스)',b:'badge-korean',i:'\u{1F1F0}\u{1F1F7}'}
    ].forEach(g=>{const items=f.filter(n=>n.c===g.k);if(!items.length)return;h+=`<div class="section-title">${g.i} ${g.n} <span class="badge ${g.b}">${items.length}</span></div><div class="news-grid">${items.map(card).join('')}</div>`;});
  } else h+=`<div class="news-grid">${f.map(card).join('')}</div>`;
  main.innerHTML=h;
}

document.getElementById('currentDate').textContent=(function(){const n=new Date(),w=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];return `${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일 ${w[n.getDay()]}`})();
document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderContent();});
window.addEventListener('scroll',()=>document.getElementById('scrollTop').classList.toggle('show',window.scrollY>400));
renderStats();renderControls();renderContent();
</script>
