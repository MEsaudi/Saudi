<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCC & 중동 일일 뉴스 대시보드</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card-hover: #222633;
    --accent: #00d4aa; --accent2: #5b8def;
    --text: #e8eaed; --text-dim: #8b8fa3; --border: #2a2d3a;
    --saudi: #006c35; --gulf: #0e6655; --me: #7d3c98; --global: #1a5276; --korean: #c0392b; --western: #1a5276; --other: #7d3c98;
    --ko-bg: rgba(0,212,170,0.06); --ko-border: rgba(0,212,170,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .header { background:linear-gradient(135deg,#1a1d27,#0f1117); border-bottom:1px solid var(--border); padding:20px 32px; position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .header h1 { font-size:22px; font-weight:700; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .date-badge { background:var(--card); border:1px solid var(--border); padding:6px 14px; border-radius:20px; font-size:12px; color:var(--text-dim); display:flex; align-items:center; gap:8px; }
  .live-dot { width:8px; height:8px; background:#00ff88; border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .stats-bar { display:flex; gap:10px; flex-wrap:wrap; }
  .stat-chip { background:var(--card); border:1px solid var(--border); padding:5px 12px; border-radius:14px; font-size:11px; color:var(--text-dim); display:flex; align-items:center; gap:5px; }
  .stat-chip .count { font-weight:700; color:var(--accent); }

  .controls { padding:12px 32px; display:flex; gap:8px; flex-wrap:wrap; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:72px; z-index:99; align-items:center; }
  .filter-btn { padding:6px 14px; border-radius:18px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:12px; font-weight:500; transition:all .2s; white-space:nowrap; }
  .filter-btn:hover { border-color:var(--accent); color:var(--accent); }
  .filter-btn.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
  .filter-btn.saudi.active { background:var(--saudi); color:#fff; border-color:var(--saudi); }
  .filter-btn.gulf.active { background:var(--gulf); color:#fff; border-color:var(--gulf); }
  .filter-btn.me.active { background:var(--me); color:#fff; border-color:var(--me); }
  .filter-btn.global.active { background:var(--global); color:#fff; border-color:var(--global); }
  .filter-btn.korean-view.active { background:var(--korean); color:#fff; border-color:var(--korean); }
  .filter-btn.western.active { background:var(--western); color:#fff; border-color:var(--western); }
  .filter-btn.korean.active { background:var(--korean); color:#fff; border-color:var(--korean); }
  .filter-btn.other.active { background:var(--other); color:#fff; border-color:var(--other); }

  .sep { width:1px; height:24px; background:var(--border); margin:0 4px; }

  .lang-btn { padding:5px 12px; border-radius:14px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:11px; transition:all .2s; }
  .lang-btn.active { background:var(--accent2); color:#fff; border-color:var(--accent2); }

  .search-bar { padding:10px 32px; background:var(--bg); }
  .search-input { width:100%; padding:10px 18px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:13px; outline:none; }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--text-dim); }

  .main { padding:16px 32px; }

  .section-title { font-size:16px; font-weight:700; margin:24px 0 12px; padding-left:12px; border-left:3px solid var(--accent); display:flex; align-items:center; gap:8px; }
  .badge { font-size:10px; padding:2px 8px; border-radius:8px; font-weight:600; color:#fff; }
  .badge-saudi{background:var(--saudi);} .badge-western{background:var(--western);} .badge-korean{background:var(--korean);} .badge-other{background:var(--other);}

  .news-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:14px; margin-bottom:10px; }

  .news-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; transition:all .2s; position:relative; overflow:hidden; }
  .news-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
  .news-card.saudi::before{background:var(--saudi);} .news-card.western::before{background:var(--western);} .news-card.korean::before{background:var(--korean);} .news-card.other::before{background:var(--other);}
  .news-card:hover { background:var(--card-hover); transform:translateY(-1px); box-shadow:0 6px 24px rgba(0,0,0,.3); }

  .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .source-tag { font-size:10px; font-weight:600; padding:2px 8px; border-radius:6px; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; }
  .source-tag.saudi{background:rgba(0,108,53,.2);color:#00d68f;} .source-tag.gulf{background:rgba(14,102,85,.2);color:#1abc9c;} .source-tag.me{background:rgba(125,60,152,.2);color:#bb8fce;} .source-tag.global{background:rgba(26,82,118,.2);color:#5dade2;} .source-tag.korean-view{background:rgba(192,57,43,.2);color:#e74c3c;} .source-tag.western{background:rgba(26,82,118,.2);color:#5dade2;} .source-tag.korean{background:rgba(192,57,43,.2);color:#e74c3c;} .source-tag.other{background:rgba(125,60,152,.2);color:#bb8fce;}
  .card-date { font-size:10px; color:var(--text-dim); white-space:nowrap; margin-left:6px; }

  .title-en { font-size:14px; font-weight:600; line-height:1.45; margin-bottom:3px; color:var(--text); }
  .title-ko { font-size:13px; font-weight:500; line-height:1.45; margin-bottom:8px; color:var(--accent); padding-left:9px; border-left:2px solid var(--accent); opacity:.9; }
  .summary-en { font-size:12px; color:var(--text-dim); line-height:1.55; margin-bottom:4px; }
  .summary-ko { font-size:12px; color:#8ecae6; line-height:1.55; margin-bottom:12px; padding:6px 10px; background:var(--ko-bg); border:1px solid var(--ko-border); border-radius:6px; }
  .title-only { font-size:14px; font-weight:600; line-height:1.45; margin-bottom:8px; color:var(--text); }
  .summary-only { font-size:12px; color:var(--text-dim); line-height:1.55; margin-bottom:12px; }

  .card-footer { display:flex; justify-content:space-between; align-items:center; }
  .topic-tags { display:flex; gap:4px; flex-wrap:wrap; }
  .topic-tag { font-size:9px; padding:2px 6px; border-radius:5px; background:rgba(255,255,255,.05); color:var(--text-dim); border:1px solid var(--border); }
  .read-link { font-size:11px; color:var(--accent); text-decoration:none; font-weight:600; white-space:nowrap; }
  .read-link:hover { opacity:.7; }

  .summary-panel { background:linear-gradient(135deg,#1a2332,#1a1d27); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
  .summary-panel h2 { font-size:15px; margin-bottom:12px; color:var(--accent); }
  .summary-points { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px; }
  .summary-point { display:flex; gap:8px; align-items:flex-start; padding:10px; background:rgba(255,255,255,.03); border-radius:8px; border:1px solid var(--border); }
  .summary-icon { font-size:18px; flex-shrink:0; }
  .summary-text { font-size:12px; line-height:1.5; color:var(--text-dim); }
  .summary-text strong { color:var(--text); }

  .scroll-top { position:fixed; bottom:24px; right:24px; width:40px; height:40px; border-radius:50%; background:var(--accent); color:#000; border:none; cursor:pointer; font-size:18px; display:none; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(0,212,170,.3); z-index:200; }
  .scroll-top.show { display:flex; }

  .article-count-note { font-size:11px; color:var(--text-dim); margin-bottom:16px; padding:8px 14px; background:var(--card); border:1px solid var(--border); border-radius:8px; }

  @media(max-width:768px) { .header{padding:12px 14px;} .controls{padding:10px 14px;} .search-bar{padding:8px 14px;} .main{padding:12px 14px;} .news-grid{grid-template-columns:1fr;} .summary-points{grid-template-columns:1fr;} .header h1{font-size:17px;} }
  .no-results { text-align:center; padding:50px 20px; color:var(--text-dim); }

  /* Priority badges */
  .prio-badge { font-size:9px; font-weight:700; padding:2px 7px; border-radius:4px; letter-spacing:.3px; margin-left:6px; vertical-align:middle; }
  .prio-headline { background:#e74c3c; color:#fff; }
  .prio-breaking { background:#f39c12; color:#000; }
  .prio-analysis { background:#3498db; color:#fff; }
  .prio-policy { background:#8e44ad; color:#fff; }
  .prio-economy { background:#27ae60; color:#fff; }
  .prio-normal { display:none; }

  .news-card.prio-top { border-color:rgba(231,76,60,.4); }
  .news-card.prio-top::after { content:''; position:absolute; top:0; right:0; width:0; height:0; border-top:28px solid rgba(231,76,60,.6); border-left:28px solid transparent; }
</style>
</head>

<div class="header">
  <div class="header-top">
    <h1>GCC & 중동 일일 뉴스 대시보드 (전체 기사)</h1>
    <div class="date-badge"><span class="live-dot"></span><span id="currentDate"></span></div>

<div class="main" id="mainContent"></div>

<script>
// p = priority (10=headline/breaking, 8=major policy/strategy, 7=deep analysis, 6=significant economic, 5=important diplomatic, 4=moderate, 3=routine, 2=minor biz, 1=routine corporate)

const D = [
  {id:1,p:10,r:"헤드라인",t:"Saudi FM welcomes Iran-US ceasefire, urges reopening of Strait of Hormuz",k:"사우디 외무장관, 이란-미국 휴전 환영…호르무즈 해협 재개방 촉구",s:"SPA",c:"saudi",d:"2026-04-08",m:"Saudi Arabia&apos;s Foreign Ministry officially welcomed the ceasefire announcement between the US and Iran, urging an immediate end to attacks on regional countries and calling for the reopening of the Strait of Hormuz.",mk:"사우디 외교부는 미국과 이란 간의 휴전 발표를 공식 환영하며, 역내 국가에 대한 공격 즉각 중단과 호르무즈 해협 재개방을 촉구했다.",tg:["외교","휴전","호르무즈해협"],u:"https://www.spa.gov.sa/en"},
  {id:2,p:10,r:"속보",t:"Saudi defences intercept and destroy ballistic missiles in Eastern Region",k:"사우디 방공망, 동부지역 탄도미사일 요격 및 파괴",s:"SPA",c:"saudi",d:"2026-04-08",m:"Saudi Ministry of Defence announced the interception and destruction of multiple ballistic missiles targeting the Eastern Province.",mk:"사우디 국방부는 동부 주를 겨냥한 다수의 탄도미사일을 요격·파괴했다고 발표했다.",tg:["안보","방위","동부주"],u:"https://www.spa.gov.sa/en"},
  {id:3,p:3,r:"",t:"Saudi Crown Prince receives written message from South Sudan President",k:"사우디 왕세자, 남수단 대통령의 서한 접수",s:"SPA",c:"saudi",d:"2026-04-08",m:"Crown Prince Mohammed bin Salman received a written message from the President of South Sudan regarding bilateral relations and regional developments.",mk:"무함마드 빈 살만 왕세자가 남수단 대통령으로부터 양국 관계 및 지역 정세에 관한 서한을 접수했다.",tg:["외교","왕실","남수단"],u:"https://english.aawsat.com/gulf/5260160"},
  {id:4,p:3,r:"",t:"Saudi FM receives written message from Spanish counterpart",k:"사우디 외무장관, 스페인 외무장관 서한 접수",s:"SPA",c:"saudi",d:"2026-04-08",m:"Saudi Foreign Minister received a written message from the Spanish FM regarding bilateral cooperation and the regional situation.",mk:"사우디 외무장관이 양국 협력 및 지역 정세에 관한 스페인 외무장관의 서한을 접수했다.",tg:["외교","스페인"],u:"https://english.aawsat.com/gulf/5260161"},
  {id:5,p:9,r:"속보",t:"Saudi Arabia intercepts 5 ballistic missiles and 9 drones in recent hours",k:"사우디, 최근 수시간 내 탄도미사일 5발·드론 9대 요격",s:"SPA",c:"saudi",d:"2026-04-08",m:"Saudi air defences intercepted 5 ballistic missiles and 9 drones targeting the Kingdom in recent hours, the Defence Ministry confirmed.",mk:"사우디 방공망이 최근 수시간 동안 왕국을 겨냥한 탄도미사일 5발과 드론 9대를 요격했다고 국방부가 확인했다.",tg:["안보","미사일","드론"],u:"https://english.aawsat.com/gulf/5260156"},
  {id:6,p:5,r:"",t:"Saudi FM discusses regional developments with Zayani, Ishaq Dar",k:"사우디 외무장관, 자야니·이샤크 다르와 지역 정세 논의",s:"SPA",c:"saudi",d:"2026-04-08",m:"Saudi FM held talks with Bahraini and Pakistani counterparts regarding the evolving regional security situation and diplomatic coordination.",mk:"사우디 외무장관이 바레인·파키스탄 외무장관과 지역 안보 정세 및 외교 공조를 논의했다.",tg:["외교","파키스탄","바레인"],u:"https://english.aawsat.com/gulf/5259937"},
  {id:7,p:5,r:"",t:"Saudi Arabia condemns storming of Kuwait Consulate in Iraq&apos;s Basra",k:"사우디, 이라크 바스라 쿠웨이트 영사관 습격 규탄",s:"SPA",c:"saudi",d:"2026-04-08",m:"Saudi Arabia officially condemned the storming of the Kuwait Consulate in Basra, Iraq, calling it a violation of diplomatic norms.",mk:"사우디는 이라크 바스라의 쿠웨이트 영사관 습격을 외교 규범 위반이라며 공식 규탄했다.",tg:["외교","이라크","쿠웨이트"],u:"https://english.aawsat.com/gulf/5259936"},
  {id:8,p:8,r:"헤드라인",t:"Saudi Arabia hopes ceasefire will achieve &apos;comprehensive and sustainable de-escalation&apos;",k:"사우디, 휴전이 &apos;포괄적이고 지속 가능한 긴장 완화&apos;로 이어지길 희망",s:"SPA",c:"saudi",d:"2026-04-08",m:"Saudi Arabia expressed hope that the ceasefire will lead to comprehensive and sustainable de-escalation in the region.",mk:"사우디는 이번 휴전이 지역의 포괄적이고 지속 가능한 긴장 완화로 이어지기를 희망한다고 밝혔다.",tg:["휴전","외교","안보"],u:"https://english.aawsat.com/gulf/5260018"},
  {id:9,p:5,r:"",t:"Saudi, Austrian FMs discuss regional developments",k:"사우디·오스트리아 외무장관, 지역 정세 논의",s:"SPA",c:"saudi",d:"2026-04-07",m:"Saudi and Austrian foreign ministers met in Riyadh to discuss the regional tensions, Strait of Hormuz, and Iranian attacks on GCC.",mk:"사우디·오스트리아 외무장관이 리야드에서 지역 긴장, 호르무즈 해협, 이란의 GCC 공격에 대해 논의했다.",tg:["외교","오스트리아","GCC"],u:"https://english.aawsat.com/gulf/5259782"},
  {id:10,p:6,r:"",t:"Saudi Arabia strongly condemns Israeli minister&apos;s storming of Al-Aqsa courtyards",k:"사우디, 이스라엘 장관의 알아크사 사원 침입 강력 규탄",s:"SPA",c:"saudi",d:"2026-04-07",m:"Saudi Arabia issued a strong condemnation of the Israeli minister&apos;s entry into Al-Aqsa Mosque courtyards.",mk:"사우디는 이스라엘 장관의 알아크사 사원 안뜰 진입을 강력히 규탄했다.",tg:["외교","이스라엘","알아크사"],u:"https://english.aawsat.com/gulf/5259781"},
  {id:11,p:4,r:"",t:"Saudi FM meets Jordanian counterpart, holds phone talks with Peruvian FM",k:"사우디 외무장관, 요르단 외무장관 회동…페루 외무장관과 전화 통화",s:"SPA",c:"saudi",d:"2026-04-07",m:"Saudi FM met Jordanian counterpart and held phone talks with Peruvian FM to discuss bilateral and regional developments.",mk:"사우디 외무장관이 요르단 외무장관을 만나고 페루 외무장관과 전화로 양자·지역 정세를 논의했다.",tg:["외교","요르단","페루"],u:"https://english.aawsat.com/gulf/5259541"},
  {id:12,p:6,r:"정책발표",t:"Saudi Arabia-Russia visa-free travel agreement takes effect May 11",k:"사우디-러시아 무비자 여행 협정 5월 11일 발효",s:"SPA",c:"saudi",d:"2026-04-07",m:"The Saudi Arabia-Russia agreement on visa-free travel for holders of diplomatic, special, and official passports takes effect on May 11.",mk:"사우디-러시아 간 외교·특수·관용 여권 소지자 무비자 여행 협정이 5월 11일부터 발효된다.",tg:["외교","러시아","비자"],u:"https://english.aawsat.com/gulf/5259538"},
  {id:13,p:9,r:"속보",t:"Saudi air defenses intercept and destroy 11 ballistic missiles from Iran",k:"사우디 방공망, 이란발 탄도미사일 11발 요격·파괴",s:"SPA",c:"saudi",d:"2026-04-07",m:"Saudi air defenses successfully intercepted and destroyed 11 ballistic missiles fired by Iran targeting Saudi territory.",mk:"사우디 방공망이 사우디 영토를 겨냥해 이란이 발사한 탄도미사일 11발을 성공적으로 요격·파괴했다.",tg:["안보","미사일","이란"],u:"https://english.aawsat.com/gulf/5259537"},

  {id:48,p:4,r:"",t:"Cryptocurrencies rise as Bitcoin hits three-week high",k:"비트코인 3주 최고치…암호화폐 상승",s:"Argaam",c:"saudi",d:"2026-04-08",m:"Cryptocurrencies rallied with Bitcoin hitting a three-week high amid ceasefire optimism.",mk:"휴전 낙관론 속에 비트코인이 3주 최고치를 기록하며 암호화폐가 상승했다.",tg:["암호화폐","비트코인"],u:"https://www.argaam.com/en/article/articledetail/id/1894684"},
  {id:49,p:9,r:"속보",t:"Iran attacks on Gulf states continue despite ceasefire announcement",k:"이란, 휴전 발표에도 걸프 국가 공격 지속",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-08",m:"Iran continued attacks on Gulf states despite the ceasefire announcement, raising questions about enforcement.",mk:"이란이 휴전 발표에도 걸프 국가에 대한 공격을 지속해 이행 여부에 의문이 제기되고 있다.",tg:["안보","휴전","이란"],u:"https://english.aawsat.com/gulf/5260255"},
  {id:50,p:5,r:"",t:"Pakistani support renewed to Saudi Arabia amid Iran attacks",k:"파키스탄, 이란 공격 속 사우디 지원 재확인",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-08",m:"Pakistan renewed its support and solidarity with Saudi Arabia amid continued Iranian attacks.",mk:"파키스탄이 이란의 지속적인 공격 속에서 사우디에 대한 지원과 연대를 재확인했다.",tg:["외교","파키스탄"],u:"https://english.aawsat.com/gulf/5259933"},
  {id:51,p:10,r:"속보",t:"Saudi Arabia&apos;s crucial East-West pipeline hit by drone attack",k:"사우디 핵심 동서 파이프라인, 드론 공격으로 피격",s:"Bloomberg",c:"global",d:"2026-04-08",m:"A key Saudi oil pipeline to the Red Sea was hit in a drone attack hours after ceasefire, diverting 7M bpd from eastern fields to Yanbu. Damage was limited and flows continued.",mk:"휴전 수시간 후 홍해로 향하는 사우디 핵심 석유 파이프라인(동부 유전~얀부, 일 700만 배럴 수송)이 드론 공격을 받았다. 피해는 제한적이며 수송은 계속되었다.",tg:["에너지","파이프라인","안보"],u:"https://www.bloomberg.com/news/articles/2026-04-08/saudi-arabia-s-crucial-east-west-pipeline-hit-by-drone-attack"},
  {id:52,p:8,r:"속보",t:"Saudi oil pipeline damage said to be limited after drone strike",k:"사우디 석유 파이프라인 드론 피격 피해 &apos;제한적&apos;",s:"Bloomberg",c:"global",d:"2026-04-08",m:"Saudi East-West pipeline suffered limited damage; crude flows from Yanbu continued without interruption.",mk:"사우디 동서 파이프라인 피해가 제한적이며 얀부발 원유 수출은 중단 없이 계속되었다.",tg:["에너지","파이프라인"],u:"https://www.bloomberg.com/news/articles/2026-04-08/saudi-oil-pipeline-damage-said-to-be-limited-after-drone-strike"},
  {id:53,p:9,r:"헤드라인",t:"Saudi Arabia lifts oil price to record premium as Strait of Hormuz narrows",k:"호르무즈 해협 봉쇄 속 사우디, 유가를 사상 최고 프리미엄으로 인상",s:"Bloomberg",c:"global",d:"2026-04-06",m:"Saudi Aramco raised Arab Light crude for Asia to record premium of $19.50 over regional benchmarks.",mk:"사우디 아람코가 아시아 판매용 아랍 라이트 원유를 지역 벤치마크 대비 사상 최고인 $19.50 프리미엄으로 인상했다.",tg:["석유","시장","호르무즈해협"],u:"https://www.bloomberg.com/news/articles/2026-04-06/saudis-raise-oil-price-to-record-premium-as-war-riles-markets"},
  {id:54,p:8,r:"심층분석",t:"The Petrodollar loop supporting the Treasury market is broken",k:"미국 국채시장을 지탱하던 페트로달러 순환 구조 붕괴",s:"Bloomberg",c:"global",d:"2026-04-06",m:"The traditional petrodollar recycling mechanism faces disruption as Middle East tensions reshape global energy trade patterns.",mk:"중동 긴장으로 글로벌 에너지 무역 구조가 재편되면서 페트로달러 재순환 메커니즘이 붕괴 위기에 처했다.",tg:["금융","페트로달러","국채"],u:"https://www.bloomberg.com/opinion/articles/2026-04-06/the-petrodollar-loop-supporting-the-treasury-market-is-broken"},
  {id:55,p:10,r:"속보",t:"Trump agrees to two-week Iran ceasefire to finalize talks",k:"트럼프, 이란과 2주 휴전 합의…협상 마무리 위해",s:"Bloomberg",c:"global",d:"2026-04-07",m:"President Trump announced a two-week ceasefire with Iran, brokered by Pakistan, to finalize peace talks.",mk:"트럼프 대통령이 파키스탄 중재로 이란과 2주간 휴전에 합의, 평화 협상 마무리를 위해.",tg:["휴전","미국","이란"],u:"https://www.bloomberg.com/news/live-blog/2026-04-07/iran-war-latest"},
  {id:56,p:5,r:"",t:"Pakistan says ready to support Saudi Arabia after attacks",k:"파키스탄, 사우디 공격 이후 지원 준비 완료 밝혀",s:"Bloomberg",c:"global",d:"2026-04-07",m:"Pakistan declared readiness to support Saudi Arabia amid escalating regional tensions.",mk:"파키스탄이 지역 긴장 고조 속에서 사우디 지원 준비를 밝혔다.",tg:["외교","방위","파키스탄"],u:"https://www.bloomberg.com/news/articles/2026-03-11/pakistan-says-will-be-there-before-it-is-needed-for-saudi-arabia"},
  {id:57,p:6,r:"",t:"Red Sea transit becoming a concern as war widens",k:"전쟁 확대로 홍해 통항 우려 고조",s:"Bloomberg",c:"global",d:"2026-04-07",m:"Red Sea maritime transit is becoming a growing concern as the Middle East war widens.",mk:"중동 전쟁이 확대되면서 홍해 해상 통항에 대한 우려가 고조되고 있다.",tg:["해운","홍해","안보"],u:"https://www.bloomberg.com/news/videos/2026-03-30/red-sea-transit-is-becoming-a-concern-as-war-widens-video"},
  {id:58,p:8,r:"헤드라인",t:"Three Gulf funds agree to back Paramount&apos;s $81B takeover of Warner",k:"걸프 3개 국부펀드, 파라마운트의 워너 $810억 인수 지원 합의",s:"WSJ",c:"global",d:"2026-04-05",m:"Saudi PIF, Qatar Investment Authority, and Abu Dhabi&apos;s L&apos;imad Holding agreed to provide ~$10B toward Paramount&apos;s takeover.",mk:"사우디 PIF, 카타르투자청, 아부다비 리마드홀딩이 파라마운트 인수에 약 $100억 지원 합의.",tg:["투자","미디어","국부펀드"],u:"https://www.933thedrive.com/2026/04/05/three-gulf-funds-agree-to-back-paramounts-81-billion-takeover-of-warner-wsj-reports/"},
  {id:59,p:9,r:"헤드라인",t:"Saudi Arabia expects oil to climb over $180 if energy shock continues",k:"사우디, 에너지 충격 지속 시 유가 $180 돌파 전망",s:"WSJ",c:"global",d:"2026-04-07",m:"Saudi officials project oil prices could soar past $180/bbl if Iran war disruptions persist until late April.",mk:"사우디 당국자들은 이란 전쟁 혼란이 4월 말까지 지속 시 유가가 $180을 넘을 수 있다고 전망.",tg:["석유","경제","전망"],u:"https://www.marketscreener.com/news/saudi-arabia-expects-oil-to-climb-over-180-if-energy-shock-continues-until-late-april-wsj-reports-ce7e5edfd98af325"},
  {id:60,p:9,r:"심층분석",t:"Saudis and UAE take steps toward joining Iran war",k:"사우디·UAE, 이란 전쟁 참전 방향으로 조치",s:"WSJ",c:"global",d:"2026-04-06",m:"Saudi Arabia and UAE have taken some steps toward joining the Iran war, including allowing US forces to use Saudi air bases. FM said &apos;patience with Iranian attacks is not unlimited.&apos;",mk:"사우디와 UAE가 미군의 사우디 공군기지 사용 허용 등 이란 전쟁 참전 방향 조치를 취했다. 외무장관은 &apos;이란 공격에 대한 인내에 한계가 있다&apos;고 밝혔다.",tg:["안보","참전","미국"],u:"https://www.bloomberg.com/news/articles/2026-03-24/saudis-uae-take-some-steps-toward-joining-iran-war-wsj-says"},
  {id:61,p:6,r:"주요경제",t:"GCC sovereign credit landscape reflects a stable outlook",k:"GCC 국가 신용 전망 &apos;안정적&apos; 유지",s:"S&P/FT",c:"global",d:"2026-04-08",m:"Saudi Arabia holds A+ credit rating from S&P Global with stable outlook, underpinned by hydrocarbon revenues.",mk:"사우디가 S&P 글로벌 A+ 신용등급·안정적 전망을 유지, 탄화수소 수입이 뒷받침.",tg:["신용","경제","등급"],u:"https://thebftonline.com/2026/04/08/the-gcc-sovereign-credit-landscape-reflects-a-stable-outlook/"},
  {id:62,p:8,r:"심층분석",t:"The Gulf&apos;s growth model faces its first true stress test",k:"걸프 성장 모델, 첫 번째 진정한 스트레스 테스트에 직면",s:"AGBI/FT",c:"global",d:"2026-04-08",m:"Saudi Arabia and UAE could see GDP fall by 3% and 5% respectively. Qatar and Kuwait could see up to 14% GDP contractions.",mk:"사우디·UAE GDP 각각 3%·5% 하락 가능. 카타르·쿠웨이트는 최대 14% GDP 축소 가능.",tg:["경제","다각화","리스크"],u:"https://www.agbi.com/opinion/economy/2026/04/matein-khalid-the-gulfs-growth-model-faces-its-first-true-stress-test/"},
  {id:63,p:7,r:"심층분석",t:"Gulf turns to pandemic playbook to head off another downturn",k:"걸프, 팬데믹 대응 전략으로 경기 침체 방어",s:"AGBI",c:"global",d:"2026-04-08",m:"GCC states are taking pre-emptive action using pandemic-era economic playbook to head off downturn.",mk:"GCC 국가들이 팬데믹 시기 경제 전략을 활용해 선제적으로 경기 침체를 방어하고 있다.",tg:["경제","정책","GCC"],u:"https://www.agbi.com/economy/2026/04/gulf-turns-to-pandemic-playbook-to-head-off-another-downturn/"},
  {id:64,p:7,r:"주요경제",t:"GCC can withstand war-related shocks: IMF chief",k:"IMF 총재: GCC, 전쟁 관련 충격 견딜 수 있어",s:"Reuters",c:"global",d:"2026-04-07",m:"IMF chief expressed confidence GCC can withstand economic shocks, citing strong fiscal buffers and SWF reserves.",mk:"IMF 총재가 강력한 재정 완충장치와 국부펀드를 근거로 GCC의 충격 견딜 능력에 자신감 표명.",tg:["경제","IMF","회복력"],u:"https://enterpriseam.com/ksa/2026/04/07/gcc-can-withstand-war-related-shocks-imf-chief/"},
  {id:65,p:8,r:"심층분석",t:"A fragile US-Iran ceasefire sparks market relief — but no clear path to lasting peace",k:"취약한 미·이란 휴전, 시장에 안도감…그러나 지속 평화까지 먼 길",s:"CNBC",c:"global",d:"2026-04-08",m:"The ceasefire sparked a broad relief rally across assets, but experts warned any lasting deal will be complicated by trust deficits.",mk:"휴전이 전방위 안도 랠리를 촉발했지만 전문가들은 신뢰 부족으로 지속적 합의가 어려울 것이라 경고.",tg:["시장","휴전","투자"],u:"https://www.cnbc.com/2026/04/08/us-iran-war-ceasefire-middle-east-strait-of-hormuz-oil-markets.html"},
  {id:66,p:9,r:"속보",t:"Gulf countries scramble to intercept missiles hours into ceasefire",k:"걸프 국가들, 휴전 시작 수시간 만에 미사일 요격에 분주",s:"CNBC",c:"global",d:"2026-04-08",m:"Many Middle Eastern countries reported incoming missiles and drones from Iran, triggering air defenses across the Gulf within hours of the newly announced ceasefire.",mk:"휴전 발표 수시간 만에 중동 여러 국가가 이란발 미사일과 드론을 보고하며 걸프 전역 방공 체계가 가동되었다.",tg:["안보","미사일","휴전"],u:"https://www.cnbc.com/2026/04/08/iran-missile-attacks-after-us-ceasefire-gulf-air-defenses.html"},
  {id:67,p:8,r:"심층분석",t:"US and Iran ceasefire explainer: What to know",k:"미국-이란 휴전 해설: 알아야 할 사항",s:"CNN",c:"global",d:"2026-04-08",m:"The US and Iran agreed to a two-week ceasefire mediated by Pakistan. Iran must reopen Strait of Hormuz. Talks to continue in Islamabad.",mk:"미국과 이란이 파키스탄 중재로 2주 휴전에 합의. 이란은 호르무즈 해협 재개방 의무. 이슬라마바드에서 협상 계속.",tg:["휴전","미국","이란"],u:"https://edition.cnn.com/2026/04/08/middleeast/us-iran-ceasefire-explainer-war-intl-hnk"},
  {id:68,p:7,r:"",t:"Day 40 of Middle East conflict — Israel attacks Lebanon, Iran stops shipping through Hormuz",k:"중동 분쟁 40일 차 — 이스라엘 레바논 공격, 이란 호르무즈 해상수송 중단",s:"CNN",c:"global",d:"2026-04-08",m:"Live coverage of day 40: Israel attacks Lebanon, Iran stops shipping through Strait of Hormuz. Ceasefire announced.",mk:"40일 차 실시간 보도: 이스라엘 레바논 공격, 이란 호르무즈 해상수송 중단. 휴전 발표.",tg:["전쟁","레바논","호르무즈"],u:"https://edition.cnn.com/2026/04/08/world/live-news/iran-war-trump-us-ceasefire"},
  {id:69,p:9,r:"속보",t:"A fragile US-Iran ceasefire shows cracks as attacks continue across the region",k:"취약한 미·이란 휴전에 균열…지역 전역 공격 계속",s:"NPR",c:"global",d:"2026-04-08",m:"Despite ceasefire, attacks continue. Kuwait faced 28 Iranian drone attacks and UAE 35 by 16:23 GMT on April 8.",mk:"휴전에도 공격 계속. 4월 8일 16:23 GMT 기준 쿠웨이트 이란 드론 28회, UAE 35회 공격.",tg:["휴전","공격","걸프"],u:"https://www.npr.org/2026/04/08/nx-s1-5777291/iran-war-updates"},
  {id:70,p:9,r:"속보",t:"US and Iran agree to 2-week ceasefire, suspending Trump&apos;s threat",k:"미·이란 2주 휴전 합의, 트럼프의 이란 공격 위협 중단",s:"NPR",c:"global",d:"2026-04-07",m:"US and Iran agreed to ceasefire brokered by Pakistan, suspending Trump&apos;s threatened deadline for wiping out Iranian civilization.",mk:"미국과 이란이 파키스탄 중재 휴전에 합의, 트럼프의 이란 문명 파괴 위협 시한이 중단되었다.",tg:["휴전","미국","외교"],u:"https://www.npr.org/2026/04/07/nx-s1-5776377/iran-war-updates"},
  {id:71,p:5,r:"",t:"Foreign Secretary&apos;s statement: ceasefire in the Middle East",k:"영국 외무장관 성명: 중동 휴전",s:"UK Gov",c:"global",d:"2026-04-08",m:"UK Foreign Secretary issued statement on the ceasefire in the Middle East.",mk:"영국 외무장관이 중동 휴전에 대한 성명을 발표했다.",tg:["영국","휴전","외교"],u:"https://www.gov.uk/government/news/foreign-secretary-statement-ceasefire-in-the-middle-east-8-april"},

  {id:103,p:8,r:"심층분석",t:"복잡한 심경의 사우디·UAE… 전쟁 원하는 이스라엘이 협상 걸림돌?",k:"",s:"MBC 뉴스",c:"korean-view",d:"2026-04-08",m:"사우디와 UAE의 복잡한 외교적 입장을 분석. 이스라엘이 협상의 걸림돌이 되고 있다는 전문가 분석이 이어지고 있다.",mk:"",tg:["외교","사우디","이스라엘"],u:"https://imnews.imbc.com/replay/2026/nwdesk/article/6810249_37004.html"},
  {id:104,p:9,r:"속보",t:"중동 하늘길 속속 개방 속 이스라엘·이란 공습 지속 &apos;불안한 휴전&apos;",k:"",s:"뉴스핌",c:"korean-view",d:"2026-04-09",m:"미국과 이란이 2주간 휴전에 합의한 직후 중동 국가들이 영공을 속속 재개방하고 있으나, 이스라엘과 이란의 공습이 지속되며 &apos;불안한 휴전&apos; 양상을 보이고 있다.",mk:"",tg:["휴전","영공","이란"],u:"https://www.newspim.com/news/view/20260409000013"},
  {id:105,p:8,r:"심층분석",t:"45일 휴전 뒤 종전안… 美·이란 출구 찾나",k:"",s:"서울신문",c:"korean-view",d:"2026-04-07",m:"미국과 이란이 2주 휴전을 시작으로 45일간의 전면 휴전 뒤 종전 합의를 모색하는 출구 전략을 검토 중이라는 분석.",mk:"",tg:["휴전","종전","외교"],u:"https://www.seoul.co.kr/news/international/2026/04/07/20260407001007"},
  {id:106,p:8,r:"헤드라인",t:"중동 전쟁 한 달, &apos;4월 위기설&apos; 확산…한국 경제 비상",k:"",s:"전국인력신문",c:"korean-view",d:"2026-04-06",m:"중동 전쟁이 한 달을 넘기면서 &apos;4월 위기설&apos;이 확산, 한국 경제에 비상이 걸렸다. 고유가·고환율·물류비 상승이 전 산업에 확산 중.",mk:"",tg:["경제","위기","물류"],u:"https://www.kjob.news/news/479379"},
  {id:107,p:8,r:"심층분석",t:"중동 전쟁 6개월 땐 유가 170달러…한국 경제 &apos;R의 공포&apos; 현실화",k:"",s:"글로벌이코노믹",c:"korean-view",d:"2026-04-05",m:"중동 전쟁이 6개월 지속 시 유가 170달러, 한국 경제에 &apos;R(Recession)의 공포&apos;가 현실화될 수 있다는 전망. 반도체·물가에 타격.",mk:"",tg:["유가","경기침체","전망"],u:"https://www.g-enews.com/article/Global-Biz/2026/04/202604051733127007fbbec65dfb_1"},
  {id:108,p:7,r:"주요경제",t:"중동전쟁에 소비자물가 2.4% 급등…내달엔 더 뛴다",k:"",s:"이데일리",c:"korean-view",d:"2026-04-07",m:"중동 전쟁으로 소비자물가가 전년 대비 2.4% 상승, 지난해 11월 이후 최고치. 다음 달에는 더 오를 전망.",mk:"",tg:["물가","인플레이션","경제"],u:"https://marketin.edaily.co.kr/News/ReadE?newsId=01502246645388568"},
  {id:109,p:7,r:"주요경제",t:"중동전쟁 4월부터 반영…무역흑자행진 제동 우려",k:"",s:"헤럴드경제",c:"korean-view",d:"2026-04-06",m:"중동 전쟁의 경제적 영향이 4월부터 본격 반영되면서 한국의 무역흑자 행진에 제동이 걸릴 우려가 커지고 있다.",mk:"",tg:["무역","흑자","경제"],u:"https://biz.heraldcorp.com/article/10712577"},
  {id:110,p:7,r:"",t:"중기 덮친 중동전쟁…유가·환율·물류비 &apos;잔인한 4월&apos;",k:"",s:"다음뉴스",c:"korean-view",d:"2026-04-06",m:"중소기업부에 따르면 중동전쟁 관련 중소기업 피해 접수 422건. 운송 차질 59.9%, 계약 취소 35.6%, 물류비 상승 33.8%.",mk:"",tg:["중소기업","물류비","피해"],u:"https://v.daum.net/v/20260331083904576"},
  {id:111,p:5,r:"",t:"중동 전쟁발 유가 쇼크, 대구·경북 물가 비상",k:"",s:"IT인사이트",c:"korean-view",d:"2026-04-05",m:"중동 전쟁발 유가 쇼크로 대구·경북 지역 물가가 비상 상황에 놓였다.",mk:"",tg:["물가","지방","유가"],u:"https://www.itinsight.kr/news/443982"},
  {id:112,p:9,r:"헤드라인",t:"Saudi Arabia to develop 27 eco-cultural heritage sites in national parks",k:"사우디, 국립공원 내 27개 생태문화 유산 사이트 개발",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi Heritage Commission and National Center for Vegetation Cover will develop 27 sites across multiple regions: 5 in Riyadh, 5 in Madinah, 2 in Eastern Province, 15 in Asir. Includes Naqra Valley rock inscriptions and historic Jawatha Mosque in Al-Ahsa.",mk:"사우디 문화유산위원회와 국가식생피복센터가 리야드 5곳, 마디나 5곳, 동부주 2곳, 아시르 15곳 등 총 27개 사이트를 개발한다. 나크라 계곡 암각화와 알아흐사 자와사 모스크 등이 포함됐다.",tg:["문화유산","국립공원","관광"],u:"https://saudigazette.com.sa/article/660369/saudi-arabia/saudi-arabia-to-develop-27-eco-cultural-heritage-sites-in-national-parks"},
  {id:113,p:8,r:"정책발표",t:"Saudi Arabia, Syria discuss exchange of expertise in disaster management",k:"사우디-시리아, 재난관리 전문성 교류 논의",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi Interior Minister Prince Abdulaziz bin Saud bin Naif met Syrian Minister of Emergency and Disaster Management Raed Al-Saleh in Riyadh. They discussed risk prevention, modern technologies, training programs, and exchange of specialists in emergency and disaster management.",mk:"압둘아지즈 빈 사우드 빈 나이프 사우디 내무장관이 라에드 알살레 시리아 비상재난관리부 장관을 리야드에서 만나 위험 예방, 첨단 기술 활용, 훈련 프로그램, 전문가 교류 방안을 논의했다.",tg:["외교","시리아","재난관리"],u:"https://saudigazette.com.sa/article/660366/saudi-arabia/saudi-arabia-syria-discuss-exchange-of-expertise-in-disaster-management"},
  {id:114,p:7,r:"주요경제",t:"Saudi life expectancy rises to 79.9 as clinical trials grow over 50%",k:"사우디 기대수명 79.9세로 상승…임상시험 50% 이상 증가",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi Arabia&apos;s life expectancy increased from 74 years in 2016 to 79.9 years by end of 2025 under the Health Sector Transformation Program. Clinical trials grew by 51.4% between 2023 and 2025.",mk:"사우디아라비아의 기대수명이 보건부문 변혁 프로그램에 따라 2016년 74세에서 2025년 말 79.9세로 상승했다. 임상시험은 2023~2025년 51.4% 증가했다.",tg:["보건","임상시험","비전2030"],u:"https://saudigazette.com.sa/article/660330"},
  {id:115,p:8,r:"속보",t:"Iranian missile hits telecom building in Sharjah, 2 injured",k:"이란 미사일, 샤르자 통신빌딩 타격…2명 부상",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"An Iranian missile struck a telecommunications building in Sharjah, UAE, injuring two people. The strike came amid the broader regional conflict between Iran and the US-Israel coalition.",mk:"이란 미사일이 UAE 샤르자의 통신 빌딩을 타격해 2명이 부상했다. 이번 공격은 이란과 미국-이스라엘 연합 간 지역 분쟁 속에 발생했다.",tg:["이란","UAE","분쟁"],u:"https://saudigazette.com.sa/article/660326/world/iranian-missile-hits-sharjah-telecom-building-2-injured"},
  {id:116,p:9,r:"속보",t:"Saudi air defenses intercept 11 ballistic missiles over Eastern Province as debris falls near energy sites",k:"사우디 방공망, 동부주 상공서 탄도미사일 11기 요격…에너지 시설 인근 잔해 낙하",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi air defenses intercepted and destroyed 11 ballistic missiles fired at the Eastern Province early Tuesday, according to the Ministry of Defense. Debris fell in the vicinity of energy facilities, with damage assessment underway.",mk:"사우디 국방부에 따르면 화요일 새벽 동부주를 향해 발사된 탄도미사일 11기를 사우디 방공망이 요격·파괴했다. 잔해가 에너지 시설 인근에 떨어졌으며 피해 평가가 진행 중이다.",tg:["방공","동부주","에너지"],u:"https://saudigazette.com.sa/article/660308/saudi-arabia/saudi-air-defenses-intercept-11-ballistic-missiles-in-eastern-province"},
  {id:117,p:4,r:"",t:"Jeddah Red Crescent rescues expatriate from cardiac arrest in life-saving rapid response",k:"제다 적신월사, 심정지 외국인 인명구조 성공",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Jeddah Red Crescent paramedics successfully resuscitated an expatriate suffering cardiac arrest, demonstrating the rapid response capability of Saudi emergency services.",mk:"제다 적신월사 응급요원들이 심정지를 일으킨 외국인을 성공적으로 소생시켜 사우디 응급의료의 신속 대응 역량을 입증했다.",tg:["응급","적신월","제다"],u:"https://saudigazette.com.sa/article/660303/saudi-arabia/jeddah-red-crescent-rescues-expatriate-from-cardiac-arrest-in-life-saving-rapid-response"},
  {id:118,p:5,r:"",t:"Civil Defense urges caution amid forecast of heavy rainfall across most regions of Saudi Arabia",k:"사우디 민방위, 폭우 예보에 주의 당부",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi Civil Defense issued safety advisories as the National Center of Meteorology forecast heavy rainfall across most regions of the Kingdom in the coming days, urging residents to avoid flood-prone areas.",mk:"국가기상센터가 향후 며칠간 사우디 대부분 지역에 폭우를 예보함에 따라 민방위는 안전 권고를 발령하고 주민들에게 침수 위험 지역 회피를 촉구했다.",tg:["기상","민방위","안전"],u:"https://saudigazette.com.sa/article/660302/saudi-arabia/civil-defense-urges-caution-amid-forecast-of-heavy-rainfall-across-most-regions-of-saudi-arabia"},
  {id:119,p:4,r:"",t:"Consumers can approach neutral third party to inspect water meters",k:"소비자, 중립 제3자에 수도계량기 검사 의뢰 가능",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi Water Regulator announced consumers can request neutral third-party inspection of water meters to resolve billing disputes, enhancing consumer protection in the utility sector.",mk:"사우디 물 규제기관은 소비자가 수도 요금 분쟁 해결을 위해 중립적인 제3자 기관에 계량기 검사를 요청할 수 있다고 발표하며 공공서비스 부문 소비자 보호를 강화했다.",tg:["수도","소비자","규제"],u:"https://saudigazette.com.sa/article/660297/saudi-arabia/consumers-can-approach-neutral-third-party-to-inspect-water-meters"},
  {id:120,p:7,r:"정책발표",t:"Saudi Arabia to localize 69 administrative support jobs",k:"사우디, 행정지원직 69개 직종 사우디화",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi Ministry of Human Resources announced Saudization of 69 administrative support jobs in the private sector, effective from April 5. New mechanism for Saudization calculation will take effect April 15, 2026.",mk:"사우디 인적자원부는 4월 5일부터 민간 부문 행정지원직 69개를 사우디화 대상에 포함한다고 발표했다. 새로운 사우디화 산정 메커니즘은 2026년 4월 15일부터 적용된다.",tg:["사우디화","고용","정책"],u:"https://saudigazette.com.sa/article/660292"},
  {id:121,p:8,r:"심층분석",t:"Saudi Arabia intercepts 799 drones, 95 missiles since March 3",k:"사우디, 3월 3일 이후 드론 799기·미사일 95기 요격",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi Arabia has intercepted 799 drones and 95 missiles since March 3, 2026, including a cruise missile, according to military officials. The figures highlight the scale of attacks during the Iran conflict.",mk:"사우디는 2026년 3월 3일 이후 순항미사일 1기를 포함해 드론 799기와 미사일 95기를 요격했다고 군 당국이 밝혔다. 이 수치는 이란 분쟁 중 공격 규모를 보여준다.",tg:["방공","드론","미사일"],u:"https://saudigazette.com.sa/article/660265/saudi-arabia/saudi-arabia-intercepts-cruise-missile-799-drones-95-missiles-detected-since-march-3"},
  {id:122,p:6,r:"",t:"Saudi Arabia condemns RSF attack on Sudan hospital, calls for immediate halt",k:"사우디, 수단 RSF 병원 공격 규탄…즉각 중단 촉구",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi Foreign Ministry strongly condemned the Rapid Support Forces (RSF) attack on a hospital in Sudan, calling for an immediate halt to attacks on civilian and medical facilities.",mk:"사우디 외교부는 RSF의 수단 병원 공격을 강력히 규탄하고 민간·의료시설에 대한 공격 즉각 중단을 촉구했다.",tg:["외교","수단","RSF"],u:"https://saudigazette.com.sa/article/660250"},
  {id:123,p:9,r:"헤드라인",t:"Crown Prince meets Italy PM in Jeddah, discusses regional developments",k:"왕세자, 제다서 이탈리아 총리 회담…지역 정세 논의",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Crown Prince Mohammed bin Salman met Italian PM Giorgia Meloni in Jeddah, discussing the latest regional developments and bilateral cooperation amid the ongoing Iran conflict.",mk:"무함마드 빈 살만 왕세자가 제다에서 조르자 멜로니 이탈리아 총리와 회담을 갖고 이란 분쟁 속 지역 정세와 양국 협력을 논의했다.",tg:["외교","이탈리아","정상회담"],u:"https://saudigazette.com.sa/article/660236"},
  {id:124,p:7,r:"",t:"Crown Prince meets FIFA President in Jeddah",k:"왕세자, 제다서 FIFA 회장 면담",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Crown Prince Mohammed bin Salman received FIFA President Gianni Infantino in Jeddah, discussing 2034 World Cup preparations and global football cooperation.",mk:"무함마드 빈 살만 왕세자가 제다에서 잔니 인판티노 FIFA 회장을 접견하고 2034 월드컵 준비와 국제 축구 협력을 논의했다.",tg:["스포츠","FIFA","월드컵"],u:"https://saudigazette.com.sa/article/660235"},
  {id:125,p:9,r:"헤드라인",t:"Putin reaffirms Russia&apos;s support for Saudi Arabia in call with Crown Prince",k:"푸틴, 왕세자와 통화서 사우디 지지 재확인",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Russian President Vladimir Putin reaffirmed Russia&apos;s support for Saudi Arabia in a phone call with Crown Prince Mohammed bin Salman, as Saudi Arabia faces continued attacks from Iran.",mk:"블라디미르 푸틴 러시아 대통령이 무함마드 빈 살만 왕세자와의 통화에서 이란의 지속적인 공격에 직면한 사우디아라비아에 대한 러시아의 지지를 재확인했다.",tg:["외교","러시아","정상통화"],u:"https://saudigazette.com.sa/article/660215"},
  {id:126,p:9,r:"헤드라인",t:"Saudi FM discusses regional developments with Chinese, Japanese counterparts in phone call",k:"사우디 외무장관, 중국·일본 외무장관과 통화로 지역 정세 논의",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi Foreign Minister Prince Faisal bin Farhan discussed the latest regional developments with his Chinese and Japanese counterparts in separate phone calls, covering the Iran conflict and Middle East stability.",mk:"파이살 빈 파르한 사우디 외무장관이 중국, 일본 외무장관과 각각 통화를 갖고 이란 분쟁과 중동 안정을 포함한 최근 지역 정세를 논의했다.",tg:["외교","중국","일본"],u:"https://saudigazette.com.sa/article/660210"},
  {id:127,p:6,r:"",t:"Israeli military claims killing 40 Hezbollah fighters in last 24 hours",k:"이스라엘군, 24시간 내 헤즈볼라 전투원 40명 사살 주장",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Israeli military claimed to have killed 40 Hezbollah fighters in southern Lebanon in the last 24 hours, as cross-border tensions continue despite the Iran ceasefire.",mk:"이스라엘군은 이란 휴전에도 국경 간 긴장이 지속되는 가운데 지난 24시간 동안 레바논 남부에서 헤즈볼라 전투원 40명을 사살했다고 주장했다.",tg:["이스라엘","헤즈볼라","레바논"],u:"https://saudigazette.com.sa/article/660208"},
  {id:128,p:7,r:"속보",t:"Iran vows &apos;crushing&apos; attacks on US after Trump threats",k:"이란, 트럼프 위협에 대미 &apos;압도적&apos; 공격 예고",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Iran threatened &quot;crushing&quot; attacks against US forces after President Trump escalated his threats against Tehran. The exchange comes despite the recently announced two-week ceasefire.",mk:"이란은 트럼프 대통령이 이란에 대한 위협을 고조시키자 미군에 대한 &apos;압도적&apos; 공격을 위협했다. 이러한 응수는 최근 발표된 2주 휴전에도 불구하고 나왔다.",tg:["이란","미국","분쟁"],u:"https://saudigazette.com.sa/article/660207"},
  {id:129,p:4,r:"",t:"Turaif sees 15.2mm of rain as NCM monitors Kingdom-wide activity",k:"투라이프에 15.2mm 강우…NCM, 전국 기상 모니터링",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"The northern town of Turaif recorded 15.2mm of rainfall as the National Center of Meteorology monitored widespread weather activity across Saudi Arabia.",mk:"북부 투라이프에서 15.2mm의 강우량이 기록됐으며, 국가기상센터는 사우디 전역의 광범위한 기상 활동을 모니터링했다.",tg:["기상","강우","북부"],u:"https://saudigazette.com.sa/article/660205/saudi-arabia/turaif-sees-152mm-of-rain-as-ncm-monitors-kingdom-wide-activity"},
  {id:130,p:3,r:"",t:"Saudi skies glow with Shawwal&apos;s &apos;butterfly moon&apos;",k:"사우디 하늘에 샤왈의 &apos;나비 달&apos; 빛나다",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Skywatchers across Saudi Arabia enjoyed the rare &apos;butterfly moon&apos; phenomenon during the Islamic month of Shawwal, captured by photographers nationwide.",mk:"사우디 전역의 천체 관측자들은 이슬람력 샤왈월 동안 희귀한 &apos;나비 달&apos; 현상을 즐겼으며, 전국 사진작가들이 이를 포착했다.",tg:["천체","문화","샤왈"],u:"https://saudigazette.com.sa/article/660201"},
  {id:131,p:6,r:"",t:"Powerful earthquake damages buildings in Indonesia, triggers tsunami waves",k:"인도네시아 강진, 건물 피해·쓰나미 발생",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"A powerful earthquake struck Indonesia, damaging buildings and triggering tsunami waves. Authorities issued warnings to coastal communities.",mk:"인도네시아에 강진이 발생해 건물이 피해를 입고 쓰나미가 발생했다. 당국은 해안 지역사회에 경보를 발령했다.",tg:["지진","인도네시아","자연재해"],u:"https://saudigazette.com.sa/article/660195"},
  {id:132,p:8,r:"정책발표",t:"Makkah airport and metro plans underway: Official",k:"메카 공항·메트로 건설 계획 진행 중: 당국",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Plans to build an airport and metro system in Makkah are underway, as the holy city moves ahead with major transport and infrastructure upgrades to handle pilgrim flows.",mk:"성지 메카는 순례객 수송을 위한 주요 교통·인프라 업그레이드의 일환으로 공항과 메트로 시스템 건설 계획을 진행 중이다.",tg:["인프라","메카","교통"],u:"https://saudigazette.com.sa/article/660176"},
  {id:133,p:7,r:"주요경제",t:"Air fares go up with higher fuel costs, tight capacity, IATA says",k:"IATA: 연료비 상승·공급 부족으로 항공료 인상",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Air fares are rising due to higher fuel costs and tight capacity caused by the Iran conflict, IATA reported. Airlines are passing through cost increases to consumers worldwide.",mk:"IATA는 이란 분쟁으로 인한 연료비 상승과 공급 부족으로 항공료가 인상되고 있다고 보고했다. 항공사들은 비용 증가를 전 세계 소비자에게 전가하고 있다.",tg:["항공","연료비","IATA"],u:"https://saudigazette.com.sa/article/660150"},
  {id:134,p:5,r:"",t:"Riyadh University of Arts to open admission in May and classes in September",k:"리야드 예술대학, 5월 입학 시작·9월 개강",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi Minister of Culture announced Riyadh University of Arts will open admission in May with classes starting in September. The university will offer 8 academic programs across 4 colleges: Music, Film, Theater, and Cultural Management.",mk:"사우디 문화부 장관은 리야드 예술대학이 5월 입학을 시작해 9월 개강한다고 발표했다. 음악·영화·연극·문화경영 4개 단과대학에서 8개 학위 과정을 운영한다.",tg:["교육","문화","대학"],u:"https://saudigazette.com.sa/article/660134"},
  {id:135,p:6,r:"",t:"Heritage Commission completes coding of 4,000 architectural heritage sites",k:"문화유산위원회, 건축 유산 4000곳 코딩 완료",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi Heritage Commission completed coding of 4,000 architectural heritage sites across the Kingdom, advancing the documentation and protection of national cultural treasures.",mk:"사우디 문화유산위원회는 왕국 전역의 4000개 건축 유산 사이트에 대한 코딩을 완료해 국가 문화재의 문서화와 보호를 진전시켰다.",tg:["문화유산","건축","보존"],u:"https://saudigazette.com.sa/article/660133/saudi-arabia/heritage-commission-completes-coding-of-4000-architectural-heritage-sites"},
  {id:136,p:8,r:"헤드라인",t:"Saudi Arabia, Canada agree to deepen partnership",k:"사우디-캐나다, 파트너십 심화 합의",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi Foreign Minister Prince Faisal bin Farhan held wide-ranging talks with Canadian Foreign Minister Anita Anand in Riyadh, agreeing on the importance of deepening bilateral relations and enhancing comprehensive partnership between the two countries.",mk:"파이살 빈 파르한 사우디 외무장관이 리야드에서 아니타 아난드 캐나다 외무장관과 폭넓은 회담을 갖고 양국 관계 심화와 포괄적 파트너십 강화의 중요성에 합의했다.",tg:["외교","캐나다","파트너십"],u:"https://saudigazette.com.sa/article/660132"},
  {id:137,p:4,r:"",t:"NCM forecasts widespread rainfall across Kingdom until next Thursday",k:"NCM, 다음 주 목요일까지 전국적 강우 예보",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"The National Center of Meteorology forecast widespread rainfall across most regions of Saudi Arabia continuing until next Thursday, with potential thunderstorms in some areas.",mk:"국가기상센터는 일부 지역의 뇌우 가능성과 함께 사우디 대부분 지역에 다음 주 목요일까지 광범위한 강우가 지속될 것으로 예보했다.",tg:["기상","강우","예보"],u:"https://saudigazette.com.sa/article/660110"},
  {id:138,p:4,r:"",t:"Passports Directorate designates number 992 for inquiries regarding expired visas",k:"여권청, 비자 만료 문의 전용번호 992 지정",s:"Saudi Gazette",c:"saudi",d:"2026-04-08",m:"Saudi Passports Directorate (Jawazat) designated phone number 992 as the dedicated line for inquiries regarding expired visas, streamlining customer service for residents and visitors.",mk:"사우디 여권청(자와자트)은 만료된 비자 관련 문의를 위한 전용 전화번호로 992를 지정해 거주자와 방문객 대상 고객 서비스를 간소화했다.",tg:["이민","비자","행정"],u:"https://saudigazette.com.sa/article/660070/saudi-arabia/passports-directorate-designates-number-992-for-inquiries-regarding-expired-visas"},
  {id:139,p:7,r:"",t:"AlUla shortlisted for &apos;City of Film&apos; at 2026 Global Production Awards",k:"알울라, 2026 글로벌 프로덕션 어워드 &apos;영화도시&apos; 후보 선정",s:"Arab News",c:"saudi",d:"2026-04-08",m:"AlUla has been shortlisted for the &apos;City of Film&apos; category at the 2026 Global Production Awards, recognizing its growing role as a destination for international film productions and its rich cultural heritage.",mk:"알울라가 2026 글로벌 프로덕션 어워드 &apos;영화도시&apos; 부문 후보에 올라 국제 영화 제작의 목적지로서 성장하는 역할과 풍부한 문화유산을 인정받았다.",tg:["관광","영화","문화"],u:"https://www.arabnews.com/node/2639283/saudi-arabia"},
  {id:140,p:4,r:"",t:"Beautyworld Riyadh postponed until 2027",k:"뷰티월드 리야드 박람회, 2027년으로 연기",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Organizers announced Beautyworld Riyadh has been postponed until 2027 due to ongoing regional security concerns from the Iran conflict, joining a growing list of regional events being rescheduled.",mk:"주최측은 이란 분쟁으로 인한 지속적인 지역 안보 우려로 뷰티월드 리야드 박람회를 2027년으로 연기한다고 발표했다. 일정이 재조정되는 지역 행사 명단에 추가됐다.",tg:["행사","연기","분쟁영향"],u:"https://www.arabnews.com/node/2639203/lifestyle"},
  {id:141,p:9,r:"헤드라인",t:"Israel backs Trump&apos;s two-week pause on Iran strikes, says Lebanon excluded",k:"이스라엘, 트럼프 이란 2주 휴전 지지…레바논은 제외",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Israel announced support for President Trump&apos;s two-week pause on Iran strikes but specified that Lebanon is excluded from the truce, vowing to continue operations against Hezbollah.",mk:"이스라엘은 트럼프 대통령의 이란 공격 2주 중단을 지지한다고 밝혔으나 레바논은 휴전에서 제외된다고 명시하며 헤즈볼라에 대한 작전을 계속할 것이라고 다짐했다.",tg:["이스라엘","휴전","레바논"],u:"https://www.arabnews.com/node/2639170/middle-east"},
  {id:142,p:10,r:"헤드라인",t:"Saudi FM discusses regional situation with Pakistani, Bahraini counterparts",k:"사우디 외무장관, 파키스탄·바레인 외무장관과 지역 정세 논의",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Saudi Foreign Minister Prince Faisal bin Farhan discussed regional developments with Pakistan&apos;s Deputy PM/FM Ishaq Dar and Bahrain&apos;s FM Abdullatif bin Rashid Al-Zayani in separate phone calls early Wednesday, focusing on security implications of the Iran conflict.",mk:"파이살 빈 파르한 사우디 외무장관이 이샤크 다르 파키스탄 부총리 겸 외무장관, 압둘라티프 빈 라시드 알자야니 바레인 외무장관과 각각 통화를 갖고 이란 분쟁의 안보 영향을 중심으로 지역 정세를 논의했다.",tg:["외교","파키스탄","바레인"],u:"https://www.arabnews.com/node/2639158/saudi-arabia"},
  {id:143,p:9,r:"속보",t:"Gulf states knock down Iran barrage, 2 killed in Iraq",k:"걸프 국가들, 이란 미사일 공세 격추…이라크서 2명 사망",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Gulf countries shot down Iranian missiles and drones early Wednesday. Saudi Arabia&apos;s defense ministry announced interception of five ballistic missiles toward the Eastern Region. Two people were killed in Iraq when missile debris struck.",mk:"걸프 국가들이 수요일 새벽 이란 미사일과 드론을 격추했다. 사우디 국방부는 동부지역을 향한 탄도미사일 5기 요격을 발표했다. 이라크에서는 미사일 잔해로 2명이 사망했다.",tg:["걸프","방공","이라크"],u:"https://www.arabnews.com/node/2639143/middle-east"},
  {id:144,p:10,r:"헤드라인",t:"US, Israel and Iran agree to 2-week ceasefire as Trump seizes diplomatic offramp",k:"미·이·이란, 2주 휴전 합의…트럼프, 외교적 출구 활용",s:"Arab News",c:"saudi",d:"2026-04-08",m:"US President Donald Trump pulled back on threats to launch devastating strikes on Iran, agreeing to a two-week ceasefire subject to Tehran reopening the Strait of Hormuz. The deal was brokered with Pakistani mediation.",mk:"트럼프 대통령은 이란에 대한 파괴적인 공격 위협을 철회하고 테헤란이 호르무즈 해협 재개방을 조건으로 2주 휴전에 합의했다. 이 합의는 파키스탄의 중재로 성사됐다.",tg:["휴전","미국","이란"],u:"https://www.arabnews.com/node/2639123/middle-east"},
  {id:145,p:10,r:"헤드라인",t:"Saudi crown prince, Pakistan PM discuss regional tensions in phone call",k:"사우디 왕세자, 파키스탄 총리와 통화로 지역 긴장 논의",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Crown Prince Mohammed bin Salman and Pakistan PM discussed regional tensions in a phone call, with Pakistan playing a key mediation role in the US-Iran ceasefire negotiations.",mk:"무함마드 빈 살만 왕세자가 파키스탄 총리와 통화를 갖고 지역 긴장을 논의했다. 파키스탄은 미국-이란 휴전 협상에서 핵심 중재 역할을 하고 있다.",tg:["외교","파키스탄","중재"],u:"https://www.arabnews.com/node/2639120/saudi-arabia"},
  {id:146,p:8,r:"주요경제",t:"Saudi commercial registrations reach 1.89m as 71k new businesses launch in Q1",k:"사우디 상업등록 189만 건 돌파…1분기 신규 7만1천 건",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Commercial registrations in Saudi Arabia reached approximately 1.89 million by end of Q1 2026, with 71,000 new enrollments. Women accounted for 47% of newly issued registrations. Riyadh, Makkah, and Eastern Province led regional activity.",mk:"사우디 상업등록은 2026년 1분기 말 약 189만 건에 이르렀고 신규 등록 7만 1000건이 추가됐다. 신규 발급 중 여성 비율은 47%였다. 리야드, 메카, 동부주가 지역 활동을 주도했다.",tg:["경제","창업","여성"],u:"https://www.arabnews.com/node/2639107/business-economy"},
  {id:147,p:6,r:"주요경제",t:"Closing Bell: Saudi equities close lower on Tuesday",k:"사우디 증시 화요일 하락 마감",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Saudi equity markets closed lower on Tuesday amid continued geopolitical tensions from the Iran conflict, with TASI showing increased volatility.",mk:"사우디 증시는 이란 분쟁으로 인한 지정학적 긴장 지속 속에 화요일 하락 마감했으며 TASI 지수는 변동성이 확대됐다.",tg:["증시","TASI","금융"],u:"https://www.arabnews.com/node/2639102/business-economy"},
  {id:148,p:8,r:"",t:"Saudi Arabia condemns Israeli Minister&apos;s Al Aqsa visit, urges international action",k:"사우디, 이스라엘 장관 알아크사 방문 규탄…국제사회 행동 촉구",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Saudi Foreign Ministry strongly condemned the storming of Al Aqsa Mosque&apos;s courtyards by an Israeli minister, calling it a &quot;provocative&quot; act under Israeli forces&apos; protection and urging international community action.",mk:"사우디 외교부는 이스라엘 장관의 알아크사 모스크 안뜰 진입을 강력 규탄하며 이스라엘군 보호 하의 &apos;도발적&apos; 행위로 규정하고 국제사회의 행동을 촉구했다.",tg:["외교","알아크사","이스라엘"],u:"https://www.arabnews.com/node/2639080/saudi-arabia"},
  {id:149,p:9,r:"심층분석",t:"How does Saudi Arabia maintain price stability despite the war?",k:"사우디는 전쟁 속에서도 어떻게 물가 안정을 유지하나",s:"Arab News",c:"saudi",d:"2026-04-08",m:"In-depth analysis of how retail activity in Saudi Arabia remains steady, with the Kingdom avoiding sharp price increases and supply disruptions seen in other countries during the Iran war. Strategic reserves, diversified supply chains, and regulatory measures explained.",mk:"이란 전쟁 중 사우디아라비아의 소매 활동이 어떻게 안정을 유지하고 있는지 심층 분석. 다른 국가에서 나타난 급격한 물가 상승과 공급 차질을 어떻게 회피했는지 전략 비축, 다변화된 공급망, 규제 조치를 설명한다.",tg:["경제","물가","공급망"],u:"https://www.arabnews.com/node/2639064/business-economy"},
  {id:150,p:8,r:"심층분석",t:"Saudi real estate sector offering $6.3bn opportunities to global investors: Knight Frank",k:"나이트 프랭크: 사우디 부동산 부문, 글로벌 투자자에 63억 달러 기회",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Saudi Arabia is poised to draw $6.3 billion in private international capital into its property sector once geopolitical conflict stabilizes, driven by population growth, business expansion, inward migration, and rising consumer confidence, according to Knight Frank.",mk:"나이트 프랭크에 따르면 사우디는 지정학적 분쟁 안정화 시 인구 증가, 비즈니스 확장, 이민 유입, 소비자 신뢰 상승 등에 힘입어 부동산 부문에 63억 달러의 민간 국제 자본을 유치할 전망이다.",tg:["부동산","투자","경제"],u:"https://www.arabnews.com/node/2639055/business-economy"},
  {id:151,p:9,r:"심층분석",t:"Saudi Arabia succeeded in redirecting its oil exports: IMF",k:"IMF: 사우디, 석유 수출 재방향 조정 성공",s:"Arab News",c:"saudi",d:"2026-04-08",m:"IMF reported that Saudi Arabia has successfully redirected its oil exports amid Strait of Hormuz disruptions, leveraging the East-West pipeline and alternative routes to maintain export flows during the Iran conflict.",mk:"IMF는 사우디가 호르무즈 해협 차질 속에서 동서 파이프라인과 대체 경로를 활용해 이란 분쟁 중에도 수출 흐름을 유지하며 석유 수출 방향을 성공적으로 재조정했다고 보고했다.",tg:["석유","IMF","파이프라인"],u:"https://www.arabnews.com/node/2639020/business-economy"},
  {id:152,p:5,r:"",t:"Ronaldo faces defining run-in as Al-Nassr eye Saudi Pro League title",k:"호날두, 알나스르 우승 도전 &apos;결정적 경기&apos; 직면",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Cristiano Ronaldo and Al-Nassr face a defining run-in to the Saudi Pro League title race, with critical matches ahead in the championship pursuit.",mk:"크리스티아누 호날두와 알나스르가 사우디 프로리그 우승 경쟁에서 결정적인 경기들을 앞두고 있다.",tg:["스포츠","축구","호날두"],u:"https://www.arabnews.com/node/2638971/sport"},
  {id:153,p:5,r:"",t:"Yanbu Flower Festival attracts tourists",k:"얀부 꽃 축제, 관광객 유치",s:"Arab News",c:"saudi",d:"2026-04-08",m:"The Yanbu Flower Festival has attracted tourists from across Saudi Arabia and beyond, showcasing diverse floral displays and supporting local tourism in the western region.",mk:"얀부 꽃 축제가 사우디 전역과 해외에서 관광객을 유치하며 다양한 꽃 전시를 선보이고 서부 지역의 관광 산업을 지원하고 있다.",tg:["관광","문화","지역"],u:"https://www.arabnews.com/node/2638881/saudi-arabia"},
  {id:154,p:9,r:"헤드라인",t:"Saudi Arabia launches locally developed Shams satellite",k:"사우디, 자국 개발 &apos;샴스&apos; 위성 발사",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Saudi Space Agency announced successful launch and initial communication with the Saudi Shams satellite, deployed aboard the Space Launch System as part of the Artemis II mission. Saudi Arabia becomes the first Arab nation to participate in a space mission under the Artemis program.",mk:"사우디 우주청은 아르테미스 II 미션의 일환으로 우주 발사 시스템에 탑재된 사우디 샴스 위성의 성공적 발사와 초기 교신을 발표했다. 사우디아라비아는 아르테미스 프로그램 우주 미션에 참여한 최초의 아랍 국가가 됐다.",tg:["우주","과학기술","아르테미스"],u:"https://www.arabnews.com/node/2638870/saudi-arabia"},
  {id:155,p:6,r:"",t:"AI and the media: Experts to discuss challenges, opportunities in Riyadh",k:"AI와 미디어: 리야드서 전문가들 도전·기회 논의",s:"Arab News",c:"saudi",d:"2026-04-08",m:"A conference in Riyadh on artificial intelligence in the media industry, organized by the Saudi Association for Media and Communication, will bring together experts to discuss AI&apos;s impact on journalism and content creation.",mk:"사우디 미디어·커뮤니케이션 협회가 주최하는 미디어 산업에서의 인공지능에 관한 컨퍼런스가 리야드에서 열려 전문가들이 AI가 저널리즘과 콘텐츠 제작에 미치는 영향을 논의한다.",tg:["AI","미디어","컨퍼런스"],u:"https://www.arabnews.com/node/2638869/saudi-arabia"},
  {id:156,p:5,r:"",t:"Thousands begin phase 2 of science, mathematics Olympiad",k:"수천 명, 과학·수학 올림피아드 2단계 시작",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Thousands of Saudi students began phase 2 of the national science and mathematics olympiad, advancing the Kingdom&apos;s STEM education priorities under Vision 2030.",mk:"수천 명의 사우디 학생들이 국가 과학·수학 올림피아드 2단계를 시작해 비전 2030 하의 STEM 교육 우선순위를 진전시켰다.",tg:["교육","STEM","올림피아드"],u:"https://www.arabnews.com/node/2638751/saudi-arabia"},
  {id:157,p:8,r:"심층분석",t:"Preparing for the post-Iran war era",k:"포스트 이란 전쟁 시대 대비",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Opinion analysis on how Gulf states and the international community should prepare for the post-Iran war era, examining reconstruction, regional security frameworks, and diplomatic realignment.",mk:"걸프 국가들과 국제사회가 포스트 이란 전쟁 시대를 어떻게 대비해야 하는지에 관한 의견 분석. 재건, 지역 안보 프레임워크, 외교적 재편을 검토한다.",tg:["분석","전후","외교"],u:"https://www.arabnews.com/node/2638540/amp"},
  {id:158,p:7,r:"주요경제",t:"TotalEnergies and Masdar form $2.2bn Asian renewable energy JV",k:"토탈에너지·마스다르, 22억 달러 아시아 재생에너지 합작사 설립",s:"Arab News",c:"saudi",d:"2026-04-08",m:"TotalEnergies and UAE&apos;s Masdar formed a $2.2 billion joint venture targeting renewable energy projects across Asia, marking a major Gulf push into green energy investment despite ongoing oil market volatility.",mk:"토탈에너지와 UAE 마스다르가 아시아 전역의 재생에너지 프로젝트를 겨냥한 22억 달러 규모 합작사를 설립했다. 지속적인 석유 시장 변동성에도 걸프 지역의 녹색 에너지 투자 확대를 상징한다.",tg:["재생에너지","투자","마스다르"],u:"https://www.arabnews.com/node/2638528/business-economy"},
  {id:159,p:6,r:"주요경제",t:"Closing Bell: Saudi main market gains 26 points to close at 11,275",k:"사우디 본시장 26포인트 상승 11,275로 마감",s:"Arab News",c:"saudi",d:"2026-04-08",m:"Saudi Arabia&apos;s benchmark TASI index closed up 26 points at 11,275, signaling cautious optimism amid Iran ceasefire developments. Trading volume remained moderate.",mk:"사우디 벤치마크 TASI 지수는 26포인트 상승한 11,275로 마감하며 이란 휴전 진전 속 신중한 낙관론을 시사했다. 거래량은 중간 수준을 유지했다.",tg:["증시","TASI","금융"],u:"https://www.arabnews.com/node/2638439/business-economy"},
  {id:160,p:8,r:"정책발표",t:"HRH the Crown Prince Chairs Cabinet Session",k:"왕세자, 내각 회의 주재",s:"SPA",c:"saudi",d:"2026-04-08",m:"Crown Prince Mohammed bin Salman chaired the weekly Cabinet session, reviewing latest regional developments, the Iran ceasefire status, economic measures, and government initiatives. Cabinet approved several decisions on infrastructure and social development.",mk:"무함마드 빈 살만 왕세자는 주례 내각 회의를 주재해 최근 지역 정세, 이란 휴전 현황, 경제 조치, 정부 이니셔티브를 검토했다. 내각은 인프라 및 사회 개발에 관한 여러 결정을 승인했다.",tg:["내각","왕실","정책"],u:"https://www.spa.gov.sa/en/N2527847"},
  {id:161,p:7,r:"",t:"Saudi Arabia Advances Global Environmental Leadership with IUCN Green List Milestone",k:"사우디, IUCN 그린 리스트 달성으로 글로벌 환경 리더십 진전",s:"SPA",c:"saudi",d:"2026-04-08",m:"Saudi Arabia achieved a milestone in global environmental leadership with the IUCN Green List recognition, advancing its commitment to protected area management and biodiversity conservation under Vision 2030 environmental goals.",mk:"사우디아라비아는 IUCN 그린 리스트 인증을 달성하며 비전 2030 환경 목표 하의 보호구역 관리 및 생물다양성 보존에 대한 약속을 진전시켜 글로벌 환경 리더십에서 이정표를 세웠다.",tg:["환경","보호구역","IUCN"],u:"https://spa.gov.sa/en/N2553904"},
  {id:162,p:10,r:"헤드라인",t:"US Navy begins blockade of Strait of Hormuz, halting all ship traffic near Iranian ports",k:"미 해군, 호르무즈 해협 봉쇄 개시…이란 항구 인근 모든 선박 통행 차단",s:"Gulf News",c:"me",d:"2026-04-13",m:"Trump ordered the US Navy to blockade the Strait of Hormuz starting April 13 at 6pm GST, interdicting any vessel that paid Iran tolls. Oil prices surged over 8% with Brent crude hitting $102.7 and WTI at $104.8 per barrel.",mk:"트럼프 대통령, 4월 13일 걸프 표준시 오후 6시부터 호르무즈 해협 봉쇄 명령. 이란에 통행료를 지불한 모든 선박 차단. 유가 8% 이상 급등, 브렌트유 $102.7, WTI $104.8 기록.",tg:["호르무즈","봉쇄","유가","미국"],u:"https://gulfnews.com/world/mena/us-iran-ceasefire-us-moves-to-blockade-iranian-ports-as-strait-of-hormuz-traffic-halts-oil-prices-surge-1.500504821"},
  {id:163,p:10,r:"속보",t:"Saudi Arabia restores East-West pipeline to full capacity after Iranian attacks",k:"사우디, 이란 공격 이후 동-서 파이프라인 완전 복구",s:"Arab News",c:"saudi",d:"2026-04-12",m:"Saudi Energy Ministry announced full restoration of the East-West pipeline pumping capacity, recovering 700,000 bpd lost to Iranian strikes. Manifa field restored 300,000 bpd, while Khurais oilfield repairs continue.",mk:"사우디 에너지부, 이란 공격으로 손실된 일산 70만 배럴 동-서 파이프라인 완전 복구 발표. 마니파 유전 30만 bpd 복구 완료, 쿠라이스 유전 복구 작업 진행 중.",tg:["파이프라인","에너지","복구","Aramco"],u:"https://www.aljazeera.com/economy/2026/4/12/saudi-arabia-says-key-oil-pipeline-back-to-full-capacity-after-attacks"},
  {id:164,p:10,r:"헤드라인",t:"Pakistan sends fighter jets and 13,000 troops to Saudi Arabia under defense pact",k:"파키스탄, 방위협정에 따라 전투기·1만3천 병력 사우디 배치",s:"Saudi Gazette",c:"saudi",d:"2026-04-11",m:"Pakistani military force including fighter jets and support aircraft arrived at King Abdulaziz Air Base in Dhahran, Saudi Arabia, as part of a strategic defense pact between the two countries amid the fragile US-Iran ceasefire.",mk:"파키스탄 전투기와 지원 항공기가 미-이란 휴전 속 양국 전략적 방위협정에 따라 사우디 다란 소재 킹 압둘아지즈 공군기지에 도착. 지상군 1만3천명 배치.",tg:["파키스탄","방위협정","군사","다란"],u:"https://saudigazette.com.sa/article/660444/saudi-arabia/pakistani-military-force-arrives-in-saudi-arabia-as-part-of-defense-pact"},
  {id:165,p:9,r:"헤드라인",t:"US-Iran ceasefire talks collapse in Islamabad as Vance fails to reach deal",k:"이슬라마바드 미-이란 휴전 협상 결렬…밴스 부통령 합의 실패",s:"Al Jazeera",c:"me",d:"2026-04-12",m:"JD Vance announced that US-Iran talks in Islamabad had failed after a day of negotiations. Trump subsequently declared he no longer cared about negotiations with Iran and ordered the Hormuz blockade.",mk:"밴스 부통령, 이슬라마바드에서 하루간의 협상 끝에 미-이란 회담 결렬 발표. 트럼프 대통령은 이후 이란과의 협상에 더 이상 관심 없다고 선언하고 호르무즈 봉쇄 명령.",tg:["미국","이란","휴전","협상결렬"],u:"https://www.aljazeera.com/news/2026/4/13/iran-war-what-is-happening-on-day-45-of-the-us-iran-conflict"},
  {id:166,p:9,r:"정책발표",t:"SDAIA joins Global Privacy Assembly to boost international data protection efforts",k:"SDAIA, 글로벌 프라이버시 어셈블리 가입…국제 데이터 보호 강화",s:"SPA",c:"saudi",d:"2026-04-10",m:"Saudi Data and Artificial Intelligence Authority (SDAIA) joined the Global Privacy Assembly, marking the Kingdom&apos;s commitment to international personal data protection standards under Vision 2030.",mk:"사우디 데이터·인공지능청(SDAIA), 글로벌 프라이버시 어셈블리에 가입. 비전2030 하에 국제 개인정보보호 기준에 대한 왕국의 의지를 재확인.",tg:["SDAIA","데이터보호","AI","비전2030"],u:"https://www.spa.gov.sa/en/N2557077"},
  {id:167,p:9,r:"헤드라인",t:"Saudi Global Ports trials East-West multimodal route linking Gulf to Red Sea ports",k:"사우디 글로벌 포트, 걸프-홍해 연결 동-서 복합운송 노선 시범운영",s:"Saudi Gazette",c:"saudi",d:"2026-04-13",m:"Saudi Global Ports successfully tested multimodal logistics integrating rail and road transport from King Abdulaziz Port and Jubail Commercial Port to Jeddah Islamic Port and King Abdullah Port.",mk:"사우디 글로벌 포트, 킹 압둘아지즈항·주바일 상업항에서 젯다 이슬라믹항·킹 압둘라항까지 철도·도로 통합 복합물류 시험 성공.",tg:["물류","항만","복합운송","인프라"],u:"https://saudigazette.com.sa/article/660504/saudi-arabia/saudi-global-ports-trials-eastwest-multimodal-route-linking-gulf-to-red-sea-ports"},
  {id:168,p:8,r:"주요경제",t:"Saudi Arabia records highest visitor spending at SR160 billion in 2025",k:"사우디, 2025년 외국인 관광객 지출 역대 최고 1,600억 리얄 기록",s:"Saudi Gazette",c:"saudi",d:"2026-04-12",m:"Saudi Arabia strengthened its standing as a global tourism destination in 2025, recording the highest annual total spending by international visitors at SR159.9 billion.",mk:"사우디아라비아, 2025년 국제 관광객 연간 총 지출 1,599억 리얄로 역대 최고 기록. 글로벌 관광 목적지로서 위상 강화.",tg:["관광","비전2030","경제","관광지출"],u:"https://saudigazette.com.sa/article/660451/saudi-arabia/saudi-arabia-records-highest-visitor-spending-at-sr160-billion-in-2025"},
  {id:169,p:9,r:"속보",t:"Attacks on Saudi energy sites kill one, disrupt pipeline by 700,000 bpd",k:"사우디 에너지 시설 공격으로 1명 사망, 파이프라인 70만 bpd 차질",s:"Saudi Gazette",c:"saudi",d:"2026-04-10",m:"Iranian strikes on Saudi energy infrastructure killed a Saudi citizen working in industrial security and injured seven others. The attacks disrupted the East-West pipeline by 700,000 bpd and cut 600,000 bpd of output.",mk:"이란의 사우디 에너지 인프라 공격으로 산업보안 근무 사우디 시민 1명 사망, 7명 부상. 동-서 파이프라인 70만 bpd 차질, 산유량 60만 bpd 감소.",tg:["에너지","공격","파이프라인","이란"],u:"https://saudigazette.com.sa/article/660414/saudi-arabia/attacks-on-saudi-energy-sites-kill-one-disrupt-east-west-pipeline-by-700000-bpd-cut-600000-bpd-output"},
  {id:170,p:8,r:"심층분석",t:"Saudi and Iranian foreign ministers discuss developments after Iran-US talks in Islamabad",k:"사우디-이란 외무장관, 이슬라마바드 미-이란 회담 이후 상황 논의",s:"Arab News",c:"saudi",d:"2026-04-13",m:"Saudi and Iranian foreign ministers held discussions on the latest regional developments following the Iran-US talks in Islamabad on April 13, amid rising tensions over the Hormuz blockade.",mk:"사우디-이란 외무장관, 4월 13일 이슬라마바드 미-이란 회담 이후 최신 지역 정세 논의. 호르무즈 봉쇄를 둘러싼 긴장 고조 속 대화 진행.",tg:["외교","이란","사우디","호르무즈"],u:"https://www.arabnews.com/saudiarabia"},
  {id:171,p:9,r:"정책발표",t:"Saudi Arabia reaffirms Gulf coordination to support tourism stability at GCC meeting",k:"사우디, GCC 회의서 관광 안정성 위한 걸프 공조 재확인",s:"SPA",c:"saudi",d:"2026-04-10",m:"Saudi Arabia participated in an extraordinary virtual meeting of GCC tourism ministers to discuss the impact of current regional developments on the tourism sector and coordinate a unified Gulf response.",mk:"사우디, GCC 관광장관 긴급 화상회의 참석. 현 지역 정세가 관광 부문에 미치는 영향 논의 및 걸프 통합 대응 방안 조율.",tg:["GCC","관광","협력","정책"],u:"https://spa.gov.sa/en/N2555035"},
  {id:172,p:7,r:"심층분석",t:"Heavy rainfall expected in several regions of Saudi Arabia",k:"사우디 여러 지역에 폭우 예보",s:"SPA",c:"saudi",d:"2026-04-13",m:"Saudi weather authorities warned of heavy rainfall affecting several regions on April 13-14, with potential for flash floods in valleys, accompanied by hail and strong winds.",mk:"사우디 기상당국, 4월 13-14일 여러 지역에 폭우 경보. 계곡 돌발홍수 가능성, 우박과 강풍 동반 전망.",tg:["날씨","폭우","경보"],u:"https://spa.gov.sa/en/N2558724"},
  {id:173,p:8,r:"주요경제",t:"Riyad Capital sees Saudi economy up 4.3% in 2026 with oil sector growing 6.2%",k:"리야드캐피털, 2026년 사우디 경제성장률 4.3% 전망…석유부문 6.2% 성장",s:"Argaam",c:"saudi",d:"2026-04-11",m:"Riyad Capital projects Saudi GDP growth at 4.3% in 2026, with the oil sector expanding 6.2%. Fiscal deficit expected to narrow to 4.3% of GDP from 5.9% in 2025.",mk:"리야드캐피털, 2026년 사우디 GDP 성장률 4.3% 전망. 석유부문 6.2% 성장 예상. 재정적자 GDP 대비 5.9%(2025)에서 4.3%로 축소 전망.",tg:["GDP","경제전망","석유","재정"],u:"https://www.argaam.com/en/article/articledetail/id/1883272"},
  {id:174,p:9,r:"주요경제",t:"IMF raises Saudi economic growth forecast to 4.5% for 2026",k:"IMF, 사우디 2026년 경제성장률 전망 4.5%로 상향",s:"Argaam",c:"saudi",d:"2026-04-10",m:"The International Monetary Fund upgraded its forecast for Saudi Arabia&apos;s economic growth to 4.5% for 2026, citing strong non-oil sector performance and Vision 2030 reforms.",mk:"국제통화기금(IMF), 비석유부문 호조와 비전2030 개혁을 근거로 사우디 2026년 경제성장률 전망을 4.5%로 상향 조정.",tg:["IMF","GDP","경제전망","비전2030"],u:"https://www.argaam.com/en/article/articledetail/id/1873668"},
  {id:175,p:10,r:"속보",t:"Israel launches fresh strikes on Lebanon further straining Iran ceasefire",k:"이스라엘, 레바논 추가 공습…이란 휴전 더욱 위태",s:"Saudi Gazette",c:"me",d:"2026-04-10",m:"Israel bombed more targets in Lebanon on Thursday, putting the Middle East ceasefire in further jeopardy as international backlash mounted after hundreds of casualties in massive strikes.",mk:"이스라엘, 목요일 레바논에 추가 공습 감행. 대규모 공습으로 수백 명 사상자 발생 후 국제적 반발이 거세지며 중동 휴전이 더욱 위태로워짐.",tg:["이스라엘","레바논","휴전","공습"],u:"https://saudigazette.com.sa/article/660390/world/israel-launches-fresh-strikes-on-lebanon-further-straining-iran-ceasefire"},
  {id:176,p:8,r:"심층분석",t:"The 2026 Gulf War and its implications for energy markets and the region",k:"2026 걸프전이 에너지 시장과 지역에 미치는 영향",s:"Reuters",c:"global",d:"2026-04-10",m:"Analysis of how the 2026 Gulf conflict has interrupted an estimated 12 million b/d of crude through Hormuz, equivalent to 12% of global supply, reshaping energy geopolitics.",mk:"2026 걸프 분쟁이 호르무즈 해협을 통한 일산 약 1,200만 배럴(글로벌 공급의 12%)의 원유 흐름을 차단하며 에너지 지정학을 재편하고 있다는 분석.",tg:["에너지","호르무즈","원유","지정학"],u:"https://www.mees.com/2026/4/10/op-ed-documents/the-2026-gulf-war-and-its-implications-for-energy-markets-and-the-region/0e984dd0-34e7-11f1-bda6-b57c4acee224"},
  {id:177,p:9,r:"헤드라인",t:"Pakistan brokers US-Iran ceasefire: How Islamabad managed diplomatic breakthrough",k:"파키스탄, 미-이란 휴전 중재: 이슬라마바드의 외교적 돌파구",s:"Al Jazeera",c:"me",d:"2026-04-10",m:"Detailed analysis of how Pakistan managed to bring the US and Iran to a two-week ceasefire agreement starting April 8, leveraging its unique relationships with both sides.",mk:"파키스탄이 양측과의 독특한 관계를 활용하여 4월 8일 시작된 미-이란 2주 휴전 합의를 어떻게 이끌어냈는지에 대한 심층 분석.",tg:["파키스탄","외교","휴전","중재"],u:"https://www.aljazeera.com/features/2026/4/8/how-pakistan-managed-to-get-the-us-and-iran-to-a-ceasefire"},
  {id:178,p:8,r:"심층분석",t:"Iran threatens Bab al-Mandeb closure: How would that affect world trade?",k:"이란, 바브알만데브 해협 폐쇄 위협: 세계 무역에 미치는 영향은?",s:"Al Jazeera",c:"me",d:"2026-04-10",m:"Analysis of Iran&apos;s threat to close the Bab al-Mandeb strait in addition to Hormuz, which would affect global shipping routes and further disrupt oil and LNG supplies.",mk:"이란의 호르무즈에 더해 바브알만데브 해협 폐쇄 위협 분석. 글로벌 해운 노선에 영향을 미치고 원유·LNG 공급을 추가로 교란할 가능성.",tg:["바브알만데브","해운","이란","무역"],u:"https://www.aljazeera.com/news/2026/4/6/iran-threatens-bab-al-mandeb-closure-how-would-that-affect-world-trade"},
  {id:179,p:8,r:"심층분석",t:"UN Security Council to hold first-ever briefing on UN-GCC cooperation",k:"유엔 안보리, 유엔-GCC 협력 관련 최초 브리핑 개최",s:"Reuters",c:"gulf",d:"2026-04-13",m:"The UN Security Council is expected to hold a high-level briefing on GCC cooperation under Bahrain&apos;s April presidency, marking the first Council meeting focused on UN-GCC partnership.",mk:"유엔 안보리, 바레인의 4월 의장국 주도 하에 GCC 협력에 관한 고위급 브리핑 예정. 유엔-GCC 파트너십에 초점을 맞춘 최초의 안보리 회의.",tg:["유엔","GCC","안보리","바레인"],u:"https://www.securitycouncilreport.org/monthly-forecast/2026-04/un-gcc-cooperation.php"},
  {id:180,p:8,r:"심층분석",t:"Vice Foreign Minister receives Chinese Ambassador to Saudi Arabia",k:"사우디 외무차관, 주사우디 중국 대사 접견",s:"SPA",c:"saudi",d:"2026-04-10",m:"Saudi Vice Minister of Foreign Affairs received the Chinese Ambassador in Riyadh, reflecting ongoing strategic partnership between Saudi Arabia and China amid regional tensions.",mk:"사우디 외무차관, 리야드에서 중국 대사 접견. 지역 긴장 속에서 사우디-중국 전략적 파트너십 지속 반영.",tg:["외교","중국","사우디","파트너십"],u:"https://spa.gov.sa/en/N2553526"},
  {id:181,p:9,r:"헤드라인",t:"Hormuz blockade threatens Korean semiconductor supply chain via Qatar helium disruption",k:"호르무즈 봉쇄, 카타르 헬륨 공급 차단으로 한국 반도체 공급망 위협",s:"글로벌이코노믹",c:"korean-view",d:"2026-04-14",m:"Korea&apos;s semiconductor giants Samsung and SK Hynix face cooling process disruptions as Qatar helium supplies are cut off by the Hormuz blockade. Korea imports 70.7% of crude and 20.4% of LNG from the Middle East.",mk:"호르무즈 봉쇄로 카타르산 헬륨 공급 차단 시 삼성전자·SK하이닉스 반도체 생산라인 냉각 공정 차질 불가피. 한국은 원유 70.7%, LNG 20.4%를 중동에서 수입.",tg:["반도체","헬륨","호르무즈","삼성전자"],u:"https://www.g-enews.com/article/Global-Biz/2026/04/202604140540598983fbbec65dfb_1"},
  {id:182,p:9,r:"속보",t:"US-Iran maritime blockade triggers emergency in Korean industry: 3rd oil shock fears",k:"미-이란 해상봉쇄에 한국 산업계 비상…제3차 오일쇼크 공포 현실화",s:"이코노믹스",c:"korean-view",d:"2026-04-14",m:"Korean industries face compound crisis from the US-Iran maritime blockade: surging oil prices, supply chain disruptions, and logistics cost spikes threatening export competitiveness.",mk:"미-이란 해상봉쇄로 한국 산업계 복합 위기 직면: 유가 급등, 공급망 교란, 물류비 폭등으로 수출 경쟁력 약화 우려.",tg:["오일쇼크","한국경제","물류","수출"],u:"https://econmingle.com/economy/us-iran-maritime-blockade-korean-industry/"},
  {id:183,p:8,r:"심층분석",t:"KDI analyzes economic impact of Hormuz risk escalation on Korean economy",k:"KDI, 호르무즈 리스크 확대에 따른 한국경제 충격 진단",s:"KDI",c:"korean-view",d:"2026-04-13",m:"Korea Development Institute published analysis on the compound impact of Hormuz disruption on Korean economy, including energy supply, semiconductor production, and export logistics.",mk:"한국개발연구원(KDI), 호르무즈 해협 교란이 한국 경제에 미치는 복합 충격 진단 보고서 발표. 에너지 수급, 반도체 생산, 수출 물류 등 분석.",tg:["KDI","경제분석","호르무즈","에너지"],u:"https://eiec.kdi.re.kr/policy/domesticView.do?ac=0000204293"},
  {id:184,p:8,r:"주요경제",t:"US Hormuz counter-blockade raises dual risk of energy supply deterioration and demand contraction",k:"美 호르무즈 역봉쇄, 에너지 수급 악화·수요 위축 복합 충격 우려",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-14",m:"Financial News analysis warns that US counter-blockade of Hormuz creates dual shock: energy supply disruption pushing oil above $100, combined with global demand contraction fears.",mk:"파이낸셜뉴스 분석, 미국의 호르무즈 역봉쇄가 유가 $100 돌파 에너지 수급 악화와 글로벌 수요 위축이라는 이중 충격을 야기한다고 경고.",tg:["유가","에너지","봉쇄","경제위기"],u:"https://www.fnnews.com/news/202604140615599338"},
  {id:185,p:7,r:"심층분석",t:"Saudi-UAE shift to hardline stance: open military bases to US, freeze Iranian assets",k:"사우디·UAE 강경대응 선회…美에 군사기지 개방·이란자산 동결",s:"다음뉴스",c:"korean-view",d:"2026-04-12",m:"Korean media reports that Saudi Arabia and UAE have shifted to a hardline response, opening military bases to the US and freezing Iranian assets as regional tensions escalate.",mk:"사우디·UAE가 강경 대응으로 선회, 미국에 군사기지를 개방하고 이란 자산을 동결. 지역 긴장 고조에 따른 정책 전환.",tg:["사우디","UAE","군사","이란"],u:"https://v.daum.net/v/Wkug12Lx5A"},
  {id:186,p:9,r:"속보",t:"Bloomberg: Pakistan sends military force to Saudi Arabia as part of defense pact",k:"블룸버그: 파키스탄, 방위협정에 따라 사우디에 군사력 파견",s:"Bloomberg",c:"global",d:"2026-04-11",m:"Bloomberg reports on Pakistan deploying military personnel and fighter jets to Saudi Arabia under a bilateral defense agreement amid the fragile US-Iran ceasefire period.",mk:"블룸버그, 미-이란 휴전 기간 양자 방위협정에 따라 파키스탄이 사우디에 군 병력과 전투기를 배치했다고 보도.",tg:["파키스탄","사우디","군사","블룸버그"],u:"https://www.bloomberg.com/news/articles/2026-04-11/pakistan-sends-military-force-to-saudi-arabia-as-part-of-pact"},
  {id:187,p:7,r:"심층분석",t:"Red Crescent in Riyadh raises readiness amid rainy conditions",k:"리야드 적신월사, 우기 대비 대응태세 강화",s:"SPA",c:"saudi",d:"2026-04-12",m:"Saudi Red Crescent Authority in Riyadh raised its readiness level to respond to rainy conditions and weather fluctuations affecting the region.",mk:"리야드 지역 사우디 적신월사, 지역에 영향을 미치는 우기 및 기상 변동에 대비해 대응태세 강화.",tg:["적신월","날씨","리야드","대비"],u:"https://www.spa.gov.sa/en/N2557687"},
  {id:188,p:8,r:"심층분석",t:"Day 45 of Middle East conflict: US Navy starts blockade on Iranian ports",k:"중동 분쟁 45일차: 미 해군, 이란 항구 봉쇄 개시",s:"CNN",c:"global",d:"2026-04-13",m:"CNN&apos;s live coverage of Day 45 of the US-Iran conflict as the US Navy initiates a blockade of Iranian ports following the collapse of ceasefire negotiations in Islamabad.",mk:"CNN 실시간 보도, 미-이란 분쟁 45일차. 이슬라마바드 휴전 협상 결렬 이후 미 해군이 이란 항구 봉쇄를 개시.",tg:["미국","이란","봉쇄","CNN"],u:"https://edition.cnn.com/2026/04/13/world/live-news/iran-us-war-trump-hormuz"},

  {id:190,p:8,r:"주요경제",t:"Oil prices surge past $100 as Hormuz blockade disrupts 12mn bpd of crude flow",k:"호르무즈 봉쇄로 일산 1,200만 배럴 차질…유가 $100 돌파",s:"Al Arabiya",c:"me",d:"2026-04-13",m:"Brent crude hit $102.7 and WTI reached $104.8 as the US Navy blockade of Hormuz disrupted approximately 12 million barrels per day of crude oil flow, about 12% of global supply.",mk:"미 해군 호르무즈 봉쇄로 일산 약 1,200만 배럴(글로벌 공급의 12%) 원유 흐름 차질. 브렌트유 $102.7, WTI $104.8 돌파.",tg:["유가","호르무즈","원유","급등"],u:"https://english.alarabiya.net/News/saudi-arabia"},
  {id:191,p:7,r:"심층분석",t:"US-Iran negotiation collapse and Middle East tension impact Korean economy",k:"미-이란 협상 결렬, 중동 긴장 고조와 한국 경제 영향 우려",s:"전국인력신문",c:"korean-view",d:"2026-04-13",m:"Korean media analysis on the economic impact of the US-Iran negotiation collapse, including rising oil prices, supply chain risks, and potential disruption to Korean exports.",mk:"미-이란 협상 결렬에 따른 경제적 영향 분석. 유가 상승, 공급망 리스크, 한국 수출 차질 가능성 등 종합 진단.",tg:["한국경제","미이란","유가","수출"],u:"https://www.kjob.news/news/480615"},
  {id:192,p:10,r:"속보",t:"OPEC output suffers record plunge as Iran war throttles exports",k:"OPEC 산유량 역대 최대 급감…이란 전쟁으로 수출 마비",s:"Bloomberg",c:"global",d:"2026-04-13",m:"OPEC production plunged 27% month-over-month from 28.7M bpd to 20.8M bpd, the steepest drop since the 1980s. Saudi output fell 23% from 10.1M to 7.8M bpd, Iraq collapsed 61%.",mk:"OPEC 산유량 전월 대비 27% 급감(2,870만→2,080만 bpd), 1980년대 이후 최대 하락폭. 사우디 23% 감소(1,010만→780만 bpd), 이라크 61% 폭락.",tg:["OPEC","산유량","이란전쟁","급감"],u:"https://www.bloomberg.com/news/articles/2026-04-13/opec-output-suffers-record-plunge-as-iran-war-throttles-exports"},
  {id:193,p:9,r:"주요경제",t:"Saudi oil exports to China set to halve as Hormuz crisis lifts prices",k:"호르무즈 위기로 사우디 대중국 원유 수출 절반 감소 전망",s:"Bloomberg",c:"global",d:"2026-04-13",m:"Saudi crude sales to China are projected to halve from roughly 40M barrels in April to around 20M barrels in May as Middle East war disrupts flows through the Strait of Hormuz.",mk:"중동 전쟁으로 호르무즈 해협 흐름 차질, 사우디 대중국 원유 판매 4월 약 4,000만 배럴에서 5월 약 2,000만 배럴로 절반 감소 전망.",tg:["사우디","중국","원유수출","호르무즈"],u:"https://www.bloomberg.com/news/articles/2026-04-13/saudi-oil-sales-to-china-to-halve-as-hormuz-crisis-lifts-prices"},
  {id:194,p:9,r:"헤드라인",t:"Saudi Arabia maintains oil exports from key Red Sea port for now",k:"사우디, 홍해 주요 항구 통한 원유 수출 현재까지 유지",s:"Bloomberg",c:"global",d:"2026-04-10",m:"Despite the Hormuz blockade, Saudi Arabia continues to maintain oil exports from its Red Sea port of Yanbu via the restored East-West pipeline, providing a critical bypass route.",mk:"호르무즈 봉쇄에도 불구, 사우디는 복구된 동-서 파이프라인을 통해 홍해 얀부항에서 원유 수출 유지. 핵심 우회 경로 역할.",tg:["홍해","원유수출","얀부","파이프라인"],u:"https://www.bloomberg.com/news/articles/2026-04-10/saudi-maintains-oil-exports-from-key-red-sea-port-for-now"},
  {id:195,p:9,r:"속보",t:"Middle East oil production plunges due to Iran war, OPEC data shows",k:"이란 전쟁으로 중동 원유 생산 급감, OPEC 데이터 확인",s:"CNBC",c:"global",d:"2026-04-13",m:"CNBC analysis of OPEC data showing Middle East oil production in freefall. Gulf states cut production as they cannot export through Hormuz. Saudi down 23%, Iraq 61%, Kuwait 53%, UAE 44%.",mk:"CNBC의 OPEC 데이터 분석, 중동 원유 생산 급감. 걸프국들 호르무즈 수출 불가로 감산. 사우디 -23%, 이라크 -61%, 쿠웨이트 -53%, UAE -44%.",tg:["OPEC","중동","감산","호르무즈"],u:"https://www.cnbc.com/2026/04/13/iran-war-oil-opec-production-decline.html"},
  {id:196,p:9,r:"헤드라인",t:"Saudi Arabia says East-West pipeline restored to full capacity",k:"사우디, 동-서 파이프라인 완전 복구 공식 발표",s:"Bloomberg",c:"global",d:"2026-04-12",m:"Bloomberg reports Saudi Arabia has restored the full 7M bpd pumping capacity of its critical East-West pipeline after it was damaged in an Iranian drone attack on April 8.",mk:"블룸버그, 사우디가 4월 8일 이란 드론 공격으로 손상된 동-서 파이프라인의 일산 700만 배럴 펌핑 용량을 완전 복구했다고 보도.",tg:["파이프라인","복구","블룸버그","에너지"],u:"https://www.bloomberg.com/news/articles/2026-04-12/saudi-arabia-says-east-west-pipeline-restored-to-full-capacity"},
  {id:197,p:8,r:"심층분석",t:"How Pakistan managed to get the US and Iran to a ceasefire",k:"파키스탄은 어떻게 미-이란 휴전을 이끌어냈나",s:"Al Jazeera",c:"me",d:"2026-04-10",m:"Detailed analysis of Pakistan&apos;s unique diplomatic role in brokering the two-week US-Iran ceasefire, leveraging its relationships with both Washington and Tehran.",mk:"파키스탄의 독특한 외교적 역할에 대한 심층 분석. 워싱턴과 테헤란 양측과의 관계를 활용해 미-이란 2주 휴전을 중재한 과정.",tg:["파키스탄","외교","휴전","중재"],u:"https://www.aljazeera.com/features/2026/4/8/how-pakistan-managed-to-get-the-us-and-iran-to-a-ceasefire"},
  {id:198,p:10,r:"속보",t:"US and Iran fail to reach deal after marathon 21-hour talks in Pakistan",k:"미-이란, 파키스탄서 21시간 마라톤 협상 끝 합의 실패",s:"Al Jazeera",c:"me",d:"2026-04-12",m:"US Vice President JD Vance said Tehran refused to accept Washington&apos;s terms after 21 hours of negotiations in Islamabad. Major sticking points include Lebanon ceasefire and Hormuz control.",mk:"밴스 부통령, 이슬라마바드에서 21시간 협상 끝 테헤란이 워싱턴의 조건 거부했다고 발표. 레바논 휴전과 호르무즈 통제권이 주요 쟁점.",tg:["미국","이란","협상결렬","이슬라마바드"],u:"https://www.aljazeera.com/news/2026/4/12/us-and-iran-fail-to-reach-peace-deal-after-marathon-talks-in-pakistan"},
  {id:199,p:9,r:"속보",t:"GCC nations react to Iran-US ceasefire: UAE demands unconditional Hormuz reopening",k:"GCC 국가들 미-이란 휴전 반응: UAE, 호르무즈 무조건 재개방 요구",s:"Al Jazeera",c:"gulf",d:"2026-04-10",m:"Gulf nations react cautiously to the Iran-US ceasefire. UAE demands full and unconditional reopening of Hormuz. Saudi Arabia calls for regional stability. Kuwait and Bahrain express relief but concern.",mk:"걸프 국가들 미-이란 휴전에 신중한 반응. UAE는 호르무즈의 완전하고 무조건적인 재개방을 요구. 사우디는 지역 안정 촉구. 쿠웨이트·바레인은 안도와 우려 동시 표명.",tg:["GCC","UAE","호르무즈","휴전"],u:"https://www.aljazeera.com/news/2026/4/8/gulf-arab-nations-react-to-iran-us-ceasefire-announcement"},
  {id:200,p:9,r:"속보",t:"Gulf states report missile and drone attacks hours after Iran-US ceasefire",k:"걸프국들, 미-이란 휴전 수시간 만에 미사일·드론 공격 보고",s:"Al Jazeera",c:"gulf",d:"2026-04-10",m:"Saudi Arabia, UAE, Kuwait, Qatar and Bahrain reported missile and drone attacks on their territories hours after the Iran-US ceasefire announcement. UAE said air defences intercepted 9 ballistic missiles and 50 drones.",mk:"사우디·UAE·쿠웨이트·카타르·바레인, 미-이란 휴전 발표 수시간 만에 미사일·드론 공격 보고. UAE 방공망, 탄도미사일 9발·드론 50기 요격.",tg:["걸프","공격","휴전위반","방공"],u:"https://www.aljazeera.com/news/2026/4/8/uae-kuwait-bahrain-report-attacks-despite-iran-us-ceasefire"},
  {id:201,p:8,r:"심층분석",t:"US-Iran ceasefire deal: What are the terms, and what&apos;s next?",k:"미-이란 휴전 합의: 조건은 무엇이고, 향후 전망은?",s:"Al Jazeera",c:"me",d:"2026-04-10",m:"Analysis of the two-week ceasefire terms: Iran to reopen Hormuz, mutual suspension of attacks. Key disputes include Lebanon inclusion, war reparations, and long-term Hormuz control.",mk:"2주 휴전 조건 분석: 이란의 호르무즈 재개방, 상호 공격 중단. 레바논 포함 여부, 전쟁배상금, 호르무즈 장기 통제권이 핵심 쟁점.",tg:["휴전","조건","호르무즈","분석"],u:"https://www.aljazeera.com/news/2026/4/8/us-iran-ceasefire-deal-what-are-the-terms-and-whats-next"},
  {id:202,p:9,r:"헤드라인",t:"Trump warns Iran as US military blockade on Iranian ports takes effect",k:"트럼프, 미군 이란 항구 봉쇄 발효에 이란 경고",s:"CNN",c:"global",d:"2026-04-13",m:"CNN live updates as Trump warns Iran while US Navy blockade of Iranian ports takes effect. The blockade comes after ceasefire negotiations collapsed in Islamabad.",mk:"CNN 실시간 보도, 트럼프 대통령이 미 해군의 이란 항구 봉쇄 발효와 함께 이란에 경고. 이슬라마바드 휴전 협상 결렬 이후 봉쇄 단행.",tg:["트럼프","봉쇄","이란","CNN"],u:"https://www.cnn.com/2026/04/13/world/live-news/iran-us-war-trump-hormuz"},
