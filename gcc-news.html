  {id:568,p:7,r:"주요경제",t:"Oman&apos;s economy to grow by 3.5% in 2026: IMF estimates",k:"IMF &quot;오만 경제, 2026년 3.5% 성장 전망&quot;",s:"Times of Oman",c:"gulf",d:"2026-04-18",m:"IMF estimates that the Omani economy will register growth of 3.5 percent in 2026, despite a downward revision of 0.5 percentage points. The forecast reflects the resilience of the Omani economy amid regional turbulence.",mk:"IMF는 오만 경제가 2026년 3.5% 성장할 것으로 추정했다. 0.5%p 하향 조정에도 역내 혼란 속 오만 경제의 회복력을 반영한 전망이다.",tg:["오만","IMF","성장률","전망"],u:"https://timesofoman.com/article/170705-omans-economy-to-grow-by-35-in-2026-imf-estimates"},
  {id:569,p:9,r:"주요경제",t:"Saudi Arabia says key oil pipeline back to full capacity after attacks",k:"사우디 &quot;공격 후 핵심 송유관, 완전 가동 복구&quot;",s:"Al Jazeera",c:"me",d:"2026-04-12",m:"Saudi Arabia has restored the East-West oil pipeline to full capacity after attacks during the US-Israel war on Iran. The key pipeline is back to being able to pump approximately 7 million barrels of oil a day, linking Abqaiq oilfield to Yanbu on the Red Sea.",mk:"사우디가 미·이스라엘의 대이란 전쟁 중 공격으로 축소됐던 동서 송유관을 완전 가동 수준으로 복구했다. 압카이크 유전과 홍해 얀부를 잇는 핵심 송유관은 일일 약 700만 배럴 수송 능력으로 회복됐다.",tg:["송유관","복구","얀부","아람코"],u:"https://www.aljazeera.com/economy/2026/4/12/saudi-arabia-says-key-oil-pipeline-back-to-full-capacity-after-attacks"},
  {id:571,p:9,r:"심층분석",t:"Iran war: What is happening on day 53 of the US-Israel conflict?",k:"이란전 53일차…현황 정리",s:"Al Jazeera",c:"me",d:"2026-04-21",m:"On day 53 of the US-Israel war on Iran, the fragile ceasefire faces expiration. Iran refuses to attend Pakistan talks, citing US naval blockade, excessive demands, and exclusion of Lebanon from the ceasefire.",mk:"미·이스라엘의 대이란 전쟁 53일차, 취약한 휴전이 만료를 앞두고 있다. 이란은 미국의 해상 봉쇄, 과도한 요구, 레바논 제외 등을 이유로 파키스탄 협상 불참을 선언했다.",tg:["이란전","53일차","레바논","봉쇄"],u:"https://www.aljazeera.com/news/2026/4/21/iran-war-what-is-happening-on-day-53-of-the-us-israel-conflict"},
  {id:574,p:8,r:"속보",t:"Pakistani-flagged tanker exits Gulf via Hormuz with UAE crude, data shows",k:"데이터 &quot;파키스탄 국적 유조선, UAE 원유 싣고 호르무즈 탈출&quot;",s:"Al Arabiya",c:"me",d:"2026-04-17",m:"A Pakistani-flagged tanker exited the Gulf via the Strait of Hormuz carrying UAE crude, signaling limited shipping resumption during the fragile US-Iran ceasefire.",mk:"파키스탄 국적 유조선이 UAE 원유를 싣고 호르무즈 해협을 통해 걸프만을 빠져나갔다. 취약한 미·이란 휴전 중 제한적 해운 재개를 시사하는 움직임이다.",tg:["유조선","호르무즈","UAE","해운"],u:"https://english.alarabiya.net/News/middle-east/2026/04/17/pakistaniflagged-tanker-exits-gulf-via-hormuz-with-uae-crude-data-shows-"},
  {id:575,p:8,r:"정책발표",t:"Strait of Hormuz is shut, must reopen without conditions, ADNOC CEO says",k:"ADNOC CEO &quot;호르무즈는 봉쇄됐고, 무조건 재개방돼야&quot;",s:"Al Arabiya",c:"me",d:"2026-04-09",m:"ADNOC CEO stated the Strait of Hormuz must be opened unconditionally, emphasizing its critical role for global energy flows and regional economies.",mk:"ADNOC 최고경영자는 호르무즈 해협이 무조건 재개방돼야 한다며 글로벌 에너지 흐름과 역내 경제에서의 결정적 역할을 강조했다.",tg:["ADNOC","호르무즈","UAE","에너지안보"],u:"https://english.alarabiya.net/News/gulf/2026/04/09/ceo-of-uae-s-adnoc-says-strait-of-hormuz-must-be-opened-unconditionally"},
  {id:577,p:8,r:"속보",t:"Live Updates: Latest from Israel, Iran, and the Middle East",k:"라이브 업데이트…이스라엘·이란·중동 최신 소식",s:"Jerusalem Post",c:"me",d:"2026-04-21",m:"Jerusalem Post live coverage of the Middle East crisis as the fragile US-Iran ceasefire nears expiration and Iran threatens to skip Islamabad talks.",mk:"예루살렘 포스트는 취약한 미·이란 휴전이 만료에 임박하고 이란이 이슬라마바드 협상 불참을 위협하는 가운데 중동 위기를 실시간 보도했다.",tg:["이스라엘","이란","중동","실시간"],u:"https://www.jpost.com/middle-east/iran-news/2026-04-21/live-updates-893667"},
  {id:579,p:10,r:"주요경제",t:"Saudi Arabia Lifts Oil Price to Record Premium as Strait of Hormuz Narrows",k:"사우디, 호르무즈 좁아지자 원유가 사상 최고 프리미엄으로 인상",s:"Bloomberg",c:"global",d:"2026-04-06",m:"Saudi Aramco raised Arab Light crude prices to Asia to a record premium of $19.50 over regional benchmarks, as a widening Middle East conflict and Iran&apos;s near-closure of the Strait of Hormuz convulse energy markets.",mk:"사우디 아람코는 중동 분쟁 확대와 이란의 사실상 호르무즈 봉쇄로 에너지 시장이 요동치는 가운데, 아시아향 아랍 라이트 원유 가격을 역내 기준 대비 배럴당 19.50달러 프리미엄으로 사상 최고치 인상했다.",tg:["아람코","원유가격","프리미엄","아시아"],u:"https://www.bloomberg.com/news/articles/2026-04-06/saudis-raise-oil-price-to-record-premium-as-war-riles-markets"},
  {id:580,p:10,r:"속보",t:"Iran War: Saudi Arabia Oil Output Capacity Cut 600,000 Barrels a Day",k:"이란전…사우디 원유 생산능력 일일 60만 배럴 감소",s:"Bloomberg",c:"global",d:"2026-04-09",m:"Attacks on Saudi energy sites resulted in a reduction in the kingdom&apos;s oil production capacity of approximately 600,000 barrels per day, targeting production, transportation, refining, petrochemicals and power generation.",mk:"사우디 에너지 시설 공격으로 왕국의 원유 생산능력이 일일 약 60만 배럴 감소했다. 생산, 수송, 정제, 석유화학, 발전 시설이 표적이 됐다.",tg:["사우디","생산감축","공격","아람코"],u:"https://www.bloomberg.com/news/articles/2026-04-09/saudi-oil-output-capacity-cut-600-000-barrels-a-day-in-attacks"},
  {id:581,p:9,r:"주요경제",t:"Saudi Arabia Says East-West Pipeline Restored to Full Capacity",k:"사우디 &quot;동서 송유관 완전 가동 복구&quot;",s:"Bloomberg",c:"global",d:"2026-04-12",m:"Saudi Arabia has restored its East-West oil pipeline to full capacity after attacks during the Iran war that curtailed output. The pipeline links the Abqaiq oilfield to Yanbu on the Red Sea, a critical alternative to the Strait of Hormuz.",mk:"사우디가 이란전 중 공격으로 축소됐던 동서 송유관을 완전 가동 수준으로 복구했다. 압카이크 유전과 홍해 얀부를 잇는 이 송유관은 호르무즈 해협의 핵심 대체 경로다.",tg:["송유관","복구","우회경로","얀부"],u:"https://www.bloomberg.com/news/articles/2026-04-12/saudi-arabia-says-east-west-pipeline-restored-to-full-capacity"},
  {id:582,p:9,r:"주요경제",t:"Qatar Starts Work to Restart LNG Production After Middle East Ceasefire",k:"카타르, 중동 휴전 후 LNG 생산 재개 작업 시작",s:"Bloomberg",c:"global",d:"2026-04-08",m:"Qatar mobilized engineers and workers aiming to resume production at the world&apos;s biggest LNG export plant following the ceasefire. The improvement in security conditions allowed limited activity and maintenance ahead of restart.",mk:"카타르는 휴전 이후 세계 최대 LNG 수출 시설의 생산 재개를 위해 엔지니어와 인력을 동원했다. 보안 상황 개선으로 제한적 활동과 재가동 전 유지보수가 가능해졌다.",tg:["카타르","LNG","재가동","에너지"],u:"https://www.bloomberg.com/news/articles/2026-04-08/qatar-begins-work-to-resume-lng-production-after-ceasefire"},
  {id:583,p:8,r:"심층분석",t:"Latest Oil Market News and Analysis for April 21",k:"4월 21일 석유시장 최신 뉴스 및 분석",s:"Bloomberg",c:"global",d:"2026-04-20",m:"Bloomberg&apos;s daily oil market roundup covers ceasefire uncertainty, Hormuz blockade developments, and market reaction to Trump&apos;s threats to resume war with Iran.",mk:"블룸버그의 일일 석유시장 정리는 휴전 불확실성, 호르무즈 봉쇄 전개, 트럼프의 대이란 전쟁 재개 위협에 대한 시장 반응을 다룬다.",tg:["석유시장","분석","휴전","호르무즈"],u:"https://www.bloomberg.com/news/articles/2026-04-20/latest-oil-market-news-and-analysis-for-april-21"},
  {id:586,p:7,r:"주요경제",t:"European markets: Stoxx 600, FTSE, DAX, CAC, Iran latest, oil prices",k:"유럽 증시: Stoxx 600·FTSE·DAX·CAC, 이란 속보와 유가",s:"CNBC",c:"global",d:"2026-04-21",m:"European stock markets and oil prices moved on Iran war developments, with Brent crude and WTI volatility driven by fragile ceasefire and Hormuz blockade news.",mk:"유럽 증시와 유가는 이란전 전개에 따라 움직였다. 취약한 휴전과 호르무즈 봉쇄 뉴스로 브렌트유와 WTI가 변동성을 보였다.",tg:["유럽증시","유가","이란","시장"],u:"https://www.cnbc.com/2026/04/21/european-markets-stoxx-600-ftse-dax-cac-iran-latest-oil-prices.html"},
  {id:587,p:9,r:"속보",t:"Live updates: Next round of US-Iran talks on hold as key officials gather at White House for meetings",k:"실시간: 미·이란 다음 협상 보류…주요 관료들 백악관 회동",s:"CNN",c:"global",d:"2026-04-21",m:"Vice President JD Vance and top US officials are expected to depart for Islamabad, but there are mixed signals on attendance from Iran. Key officials gathered at the White House for ceasefire meetings.",mk:"JD 밴스 부통령과 미국 고위 관료들이 이슬라마바드로 출국 예정이지만 이란 측 참석에 대해 엇갈린 신호가 나오고 있다. 주요 관료들은 휴전 협의를 위해 백악관에 모였다.",tg:["CNN","이란","백악관","협상"],u:"https://www.cnn.com/2026/04/21/world/live-news/iran-war-us-trump-israel"},
  {id:588,p:7,r:"심층분석",t:"&apos;I thought the oil would be much higher&apos;: Trump&apos;s rosy Iran war spin risks sending traders the wrong message",k:"포춘: &quot;유가 더 오를 줄 알았다&quot;…트럼프의 낙관론이 트레이더에 잘못된 신호",s:"Fortune",c:"global",d:"2026-04-21",m:"Fortune analyzes Trump&apos;s CNBC comments on oil prices, noting his optimism could mislead traders about the actual risks of the ongoing Iran conflict and Hormuz disruption.",mk:"포춘은 트럼프의 CNBC 발언을 분석하며 그의 낙관적 유가 전망이 현재 진행 중인 이란 분쟁과 호르무즈 혼란의 실제 리스크에 대해 트레이더들에게 잘못된 신호를 줄 수 있다고 지적했다.",tg:["트럼프","유가","포춘","트레이더"],u:"https://fortune.com/2026/04/21/trump-200-per-barrel-oil-iran-war-reaction-cnbc-comments/"},
  {id:589,p:10,r:"헤드라인",t:"데드라인 &apos;22일 저녁&apos;, 美 &quot;연장 없다&quot; vs 이란 &quot;항복 협상 불가&quot;",k:"데드라인 &apos;22일 저녁&apos;, 美 &quot;연장 없다&quot; vs 이란 &quot;항복 협상 불가&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-21",m:"Deadline April 22 evening approaches. Trump ruled out further extension, while Iran refused &apos;surrender negotiations&apos;. Talks begin 21st but no further grace period.",mk:"미·이란 2주 휴전 시한이 미 동부시간 22일 저녁으로 다가왔다. 트럼프 대통령은 추가 연장 가능성을 &quot;매우 작다&quot;고 일축했고, 이란은 &quot;항복 협상은 불가&quot;하다며 강경 입장을 고수했다.",tg:["휴전시한","미국","이란","협상"],u:"https://www.fnnews.com/news/202604211354049833"},
  {id:590,p:8,r:"심층분석",t:"美 트럼프, 이란 협상에 &quot;압박 없어, 서두르지 않을 것&quot;",k:"美 트럼프, 이란 협상에 &quot;압박 없어, 서두르지 않을 것&quot;",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-21",m:"Trump told reporters &apos;time is on my side&apos; regarding Iran negotiations, emphasizing no rush despite expiring ceasefire. Vance departing for Pakistan on 20th.",mk:"트럼프 대통령은 &quot;시간은 나의 적이 아니다. 나쁜 합의를 서두르지 않을 것이다&quot;라며 이란 협상에 대한 압박감이 없다고 밝혔다. 밴스 부통령은 20일 파키스탄으로 출국했다.",tg:["트럼프","협상","시간","파키스탄"],u:"https://www.fnnews.com/news/202604210638030710"},
  {id:591,p:8,r:"심층분석",t:"전쟁 재개냐 타협이냐…트럼프 이란전 관련 5가지 선택지",k:"전쟁 재개냐 타협이냐…트럼프 이란전 관련 5가지 선택지",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-21",m:"Analysis of Trump&apos;s five options on the Iran war: resume war, extend ceasefire, partial deal, comprehensive deal, or regime change. Both sides may sign MOU for future comprehensive agreement.",mk:"트럼프의 이란전 관련 5가지 선택지를 분석했다. 전쟁 재개, 휴전 연장, 부분 합의, 포괄 합의, 레짐 체인지 중 양측은 향후 포괄 합의를 위한 양해각서 체결 가능성이 점쳐진다.",tg:["선택지","트럼프","이란","MOU"],u:"https://www.fnnews.com/news/202604211009340954"},
  {id:592,p:7,r:"주요경제",t:"&quot;5월까지 대체원유 1.2억 배럴 확보...사우디 비중↑&quot;",k:"&quot;5월까지 대체원유 1.2억 배럴 확보...사우디 비중↑&quot;",s:"YTN",c:"korean-view",d:"2026-04-14",m:"Korea&apos;s Industry Ministry confirmed alternative crude oil of 46 million barrels in April and 72 million barrels in May, with Saudi share increasing. June volumes being secured by refiners.",mk:"산업통상부는 4월 대체 원유 4천6백만 배럴, 5월 7천2백만 배럴을 확보했고 사우디 비중이 증가했다고 밝혔다. 정유사들이 6월 물량을 추가로 구하고 있다.",tg:["대체원유","사우디","산업통상부","에너지안보"],u:"https://m.science.ytn.co.kr/program/view_today.php?s_mcd=0082&key=202604141603567903"},
  {id:593,p:8,r:"정책발표",t:"&apos;호르무즈 밖&apos; 원유 2억 7300만 배럴 온다",k:"&apos;호르무즈 밖&apos; 원유 2억 7300만 배럴 온다",s:"서울신문",c:"korean-view",d:"2026-04-16",m:"Presidential envoy Kang Hoon-sik announced Korea secured 273 million barrels of crude oil from outside Hormuz by year-end, plus up to 2.1 million tons additional naphtha, through Kazakhstan and other countries.",mk:"대통령 특사로 카자흐스탄 등 4개국을 방문한 강훈식 비서실장은 &quot;올해 말까지 원유 2억 7300만 배럴 도입을 확정 지었고 나프타도 최대 210만t을 추가 확보했다&quot;고 밝혔다. 호르무즈 밖 공급원 다변화다.",tg:["원유확보","카자흐스탄","나프타","다변화"],u:"https://www.seoul.co.kr/news/politics/2026/04/16/20260416001007"},
  {id:595,p:10,r:"헤드라인",t:"Syrian president arrives in Jeddah, meets with crown prince",k:"시리아 대통령, 제다 도착…사우디 왕세자와 회담",s:"Arab News",c:"saudi",d:"2026-04-21",m:"Syrian President Ahmad al-Sharaa arrived in Jeddah on an official visit to Saudi Arabia and held talks with Crown Prince Mohammed bin Salman, discussing bilateral relations, economic and investment ties, and regional linking projects.",mk:"시리아 아흐마드 알샤라 대통령이 사우디 공식방문 일환으로 제다에 도착, 무함마드 빈 살만 왕세자와 양자 관계, 경제·투자 협력 및 역내 연계사업에 대해 회담했다.",tg:["외교","시리아","왕세자"],u:"https://www.arabnews.com/node/2640730/saudi-arabia"},
  {id:596,p:10,r:"헤드라인",t:"Saudi Crown Prince meets Syria&apos;s al-Sharaa in Jeddah",k:"사우디 왕세자, 제다에서 시리아 알샤라 대통령 접견",s:"Al Arabiya",c:"saudi",d:"2026-04-21",m:"Crown Prince Mohammed bin Salman received Syrian President Ahmed al-Sharaa in Jeddah, with talks focusing on strengthening bilateral ties and regional developments, part of al-Sharaa&apos;s Gulf tour.",mk:"무함마드 빈 살만 왕세자는 제다에서 시리아 아흐메드 알샤라 대통령을 접견하고 양국 관계 강화와 역내 현안을 논의했으며, 이는 알샤라의 걸프 순방 일환이다.",tg:["왕세자","시리아","걸프순방"],u:"https://english.alarabiya.net/News/middle-east/2026/04/21/saudi-crown-prince-meets-syria-s-alsharaa-in-jeddah"},
  {id:597,p:9,r:"정책발표",t:"Syrian President Arrives in Jeddah on Official Visit",k:"시리아 대통령, 공식 방문차 제다 도착",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-21",m:"Syrian President Ahmed al-Sharaa arrived at King Abdulaziz International Airport in Jeddah on an official visit to Saudi Arabia, marking a major diplomatic milestone in Gulf-Syria relations.",mk:"시리아 알샤라 대통령이 사우디 공식방문차 제다 킹 압둘아지즈 국제공항에 도착했으며, 이는 걸프-시리아 관계의 중요한 외교적 전환점으로 평가된다.",tg:["외교","시리아","제다"],u:"https://english.aawsat.com/gulf/5265010-syrian-president-arrives-jeddah-official-visit"},
  {id:598,p:9,r:"정책발표",t:"Saudi crown prince discusses developments in Lebanon with president",k:"사우디 왕세자, 레바논 대통령과 역내 정세 논의",s:"Arab News",c:"saudi",d:"2026-04-22",m:"Crown Prince Mohammed bin Salman received a phone call from Lebanese President Joseph Aoun to discuss developments in Lebanon and the region, with the crown prince affirming Saudi support for Lebanon&apos;s sovereignty and territorial integrity.",mk:"무함마드 빈 살만 왕세자는 조셉 아운 레바논 대통령의 전화를 받고 레바논 및 역내 정세를 논의했으며, 레바논의 주권과 영토 보전에 대한 사우디의 지원을 재확인했다.",tg:["외교","레바논","왕세자"],u:"https://www.arabnews.com/node/2640780/saudi-arabia"},
  {id:599,p:8,r:"외교",t:"Aoun: Lebanon Appreciates Saudi Crown Prince&apos;s Efforts to Promote Regional Stability",k:"아운 대통령, 사우디 왕세자의 역내 안정 노력에 감사",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-22",m:"Lebanese President Joseph Aoun expressed appreciation for Crown Prince Mohammed bin Salman&apos;s efforts to promote regional stability during a phone call, welcoming the Kingdom&apos;s continuous assistance in all circumstances.",mk:"조셉 아운 레바논 대통령은 무함마드 빈 살만 왕세자와의 전화 통화에서 역내 안정 증진 노력에 감사를 표명하고, 사우디의 지속적인 지원을 환영했다.",tg:["외교","레바논","역내안정"],u:"https://english.aawsat.com/arab-world/5262920-aoun-lebanon-appreciates-saudi-crown-prince-efforts-promote-regional-stability"},
  {id:600,p:10,r:"정책발표",t:"Saudi Vision 2030&apos;s Second Draft: NEOM Sidelined as Priorities Shift",k:"사우디 비전2030 2차 초안: NEOM 후순위로, 우선순위 재편",s:"Skift",c:"saudi",d:"2026-04-17",m:"PIF governor Al-Rumayyan stated NEOM is no longer on the critical path for Vision 2030, with priorities shifted to Expo 2030 and the World Cup 2034, while construction commitments have been cut by tens of billions.",mk:"알루마이얀 PIF 총재는 NEOM이 더 이상 비전2030의 핵심 과제가 아니며, 우선순위가 엑스포 2030과 월드컵 2034로 이동했다고 밝혔으며, 건설 약정은 수백억 달러 삭감됐다.",tg:["NEOM","비전2030","엑스포"],u:"https://skift.com/2026/04/17/saudi-vision-2030s-second-draft/"},
  {id:601,p:9,r:"주요경제",t:"Saudi Arabia Scraps Tourism Funding In Vision 2030 Shake-Up",k:"사우디, 비전2030 개편 속 관광 자금 축소",s:"Skift",c:"saudi",d:"2026-04-16",m:"Saudi Arabia is cutting back on large-scale tourism projects including Neom and the Red Sea Destination, with NEOM separated from the tourism ecosystem in the 2026-2030 PIF strategy reshuffle.",mk:"사우디는 2026-2030 PIF 전략 개편에서 NEOM을 관광 생태계에서 분리하며, 네옴과 홍해 프로젝트를 포함한 대규모 관광 사업을 축소하고 있다.",tg:["관광","NEOM","재편"],u:"https://skift.com/2026/04/16/saudi-arabia-scraps-tourism-funding-in-vision-2030-shake-up/"},
  {id:602,p:8,r:"주요경제",t:"TASI Posts Monthly Gain of 5.52% as Tadawul Sustains Momentum in April 2026",k:"TASI 월간 5.52% 상승…타다울 4월 상승세 유지",s:"The Saudi Times",c:"saudi",d:"2026-04-20",m:"Saudi Arabia&apos;s Tadawul All Share Index (TASI) posted a monthly gain of 5.52% in April 2026, sustaining momentum amid Middle East tensions, with the main index at 11,384 on April 21.",mk:"사우디 타다울 전종목 지수(TASI)는 2026년 4월 월간 5.52% 상승하며 중동 긴장 속 상승 모멘텀을 유지했고, 4월 21일 주지수는 11,384를 기록했다.",tg:["TASI","주식시장","타다울"],u:"https://thesauditimes.net/en/tasi-posts-monthly-gain-of-5-52-as-tadawul-sustains-momentum-in-april-2026/"},
  {id:603,p:8,r:"주요경제",t:"Aramco Announces April 2026 Fuel Prices as Global Oil Markets Fluctuate",k:"아람코, 글로벌 유가 변동 속 4월 연료 가격 발표",s:"The Saudi Times",c:"saudi",d:"2026-04-06",m:"Saudi Aramco maintained 91 octane at SAR 2.18/L and 95 octane at SAR 2.33/L, while 98 octane premium gasoline rose to SAR 3.83/L. Arab Light crude for Asian refiners rose to $19.50 premium.",mk:"사우디 아람코는 옥탄 91을 리터당 2.18리얄, 옥탄 95를 2.33리얄로 유지했으나, 프리미엄 옥탄 98은 3.83리얄로 인상했으며, 아시아 정유사용 아랍 라이트 원유는 19.50달러 프리미엄으로 올랐다.",tg:["Aramco","연료가격","OSP"],u:"https://thesauditimes.net/en/aramco-announces-april-2026-fuel-prices-as-global-oil-markets-fluctuate/"},
  {id:604,p:7,r:"주요경제",t:"Saudi prices stable but war to nudge inflation higher",k:"사우디 물가 안정적이나 전쟁이 인플레 상승 압박",s:"AGBI",c:"saudi",d:"2026-04-18",m:"Saudi CPI rose 1.8% year-on-year in March, driven by housing and rentals. ADCB raised 2026 inflation forecast to 2.3% from 1.8% amid war-related cost-of-living pressures.",mk:"사우디 CPI는 3월 전년대비 1.8% 상승했고 주거·임대료가 주도했으며, ADCB는 전쟁 관련 생활비 압박으로 2026년 인플레이션 전망을 1.8%에서 2.3%로 상향했다.",tg:["인플레이션","CPI","경제"],u:"https://www.agbi.com/economy/2026/04/saudi-prices-stable-but-inflation-likely-to-rise-due-to-war/"},
  {id:605,p:6,r:"주요경제",t:"Jarir opens SAR 24M showroom in Riyadh",k:"자리르, 리야드에 2,400만 리얄 규모 신규 쇼룸 개장",s:"Argaam",c:"saudi",d:"2026-04-19",m:"Jarir Marketing Company opened a new showroom in Riyadh with investment of SAR 24 million, reflecting continued retail expansion despite regional tensions and market volatility.",mk:"자리르마케팅은 리야드에 2,400만 리얄을 투자한 신규 쇼룸을 개장했으며, 역내 긴장과 시장 변동성 속에서도 소매업 확장을 이어가고 있다.",tg:["자리르","소매업","리야드"],u:"https://www.argaam.com/en/article/articledetail/id/1897719"},
  {id:606,p:7,r:"주요경제",t:"PIF continued to drive Saudi economic transformation, growing AuM by 19% in 2024",k:"PIF, 2024년 AUM 19% 성장…사우디 경제 전환 주도",s:"PIF",c:"saudi",d:"2026-04-15",m:"PIF&apos;s assets under management reached more than SAR 3.4 trillion by end-2025, contributing over $243 billion to non-oil GDP and investing $199 billion in new projects between 2021-2025.",mk:"PIF의 AUM은 2025년 말 기준 3.4조 리얄을 넘어섰으며, 비석유 GDP에 2,430억 달러 이상 기여하고 2021-2025년 신규 프로젝트에 1,990억 달러를 투자했다.",tg:["PIF","AUM","성과"],u:"https://www.pif.gov.sa/en/news-and-insights/press-releases/2026/chaired-by-hrh-crown-prince-pif-board-of-directors-approves-pif-2026-2030-strategy/"},
  {id:607,p:5,r:"일반",t:"Saudi Arabia to Start Issuing 2026 Hajj Visas on February 8",k:"사우디, 2026 하지 비자 발급 개시",s:"Gulf News",c:"saudi",d:"2026-04-18",m:"Saudi Arabia began issuing Hajj 2026 visas starting February 8, with pilgrims to arrive from April 18, 2026. Hajj is scheduled May 24-29 under tightened rules including mandatory Nusuk app pre-booking.",mk:"사우디는 2월 8일부터 2026 하지 비자 발급을 개시했으며, 순례자들은 4월 18일부터 도착하고 하지는 5월 24-29일에 예정돼 있으며, Nusuk 앱 사전 예약 등 규정이 강화됐다.",tg:["하지","비자","Nusuk"],u:"https://gulfnews.com/world/gulf/saudi/saudi-arabiato-begin-issuing-2026-hajj-visas-on-february-8-1.500434018"},
  {id:608,p:6,r:"정책발표",t:"Saudi Crown Prince and Sudan&apos;s al-Burhan hold joint talks at royal palace in Jeddah",k:"사우디 왕세자·수단 부르한, 제다 왕궁서 공동 회담",s:"Pravda Sudan",c:"saudi",d:"2026-04-20",m:"Crown Prince Mohammed bin Salman held joint talks with Sudan&apos;s Sovereign Council chairman General al-Burhan at the royal palace in Jeddah, discussing Sudan&apos;s security, sovereignty and humanitarian crisis.",mk:"무함마드 빈 살만 왕세자는 제다 왕궁에서 수단 주권위원회 의장 알부르한 장군과 공동 회담을 갖고 수단의 안보, 주권, 인도적 위기를 논의했다.",tg:["수단","왕세자","외교"],u:"https://sudan.news-pravda.com/en/world/2026/04/20/5412.html"},
  {id:609,p:9,r:"헤드라인",t:"Syria&apos;s Ahmad Al Shara begins Gulf tour by meeting Saudi Crown Prince",k:"시리아 알샤라, 사우디 왕세자 회담으로 걸프 순방 시작",s:"The National",c:"gulf",d:"2026-04-22",m:"Syrian President Ahmad al-Shara began his Gulf tour with a meeting with Saudi Crown Prince Mohammed bin Salman in Jeddah, signaling strengthened regional ties following Syria&apos;s political transition.",mk:"시리아 알샤라 대통령은 제다에서 무함마드 빈 살만 사우디 왕세자와 회담으로 걸프 순방을 시작했으며, 이는 시리아 정치 전환 이후 강화된 역내 유대를 시사한다.",tg:["시리아","걸프순방","외교"],u:"https://www.thenationalnews.com/news/gulf/2026/04/22/syrias-ahmad-al-shara-begins-gulf-tour-by-meeting-saudi-crown-prince/"},
  {id:610,p:8,r:"정책발표",t:"UAE proves its strength amid global uncertainty, says Gargash on security and stability",k:"가르가시 UAE 외교고문 &quot;글로벌 불확실성 속 UAE 강인함 입증&quot;",s:"Gulf News",c:"gulf",d:"2026-04-21",m:"Dr Anwar Gargash, UAE Presidential Diplomatic Adviser, said the country is firm in confronting threats and decisive in countering attempts to undermine security, demonstrating strength amid regional challenges.",mk:"안와르 가르가시 UAE 대통령 외교고문은 UAE가 위협에 단호히 대응하고 안보 저해 시도를 단호히 차단하며 역내 도전 속 강인함을 입증하고 있다고 밝혔다.",tg:["UAE","안보","외교"],u:"https://gulfnews.com/uae/government/gargash-uaeis-firm-in-confronting-threats-decisive-in-countering-attempts-to-undermine-security-1.500514423"},
  {id:611,p:8,r:"주요경제",t:"Dubai Announces AED1 Billion Economic Package Deferring Tourism and Business Fees",k:"두바이, 관광·비즈니스 수수료 유예하는 10억 디르함 경제 패키지 발표",s:"Dubai Media Office",c:"gulf",d:"2026-04-02",m:"Dubai announced new economic measures worth AED1 billion ($272.2 million) from April 1, deferring hotel sales and Tourism Dirham fees for three months to support sectors affected by Iran attacks and airspace closures.",mk:"두바이는 4월 1일부터 10억 디르함(2억7220만 달러) 규모 경제 조치를 발표해 호텔 판매세와 관광 디르함 수수료를 3개월 유예하며, 이란 공격 및 영공 폐쇄 영향 부문을 지원한다.",tg:["두바이","관광","부양책"],u:"https://mediaoffice.ae/en/news/2026/april/02-04/dubai-economic-measures-boost-hospitality-and-business-growth"},
  {id:612,p:7,r:"주요경제",t:"UAE preparing support package for tourism sector, says economy minister",k:"UAE 경제부, 관광 부문 지원 패키지 준비 중",s:"The National",c:"gulf",d:"2026-04-06",m:"UAE Economy Minister announced preparations for a support package for the tourism sector as tourism, hospitality and aviation have slowed due to Iran attacks, airspace closures and flight disruptions.",mk:"UAE 경제부 장관은 이란 공격, 영공 폐쇄 및 항공편 차질로 인해 관광·숙박·항공이 둔화됨에 따라 관광 부문 지원 패키지를 준비 중이라고 발표했다.",tg:["UAE","관광","지원"],u:"https://www.thenationalnews.com/business/economy/2026/04/06/uae-preparing-support-package-for-tourism-sector-says-economy-minister/"},
  {id:613,p:6,r:"일반",t:"UAE to Co-Host 2026 UN Water Conference in Abu Dhabi",k:"UAE, 아부다비서 2026 UN 물 회의 공동 개최",s:"Gulf Today",c:"gulf",d:"2026-04-21",m:"The UAE delegation led by Abdulla Balalaa, Assistant Minister of Foreign Affairs, mobilized engagement with the 2026 UN Water Conference to be co-hosted by UAE and Senegal in Abu Dhabi later this year.",mk:"압둘라 발랄라 외교부 차관이 이끄는 UAE 대표단은 올해 말 UAE와 세네갈이 아부다비에서 공동 개최할 2026 UN 물 회의 참여를 본격 추진 중이다.",tg:["UAE","UN","물"],u:"https://www.gulftoday.ae/news/2026/04/21/on-road-to-2026-un-water-conference-uae-brings-water-issue-centre-stage"},
  {id:614,p:6,r:"일반",t:"Minor earthquake of 2 magnitude detected in Abu Dhabi",k:"아부다비에서 규모 2.0 경미한 지진 감지",s:"Gulf Today",c:"gulf",d:"2026-04-19",m:"UAE&apos;s National Centre of Meteorology detected a minor earthquake of magnitude 2 in Abu Dhabi, with no damage reported. The tremor was part of routine seismic activity monitored by the agency.",mk:"UAE 국립기상센터는 아부다비에서 규모 2.0의 경미한 지진을 감지했으며, 피해 보고는 없다. 이 미진은 기상청이 모니터링하는 일상적 지진 활동의 일부다.",tg:["지진","아부다비","기상"],u:"https://www.gulftoday.ae/news/2026/04/19/minor-earthquake-of-2-magnitude-detected-in-abu-dhabi"},
  {id:615,p:10,r:"헤드라인",t:"Iran-US war: Four scenarios for what&apos;s next as talks stumble",k:"미-이란 전쟁: 협상 교착 속 향후 4가지 시나리오",s:"Al Jazeera",c:"me",d:"2026-04-21",m:"Al Jazeera analyzes four scenarios for the US-Iran conflict as Islamabad talks falter: extended ceasefire with phased deal, full war resumption, proxy escalation, and regional expansion with Gulf involvement.",mk:"알자지라는 이슬라마바드 협상이 흔들리는 가운데 미-이란 분쟁의 4가지 시나리오(단계적 합의와 휴전 연장, 전면 재개전, 대리세력 확전, 걸프 개입 포함 역내 확산)를 분석했다.",tg:["미-이란전쟁","시나리오","심층분석"],u:"https://www.aljazeera.com/news/2026/4/21/iran-us-war-four-scenarios-for-whats-next-as-talks-stumble"},
  {id:616,p:9,r:"속보",t:"Pakistan races against time to get Iran back to US talks as truce end nears",k:"파키스탄, 휴전 종료 임박 속 이란의 美 협상 복귀 위해 시간과 싸워",s:"Al Jazeera",c:"me",d:"2026-04-21",m:"Pakistan intensified diplomatic efforts to bring Iran back to negotiations with the US as the two-week ceasefire neared expiration on April 22, with Islamabad hosting shuttle diplomacy.",mk:"파키스탄은 4월 22일 2주 휴전 만료를 앞두고 이란을 미국과의 협상 테이블로 복귀시키기 위한 외교 노력을 강화했으며, 이슬라마바드에서 셔틀 외교를 전개했다.",tg:["파키스탄","이란","협상"],u:"https://www.aljazeera.com/news/2026/4/21/pakistan-races-against-time-to-get-iran-back-to-us-talks-as-truce-end-nears"},
  {id:617,p:9,r:"속보",t:"Iran to show &apos;new cards on battlefield&apos; if war resumes: Parliament speaker",k:"이란 국회의장 &quot;전쟁 재개 시 새로운 전장 카드 공개할 것&quot;",s:"Al Arabiya",c:"me",d:"2026-04-21",m:"Iran&apos;s Parliament Speaker Ghalibaf warned Tehran has &apos;new cards&apos; if war resumes with the US and Israel, rejecting negotiations under threats and characterizing US demands as a &apos;table of surrender&apos;.",mk:"이란 국회의장 갈리바프는 미국·이스라엘과 전쟁 재개 시 테헤란이 &quot;새로운 카드&quot;가 있다고 경고하고, 위협 하의 협상을 거부하며 미국의 요구를 &quot;항복 테이블&quot;로 규정했다.",tg:["이란","갈리바프","경고"],u:"https://english.alarabiya.net/News/middle-east/2026/04/21/iran-to-show-new-cards-on-battlefield-if-war-resumes-parliament-speaker"},
  {id:618,p:8,r:"심층분석",t:"Hamas rejects disarmament clause of Gaza peace plan, IDF reports 14 ceasefire violations",k:"하마스, 가자 평화계획 무장해제 조항 거부…IDF &quot;14차례 휴전위반&quot;",s:"Long War Journal",c:"me",d:"2026-04-20",m:"Hamas officially rejected the multinational Board of Peace&apos;s mandate for complete disarmament, threatening Trump&apos;s 20-point Gaza peace plan, while IDF reported 14 ceasefire violations between April 8-16.",mk:"하마스는 국제평화위원회의 완전 무장해제 요구를 공식 거부해 트럼프의 20개 항 가자 평화계획을 위협했으며, IDF는 4월 8-16일 사이 14차례 휴전 위반이 있었다고 보고했다.",tg:["하마스","가자","평화계획"],u:"https://www.longwarjournal.org/archives/2026/04/hamas-rejects-disarmament-clause-of-gaza-peace-plan-idf-reports-14-ceasefire-violations-from-april-8-to-16.php"},
  {id:619,p:8,r:"속보",t:"Iran closes Strait of Hormuz again over US blockade of its ports",k:"이란, 美의 자국 항구 봉쇄 조치에 호르무즈 해협 재폐쇄",s:"Al Jazeera",c:"me",d:"2026-04-18",m:"Iran announced it closed the Strait of Hormuz again in response to the US refusing to lift its naval blockade on Iranian ports, dramatically disrupting oil shipments through the critical chokepoint.",mk:"이란은 미국이 이란 항구에 대한 해상 봉쇄 해제를 거부하자 호르무즈 해협을 다시 폐쇄한다고 발표했으며, 이는 핵심 해상 병목을 통한 원유 수송을 극적으로 차질시켰다.",tg:["호르무즈","봉쇄","이란"],u:"https://www.aljazeera.com/news/2026/4/18/iran-closes-strait-of-hormuz-again-over-us-blockade-of-its-ports"},
  {id:620,p:7,r:"외교",t:"President al-Sharaa discusses with Crown Prince bin Salman economic, investment ties",k:"알샤라 대통령, 빈 살만 왕세자와 경제·투자 협력 논의",s:"SANA",c:"me",d:"2026-04-21",m:"Syrian President Ahmad al-Sharaa held talks in Jeddah with Saudi Crown Prince Mohammed bin Salman focusing on bilateral relations, economic and investment sectors, and regional linking projects.",mk:"시리아 알샤라 대통령은 제다에서 사우디 빈 살만 왕세자와 양국 관계, 경제·투자 부문 및 역내 연계사업을 중심으로 회담했다.",tg:["시리아","사우디","경제협력"],u:"https://sana.sy/en/presidency/2312069/"},
  {id:621,p:10,r:"헤드라인",t:"Oil Shipments From Hormuz Continue for Mercuria, CEO Tells Commodities Summit",k:"Mercuria CEO &quot;호르무즈 통한 원유 수송 지속&quot;",s:"Bloomberg",c:"global",d:"2026-04-21",m:"Mercuria CEO told a commodities summit that the trading house continues to move oil shipments through the Strait of Hormuz despite Iran&apos;s renewed closure, highlighting resilience in maritime trade.",mk:"Mercuria CEO는 원자재 서밋에서 이란의 재폐쇄 조치에도 불구하고 동사가 호르무즈 해협을 통한 원유 수송을 계속하고 있다고 밝히며 해상 무역의 복원력을 강조했다.",tg:["Mercuria","호르무즈","원유수송"],u:"https://www.bloomberg.com/news/articles/2026-04-21/mercuria-was-able-to-get-ships-out-through-hormuz-ceo-says"},
  {id:622,p:9,r:"속보",t:"Trump extends ceasefire in Iran, citing &apos;seriously fractured&apos; Iranian government",k:"트럼프, &quot;이란 정부 심각한 분열&quot; 이유로 휴전 연장",s:"CNBC",c:"global",d:"2026-04-21",m:"President Trump extended the US ceasefire with Iran, saying the extension was warranted due to Tehran&apos;s government being &apos;seriously fractured&apos; until Iranian leaders submit a unified proposal to end the war.",mk:"트럼프 대통령은 이란 정부가 &quot;심각하게 분열&quot;돼 있다는 이유로 美-이란 휴전을 연장했으며, 이란 지도부가 종전을 위한 통합된 제안을 제출할 때까지 지속될 것이라고 밝혔다.",tg:["트럼프","휴전","이란"],u:"https://www.cnbc.com/2026/04/21/trump-iran-war-ceasefire.html"},
  {id:623,p:8,r:"심층분석",t:"The $100 oil shock is hitting the middle class like a margin call",k:"100달러 유가 쇼크, 마진콜처럼 중산층 타격",s:"Fortune",c:"global",d:"2026-04-21",m:"Fortune analyzes how sustained $100 oil is acting as a margin call on middle-class households, driving up food, transport, and utility costs while eroding savings amid persistent Middle East tensions.",mk:"포춘은 지속된 100달러 유가가 중산층 가계에 대한 마진콜로 작용해 식품·교통·공공요금을 끌어올리고 중동 긴장 속 저축을 잠식하고 있다고 분석했다.",tg:["유가쇼크","중산층","경제"],u:"https://fortune.com/2026/04/21/oil-price-shock-middle-class-margin-call-women-economy/"},
  {id:624,p:8,r:"속보",t:"Trump Says US Will Extend Ceasefire With Iran",k:"트럼프 &quot;이란과의 휴전 연장할 것&quot;",s:"Time",c:"global",d:"2026-04-21",m:"Time reports President Trump reversed earlier reluctance and extended the US-Iran ceasefire following Pakistan&apos;s request, while maintaining the naval blockade of Iranian ports until a comprehensive deal.",mk:"타임은 트럼프 대통령이 앞선 주저 태도를 뒤집어 파키스탄의 요청에 따라 美-이란 휴전을 연장하면서도 포괄적 합의까지 이란 항구에 대한 해상 봉쇄를 유지할 것이라고 보도했다.",tg:["트럼프","휴전","연장"],u:"https://time.com/article/2026/04/21/iran-us-trump-war-ceasefire-talks-stalemate/"},
  {id:625,p:7,r:"속보",t:"Vance trip to Pakistan for Iran talks is on hold, NYT reports",k:"밴스 부통령, 이란 협상차 파키스탄 방문 보류",s:"CNBC",c:"global",d:"2026-04-21",m:"Vice President JD Vance&apos;s planned trip to Islamabad for a second round of Iran peace talks has been put on hold after Tehran failed to respond to the latest US negotiating positions, per NYT.",mk:"JD 밴스 부통령의 이란 2차 평화협상 참석차 이슬라마바드 방문이 테헤란이 美의 최신 협상 입장에 응답하지 않음에 따라 보류됐다고 NYT가 보도했다.",tg:["밴스","파키스탄","협상"],u:"https://www.cnbc.com/2026/04/21/trump-vance-iran-war-pakistan.html"},
  {id:626,p:7,r:"심층분석",t:"OPEC+ to boost oil output by 206,000 barrels per day starting in April",k:"OPEC+, 4월부터 일일 20만6000배럴 증산",s:"Enerdata",c:"global",d:"2026-04-06",m:"OPEC+ agreed to increase crude oil production by 206,000 barrels per day starting April 2026 after a planned three-month pause, signaling a move to restore supply as global inventories remain low.",mk:"OPEC+는 계획된 3개월 중단 후 2026년 4월부터 일일 20만6000배럴 원유 증산에 합의했으며, 이는 글로벌 재고가 낮게 유지되는 가운데 공급 복원 조치를 시사한다.",tg:["OPEC","증산","원유"],u:"https://www.enerdata.net/publications/daily-energy-news/opec-raise-output-206-kbd-april-2026-amid-middle-east-tensions.html"},
  {id:627,p:6,r:"심층분석",t:"US/Israel-Iran conflict 2026: House of Commons Library briefing",k:"英 하원도서관 보고서: 2026 미·이스라엘-이란 분쟁 분석",s:"House of Commons Library",c:"global",d:"2026-04-15",m:"The UK House of Commons Library released a comprehensive research briefing on the 2026 US/Israel-Iran conflict, analyzing military operations, economic impacts, and diplomatic efforts toward resolution.",mk:"英 하원도서관은 2026년 미·이스라엘-이란 분쟁에 관한 포괄적 연구 보고서를 발간해 군사작전, 경제적 영향, 해결을 위한 외교 노력을 분석했다.",tg:["영국의회","연구보고서","분쟁분석"],u:"https://commonslibrary.parliament.uk/research-briefings/cbp-10521/"},
  {id:628,p:8,r:"헤드라인",t:"Trump extends US ceasefire with Iran at Pakistan&apos;s request",k:"트럼프, 파키스탄 요청에 美-이란 휴전 연장",s:"NPR",c:"global",d:"2026-04-21",m:"NPR reports President Trump extended the US-Iran ceasefire at Pakistan&apos;s request, reversing earlier statements, as mediators from Islamabad worked to keep negotiations alive ahead of April 22 deadline.",mk:"NPR은 트럼프 대통령이 파키스탄의 요청에 따라 美-이란 휴전을 연장하며 앞선 발언을 뒤집었다고 보도했으며, 이슬라마바드 중재자들은 4월 22일 마감시한을 앞두고 협상 유지에 총력을 기울였다.",tg:["트럼프","휴전","파키스탄"],u:"https://www.npr.org/2026/04/21/nx-s1-5793638/iran-middle-east-updates"},
  {id:629,p:6,r:"심층분석",t:"IMF April 2026 World Economic Outlook: Global Prospects amid Middle East Conflict",k:"IMF 2026 4월 세계경제전망: 중동 분쟁 속 글로벌 전망",s:"IMF",c:"global",d:"2026-04-15",m:"IMF&apos;s April 2026 World Economic Outlook analyzes global prospects amid the Middle East conflict, highlighting downside risks from oil price volatility, trade disruptions, and supply chain constraints.",mk:"IMF의 2026년 4월 세계경제전망(WEO)은 중동 분쟁 속 글로벌 전망을 분석하며 유가 변동성, 무역 차질, 공급망 제약으로 인한 하방 위험을 강조했다.",tg:["IMF","WEO","경제전망"],u:"https://www.imf.org/-/media/files/publications/weo/2026/april/english/ch1.pdf"},
  {id:630,p:8,r:"주요경제",t:"한-사우디 경제협력: 현대차-PIF 4억달러 합작 전기차 공장 2026년 가동",k:"한-사우디 경제협력: 현대차-PIF 4억달러 합작 전기차 공장 2026년 가동",s:"한국경제",c:"korean-view",d:"2026-04-17",m:"Hyundai Motor&apos;s joint venture with Saudi PIF ($400 million) will begin producing 50,000 EVs annually from 2026 at the new Saudi assembly plant, a key pillar of Korea-Saudi industrial partnership.",mk:"현대차의 사우디 PIF와의 4억달러 합작공장은 2026년부터 연 5만대 전기차를 생산할 예정이며, 이는 한-사우디 산업협력의 핵심 축이다.",tg:["한국-사우디","현대차","PIF"],u:"https://www.hankyung.com/article/2023102269241"},
  {id:631,p:8,r:"심층분석",t:"네옴 프로젝트 속도 조절…국내 건설사, 중동 사태에 수주 불확실성 확대",k:"네옴 프로젝트 속도 조절…국내 건설사, 중동 사태에 수주 불확실성 확대",s:"더퍼블릭",c:"korean-view",d:"2026-04-16",m:"Korean construction firms face growing uncertainty in Middle East orders as NEOM project pace slows, with Saudi Arabia restructuring Vision 2030 priorities toward AI infrastructure and major events.",mk:"한국 건설사들은 사우디가 비전 2030의 우선순위를 AI 인프라와 메가 이벤트로 재편함에 따라 NEOM 프로젝트 속도조절 속에서 중동 수주 불확실성이 확대되고 있다.",tg:["네옴","건설","비전2030"],u:"https://www.thepublic.kr/news/articleView.html?idxno=297696"},
  {id:632,p:7,r:"주요경제",t:"OPEC+, 중동전쟁 종료에 대비해 5월 산유량 20만b/d 확대",k:"OPEC+, 중동전쟁 종료 대비 5월 산유량 20만b/d 확대",s:"에너지경제연구원",c:"korean-view",d:"2026-04-20",m:"KEEI reported OPEC+ agreed to raise oil output by 206,000 barrels per day in May 2026 in preparation for a potential end to the Middle East war, with Korea closely monitoring supply security.",mk:"에너지경제연구원(KEEI)은 OPEC+가 중동전쟁 종료 가능성에 대비해 2026년 5월 산유량을 일일 20만6000배럴 확대하기로 합의했다고 보고했으며, 한국도 공급안보를 면밀히 모니터링 중이다.",tg:["OPEC","한국","공급안보"],u:"https://www.keei.re.kr/pdfOpen?bid=0014&list_no=127247&seq=1"},
  {id:633,p:8,r:"심층분석",t:"중동발 위기 속 원유 수급선 다변화, 한국의 해법은?",k:"중동발 위기 속 원유 수급선 다변화, 한국의 해법은?",s:"뉴스N연합",c:"korean-view",d:"2026-04-18",m:"Korea is pursuing oil supply diversification as Middle East crisis deepens, with 70% of crude and 30% of natural gas imports from the region, exploring US, Africa, and Latin America alternatives.",mk:"한국은 원유 70%, 천연가스 30%를 중동에서 들여오는 가운데 중동발 위기가 심화되면서 원유 수급선 다변화를 추진하고 있으며, 미국·아프리카·남미 대체 공급원을 모색 중이다.",tg:["한국","수급다변화","에너지안보"],u:"https://newsyonhap.com/news/95766"},
  {id:634,p:7,r:"정책발표",t:"정부 &quot;중동발 충격에도 에너지 단기 수급은 안정&quot;…유가 긴급점검",k:"정부 &quot;중동발 충격에도 에너지 단기 수급은 안정&quot;…유가 긴급점검",s:"해사신문",c:"korean-view",d:"2026-04-19",m:"Korean government emergency meeting on oil and gas supply confirmed short-term energy stability despite Middle East shocks, with Industry Ministry monitoring price volatility and supply chain security.",mk:"한국 정부는 석유·가스 수급 긴급점검 회의에서 중동발 충격에도 단기 에너지 수급 안정을 확인했으며, 산업부는 가격 변동성 및 공급망 안보를 면밀히 모니터링 중이다.",tg:["에너지안보","긴급점검","정부"],u:"https://www.ihaesa.com/mobile/article.html?no=89266"},
  {id:635,p:6,r:"심층분석",t:"비전 2030을 향한 한-사우디 프로젝트 성과와 발전",k:"비전 2030을 향한 한-사우디 프로젝트 성과와 발전",s:"KOTRA",c:"korean-view",d:"2026-04-20",m:"KOTRA analyzed Korea-Saudi cooperation progress toward Vision 2030, covering energy, manufacturing, smart infrastructure, healthcare, and SME investment pillars, highlighting evolution amid Saudi strategy shifts.",mk:"KOTRA는 비전 2030을 향한 한-사우디 협력 진전을 분석하며 에너지, 제조업, 스마트 인프라, 보건의료, 중소기업 투자 등 핵심 축을 다루고, 사우디 전략 변경 속 진화를 조명했다.",tg:["KOTRA","비전2030","한-사우디"],u:"https://dream.kotra.or.kr/dream/cms/news/actionOutNewsDetail.do?SITE_NO=2&MENU_ID=3400&CONTENTS_NO=1&pTmplateCd=NT2317&pDataId=223483&bbsSn=242&gbn=In"},
  {id:636,p:7,r:"심층분석",t:"Saudi Arabia economy - outlook 2026: non-oil sector growth drives recovery",k:"사우디 경제 2026 전망: 비석유 부문 성장이 회복 견인",s:"AGBI",c:"saudi",d:"2026-04-18",m:"AGBI analyzed Saudi Arabia economic outlook for 2026, with preliminary FY2025 GDP growth at 4.4% driven by 5.0% non-oil activities growth, while CPI stood at 2.3%, though war-related pressures may push inflation higher.",mk:"AGBI는 사우디의 2026년 경제 전망을 분석했으며, FY2025 예비 GDP 성장률은 비석유 활동 5.0% 성장으로 4.4%를 기록했고 CPI는 2.3%였으나, 전쟁 관련 압력으로 인플레이션이 상승할 수 있다고 전망했다.",tg:["경제전망","비석유","GDP"],u:"https://www.agbi.com/economy/2026/02/saudi-arabia-economy/"},
  {id:637,p:7,r:"주요경제",t:"EIA April 2026 Short-Term Energy Outlook: global oil balances under pressure",k:"EIA 2026년 4월 단기 에너지 전망: 글로벌 원유 수급 압박",s:"EIA",c:"global",d:"2026-04-15",m:"US EIA&apos;s April 2026 Short-Term Energy Outlook analyzes global oil balances under pressure from Middle East disruptions, noting US crude inventories at 461.6 million barrels, about 0.1% above five-year average.",mk:"美 EIA의 2026년 4월 단기 에너지 전망은 중동 차질에 따른 글로벌 원유 수급 압박을 분석하며, 美 원유 재고는 4억6160만 배럴로 5년 평균 대비 약 0.1% 높다고 밝혔다.",tg:["EIA","STEO","재고"],u:"https://www.eia.gov/outlooks/steo/pdf/steo_full.pdf"},
  {id:642,p:9,r:"정책발표",t:"Crown Prince calls for all-out efforts to ensure seamless Hajj operation",k:"왕세자, 원활한 핫즈 운영을 위한 총력 지시",s:"Saudi Gazette",c:"saudi",d:"2026-04-21",m:"Crown Prince and Prime Minister MbS directed all resources be utilized to ensure success of organizational, security, and preventative plans for Hajj 2026, providing the highest-quality services for pilgrims.",mk:"무함마드 빈 살만 왕세자 겸 총리는 2026년 핫즈의 조직·안전·예방 계획 성공을 위해 모든 자원이 동원되도록 지시하며, 순례자에게 최고 수준의 서비스를 제공하라고 명령했다.",tg:["핫즈","순례","정부"],u:"https://saudigazette.com.sa/article/660739"},
  {id:643,p:7,r:"심층분석",t:"Hajj Minister reviews readiness of Mina camps ahead of the pilgrimage season",k:"핫즈 장관, 순례 시즌 앞두고 미나 캠프 준비 상태 점검",s:"Saudi Gazette",c:"saudi",d:"2026-04-21",m:"Hajj Minister inspected Mina camp readiness for Hajj 2026, noting early preparations enhanced operational efficiency. New electronic systems monitor pilgrim movement, regulating entry and exit from the camps.",mk:"핫즈 장관은 2026년 핫즈를 위한 미나 캠프 준비 상태를 점검했으며, 조기 준비로 운영 효율성이 향상됐다고 밝혔다. 새 전자 시스템이 순례자 이동을 모니터링하고 캠프 입출입을 규제한다.",tg:["핫즈","미나","전자시스템"],u:"https://saudigazette.com.sa/article/660742/saudi-arabia/hajj-minister-reviews-readiness-of-mina-camps-ahead-of-hajj-season"},
  {id:645,p:9,r:"헤드라인",t:"Saudi Arabia Condemns Terrorist Plot Targeting the UAE",k:"사우디, UAE 국가 통합·안보 위협 테러 음모 강력 비난",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-21",m:"Saudi Foreign Ministry condemned the terrorist plot targeting UAE national unity and stability, praising the efficiency of UAE security forces in addressing the threat.",mk:"사우디 외무부는 UAE의 국가 통합과 안정을 위협하는 테러 음모를 강력히 비난하고, 위협에 대응한 UAE 보안기관의 효율성을 높이 평가했다.",tg:["테러","UAE","GCC결속"],u:"https://english.aawsat.com/gulf/5265030-saudi-arabia-condemns-terrorist-plot-targeting-uae"},
  {id:646,p:8,r:"주요경제",t:"Saudi Energy Facilities, East-West Pipeline Affected by Attacks Recover and Restore Operational Capacity",k:"사우디 에너지 시설·동서송유관, 공격 피해 복구 후 운영 용량 회복",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-12",m:"Saudi Ministry of Energy announced successful operational restoration of East-West pipeline at full capacity (~7 mbpd), recovering 300,000 bpd Manifa field volumes after attacks during the Iran war.",mk:"사우디 에너지부는 동서송유관을 약 700만 배럴/일 정상 용량으로 완전 복구했으며, 이란 전쟁 중 공격으로 손실된 마니파 유전 30만 배럴/일 생산도 회복했다고 발표했다.",tg:["아람코","동서송유관","복구"],u:"https://english.aawsat.com/business/5261374-saudi-energy-facilities-east-west-pipeline-affected-attacks-recover-and-restore"},
  {id:647,p:7,r:"심층분석",t:"Rapid Recovery of Oil Facilities Reinforces Saudi Arabia Reliability as a Global Energy Supplier",k:"석유시설 신속 복구, 글로벌 에너지 공급자로서 사우디 신뢰도 강화",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-12",m:"The quick recovery reflects high operational resilience and crisis management efficiency of Saudi Aramco and Kingdom energy ecosystem, enhancing reliability and continuity of global energy supplies.",mk:"신속한 복구는 사우디 아람코와 왕국 에너지 생태계 전반의 높은 운영 회복력과 위기 관리 효율성을 반영하며, 글로벌 에너지 공급의 신뢰성과 지속성을 강화한다.",tg:["아람코","회복력","에너지안보"],u:"https://english.aawsat.com/business/5261531-rapid-recovery-oil-facilities-reinforces-saudi-arabia%E2%80%99s-reliability-global-energy"},
  {id:648,p:8,r:"심층분석",t:"Saudi-Pakistani Ties Shift from Coordination to Shaping Stability",k:"사우디-파키스탄 관계, 협력에서 안정 형성 단계로 진화",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-21",m:"Bilateral ties between Riyadh and Islamabad evolve toward strategic partnership in shaping regional stability, with Pakistan playing key mediation role between US and Iran.",mk:"리야드와 이슬라마바드 간 양자 관계는 미국-이란 핵심 중재 역할을 하는 파키스탄과 함께 역내 안정 형성을 위한 전략적 동반자 관계로 진화하고 있다.",tg:["파키스탄","외교","중재"],u:"https://english.aawsat.com/gulf/5263187-saudi-pakistani-ties-shift-coordination-shaping-stability"},
  {id:650,p:8,r:"헤드라인",t:"Aoun: Lebanon Appreciates Saudi Crown Prince Efforts to Promote Regional Stability",k:"아운 대통령: 레바논, 역내 안정 위한 사우디 왕세자 노력에 감사",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-21",m:"Lebanese President Joseph Aoun expressed appreciation for Saudi Crown Prince MbS sustained efforts to promote regional stability and de-escalation amid ongoing tensions, including the Hezbollah-Israel conflict.",mk:"레바논 조셉 아운 대통령은 헤즈볼라-이스라엘 분쟁을 비롯한 긴장 속에서 역내 안정과 긴장 완화 촉진을 위한 사우디 왕세자의 지속적인 노력에 감사를 표했다.",tg:["레바논","외교","안정"],u:"https://english.aawsat.com/arab-world/5262920-aoun-lebanon-appreciates-saudi-crown-prince%E2%80%99s-efforts-promote-regional-stability"},
  {id:651,p:9,r:"속보",t:"Drone intercepted in Saudi Arabia Eastern Province amid latest wave of Iranian strikes",k:"사우디 동부 지역, 최근 이란 공격 와중 드론 요격",s:"Arab News",c:"saudi",d:"2026-04-19",m:"Saudi air defenses intercepted Iranian drones over Eastern Province as Iran resumed wave of attacks; Ministry of Defense reported neutralizing the threat with no casualties or damage to civilian infrastructure.",mk:"사우디 방공망은 이란이 공격 파동을 재개한 가운데 동부 지역에서 이란 드론을 요격했으며, 국방부는 민간 시설 인명 피해나 손상 없이 위협을 무력화했다고 보고했다.",tg:["방공","이란공격","동부지역"],u:"https://www.arabnews.com/node/2636438/saudi-arabia"},
  {id:652,p:8,r:"주요경제",t:"How will SNB fare in Q1 2026",k:"사우디국립은행(SNB), 2026년 1분기 실적 전망은?",s:"Argaam",c:"saudi",d:"2026-04-19",m:"Argaam previews SNB Q1 2026 results expecting solid growth driven by loan portfolio expansion and operational efficiency. Banks aggregate profit edged up to SAR 8.26B in February per SAMA data.",mk:"Argaam은 SAMA 자료 기준 2월 은행 합산 순이익이 82.6억 리얄로 증가한 가운데, 대출 포트폴리오 확장과 운영 효율성에 힘입은 SNB의 2026년 1분기 견조한 성장을 전망했다.",tg:["SNB","은행","실적전망"],u:"https://www.argaam.com/en/reports/quarterly-overview-report-banks/57539"},
  {id:653,p:7,r:"심층분석",t:"Iran resumes drone strikes on Saudi Arabia in larger numbers",k:"이란, 사우디 대상 드론 공격 대규모 재개",s:"Arab News",c:"saudi",d:"2026-04-20",m:"Iran resumed drone strikes against Saudi Arabia in larger numbers despite ongoing US-Iran ceasefire talks. Saudi defenses intercepted over 70 drones in Al-Kharj, Eastern Province, and Riyadh on Monday alone.",mk:"미국-이란 휴전 협상에도 불구하고 이란은 사우디에 대한 드론 공격을 대규모로 재개했다. 사우디 방공망은 월요일 하루에만 알-카르즈, 동부 지역, 리야드에서 70여 대의 드론을 요격했다.",tg:["이란공격","드론","방공"],u:"https://www.arabnews.com/node/2636542/saudi-arabia"},
  {id:654,p:9,r:"헤드라인",t:"UAE busts Iran-linked terror cell, arrests members over plot to destabilise state",k:"UAE, 이란 연계 테러조직 적발…국가 불안정 음모 가담자 체포",s:"Khaleej Times",c:"gulf",d:"2026-04-20",m:"UAE State Security Department dismantled an organisation linked to Iran Velayat-e Faqih doctrine, releasing identities of 27 individuals. Members raised funds through unofficial channels and recruited Emiratis.",mk:"UAE 국가안보부는 이란 발라야트-에-파키 교리와 연계된 조직을 해체하고 27명의 신원을 공개했다. 가담자들은 비공식 경로를 통해 자금을 조달하고 에미라티인을 포섭한 혐의를 받는다.",tg:["UAE","테러","이란"],u:"https://www.khaleejtimes.com/uae/uae-dismantles-terror-cell-arrests-members-irans-wilayat-al-faqih-doctrine"},
  {id:655,p:8,r:"정책발표",t:"Sheikh Abdullah vows UAE will confront extremism in all forms after foiling terrorist plot",k:"셰이크 압둘라, 테러 음모 분쇄 후 UAE의 모든 형태의 극단주의 대응 다짐",s:"The National",c:"gulf",d:"2026-04-21",m:"UAE Foreign Minister Sheikh Abdullah bin Zayed stated UAE will continue to confront extremism in all forms, after the dismantling of the Iran-linked terrorist cell and arrest of its members.",mk:"UAE 외무장관 셰이크 압둘라 빈 자이드는 이란 연계 테러 조직 해체와 가담자 체포 이후 UAE가 모든 형태의 극단주의 대응을 계속할 것이라고 천명했다.",tg:["UAE","외무장관","테러대응"],u:"https://www.thenationalnews.com/news/uae/2026/04/21/sheikh-abdullah-vows-uae-will-confront-extremism-in-all-forms-after-terror-plot-foiled/"},
  {id:657,p:9,r:"속보",t:"Strait of Hormuz shipping traffic at near standstill as US boards Iranian vessel",k:"美, 이란 선박 승선…호르무즈 해협 운항 거의 마비",s:"The National",c:"gulf",d:"2026-04-20",m:"Commercial traffic through Hormuz at virtual standstill after US Central Command boarded Iranian-flagged vessel Touska that failed to comply with warnings, marking most aggressive enforcement under maritime blockade.",mk:"美 중부사령부가 경고에 응하지 않은 이란 국적 선박 투스카호에 승선하면서 호르무즈 해협 상업 운항이 사실상 마비됐으며, 이는 해상 봉쇄 하 가장 공격적인 집행 조치가 됐다.",tg:["호르무즈","봉쇄","미군"],u:"https://www.thenationalnews.com/business/energy/2026/04/20/strait-of-hormuz-shipping-traffic-at-standstill-as-us-boards-iranian-vessel/"},
  {id:658,p:8,r:"주요경제",t:"Oil prices near $100 as Iranian cargo ship seizure escalates Hormuz stand-off",k:"이란 화물선 나포로 호르무즈 대치 격화…유가 100달러 근접",s:"The National",c:"gulf",d:"2026-04-20",m:"Brent crude approaching $100 a barrel as US seizure of Iranian cargo vessel Touska in Gulf of Oman raises supply disruption fears, with hundreds of vessels still trapped inside the Gulf.",mk:"美가 오만 만에서 이란 화물선 투스카호를 나포하면서 공급 차질 우려가 높아져 브렌트유가 배럴당 100달러에 근접했으며, 수백 척의 선박이 여전히 걸프 내부에 갇혀 있다.",tg:["유가","호르무즈","선박나포"],u:"https://www.thenationalnews.com/business/energy/2026/04/20/oil-prices-near-100-as-iranian-cargo-ship-seizure-escalates-hormuz-stand-off/"},
  {id:659,p:7,r:"심층분석",t:"Qatar reaffirms mediation role, calls for global action on Strait of Hormuz crisis",k:"카타르, 중재 역할 재확인…호르무즈 위기 글로벌 대응 촉구",s:"Qatar Tribune",c:"gulf",d:"2026-04-20",m:"Qatar reaffirmed its mediation role in US-Iran talks and called for international action to resolve the Strait of Hormuz crisis, supporting an extension of ceasefire if Islamabad talks fail.",mk:"카타르는 美-이란 협상에서 중재 역할을 재확인하고 호르무즈 위기 해결을 위한 국제적 대응을 촉구했으며, 이슬라마바드 협상 실패 시 휴전 연장 지지 입장을 밝혔다.",tg:["카타르","중재","호르무즈"],u:"https://www.qatar-tribune.com/article/230121/latest-news/qatar-reaffirms-mediation-role-calls-for-global-action-on-strait-of-hormuz-crisis"},
  {id:660,p:7,r:"심층분석",t:"Bahrain condemns Iran-linked terrorist group nabbed in UAE, offers full support",k:"바레인, UAE에서 적발된 이란 연계 테러조직 비난…전폭 지지 표명",s:"Khaleej Times",c:"gulf",d:"2026-04-21",m:"Bahrain strongly condemned the Iran-linked terrorist group dismantled in the UAE and offered full support to Emirati authorities, reinforcing GCC solidarity against external destabilisation attempts.",mk:"바레인은 UAE에서 적발된 이란 연계 테러조직을 강력히 비난하고 에미라티 당국에 전폭적 지지를 표명하며, 외부 불안정 시도에 대한 GCC 결속을 강화했다.",tg:["바레인","UAE","GCC결속"],u:"https://www.khaleejtimes.com/world/gulf/bahrain-condemns-iran-linked-terrorist-group-nabbed-in-uae"},
  {id:661,p:7,r:"심층분석",t:"Iran grip on Strait of Hormuz alarms Gulf states as shipping remains disrupted despite ceasefire",k:"이란의 호르무즈 통제, 휴전에도 운항 차질 계속에 걸프국 우려",s:"Gulf News",c:"gulf",d:"2026-04-19",m:"Gulf states alarmed by Iran continued grip on the Strait of Hormuz despite ceasefire, with over 700 ships still stranded and only 16 vessels recorded crossing on Monday.",mk:"걸프국들은 휴전에도 불구하고 이란이 호르무즈 해협 통제를 지속하는 데 우려를 표하고 있으며, 700척 이상이 여전히 발이 묶이고 월요일 단 16척만 통과한 것으로 기록됐다.",tg:["걸프국","호르무즈","운항차질"],u:"https://gulfnews.com/world/gulf/iran-s-grip-on-strait-of-hormuz-alarms-gulf-states-as-shipping-remains-disrupted-despite-ceasefire-1.500501321"},
  {id:666,p:8,r:"속보",t:"After extending truce, Trump claims Iran collapsing financially over Hormuz closure",k:"휴전 연장 후 트럼프, 호르무즈 봉쇄로 이란 경제 붕괴 주장",s:"The Times of Israel",c:"me",d:"2026-04-22",m:"Trump declared Iran is collapsing financially due to the Hormuz blockade after extending the truce, while Tehran rejected the unilateral extension and said it would act in its national interest.",mk:"트럼프 대통령은 휴전 연장 후 호르무즈 봉쇄로 이란이 &quot;재정적으로 붕괴&quot; 중이라고 선언했으며, 테헤란은 일방적 연장을 거부하고 국익에 따라 행동할 것이라고 밝혔다.",tg:["트럼프","이란경제","봉쇄"],u:"https://www.timesofisrael.com/liveblog-april-22-2026/"},
  {id:667,p:8,r:"심층분석",t:"Iran central bank warns economy may take 12 years to rebuild after war",k:"이란 중앙은행 총재, 전후 경제 재건 12년 소요 경고",s:"Iran International",c:"me",d:"2026-04-13",m:"Iran central bank warned President Pezeshkian that economic damage from 40-day war combined with pre-existing fragility could take up to 12 years to repair. War damage estimated at $270 billion.",mk:"이란 중앙은행은 페제시키안 대통령에게 40일 전쟁의 경제적 피해가 기존 취약성과 결합돼 복구에 최대 12년이 소요될 수 있다고 경고했다. 전쟁 피해는 2700억 달러로 추산된다.",tg:["이란경제","재건","중앙은행"],u:"https://www.iranintl.com/en/202604139864"},
  {id:668,p:7,r:"심층분석",t:"Iran leaders frustrated over failed Hormuz revenue plan",k:"이란 지도부, 호르무즈 수익 계획 실패에 좌절",s:"Iran International",c:"me",d:"2026-04-16",m:"Iran leadership frustrated as plans to monetize Hormuz transit through fees on tankers failed amid US blockade. Over 90% of Iran $109.7B annual trade passes through the strait.",mk:"이란 지도부는 美 봉쇄 속에서 유조선 통행료를 통한 호르무즈 수익화 계획이 실패하면서 좌절감을 표하고 있다. 이란 연간 무역 1097억 달러 중 90% 이상이 해협을 통과한다.",tg:["이란","호르무즈","경제압박"],u:"https://www.iranintl.com/en/202604162208"},
  {id:669,p:7,r:"심층분석",t:"Spain, Slovenia, Ireland push EU to debate Israel pact suspension",k:"스페인·슬로베니아·아일랜드, EU에 이스라엘 협정 정지 토론 촉구",s:"Al Jazeera",c:"me",d:"2026-04-21",m:"Spain, Slovenia, Ireland urged EU foreign ministers in Luxembourg to debate suspending Israel association agreement over Gaza war and West Bank violence; Germany and Italy blocked the bid.",mk:"스페인·슬로베니아·아일랜드는 룩셈부르크 EU 외무장관 회의에서 가자 전쟁과 서안지구 폭력을 이유로 이스라엘 협정 정지 토론을 촉구했으나, 독일과 이탈리아가 이를 차단했다.",tg:["EU","이스라엘","가자"],u:"https://www.aljazeera.com/news/2026/4/21/spain-slovenia-ireland-push-eu-to-debate-israel-pact-suspension"},
  {id:670,p:10,r:"헤드라인",t:"Why President Trump extended his ceasefire with Iran",k:"트럼프 대통령이 이란과의 휴전을 연장한 이유",s:"CNN",c:"global",d:"2026-04-21",m:"Trump extended ceasefire with Iran rather than resume military strikes, awaiting unified proposal from Tehran, despite advisers warning the open-ended extension removes pressure on Iran to negotiate.",mk:"트럼프 대통령은 군사 공격 재개 대신 이란과의 휴전을 연장하며 테헤란의 &quot;통일 제안&quot;을 기다리고 있으나, 무기한 연장이 협상 압박을 제거한다는 보좌진의 경고가 있었다.",tg:["트럼프","휴전","외교"],u:"https://edition.cnn.com/2026/04/21/politics/iran-trump-negotiations-peace-ceasefire"},
  {id:674,p:9,r:"주요경제",t:"Oil Rallies as US Vow to Blockade Iran Heightens Supply Risks",k:"美 이란 봉쇄 다짐으로 공급 리스크 고조…유가 급등",s:"Bloomberg",c:"global",d:"2026-04-12",m:"Oil prices rallied as US Treasury Secretary vowed continued naval blockade on Iranian ports. Brent traded near $96/bbl, with the blockade in enforcement phase since April 13.",mk:"美 재무장관이 이란 항구에 대한 해군 봉쇄 지속을 다짐하면서 유가가 급등했다. 브렌트유는 배럴당 약 96달러에 거래됐으며, 봉쇄는 4월 13일부터 집행 단계에 들어섰다.",tg:["유가","봉쇄","이란"],u:"https://www.bloomberg.com/news/articles/2026-04-12/latest-oil-market-news-and-analysis-for-april-13"},
  {id:675,p:9,r:"헤드라인",t:"Top Oil Traders Say Billion-Barrel Shock to Echo Long After War",k:"주요 원유 트레이더, 10억 배럴 충격이 종전 후에도 장기 영향",s:"Bloomberg",c:"global",d:"2026-04-21",m:"Top oil traders warn the war impact will continue for months even after Hormuz reopens; some say flows may never return to normal. Strait closure reduces global oil flows by ~11 mbpd, leaving 9 mbpd shortfall.",mk:"주요 원유 트레이더들은 호르무즈 재개통 후에도 전쟁 영향이 수개월 지속될 것이며, 일부는 흐름이 결코 정상 회복되지 않을 것이라 경고한다. 해협 폐쇄로 글로벌 원유 흐름이 약 1100만 배럴/일 감소했고 900만 배럴/일 부족이 발생했다.",tg:["원유트레이더","오일쇼크","글로벌"],u:"https://www.bloomberg.com/news/articles/2026-04-21/top-traders-say-billion-barrel-oil-shock-to-echo-long-after-war"},
  {id:676,p:8,r:"주요경제",t:"World Economy Latest: IMF Trims Global Growth Projections on Oil Shock",k:"세계경제 최신: IMF, 오일쇼크로 세계 성장률 전망 하향",s:"Bloomberg",c:"global",d:"2026-04-18",m:"IMF cut 2026 global growth forecast to 3.1% from January 3.3%, raising inflation estimate to 4.4% reflecting higher energy and food prices. Worst case scenario sees growth at 2% if war drags on.",mk:"IMF는 2026년 세계 성장률 전망을 1월의 3.3%에서 3.1%로 하향하고, 에너지·식료품 가격 상승을 반영해 인플레이션 추정치를 4.4%로 상향했다. 전쟁 장기화 시 최악의 시나리오 성장률은 2%다.",tg:["IMF","세계경제","오일쇼크"],u:"https://www.bloomberg.com/news/articles/2026-04-18/world-economy-latest-imf-trims-global-growth-projections-on-oil-shock"},
  {id:677,p:8,r:"심층분석",t:"Iran War Shock Has IMF Cutting Growth Outlook for Gulf Oil States",k:"이란 전쟁 충격으로 IMF, 걸프 산유국 성장 전망 하향",s:"Bloomberg",c:"global",d:"2026-04-16",m:"IMF slashed growth outlook for Gulf oil states due to Iran war shock. UAE 2026 growth cut to 3.1%, Saudi Arabia and other oil exporters facing infrastructure damage and disrupted exports.",mk:"IMF는 이란 전쟁 충격으로 걸프 산유국 성장 전망을 큰 폭으로 하향했다. UAE 2026년 성장률은 3.1%로 인하됐고, 사우디 등 산유국들은 인프라 피해와 수출 차질에 직면하고 있다.",tg:["IMF","걸프","산유국"],u:"https://www.bloomberg.com/news/articles/2026-04-16/imf-slashes-growth-outlook-for-gulf-oil-states-on-iran-war-shock"},
  {id:679,p:8,r:"주요경제",t:"Hormuz Shipping Disruptions Show No End as Trump Extends Ceasefire, Maintains Blockade",k:"트럼프 휴전 연장 및 봉쇄 유지로 호르무즈 운항 차질 지속",s:"gCaptain",c:"global",d:"2026-04-22",m:"Hormuz shipping disruptions show no end as Trump extends ceasefire while maintaining US maritime blockade. US forces to continue the blockade and remain ready while talks take shape.",mk:"트럼프가 美 해상 봉쇄를 유지하며 휴전을 연장하면서 호르무즈 운항 차질은 끝이 보이지 않는다. 美군은 협상이 형성되는 동안 &quot;봉쇄를 계속하고&quot; 준비태세를 유지할 예정이다.",tg:["호르무즈","봉쇄","휴전"],u:"https://gcaptain.com/hormuz-disruptions-show-no-end-as-trump-extends-ceasefire-maintains-blockade/"},
  {id:680,p:7,r:"주요경제",t:"Latest Oil Market News and Analysis for April 22",k:"4월 22일 최신 석유 시장 뉴스 및 분석",s:"Bloomberg",c:"global",d:"2026-04-21",m:"Bloomberg daily oil market roundup: Oil held two-day gain after Trump extended ceasefire with Iran, even as peace talks faltered and Hormuz blockade kept flows locked up.",mk:"블룸버그 일일 석유 시장 정리: 평화 협상이 흔들리고 호르무즈 봉쇄로 흐름이 막힌 가운데, 트럼프가 이란과의 휴전을 연장한 후 유가는 이틀 연속 상승세를 유지했다.",tg:["유가","시장분석","일일"],u:"https://www.bloomberg.com/news/articles/2026-04-21/latest-oil-market-news-and-analysis-for-april-22"},
  {id:681,p:8,r:"심층분석",t:"Trump craving for the spotlight risks Iran deal hopes",k:"트럼프의 스포트라이트 갈망이 이란 합의 전망 위협",s:"CNN",c:"global",d:"2026-04-21",m:"CNN analysis: Trump public statements about ceasefire conditions risk derailing Iran deal hopes; the open-ended extension without clear end date removes pressure on Tehran to negotiate.",mk:"CNN 분석: 트럼프의 휴전 조건에 대한 공개 발언이 이란 합의 전망을 위태롭게 한다. 명확한 종료 시점이 없는 무기한 연장은 협상 압박을 제거한다.",tg:["트럼프","이란합의","분석"],u:"https://us.cnn.com/2026/04/21/politics/trump-iran-ceasefire-talks-social-media-analysis"},
  {id:682,p:9,r:"헤드라인",t:"트럼프 이란 제안 올때까지 휴전 연장…해상봉쇄 계속",k:"트럼프 이란 제안 올때까지 휴전 연장…해상봉쇄 계속",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-22",m:"Trump declared he will extend the ceasefire indefinitely until Iran submits a unified proposal, while maintaining the US naval blockade on Iranian ports.",mk:"트럼프 대통령은 이란이 통일된 제안을 제출할 때까지 사실상 무기한 휴전을 연장하면서, 이란 항구에 대한 美 해군 봉쇄는 계속 유지하겠다고 선언했다.",tg:["트럼프","휴전","봉쇄"],u:"https://www.fnnews.com/news/202604220534166551"},
  {id:683,p:9,r:"주요경제",t:"유가, 다시 100달러 눈앞…미·이란 협상 지연에 상승 압박",k:"유가, 다시 100달러 눈앞…미·이란 협상 지연에 상승 압박",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-22",m:"Brent crude approaches $100/bbl again as US-Iran negotiation delays push prices higher. Korean refiners and importers face ongoing supply chain pressure from Hormuz disruption.",mk:"美-이란 협상 지연으로 브렌트유가 다시 배럴당 100달러에 근접했다. 한국 정유사와 수입업체는 호르무즈 차질로 공급망 압박을 계속 받고 있다.",tg:["유가","협상","수급"],u:"https://www.fnnews.com/news/202604220512534337"},
  {id:684,p:8,r:"속보",t:"美 재무 이란 항구 봉쇄 지속할 것…해상 무역 압박",k:"美 재무 이란 항구 봉쇄 지속할 것…해상 무역 압박",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-22",m:"US Treasury Secretary Bessent stated on X that the US Navy will continue blockade of Iranian ports, signaling sustained economic pressure on Iran maritime trade as ceasefire is extended.",mk:"美 재무장관 베센트는 X(엑스)에 美 해군이 이란 항구 봉쇄를 계속할 것이라며, 휴전 연장에도 이란 해상 무역에 대한 지속적인 경제 압박을 시사했다.",tg:["美재무","봉쇄","이란"],u:"https://www.fnnews.com/news/202604220803159733"},
  {id:685,p:8,r:"심층분석",t:"美, 무기한 휴전에도 이란 경제 공격...석유 생산 멈출 수도",k:"美, 무기한 휴전에도 이란 경제 공격...석유 생산 멈출 수도",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-22",m:"Despite indefinite ceasefire extension, US continues economic attacks on Iran. Tehran may have to halt oil production due to mounting pressure from blockade and tightening financial squeeze.",mk:"美는 무기한 휴전 연장에도 불구하고 이란에 대한 경제 공격을 계속하고 있다. 봉쇄와 금융 압박 가중으로 테헤란이 석유 생산을 중단해야 할 수도 있다.",tg:["이란","경제압박","석유"],u:"https://www.fnnews.com/news/202604220911025423"},
  {id:686,p:8,r:"주요경제",t:"대규모 흑자 전망에도 정유업계 전전긍긍, 역풍 우려",k:"대규모 흑자 전망에도 정유업계 전전긍긍, 역풍 우려",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-21",m:"Korean refiners face concerns despite expected large surpluses, fearing headwinds from prolonged Hormuz disruption. Refining margins are improving but supply security remains the priority.",mk:"한국 정유업계는 대규모 흑자 전망에도 호르무즈 차질 장기화에 따른 역풍을 우려하고 있다. 정제마진은 개선되고 있으나 공급 안정성이 최우선 과제로 남아 있다.",tg:["정유사","흑자","수급우려"],u:"https://www.fnnews.com/news/202604211250495039"},
  {id:687,p:7,r:"심층분석",t:"모호한 협상 경로, 월가는 감당 가능…진짜 문제는 이것",k:"모호한 협상 경로, 월가는 감당 가능…진짜 문제는 이것",s:"한국경제",c:"korean-view",d:"2026-04-21",m:"Hankyung analysis: Wall Street can manage uncertain US-Iran negotiation path, but the real concern is structural changes in oil markets and long-term supply chain reconfiguration.",mk:"한국경제 분석: 월가는 모호한 美-이란 협상 경로를 감당할 수 있지만, 진짜 문제는 석유 시장의 구조적 변화와 장기 공급망 재편이다.",tg:["월가","협상","공급망"],u:"https://www.hankyung.com/article/202604214301i"},
  {id:688,p:8,r:"심층분석",t:"호르무즈 대체재 얀부항 포화…원유 선적 번호표 뽑고 대기",k:"호르무즈 대체재 얀부항 포화…원유 선적 번호표 뽑고 대기",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-15",m:"Saudi Yanbu port (Hormuz alternative) saturated with vessels waiting in queue for crude loading. Aramco rationing slots based on priority criteria amid surge in global customer demand.",mk:"사우디 얀부항(호르무즈 대체재)은 원유 선적을 위해 대기 중인 선박들로 포화 상태다. 아람코는 글로벌 고객 수요 급증 속 자체 우선순위 기준에 따라 슬롯을 제한 배정하고 있다.",tg:["얀부항","수급차질","우회로"],u:"https://www.fnnews.com/news/202604150701106763"},
  {id:689,p:10,r:"헤드라인",t:"Saudi Crown Prince, Syrian President al-Sharaa discuss regional developments in Jeddah",k:"사우디 왕세자, 시리아 알-샤라 대통령과 제다에서 지역 현안 논의",s:"Saudi Gazette",c:"saudi",d:"2026-04-22",m:"Saudi Crown Prince Mohammed bin Salman held talks with Syrian President Ahmed al-Sharaa in Jeddah on Tuesday, discussing economic and investment ties as well as regional connectivity projects.",mk:"무함마드 빈 살만 왕세자는 화요일 제다에서 아흐메드 알-샤라 시리아 대통령과 회담을 갖고 경제·투자 관계와 지역 연결성 프로젝트를 논의했다.",tg:["왕세자","시리아","제다"],u:"https://saudigazette.com.sa/article/660740/saudi-arabia/saudi-crown-prince-syrian-president-discuss-regional-developments-in-jeddah"},
  {id:691,p:9,r:"정책발표",t:"Aoun thanks Saudi Crown Prince for continued support to Lebanon in phone call",k:"레바논 아운 대통령, 사우디 왕세자에 지속 지원 사의 표명",s:"Saudi Gazette",c:"saudi",d:"2026-04-22",m:"Lebanese President Joseph Aoun telephoned Saudi Crown Prince Mohammed bin Salman to thank him for the Kingdom&apos;s continued support and discussed the latest regional developments.",mk:"레바논 조셉 아운 대통령은 무함마드 빈 살만 왕세자에게 전화를 걸어 사우디의 지속적인 지원에 감사를 표하고 역내 최근 정세를 논의했다.",tg:["레바논","아운","외교"],u:"https://saudigazette.com.sa/article/660741/saudi-arabia/aoun-thanks-for-continued-saudi-support-to-lebanon-in-call-with-crown-prince"},
  {id:692,p:8,r:"정책발표",t:"Saudi Arabia restores 614,000 hectares, surpasses 60% of national environmental milestone",k:"사우디, 614,000헥타르 복원…국가 환경 목표 60% 초과 달성",s:"Saudi Gazette",c:"saudi",d:"2026-04-22",m:"The King Abdulaziz Royal Reserve Development Authority announced Saudi Arabia has rehabilitated more than 614,000 hectares of vegetated land, surpassing 60% of the first one-million-hectare national target.",mk:"킹 압둘아지즈 왕립보호구역개발청은 사우디아라비아가 식생지 61만 4,000헥타르 이상을 복원해 1차 100만 헥타르 목표의 60%를 돌파했다고 발표했다.",tg:["환경복원","비전2030","녹화"],u:"https://saudigazette.com.sa/article/660751/saudi-arabia/saudi-arabia-restores-614000-hectares-surpasses-60-of-national-milestone"},
  {id:693,p:9,r:"주요경제",t:"Saudi cabinet backs PIF strategy, approves tax pact and cross-border deals",k:"사우디 내각, PIF 신전략 지지…조세협정·국경 간 거래 승인",s:"Arab News",c:"saudi",d:"2026-04-22",m:"Saudi Cabinet endorsed PIF&apos;s 2026-2030 strategy and approved a series of international tax agreements and cross-border investment deals to bolster economic diversification.",mk:"사우디 내각은 PIF 2026-2030 전략을 지지하고, 경제 다각화 강화를 위한 국제 조세협정과 다수의 국경 간 투자 협약을 승인했다.",tg:["내각","PIF","조세협정"],u:"https://www.arabnews.com/node/2640829/amp"},
  {id:694,p:8,r:"주요경제",t:"PIF anchors State Street&apos;s newly launched Saudi equity ETF",k:"PIF, State Street 신규 사우디 주식 ETF의 앵커 투자자로 참여",s:"PIF",c:"saudi",d:"2026-04-22",m:"PIF announced it is anchoring State Street&apos;s newly launched Saudi Arabia Enhanced Active Equity UCITS ETF, expanding international investor access to Saudi capital markets.",mk:"PIF는 State Street가 신규 출시한 Saudi Arabia Enhanced Active Equity UCITS ETF의 앵커 투자자로 참여한다고 밝혔다. 해외 투자자의 사우디 자본시장 접근성 확대가 기대된다.",tg:["PIF","ETF","자본시장"],u:"https://www.pif.gov.sa/en/news-and-insights/press-releases/2026/chaired-by-hrh-crown-prince-pif-board-of-directors-approves-pif-2026-2030-strategy/"},
  {id:695,p:8,r:"정책발표",t:"Saudi, Dutch foreign ministers discuss regional developments, maritime security",k:"사우디·네덜란드 외교장관, 역내 정세·해상 안보 논의",s:"Arab News",c:"saudi",d:"2026-04-22",m:"Saudi FM Prince Faisal bin Farhan and Dutch FM discussed regional developments and efforts to maintain the security of international waterways amid continued Gulf tensions.",mk:"파이살 빈 파르한 사우디 외교장관과 네덜란드 외교장관이 역내 정세와 걸프 긴장 속 국제 수로 안전 유지 노력을 논의했다.",tg:["외교장관","네덜란드","해상안보"],u:"https://www.arabnews.com/saudiarabia"},
  {id:696,p:8,r:"심층분석",t:"Saudi minister says railway link study with Turkey via Jordan, Syria to be completed soon",k:"사우디, 요르단·시리아 경유 터키 연결 철도 연구 조만간 완료",s:"Arab News",c:"saudi",d:"2026-04-22",m:"Saudi Minister of Transport announced that a feasibility study for a railway corridor linking Saudi Arabia with Turkey via Jordan and Syria is nearing completion, marking a major regional connectivity initiative.",mk:"사우디 교통부 장관은 사우디와 터키를 요르단·시리아 경유로 연결하는 철도 회랑 타당성 연구가 조만간 완료된다고 발표했다. 주요 역내 연결 이니셔티브로 평가된다.",tg:["철도","연결성","터키"],u:"https://www.arabnews.com/node/2640773/saudi-arabia"},
  {id:697,p:9,r:"헤드라인",t:"Chaired by HRH Crown Prince, PIF Board of Directors approves PIF 2026-2030 strategy",k:"왕세자 주재 PIF 이사회, 2026-2030 전략 승인",s:"PIF",c:"saudi",d:"2026-04-15",m:"PIF Board of Directors, chaired by Crown Prince Mohammed bin Salman, approved the fund&apos;s 2026-2030 strategy focused on Vision, Strategic and Financial portfolios, with six priority ecosystems and sustained value creation.",mk:"무함마드 빈 살만 왕세자가 주재한 PIF 이사회는 비전·전략·금융 3대 포트폴리오와 6대 우선 생태계, 지속가능 가치창출에 초점을 맞춘 2026-2030 전략을 승인했다.",tg:["PIF","전략","왕세자"],u:"https://www.pif.gov.sa/en/news-and-insights/press-releases/2026/chaired-by-hrh-crown-prince-pif-board-of-directors-approves-pif-2026-2030-strategy/"},
  {id:698,p:9,r:"주요경제",t:"Saudi Arabia extends $5bn deposit and adds $3bn support for Pakistan",k:"사우디, 파키스탄에 50억달러 예치 연장·추가 30억달러 지원",s:"Al Arabiya",c:"saudi",d:"2026-04-15",m:"Saudi Arabia extended its existing $5 billion deposit at the State Bank of Pakistan for a longer term and pledged an additional $3 billion in financial support, bringing total backing to $8 billion.",mk:"사우디는 파키스탄 중앙은행(SBP) 기 예치금 50억달러의 만기를 장기화하고, 추가 30억달러 금융 지원을 약속해 총 80억달러 규모로 확대했다.",tg:["파키스탄","예치금","재정지원"],u:"https://english.alarabiya.net/News/saudi-arabia/2026/04/16/saudi-arabia-extends-8-billion-support-to-pakistan-boosting-economic-stability"},
  {id:699,p:8,r:"주요경제",t:"Pakistan central bank receives second tranche of $1 billion from Saudi Arabia",k:"파키스탄 중앙은행, 사우디 2차 분납 10억달러 수령",s:"Arab News",c:"saudi",d:"2026-04-21",m:"State Bank of Pakistan confirmed receipt of the second $1 billion tranche from Saudi Arabia under the new $3 billion support package, following a first $2 billion tranche disbursed earlier.",mk:"파키스탄 중앙은행(SBP)은 신규 30억달러 지원 패키지 중 사우디의 2차 분납 10억달러를 수령했다고 확인했다. 앞서 1차 20억달러는 이미 입금됐다.",tg:["파키스탄","분납","중앙은행"],u:"https://www.arabnews.com/node/2640665/amp"},
  {id:700,p:8,r:"주요경제",t:"Saudi Arabia&apos;s economy to grow by 4.5% in 2026 on non-oil gains, report says",k:"사우디 경제, 비석유 부문 견인으로 2026년 4.5% 성장 전망",s:"Arab News",c:"saudi",d:"2026-04-20",m:"Standard Chartered Global Research expects Saudi GDP to expand 4.5% in 2026, outperforming the global 3.4% average, with non-oil sector also growing at 4.5% on strong investment and consumption.",mk:"스탠다드차타드 글로벌 리서치는 2026년 사우디 GDP가 4.5% 성장해 세계 평균(3.4%)을 상회할 것으로 전망했다. 비석유 부문도 투자·소비 호조로 4.5% 성장이 예상된다.",tg:["GDP","비석유","전망"],u:"https://www.arabnews.com/node/2628458/business-economy"},
  {id:702,p:7,r:"주요경제",t:"Saudi POS spending opens 2026 with a 31% surge: SAMA",k:"사우디 POS 지출, 2026년 31% 급증 출발: SAMA",s:"Arab News",c:"saudi",d:"2026-04-16",m:"SAMA reported Saudi point-of-sale (POS) spending surged 31% year-on-year in the opening period of 2026, reflecting strong consumer activity aligned with Vision 2030 non-oil objectives.",mk:"SAMA(사우디 중앙은행)에 따르면 2026년 초 POS 지출액이 전년 대비 31% 급증했다. 비전 2030의 비석유 목표와 부합하는 강한 소비 활동을 반영한다.",tg:["SAMA","POS","소비"],u:"https://www.arabnews.com/node/2628740/business-economy"},
  {id:703,p:8,r:"헤드라인",t:"Sudan&apos;s military chief meets Saudi Crown Prince in Jeddah",k:"수단 군 사령관, 제다서 사우디 왕세자와 회동",s:"Africanews",c:"saudi",d:"2026-04-21",m:"Saudi Crown Prince Mohammed bin Salman met with Sudan&apos;s army chief Abdel Fattah al-Burhan in Jeddah to discuss the Sudanese conflict, humanitarian needs, and diplomatic efforts to reach a ceasefire.",mk:"무함마드 빈 살만 왕세자가 수단 군 사령관 압델 파타 알-부르한과 제다에서 만나 수단 분쟁, 인도적 수요, 휴전을 위한 외교 노력을 논의했다.",tg:["수단","알부르한","중재"],u:"https://www.africanews.com/2026/04/21/sudans-military-chief-meets-saudi-crown-prince-in-jeddah/"},
  {id:704,p:7,r:"주요경제",t:"Saudi CEDA reviews Vision 2030 progress",k:"사우디 CEDA, 비전 2030 진행 상황 점검",s:"Asharq Al-Awsat",c:"saudi",d:"2026-04-20",m:"The Council of Economic and Development Affairs (CEDA) reviewed Vision 2030 progress, highlighting recalibration priorities toward AI infrastructure and sustaining value creation.",mk:"사우디 경제개발위원회(CEDA)는 비전 2030 진행 상황을 점검하며 AI 인프라와 지속가능 가치창출로의 우선순위 조정을 강조했다.",tg:["CEDA","비전2030","AI"],u:"https://english.aawsat.com/business/5263509-saudi-ceda-reviews-vision-2030-progress"},
  {id:706,p:8,r:"헤드라인",t:"Syria&apos;s president arrives in Qatar for talks after Saudi Arabia visit",k:"시리아 대통령, 사우디 방문 후 카타르 도착",s:"Al Jazeera",c:"gulf",d:"2026-04-22",m:"Syrian President Ahmed al-Sharaa arrived in Doha on Wednesday for talks with Qatar&apos;s leadership after meeting Saudi Arabia&apos;s crown prince a day earlier, continuing his Gulf diplomatic tour.",mk:"아흐메드 알-샤라 시리아 대통령이 전날 사우디 왕세자를 면담한 데 이어 수요일 도하에 도착해 카타르 지도부와 회담했다. 걸프 외교 순방의 연장선이다.",tg:["카타르","시리아","도하"],u:"https://www.aljazeera.com/news/"},
  {id:707,p:7,r:"주요경제",t:"UAE economy continues ascent with robust growth in early 2026",k:"UAE 경제, 2026년 초 견조한 성장세 지속",s:"Khaleej Times",c:"gulf",d:"2026-04-20",m:"UAE economy maintained its upward trajectory in early 2026, supported by banking sector strength (+1.1% assets to AED 5.47tn) and rising foreign trade, according to the UAE Central Bank.",mk:"UAE 중앙은행에 따르면 UAE 경제는 2026년 초에도 상승세를 유지했다. 은행 부문 호조(자산 1.1% 증가, 5.47조 디르함)와 무역 확대가 뒷받침했다.",tg:["UAE","성장","은행"],u:"https://www.khaleejtimes.com/business/economy/uae-economic-expansion-set-to-scale-new-highs-in-2026"},
  {id:708,p:7,r:"주요경제",t:"Dubai real estate: 10,776 building permits issued in Q1 2026, up 12% YoY",k:"두바이 부동산, 1분기 건축허가 10,776건…전년비 12% 증가",s:"Khaleej Times",c:"gulf",d:"2026-04-18",m:"Dubai Municipality issued 10,776 building permits in Q1 2026, up 12% year-on-year, with total permitted built-up area reaching 3.9 million square metres amid sustained investment flows.",mk:"두바이 시는 1분기에 10,776건의 건축허가를 발급해 전년비 12% 증가했다. 총 허가 건축면적은 390만㎡에 달했다.",tg:["두바이","부동산","건축허가"],u:"https://www.khaleejtimes.com/business/property/why-the-uaes-and-dubais-fundamentals-continue-to-outperform-global-uncertainty"},
  {id:709,p:7,r:"속보",t:"Oman Air to resume Dubai, Bahrain and Khasab flights",k:"오만항공, 두바이·바레인·카사브 노선 운항 재개",s:"Khaleej Times",c:"gulf",d:"2026-04-21",m:"Oman Air announced resumption of flights to Dubai, Bahrain and Khasab as regional airspace gradually normalizes, though some other Gulf routes remain suspended until end of April.",mk:"오만항공은 역내 공역 정상화에 따라 두바イ·바레인·카사브 노선 운항을 재개한다고 발표했다. 일부 걸프 노선은 4월 말까지 중단이 유지된다.",tg:["오만항공","운항재개","항공"],u:"https://www.khaleejtimes.com/"},
  {id:710,p:7,r:"정책발표",t:"Dubai Chamber reports 2,709 new companies registered in March 2026",k:"두바이 상공회의소, 3월 신규 법인 2,709개 등록",s:"Gulf News",c:"gulf",d:"2026-04-19",m:"Dubai Chamber of Commerce reported the addition of 2,709 new companies in March 2026, with more than 95% of Dubai&apos;s GDP now derived from non-oil sectors.",mk:"두바이 상공회의소에 따르면 3월에 2,709개 신규 법인이 등록됐다. 두바이 GDP의 95% 이상이 비석유 부문에서 창출되고 있다.",tg:["두바이","상공회의소","비석유"],u:"https://gulfnews.com/business/economy"},
  {id:711,p:10,r:"헤드라인",t:"Iran war: What&apos;s happening on day 54 as Trump extends ceasefire",k:"이란전쟁 54일째…트럼프, 휴전 연장",s:"Al Jazeera",c:"me",d:"2026-04-22",m:"Day 54 of the US-Israel war on Iran sees Trump extending the ceasefire until Tehran submits a unified proposal. US naval blockade on Iran&apos;s ports remains in place while Strait of Hormuz is still contested.",mk:"美-이스라엘의 對이란 전쟁 54일째, 트럼프 대통령이 테헤란의 통일안 제출 시까지 휴전을 연장했다. 美의 이란 항구 해상 봉쇄는 유지되며 호르무즈 해협 긴장도 지속된다.",tg:["이란전쟁","휴전연장","호르무즈"],u:"https://www.aljazeera.com/news/2026/4/22/iran-war-whats-happening-on-day-54-as-trump-extends-ceasefire"},
  {id:712,p:9,r:"헤드라인",t:"Israeli attacks on Lebanon kill at least five people, including journalist",k:"이스라엘의 레바논 공격, 언론인 포함 최소 5명 사망",s:"Al Jazeera",c:"me",d:"2026-04-22",m:"Israeli strikes on southern Lebanon killed at least five people including Al Akhbar journalist Amal Khalil, further straining the fragile Hezbollah-Israel ceasefire.",mk:"레바논 남부를 겨냥한 이스라엘 공습으로 알 악바르 소속 기자 아말 칼릴을 포함해 최소 5명이 사망했다. 헤즈볼라-이스라엘 간 휴전이 더욱 위태로워졌다.",tg:["레바논","이스라엘","언론인"],u:"https://www.aljazeera.com/news/2026/4/22/at-least-four-killed-in-israeli-strikes-on-lebanon-journalists-wounded"},
  {id:713,p:9,r:"심층분석",t:"Iran&apos;s leaders debate war and peace after Trump ceasefire extension",k:"트럼프 휴전연장 후 이란 지도부, 전쟁·평화 놓고 내부 격론",s:"Al Jazeera",c:"me",d:"2026-04-22",m:"Iranian leadership is openly debating whether to pursue peace talks or prepare for renewed conflict, with state media organizing military parades while officials signal openness to negotiation.",mk:"이란 지도부는 평화 협상 추진과 재개전 대비를 놓고 공개 격론 중이다. 국영매체가 군사 퍼레이드를 주관하는 한편 당국자들은 협상 의사를 내비치고 있다.",tg:["이란","지도부","협상"],u:"https://www.aljazeera.com/news/2026/4/22/irans-leaders-debate-war-and-peace-after-trump-ceasefire-extension"},
  {id:716,p:8,r:"속보",t:"Iran war updates: Israel attacks increase in Lebanon; ships taken in Hormuz",k:"이란전쟁 업데이트: 이스라엘, 레바논 공격 증가…호르무즈서 선박 나포",s:"Al Jazeera",c:"me",d:"2026-04-22",m:"Live blog reports intensifying Israeli strikes in Lebanon and new incidents of ships being seized in the Strait of Hormuz amid Trump&apos;s ceasefire extension dispute with Tehran.",mk:"알자지라 실시간 블로그에 따르면 이스라엘의 레바논 공격이 격화되고 호르무즈 해협에서 선박 나포 사건이 추가 발생했다. 트럼프-테헤란 간 휴전 분쟁 와중이다.",tg:["호르무즈","레바논","나포"],u:"https://www.aljazeera.com/news/liveblog/2026/4/22/iran-war-live-trump-says-ceasefire-extended-as-talks-with-tehran-in-limbo"},
  {id:718,p:10,r:"헤드라인",t:"Current price of oil as of April 22, 2026: Brent briefly tops $100 then retreats",k:"4월 22일 국제유가: 브렌트 100달러 돌파 후 되밀림",s:"Fortune",c:"global",d:"2026-04-22",m:"At 9 a.m. ET on April 22, Brent crude touched $101.14/bbl before retreating to $98.36 as talks between US and Iran stalled and Strait of Hormuz shipping remained largely halted.",mk:"4월 22일 오전 9시(美 동부) 브렌트유는 배럴당 101.14달러를 기록 후 98.36달러로 되밀렸다. 美-이란 협상 교착과 호르무즈 해협 통항 중단이 변동성을 키웠다.",tg:["유가","브렌트","호르무즈"],u:"https://fortune.com/article/price-of-oil-04-22-2026/"},
  {id:720,p:9,r:"주요경제",t:"Saudi Arabia says East-West pipeline restored to full capacity",k:"사우디, 동서 송유관 완전 가동 재개",s:"Bloomberg",c:"global",d:"2026-04-12",m:"Saudi Arabia restored the East-West oil pipeline to its full pumping capacity of approximately 7 million barrels a day, following the attacks that had curtailed throughput by 700,000 bpd earlier in April.",mk:"사우디가 4월 초 공격으로 일일 70만 배럴 감소됐던 동서 송유관을 일일 약 700만 배럴의 완전 용량으로 복구했다.",tg:["송유관","복구","사우디"],u:"https://www.bloomberg.com/news/articles/2026-04-12/saudi-arabia-says-east-west-pipeline-restored-to-full-capacity"},
  {id:721,p:9,r:"심층분석",t:"Iran War: Saudi Arabia oil output capacity cut 600,000 barrels a day",k:"이란전쟁: 사우디 원유 생산 능력 일일 60만 배럴 감축",s:"Bloomberg",c:"global",d:"2026-04-09",m:"Bloomberg reports Saudi oil output capacity reduced by 600,000 bpd after attacks on critical energy infrastructure in Riyadh, Eastern Province and Yanbu Industrial City during Iran war.",mk:"블룸버그에 따르면 이란전쟁 중 리야드·동부주·얀부 공단 내 핵심 에너지 인프라 공격으로 사우디 원유 생산 능력이 일일 60만 배럴 감축됐다.",tg:["생산능력","공격","사우디"],u:"https://www.bloomberg.com/news/articles/2026-04-09/saudi-oil-output-capacity-cut-600-000-barrels-a-day-in-attacks"},
  {id:722,p:8,r:"주요경제",t:"Saudi Arabia maintains oil exports from key Red Sea port for now",k:"사우디, 핵심 홍해항 원유 수출 유지",s:"Bloomberg",c:"global",d:"2026-04-10",m:"Saudi Arabia is maintaining oil exports from Yanbu on the Red Sea coast for now, relieving some pressure on global crude supply while the Strait of Hormuz remains disrupted.",mk:"사우디는 홍해 얀부에서 원유 수출을 유지함으로써 호르무즈 차질 속 글로벌 원유 공급에 일시적 안도감을 제공하고 있다.",tg:["얀부","홍해","수출"],u:"https://www.bloomberg.com/news/articles/2026-04-10/saudi-maintains-oil-exports-from-key-red-sea-port-for-now"},
  {id:723,p:8,r:"주요경제",t:"Saudi&apos;s PIF Board approves PIF 2026-2030 strategy",k:"사우디 PIF 이사회, 2026-2030 전략 승인",s:"Reuters",c:"global",d:"2026-04-15",m:"Reuters reports PIF Board chaired by Crown Prince Mohammed bin Salman approved its 2026-2030 strategy, reorganizing $1tn+ in assets around three portfolios and six priority ecosystems with AI focus.",mk:"로이터에 따르면 무함마드 빈 살만 왕세자가 주재한 PIF 이사회가 1조달러 이상의 자산을 3대 포트폴리오·6대 우선 생태계·AI 중점으로 재편하는 2026-2030 전략을 승인했다.",tg:["PIF","Reuters","AI"],u:"https://www.tradingview.com/news/reuters.com,2026:newsml_FWN40Y0HH:0-saudi-s-pif-board-approves-pif-2026-2030-strategy/"},
  {id:724,p:8,r:"주요경제",t:"Saudi sovereign wealth fund sells 70% stake in Al-Hilal soccer club",k:"사우디 PIF, 알-힐랄 축구 클럽 지분 70% 매각",s:"Washington Times",c:"global",d:"2026-04-17",m:"Public Investment Fund signed an agreement for Kingdom Holding Company (KHC) to acquire 70% of Al-Hilal Club Company, reflecting PIF&apos;s new strategy to optimize capital allocation.",mk:"PIF는 킹덤 홀딩 컴퍼니(KHC)가 알-힐랄 클럽 지분 70%를 인수하는 계약을 체결했다. 자본 배분 최적화를 지향한 PIF 신전략의 일환이다.",tg:["알힐랄","킹덤홀딩","매각"],u:"https://www.washingtontimes.com/news/2026/apr/17/saudi-sovereign-wealth-fund-sells-70-stake-al-hilal-soccer-club/"},
  {id:725,p:7,r:"정책발표",t:"PM meeting with Crown Prince of Saudi Arabia, His Royal Highness Mohammed bin Salman: 8 April 2026",k:"英 총리, 사우디 무함마드 빈 살만 왕세자와 회담: 4월 8일",s:"GOV.UK",c:"global",d:"2026-04-08",m:"UK PM Starmer met Saudi Crown Prince Mohammed bin Salman in Jeddah to deepen defence industrial cooperation, discuss the Iran ceasefire and efforts to reopen the Strait of Hormuz.",mk:"英 스타머 총리는 제다에서 무함마드 빈 살만 사우디 왕세자와 회담하고 방위산업 협력 심화, 이란 휴전 및 호르무즈 해협 재개 노력을 논의했다.",tg:["英총리","방위협력","호르무즈"],u:"https://www.gov.uk/government/news/pm-meeting-with-crown-prince-of-saudi-arabia-his-royal-highness-mohammed-bin-salman-8-april-2026"},
  {id:726,p:7,r:"심층분석",t:"Saudi Arabia lifts oil price to record premium as Strait of Hormuz narrows",k:"사우디, 호르무즈 해협 좁아지자 원유가 사상 최고 프리미엄 책정",s:"Bloomberg",c:"global",d:"2026-04-06",m:"Saudi Arabia raised its main crude grade price for Asian customers to a record premium as Iran&apos;s near-closure of the Strait of Hormuz and Middle East conflict convulsed energy markets.",mk:"사우디는 이란의 호르무즈 해협 봉쇄 근접과 중동 분쟁으로 에너지 시장이 요동치자 아시아 고객 대상 주력 원유 가격을 사상 최고 프리미엄으로 인상했다.",tg:["유가","프리미엄","아시아"],u:"https://www.bloomberg.com/news/articles/2026-04-06/saudis-raise-oil-price-to-record-premium-as-war-riles-markets"},
  {id:727,p:7,r:"주요경제",t:"OPEC+ will raise oil output by 206 kb/d in April 2026 amid Middle East tensions",k:"OPEC+, 중동 긴장 속 4월 원유 생산 일일 20.6만 배럴 증산",s:"Enerdata",c:"global",d:"2026-04-01",m:"Eight core OPEC+ members agreed a 206 kb/d output increase for April 2026, with Saudi Arabia&apos;s target set at 10.2 million bpd as the Kingdom holds most remaining spare capacity.",mk:"OPEC+ 핵심 8개국은 4월 일일 20.6만 배럴 증산에 합의했다. 잔여 여유 생산능력을 대부분 보유한 사우디의 목표는 일일 1,020만 배럴로 설정됐다.",tg:["OPEC+","증산","여유생산능력"],u:"https://www.enerdata.net/publications/daily-energy-news/opec-raise-output-206-kbd-april-2026-amid-middle-east-tensions.html"},
  {id:728,p:9,r:"헤드라인",t:"매일경제 4.22 1면: 전쟁 공포 이겼다, 코스피 &apos;사상 최고&apos;",k:"매일경제 4.22 1면: 전쟁 공포 이겼다, 코스피 &apos;사상 최고&apos;",s:"매일경제",c:"korean-view",d:"2026-04-22",m:"MK Business Daily front page reports KOSPI hit an all-time high despite Middle East war fears, reflecting market resilience amid ceasefire extension and strong Korean semiconductor export data.",mk:"매일경제 1면은 중동 전쟁 공포에도 불구하고 코스피가 사상 최고치를 기록했다고 보도. 휴전 연장과 한국 반도체 수출 호조가 시장 탄력성을 뒷받침했다.",tg:["코스피","매일경제","사상최고"],u:"https://news.nate.com/view/20260422n19625"},
  {id:729,p:8,r:"주요경제",t:"한국 4월 20일까지 수출 504억달러 역대 최대…반도체 151% 급증",k:"한국 4월 20일까지 수출 504억달러 역대 최대…반도체 151% 급증",s:"연합뉴스",c:"korean-view",d:"2026-04-21",m:"Korea Customs Service preliminary data for Apr 1-20 showed exports reaching a record $50.4 billion, with semiconductor exports surging 151% YoY to $32.8 billion, offsetting some Middle East-driven cost pressures.",mk:"관세청의 4월 1~20일 잠정치에 따르면 한국 수출이 504억달러로 역대 최대치를 기록했다. 반도체 수출은 전년비 151% 급증한 328억달러로, 중동발 비용 압박을 일부 상쇄했다.",tg:["수출","반도체","최대"],u:"https://www.yna.co.kr/"},
  {id:730,p:8,r:"심층분석",t:"정의선 회장, 중동신화 이어간다…현대차 사우디 생산기지 4분기 가동",k:"정의선 회장, 중동신화 이어간다…현대차 사우디 생산기지 4분기 가동",s:"서울경제",c:"korean-view",d:"2026-04-20",m:"Hyundai Motor&apos;s Saudi plant (HMMME) — 30% Hyundai, 70% PIF — is set to begin operations in Q4 2026 with annual capacity of 50,000 vehicles producing both EVs and ICE cars on mixed lines.",mk:"현대차 사우디 생산법인(HMMME, 현대 30%·PIF 70%)은 2026년 4분기 가동을 시작한다. 연산 5만 대 규모로 전기차·내연기관차를 혼류 생산한다.",tg:["현대차","HMMME","PIF"],u:"https://www.sedaily.com/NewsView/2GST2CO3QF"},
  {id:731,p:8,r:"심층분석",t:"매일경제 4.14 1면: 미국, 호르무즈 해협 &apos;역봉쇄&apos;",k:"매일경제 4.14 1면: 미국, 호르무즈 해협 &apos;역봉쇄&apos;",s:"매일경제",c:"korean-view",d:"2026-04-14",m:"MK Business Daily front page analyzed the US &apos;reverse blockade&apos; strategy on the Strait of Hormuz, cutting off Iranian oil exports while maintaining Gulf oil corridor for allied shipments.",mk:"매일경제 1면은 美의 호르무즈 해협 &apos;역봉쇄&apos; 전략을 분석했다. 이란의 석유 수출은 차단하면서 동맹국 선적을 위한 걸프 원유 회랑은 유지하는 방식이다.",tg:["호르무즈","역봉쇄","美전략"],u:"https://news.nate.com/view/20260414n17517"},
  {id:733,p:7,r:"심층분석",t:"파이낸셜뉴스: 호르무즈 대체재 얀부항 포화…원유 선적 번호표 뽑고 대기",k:"파이낸셜뉴스: 호르무즈 대체재 얀부항 포화…원유 선적 번호표 뽑고 대기",s:"파이낸셜뉴스",c:"korean-view",d:"2026-04-15",m:"FN News: Saudi Yanbu port (Hormuz alternative) is saturated, with vessels queued for crude loading. Aramco rationing slots by priority amid surging global demand for Red Sea-routed crude.",mk:"파이낸셜뉴스에 따르면 사우디 얀부항(호르무즈 대체재)은 원유 선적 대기 선박으로 포화 상태다. 아람코는 급증한 홍해 경유 원유 수요 속 우선순위 기준으로 슬롯을 배정하고 있다.",tg:["얀부","대체재","파이낸셜뉴스"],u:"https://www.fnnews.com/news/202604150701106763"},
  {id:734,p:8,r:"심층분석",t:"Pakistan, Turkey, Egypt, Saudi Arabia a new regional power block?",k:"파키스탄·터키·이집트·사우디, 새로운 지역 강국 블록 형성?",s:"Asia Times",c:"saudi",d:"2026-04-17",m:"Analysis of the emerging &apos;STEP&apos; quartet (Saudi Arabia, Turkey, Egypt, Pakistan) as a regional power block mediating US-Iran tensions and shaping post-war Middle East architecture.",mk:"사우디·터키·이집트·파키스탄의 &apos;STEP&apos; 4자 협력 체제가 美-이란 긴장을 중재하고 전후 중동 질서를 형성하는 지역 강국 블록으로 부상하고 있다는 분석.",tg:["STEP","4자협력","지역블록"],u:"https://asiatimes.com/2026/04/pakistan-turkey-egypt-saudi-arabia-a-new-regional-power-block/"},
